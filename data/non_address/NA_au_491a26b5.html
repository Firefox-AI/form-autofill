<fieldset>
<h3>au</h3>

<div class="alert alert-danger" role="alert" v-if="error_login">{{error_message}}</div> <div class="form-group"> <label class="prelabel" for="email">Email address</label> <input class="form-control" id="email" placeholder="name@email.com" required="" type="email" v-model="email"/> </div> <div class="form-group"> <label class="prelabel" for="password">Password</label> <input class="form-control" id="password" placeholder="Password" required="" type="password" v-model="password"/> </div> <div class="form-check custom-control custom-checkbox"> <div class="float-left"> <input class="custom-control-input" id="remember" name="remember" type="checkbox" v-model="remember"/> <label class="custom-control-label" for="remember">Remember me</label> </div> <div class="float-right"> <a @click="show_forgot" class="link-highlight text-forgot" href="javascript:void(0)">Forgot password?</a> </div> <div class="clearfix"></div> </div> <div class="form-group login-btn mt-4"> <button class="btn btn-primary btn-block">Login</button> <div class="loading-relative" id="login-loading" style="display: none;"> <div class="loading"> <div class="span1"></div> <div class="span2"></div> <div class="span3"></div> </div> </div> </div>
