<body>

<fieldset>
<h3>com</h3>
<p><i>Common Crawl form, other context, unlabeled.</i></p>

<form>
<div class="cleared"></div> <div class="headers gradient"><div class="headers_label">REGISTRATION DETAILS</div></div> <div class="cleared" style="height:20px;"></div> <div id="new-client"> <div id="genero" style="margin-bottom:10px; display:none"> <label>Gender:</label> <label for="genero_m">Male</label> <input checked="checked" id="genero_m" name="genero_cliente" type="radio" value="m"/> <label for="genero_f">Female</label> <input id="genero_f" name="genero_cliente" type="radio" value="f"/> </div> <div id="reservationdetails"> <div style="width:100%"> <div style="width:40%; float:left"> <label>First Name</label> <input class="form-control" name="nombre_cliente" style="width:96%" type="text"/> </div> <div style="width:60%; float:left"> <label>Surname</label> <input class="form-control" name="apellido_cliente" style="width:100%" type="text"/> </div> <div class="cleared"></div> <div style="width:40%; float:left"> <label>Mobile Number</label> <input class="form-control" id="mobile_int_number" name="movil_cliente" onkeypress="validate(event)" placeholder="International+44..." style="width:96%;" type="text"/> </div> <div style="width:60%; float:left"> <label>Email</label> <input class="form-control" name="email_cliente" style="width:100%" type="text"/> </div> <div class="cleared"></div> <div id="div_activa_politica" style="width:50%; float:left; margin-top: 10px; padding: 0px 6px"> <span><input class="form-control consent" id="policy" style="float:left; max-width:15px; max-height:15px" type="checkbox"/> I accept the<br/><a href="" style="color:red" target="_blank"> Privacy Policy</a></span> </div> <div id="div_activa_terminos" style="width:50%; float:left; margin-top: 10px; padding: 0px 6px"> <span><input class="form-control consent" id="terms" style="float:left; max-width:15px; max-height:15px" type="checkbox"/> I accept the<br/><a href="" style="color:red" target="_blank"> Terms and Conditions</a></span> </div> <div class="cleared"></div> </div> </div> </div> <div id="existing-client" style="display:none;"> <div style="width:50%; float:left"> <label>Username: <i class="fa fa-question-circle" data-placement="right" title="Please input the username we provide the first time you made the reservation."></i></label> <input class="form-control" id="username" name="username" placeholder="Example: c12345" style=" width:98%" type="text"/> </div> <div style="width:50%; float:left"> <label>Password:</label> <input class="form-control" id="password" name="password" type="password"/> </div> <div class="cleared"></div> <div style="display:block; height:20px"> <div style="padding:10px 0px"><label id="boton_muestra_reenviar_password">Forgot your password?</label></div> </div> <div class="cleared"></div> </div> <div id="div_resend_password" style="display:none;"> <label style="display:block">Email:</label> <div class="cleared"></div> <div style="width:40%; float:left"> <input class="form-control" id="email_resend_password" name="email_resend_password" type="text"/> </div> <button class="btn btn-success" id="boton_reenviar_password" style="float:right; font-size:16px"><i class="fa fa-paper-plane"></i> Resend Password</button> <div class="cleared"></div> </div> <div class="cleared"></div> <div id="sendfooter" style="margin-top:10px; display:block"> <div class="cleared"></div> <div style="display:none"> <div class="headers gradient" style="margin-top:10px;"><div class="headers_label">CONDITIONS</div></div> <input checked="checked" id="acepta_cliente" name="acepta_cliente" style="float:left;" type="checkbox"/> <label for="acepta_cliente" style="float:left; cursor:pointer">I accept the conditions of the Taxi Company. </label> <div class="cleared"></div> </div> </div>
</form>

</fieldset></body></html>
