<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>earth</h3>
<p><i>Common Crawl form, other context, unlabeled.</i></p>

<form>
<fieldset> <legend> Enter GPS coordinates below : </legend> <div class="form-group"> <span class="col-md-12"><i class="fa fa-ellipsis-h"></i> Latitude</span> <div class="col-md-12"> <input class="form-control" id="teleportLat" onchange="setLatLng()" placeholder="* lat in decimal fomat" type="text"/> </div> </div> <div class="form-group"> <span class="col-md-12"><i class="fa fa-ellipsis-v"></i> Longitude</span> <div class="col-md-12"> <input class="form-control" id="teleportLng" onchange="setLatLng()" placeholder="* lng in decimal fomat" type="text"/> </div> </div> <div class="form-group"> <span class="col-md-12"><i class="fa fa-ellipsis-h"></i>,<i class="fa fa-ellipsis-v"></i> or if you have it in "lat,lng" format, put it here:</span> <div class="col-md-12"> <input class="form-control" id="teleportLatlng" name="latlng" placeholder="lat,lng in decimal fomat, eg. '45.678,4.5678'" type="text"/> </div> </div> <div class="form-group"> <div class="col-md-12 text-center"> <input class="btn btn-primary btn-lg" id="submitTeleport" onclick="teleportTo(document.getElementById('teleportLatlng').value)" type="button" value="Fly !"/> </div> </div> </fieldset>
</form>

</fieldset></body></html>
