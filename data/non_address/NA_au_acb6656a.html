lass="field-wrapper form-group"> <label class="label">Delivery Instructions</label> <input autocomplete="off" class="form-control" maxlength="255" name="deliveryInstructions" type="text" value=""/> </div> </div> </div> <div class="account-third" style="display:none;"> <div class="col-lg-6 col-md-6 col-sm-6"> <div class="field-wrapper form-group"> <label class="label">Age</label> <select class="form-control" name="age"> <option value="">- Select Age -</option> <option value="18-24">18 - 24</option> <option value="25-34">25 - 34</option> <option value="35-44">35 - 44</option> <option value="45-54">45 - 54</option> <option value="55-64">55 - 64</option> <option value="65+">65+</option> </select> </div> </div> <div class="col-lg-6 col-md-6 col-sm-6"> <div class="field-wrapper form-group"> <label class="label">Gender</label> <select class="form-control" name="gender"> <option value="">- Select Gender -</option> <option>Male</option> <option>Female</option> <option>Other</option> </select> </div> </div> <div class="col-lg-12 col-md-12 col-sm-12"> <div class="field-wrapper form-group"> <label class="label">Business Name</label> <input class="form-control" name="business_name" type="text" value=""/> </div> </div> <div class="col-lg-12 col-md-12 col-sm-12"> <div class="field-wrapper form-group"> <label class="label">How did you hear about us?</label> <select class="form-control" id="register-hear" name="hear_about_us"> <option value="">- Select Option -</option> <option value="google">Google</option> <option value="word of mouth">Word of Mouth</option> <option value="print">Print</option> <option value="facebook">Facebook</option> <option value="instagram">Instagram</option> <option value="other social media">Other Social Media</option> <option value="radio">Radio</option> <option value="tv">TV</option> <option value="sms">SMS</option> <option value="email">Email</option> </select> </div> </div> </div> <div class="col-lg-12 col-md-12 col-sm-12"> <div> <button class="btn-2-bl
