</head>

<body>

<fieldset>
<h3>org</h3>
<p><i>Common Crawl form, other context, unlabeled.</i></p>

<form>
<div class="row"> <label for="FromMail">Email address (From)</label> <input class="text-box single-line" data-val="true" data-val-email="The Email address (From) field is not a valid e-mail address." data-val-required="From email is required" id="FromMail" name="FromMail" type="email" value=""/> <div class="email-validation-message"> <span class="field-validation-valid" data-valmsg-for="FromMail" data-valmsg-replace="true"></span> </div> </div> <div class="row"> <label for="Address">Email address (To)</label> <input class="text-box single-line" data-val="true" data-val-regex="This email address is invalid" data-val-regex-pattern="^(([^&lt;&gt;()[\]\\.,;:\s@]+(\.[^&lt;&gt;()[\]\\.,;:\s@]+)*)|(.+))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$" data-val-required="An email address is required" id="Address" name="Address" type="text" value=""/> <div class="email-validation-message"> <span class="field-validation-valid" data-valmsg-for="Address" data-valmsg-replace="true"></span> </div> </div> <div class="row"> <label for="Subject">Subject</label> <input id="mailToSubject" name="Subject" type="text" value=""/> </div> <div class="row"> <label for="Body">Message</label> <textarea cols="20" id="mailToBody" name="Body" rows="10"> </textarea> </div> <div class="popup-action-button-container"> <div class="row"> <div class="columns small-6 medium-6 large-6 text-center"> <input class="button small popupNoButton" onclick="ModalAction('#popupMailTo', 'close');" type="button" value="No"/> </div> <div class="columns small-6 medium-6 large-6 text-center" id="btnSubmitMail"> <input class="button small" onclick="SendMail();" type="button" value="Yes"/> </div> </div> </div> <a class="close-reveal-modal">×</a>
</form>

</fieldset></body></html>
