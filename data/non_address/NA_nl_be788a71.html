</head>

<body>

<fieldset>
<h3>nl</h3>
<p><i>Common Crawl form, other context, unlabeled.</i></p>

<form>
<input name="form_type" type="hidden" value="create_customer"/><input name="utf8" type="hidden" value="✓"/><header class="popover__header"> <h2 class="popover__title heading">Maak mijn account</h2> <p class="popover__legend">Gelieve onderstaande gegevens in te vullen:</p> </header><div class="form__input-wrapper form__input-wrapper--labelled"> <input autocomplete="given-name" class="form__field form__field--text" id="customer[first_name]" name="customer[first_name]" required="required" type="text"/> <label class="form__floating-label" for="customer[first_name]">Voornaam</label> </div> <div class="form__input-wrapper form__input-wrapper--labelled"> <input autocomplete="family-name" class="form__field form__field--text" id="customer[last_name]" name="customer[last_name]" required="required" type="text"/> <label class="form__floating-label" for="customer[last_name]">Achternaam</label> </div><div class="form__input-wrapper form__input-wrapper--labelled"> <input class="form__field form__field--text" id="register-customer[email]" name="customer[email]" required="required" type="email"/> <label class="form__floating-label" for="register-customer[email]">E-mail</label> </div> <div class="form__input-wrapper form__input-wrapper--labelled"> <input autocomplete="new-password" class="form__field form__field--text" id="register-customer[password]" name="customer[password]" required="required" type="password"/> <label class="form__floating-label" for="register-customer[password]">Wachtwoord</label> </div> <button class="form__submit button button--primary button--full" type="submit">Maak mijn account</button>
</form>

</fieldset></body></html>
