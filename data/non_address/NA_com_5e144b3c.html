<form>
<p class="modal-question" id="prequal-mortgage-question"><b>Have you been pre-qualified for a mortgage?</b></p> <div class="modal-checkboxes"> <div class="ui radio checkbox"> <input aria-labelledby="prequal-mortgage-question" id="signupform-extra-preq1" name="Prequalified" type="radio" value="true"/> <label for="signupform-extra-preq1">Yes</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="prequal-mortgage-question" id="signupform-extra-preq0" name="Prequalified" type="radio" value="false"/> <label for="signupform-extra-preq0">No</label> </div> </div> <p class="modal-question" id="first-time-home-buyer"><b>Are you a first time home buyer?</b></p> <div class="modal-checkboxes"> <div class="ui radio checkbox"> <input aria-labelledby="first-time-home-buyer" id="signupform-extra-first1" name="FirstTimeBuyer" type="radio" value="true"/> <label for="signupform-extra-first1">Yes</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="first-time-home-buyer" id="signupform-extra-first0" name="FirstTimeBuyer" type="radio" value="false"/> <label for="signupform-extra-first0">No</label> </div> </div> <p class="modal-question" id="months-to-buy"><b>Within how many months do you plan to buy a home?</b></p> <div class="modal-checkboxes"> <div class="ui radio checkbox"> <input aria-labelledby="months-to-buy" id="signupform-extra-timeframe0" name="TimeframeToBuy" type="radio" value="0-1 months"/> <label for="signupform-extra-timeframe0">0-1</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="months-to-buy" id="signupform-extra-timeframe1" name="TimeframeToBuy" type="radio" value="1-3 months"/> <label for="signupform-extra-timeframe1">1-3</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="months-to-buy" id="signupform-extra-timeframe3" name="TimeframeToBuy" type="radio" value="3-6 months"/> <label for="signupform-extra-timeframe3">3-6</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="months-to-buy" id="signupform-extra-timeframe6" name="TimeframeToBuy" type="radio" value="6-12 months"/> <label for="signupform-extra-timeframe6">6-12</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="months-to-buy" id="signupform-extra-timeframe12" name="TimeframeToBuy" type="radio" value="12+ months"/> <label for="signupform-extra-timeframe12">12+</label> </div> </div> <p class="modal-question" id="house-to-sell"><b>Do you own a home?</b></p> <div class="modal-checkboxes"> <div class="ui radio checkbox"> <input aria-labelledby="house-to-sell" id="signupform-extra-housetosell1" name="HouseToSell" type="radio" value="true"/> <label for="signupform-extra-housetosell1">Own</label> </div> <div class="ui radio checkbox"> <input aria-labelledby="house-to-sell" id="signupform-extra-housetosell0" name="HouseToSell" type="radio" value="false"/> <label for="signupform-extra-housetosell0">Rent/Other</label> </div> </div> <br/> <p class="center"><button class="btn--default" id="signupButton2" style="font-size: 18px;background:#FFA642; text-transform:none; border-radius:5px; padding:10px 100px" type="submit">Confirm</button></p>
</form>
