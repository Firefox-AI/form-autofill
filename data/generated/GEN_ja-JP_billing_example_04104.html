<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義人</span>
    <input type="text" name="r:r:6:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idvc" placeholder="カードに印字されたお名前" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="r:r:2:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idbb" placeholder="番地、町名、地名など" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>建物名・部屋番号</span>
    <input type="text" name="r:r:2:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="id3pt" placeholder="マンション名、アパート名など" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="r:r:8:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idjngd" placeholder="例: 123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="r:r:3:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idra1j" placeholder="例: 渋谷区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>都道府県</span>
    <select name="r:r:1:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="id3cotd" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>北海道</option>
  <option>青森県</option>
  <option>岩手県</option>
  <option>宮城県</option>
  <option>秋田県</option>
  <option>山形県</option>
  <option>福島県</option>
  <option>茨城県</option>
  <option>栃木県</option>
  <option>群馬県</option>
  <option>埼玉県</option>
  <option>千葉県</option>
  <option>東京都</option>
  <option>神奈川県</option>
  <option>新潟県</option>
  <option>富山県</option>
  <option>石川県</option>
  <option>福井県</option>
  <option>山梨県</option>
  <option>長野県</option>
  <option>岐阜県</option>
  <option>静岡県</option>
  <option>愛知県</option>
  <option>三重県</option>
  <option>滋賀県</option>
  <option>京都府</option>
  <option>大阪府</option>
  <option>兵庫県</option>
  <option>奈良県</option>
  <option>和歌山県</option>
  <option>鳥取県</option>
  <option>島根県</option>
  <option>岡山県</option>
  <option>広島県</option>
  <option>山口県</option>
  <option>徳島県</option>
  <option>香川県</option>
  <option>愛媛県</option>
  <option>高知県</option>
  <option>福岡県</option>
  <option>佐賀県</option>
  <option>長崎県</option>
  <option>熊本県</option>
  <option>大分県</option>
  <option>宮崎県</option>
  <option>鹿児島県</option>
  <option>沖縄県</option>
</select>
  </div>
  <div>
    <span>国名</span>
    <select name="r:r:9:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idbtr" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
  <option>中国</option>
  <option>韓国</option>
  <option>その他</option>
</select>
  </div>
  <div>
    <span>会社名（任意）</span>
    <input type="text" name="r:r:9:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idutyh" placeholder="会社名を入力してください" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>名（ふりがな）</span>
    <input type="text" name="r:r:1:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idnz" placeholder="名のふりがな" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
