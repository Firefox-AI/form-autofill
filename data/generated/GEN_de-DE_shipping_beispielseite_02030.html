<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idd4">Vorname</label>
    <input type="text" name="billing_first_name" id="idd4" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id27">Nachname</label>
    <input type="text" name="billing_last_name" id="id27" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idw2l">Geben Sie die Stadt oder die Postleitzahl in das Suchfeld ein, wählen Sie einen Abholort aus der Vorschlagsliste und drücken Sie die Eingabetaste, um Ihre Auswahl zu bestätigen.</label>
    <input type="text" name="zip" id="idw2l" placeholder="Geben Sie die Stadt oder die Postleitzahl in das Suchfeld ein, wählen Sie einen Abholort aus der Vorschlagsliste und drücken Sie die Eingabetaste, um Ihre Auswahl zu bestätigen." data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idy9t4">Bundesland</label>
    <select name="locality" id="idy9t4" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="id2oa">Straße und Hausnummer</label>
    <input type="text" name="addr16" id="id2oa" placeholder="Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idqp">Gebäude / Stockwerk / Wohnung</label>
    <input type="text" name="addressLine2" id="idqp" placeholder="Gebäude / Stockwerk / Wohnung" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id88z">Ort / Gebiet / Platz</label>
    <input type="text" name="city" id="id88z" placeholder="Ort / Gebiet / Platz" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idmf">Land</label>
    <select name="country" id="idmf" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Frankreich</option>
  <option>Luxemburg</option>
  <option>Dänemark</option>
  <option>Schweden</option>
  <option>Norwegen</option>
  <option>Finnland</option>
</select>
  </div>
  <div>
    <label for="idwtul">Telefonnummer</label>
    <input type="tel" name="telephone7" id="idwtul" placeholder="+49 123 4567890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
