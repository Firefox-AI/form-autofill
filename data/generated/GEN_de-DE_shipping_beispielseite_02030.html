<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Geben Sie zunächst den Ort oder die Postleitzahl in die Suchleiste ein, wählen Sie einen Abholpunkt aus der Liste der Vorschläge aus und drücken Sie Enter, um Ihre Auswahl zu bestätigen." data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" aria-label="Bundesland" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" aria-label="Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" aria-label="Gebäude / Stockwerk / Wohnung" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Ort / Gebiet / Platz" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="country" aria-label="Land" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Frankreich</option>
  <option>Luxemburg</option>
  <option>Dänemark</option>
  <option>Schweden</option>
  <option>Norwegen</option>
  <option>Finnland</option>
</select>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+49 123 4567890" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
