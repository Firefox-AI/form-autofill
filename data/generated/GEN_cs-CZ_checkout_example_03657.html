<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Jméno</label>
    <input type="text" name="givenName" id="givenName" placeholder="Zadejte vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Příjmení</label>
    <input type="text" name="familyName" id="familyName" placeholder="Zadejte vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Název firmy (nepovinné)</label>
    <input type="text" name="organization" id="organization" placeholder="Zadejte název firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Ulice a číslo popisné</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Zadejte ulici a číslo popisné" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Město</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Zadejte město" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">PSČ</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Zadejte vaše PSČ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Země</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Polsko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Maďarsko</option>
</select>
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Zadejte váš e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="Zadejte vaše telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
