<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Discount Code</span>
    <input type="text" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Billing Address</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Street address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apartment, suite, etc. (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Country/Region</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>State</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <span>Zip Code</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="tel" id="tel" placeholder="(555) 555-5555" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mobile Phone Number</span>
    <input type="tel" name="givenName" id="givenName" placeholder="(555) 555-5555" data-moz-autofill-type="given-name">
  </div>
</form>

</fieldset></body></html>
