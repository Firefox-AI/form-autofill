<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>webshop.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Keresztnév
    <input type="text" name="givenName" id="idfqj9" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label for="idzq7m">Vezetéknév</label>
    <input type="text" name="last_name" id="idzq7m" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="street" id="idg5fdr" placeholder="Pl. Fő utca 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="town" id="idv57f" placeholder="Írd be a város nevét" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zip_code" id="idza8r" placeholder="Pl. 1234" aria-label="Irányítószám" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idk3">Ország</label>
    <select name="country" id="idk3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Horvátország</option>
</select>
  </div>
  <div>
    <label for="ida79yx">Email cím</label>
    <input type="email" name="email" id="ida79yx" placeholder="Példa: valaki@domain.hu" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="phoneNumber" id="idtv" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Cég neve (opcionális)
    <input type="text" name="organization" id="idono" placeholder="Írd be a céged nevét" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Megye
    <select name="province" id="ids80bk" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Budapest</option>
  <option>Pest megye</option>
  <option>Fejér megye</option>
  <option>Győr-Moson-Sopron megye</option>
  <option>Hajdú-Bihar megye</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
