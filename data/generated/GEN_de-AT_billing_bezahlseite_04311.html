<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Vor- und Nachname" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="z. B. Musterstraße 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z. B. Stiege 1, Top 3" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="z. B. 1010" aria-label="PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="z. B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
  </div>
  <div>
    <span>Zusätzlicher Name</span>
    <input type="text" name="ccAdditionalName" id="ccAdditionalName" placeholder="z. B. Max Mustermann" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
