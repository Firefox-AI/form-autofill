<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idynq">Nome e Cognome</label>
    <input type="text" name="fullName" id="idynq" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id247u">Email</label>
    <input type="email" name="mail" id="id247u" placeholder="esempio@dominio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ida9kp0">Telefono</label>
    <input type="tel" name="phoneNumber" id="ida9kp0" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idgvy">Indirizzo</label>
    <input type="text" name="streetAddress" id="idgvy" placeholder="Via o Piazza, numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idxaj">Città</label>
    <input type="text" name="town" id="idxaj" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idtco">Codice Postale</label>
    <input type="text" name="postcode" id="idtco" placeholder="Inserisci il codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idl89zz">Seleziona il Paese</label>
    <select name="countryName" id="idl89zz" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
</form>

</fieldset></body></html>
