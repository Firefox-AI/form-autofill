<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome e Cognome</label>
    <input type="text" name="name" id="name" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="esempio@dominio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via o Piazza, numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Seleziona o inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Codice Postale</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
</form>

</fieldset></body></html>
