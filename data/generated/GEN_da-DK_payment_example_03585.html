<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idotb">Navn på kortet</label>
    <input type="text" name="ccName" id="idotb" placeholder="Fuldstændigt navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idqm">Kortnummer</label>
    <input type="number" name="cardNo" id="idqm" placeholder="Indtast kortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idfx">Måned for udløb</label>
    <select name="exp_month" id="idfx" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idwvyl">År for udløb</label>
    <select name="ccExpYear" id="idwvyl" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="id8cz2v">Sikkerhedskode</label>
    <input type="number" name="cvc" id="id8cz2v" placeholder="3-cifret kode på bagsiden" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id3g08">Korttype</label>
    <select name="ccType" id="id3g08" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
