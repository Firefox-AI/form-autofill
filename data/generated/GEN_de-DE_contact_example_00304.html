<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" placeholder="beispiel@domain.de" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="0123 4567890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Unternehmen</label>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>

  </div>

  </div>

</form>

</fieldset></body></html>
