<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>kontaktujnas.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="name" id="name" placeholder="Wprowadź swoje imię i nazwisko" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adres e-mail
    <input type="email" name="email" id="email" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numer telefonu
    <input type="tel" name="tel" id="tel" placeholder="Wprowadź swój numer telefonu" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Ulica i numer
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Wprowadź ulicę i numer" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Miasto
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wprowadź miasto" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="postalCode" id="postalCode" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Wyślij</button>
  </div>
</form>

</fieldset></body></html>
