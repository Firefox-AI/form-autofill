<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Ditt förnamn" aria-label="Förnamn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Ditt efternamn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Mellan namn
    <input type="text" name="additionalName" id="additionalName" placeholder="Ditt mellannamn" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label for="nickname">Öknamn</label>
    <input type="text" name="nickname" id="nickname" placeholder="Ditt öknamn" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-post</label>
    <input type="email" name="email" id="email" placeholder="exempel@domän.se" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="07X-XXXXXXX" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Ditt företag/organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Födelsedatum</span>
    <input type="text" name="bday" id="bday" placeholder="ÅÅÅÅ-MM-DD" data-moz-autofill-type="bday">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
