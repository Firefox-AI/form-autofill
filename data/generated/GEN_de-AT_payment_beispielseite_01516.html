<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Geben Sie den Namen des Empfängers ein</span>
    <input type="text" name="fullName" id="idyc" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="phoneNumber" id="idppq" placeholder="888 1234 5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Geben Sie Ihre E-Mail-Adresse ein</span>
    <input type="email" name="email" id="idvd" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Geben Sie die vollständige Adresse ein</span>
    <input type="text" name="address" id="idz3z" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="city3" id="idj6n" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Bezirk</span>
    <input type="text" name="district" id="id94cn" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Geben Sie die Postleitzahl ein</span>
    <input type="text" name="zip_code4" id="idj8h07" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
