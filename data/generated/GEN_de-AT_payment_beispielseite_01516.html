<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Geben Sie den Namen des Empfängers ein</span>
    <input type="text" name="name_9581" id="name_1876" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel_6488" id="tel_388" placeholder="888 1234 5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Geben Sie Ihre E-Mail-Adresse ein</span>
    <input type="email" name="email_6421" id="email_9987" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Geben Sie die vollständige Adresse ein</span>
    <input type="text" name="street_address_681" id="street_address_4739" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="address_level2_6773" id="address_level2_2671" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Bezirk</span>
    <input type="text" name="address_level3_4156" id="address_level3_3975" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Geben Sie die Postleitzahl ein</span>
    <input type="text" name="postal_code_4360" id="postal_code_1182" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
