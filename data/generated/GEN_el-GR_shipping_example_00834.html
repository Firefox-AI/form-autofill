<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ονοματεπώνυμο</span>
    <input type="text" name="idcfw" id="idc01" placeholder="Γράψτε το ονοματεπώνυμό σας" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Διεύθυνση</span>
    <input type="text" name="idct" id="idunmc" placeholder="Οδός και αριθμός" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Ταχυδρομικός κώδικας</span>
    <input type="text" name="idxl" id="idnsra" placeholder="Π.χ. 12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Πόλη</span>
    <input type="text" name="idtlz" id="idw8" placeholder="Γράψτε την πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Χώρα</span>
    <select name="idvd" id="idv9mn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
</select>
  </div>
  <div>
    <span>Διαμέρισμα</span>
    <input type="text" name="id9v" id="idml2dj" placeholder="Αριθμός διαμερίσματος (αν applicable)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Όροφος</span>
    <input type="text" name="idti" id="idtkr" placeholder="Π.χ. 3ος" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Κτήριο</span>
    <input type="text" name="idvr" id="id7f2v" placeholder="Αριθμός κτηρίου (αν applicable)" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="idum" id="idwkl1" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
