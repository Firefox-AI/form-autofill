<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamenti.esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqzhog">Nome e cognome</label>
    <input type="text" name="r:r:1:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idqzhog" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idwy2cl">Numero di carta</label>
    <input type="number" name="r:r:3:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idwy2cl" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idy4bb">Mese di scadenza</label>
    <select name="r:r:1:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idy4bb" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="idy6">Anno di scadenza</label>
    <select name="r:r:8:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idy6" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idgq">Codice di sicurezza (CVV)</label>
    <input type="number" name="r:r:4:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idgq" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idbj9px">Tipo di carta</label>
    <select name="r:r:8:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idbj9px" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>UnionPay</option>
  <option>JCB</option>
</select>
  </div>
</form>

</fieldset></body></html>
