<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlservice.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name auf der Karte</span>
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kreditkartennummer</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Monat der Gültigkeit</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <span>Jahr der Gültigkeit</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Kartenprüfziffer (CVC)</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kartenart</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Phonetischer Name</span>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Maks Musterman" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Zahlung abschicken</button>
  </div>
</form>

</fieldset></body></html>
