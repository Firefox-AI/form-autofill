<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitiouspayments.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Cardholder Name</label>
    <input type="text" name="ccName" id="ccName" placeholder="Enter the name on the card" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccNumber">Card Number (again)</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Re-enter your card number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccName">Name on Card (if different)</label>
    <input type="text" name="ccName" id="ccName" placeholder="Optional" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - January</option>
  <option>02 - February</option>
  <option>03 - March</option>
  <option>04 - April</option>
  <option>05 - May</option>
  <option>06 - June</option>
  <option>07 - July</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - October</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Expiration Year</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Security Code (CVC)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 or 4 digit code" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
