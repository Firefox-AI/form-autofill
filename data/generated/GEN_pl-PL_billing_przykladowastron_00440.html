<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="cardholderName" id="idecuaj" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Nazwa firmy
    <input type="text" name="organization" id="idey" placeholder="Nazwa Twojej firmy" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Ulica i numer
    <input type="text" name="addr1" id="idfzs" placeholder="Ul. Kwiatowa 15" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Mieszkanie (opcjonalnie)
    <input type="text" name="unit" id="idmkl" placeholder="Nr mieszkania" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="zip_code" id="id1tag" placeholder="00-000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Miasto
    <input type="text" name="locality" id="idmi" placeholder="Warszawa" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Województwo
    <select name="county" id="idq6" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Dolnośląskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Lubusz</option>
  <option>Łódzkie</option>
  <option>Małopolskie</option>
  <option>Mazowieckie</option>
  <option>Opolskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Pomorskie</option>
  <option>Śląskie</option>
  <option>Świętokrzyskie</option>
  <option>Warmińsko-Mazurskie</option>
  <option>Wielkopolskie</option>
  <option>Zachodniopomorskie</option>
</select>
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="countryName" id="idnfy9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Inne</option>
</select>
    </label>
  </div>
  <div>
    <button name="id947dm" id="idsbbrq" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
