<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Karteninhaber</span>
    <input type="text" name="idqc" id="id5rufm" placeholder="Name auf der Karte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="id825o" id="idjli" placeholder="z.B. Hauptstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>PLZ</span>
    <input type="text" name="idgkz" id="idipf" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="idzgz" id="idpy4" placeholder="z.B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="idlkgp4" id="iddlh" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="idl5r" id="idzjjt" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechien</option>
  <option>Polen</option>
</select>
  </div>
  <div>
    <span>Unternehmen (optional)</span>
    <input type="text" name="id5vjr" id="id219" placeholder="Ihr Unternehmensname" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="id41lc" id="id7q" placeholder="z.B. +43 1 2345678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
