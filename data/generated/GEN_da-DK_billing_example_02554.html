<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn på kortet</span>
    <input type="text" name="ccName" id="idc6" placeholder="Indtast navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addr19" id="idbb" placeholder="Gadeadresse, husnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Evt. etage eller lejlighed</span>
    <input type="text" name="address2" id="idei" placeholder="F.eks. 2. sal, lejlighed 3" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip_code" id="id4q" placeholder="Indtast postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="town" id="idtec7" placeholder="Indtast byens navn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Region</span>
    <select name="county" id="idjsi1u" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Sjælland</option>
  <option>Vestjylland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idbf6k" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>Frankrig</option>
  <option>USA</option>
</select>
  </div>
  <div>
    <span>CVR-nummer</span>
    <input type="text" name="vat" id="iddqeg" placeholder="Indtast CVR-nummer" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
