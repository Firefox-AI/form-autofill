<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Name auf der Kreditkarte</label>
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Zusätzliche Adresse (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Wohnung, Etage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Bundesland
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
</select>
    </label>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Slowakei</option>
  <option>Ungarn</option>
  <option>Tschechische Republik</option>
</select>
  </div>
  <div>
    <label for="vatNumber">USt-IdNr.</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="ATU12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="+43 1 23456789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
