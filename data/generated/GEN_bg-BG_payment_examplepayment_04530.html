<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Име на картата</span>
    <input type="text" name="r:r:3:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idgh" placeholder="Име, посочено на картата" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Номер на картата</span>
    <input type="number" name="r:r:7:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="iddxnyg" placeholder="Въведете номера на картата" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Месец на изтичане</span>
    <select name="r:r:5:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idzntr" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ян.</option>
  <option>Фев.</option>
  <option>Март</option>
  <option>Апр.</option>
  <option>Май</option>
  <option>Юни</option>
  <option>Юли</option>
  <option>Авг.</option>
  <option>Септ.</option>
  <option>Окт.</option>
  <option>Ное.</option>
  <option>Дек.</option>
</select>
  </div>
  <div>
    <span>Година на изтичане</span>
    <select name="r:r:3:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="id2i2k" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Код за сигурност</span>
    <input type="number" name="r:r:8:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id2g" placeholder="3-цифрен код отзад на картата" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Тип на картата</span>
    <select name="r:r:1:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idv72" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <button name="r:r:3:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="id1rk" type="submit">Плати</button>
  </div>
</form>

</fieldset></body></html>
