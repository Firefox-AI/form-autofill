    <input type="text" name="town" id="idkf5o" placeholder="Cidade" aria-label="Cidade" data-moz-autofill-type="address-level2">

  <option>RJ</option>
  <option>RN</option>
  <option>RS</option>
  <option>RO</option>

  <option>SC</option>
  <option>SP</option>
  <option>SE</option>
  <option>TO</option>
</select>
  </div>
  <div>
    <select name="country" id="idd3" aria-label="País" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="idndlhd" placeholder="Seu CPF ou CNPJ" aria-label="Número de Identificação Fiscal (CPF ou CNPJ)" data-moz-autofill-type="vat-number">
  </div>

    <input type="tel" name="mobile" id="id375i" placeholder="(XX) XXXXX-XXXX" aria-label="Telefone" data-moz-autofill-type="tel">

    <input type="text" name="addressLine2" id="idv1" placeholder="Apto, Bloco, etc." aria-label="Complemento" data-moz-autofill-type="address-line2">
