<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>

  </div>
  <div>

  </div>
  <div>

  <option>Finland</option>

</select>
    </label>
  </div>

    </label>
  </div>
  <div>

    <input type="tel" name="tel" id="id5p82" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="idnj05q" id="idc74c" type="submit">Submit</button>
  </div>
</form>
