<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzwrlc">Όνομα κατόχου της κάρτας</label>
    <input type="text" name="r:r:8:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idzwrlc" placeholder="Πλήρες όνομα" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idrhm9">Αριθμός κάρτας</label>
    <input type="number" name="r:r:6:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idrhm9" placeholder="π.χ. 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id2x">Μήνας λήξης</label>
    <select name="r:r:8:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="id2x" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ιανουάριος</option>
  <option>Φεβρουάριος</option>
  <option>Μάρτιος</option>
  <option>Απρίλιος</option>
  <option>Μάιος</option>
  <option>Ιούνιος</option>
  <option>Ιούλιος</option>
  <option>Αύγουστος</option>
  <option>Σεπτέμβριος</option>
  <option>Οκτώβριος</option>
  <option>Νοέμβριος</option>
  <option>Δεκέμβριος</option>
</select>
  </div>
  <div>
    <label for="id70nr">Έτος λήξης</label>
    <select name="r:r:5:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="id70nr" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="ididxip">Κωδικός ασφαλείας (CVC)</label>
    <input type="number" name="r:r:3:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="ididxip" placeholder="3 ή 4 ψηφία" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idq0lmn">Τύπος κάρτας</label>
    <select name="r:r:5:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idq0lmn" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
</form>

</fieldset></body></html>
