<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom sur la carte</span>
    <input type="text" name="cardholderName" id="idom" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="street1" id="idlv" placeholder="123 Rue de Paris" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Complément d&#x27;adresse (facultatif)</span>
    <input type="text" name="addressLine23" id="idib3u" placeholder="Bâtiment A, Appartement 4" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Numéro d&#x27;appartement</span>
    <input type="text" name="apt4" id="idqh" placeholder="A1" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postcode4" id="id57t2" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="city" id="id8g8" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Région</span>
    <select name="region" id="idn9ikn" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Occitanie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="idjxe" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
</select>
  </div>
</form>

</fieldset></body></html>
