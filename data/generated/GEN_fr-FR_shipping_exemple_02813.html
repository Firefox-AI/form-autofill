<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nom complet</label>
    <input type="text" name="name" id="name" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressHousenumber">Numéro</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Votre numéro" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="street">Rue</label>
    <input type="text" name="street" id="street" placeholder="Rue ou voie" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressLine2">Complément d&#x27;adresse</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <label for="apartment">Numéro d&#x27;appartement</label>
    <input type="text" name="apartment" id="apartment" placeholder="Numéro d&#x27;appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="field" id="field" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
