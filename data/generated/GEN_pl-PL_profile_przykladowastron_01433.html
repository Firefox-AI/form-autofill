<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Twoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Twoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Twoje drugie imię" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Twój pseudonim" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Twój e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Twój numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nazwa organizacji" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Twoje hasło">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
