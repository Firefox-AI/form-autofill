<html><head>

<body>

<fieldset>
<h3>examplepayment.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Namn på kortet
    <input type="text" name="r:r:7:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="id4e" placeholder="Skriv ditt namn som på kortet" data-moz-autofill-type="cc-name">

  </div>
  <div>
    <label>Kortnummer

  </div>
  <div>
    <label>Utgångsmånad

  <option>Februari</option>
  <option>Mars</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augusti</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
    </label>
  </div>
  <div>
    <label>Utgångsår

  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
    </label>
  </div>
  <div>
    <label>Säkerhetskod (CSC)
    <input type="number" name="r:r:8:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="idk3mte" placeholder="De tre sista siffrorna" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Korttyp
    <select name="r:r:3:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idl6ue" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>Gatuadress
    <input type="text" name="r:r:4:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="id6u4mw" placeholder="Gatuadress och nummer" data-moz-autofill-type="street-address">
    </label>
  </div>
