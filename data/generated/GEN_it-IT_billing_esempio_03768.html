<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome riportato sulla carta</label>
    <input type="text" name="ccName" id="ccName" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Ulteriori dettagli (opzionale)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Interno 4" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Codice postale</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Provincia</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>RM - Roma</option>
  <option>MI - Milano</option>
  <option>NA - Napoli</option>
  <option>TO - Torino</option>
  <option>FI - Firenze</option>
</select>
  </div>
  <div>
    <label for="countryName">Nazione</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Numero di partita IVA</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="IT12345678901" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="organization">Nome dell&#x27;azienda</label>
    <input type="text" name="organization" id="organization" placeholder="ACME S.p.A." data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
