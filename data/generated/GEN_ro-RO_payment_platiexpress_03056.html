<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>plati-express.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyp2i">Numele de pe card</label>
    <input type="text" name="cardholderName" id="idyp2i" placeholder="Numele complet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idha7za">Numărul cardului</label>
    <input type="number" name="ccNumber" id="idha7za" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ide2w">Luna expirării</label>
    <select name="exp_month" id="ide2w" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <label for="idh8zi">Anul expirării</label>
    <select name="ccExpYear1" id="idh8zi" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <label for="ida23p">Codul de securitate (CVV)</label>
    <input type="number" name="cardCode8" id="ida23p" placeholder="CVC" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idpo3p">Tipul cardului</label>
    <select name="ccType" id="idpo3p" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <label for="iddm">Adresa de facturare</label>
    <input type="text" name="street4" id="iddm" placeholder="Stradă, număr, apartament" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="id5qz3" id="idywb" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
