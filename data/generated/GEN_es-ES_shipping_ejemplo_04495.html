<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre completo
    <input type="text" name="name_5996" id="name_7303" placeholder="Escribe tu nombre completo" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Calle
    <input type="text" name="street_9374" id="street_5668" placeholder="Nombre de la calle" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Número
    <input type="number" name="address_housenumber_2345" id="address_housenumber_1523" placeholder="Número de la casa" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Apartamento, piso, etc.
    <input type="text" name="address_line2_6725" id="address_line2_8467" placeholder="Opcional" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="postal_code_7518" id="postal_code_3473" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="address_level2_8893" id="address_level2_1815" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>País
    <select name="country_name_1478" id="country_name_7115" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Portugal</option>
  <option>Reino Unido</option>
</select>
    </label>
  </div>
  <div>
    <label>Provincia
    <input type="text" name="address_level3_4419" id="address_level3_2420" placeholder="Provincia o región" data-moz-autofill-type="address-level3">
    </label>
  </div>
</form>

</fieldset></body></html>
