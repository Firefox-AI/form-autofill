<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Imię i nazwisko</label>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Ulica</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="ul. Przykładowa 5" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Dodatkowy adres (opcjonalnie)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Mieszkanie 12B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Województwo</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Mazowieckie</option>
  <option>Małopolskie</option>
  <option>Śląskie</option>
  <option>Wielkopolskie</option>
  <option>Pomorskie</option>
</select>
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>USA</option>
  <option>Wielka Brytania</option>
</select>
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Złóż zamówienie</button>
  </div>
</form>

</fieldset></body></html>
