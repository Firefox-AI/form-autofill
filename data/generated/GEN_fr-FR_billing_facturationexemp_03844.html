<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>facturation-exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom sur la carte de crédit
    <input type="text" name="ccName" id="ccName" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Rue de Exemple" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Complément d&#x27;adresse
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement 45" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="postalCode" id="postalCode" placeholder="75001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ville
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Paris" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Région
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Occitanie</option>
  <option>Guadeloupe</option>
  <option>Martinique</option>
  <option>La Réunion</option>
  <option>Guyane</option>
</select>
    </label>
  </div>
  <div>
    <label>Pays
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
    </label>
  </div>
  <div>
    <label>Numéro de TVA
    <input type="text" name="vatNumber" id="vatNumber" placeholder="FR12345678901" data-moz-autofill-type="vat-number">
    </label>
  </div>
  <div>
    <label>Nom de l&#x27;entreprise
    <input type="text" name="organization" id="organization" placeholder="Société Exemple" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Indicatif téléphonique
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+41</option>
  <option>+352</option>
  <option>+377</option>
</select>
    </label>
  </div>
  <div>
    <label>Suffixe ou titre (facultatif)
    <input type="text" name="honorificSuffix" id="honorificSuffix" placeholder="(e.g. M. ou Mme)" data-moz-autofill-type="honorific-suffix">
    </label>
  </div>
</form>

</fieldset></body></html>
