<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">名</label>
    <input type="text" name="givenName" id="givenName" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">姓</label>
    <input type="text" name="familyName" id="familyName" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">ミドルネーム</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="次郎" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">ニックネーム</label>
    <input type="text" name="nickname" id="nickname" placeholder="たろちゃん" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">メールアドレス</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">電話番号</label>
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">会社名</label>
    <input type="text" name="organization" id="organization" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">誕生日</label>
    <input type="text" name="bday" id="bday" placeholder="YYYY-MM-DD" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">役職</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="マネージャー" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="phoneticFamilyName">姓(フリガナ)</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="ヤマダ" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="field">パスワード</label>
    <input type="password" name="field" id="field">
  </div>
</form>

</fieldset></body></html>
