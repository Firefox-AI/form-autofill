<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvx">名</label>
    <input type="text" name="firstName" id="idvx" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idm5tm8">姓</label>
    <input type="text" name="lname" id="idm5tm8" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idgkj">ミドルネーム</label>
    <input type="text" name="middleName" id="idgkj" placeholder="次郎" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idhy2">ニックネーム</label>

  <div>

  </div>
  <div>

  </div>
  <div>
    <label for="iduj6">所属</label>
    <input type="text" name="business" id="iduj6" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idhz0xx">生年月日</label>
    <select name="dob" id="idhz0xx" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>選択</option>
  <option>1990年1月1日</option>
  <option>1990年2月2日</option>
  <option>1990年3月3日</option>
  <option>1990年4月4日</option>
  <option>1990年5月5日</option>
  <option>1990年6月6日</option>
  <option>1990年7月7日</option>
  <option>1990年8月8日</option>
  <option>1990年9月9日</option>
  <option>1990年10月10日</option>
  <option>1990年11月11日</option>
  <option>1990年12月12日</option>
</select>
  </div>
  <div>
    <label for="idr5tc">役職</label>
    <input type="text" name="position" id="idr5tc" placeholder="マネージャー" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="idtnprx">ふりがな（姓）</label>
    <input type="text" name="ide0tby" id="idtnprx" placeholder="やまだ" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="ideyuw">パスワード</label>
    <input type="password" name="idjqe" id="ideyuw" placeholder="6文字以上のパスワード">
  </div>
</form>

</fieldset></body></html>
