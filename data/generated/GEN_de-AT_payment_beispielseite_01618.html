<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="user_email" id="ideh" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="last_name" id="id5yg" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="first_name" id="idb8tf" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="addr1" id="idm5bv4" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Zusätzliche Adresse (optional)</span>
    <input type="text" name="addressLine2" id="idl2qq" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="city" id="id5gztg" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="zip_code" id="idif" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Telefonvorwahl</span>
    <select name="phoneCountryCode" id="id4jx" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+43</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="phone" id="idqxwk" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
