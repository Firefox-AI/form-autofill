<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Zusätzliche Adresse (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Telefonvorwahl</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+43</option>
  <option>+49</option>
  <option>+41</option>
  <option>+36</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
