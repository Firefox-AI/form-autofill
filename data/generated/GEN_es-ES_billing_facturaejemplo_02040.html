<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>facturaejemplo.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpnkz">Nombre en la tarjeta</label>
    <input type="text" name="ccName" id="idpnkz" placeholder="John Doe" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idkg4">Dirección</label>
    <input type="text" name="street1" id="idkg4" placeholder="Calle Falsa 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id1xv">Código Postal</label>
    <input type="text" name="postalCode" id="id1xv" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idnpm">Ciudad</label>
    <input type="text" name="town" id="idnpm" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id437nm">Provincia</label>
    <select name="region" id="id437nm" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Granada</option>
</select>
  </div>
  <div>
    <label for="idy4tlq">País</label>
    <select name="country" id="idy4tlq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Alemania</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="idob3">NIF o CIF</label>
    <input type="text" name="vat" id="idob3" placeholder="ES12345678Z" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="id5r5">Complemento de dirección</label>
    <input type="text" name="addr2" id="id5r5" placeholder="Piso 2, Letra B" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
