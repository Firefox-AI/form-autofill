<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="name" id="name" placeholder="Mario Rossi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Via
    <input type="text" name="street" id="street" placeholder="Via Roma" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Numero civico
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="4B" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Ulteriori informazioni (opzionale)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Scala A, Piano 2" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Città
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Paese
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
    </label>
  </div>
  <div>
    <label>Numero appartamento (opzionale)
    <input type="text" name="apartment" id="apartment" placeholder="A1" data-moz-autofill-type="apartment">
    </label>
  </div>
</form>

</fieldset></body></html>
