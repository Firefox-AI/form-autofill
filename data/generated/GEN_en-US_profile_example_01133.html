<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Enter your email address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Enter your house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Enter your apartment number" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="e.g., Suite, Floor" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Enter your email again" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="loginname" id="loginname" placeholder="Your phone number" data-moz-autofill-type="loginname">
  </div>
</form>

</fieldset></body></html>
