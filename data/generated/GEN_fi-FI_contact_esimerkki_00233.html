<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idn8b">Nimi</label>
    <input type="text" name="fullName" id="idn8b" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="user_email" id="idyh" placeholder="esimerkki@esimerkki.fi" aria-label="Sähköposti" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idssvb">Puhelinnumero</label>
    <input type="tel" name="phoneNumber1" id="idssvb" placeholder="+358 40 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="street" id="id88" placeholder="Osoite, esim. Esimerkkikatu 1" aria-label="Katuosoite" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Kaupunki
    <input type="text" name="town" id="idpo2" placeholder="Kaupunki" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <span>Postinumero</span>
    <input type="text" name="postalCode5" id="idck" placeholder="Esim. 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Organisaatio</span>
    <input type="text" name="business" id="idf5ze" placeholder="Yrityksen nimi" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="country" id="idxa" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
</select>
  </div>
  <div>
    <input type="number" name="idohs" id="idhr0qt" placeholder="Esim. 123" data-moz-autofill-type="tel-extension">
  </div>
</form>

</fieldset></body></html>
