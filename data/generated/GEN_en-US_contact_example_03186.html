<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Email Address *</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Country Code *</span>
    <input type="tel" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <span>Phone Number *</span>
    <input type="tel" name="telNational" id="telNational" placeholder="Enter your phone number" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>First Name *</span>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name *</span>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Address *</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Additional Address Info (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>ZIP Code *</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>First Name *</span>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name *</span>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Address *</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Additional Address Info (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>ZIP Code *</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
