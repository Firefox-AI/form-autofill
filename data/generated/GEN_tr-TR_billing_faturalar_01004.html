<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>faturalar.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kart Sahibinin Adı</span>
    <input type="text" name="nameOnCard" id="idokbj" placeholder="Ad ve Soyadınızı girin" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Şirket Adı</span>
    <input type="text" name="organization" id="iddksg" placeholder="Şirketinizin adını girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="addressLine1" id="idqk" placeholder="Sokak, Cadde adı ve numarası" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apartman Dairesi</span>
    <input type="text" name="apartment" id="id5s" placeholder="Daire numaranızı girin (varsa)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Kat</span>
    <input type="text" name="floor" id="idv35o" placeholder="Kat numaranızı girin (varsa)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>İlçe</span>
    <input type="text" name="city" id="idbq7" placeholder="İlçenizi girin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>İl</span>
    <select name="province" id="idgqpeg" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>İstanbul</option>
  <option>Ankara</option>
  <option>İzmir</option>
  <option>Bursa</option>
  <option>Antalya</option>
  <option>Adana</option>
  <option>Gaziantep</option>
  <option>Konya</option>
  <option>Mersin</option>
  <option>Kayseri</option>
</select>
  </div>
  <div>
    <span>Posta Kodu</span>
    <input type="text" name="zipCode" id="idny3hu" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ülke</span>
    <select name="country" id="idnuxj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İtalya</option>
  <option>İspanya</option>
  <option>Amerika Birleşik Devletleri</option>
  <option>Birleşik Krallık</option>
  <option>Kanada</option>
</select>
  </div>
  <div>
    <span>Telefon Numarası</span>
    <input type="tel" name="tel" id="idv8uer" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>VAT Numarası</span>
    <input type="text" name="vatId" id="idjz" placeholder="Vergi kimlik numaranızı girin" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
