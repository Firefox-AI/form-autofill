<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellidos</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Nombre de la empresa</label>
    <input type="text" name="organization" id="organization" placeholder="Opcional" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduce tu ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduce tu código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Portugal</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
</select>
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="ejemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
