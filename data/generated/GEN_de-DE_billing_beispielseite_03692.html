<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id70r">Vorname</label>
    <input type="text" name="firstName" id="id70r" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id67c">Nachname</label>
    <input type="text" name="lastName" id="id67c" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id8x">Telefonnummer</label>
    <input type="tel" name="phoneNumber3" id="id8x" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idvr4">Bundesland</label>
    <select name="region" id="idvr4" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="id1d">Stadt</label>
    <input type="text" name="city" id="id1d" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ida49">Stadtteil</label>
    <input type="text" name="suburb" id="ida49" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="id0gn">Postleitzahl</label>
    <input type="text" name="zipCode" id="id0gn" placeholder="Ihre Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idrrd">Straße, Hausnummer</label>
    <input type="text" name="street15" id="idrrd" placeholder="Beispielstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfte">Gebäude, Zusatz</label>
    <input type="text" name="addressLine2" id="idfte" placeholder="z.B. 2. Stock, Aufzug" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
