<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Adınız</span>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Soyadınız</span>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>İkinci adınız (isteğe bağlı)</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="İkinci adınızı girin" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Takma adınız (isteğe bağlı)</span>
    <input type="text" name="nickname" id="nickname" placeholder="Takma adınızı girin" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-posta adresiniz</span>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefon numaranız</span>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Şirket adı (isteğe bağlı)</span>
    <input type="text" name="organization" id="organization" placeholder="Şirket adınızı girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Doğum tarihiniz</span>
    <input type="text" name="bday" id="bday" placeholder="GG/AA/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Şifre</span>
    <input type="password" name="field" id="field" placeholder="Şifrenizi girin">
  </div>
</form>

</fieldset></body></html>
