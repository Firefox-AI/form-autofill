<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" aria-label="Cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Secondo nome</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Il tuo secondo nome (opzionale)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Soprannome</label>
    <input type="text" name="nickname" id="nickname" placeholder="Il tuo soprannome (opzionale)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="tel" id="tel" placeholder="Il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Organizzazione
    <input type="text" name="organization" id="organization" placeholder="Nome della tua organizzazione (opzionale)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Data di nascita
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Numero di identificazione
    <input type="text" name="idNumber" id="idNumber" placeholder="Il tuo numero di identificazione" data-moz-autofill-type="id-number">
    </label>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Crea una password" aria-label="Password">
  </div>
</form>

</fieldset></body></html>
