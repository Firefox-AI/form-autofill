<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>register-schnell.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" aria-label="Finde ein Register" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="deine.e-mail@beispiel.de" aria-label="E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" aria-label="Öffnet ein neues Fenster" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Vor- und Nachname" aria-label="Name auf der Karte" data-moz-autofill-type="cc-name">
  </div>
</form>

</fieldset></body></html>
