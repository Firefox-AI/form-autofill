<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="first_name" id="idmcms" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Επώνυμο</span>
    <input type="text" name="lname" id="idqk" placeholder="Πληκτρολογήστε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Δεύτερο όνομα</span>
    <input type="text" name="middleName" id="idcr" placeholder="Πληκτρολογήστε το δεύτερο όνομά σας (προαιρετικό)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Ψευδώνυμο</span>
    <input type="text" name="displayName" id="id5m" placeholder="Πληκτρολογήστε το ψευδώνυμό σας (προαιρετικό)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Διεύθυνση email</span>
    <input type="email" name="email_address" id="idssgz" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="tel" id="iddvnb" placeholder="Πληκτρολογήστε το τηλέφωνό σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Επέκταση τηλεφώνου</span>
    <input type="text" name="idjlcr" id="idvstc" placeholder="Πληκτρολογήστε την επέκταση (προαιρετικό)" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <span>Οργάνωση</span>
    <input type="text" name="companyName" id="id4lvnl" placeholder="Πληκτρολογήστε την οργάνωσή σας (προαιρετικό)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ημερομηνία γέννησης</span>
    <input type="text" name="dob" id="id12u" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Κωδικός πρόσβασης</span>
    <input type="password" name="id0yy" id="idln3ic" placeholder="Πληκτρολογήστε τον κωδικό πρόσβασής σας">
  </div>
  <div>
    <button name="id9g" id="ids95hf" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
