<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="givenName" id="givenName" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Επώνυμο</span>
    <input type="text" name="familyName" id="familyName" placeholder="Πληκτρολογήστε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Δεύτερο όνομα</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Προαιρετικό" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Ψευδώνυμο</span>
    <input type="text" name="nickname" id="nickname" placeholder="Πληκτρολογήστε το ψευδώνυμό σας" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Διεύθυνση email</span>
    <input type="email" name="email" id="email" placeholder="example@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="tel" id="tel" placeholder="Πληκτρολογήστε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Επέκταση τηλεφώνου</span>
    <input type="number" name="telExtension" id="telExtension" placeholder="Προαιρετική" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <span>Οργανισμός</span>
    <input type="text" name="organization" id="organization" placeholder="Πληκτρολογήστε τον οργανισμό σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ημερομηνία γέννησης</span>
    <input type="text" name="bday" id="bday" placeholder="Επιλέξτε ημερομηνία" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Κωδικός πρόσβασης</span>
    <input type="password" name="field" id="field" placeholder="Πληκτρολογήστε τον κωδικό σας">
  </div>
  <div>
    <button name="field" id="field" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
