<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Name
    <input type="text" name="fullName" id="id53gub" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="street12" id="id50" placeholder="Musterstraße 1" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="postcode" id="idvf1z" placeholder="A-1010" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Bundesland
    <select name="city" id="idjj25w" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName1" id="id0dm" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechische Republik</option>
</select>
    </label>
  </div>
  <div>
    <label>Zusatzadresse (optional)
    <input type="text" name="street2" id="idbcn1" placeholder="z.B. c/o Mustermann" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Wohnung (optional)
    <input type="text" name="suite7" id="idpcoh" placeholder="z.B. 2B" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <button name="idbo7" id="idl5v1g" type="submit">Bestellung abschicken</button>
  </div>
</form>

</fieldset></body></html>
