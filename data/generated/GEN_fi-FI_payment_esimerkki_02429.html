<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kortinhaltijan nimi</span>
    <input type="text" name="ccName" id="ccName" placeholder="Esim. Matti Meikäläinen" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kortin numero</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Kortin voimassaolon kuukausi</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Tammikuu</option>
  <option>Helmikuu</option>
  <option>Maaliskuu</option>
  <option>Huhtikuu</option>
  <option>Toukokuu</option>
  <option>Kesäkuu</option>
  <option>Heinäkuu</option>
  <option>Elokuu</option>
  <option>Syyskuu</option>
  <option>Lokakuu</option>
  <option>Marraskuu</option>
  <option>Joulukuu</option>
</select>
  </div>
  <div>
    <span>Kortin voimassaolon vuosi</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>CVV-koodi</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Esim. 123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kortin tyyppi</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Postinumero</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Esim. 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
