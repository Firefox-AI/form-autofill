<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kortinhaltijan nimi</span>
    <input type="text" name="nameOnCard" id="idge" placeholder="Nimi kuten kortilla" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kortin numero</span>
    <input type="number" name="cardNo" id="idjq" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Eräpäivä (kk)</span>
    <select name="expMonth" id="idba82" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>Eräpäivä (vv)</span>
    <select name="expYear" id="ide1" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <span>Turvakoodi</span>
    <input type="number" name="csc" id="idldf2" placeholder="3 tai 4 numeroa" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kortin tyyppi</span>
    <select name="ccType" id="idls" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Postinumero</span>
    <input type="text" name="postalCode" id="idf1r" placeholder="Esim. 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idabzx" id="idd7g7x" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
