<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nume complet</label>
    <input type="text" name="name" id="name" placeholder="Introdu numele tău complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Adresă de email</label>
    <input type="email" name="email" id="email" placeholder="introdu@exemplu.ro" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Cod de țară</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+40</option>
  <option>+44</option>
  <option>+1</option>
  <option>+49</option>
  <option>+30</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="0721 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada, numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introdu orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="123456" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Țară</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
  <option>Marea Britanie</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
