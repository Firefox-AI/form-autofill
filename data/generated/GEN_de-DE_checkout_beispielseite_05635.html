<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nachname
    <input type="text" name="lastName" id="idhda" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Vorname
    <input type="text" name="firstName" id="id3lwkv" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="phone" id="iddtnru" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>E-Mail-Adresse
    <input type="email" name="emailAddress" id="idq8zrp" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="zip" id="idda83" placeholder="Ihre Postleitzahl" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Straßenname und -nummer
    <input type="text" name="idq2ce5" id="id9p" placeholder="Straße, Hausnummer" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Adresszeile 2
    <input type="text" name="address2" id="idn591" placeholder="Zusätzliche Informationen" data-moz-autofill-type="address-line2">
    </label>
  </div>
</form>

</fieldset></body></html>
