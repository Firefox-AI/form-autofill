<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idgx2h3">Land*</label>
    <select name="countryName" id="idgx2h3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="id17r">Vorname*</label>
    <input type="text" name="fname" id="id17r" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id1z6sj">Nachname*</label>
    <input type="text" name="surname" id="id1z6sj" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="ids4">Telefonvorwahl</label>
    <input type="tel" name="idw9i3" id="ids4" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <label for="idrn3p">Handynummer*</label>
    <input type="tel" name="telephone" id="idrn3p" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ido2">Suche nach PLZ, Straße oder Adresse</label>
    <input type="text" name="address" id="ido2" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idtgxj">Straße*</label>
    <input type="text" name="addr" id="idtgxj" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id3su9">Wohnung, Suite, Einheit, usw. (optional)</label>
    <input type="text" name="idtm" id="id3su9" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="id7upi">Bundesland*</label>
    <select name="county" id="id7upi" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idozj1">Stadt*</label>
    <input type="text" name="town" id="idozj1" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id2s">Postleitzahl*</label>
    <input type="text" name="postcode" id="id2s" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
