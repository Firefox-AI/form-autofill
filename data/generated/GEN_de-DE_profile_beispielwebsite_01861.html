<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="countryName">Land*</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="givenName">Vorname*</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname*</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="telLocalPrefix">Telefonvorwahl</label>
    <input type="tel" name="telLocalPrefix" id="telLocalPrefix" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <label for="tel">Handynummer*</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Suche nach PLZ, Straße oder Adresse</label>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="streetAddress">Straße*</label>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressExtra">Wohnung, Suite, Einheit, usw. (optional)</label>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="addressLevel1">Stadt*</label>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="addressLevel2">Bundesland*</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Sachsen</option>
  <option>Rheinland-Pfalz</option>
  <option>Thüringen</option>
  <option>Hamburg</option>
  <option>Berlin</option>
  <option>Bremen</option>
  <option>Brandenburg</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Niedersachsen</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postleitzahl*</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
