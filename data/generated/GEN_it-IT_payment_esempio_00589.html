<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome sulla carta
    <input type="text" name="cardholderName" id="iday" placeholder="Inserisci il nome completo" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <input type="number" name="cardNo" id="idro" placeholder="0000 0000 0000 0000" aria-label="Numero della carta" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label>Mese di scadenza
    <select name="expMonth" id="idw6q" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Anno di scadenza
    <select name="expYear" id="idftdl" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label for="idtw4">Codice di sicurezza</label>
    <input type="number" name="securityCode" id="idtw4" placeholder="3 cifre sul retro" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo di carta</span>
    <select name="ccType" id="idbgg1i" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="zip" id="idljt5" placeholder="00100" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <span>Nome (traslitterato)</span>
    <input type="text" name="idsmn6" id="ids49" placeholder="Nome in caratteri latini" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label>Cognome (traslitterato)
    <input type="text" name="ido99cz" id="id9k8w" placeholder="Cognome in caratteri latini" data-moz-autofill-type="phonetic-name">
    </label>
  </div>
  <div>
    <button name="ide3ihd" id="id46" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
