<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome sulla carta
    <input type="text" name="ccName" id="ccName" placeholder="Inserisci il nome completo" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Numero della carta
    <input type="number" name="ccNumber" id="ccNumber" placeholder="0000 0000 0000 0000" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label for="ccExpMonth">Mese di scadenza</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <span>Anno di scadenza</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codice di sicurezza</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 cifre sul retro" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" aria-label="Tipo di carta" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" aria-label="Codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Nome come pronunciato" aria-label="Nome (traslitterato)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label>Cognome (traslitterato)
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Cognome come pronunciato" data-moz-autofill-type="phonetic-name">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
