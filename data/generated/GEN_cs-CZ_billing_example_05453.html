<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Název karty</span>
    <input type="text" name="nameOnCard" id="idmvp" placeholder="Zadejte jméno, jak je uvedeno na kartě" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Firma</span>
    <input type="text" name="company" id="id7a" placeholder="Název společnosti (pokud je relevantní)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresa</span>
    <input type="text" name="addr" id="id3e" placeholder="Číslo domu a název ulice" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Název ulice</span>
    <input type="text" name="streetName" id="id43e" placeholder="Například: Hlavní ulice" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Město nebo obec</span>
    <input type="text" name="city5" id="id5t0" placeholder="Například: Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="zip_code4" id="idseg" placeholder="Například: 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kraj</span>
    <select name="state" id="idna4ri" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
  </div>
  <div>
    <span>Země</span>
    <select name="countryName" id="idhzn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Polsko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Maďarsko</option>
  <option>Itálie</option>
  <option>Francie</option>
  <option>Spojené království</option>
  <option>USA</option>
</select>
  </div>
</form>

</fieldset></body></html>
