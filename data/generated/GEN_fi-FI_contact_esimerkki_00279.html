<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Etunimi ja sukunimi" aria-label="Nimi" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Sähköposti
    <input type="email" name="email" id="email" placeholder="esimerkki@domain.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="tel">Puhelinnumero</label>
    <input type="tel" name="tel" id="tel" placeholder="040 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Katuosoite" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupunki" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postinumero</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="organization">Organisaatio</label>
    <input type="text" name="organization" id="organization" placeholder="Organisaation nimi (valinnainen)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
