<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>versandbeispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" aria-label="Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Straße</label>
    <input type="text" name="street" id="street" placeholder="Straßenname" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Nummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Zusätzliche Adresszeile</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z. B. c/o, Firmenname" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="number" name="postalCode" id="postalCode" placeholder="PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
</select>
    </label>
  </div>
  <div>
    <label>Gebäude
    <input type="text" name="building" id="building" placeholder="z. B. Wohnanlage, Bürogebäude" data-moz-autofill-type="building">
    </label>
  </div>
</form>

</fieldset></body></html>
