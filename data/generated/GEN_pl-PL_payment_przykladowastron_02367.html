<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko właściciela karty</span>
    <input type="text" name="nameOnCard" id="idem9" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numer karty kredytowej</span>
    <input type="number" name="cardNumber" id="id2gdk" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Miesiąc wygaśnięcia</span>
    <select name="ccExpMonth" id="iduew" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <span>Rok wygaśnięcia</span>
    <select name="ccExpYear" id="id7jk" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Kod CVV</span>
    <input type="number" name="cvc" id="id0am" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Typ karty</span>
    <select name="ccType2" id="idp26" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
