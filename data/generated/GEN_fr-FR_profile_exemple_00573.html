<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="givenName" id="givenName" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="familyName" id="familyName" placeholder="Entrez votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nom supplémentaire
    <input type="text" name="additionalName" id="additionalName" placeholder="Entrez un nom supplémentaire (facultatif)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Surnom
    <input type="text" name="nickname" id="nickname" placeholder="Entrez votre surnom (si applicable)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Adresse e-mail
    <input type="email" name="email" id="email" placeholder="Entrez votre adresse e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="tel" id="tel" placeholder="Entrez votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organisation
    <input type="text" name="organization" id="organization" placeholder="Entrez le nom de votre organisation (facultatif)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Date de naissance
    <input type="text" name="bday" id="bday" placeholder="Sélectionnez votre date de naissance" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Mot de passe
    <input type="password" name="field" id="field" placeholder="Créer un mot de passe">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
