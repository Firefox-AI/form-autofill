<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="firstName" id="idkfdq" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="last_name" id="idg659" placeholder="Entrez votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nom supplémentaire
    <input type="text" name="mname" id="idmvyxe" placeholder="Entrez un nom supplémentaire (facultatif)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Surnom
    <input type="text" name="displayName" id="idnt7j" placeholder="Entrez votre surnom (si applicable)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Adresse e-mail
    <input type="email" name="mail" id="idz0kb" placeholder="Entrez votre adresse e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="mobile" id="id0t" placeholder="Entrez votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organisation
    <input type="text" name="business" id="idw9c3" placeholder="Entrez le nom de votre organisation (facultatif)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Date de naissance
    <input type="text" name="dateOfBirth" id="idsf" placeholder="Sélectionnez votre date de naissance" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Mot de passe
    <input type="password" name="iddmwu" id="idng3s" placeholder="Entrez votre mot de passe">
    </label>
  </div>
  <div>
    <button name="idu8aw" id="idtzr" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
