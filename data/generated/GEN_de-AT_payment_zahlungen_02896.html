<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>zahlungen.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Karteninhaber</span>
    <input type="text" name="nameOnCard" id="idp4i" placeholder="Wie auf der Karte angegeben" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kreditkartennummer</span>
    <input type="number" name="cardNumber" id="idee3" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Ablaufmonat</span>
    <select name="exp_month" id="id80w9p" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <span>Ablaufjahr</span>
    <select name="ccExpYear" id="idjz7xv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <span>Sicherheitscode (CVC)</span>
    <input type="number" name="securityCode" id="id593" placeholder="3- oder 4-stellig" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kartenart</span>
    <select name="cardType" id="idb6" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Phonetischer Name (optional)</span>
    <input type="text" name="idae24" id="idtvvj7" placeholder="Wie ausgesprochen" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="idyza6" id="idzm" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
