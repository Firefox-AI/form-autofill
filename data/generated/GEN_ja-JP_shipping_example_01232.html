<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="iddcx" placeholder="受取人名を入力してください" aria-label="宛名" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addr1" id="id7bc" placeholder="番地、町名を入力してください" aria-label="住所" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="postcode" id="id4bb6a" placeholder="例: 123-4567" aria-label="郵便番号" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="town" id="id8yh11" placeholder="市区町村名を入力してください" aria-label="市区町村" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="ideu" aria-label="国" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>ドイツ</option>
  <option>フランス</option>
  <option>イギリス</option>
  <option>カナダ</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <input type="text" name="suite1" id="id0z" placeholder="アパート名、部屋番号を入力してください" aria-label="アパート名" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="etage" id="idvo" placeholder="例: 2階" aria-label="階数" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="id6bqx" id="iddx" placeholder="ビル名を入力してください" aria-label="ビル名" data-moz-autofill-type="building">
  </div>
  <div>
    <select name="suburb" id="id47" aria-label="都道府県" data-moz-autofill-type="address-level3">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>埼玉県</option>
  <option>神奈川県</option>
</select>
  </div>
</form>

</fieldset></body></html>
