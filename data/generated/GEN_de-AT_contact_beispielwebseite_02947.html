<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Name</label>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Beispielstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt oder Ort" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="PLZ" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
