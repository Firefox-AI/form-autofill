<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="fullName" id="idoinh" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ulica i numer</span>
    <input type="text" name="address1" id="iddgx" placeholder="ul. Kwiatowa 15" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="zip" id="id140sp" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="city" id="idb1vdp" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kraj</span>
    <select name="country" id="id821" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Czechy</option>
  <option>Szwecja</option>
</select>
  </div>
  <div>
    <span>Dodatkowe informacje (opcjonalnie)</span>
    <input type="text" name="street2" id="id04w" placeholder="np. mieszkanie 12" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Piętro</span>
    <input type="text" name="floor" id="id6lz" placeholder="np. 2" data-moz-autofill-type="floor">
  </div>
</form>

</fieldset></body></html>
