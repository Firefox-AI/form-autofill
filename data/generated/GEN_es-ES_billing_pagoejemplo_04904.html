<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagoejemplo.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre del titular de la tarjeta
    <input type="text" name="cardholderName" id="id4yh5" placeholder="Nombre completo como aparece en la tarjeta" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="addr" id="idgp" placeholder="Calle y número" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zip" id="idkmi0" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="city" id="idea0" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Provincia
    <select name="state" id="idaxvjh" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla-La Mancha</option>
  <option>Castilla y León</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
</select>
    </label>
  </div>
  <div>
    <label>País
    <select name="country" id="idh1v" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Bélgica</option>
  <option>Suiza</option>
</select>
    </label>
  </div>
  <div>
    <label>Nombre de la empresa
    <input type="text" name="organization" id="idnl" placeholder="Si aplica, nombre de la empresa" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="phoneNumber" id="id30oa" placeholder="Número de teléfono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="idkf" id="idywq" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
