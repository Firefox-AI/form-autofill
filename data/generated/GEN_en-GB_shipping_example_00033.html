<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" aria-label="Billing Address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" aria-label="Address Line 2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLine3" id="addressLine3" aria-label="Company Name" data-moz-autofill-type="address-line3">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Suburb" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="country" id="country" aria-label="Country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
  <option>Italy</option>
  <option>Netherlands</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" aria-label="Delivery Address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" aria-label="Delivery Address Line 2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="organization" id="organization" aria-label="Building Name (if applicable)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Delivery Suburb" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Delivery City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Delivery Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="Recipient&#x27;s First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Recipient&#x27;s Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Recipient&#x27;s Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Additional Contact Number (optional)" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" aria-label="Credit Card Number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Expiry Month" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" aria-label="Expiry Year" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
</form>

</fieldset></body></html>
