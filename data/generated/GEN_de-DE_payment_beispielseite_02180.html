<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7699">Hallo! Wonach suchen Sie?</label>
    <input type="email" name="user_email" id="id7699" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id1l">Adresse</label>
    <input type="text" name="id6g36" id="id1l" placeholder="Straße und Hausnummer" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="id1y0ge">Straße *</label>
    <input type="text" name="street" id="id1y0ge" placeholder="Geben Sie die Straße ein" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id6eoe">Hausnummer *</label>
    <input type="number" name="houseNumber" id="id6eoe" placeholder="Geben Sie die Hausnummer ein" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idrg7">Ort *</label>
    <input type="text" name="town" id="idrg7" placeholder="Geben Sie den Ort ein" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idrtlhy">Bundesland *</label>
    <select name="province" id="idrtlhy" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idrexj">Postleitzahl *</label>
    <input type="text" name="postcode" id="idrexj" placeholder="Geben Sie die Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idmb3g">Name des Stadtteils *</label>
    <input type="text" name="district" id="idmb3g" placeholder="Geben Sie den Namen des Stadtteils ein" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
