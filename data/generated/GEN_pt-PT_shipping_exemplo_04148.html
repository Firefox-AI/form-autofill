<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome</label>
    <input type="text" name="name" id="name" placeholder="Inserir o seu nome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Andar, Apto, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressHousenumber">Número</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número da sua casa" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="street">Rua</label>
    <input type="text" name="street" id="street" placeholder="Nome da rua" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="postalCode">Código Postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserir código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Concelho</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Aveiro</option>
  <option>Funchal</option>
  <option>Ponta Delgada</option>
  <option>Castelo Branco</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>França</option>
  <option>Espanha</option>
  <option>Itália</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="block">Bloco</label>
    <input type="text" name="block" id="block" placeholder="Insira o bloco (opcional)" data-moz-autofill-type="block">
  </div>
  <div>
    <label for="idNumber">Número de Identificação</label>
    <input type="text" name="idNumber" id="idNumber" placeholder="Insira o seu NIF" data-moz-autofill-type="id-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
