<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="id3dc" placeholder="Insira o seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idvw6f">Morada</label>
    <input type="text" name="addr" id="idvw6f" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zip_code8" id="idolion" placeholder="Insira o código postal" aria-label="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Concelho</span>
    <input type="text" name="city" id="idy5ix" placeholder="Insira o nome do concelho" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="idudv1" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <span>Freguesia</span>
    <input type="text" name="neighborhood" id="idsch" placeholder="Insira o nome da freguesia" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
