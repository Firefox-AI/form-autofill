<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Introduce tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine2">Dirección adicional (opcional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso, puerta, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressHousenumber">Número de la casa</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número de tu casa" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="street">Calle</label>
    <input type="text" name="street" id="street" placeholder="Nombre de la calle" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Provincia</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Bilbao</option>
  <option>Malaga</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
</select>
  </div>
  <div>
    <label for="floor">Piso</label>
    <input type="text" name="floor" id="floor" placeholder="Número de piso" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="block">Bloque</label>
    <input type="text" name="block" id="block" placeholder="Nombre del bloque (si aplica)" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
