<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.pt</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idnv5ri">Nome completo</label>
    <input type="text" name="yourName" id="idnv5ri" placeholder="Insira o seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>

  </div>
  <div>
    <label for="id1t7zy">Número de telefone</label>

  <div>

  <div>
    <label for="idfx">Concelho</label>

  </div>
  <div>

  </div>
  <div>
    <button name="idxe" id="idhtik" type="submit">Enviar</button>
  </div>

</fieldset></body></html>
