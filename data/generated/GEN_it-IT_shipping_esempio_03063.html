<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzc6n7">Nome e cognome</label>

  </div>
  <div>
    <label for="idwk8">Indirizzo</label>
    <input type="text" name="addr" id="idwk8" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>

  <div>

    <select name="country" id="id90" data-moz-autofill-type="country-name">

  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>

  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
</form>

</fieldset></body></html>
