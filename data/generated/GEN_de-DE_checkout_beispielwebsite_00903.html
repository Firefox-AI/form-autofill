<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idk00n">Land *</label>
    <select name="country" id="idk00n" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="idp4">Name *</label>
    <input type="text" name="name" id="idp4" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idfauw3">Adresse *</label>
    <input type="text" name="addr1" id="idfauw3" placeholder="Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idts">Adresse 2</label>
    <input type="text" name="street2" id="idts" placeholder="Zusätzliche Adresse (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idjbtgd">Stadt *</label>
    <input type="text" name="locality" id="idjbtgd" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id6flk2">Region</label>
    <select name="region" id="id6flk2" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idph4">Postleitzahl *</label>
    <input type="text" name="zip" id="idph4" placeholder="PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvc">Telefonnummer</label>
    <input type="tel" name="phone" id="idvc" placeholder="07700 900 982" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
