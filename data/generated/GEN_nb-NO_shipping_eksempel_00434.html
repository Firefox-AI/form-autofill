<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Navn</label>
    <input type="text" name="name" id="name" placeholder="Ditt fulle navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine2">Tilleggsadresse</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Leilighet, suite, etc. (valgfritt)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Gateadresse" data-moz-autofill-type="street">
  </div>
  <div>
    <label>Husnummer
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Husnummer" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <span>By</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" aria-label="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label>Leilighet
    <input type="text" name="apartment" id="apartment" placeholder="Leilighet (valgfritt)" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <span>Referansepunkt</span>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="En lokal referanse (valgfritt)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Fylke</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Fylke" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Send</button>
  </div>
</form>

</fieldset></body></html>
