<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplepaiement.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Jean Dupont" aria-label="Nom sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Type de carte
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <span>Numéro de carte</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Mois d&#x27;expiration" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <span>Année d&#x27;expiration</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Code de sécurité</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
