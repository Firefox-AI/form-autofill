<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paraggelies.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idsr358">Όνομα</label>
    <input type="text" name="first_name" id="idsr358" placeholder="Το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id4fpyw">Επώνυμο</label>
    <input type="text" name="surname" id="id4fpyw" placeholder="Το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idybcqu">Εταιρεία (προαιρετικό)</label>
    <input type="text" name="companyName" id="idybcqu" placeholder="Η επιχείρησή σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id836l">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="id836l" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idy1">Πόλη</label>
    <input type="text" name="locality" id="idy1" placeholder="Πόλη ή χωριό" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id67vl3">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="id67vl3" placeholder="Π.χ. 12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idpr3">Χώρα</label>
    <select name="countryName" id="idpr3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Βουλγαρία</option>
  <option>Αλβανία</option>
  <option>Τουρκία</option>
</select>
  </div>
  <div>
    <label for="idwjb7">Διεύθυνση Email</label>
    <input type="email" name="mail" id="idwjb7" placeholder="Το email σας" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id0a5un">Τηλέφωνο</label>
    <input type="tel" name="phoneNumber" id="id0a5un" placeholder="Π.χ. 2101234567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
