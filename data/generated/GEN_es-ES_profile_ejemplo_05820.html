<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id71k4">Nombre</label>
    <input type="text" name="billing_first_name" id="id71k4" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id5ve">Apellido</label>
    <input type="text" name="surname" id="id5ve" placeholder="Tu apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id913">Segundo nombre</label>
    <input type="text" name="middleName" id="id913" placeholder="Tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="id8w9ea">Apodo</label>
    <input type="text" name="displayName" id="id8w9ea" placeholder="Tu apodo (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idwb">Correo electrónico</label>
    <input type="email" name="emailAddress" id="idwb" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idpugog">Teléfono</label>
    <input type="tel" name="telephone" id="idpugog" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idrf">Organización</label>
    <input type="text" name="companyName" id="idrf" placeholder="Tu organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idt2c3z">Fecha de nacimiento</label>
    <input type="text" name="birthdate" id="idt2c3z" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idtl7q">Título de la organización</label>
    <input type="text" name="position" id="idtl7q" placeholder="Tu título en la organización (opcional)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="idllh">Contraseña</label>
    <input type="password" name="idzh" id="idllh" placeholder="Crea una contraseña">
  </div>
</form>

</fieldset></body></html>
