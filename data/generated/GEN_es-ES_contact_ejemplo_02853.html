<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Escribe tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle, número, y demás detalles" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad de residencia" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="phoneticGivenName">Nombre fonético</label>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Nombre en alfabeto fonético (opcional)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
