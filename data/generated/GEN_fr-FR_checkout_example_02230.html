<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificPrefix">Titre</label>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Monsieur</option>
  <option>Madame</option>
  <option>Mademoiselle</option>
</select>
  </div>
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Adresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Numéro et nom de rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complément d&#x27;adresse (facultatif)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Paris</option>
  <option>Marseille</option>
  <option>Lyon</option>
  <option>Toulouse</option>
  <option>Nice</option>
  <option>Nantes</option>
  <option>Strasbourg</option>
  <option>Montpellier</option>
  <option>Bordeaux</option>
  <option>Lille</option>
</select>
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
</select>
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Indicatif du pays</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+41</option>
  <option>+352</option>
</select>
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Soumettre</button>
  </div>
</form>

</fieldset></body></html>
