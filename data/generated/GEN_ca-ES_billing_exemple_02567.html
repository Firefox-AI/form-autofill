<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Tarragona</option>
</select>
  </div>

  <option>França</option>
  <option>Portugal</option>

  <option>Regne Unit</option>
</select>
  </div>
  <div>
    <button name="idd4" id="id8tlg1" type="submit">Continua</button>
  </div>
</form>

</fieldset></body></html>
