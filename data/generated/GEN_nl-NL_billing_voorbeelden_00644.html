<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeelden.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="idbi" placeholder="Voornaam en achternaam" aria-label="Naam op de creditcard" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="addr1" id="idn3l" placeholder="Bijv. Hoofdstraat 123" aria-label="Straat en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="zip_code" id="idigl" placeholder="1234 AB" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="town" id="id1rp77" placeholder="Bijv. Amsterdam" aria-label="Stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="county" id="idmxy" aria-label="Provincie" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Utrecht</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <select name="country" id="idvpkxi" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <input type="text" name="company" id="idmlf" placeholder="Bijv. Mijn Bedrijf" aria-label="Bedrijfsnaam (optioneel)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="tel" name="tel" id="id49eii" placeholder="0612345678" aria-label="Telefoonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="street2" id="idjqw" placeholder="Bijv. Appartement of verdieping" aria-label="Extra adresinformatie (optioneel)" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
