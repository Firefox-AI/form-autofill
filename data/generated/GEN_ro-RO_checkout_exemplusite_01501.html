<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu-site.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nume</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceți numele dvs." data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Prenume</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceți prenumele dvs." data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduceți orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Țara</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cehia</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Islanda</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Letonia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Malta</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>Slovacia</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Regatul Unit</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Introduceți adresa dvs. de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Număr de telefon mobil" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel1">Județ</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alba</option>
  <option>Arad</option>
  <option>Bacău</option>
  <option>Bihor</option>
  <option>Bistrița-Năsăud</option>
  <option>Botoșani</option>
  <option>Brașov</option>
  <option>Brăila</option>
  <option>Buzău</option>
  <option>Călărași</option>
  <option>Caraș-Severin</option>
  <option>Cluj</option>
  <option>Constanța</option>

</select>
  </div>
</form>

</fieldset></body></html>
