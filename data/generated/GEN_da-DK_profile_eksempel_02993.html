<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternavn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Mellemnavn</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Indtast dit mellemnavn (valgfrit)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Kaldenavn</span>
    <input type="text" name="nickname" id="nickname" placeholder="Indtast dit kaldenavn (valgfrit)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="email" id="email" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Områdenummer</span>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="Indtast dit områdenummer" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation</span>
    <input type="text" name="organization" id="organization" placeholder="Indtast din organisations navn (valgfrit)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Fødselsdag</span>
    <input type="text" name="bday" id="bday" placeholder="Vælg din fødselsdag" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Fonetisk fornavn</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Indtast dit fonetiske fornavn (valgfrit)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <span>Fonetisk efternavn</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Indtast dit fonetiske efternavn (valgfrit)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>ID-nummer</span>
    <input type="text" name="idNumber" id="idNumber" placeholder="Indtast dit ID-nummer (CPR-nummer)" data-moz-autofill-type="id-number">
  </div>
  <div>
    <span>Adgangskode</span>
    <input type="password" name="field" id="field" placeholder="Indtast din adgangskode">
  </div>
</form>

</fieldset></body></html>
