<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo-tienda.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0vkde">Nombre completo</label>
    <input type="text" name="contactName" id="id0vkde" placeholder="Juan Pérez" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idry6">Dirección</label>
    <input type="text" name="street1" id="idry6" placeholder="Calle Mayor 12" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idsr73">Piso, puerta, etc. (opcional)</label>
    <input type="text" name="address2" id="idsr73" placeholder="Piso 3, A" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idiyr">Edificio (opcional)</label>
    <input type="text" name="idxrmep" id="idiyr" placeholder="Edificio Central" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idag">Ciudad</label>
    <input type="text" name="town" id="idag" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idupqm">Código postal</label>
    <input type="text" name="zipCode" id="idupqm" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idj0">País</label>
    <select name="countryName" id="idj0" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Portugal</option>
</select>
  </div>
  <div>
    <label for="id4xy2">Punto de referencia (opcional)</label>
    <input type="text" name="id9cq" id="id4xy2" placeholder="Cerca de la Plaza Mayor" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
