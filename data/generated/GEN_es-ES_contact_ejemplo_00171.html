<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="name" id="name" placeholder="Juan Pérez" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="tel" placeholder="612345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle Mayor, 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código Postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
