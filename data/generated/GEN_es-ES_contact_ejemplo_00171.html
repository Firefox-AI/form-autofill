<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Tu nombre</span>
    <input type="text" name="yourName" id="id6ii4" placeholder="Nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="emailAddress" id="id6f" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="idp191b" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="street" id="idkuar" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="town" id="id1c" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip_code" id="idgpeu" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idcsm" id="idma5ij" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
