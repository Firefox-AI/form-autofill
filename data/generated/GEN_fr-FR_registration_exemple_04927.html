<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idm87rr">Prénom</label>
    <input type="text" name="fname" id="idm87rr" placeholder="Votre prénom" data-moz-autofill-type="given-name">

  <div>

  <div>

  <div>

  <div>

  <div>

  </div>
