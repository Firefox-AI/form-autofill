<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idgl7kc">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="idgl7kc" placeholder="Nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="address1" id="id1vu" placeholder="Numéro et nom de rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="apt" id="idyk6x" placeholder="Votre numéro d&#x27;appartement (si applicable)" aria-label="Appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="zipCode" id="idun" placeholder="Code postal" aria-label="Code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idpg">Ville</label>
    <input type="text" name="locality" id="idpg" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Région
    <select name="state" id="idygur" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Bretagne</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Îles-de-la-Madeleine</option>
</select>
    </label>
  </div>
  <div>
    <label>Pays
    <select name="countryName" id="idng2" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
