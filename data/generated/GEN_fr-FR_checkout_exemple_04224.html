<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom de famille</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="addressStreetname">Nom de la rue</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Rue, avenue, boulevard..." data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressLine2">Complément d&#x27;adresse</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
</select>
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel1">Région</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
  <option>Normandie</option>
</select>
  </div>
  <div>
    <label for="phoneticFamilyName">Nom de famille phonétique</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Nom de famille (phonétique)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
