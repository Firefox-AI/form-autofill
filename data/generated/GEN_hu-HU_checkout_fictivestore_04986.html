<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictivestore.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Keresztnév</span>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Vezetéknév</span>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Utca, házszám</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Pl. Fő utca 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Írd be a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Irányítószám</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Pl. 1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ország</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szlovénia</option>
  <option>Horvátország</option>
</select>
  </div>
  <div>
    <span>E-mail cím</span>
    <input type="email" name="email" id="email" placeholder="Pl. példa@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonszám</span>
    <input type="tel" name="tel" id="tel" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Személyi igazolvány szám</span>
    <input type="text" name="idNumber" id="idNumber" placeholder="Írd be a személyi igazolvány számát" data-moz-autofill-type="id-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
