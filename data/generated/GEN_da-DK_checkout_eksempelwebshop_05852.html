<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempelwebshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzk">Fornavn</label>
    <input type="text" name="fname" id="idzk" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id1l">Efternavn</label>
    <input type="text" name="last_name" id="id1l" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id4f1h">Adresse</label>
    <input type="text" name="street1" id="id4f1h" placeholder="Gadeadresse og husnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id5ch">Yderligere adresseoplysninger (valgfrit)</label>
    <input type="text" name="addr2" id="id5ch" placeholder="Lejlighed, etage eller lign." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idbs5g9">By</label>
    <input type="text" name="city" id="idbs5g9" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idq6">Postnummer</label>
    <input type="text" name="postcode" id="idq6" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idee">Land</label>
    <select name="country" id="idee" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannien</option>
  <option>Frankrig</option>
  <option>Holland</option>
</select>
  </div>
  <div>
    <label for="id9ki">E-mail adresse</label>
    <input type="email" name="user_email" id="id9ki" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idbocna">Telefonnummer</label>
    <input type="tel" name="mobile" id="idbocna" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id8c">Lejlighed (valgfrit)</label>
    <input type="text" name="flat" id="id8c" placeholder="Lejlighedsnr." data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
