<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre en la tarjeta</span>
    <input type="text" name="r:r:4:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="id2ili" placeholder="Nombre completo tal como aparece en la tarjeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Dirección</span>

  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="r:r:2:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idxtxg0" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="r:r:2:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idzk78" data-moz-autofill-type="address-level1">
  <option value=""></option>

  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla-La Mancha</option>
  <option>Castilla y León</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
  <option>Comunidad Valenciana</option>
</select>
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="r:r:5:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idwx" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="r:r:8:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="id1h" data-moz-autofill-type="country-name">

  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
</select>
  </div>
  <div>
    <span>Nombre de la empresa</span>
    <input type="text" name="r:r:1:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idfvq" placeholder="Nombre de la empresa o entidad (si aplica)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Número de IVA</span>
    <input type="text" name="r:r:7:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="id104n" placeholder="Número de identificación fiscal" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="r:r:1:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idehyw" type="submit">Enviar</button>
