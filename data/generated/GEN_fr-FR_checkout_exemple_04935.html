<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Civilité
    <select name="r:r:3:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="id0b" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>M.</option>
  <option>Mme</option>
  <option>Mlle</option>
</select>
    </label>
  </div>
  <div>
    <label>Prénom
    <input type="text" name="r:r:7:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="id1qhy" placeholder="Votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom
    <input type="text" name="r:r:7:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="id6m7" placeholder="Votre nom" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="r:r:6:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idb2" placeholder="123 rue de Exemple" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ville
    <input type="text" name="r:r:7:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id3y" placeholder="Votre ville" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="r:r:3:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="id48w" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Pays
    <select name="r:r:1:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="id01a2" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="r:r:1:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id8u" placeholder="adresse@exemple.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Téléphone
    <input type="tel" name="r:r:7:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="id7ie" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="r:r:7:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idml8z" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
