<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" aria-label="Prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom" aria-label="Nom" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Votre adresse" aria-label="Adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" aria-label="Ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" aria-label="Code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Pays" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Royaume-Uni</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Votre adresse email" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" aria-label="Téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Région" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Hauts-de-France</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
