<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idq7w">Name auf der Kreditkarte</label>
    <input type="text" name="cardholderName" id="idq7w" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idnr">Straße und Hausnummer</label>
    <input type="text" name="address" id="idnr" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="ida3">Postleitzahl</label>
    <input type="text" name="postalCode4" id="ida3" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idkl">Stadt</label>
    <input type="text" name="locality" id="idkl" placeholder="Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id0600q">Bundesland</label>
    <select name="state" id="id0600q" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
  </div>
  <div>
    <label for="idbf">Land</label>
    <select name="countryName" id="idbf" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigte Staaten</option>
</select>
  </div>
  <div>
    <label for="id7211">USt-IdNr.</label>
    <input type="text" name="vatId" id="id7211" placeholder="ATU12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idlfya" id="id1sb5" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
