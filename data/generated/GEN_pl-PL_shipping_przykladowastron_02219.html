<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="contactName" id="ids34" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ulica i numer</span>
    <input type="text" name="addressLine1" id="idwi" placeholder="Złota 12" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postcode" id="id91" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="locality" id="idqam1" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kraj</span>
    <select name="country" id="idvbi" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <span>Mieszkanie</span>
    <input type="text" name="apt" id="id78ni" placeholder="np. 67" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
