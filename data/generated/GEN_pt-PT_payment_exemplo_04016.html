<html><head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome no Cartão
    <input type="text" name="cc_name_3859" id="cc_name_7164" placeholder="Nome completo como aparece no cartão" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="cc_number_1959">Número do Cartão</label>
    <input type="number" name="cc_number_683" id="cc_number_1959" placeholder="Número de 16 dígitos do cartão" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mês de Validade</span>
    <select name="cc_exp_month_6887" id="cc_exp_month_3554" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <select name="cc_exp_year_3775" id="cc_exp_year_7038" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="cc_csc_5874">Código de Segurança (CSC)</label>
    <input type="number" name="cc_csc_5557" id="cc_csc_5874" placeholder="Últimos 3 dígitos no verso do cartão" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="cc_type_1626">Tipo de Cartão</label>
    <select name="cc_type_2018" id="cc_type_1626" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label>Nome (Fonético)
    <input type="text" name="phonetic_given_name_7936" id="phonetic_given_name_6373" placeholder="Como é pronunciado seu nome" data-moz-autofill-type="phonetic-given-name">
    </label>
  </div>
  <div>
    <button name="field_7592" id="field_3209" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
