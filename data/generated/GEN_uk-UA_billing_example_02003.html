<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1xtf">Ім&#x27;я на картці</label>
    <input type="text" name="ccName" id="id1xtf" placeholder="Наприклад, Іван Іванович" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idsxr6">Вулиця, будинок, квартира</label>
    <input type="text" name="street" id="idsxr6" placeholder="Вулиця Шевченка, 12, квартира 34" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idfg">Поштовий індекс</label>

  </div>
  <div>
    <label for="idcf">Місто</label>
    <input type="text" name="city" id="idcf" placeholder="Ваше місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idx6n">Область</label>
    <select name="stateProvince" id="idx6n" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
</select>
  </div>
  <div>
    <label for="idw3v">Країна</label>
    <select name="countryName" id="idw3v" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Німеччина</option>
  <option>Франція</option>
  <option>Італія</option>
</select>
  </div>
  <div>
    <button name="idh9" id="idmu0" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
