<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Ім&#x27;я на картці</label>
    <input type="text" name="ccName" id="ccName" placeholder="Введіть ім&#x27;я на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Вулиця та номер будинку</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введіть адресу" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Додаткова інформація</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, офіс, тощо" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Поштовий індекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Місто</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введіть місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Область</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Харківська</option>
  <option>Дніпропетровська</option>
  <option>Запорізька</option>
  <option>Полтавська</option>
  <option>Сумська</option>
  <option>Черкаська</option>
  <option>Вінницька</option>
  <option>Тернопільська</option>
  <option>Житомирська</option>
  <option>Чернігівська</option>
  <option>Івано-Франківська</option>
  <option>Кіровоградська</option>
  <option>Миколаївська</option>
  <option>Рівненська</option>
  <option>Хмельницька</option>
  <option>Закарпатська</option>
  <option>Чернівецька</option>
  <option>Луганська</option>
  <option>Донецька</option>
  <option>Херсонська</option>
</select>
  </div>
  <div>
    <label for="countryName">Країна</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Німеччина</option>
  <option>Франція</option>
  <option>США</option>
  <option>Канада</option>
  <option>Велика Британія</option>
  <option>Іспанія</option>
  <option>Італія</option>
  <option>Індія</option>
</select>
  </div>
</form>

</fieldset></body></html>
