<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="honorificPrefix" id="honorificPrefix" aria-label="Пан або Пані" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Пан</option>
  <option>Пані</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Ваше ім&#x27;я" aria-label="Ім&#x27;я" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Ваше призвище" aria-label="Призвище" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Вулиця, будинок" aria-label="Вулиця та номер" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, поверх (необов&#x27;язково)" aria-label="Додаткова адреса" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ваше місто" aria-label="Місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ваш поштовий індекс" aria-label="Поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Країна" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Німеччина</option>
  <option>США</option>
  <option>Канада</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Ваш email" aria-label="Електронна пошта" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Ваш номер телефону" aria-label="Телефон" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
