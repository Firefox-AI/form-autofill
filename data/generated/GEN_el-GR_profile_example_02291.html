<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Πώς σε λένε;" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επίθετο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Ποιο είναι το επώνυμό σου;" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Μεσαίο Όνομα</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Πρόσθετο όνομα (αν υπάρχει)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Ψευδώνυμο</label>
    <input type="text" name="nickname" id="nickname" placeholder="Πώς σε φωνάζουν;" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Διεύθυνση Email</label>
    <input type="email" name="email" id="email" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Ποιο είναι το τηλέφωνό σου;" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Οργάνωση/Εταιρία</label>
    <input type="text" name="organization" id="organization" placeholder="Ποια είναι η εταιρία σου;" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Ημερομηνία Γέννησης</label>
    <input type="text" name="bday" id="bday" placeholder="Ημ/νία γέννησης" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idNumber">Αριθμός Ταυτότητας</label>
    <input type="text" name="idNumber" id="idNumber" placeholder="Αριθμός ταυτότητας ή διαβατηρίου" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="field">Κωδικός Πρόσβασης</label>
    <input type="password" name="field" id="field" placeholder="Εισάγετε τον κωδικό σας">
  </div>
</form>

</fieldset></body></html>
