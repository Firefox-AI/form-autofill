<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id35b">Όνομα</label>
    <input type="text" name="billing_first_name" id="id35b" placeholder="Πώς σε λένε;" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idykq">Επίθετο</label>
    <input type="text" name="lname" id="idykq" placeholder="Ποιο είναι το επώνυμό σου;" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idjvya">Μεσαίο Όνομα</label>
    <input type="text" name="middle_name" id="idjvya" placeholder="Πρόσθετο όνομα (αν υπάρχει)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="id56rvi">Ψευδώνυμο</label>
    <input type="text" name="handle" id="id56rvi" placeholder="Πώς σε φωνάζουν;" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idsl6rs">Διεύθυνση Email</label>
    <input type="email" name="email" id="idsl6rs" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="iddrt">Τηλέφωνο</label>
    <input type="tel" name="phone" id="iddrt" placeholder="Πλήρης αριθμός τηλεφώνου" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id54">Εταιρεία</label>
    <input type="text" name="companyName" id="id54" placeholder="Ποια είναι η εταιρεία σου;" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idc4av">Ημερομηνία Γέννησης</label>
    <input type="text" name="dob" id="idc4av" placeholder="Ημερομηνία γέννησης (π.χ. 01/01/1990)" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="id9t21d">Αριθμός Ταυτότητας</label>
    <input type="text" name="nationalId" id="id9t21d" placeholder="Εισάγετε τον αριθμό ταυτότητάς σας" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="idrw">Κωδικός Πρόσβασης</label>
    <input type="password" name="idsw6" id="idrw" placeholder="Εισάγετε τον κωδικό πρόσβασης">
  </div>
</form>

</fieldset></body></html>
