<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="fullName" id="idmo732" placeholder="Mario Rossi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="idrrzk">Via e numero civico</label>
    <input type="text" name="address1" id="idrrzk" placeholder="Via Roma 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="zipCode" id="id6v" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id9l">Città</label>
    <input type="text" name="locality" id="id9l" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Paese</span>
    <select name="country" id="idsum" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Spagna</option>
  <option>Germania</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="idve">Indirizzo aggiuntivo (opzionale)</label>
    <input type="text" name="address2" id="idve" placeholder="Piano 2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Interno (opzionale)
    <input type="text" name="suite" id="idy1s" placeholder="A1" data-moz-autofill-type="apartment">
    </label>
  </div>
</form>

</fieldset></body></html>
