<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele deținătorului cardului</span>
    <input type="text" name="nameOnCard" id="idp95hv" placeholder="Ion Popescu" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numărul cardului</span>
    <input type="number" name="ccNumber" id="idawuj" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="expMonth" id="id6v" aria-label="Luna expirării" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <label>Anul expirării
    <select name="ccExpYear" id="idqb" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Codul de securitate (CSC)
    <input type="number" name="cvc" id="idpmgqd" placeholder="123" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label for="idxghr4">Tipul cardului</label>
    <select name="cardType" id="idxghr4" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
</select>
  </div>
</form>

</fieldset></body></html>
