<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-finances.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Card Type</span>
    <select name="idt2a" id="id34" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Card Number</span>
    <input type="number" name="idtp" id="id12" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Cardholder Name</span>
    <input type="text" name="idou" id="idt2f6" placeholder="John Doe" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Expiration Month</span>
    <select name="idbvxiq" id="idqx6" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - January</option>
  <option>02 - February</option>
  <option>03 - March</option>
  <option>04 - April</option>
  <option>05 - May</option>
  <option>06 - June</option>
  <option>07 - July</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - October</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <span>Expiration Year</span>
    <select name="idhw" id="idkxh3" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Security Code (CVV)</span>
    <input type="number" name="idu0p" id="idisntc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Street Address</span>
    <input type="text" name="idi42" id="ido85" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apt, Suite, Bldg (optional)</span>
    <input type="text" name="idqa60" id="idjc" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="id0bw" id="id277j" placeholder="New York" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>State</span>
    <select name="id8lo" id="id7jj9" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>NY</option>
  <option>CA</option>
  <option>TX</option>
  <option>FL</option>
  <option>IL</option>
</select>
  </div>
  <div>
    <span>Zip Code</span>
    <input type="number" name="idvh" id="id51s" placeholder="10001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Country</span>
    <select name="idyfn" id="idybt7r" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>Organization (optional)</span>
    <input type="text" name="iddq45w" id="id83e" placeholder="Your Company Name" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Email Address</span>
    <input type="email" name="id9q9" id="idg4hg" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
