<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivsite.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn på kortet
    <input type="text" name="r:r:3:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idr90r" placeholder="Skriv dit navn som det står på kortet" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Kortnummer
    <input type="number" name="r:r:9:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idix6fj" placeholder="Indtast dit kortnummer" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Udløbs måned
    <select name="r:r:9:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idinkod" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
    </label>
  </div>
  <div>
    <label>Udløbs år
    <select name="r:r:7:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idki" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Sikkerhedskode
    <input type="number" name="r:r:8:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idzeb" placeholder="Indtast de sidste 3 cifre" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Korttype
    <select name="r:r:2:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idgmeqk" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="r:r:9:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idk2f9" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="r:r:6:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idbtxtf" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
