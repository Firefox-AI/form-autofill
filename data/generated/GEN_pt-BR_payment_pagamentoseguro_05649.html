<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoseguro.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no cartão</span>
    <input type="text" name="ccName" id="idmhnu" placeholder="Nome completo como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Tipo de cartão</span>
    <select name="ccType" id="idzv" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Elo</option>
  <option>Discover</option>
  <option>Hipercard</option>
</select>
  </div>
  <div>
    <span>Número do cartão</span>
    <input type="number" name="cardNo" id="idq1ej2" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mês de expiração</span>
    <select name="expMonth" id="idr1z5" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>Ano de expiração</span>
    <select name="ccExpYear" id="idq9" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Código de segurança</span>
    <input type="number" name="cardCode" id="idg5b" placeholder="3 ou 4 dígitos" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
