<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzp3">Nome completo</label>
    <input type="text" name="fullName5" id="idzp3" placeholder="Seu nome completo aqui" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idinj">E-mail</label>
    <input type="email" name="email_address" id="idinj" placeholder="exemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idzc">Telefone</label>
    <input type="tel" name="phone" id="idzc" placeholder="(xx) xxxx-xxxx" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idsba4">Endereço</label>
    <input type="text" name="addr" id="idsba4" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="iddg">Cidade</label>
    <input type="text" name="city" id="iddg" placeholder="Sua cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id0tyg">CEP</label>
    <input type="text" name="postalCode" id="id0tyg" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idh8yam">País</label>
    <select name="countryName" id="idh8yam" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Colômbia</option>
  <option>Peru</option>
  <option>Uruguai</option>
</select>
  </div>
</form>

</fieldset></body></html>
