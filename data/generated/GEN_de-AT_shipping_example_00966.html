<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Max Mustermann" aria-label="Vollständiger Name" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Hauptstraße" aria-label="Straße" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" aria-label="Hausnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="c/o Nachbar" aria-label="Zusätzliche Adresse" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="1010" aria-label="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" aria-label="Bundesland" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Tyrol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechien</option>
  <option>Slowenien</option>
</select>
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="2. Stock" aria-label="Stockwerk" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="B" aria-label="Wohnung" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Block A" aria-label="Gebäude" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="In der Nähe von Supermarkt" aria-label="Orientierungspunkt" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
