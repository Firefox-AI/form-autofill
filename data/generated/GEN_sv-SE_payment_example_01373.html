<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Korthav</span>
    <input type="text" name="nameOnCard" id="idh8t" placeholder="Namn på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id4s">Kortnummer</label>
    <input type="number" name="cardNo" id="id4s" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="idnvk" aria-label="Utgångsmånad" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Mars</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augusti</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idisv3z">Utgångsår</label>
    <select name="exp_year" id="idisv3z" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idvg">CVV</label>
    <input type="number" name="csc" id="idvg" placeholder="Tre siffror på baksidan" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Korttyp</span>
    <select name="cardType" id="idrxrim" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idjozj" id="idld" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
