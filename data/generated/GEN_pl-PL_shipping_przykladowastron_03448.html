<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Ulica
    <input type="text" name="street" id="street" placeholder="Wrocławska" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Numer domu
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="12" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Dodatkowy adres (opcjonalnie)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Klater 5" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="postalCode" id="postalCode" placeholder="50-123" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Miasto
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wrocław" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Czechy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
</select>
    </label>
  </div>
  <div>
    <label>Numer budynku
    <input type="text" name="building" id="building" placeholder="B" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>Numer mieszkania
    <input type="text" name="apartment" id="apartment" placeholder="3A" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Kod kraju telefonu
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+48</option>
  <option>+49</option>
  <option>+420</option>
  <option>+33</option>
  <option>+44</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
