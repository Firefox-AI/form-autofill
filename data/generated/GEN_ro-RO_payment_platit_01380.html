<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>platit.online</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Nume complet al titularului cardului" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="CVC/CVV" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
