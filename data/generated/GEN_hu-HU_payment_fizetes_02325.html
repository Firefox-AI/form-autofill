<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fizetes.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkhd">Kártyatulajdonos neve</label>
    <input type="text" name="cardholderName" id="idkhd" placeholder="Kérem, adja meg a kártyatulajdonos nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id38">Kártyaszám</label>
    <input type="number" name="cardNumber" id="id38" placeholder="Kérem, adja meg a kártyaszámot" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idlp2u">Lejárati hónap</label>
    <select name="expMonth" id="idlp2u" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idxhm5w">Lejárati év</label>
    <select name="ccExpYear" id="idxhm5w" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <label for="idqmusj">CVV/CVC</label>
    <input type="number" name="securityCode" id="idqmusj" placeholder="Kérem, adja meg a CVV kódot" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idwbr1">Kártyatípus</label>
    <select name="cardType" id="idwbr1" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="id92xq">Irányítószám</label>
    <input type="text" name="postcode" id="id92xq" placeholder="Kérem, adja meg az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="id0dvq" id="idos" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
