<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvnsv">Namn på kortet</label>
    <input type="text" name="r:r:9:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idvnsv" placeholder="För- och efternamn" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idfv">Kortnummer</label>
    <input type="number" name="r:r:5:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idfv" placeholder="16 siffror utan mellanslag" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idijj2">Utgångsmånad</label>
    <select name="r:r:9:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idijj2" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Mars</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augusti</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idbr28l">Utgångsår</label>
    <select name="r:r:4:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idbr28l" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id0hjuo">CVV</label>
    <input type="number" name="r:r:9:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id0hjuo" placeholder="3 siffror" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idgy">Korttyp</label>
    <select name="r:r:5:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idgy" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idd96">Landskod</label>
    <select name="r:r:9:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idd96" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+46 (Sverige)</option>
  <option>+45 (Danmark)</option>
  <option>+47 (Norge)</option>
  <option>+41 (Schweiz)</option>
</select>
  </div>
  <div>
    <label for="id01a">Block</label>
    <input type="text" name="r:r:2:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="id01a" placeholder="T.ex. avdelning eller etage" data-moz-autofill-type="block">
  </div>
</form>

</fieldset></body></html>
