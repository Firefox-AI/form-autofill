<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio-sito.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome del titolare della carta
    <input type="text" name="cardName" id="iddzo" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <input type="text" name="company" id="id4edz8" placeholder="Nome dell&#x27;azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="street" id="id28313" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id2iad">Città</label>
    <input type="text" name="town" id="id2iad" placeholder="Milano" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idffj">CAP</label>
    <input type="text" name="postcode" id="idffj" placeholder="20100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idem">Provincia</label>
    <select name="stateProvince" id="idem" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bari</option>
  <option>Verona</option>
</select>
  </div>
  <div>
    <label for="id6mha">Nazione</label>
    <select name="country" id="id6mha" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>Numero di telefono</span>
    <input type="tel" name="mobile" id="idpxqp6" placeholder="+39 02 1234567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
