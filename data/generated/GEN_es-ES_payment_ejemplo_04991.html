<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre del titular de la tarjeta</span>
    <input type="text" name="ccName" id="iddk53" placeholder="Juan Pérez" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número de la tarjeta</span>
    <input type="number" name="cardNumber" id="idlidg" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mes de expiración</span>
    <select name="exp_month" id="idhp" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <span>Año de expiración</span>
    <select name="exp_year" id="idbzv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Código de seguridad</span>
    <input type="number" name="cvc" id="id6966" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de tarjeta</span>
    <select name="ccType" id="id4o" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="iduzxzs" id="idza" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
