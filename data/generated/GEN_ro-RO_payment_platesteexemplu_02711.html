<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>plateste-exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Tip card</span>
    <select name="r:r:7:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idioy2r" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <span>Numele de pe card</span>
    <input type="text" name="r:r:9:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idobeib" placeholder="Numele complet al titularului" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numărul cardului</span>
    <input type="number" name="r:r:1:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idpeodl" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Luna expirare</span>
    <select name="r:r:8:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idxtk" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <span>Anul expirare</span>
    <select name="r:r:6:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idmc" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codul de securitate (CVV)</span>
    <input type="number" name="r:r:9:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idut" placeholder="3 sau 4 cifre" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
