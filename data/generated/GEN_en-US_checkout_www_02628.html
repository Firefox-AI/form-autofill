<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.securepayments.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="number" name="r:r:5:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idciys" placeholder="Credit Card Number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idsn">Name as it Appears on Card</label>
    <input type="text" name="r:r:3:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idsn" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <select name="r:r:4:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="iddns" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="id1g">Expiration Year</label>
    <select name="r:r:1:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="id1g" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <input type="number" name="r:r:3:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="ide4db" aria-label="Security Code (CVV)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idq9">Your Email (for confirmation)</label>
    <input type="email" name="r:r:6:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idq9" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
