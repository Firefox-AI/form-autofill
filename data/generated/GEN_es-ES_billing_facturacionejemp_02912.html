<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>facturacionejemplo.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhir">Nombre en la tarjeta</label>
    <input type="text" name="cardName" id="idhir" placeholder="Nombre y apellidos" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id8f">Nombre de la empresa</label>
    <input type="text" name="organization" id="id8f" placeholder="Tu empresa (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id9t9">Dirección</label>
    <input type="text" name="addressLine1" id="id9t9" placeholder="Calle, número, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idj08h">Apartamento, piso, etc. (opcional)</label>
    <input type="text" name="street2" id="idj08h" placeholder="Detalles adicionales" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idaeg7b">Provincia</label>
    <select name="region" id="idaeg7b" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla y León</option>
  <option>Castilla-La Mancha</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
  <option>Ceuta</option>
  <option>Melilla</option>
</select>
  </div>
  <div>
    <label for="id43wa">Ciudad</label>
    <input type="text" name="city" id="id43wa" placeholder="Tu ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idfut2a">Código postal</label>
    <input type="text" name="zip_code" id="idfut2a" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idup6">País</label>
    <select name="countryName" id="idup6" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
  <option>Argentina</option>
  <option>México</option>
</select>
  </div>
  <div>
    <label for="idodt">Teléfono</label>
    <input type="tel" name="mobile" id="idodt" placeholder="Teléfono de contacto" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id7s3u">Número de IVA</label>
    <input type="text" name="vatNumber" id="id7s3u" placeholder="Número de identificación fiscal" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
