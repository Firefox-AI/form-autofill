<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartamento, Piano" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Torino</option>
  <option>Napoli</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Genova</option>
  <option>Venezia</option>
  <option>Verona</option>
  <option>Bari</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Australia</option>
  <option>Canada</option>
  <option>Giappone</option>
  <option>Cina</option>
</select>
  </div>
</form>

</fieldset></body></html>
