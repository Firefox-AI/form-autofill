<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">ФИО</label>
    <input type="text" name="name" id="name" placeholder="Введите ваше полное имя" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Улица</label>
    <input type="text" name="street" id="street" placeholder="Введите название улицы" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Номер дома</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Введите номер дома" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Дополнительные сведения</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, подъезд (если нужно)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Почтовый индекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Город</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Страна</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>США</option>
  <option>Германия</option>
  <option>Франция</option>
  <option>Китай</option>
  <option>Италия</option>
  <option>Испания</option>
</select>
  </div>
</form>

</fieldset></body></html>
