<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idoaii">Navn på kort</label>
    <input type="text" name="ccName" id="idoaii" placeholder="Indtast dit navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idwmix8">Adresse</label>
    <input type="text" name="addr" id="idwmix8" placeholder="Indtast din gadeadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id4la45">Postnummer</label>
    <input type="text" name="zip_code" id="id4la45" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id76fwm">By</label>
    <input type="text" name="town" id="id76fwm" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idew">Region</label>
    <select name="stateProvince" id="idew" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Sjælland</option>
  <option>Sydjylland</option>
  <option>Østjylland</option>
</select>
  </div>
  <div>
    <label for="idvq">Land</label>
    <select name="country" id="idvq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Frankrig</option>
</select>
  </div>
  <div>
    <label for="id5nyaf">CVR-nummer</label>
    <input type="text" name="vatNumber" id="id5nyaf" placeholder="Indtast dit CVR-nummer" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idswscx" id="idee3" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
