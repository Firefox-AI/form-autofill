<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>kontakt.exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Namn</label>
    <input type="text" name="name" id="name" placeholder="Ditt fullständiga namn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-post</label>
    <input type="email" name="email" id="email" placeholder="exempel@domän.se" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="030-123 45 67" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Gatuadress</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Din gatuadress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Stad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Din stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Momsregistreringsnummer</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="SE123456789001" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
