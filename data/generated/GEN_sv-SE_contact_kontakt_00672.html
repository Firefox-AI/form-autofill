<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>kontakt.exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idrc">Namn</label>
    <input type="text" name="contactName" id="idrc" placeholder="Ditt namn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idel">E-post</label>
    <input type="email" name="email" id="idel" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idjxk">Telefonnummer</label>
    <input type="tel" name="telephone" id="idjxk" placeholder="012-345 67 89" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id79zu2">Gatuadress</label>
    <input type="text" name="addr" id="id79zu2" placeholder="Din gatuadress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idxbb3">Stad</label>
    <input type="text" name="city" id="idxbb3" placeholder="Din stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idvh">Postnummer</label>
    <input type="text" name="postcode" id="idvh" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idqq">Land</label>
    <select name="country" id="idqq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idsh">Momsregistreringsnummer</label>
    <input type="text" name="vatId" id="idsh" placeholder="Ditt momsnummer" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
