<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>примерен-сайт.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Име</label>
    <input type="text" name="givenName" id="givenName" placeholder="Вашето име" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Фамилия</label>
    <input type="text" name="familyName" id="familyName" placeholder="Вашата фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Фирма</label>
    <input type="text" name="organization" id="organization" placeholder="Името на фирмата (по избор)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Адрес</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Номер и име на улицата" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Допълнителна информация</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Апартамент, етаж и др. (по избор)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel1">Област</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>София</option>
  <option>Пловдив</option>
  <option>Варна</option>
  <option>Бургас</option>
  <option>Русе</option>
  <option>Стара Загора</option>
  <option>Добрич</option>
  <option>Сливен</option>
  <option>Плевен</option>
  <option>Хасково</option>
</select>
  </div>
  <div>
    <label for="addressLevel2">Град</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Вашият град" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Пощенски код</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Вашият пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Държава</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Германия</option>
  <option>Франция</option>
  <option>Италия</option>
  <option>Испания</option>
  <option>САЩ</option>
</select>
  </div>
  <div>
    <label for="email">Имейл</label>
    <input type="email" name="email" id="email" placeholder="Вашият имейл адрес" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="Вашият телефонен номер" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressExtra">Допълнителен адрес</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Допълнителна информация за адреса (по избор)" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="addressStreetname">Име на улица</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Името на улицата" data-moz-autofill-type="address-streetname">
  </div>
</form>

</fieldset></body></html>
