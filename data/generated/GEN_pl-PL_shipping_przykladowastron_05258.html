<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Ulica
    <input type="text" name="street" id="street" placeholder="Wrocławska" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Numer domu
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="23" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Dodatkowy adres (opcjonalnie)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Mieszkanie 5" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="postalCode" id="postalCode" placeholder="00-001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Miasto
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Włochy</option>
</select>
    </label>
  </div>
  <div>
    <label>Punkt orientacyjny (opcjonalnie)
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Obok sklepu spożywczego" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Dzielnica
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Mokotów" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <label>Numer budynku
    <input type="text" name="building" id="building" placeholder="A" data-moz-autofill-type="building">
    </label>
  </div>
</form>

</fieldset></body></html>
