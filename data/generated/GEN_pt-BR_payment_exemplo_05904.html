<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome do titular do cartão</span>
    <input type="text" name="cardName" id="idqul" placeholder="Digite o nome exatamente como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número do cartão</span>
    <input type="number" name="ccNumber4" id="ide46v3" placeholder="0000 0000 0000 0000" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mês de validade</span>
    <select name="expMonth" id="idimt0" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <span>Ano de validade</span>
    <select name="expYear" id="id9g" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Código de segurança</span>
    <input type="number" name="csc" id="idehqk" placeholder="Últimos 3 dígitos do verso do cartão" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de cartão</span>
    <select name="cardType" id="id5163o" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Endereço de cobrança</span>
    <input type="text" name="addressLine1" id="idj49n" placeholder="Rua, Av, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Andar</span>
    <input type="text" name="etage2" id="idd2se" placeholder="Número do andar (se aplicável)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Apartamento</span>
    <input type="text" name="apt" id="idz5" placeholder="Número do apartamento (se aplicável)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="ide6" id="idwibd1" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
