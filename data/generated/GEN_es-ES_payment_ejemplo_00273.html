<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre del titular de la tarjeta
    <input type="text" name="r:r:6:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idizlm" placeholder="Ej. Juan Pérez" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Número de tarjeta
    <input type="number" name="r:r:8:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="id8mgfs" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Mes de expiración
    <select name="r:r:6:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idl3ps" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Año de expiración
    <select name="r:r:9:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idv9p" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
    </label>
  </div>
  <div>
    <label>Código de seguridad
    <input type="number" name="r:r:9:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idsss7" placeholder="Últimos 3 dígitos" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Tipo de tarjeta
    <select name="r:r:9:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idx4qj" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="r:r:6:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idpo" placeholder="Calle, número, etc." data-moz-autofill-type="address-line1">
    </label>
  </div>
</form>

</fieldset></body></html>
