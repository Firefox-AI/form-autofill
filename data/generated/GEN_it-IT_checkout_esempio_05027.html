<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" aria-label="Cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" aria-label="Indirizzo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Es. appartamento, piano" aria-label="Ulteriori informazioni" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="La tua città" aria-label="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Il tuo codice postale" aria-label="Codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="La tua email" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Il tuo numero di telefono" aria-label="Telefono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
