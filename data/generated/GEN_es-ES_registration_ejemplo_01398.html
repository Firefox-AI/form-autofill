<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Apellidos
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Correo electrónico
    <input type="email" name="email" id="email" placeholder="ejemplo@dominio.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Fecha de nacimiento
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Apartamento
    <input type="text" name="apartment" id="apartment" placeholder="Número de apartamento (opcional)" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Contraseña
    <input type="password" name="field" id="field">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrarse</button>
  </div>
</form>

</fieldset></body></html>
