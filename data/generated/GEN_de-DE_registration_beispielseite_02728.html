<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="ccGivenName" id="ccGivenName" placeholder="Bitte geben Sie Ihren Vornamen ein." data-moz-autofill-type="cc-given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="ccFamilyName" id="ccFamilyName" placeholder="Bitte geben Sie Ihren Nachnamen ein." data-moz-autofill-type="cc-family-name">
  </div>
  <div>
    <span>Kartennummer</span>
    <input type="number" name="ccNumber" id="ccNumber" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Monat</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <span>Jahr</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="CVV erforderlich." data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Frankreich</option>
  <option>Italien</option>
  <option>Spanien</option>
</select>
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>- Optional</span>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>- Optional</span>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>PLZ</span>
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
