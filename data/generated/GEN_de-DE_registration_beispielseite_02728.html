<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="idkn" id="iduj4" placeholder="Bitte geben Sie Ihren Vornamen ein." data-moz-autofill-type="cc-given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="idgkgrk" id="idcih4a" placeholder="Bitte geben Sie Ihren Nachnamen ein." data-moz-autofill-type="cc-family-name">
  </div>
  <div>
    <span>Kartennummer</span>
    <input type="number" name="cardNo" id="idmtech" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Monat</span>
    <select name="exp_month" id="idhugfk" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <span>Jahr</span>
    <select name="exp_year" id="idntc" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="cardCode" id="idal" placeholder="CVV erforderlich." data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Land</span>
    <select name="countryCode" id="ido3ud0" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Frankreich</option>
  <option>Italien</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
</select>
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addressLine1" id="idgfn" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>- Optional</span>
    <input type="text" name="addr2" id="idb4" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>- Optional</span>
    <input type="text" name="business" id="idd087v" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>PLZ</span>
    <input type="text" name="zipCode" id="idn5q5c" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="city" id="idxu" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="state" id="idp8hj" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="mobile" id="idlzeru" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
