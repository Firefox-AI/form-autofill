<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nimi</span>
    <input type="text" name="ccName" id="ccName" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Osoite</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Katuosoite" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Osoitteen lisätiedot</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esimerkiksi huoneisto tai kerros" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postinumero</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kaupunki</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Maakunta</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Uusimaa</option>
  <option>Pohjois-Pohjanmaa</option>
  <option>Varsinais-Suomi</option>
  <option>Pirkanmaa</option>
  <option>Etelä-Karjala</option>
  <option>Kanta-Häme</option>
  <option>Päijät-Häme</option>
  <option>Kymenlaakso</option>
  <option>Satakunta</option>
  <option>Etelä-Pohjanmaa</option>
  <option>Pohjois-Karjala</option>
  <option>Ahvenanmaa</option>
  <option>Keski-Pohjanmaa</option>
  <option>Keski-Suomi</option>
  <option>Lapin lääni</option>
</select>
  </div>
  <div>
    <span>Maa</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
  <option>Venäjä</option>
  <option>Alankomaat</option>
</select>
  </div>
</form>

</fieldset></body></html>
