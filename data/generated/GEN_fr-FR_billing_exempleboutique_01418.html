<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple-boutique.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nom sur la carte</label>
    <input type="text" name="ccName" id="ccName" placeholder="Nom complet tel qu&#x27;affiché sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization">Société (facultatif)</label>
    <input type="text" name="organization" id="organization" placeholder="Nom de votre entreprise" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Adresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Numéro et nom de la rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complément d&#x27;adresse (facultatif)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Région</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace-Champagne-Ardenne-Lorraine</option>
</select>
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
