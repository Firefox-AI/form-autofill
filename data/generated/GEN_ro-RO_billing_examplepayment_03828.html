<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele titularului cardului</span>
    <input type="text" name="ccName" id="ccName" placeholder="Introduceti numele titularului" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresa de facturare</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Apartament, etaj, etc.</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartament, etaj, etc. (opțional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ex: 123456" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Oraș</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduceti orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Județ</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alba</option>
  <option>Arad</option>
  <option>Arges</option>
  <option>Bacău</option>
  <option>Bihor</option>
  <option>Bistrița-Năsăud</option>
  <option>Botoșani</option>
  <option>Brăila</option>
  <option>Brașov</option>
  <option>Buzău</option>
  <option>Călărași</option>
  <option>Caraș-Severin</option>
  <option>Cluj</option>
  <option>Constanța</option>
  <option>Covasna</option>
  <option>Dâmbovița</option>
  <option>Dolj</option>
  <option>Galați</option>
  <option>Giurgiu</option>
  <option>Gorj</option>
  <option>Harghita</option>
  <option>Hunedoara</option>
  <option>Ilfov</option>
  <option>Maramureș</option>
  <option>Mehedinți</option>
  <option>Mureș</option>
  <option>Neamț</option>
  <option>Olt</option>
  <option>Prahova</option>
  <option>Sălaj</option>
  <option>Satu Mare</option>
  <option>Sibiu</option>
  <option>Suceava</option>
  <option>Teleorman</option>
  <option>Timiș</option>
  <option>Vâlcea</option>
  <option>Vrancea</option>
</select>
  </div>
  <div>
    <span>Țara</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Germania</option>
  <option>Ungaria</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
  <option>Marea Britanie</option>
  <option>Statele Unite</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Numărul de TVA</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Introduceți numărul dvs. de TVA" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
