<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>profilok.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" aria-label="Keresztnév" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Vezetéknév</label>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Kiegészítő név</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="(pl. második keresztneved)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Becenév</span>
    <input type="text" name="nickname" id="nickname" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label>Email cím
    <input type="email" name="email" id="email" placeholder="pl. pelda@email.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Írd be a telefonszámod" aria-label="Telefonszám" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Szervezet</label>
    <input type="text" name="organization" id="organization" placeholder="Pl. cégnév" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Születési dátum</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="organizationTitle">Beosztás</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Pl. ügyvezető" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="idNumber">Személyi azonosító szám</label>
    <input type="text" name="idNumber" id="idNumber" placeholder="Írd be a személyi azonosítód" data-moz-autofill-type="id-number">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Írd be a jelszavad" aria-label="Jelszó">
  </div>
  <div>
    <button name="field" id="field" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
