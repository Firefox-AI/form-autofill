<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki-verkkosivusto.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id58">Etunimi</label>
    <input type="text" name="firstName" id="id58" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id0ry02">Sukunimi</label>
    <input type="text" name="last_name" id="id0ry02" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idicsob">Osoite</label>
    <input type="text" name="addr1" id="idicsob" placeholder="Katuosoite, talon numero" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idy229">Osoite (lisätietoja)</label>
    <input type="text" name="street2" id="idy229" placeholder="Esim. asunnon numero tai yhtiön nimi (valinnainen)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id89n">Kaupunki</label>
    <input type="text" name="city" id="id89n" placeholder="Anna kaupunki" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idn2">Postinumero</label>
    <input type="text" name="zip_code" id="idn2" placeholder="Anna postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idi1gzt">Maa</label>
    <select name="countryName" id="idi1gzt" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Yhdysvallat</option>
  <option>Iso-Britannia</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="idd83q">Sähköpostiosoite</label>
    <input type="email" name="mail" id="idd83q" placeholder="Anna sähköpostiosoitteesi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id1c">Puhelinnumero</label>
    <input type="tel" name="phoneNumber" id="id1c" placeholder="Anna puhelinnumerosi" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
