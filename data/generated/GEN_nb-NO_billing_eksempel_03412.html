<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Navn på kortet</label>
    <input type="text" name="ccName" id="ccName" placeholder="Skriv inn navnet som står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Skriv inn gatenavn og nummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Leilighet, etasje eller annet</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Valgfritt, for eksempel leilighetsnummer" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postalCode" id="postalCode" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Skriv inn navnet på byen" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Viken</option>
  <option>Innlandet</option>
  <option>Vestfold og Telemark</option>
  <option>Agder</option>
  <option>Rogaland</option>
  <option>Vestland</option>
  <option>Møre og Romsdal</option>
  <option>Trøndelag</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Skriv inn MVA-nummer" aria-label="MVA-nummer" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="organization">Virksomhet</label>
    <input type="text" name="organization" id="organization" placeholder="Skriv inn virksomhetens navn" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
