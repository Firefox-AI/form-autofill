<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyt">Kreditkartentyp</label>
    <select name="r:r:2:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idyt" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idjhcp">Kreditkartennummer</label>
    <input type="number" name="r:r:6:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idjhcp" placeholder="Geben Sie Ihre Kreditkartennummer ein" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idlj">Name auf der Kreditkarte</label>
    <input type="text" name="r:r:4:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idlj" placeholder="Wie auf der Karte angezeigt" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idonp">Monat der Gültigkeit</label>
    <select name="r:r:5:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idonp" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="idgr91">Jahr der Gültigkeit</label>
    <select name="r:r:3:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idgr91" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
</select>
  </div>
  <div>
    <label for="idoida0">Sicherheitscode (CSC)</label>
    <input type="number" name="r:r:8:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idoida0" placeholder="Letzte 3 oder 4 Ziffern auf der Rückseite" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id0825">Straße und Hausnummer</label>
    <input type="text" name="r:r:4:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id0825" placeholder="Ihre Adresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idwi">Zusätzliche Adresse (optional)</label>
    <input type="text" name="r:r:4:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idwi" placeholder="Wohnung, Suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idsy9">Stadt</label>
    <input type="text" name="r:r:2:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idsy9" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="iduu3p">Bundesland</label>
    <select name="r:r:7:m:r:10:cr:1:c:pr:1:container:fs:i:input" id="iduu3p" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="id00">Postleitzahl</label>
    <input type="text" name="r:r:4:m:r:11:cr:2:c:pr:1:container:fs:i:input" id="id00" placeholder="Ihre PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="ideiis">Land</label>
    <select name="r:r:4:m:r:12:cr:3:c:pr:1:container:fs:i:input" id="ideiis" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="idgcu">Unternehmen (falls zutreffend)</label>
    <input type="text" name="r:r:3:m:r:13:cr:3:c:pr:1:container:fs:i:input" id="idgcu" placeholder="Ihr Unternehmensname" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idtj">E-Mail</label>
    <input type="email" name="r:r:2:m:r:14:cr:1:c:pr:1:container:fs:i:input" id="idtj" placeholder="Registrieren Sie sich" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
