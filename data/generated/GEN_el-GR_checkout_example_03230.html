<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificPrefix">Τίτλος</label>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Κύριος</option>
  <option>Κυρία</option>
  <option>Δρ</option>
</select>
  </div>
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Το πρώτο σου όνομα" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επίθετο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Το επίθετό σου" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Επιπλέον πληροφορίες</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Π.χ. διαμέρισμα, όροφος" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Περιοχή</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Αθήνα</option>
  <option>Θεσσαλονίκη</option>
  <option>Πάτρα</option>
  <option>Ηράκλειο</option>
  <option>Λάρισα</option>
</select>
  </div>
  <div>
    <label for="postalCode">Τ.Κ.</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ταχυδρομικός κωδικός" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="example@domain.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Προτιμώμενος αριθμός" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel1">Πολιτεία/Διαμέρισμα</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Μακεδονία</option>
  <option>Θεσσαλία</option>
  <option>Στερεά Ελλάδα</option>
  <option>Πελοπόννησος</option>
</select>
  </div>
</form>

</fieldset></body></html>
