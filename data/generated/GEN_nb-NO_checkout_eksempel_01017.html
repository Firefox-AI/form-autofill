<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Skriv inn fornavn" aria-label="Fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Etternavn</label>
    <input type="text" name="familyName" id="familyName" placeholder="Skriv inn etternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Skriv inn gateadressen" aria-label="Gateadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>By
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Skriv inn byen" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Skriv inn postnummer" aria-label="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label>E-postadresse
    <input type="email" name="email" id="email" placeholder="Skriv inn e-post" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
