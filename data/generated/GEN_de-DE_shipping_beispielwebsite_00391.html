<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="name">Vollständiger Name</label>
    <input type="text" name="name" id="name" placeholder="Max Mustermann" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="postalCode" id="postalCode" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Ihr Unternehmen" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressHousenumber">Hausnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="1A" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Musterstraße" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Weitere Adressdaten (falls erforderlich)</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="addressLevel2">Stadt/Gemeinde</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Musterstadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Bundesland</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Bayern</option>
  <option>Hessen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Baden-Württemberg</option>
  <option>Sachsen</option>
</select>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="0123 4567890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ccName">Name auf der Karte</label>
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
</form>

</fieldset></body></html>
