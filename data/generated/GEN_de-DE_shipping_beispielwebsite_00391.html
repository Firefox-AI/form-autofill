<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Land
    <select name="countryCode5" id="iddsoj" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
    </label>
  </div>
  <div>
    <label>Vollständiger Name
    <input type="text" name="contactName" id="id23d" placeholder="Max Mustermann" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="number" name="zip" id="id7mgo" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Unternehmensname
    <input type="text" name="companyName" id="idrn3b5" placeholder="Musterfirma GmbH" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Hausnummer
    <input type="number" name="hausnummer" id="idt90" placeholder="1" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Straßenname
    <input type="text" name="streetName4" id="ideu9" placeholder="Musterstraße" data-moz-autofill-type="address-streetname">
    </label>
  </div>
  <div>
    <label>Zusätzliche Adressdaten (falls erforderlich)
    <input type="text" name="id31wq" id="idzdz" data-moz-autofill-type="address-extra">
    </label>
  </div>
  <div>
    <label>Stadt/Gemeinde
    <input type="text" name="town" id="idbi" placeholder="Musterstadt" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Bundesland
    <select name="stateProvince" id="idevvl6" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="mobile4" id="id6ttme" placeholder="+49 123 4567890" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Name auf der Karte
    <input type="text" name="cardholderName" id="idmc14l" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
    </label>
  </div>
</form>

</fieldset></body></html>
