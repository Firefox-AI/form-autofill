<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplebilling.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Ονοματεπώνυμο</label>
    <input type="text" name="ccName" id="ccName" placeholder="Το πλήρες όνομά σας" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Δίχτυο / Διαμέρισμα</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Π.χ. Διαμέρισμα 4 ή Όροφος 3" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κώδικας</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Π.χ. 12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πόλη ή Κωμόπολη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Περιφέρεια</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Κεντρική Μακεδονία</option>
  <option>Δυτική Ελλάδα</option>
  <option>Θεσσαλία</option>
  <option>Πελοπόννησος</option>
  <option>Ηπειρος</option>
  <option>Βόρειο Αιγαίο</option>
  <option>Νότιο Αιγαίο</option>
  <option>Κρήτη</option>
</select>
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Τουρκία</option>
  <option>Ιταλία</option>
</select>
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Π.χ. 2101234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
