<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="On Time Delivery" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Enter your contact number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Enter your email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Enter your flat or apartment number/name" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Enter your building name or number" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Enter your street name" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city or town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Enter your county" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
