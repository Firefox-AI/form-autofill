<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id8sy">Nom complet</label>
    <input type="text" name="name" id="id8sy" placeholder="Votre nom ici" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id36t6">Adresse</label>
    <input type="text" name="address1" id="id36t6" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id6sc40">Complément d&#x27;adresse</label>
    <input type="text" name="address2" id="id6sc40" placeholder="Appartement, suite, etc. (facultatif)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id26">Appartement</label>
    <input type="text" name="unit" id="id26" placeholder="Numéro d&#x27;appartement (facultatif)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idsn">Étage</label>
    <input type="text" name="etage" id="idsn" placeholder="Numéro d&#x27;étage (facultatif)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="id90t">Code postal</label>
    <input type="text" name="postcode" id="id90t" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id52">Ville</label>
    <input type="text" name="locality" id="id52" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idah6l4">Pays</label>
    <select name="country" id="idah6l4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Royaume-Uni</option>
</select>
  </div>
</form>

</fieldset></body></html>
