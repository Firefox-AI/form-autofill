<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Namn på kortet</label>
    <input type="text" name="ccName" id="ccName" placeholder="För- och efternamn" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Gatuadress</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Gatuadress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Lägenhetsnummer</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lägenhetsnummer, om tillämpligt" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Län</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Stockholms län</option>
  <option>Uppsala län</option>
  <option>Södermanlands län</option>
  <option>Östergötlands län</option>
  <option>Jönköpings län</option>
  <option>Kronobergs län</option>
  <option>Kalmar län</option>
  <option>Gotlands län</option>
  <option>Blekinge län</option>
  <option>Skåne län</option>
  <option>Hallands län</option>
  <option>Västra Götalands län</option>
  <option>Värmlands län</option>
  <option>Örebro län</option>
  <option>Västmanlands län</option>
  <option>Dalarna län</option>
  <option>Gävleborgs län</option>
  <option>Västernorrlands län</option>
  <option>Jämtlands län</option>
  <option>Norrbottens län</option>
  <option>Troms och Finnmark</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
