<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Título
    <select name="honorific_prefix_2254" id="honorific_prefix_7199" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
    </label>
  </div>
  <div>
    <label>Nome
    <input type="text" name="given_name_1048" id="given_name_359" placeholder="Seu nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sobrenome
    <input type="text" name="family_name_212" id="family_name_6120" placeholder="Seu sobrenome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Endereço
    <input type="text" name="street_address_158" id="street_address_4477" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Complemento
    <input type="text" name="address_line2_1408" id="address_line2_9222" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Cidade
    <select name="address_level2_4055" id="address_level2_9757" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>São Paulo</option>
  <option>Rio de Janeiro</option>
  <option>Belo Horizonte</option>
  <option>Salvador</option>
  <option>Curitiba</option>
  <option>Fortaleza</option>
</select>
    </label>
  </div>
  <div>
    <label>Estado
    <select name="address_level1_9521" id="address_level1_8440" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>SP</option>
  <option>RJ</option>
  <option>MG</option>
  <option>BA</option>
  <option>PR</option>
  <option>CE</option>
</select>
    </label>
  </div>
  <div>
    <label>CEP
    <input type="text" name="postal_code_9447" id="postal_code_6565" placeholder="00000-000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>País
    <select name="country_name_3947" id="country_name_1561" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Colômbia</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="email_5026" id="email_7852" placeholder="Seu e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefone
    <input type="tel" name="tel_4452" id="tel_6486" placeholder="(XX) 9XXXX-XXXX" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
