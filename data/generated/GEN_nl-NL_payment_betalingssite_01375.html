<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>

  <option>Maart</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>

  <option>2024</option>

  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id0or9">CVV</label>
    <input type="number" name="r:r:5:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="id0or9" placeholder="3 cijfers op de achterkant" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idvz7">Kaarttype</label>
    <select name="r:r:7:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idvz7" data-moz-autofill-type="cc-type">

  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idz44">Appartementnummer (indien van toepassing)</label>

  <div>
    <button name="r:r:3:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="id6zlp2" type="submit">Submit</button>
  </div>
