<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Jméno</label>
    <input type="text" name="givenName" id="givenName" placeholder="Zadejte své jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Příjmení</label>
    <input type="text" name="familyName" id="familyName" placeholder="Zadejte své příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Zadejte svou emailovou adresu" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="Zadejte své telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Datum narození</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="sex">Pohlaví</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Žena</option>
  <option>Muž</option>
  <option>Jiné</option>
</select>
  </div>
  <div>
    <label for="field">Heslo</label>
    <input type="password" name="field" id="field" placeholder="Zadejte heslo">
  </div>
</form>

</fieldset></body></html>
