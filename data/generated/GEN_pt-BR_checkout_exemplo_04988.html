<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sobrenome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Endereço</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Bairro</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Digite o bairro" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Estados Unidos</option>
  <option>Canadá</option>
  <option>Reino Unido</option>

  <option>Itália</option>
  <option>Espanha</option>
  <option>Portugal</option>
</select>
  </div>
  <div>

  </div>
  <div>
    <label for="tel">Telefone</label>
    <input type="tel" name="tel" id="tel" placeholder="(00) 0000-0000" data-moz-autofill-type="tel">
  </div>
  <div>

  <option>São Paulo</option>

</select>
  </div>
  <div>

    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Digite a cidade" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
