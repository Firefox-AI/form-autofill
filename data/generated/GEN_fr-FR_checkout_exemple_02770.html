<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prénom</span>
    <input type="text" name="firstName" id="idl5q4e" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom</span>
    <input type="text" name="lastName" id="idl3y" placeholder="Votre nom" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="address1" id="idmm" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Appartement</span>
    <input type="text" name="apt" id="idy0s57" placeholder="Numéro d&#x27;appartement (facultatif)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Étage</span>
    <input type="text" name="etage9" id="idxgdc" placeholder="Numéro d&#x27;étage (facultatif)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="locality" id="idjo" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="ido9h" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Pays</span>
    <select name="country" id="idu303" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="user_email" id="id5v" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Téléphone</span>
    <input type="tel" name="phoneNumber" id="ide5ty3" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
