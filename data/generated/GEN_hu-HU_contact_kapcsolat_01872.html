<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>kapcsolat.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Név</span>
    <input type="text" name="name" id="name" placeholder="Kérjük, írja be a nevét" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Kérjük, írja be az email címét" aria-label="Email cím" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telefonszám
    <input type="tel" name="tel" id="tel" placeholder="Kérjük, írja be a telefonszámát" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Cím
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Kérjük, adja meg az utcacímet" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kérjük, válasszon települést" aria-label="Település" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Irányítószám
    <input type="text" name="postalCode" id="postalCode" placeholder="Kérjük, írja be az irányítószámot" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="countryName">Ország</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szlovénia</option>
  <option>Horvátország</option>
  <option>Csehország</option>
  <option>Németország</option>
  <option>Olaszország</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
