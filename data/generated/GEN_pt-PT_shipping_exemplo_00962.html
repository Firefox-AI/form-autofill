<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome completo</span>
    <input type="text" name="fullName" id="idu7o9c" placeholder="Insira o seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Morada</span>
    <input type="text" name="address1" id="iddmbfx" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip_code" id="idnxsqi" placeholder="Insira o código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Concelho</span>
    <input type="text" name="town" id="id409r" placeholder="Insira o concelho" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="idd6ov" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Alemanha</option>
  <option>França</option>
  <option>Espanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <span>Apartamento</span>
    <input type="text" name="flat" id="idapm" placeholder="Número do apartamento (opcional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idfz" id="idg5du" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
