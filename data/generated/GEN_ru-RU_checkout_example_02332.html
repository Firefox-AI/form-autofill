<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Фамилия</span>
    <input type="text" name="surname" id="id33326" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="fname" id="id37" placeholder="Введите ваше имя" aria-label="Имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="business" id="idvwr" placeholder="Введите название вашей компании" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="address" id="idmdz7z" placeholder="Введите адрес (улица, дом)" aria-label="Улица и номер дома" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idc3">Город</label>
    <input type="text" name="locality" id="idc3" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idf1">Почтовый индекс</label>
    <input type="text" name="postcode" id="idf1" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Страна
    <select name="country" id="idvqe90" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Другие</option>
</select>
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="idkiw" placeholder="Введите ваш email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="id9xwg">Телефон</label>
    <input type="tel" name="phoneNumber" id="id9xwg" placeholder="Введите номер телефона (например, +7 123 456-78-90)" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
