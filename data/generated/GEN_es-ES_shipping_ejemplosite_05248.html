<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplosite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="name" id="name" placeholder="Juan Pérez" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Calle</span>
    <input type="text" name="street" id="street" placeholder="Gran Vía" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Número</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="45" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Complemento (opcional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso 2, Puerta B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
</select>
  </div>
  <div>
    <span>Nombre (fonético)</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Juan" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <span>Código de país</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+34</option>
  <option>+33</option>
  <option>+49</option>
  <option>+39</option>
  <option>+44</option>
  <option>+1</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
