<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom complet
    <input type="text" name="fullName" id="idx1" placeholder="Entrez votre nom complet" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="street1" id="idu2" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Bâtiment
    <input type="text" name="idrj" id="idjwp" placeholder="Numéro de bâtiment ou nom" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>Ville
    <input type="text" name="city" id="idhqq" placeholder="Votre ville" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="postcode8" id="idg3wt" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Pays
    <select name="countryName" id="idhk6" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Canada</option>
  <option>Luxembourg</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
