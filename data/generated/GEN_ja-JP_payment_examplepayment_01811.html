<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義</span>
    <input type="text" name="cc_name_4980" id="cc_name_2390" placeholder="カードに記載の名前を入力してください" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="cc_number_6247" id="cc_number_7716" placeholder="カード番号を入力してください" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>カードタイプ</span>
    <select name="cc_type_5885" id="cc_type_1377" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="cc_exp_month_6173" id="cc_exp_month_403" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="cc_exp_year_9129" id="cc_exp_year_4927" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>セキュリティコード</span>
    <input type="number" name="cc_csc_7310" id="cc_csc_6690" placeholder="カード裏面の3桁または4桁のコード" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="postal_code_9022" id="postal_code_5941" placeholder="郵便番号を入力してください" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
