<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義</span>
    <input type="text" name="nameOnCard8" id="idexb9" placeholder="カードに記載の名前を入力してください" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="card_number" id="idhe90" placeholder="カード番号を入力してください" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="ccExpMonth" id="idbu" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="ccExpYear1" id="idw36q" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>セキュリティコード</span>
    <input type="number" name="securityCode9" id="id2amg" placeholder="カード裏面の3桁の番号" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードタイプ</span>
    <select name="cardType" id="idrck" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="zip8" id="idcl" placeholder="例: 123-4567" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
