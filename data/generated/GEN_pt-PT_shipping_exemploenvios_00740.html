<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo-envios.pt</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome</label>
    <input type="text" name="name" id="name" placeholder="Seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Rua</label>
    <input type="text" name="street" id="street" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Número</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número da casa ou apartamento" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ex: 1234-567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Concelho</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Concelho onde reside" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Reino Unido</option>
  <option>Alemanha</option>
  <option>Itália</option>
</select>
  </div>
  <div>
    <label for="floor">Andar</label>
    <input type="text" name="floor" id="floor" placeholder="Andar (se aplicável)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="building">Edifício</label>
    <input type="text" name="building" id="building" placeholder="Nome do edifício (se aplicável)" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="addressLevel3">Districto</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Distrito onde reside" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
