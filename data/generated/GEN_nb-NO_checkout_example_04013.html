<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Fornavn</label>
    <input type="text" name="givenName" id="givenName" placeholder="Skriv inn fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Etternavn</label>
    <input type="text" name="familyName" id="familyName" placeholder="Skriv inn etternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Gateadresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Skriv inn adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Adresselinje 2 (valgfritt)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Leilighet, etasje, osv." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Skriv inn by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="email">E-postadresse</label>
    <input type="email" name="email" id="email" placeholder="Skriv inn e-post" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
