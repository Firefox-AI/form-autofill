<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkuan">Nome no cartão</label>
    <input type="text" name="r:r:1:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idkuan" placeholder="Nome completo como no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idi3m">Nome da empresa</label>
    <input type="text" name="r:r:8:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idi3m" placeholder="Nome da sua empresa (se aplicável)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idecb4">Endereço</label>
    <input type="text" name="r:r:6:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idecb4" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idxs9">Complemento</label>
    <input type="text" name="r:r:3:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idxs9" placeholder="Apartamento, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ido0">CEP</label>
    <input type="text" name="r:r:8:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="ido0" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idno">Cidade</label>
    <input type="text" name="r:r:1:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idno" placeholder="Digite a cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idwdkp">Estado</label>
    <select name="r:r:6:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idwdkp" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>São Paulo</option>
  <option>Santa Catarina</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
  </div>
  <div>
    <label for="idhlar">País</label>
    <select name="r:r:8:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idhlar" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
</form>

</fieldset></body></html>
