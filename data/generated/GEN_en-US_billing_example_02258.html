<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

    <select name="idiu" id="idnhws" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>India</option>
  <option>Japan</option>
  <option>Brazil</option>
  <option>South Africa</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
  <option>Russia</option>
</select>
  </div>
  <div>
    <span>Full name (first name and surname)</span>

  </div>
  <div>
    <span>Phone number</span>

  <div>

  <div>

  <div>
    <span>Address line 2 (optional)</span>
    <input type="text" name="idyh6i" id="ide3" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Town/City</span>
    <input type="text" name="id5ek7i" id="iduu69x" placeholder="Springfield" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>County (if applicable)</span>
    <input type="text" name="idzbd5c" id="idkx" placeholder="Cook County" data-moz-autofill-type="address-level1">
  </div>
</form>

</fieldset></body></html>
