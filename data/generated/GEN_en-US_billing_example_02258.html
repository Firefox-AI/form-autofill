<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="country_9805">Country</label>
    <select name="country_796" id="country_9805" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>India</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
  <option>Italy</option>
  <option>Brazil</option>
  <option>Japan</option>
  <option>South Korea</option>
  <option>China</option>
  <option>Russia</option>
  <option>South Africa</option>
</select>
  </div>
  <div>
    <label for="name_5467">Full Name (First and Last Name)</label>
    <input type="text" name="name_2283" id="name_5467" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="tel_3505">Phone Number</label>
    <input type="tel" name="tel_4400" id="tel_3505" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="postal_code_5795">Postcode</label>
    <input type="text" name="postal_code_2078" id="postal_code_5795" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_line1_1637">Address Line 1 (or Company Name)</label>
    <input type="text" name="address_line1_4759" id="address_line1_1637" placeholder="123 Main Street" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="address_line2_4538">Address Line 2 (optional)</label>
    <input type="text" name="address_line2_2606" id="address_line2_4538" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="address_level2_9389">Town/City</label>
    <input type="text" name="address_level2_9115" id="address_level2_9389" placeholder="Springfield" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="address_level1_5693">County (if applicable)</label>
    <input type="text" name="address_level1_5114" id="address_level1_5693" placeholder="Cook County" data-moz-autofill-type="address-level1">
  </div>
</form>

</fieldset></body></html>
