<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Digite o seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Digite o seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="exemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(+351) 912 345 678" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Masculino</option>
  <option>Feminino</option>
  <option>Outro</option>
</select>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Digite uma palavra-passe">
  </div>
</form>

</fieldset></body></html>
