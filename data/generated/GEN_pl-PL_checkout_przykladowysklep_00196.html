<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowysklep.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Imię</label>
    <input type="text" name="givenName" id="givenName" placeholder="Wpisz swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nazwisko</label>
    <input type="text" name="familyName" id="familyName" placeholder="Wpisz swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Ulica i numer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Np. Długa 15" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Mieszkanie / lok.</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Wpisz numer mieszkania" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Np. Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Np. 00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <label for="email">Adres e-mail</label>
    <input type="email" name="email" id="email" placeholder="Wpisz swój e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Np. 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel4">Dzielnica / osiedle</label>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Np. Śródmieście" data-moz-autofill-type="address-level4">
  </div>
  <div>
    <label for="phoneticName">Fonetyczne imię i nazwisko</label>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Jak wymawia się twoje imię nazwisko?" data-moz-autofill-type="phonetic-name">
  </div>
</form>

</fieldset></body></html>
