<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Email Address *</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Phone Number Country Code *</label>
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="Phone Number Country Code *" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <span>Phone Number *</span>
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>First Name *</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name *</label>
    <input type="text" name="familyName" id="familyName" placeholder="Last Name *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Address (Street Name, Type, Number; Floor, Door) *
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
