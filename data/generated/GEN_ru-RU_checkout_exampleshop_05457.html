<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shop.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id200">Имя</label>
    <input type="text" name="fname" id="id200" placeholder="Ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idue">Фамилия</label>
    <input type="text" name="lastName" id="idue" placeholder="Ваша фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5m">Улица и номер дома</label>
    <input type="text" name="street1" id="id5m" placeholder="Введите улицу и номер дома" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id5w">Квартира</label>
    <input type="text" name="unit" id="id5w" placeholder="Квартира (если есть)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idvm7f">Город</label>
    <input type="text" name="locality" id="idvm7f" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idb8l">Почтовый индекс</label>
    <input type="text" name="postcode" id="idb8l" placeholder="Ваш почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idenk7r">Страна</label>
    <select name="country" id="idenk7r" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Армения</option>
  <option>Грузия</option>
  <option>Азербайджан</option>
</select>
  </div>
  <div>
    <label for="idcxk1">Электронная почта</label>
    <input type="email" name="emailAddress" id="idcxk1" placeholder="example@mail.ru" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id0j">Телефон</label>
    <input type="tel" name="phoneNumber" id="id0j" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idjj" id="ida0" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
