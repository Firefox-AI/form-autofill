<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idp1xwo">Ditt namn</label>
    <input type="text" name="contactName" id="idp1xwo" placeholder="För- och efternamn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idxu0f">E-postadress</label>
    <input type="email" name="user_email" id="idxu0f" placeholder="din@exempel.se" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idh0r">Telefonnummer</label>
    <input type="tel" name="mobile" id="idh0r" placeholder="070-123 45 67" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id1ep3">Gatuadress</label>
    <input type="text" name="streetAddress" id="id1ep3" placeholder="Exempelgatan 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idye">Stad</label>
    <input type="text" name="town" id="idye" placeholder="Stad eller kommun" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id5qa">Postnummer</label>
    <input type="text" name="zip_code" id="id5qa" placeholder="123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="id08c" id="id52" type="submit">Skicka meddelande</button>
  </div>
</form>

</fieldset></body></html>
