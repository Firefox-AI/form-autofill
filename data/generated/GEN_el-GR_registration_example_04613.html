<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqlm">Όνομα</label>
    <input type="text" name="firstName" id="idqlm" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idpddk">Επώνυμο</label>
    <input type="text" name="last_name" id="idpddk" placeholder="Πληκτρολογήστε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id26iy">Ψευδώνυμο</label>
    <input type="text" name="displayName" id="id26iy" placeholder="Πληκτρολογήστε το ψευδώνυμό σας (προαιρετικό)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="id4uuod">Διεύθυνση email</label>
    <input type="email" name="emailAddress5" id="id4uuod" placeholder="Πληκτρολογήστε το email σας" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idkiq5">Τηλέφωνο</label>
    <input type="tel" name="tel" id="idkiq5" placeholder="Πληκτρολογήστε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id2mly9">Ημερομηνία γέννησης</label>
    <input type="text" name="birthday5" id="id2mly9" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="id2tv">Οργανισμός (αν υπάρχει)</label>
    <input type="text" name="company" id="id2tv" placeholder="Πληκτρολογήστε το όνομα της επιχείρησης σας (προαιρετικό)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="idgxfr6" id="id167" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
