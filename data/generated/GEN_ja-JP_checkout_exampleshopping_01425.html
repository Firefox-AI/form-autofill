<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shopping.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idnz2">名</label>
    <input type="text" name="firstName" id="idnz2" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id3zqq8">姓</label>
    <input type="text" name="lname" id="id3zqq8" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idjnr">住所（番地まで）</label>
    <input type="text" name="addressLine1" id="idjnr" placeholder="例：1-2-3" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfaw">住所（建物名など）</label>
    <input type="text" name="street2" id="idfaw" placeholder="例：東京ビル101" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idksad">市区町村</label>
    <input type="text" name="city" id="idksad" placeholder="例：新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id2f3">郵便番号</label>
    <input type="text" name="postalCode" id="id2f3" placeholder="例：160-0022" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idap">国</label>
    <select name="countryName" id="idap" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>イギリス</option>
  <option>カナダ</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="idmuxiy">メールアドレス</label>
    <input type="email" name="user_email" id="idmuxiy" placeholder="例：example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idhpc3b">電話番号</label>
    <input type="tel" name="mobile" id="idhpc3b" placeholder="例：090-1234-5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
