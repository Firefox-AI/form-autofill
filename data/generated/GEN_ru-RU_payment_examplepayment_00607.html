<html><head>

<body>

<fieldset>
<h3>examplepayment.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>
    <label for="id11n93">Номер карты</label>

  </div>
  <div>
    <label for="idef7u">Месяц истечения</label>
    <select name="expMonth" id="idef7u" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id4l0pj">Год истечения</label>
    <select name="exp_year" id="id4l0pj" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id598dj">Код безопасности</label>
    <input type="number" name="cvc" id="id598dj" placeholder="xxx" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id2qyy">Тип карты</label>
    <select name="ccType" id="id2qyy" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
  <option>American Express</option>
</select>
  </div>
  <div>
    <button name="id8pz1f" id="id40h" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
