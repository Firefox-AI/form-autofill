<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Имя владельца карты</label>
    <input type="text" name="ccName" id="ccName" placeholder="Как на карте" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Номер карты</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="xxxx xxxx xxxx xxxx" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Месяц истечения</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Год истечения</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Код безопасности</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="xxx" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Тип карты</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
  <option>American Express</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
