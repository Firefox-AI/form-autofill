<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellidos</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Segundo nombre</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Introduce tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Apodo</label>
    <input type="text" name="nickname" id="nickname" placeholder="Introduce tu apodo (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="ejemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organización</label>
    <input type="text" name="organization" id="organization" placeholder="Introduce el nombre de tu organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Fecha de nacimiento</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="field">Contraseña</label>
    <input type="password" name="field" id="field" placeholder="Introduce tu contraseña">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
