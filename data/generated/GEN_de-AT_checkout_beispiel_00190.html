<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="z.B. Hauptstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Ungarn</option>
  <option>Tschechische Republik</option>
  <option>Italien</option>
  <option>Slowakei</option>
  <option>Slowenien</option>
  <option>Frankreich</option>
  <option>Vereinigtes Königreich</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
