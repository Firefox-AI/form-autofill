<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nimi</label>
    <input type="text" name="name" id="name" placeholder="Etunimesi ja sukunimesi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Katuosoite</label>
    <input type="text" name="street" id="street" placeholder="Katuosoite" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Osoitenumero</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Osoitenumero" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Lisätietoja</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esim. Huoneisto tai kerros" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" aria-label="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupunki" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
</select>
  </div>
  <div>
    <label>Viitepiste
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Esim. Lähin kauppa tai risteys" data-moz-autofill-type="reference-point">
    </label>
  </div>
</form>

</fieldset></body></html>
