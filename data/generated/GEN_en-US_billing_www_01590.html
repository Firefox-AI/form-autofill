<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.examplepayments.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Cardholder Name</span>
    <input type="text" name="cardName" id="idee2" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Card Number</span>
    <input type="number" name="cardNumber" id="idbx" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Expiration Month</span>
    <select name="ccExpMonth" id="idt0d" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - January</option>
  <option>02 - February</option>
  <option>03 - March</option>
  <option>04 - April</option>
  <option>05 - May</option>
  <option>06 - June</option>
  <option>07 - July</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - October</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <span>Expiration Year</span>
    <select name="expYear" id="idugp" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="cardCode" id="idwh1" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Country</span>
    <select name="country" id="idb605a" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Japan</option>
  <option>China</option>
  <option>India</option>
  <option>Brazil</option>
</select>
  </div>
  <div>
    <span>Street Address</span>
    <input type="text" name="addr1" id="idvsdk" placeholder="123 Main St, P.O. Box, Company Name, c/o" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apartment, Suite, Unit</span>
    <input type="text" name="addr2" id="id6vn" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="city" id="idkn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>State</span>
    <select name="stateProvince" id="id1snev" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <span>Zip Code</span>
    <input type="number" name="zipCode" id="idft" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="phone" id="id7h" placeholder="(555) 555-5555" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
