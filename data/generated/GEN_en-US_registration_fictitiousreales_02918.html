<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitiousrealestate.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code*" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressHousenumber">House number or name</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <select name="addressLookup" id="addressLookup" aria-label="Select your address" data-moz-autofill-type="address-lookup">
  <option value=""></option>
  <option>123 Main St, Anytown, USA</option>
  <option>456 Elm St, Anytown, USA</option>
  <option>789 Maple Ave, Anytown, USA</option>
</select>
  </div>
  <div>
    <label>Street Address*
    <input type="text" name="addressLine1" id="addressLine1" placeholder="e.g., 1234 Main Street" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label for="addressLine2">Apartment, Suite, etc.</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City*</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City*" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="country">Country*</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <label for="postalCode">ZIP Code*</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="ZIP Code*" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
