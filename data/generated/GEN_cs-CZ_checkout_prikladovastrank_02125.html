<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>prikladova-stranka.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Jméno</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Příjmení</label>
    <input type="text" name="familyName" id="familyName" placeholder="Vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Ulice a číslo popisné</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Například: Hlavní 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Dodatečné informace</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Byt, patro apod. (volitelné)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Město</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vaše město" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">PSČ</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Například: 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Země</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
</select>
  </div>
  <div>
    <label for="email">E-mailová adresa</label>
    <input type="email" name="email" id="email" placeholder="Váš e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="Například: +420 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
