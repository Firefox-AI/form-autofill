<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Vul de naam in zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Adres
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Vul uw straat en huisnummer in" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Adresregel 2
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optionele extra adresinformatie" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Bijv. 1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw woonplaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Provincie" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Groningen</option>
  <option>Friesland</option>
  <option>Drenthe</option>
  <option>Overijssel</option>
  <option>Flevoland</option>
  <option>Gelderland</option>
  <option>Utrecht</option>
  <option>Noord-Holland</option>
  <option>Zuid-Holland</option>
  <option>Zeeland</option>
  <option>Noord-Brabant</option>
  <option>Limburg</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Andere</option>
</select>
  </div>
  <div>
    <label for="organization">Bedrijfsnaam</label>
    <input type="text" name="organization" id="organization" placeholder="Vul uw bedrijfsnaam in (indien van toepassing)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label>Extra informatie
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Bijv. appartement of verdieping" data-moz-autofill-type="address-extra">
    </label>
  </div>
</form>

</fieldset></body></html>
