<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom de famille</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.fr" aria-label="Adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label for="bday">Date de naissance</label>
    <input type="text" name="bday" id="bday" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nom de votre entreprise" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Numéro de votre bâtiment" aria-label="Numéro de bâtiment" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="field">Mot de passe</label>
    <input type="password" name="field" id="field" placeholder="Créez un mot de passe">
  </div>
</form>

</fieldset></body></html>
