<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Sobrenome</span>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Apelido</span>
    <input type="text" name="nickname" id="nickname" placeholder="Como você gostaria de ser chamado?" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="email" id="email" placeholder="seuemail@exemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefone</span>
    <input type="tel" name="tel" id="tel" placeholder="(11) 91234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Data de nascimento</span>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Empresa (opcional)</span>
    <input type="text" name="organization" id="organization" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
