<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivsite.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Namn</span>
    <input type="text" name="yourName" id="idzuff" placeholder="För- och efternamn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Gatuadress</span>
    <input type="text" name="address1" id="id4peh" placeholder="Exempelgatan 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Lägenhet, våning, etc.</span>
    <input type="text" name="addr2" id="idfu" placeholder="Lägenhet 2B (valfritt)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip" id="idb39i" placeholder="Ex. 123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="town" id="id55" placeholder="Ange din stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="id5wpo0" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <button name="id129qy" id="idahla" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
