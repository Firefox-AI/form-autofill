<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Ім&#x27;я</label>
    <input type="text" name="givenName" id="givenName" placeholder="Ваше ім&#x27;я" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Прізвище</label>
    <input type="text" name="familyName" id="familyName" placeholder="Ваше прізвище" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">По батькові</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Ваше по батькові (не обов&#x27;язково)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Псевдонім</label>
    <input type="text" name="nickname" id="nickname" placeholder="Ваш псевдонім (не обов&#x27;язково)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Електронна пошта</label>
    <input type="email" name="email" id="email" placeholder="example@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="Ваш номер телефону" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Організація</label>
    <input type="text" name="organization" id="organization" placeholder="Назва вашої організації (не обов&#x27;язково)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Дата народження</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Січень</option>
  <option>Лютий</option>
  <option>Березень</option>
  <option>Квітень</option>
  <option>Травень</option>
  <option>Червень</option>
  <option>Липень</option>
  <option>Серпень</option>
  <option>Вересень</option>
  <option>Жовтень</option>
  <option>Листопад</option>
  <option>Грудень</option>
</select>
  </div>
  <div>
    <label for="phoneticGivenName">Фонетичне ім&#x27;я</label>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Ваше фонетичне ім&#x27;я (не обов&#x27;язково)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label for="field">Пароль</label>
    <input type="password" name="field" id="field" placeholder="Ваш пароль">
  </div>
</form>

</fieldset></body></html>
