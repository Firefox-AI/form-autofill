<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalingsside.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzdw">Navn på kortet</label>
    <input type="text" name="ccName" id="idzdw" placeholder="Fuldstændigt navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id7w8o">Kortnummer</label>
    <input type="number" name="ccNumber" id="id7w8o" placeholder="Kortnummer (16 cifre)" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idja">Udløbs måned</label>
    <select name="expMonth" id="idja" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="id6f">Udløbs år</label>
    <select name="expYear" id="id6f" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idkt">Sikkerhedskode (CVV)</label>
    <input type="number" name="cardCode" id="idkt" placeholder="3 cifre på bagsiden af kortet" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idu7zu5">Korttype</label>
    <select name="cardType" id="idu7zu5" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="id3h" id="idg7gvt" type="submit">Betal</button>
  </div>
</form>

</fieldset></body></html>
