<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>お名前
    <input type="text" name="name" id="name" placeholder="例: 山田 太郎" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>建物名・部屋番号
    <input type="text" name="addressLine2" id="addressLine2" placeholder="例: サンプルマンション101" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>アパート名
    <input type="text" name="apartment" id="apartment" placeholder="アパート名を入力してください（任意）" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>番地
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="例: 1-2-3" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>町名
    <input type="text" name="street" id="street" placeholder="例: 銀座" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>市区町村
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="例: 中央区" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>郵便番号
    <input type="text" name="postalCode" id="postalCode" placeholder="例: 104-0061" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>国
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
