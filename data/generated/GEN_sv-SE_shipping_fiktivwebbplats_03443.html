<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivwebbplats.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Namn</span>
    <input type="text" name="name" id="name" placeholder="För- och efternamn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Gata</span>
    <input type="text" name="street" id="street" placeholder="Gatuadress" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Husnummer</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Nummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Adressrad 2 (valfritt)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="T.ex. lägenhetsnummer" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Finland</option>
  <option>Norge</option>
  <option>Danmark</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Våning (valfritt)</span>
    <input type="text" name="floor" id="floor" placeholder="Våningsnummer" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Distrikt (valfritt)</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Distrikt" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Fonetik namn (valfritt)</span>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Såsom det låter" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Skicka</button>
  </div>
</form>

</fieldset></body></html>
