<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-store.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idwgov6">Card Type</label>
    <select name="r:r:3:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idwgov6" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idqjz6">Card Number</label>
    <input type="number" name="r:r:4:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idqjz6" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idco">Expiration Month</label>
    <select name="r:r:7:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idco" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - January</option>
  <option>02 - February</option>
  <option>03 - March</option>
  <option>04 - April</option>
  <option>05 - May</option>
  <option>06 - June</option>
  <option>07 - July</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - October</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <label for="id3lb">Expiration Year</label>
    <select name="r:r:8:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="id3lb" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idkz">Full Name</label>
    <input type="text" name="r:r:4:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idkz" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idt3u">Street Address</label>
    <input type="text" name="r:r:7:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idt3u" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id6q5">Apt, Suite, Bldg (optional)</label>
    <input type="text" name="r:r:7:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="id6q5" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idkfhla">City</label>
    <input type="text" name="r:r:2:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idkfhla" placeholder="Los Angeles" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idd8i5f">State</label>
    <select name="r:r:2:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idd8i5f" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idjj81">ZIP Code</label>
    <input type="text" name="r:r:5:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idjj81" placeholder="90001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idof1">Phone Number</label>
    <input type="tel" name="r:r:2:m:r:11:cr:3:c:pr:1:container:fs:i:input" id="idof1" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idne94h">Email Address</label>
    <input type="email" name="r:r:6:m:r:12:cr:1:c:pr:1:container:fs:i:input" id="idne94h" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
