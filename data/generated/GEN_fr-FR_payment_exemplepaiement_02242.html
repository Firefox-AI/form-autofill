<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplepaiement.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom sur la carte</span>
    <input type="text" name="ccName" id="ccName" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numéro de la carte</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mois d&#x27;expiration</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janv</option>
  <option>02 - Fév</option>
  <option>03 - Mar</option>
  <option>04 - Avr</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juil</option>
  <option>08 - Août</option>
  <option>09 - Sep</option>
  <option>10 - Oct</option>
  <option>11 - Nov</option>
  <option>12 - Déc</option>
</select>
  </div>
  <div>
    <span>Année d&#x27;expiration</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Code de sécurité (CVV)</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Type de carte</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
