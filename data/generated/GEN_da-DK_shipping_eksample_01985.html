<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksample.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn
    <input type="text" name="contactName" id="idehx" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="addr1" id="id80" placeholder="Gadenavn og husnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postcode" id="idc9" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="city" id="idzzt" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country" id="idy4cd" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannien</option>
  <option>Frankrig</option>
  <option>Spanien</option>
  <option>USA</option>
</select>
    </label>
  </div>
  <div>
    <label>Evt. lejlighed
    <input type="text" name="address2" id="idvf" placeholder="Lejlighedsnummer eller etage" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Etage
    <input type="text" name="floor" id="id6l621" placeholder="Indtast etage (hvis relevant)" data-moz-autofill-type="floor">
    </label>
  </div>
</form>

</fieldset></body></html>
