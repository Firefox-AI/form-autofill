<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome completo
    <input type="text" name="name" id="name" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Rua
    <input type="text" name="street" id="street" placeholder="Nome da rua" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Número
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número da casa ou apartamento" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Complemento
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, bloco, etc." data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>CEP
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Cidade
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Cidade" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>País
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Uruguai</option>
  <option>Colômbia</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
