<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="idok" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Cognome</span>
    <input type="text" name="surname" id="id14je" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nome secondario</span>
    <input type="text" name="mname" id="idyfgjg" placeholder="Inserisci un nome aggiuntivo (facoltativo)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Soprannome</span>
    <input type="text" name="displayName" id="id5h" placeholder="Inserisci il tuo soprannome (facoltativo)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email_address" id="id3m" placeholder="Inserisci il tuo indirizzo email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="telephone" id="id94" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organizzazione</span>
    <input type="text" name="business" id="id5hd" placeholder="Inserisci il nome della tua organizzazione (facoltativo)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Data di nascita</span>
    <input type="text" name="dob" id="idp4bfh" placeholder="Seleziona la tua data di nascita" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Nome fonetico</span>
    <input type="text" name="id5a7" id="id3bd" placeholder="Inserisci il tuo nome fonetico (facoltativo)" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
