<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Cognome</span>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nome secondario</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Inserisci un eventuale nome secondario" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Soprannome</span>
    <input type="text" name="nickname" id="nickname" placeholder="Inserisci un soprannome (se desiderato)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Indirizzo email</span>
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numero di telefono</span>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organizzazione</span>
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;organizzazione (se applicabile)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Data di nascita</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Nome fonetico</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Inserisci il nome pronunziato" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
