<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fizetesek.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idul">Kártyatulajdonos neve</label>
    <input type="text" name="ccName" id="idul" placeholder="Írd be a kártyatulajdonos nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idebpg1">Kártyaszám</label>

  </div>
  <div>
    <label for="ido3if0">Lejárati hónap</label>
    <select name="expMonth" id="ido3if0" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idgk">Lejárati év</label>
    <select name="ccExpYear4" id="idgk" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="idrdd">CVC kód</label>
    <input type="number" name="csc" id="idrdd" placeholder="Írd be a CVC kódot" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idr40t">Kártyatípus</label>
    <select name="ccType" id="idr40t" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <label for="iddlr4">Irányítószám</label>
    <input type="text" name="postcode" id="iddlr4" placeholder="Írd be az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idjlj3e">Város</label>
    <input type="text" name="suburb" id="idjlj3e" placeholder="Írd be a város nevét" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="idp8m" id="idce" type="submit">Fizetés</button>
  </div>
</form>

</fieldset></body></html>
