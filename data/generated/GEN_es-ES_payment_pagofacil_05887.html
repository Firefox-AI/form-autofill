<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagofacil.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre del titular de la tarjeta
    <input type="text" name="idbp" id="idy06nb" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Número de tarjeta
    <input type="number" name="iduvw" id="id2832f" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Mes de expiración
    <select name="idwk" id="idldusy" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Año de expiración
    <select name="idwlz2e" id="idf62d" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
    </label>
  </div>
  <div>
    <label>Código de seguridad
    <input type="number" name="idemo" id="idppv7o" placeholder="XXX" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Tipo de tarjeta
    <select name="idohu" id="idwi" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="idc8bx" id="id6i3h" placeholder="Calle, número, piso" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Referencia (opcional)
    <input type="text" name="idv54" id="idbp" placeholder="Ej. Al lado de la farmacia" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Nombre (fonético)
    <input type="text" name="id5ib" id="idi4rni" placeholder="Pronunciación del nombre" data-moz-autofill-type="phonetic-given-name">
    </label>
  </div>
</form>

</fieldset></body></html>
