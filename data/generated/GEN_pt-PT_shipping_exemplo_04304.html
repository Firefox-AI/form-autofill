<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name_7071">Nome completo</label>
    <input type="text" name="name_8240" id="name_7071" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="phonetic_given_name_4960">Nome (fonético)</label>
    <input type="text" name="phonetic_given_name_188" id="phonetic_given_name_4960" placeholder="Como pronunciar seu nome" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label for="street_4819">Rua</label>
    <input type="text" name="street_5063" id="street_4819" placeholder="Rua ou Avenida" data-moz-autofill-type="street">

  <div>
    <label for="address_housenumber_3296">Número</label>
    <input type="text" name="address_housenumber_5724" id="address_housenumber_3296" placeholder="Número da casa ou apartamento" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="address_line2_7219">Complemento</label>
    <input type="text" name="address_line2_2296" id="address_line2_7219" placeholder="Apartamento, bloco, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postal_code_2982">Código Postal</label>
    <input type="text" name="postal_code_4250" id="postal_code_2982" placeholder="Código Postal (ex: 1234-567)" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_level2_6554">Cidade</label>
    <input type="text" name="address_level2_8434" id="address_level2_6554" placeholder="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="country_name_9824">País</label>
    <select name="country_name_9313" id="country_name_9824" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Brasil</option>
  <option>Angola</option>
  <option>Moçambique</option>
  <option>Cabo Verde</option>
</select>
  </div>
  <div>
    <label for="apartment_7630">Apartamento</label>
    <input type="text" name="apartment_4912" id="apartment_7630" placeholder="Número do apartamento (se aplicável)" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
