<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple-site.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Adresse e-mail
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Date de naissance
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Organisation
    <input type="text" name="organization" id="organization" placeholder="Votre organisation (facultatif)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Surnom
    <input type="text" name="nickname" id="nickname" placeholder="Votre surnom (facultatif)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">S&#x27;inscrire</button>
  </div>
</form>

</fieldset></body></html>
