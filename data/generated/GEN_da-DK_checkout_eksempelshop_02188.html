<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempelshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="fname" id="idd7" placeholder="Indtast dit fornavn" aria-label="Fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Efternavn
    <input type="text" name="surname" id="id45l" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <input type="text" name="addr1" id="idm4" placeholder="F.eks. Støberigade 12" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label>Supplerende adresse
    <input type="text" name="addr2" id="idph59" placeholder="F.eks. Lejlighed 3" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label for="id2ma5q">By</label>
    <input type="text" name="locality" id="id2ma5q" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postcode" id="idcpjr" placeholder="Indtast postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="idn5z3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <input type="email" name="emailAddress" id="idnpg" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="id0ho" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
