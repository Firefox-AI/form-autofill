<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="ccName" id="idrn7" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Ulica i numer
    <input type="text" name="addr1" id="idrns89" placeholder="ul. Królewska 12" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Miejscowość
    <input type="text" name="town" id="idagnh" placeholder="Warszawa" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="postalCode" id="idzgu7" placeholder="00-001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Województwo
    <select name="province" id="id8v" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Zachodniopomorskie</option>
  <option>Pomorskie</option>
  <option>Mazowieckie</option>
  <option>Małopolskie</option>
  <option>Wielkopolskie</option>
  <option>Śląskie</option>
  <option>Dolnośląskie</option>
  <option>Lubusz</option>
  <option>Lubusz</option>
  <option>Opolskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Warmińsko-Mazurskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Świętokrzyskie</option>
  <option>Łódzkie</option>
</select>
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="countryName" id="id5f" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Wielka Brytania</option>
  <option>Włochy</option>
  <option>USA</option>
</select>
    </label>
  </div>
  <div>
    <label>Dodatkowe informacje
    <input type="text" name="addr2" id="idpodn3" placeholder="np. mieszkanie 3B" data-moz-autofill-type="address-line2">
    </label>
  </div>
</form>

</fieldset></body></html>
