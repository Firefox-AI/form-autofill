<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idmjmn">Ім’я на картці</label>
    <input type="text" name="cardholderName1" id="idmjmn" placeholder="Введіть ім’я на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id38rh">Вулиця</label>
    <input type="text" name="address1" id="id38rh" placeholder="Вулиця, номер будинку" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id9yh">Квартира</label>
    <input type="text" name="addressLine2" id="id9yh" placeholder="Квартира, офіс (необов&#x27;язково)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="iddub8">Поштовий індекс</label>
    <input type="text" name="postcode" id="iddub8" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvp">Область</label>
    <select name="state" id="idvp" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Одеська</option>
  <option>Львівська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
  <option>Запорізька</option>
</select>
  </div>
  <div>
    <label for="idzr9nb">Місто</label>
    <input type="text" name="town" id="idzr9nb" placeholder="Введіть місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyf0z">Країна</label>
    <select name="countryName" id="idyf0z" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Румунія</option>
  <option>Угорщина</option>
</select>
  </div>
  <div>
    <label for="id8os9">Телефон</label>
    <input type="tel" name="phoneNumber" id="id8os9" placeholder="Введіть номер телефону" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
