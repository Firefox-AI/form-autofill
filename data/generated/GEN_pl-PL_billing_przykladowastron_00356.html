<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="cardholderName" id="id6it" placeholder="Wprowadź swoje imię i nazwisko" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Nazwa firmy</span>
    <input type="text" name="companyName" id="idiea" placeholder="Wprowadź nazwę firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ulica i numer</span>
    <input type="text" name="addressLine1" id="id2vqh" placeholder="Wprowadź ulicę i numer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Dodatkowe informacje</span>
    <input type="text" name="street2" id="idzr" placeholder="Mieszkanie, blok, itp. (opcjonalnie)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="zip" id="id74ni7" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="town" id="idcyf" placeholder="Wprowadź miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Województwo</span>
    <select name="state" id="id41" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Dolnośląskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Lubusz</option>
  <option>Łódzkie</option>
  <option>Małopolskie</option>
  <option>Mazowieckie</option>
  <option>Opolskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Pomorskie</option>
  <option>Śląskie</option>
  <option>Świętokrzyskie</option>
  <option>Warmińsko-Mazurskie</option>
  <option>Wielkopolskie</option>
  <option>Zachodniopomorskie</option>
</select>
  </div>
  <div>
    <span>Kraj</span>
    <select name="country" id="idxfq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Wielka Brytania</option>
  <option>Stany Zjednoczone</option>
</select>
  </div>
  <div>
    <span>Numer VAT</span>
    <input type="text" name="vatNumber" id="idnqck" placeholder="Wprowadź numer VAT" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idoh" id="idvk96" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
