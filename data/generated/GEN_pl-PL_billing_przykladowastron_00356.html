<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="ccName" id="ccName" placeholder="Wpisz swoje imię i nazwisko" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Ulica i numer</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulica i numer domu" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Mieszkanie/kompleks</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Mieszkanie, jeśli dotyczy" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Wpisz kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wpisz nazwę miasta" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Województwo</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Dolnośląskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Lubusz</option>
  <option>Łódzkie</option>
  <option>Małopolskie</option>
  <option>Mazowieckie</option>
  <option>Opolskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Pomorskie</option>
  <option>Śląskie</option>
  <option>Świętokrzyskie</option>
  <option>Warmińsko-Mazurskie</option>
  <option>Wielkopolskie</option>
  <option>Zachodniopomorskie</option>
</select>
  </div>
  <div>
    <span>Kraj</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bułgaria</option>
  <option>Chorwacja</option>
  <option>Cypr</option>
  <option>Czechy</option>
  <option>Dania</option>
  <option>Estonia</option>
  <option>Finlandia</option>
  <option>Francja</option>
  <option>Grecja</option>
  <option>Hiszpania</option>
  <option>Holandia</option>
  <option>Irlandia</option>
  <option>Litwa</option>
  <option>Łotwa</option>
  <option>Niemcy</option>
  <option>Portugalia</option>
  <option>Słowacja</option>
  <option>Słowenia</option>
  <option>Szwecja</option>
  <option>Węgry</option>
  <option>Wielka Brytania</option>
</select>
  </div>
  <div>
    <span>Numer NIP</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Wpisz swój numer NIP" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Nazwa firmy</span>
    <input type="text" name="organization" id="organization" placeholder="Wpisz nazwę firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Numer piętra</span>
    <input type="text" name="floor" id="floor" placeholder="Wpisz numer piętra, jeśli dotyczy" data-moz-autofill-type="floor">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
