<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvsr7">Name auf der Kreditkarte</label>
    <input type="text" name="r:r:5:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idvsr7" placeholder="Vor- und Nachname" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idxt">Straße und Hausnummer</label>
    <input type="text" name="r:r:7:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idxt" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="iddn">Postleitzahl</label>
    <input type="text" name="r:r:3:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="iddn" placeholder="A-1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id62v">Stadt</label>
    <input type="text" name="r:r:3:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="id62v" placeholder="Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idbd">Bundesland</label>
    <select name="r:r:9:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="idbd" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <label for="idv7">Land</label>
    <select name="r:r:1:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idv7" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Vereinigtes Königreich</option>
  <option>Spanien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="id37rh">Umsatzsteuer-Identifikationsnummer</label>
    <input type="text" name="r:r:5:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id37rh" placeholder="ATU12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="ids6c">Monat der Gründung</label>
    <select name="r:r:9:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="ids6c" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="idrdk">Identifikationsnummer</label>
    <input type="text" name="r:r:4:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idrdk" placeholder="123456789" data-moz-autofill-type="id-number">
  </div>
  <div>
    <button name="r:r:5:m:r:10:cr:3:c:pr:1:container:fs:i:input" id="idl52v" type="submit">Absenden</button>
  </div>
</form>

</fieldset></body></html>
