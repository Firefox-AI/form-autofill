<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivebank.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Vollständiger Name</label>
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Kreditkartennummer</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccNumber">Zahlungskartennummer</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccName">Name auf der Karte</label>
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccExpMonth">Ablaufmonat</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Ablaufjahr</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Sicherheitscode (CVV)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
