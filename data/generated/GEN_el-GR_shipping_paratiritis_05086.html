<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paratiritis.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="contactName" id="idre2v" placeholder="Πλήρες όνομα" aria-label="Όνομα και επώνυμο" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressLine1" id="idtn" placeholder="Οδός και αριθμός" aria-label="Διεύθυνση" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="zip" id="id0gk" placeholder="Χρησιμοποιήστε τον ταχυδρομικό σας κώδικα" aria-label="Ταχυδρομικός κώδικας" data-moz-autofill-type="postal-code">

  <div>
    <input type="text" name="city" id="id3k" placeholder="Περιοχή ή πόλη" aria-label="Περιοχή" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="idgtsg" aria-label="Χώρα" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γαλλία</option>
  <option>Γερμανία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
</select>
  </div>
  <div>
    <input type="text" name="id3w8" id="idn9zd" placeholder="Αριθμός κτιρίου ή όνομα" aria-label="Κτίριο" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="district" id="idxt" placeholder="Γειτονιά ή περιοχή" aria-label="Γειτονιά" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
