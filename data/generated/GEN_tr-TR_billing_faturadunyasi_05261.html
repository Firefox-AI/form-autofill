<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>faturadunyasi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="organization" id="organization" placeholder="Şirket adınızı girin" aria-label="Şirketin Adı" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Adınız ve soyadınız" aria-label="Kart Üstünde Yazılı İsim" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak ve kapı numarası" aria-label="Sokak Adresi" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartman / Daire numarası" aria-label="Ekstra Adres Bilgisi (Opsiyonel)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" aria-label="Posta Kodu" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" aria-label="İlçe" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Kadıköy</option>
  <option>Şişli</option>
  <option>Beşiktaş</option>
  <option>Beyoğlu</option>
  <option>Üsküdar</option>
</select>
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="İl" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>İstanbul</option>
  <option>Ankara</option>
  <option>İzmir</option>
  <option>Bursa</option>
  <option>Antalya</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Ülke" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İtalya</option>
  <option>İngiltere</option>
</select>
  </div>
</form>

</fieldset></body></html>
