<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-delivery.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="tel">Mobile Phone (For delivery updates)</label>
    <input type="tel" name="tel" id="tel" placeholder="(555) 555-5555" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLookup">Search for your address</label>
    <input type="text" name="addressLookup" id="addressLookup" placeholder="Enter your address details" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="addressLine1">Street Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apartment, suite, etc. (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">State</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="postalCode">ZIP Code</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
