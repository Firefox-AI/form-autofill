<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="email">Hello! What can we help you with?</label>
    <input type="email" name="email" id="email" placeholder="Your email address" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="street">Address</label>
    <input type="text" name="street" id="street" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressStreetname">Street Name *</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Enter street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Enter house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your town or city" aria-label="Town/City *" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">County *</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="Enter your county" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="postalCode">Postcode *</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Enter the name of your neighbourhood" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
