<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id9m">Kaartnaam</label>
    <input type="text" name="cardholderName" id="id9m" placeholder="Naam zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idxe9">Kaartnummer</label>
    <input type="number" name="cardNumber" id="idxe9" placeholder="Vul je kaartnummer in" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idpa2">Vervaldatum maand</label>
    <select name="ccExpMonth" id="idpa2" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Maart</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idfw">Vervaldatum jaar</label>
    <select name="exp_year" id="idfw" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="iduv30">CVC</label>
    <input type="number" name="csc" id="iduv30" placeholder="Vul de 3 cijfers in op de achterkant" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id98m">Kaarttype</label>
    <select name="ccType" id="id98m" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <label for="idnjxd">Adres</label>
    <input type="text" name="streetAddress" id="idnjxd" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
