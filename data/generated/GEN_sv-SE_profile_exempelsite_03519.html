<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempelsite.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Förnamn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Ditt förnamn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternamn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Ditt efternamn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Mellannamn</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Ditt mellannamn (om tillämpligt)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Smeknamn</span>
    <input type="text" name="nickname" id="nickname" placeholder="Ditt smeknamn (om du har något)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-post</span>
    <input type="email" name="email" id="email" placeholder="din.email@exempel.se" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Ditt telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation</span>
    <input type="text" name="organization" id="organization" placeholder="Din organisation (om tillämpligt)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Födelsedatum</span>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Mars</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augusti</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <span>Befattning</span>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Din befattning (om tillämpligt)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Block</span>
    <input type="text" name="block" id="block" placeholder="Ange block (om tillämpligt)" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">Skicka</button>
  </div>
</form>

</fieldset></body></html>
