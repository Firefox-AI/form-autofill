<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificPrefix">Aanhef</label>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Dhr.</option>
  <option>Mevr.</option>
  <option>Dr.</option>
  <option>Prof.</option>
</select>
  </div>
  <div>
    <label for="givenName">Voornaam</label>
    <input type="text" name="givenName" id="givenName" placeholder="Voer je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Achternaam</label>
    <input type="text" name="familyName" id="familyName" placeholder="Voer je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Straat</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Toevoeging</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. appartement of verdieping (optioneel)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Stad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Voer je stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
</select>
  </div>
  <div>
    <label for="email">E-mailadres</label>
    <input type="email" name="email" id="email" placeholder="jouw@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefoonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="06-12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
