<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name</span>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail-Adresse" aria-label="E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
