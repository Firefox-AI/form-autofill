<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name</span>
    <input type="text" name="contactName" id="idlbwe" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-Mail</span>
    <input type="email" name="user_email" id="id0e" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idrk">Telefonnummer</label>
    <input type="tel" name="telephone" id="idrk" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="street" id="idfilj" placeholder="Straße und Hausnummer" aria-label="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <select name="city" id="idnkbh" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
</select>
  </div>
  <div>
    <label for="idkd7">Postleitzahl</label>
    <input type="text" name="postcode" id="idkd7" placeholder="Ihre Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
