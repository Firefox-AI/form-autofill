</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id32h">Email Address</label>
    <input type="email" name="email" id="id32h" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idh8">First Name</label>
    <input type="text" name="first_name" id="idh8" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id6a3">Last Name</label>
    <input type="text" name="lastName" id="id6a3" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idlcio">Street Name</label>
    <input type="text" name="street6" id="idlcio" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idnuhw">House Number</label>
    <input type="text" name="houseNumber3" id="idnuhw" placeholder="Enter your house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idat8">Postcode</label>
