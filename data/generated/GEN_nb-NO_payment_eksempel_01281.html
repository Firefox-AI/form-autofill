<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="idq1" placeholder="Skriv inn fullt navn" aria-label="Navn på kortholder" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNumber6" id="idq6c" placeholder="XXXX-XXXX-XXXX-XXXX" aria-label="Kortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="expMonth" id="idng" aria-label="Utløpsmåned" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Januar</option>
  <option>02 - Februar</option>
  <option>03 - Mars</option>
  <option>04 - April</option>
  <option>05 - Mai</option>
  <option>06 - Juni</option>
  <option>07 - Juli</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - Oktober</option>
  <option>11 - November</option>
  <option>12 - Desember</option>
</select>
  </div>
  <div>
    <select name="expYear3" id="idp19m" aria-label="Utløpsår" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="cvc5" id="idvw" placeholder="3 eller 4 sifre" aria-label="Sikkerhetskode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idrzi" aria-label="Korttype" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="address2" id="idd38mx" placeholder="Gate, husnummer, evt. leilighetsnummer" aria-label="Gateadresse" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
