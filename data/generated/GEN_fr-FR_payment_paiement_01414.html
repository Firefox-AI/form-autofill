<body>

<fieldset>
<h3>paiement.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtsh">Nom sur la carte</label>
    <input type="text" name="r:r:1:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idtsh" placeholder="Entrer le nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">

  </div>
  <div>
    <label for="id9t">Type de carte</label>

  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>

  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <label for="idizmq">Année d&#x27;expiration</label>
    <select name="r:r:4:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idizmq" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ids6">Code de sécurité</label>
    <input type="number" name="r:r:1:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="ids6" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
</form>
