<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkkisivusto.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nimi
    <input type="text" name="yourName" id="idzp" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Osoite
    <input type="text" name="address1" id="id4e7sa" placeholder="Katuosoite ja talon numero" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Rakennus
    <input type="text" name="iddmge" id="idsn2" placeholder="Rakennuksen nimi tai lisätiedot" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>Kaupunki
    <input type="text" name="town" id="idifb" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postinumero
    <input type="text" name="zip_code" id="idn0lou" placeholder="Postinumero" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Maa
    <select name="countryName" id="idb8" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
