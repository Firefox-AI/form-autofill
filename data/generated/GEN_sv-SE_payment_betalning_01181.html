<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalning.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="id2y5i" placeholder="Skriv ditt namn här" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kortnummer</span>
    <input type="number" name="cardNo" id="ido6kto" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Utgångsmånad</span>
    <select name="ccExpMonth" id="id3zu" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Mars</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augusti</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <select name="expYear" id="idrez" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idk92sq">Säkerhetskod (CVV)</label>
    <input type="number" name="securityCode" id="idk92sq" placeholder="Tre sista siffrorna på baksidan" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label>Korttyp
    <select name="cardType" id="idi3lr8" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Diners Club</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
