<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idez">Naam</label>
    <input type="text" name="contactName" id="idez" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iddzq">Adres</label>
    <input type="text" name="addr1" id="iddzq" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label>Postcode
    <input type="text" name="zipCode" id="idvs" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <input type="text" name="locality" id="idsf0ky" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="id572p" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Luxemburg</option>
</select>
  </div>
  <div>
    <span>Extra adresinformatie (optioneel)</span>
    <input type="text" name="addressLine2" id="id6x" placeholder="Bijvoorbeeld appartement of verdieping" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Gebouw (optioneel)
    <input type="text" name="ida39" id="idc7x" placeholder="Vul de naam van het gebouw in" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <span>Referentiepunt (optioneel)</span>
    <input type="text" name="idnt" id="idq7" placeholder="Bijvoorbeeld herkenningspunt in de buurt" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <button name="idfjy" id="id7rudc" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
