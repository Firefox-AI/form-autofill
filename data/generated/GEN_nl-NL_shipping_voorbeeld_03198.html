<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Naam
    <input type="text" name="contactName" id="idwb" placeholder="Vul uw naam in" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Straat
    <input type="text" name="address" id="ida79" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="id29w" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Plaats
    <input type="text" name="locality" id="iddtzld" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country" id="id2tu" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
</select>
    </label>
  </div>
  <div>
    <label>Referentiepunt (optioneel)
    <input type="text" name="idu3hwa" id="idvpfjc" placeholder="Bijvoorbeeld nabij een herkenningspunt" data-moz-autofill-type="reference-point">
    </label>
  </div>
</form>

</fieldset></body></html>
