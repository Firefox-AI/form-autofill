<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paraggelies.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Προσθέστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επίθετο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Προσθέστε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ταχυδρομικός Κωδικός" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
  <option>Ηνωμένες Πολιτείες</option>
  <option>Βρετανία</option>
</select>
  </div>
  <div>
    <label for="email">Ηλεκτρονικό Ταχυδρομείο</label>
    <input type="email" name="email" id="email" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Για παράδειγμα: 2101234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ccAdditionalName">Επιπλέον Όνομα (προαιρετικό)</label>
    <input type="text" name="ccAdditionalName" id="ccAdditionalName" placeholder="Π.χ. όνομα πατέρα ή μητέρας" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
