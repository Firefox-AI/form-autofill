<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Namn</span>
    <input type="text" name="yourName" id="id0z09l" placeholder="Förnamn och efternamn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Gatuadress</span>
    <input type="text" name="address" id="id2ck" placeholder="Exempelgatan 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="postcode" id="idz50qa" placeholder="Exempel: 123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="city" id="idaugg" placeholder="Ange stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idrmrh" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Kommundel</span>
    <input type="text" name="suburb" id="id5uo5" placeholder="Ange kommundel (valfritt)" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
