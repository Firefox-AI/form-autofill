<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>orneksite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" aria-label="Ad" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" aria-label="Soyad" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" aria-label="E-posta" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" aria-label="Telefon Numarası" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" aria-label="Doğum Tarihi" data-moz-autofill-type="bday">
  </div>
  <div>
    <select name="sex" id="sex" aria-label="Cinsiyet" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Seçiniz</option>
  <option>Erkek</option>
  <option>Kadın</option>
  <option>Diğer</option>
</select>
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Takma adınızı girin" aria-label="Takma Ad" data-moz-autofill-type="nickname">
  </div>
  <div>
    <button name="field" id="field" type="submit">Kayıt Ol</button>
  </div>
</form>

</fieldset></body></html>
