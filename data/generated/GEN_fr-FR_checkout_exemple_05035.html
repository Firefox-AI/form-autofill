<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prénom</span>
    <input type="text" name="firstName" id="idpc54" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="last_name" id="iddalh" placeholder="Entrez votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Société (facultatif)</span>
    <input type="text" name="companyName" id="idad" placeholder="Nom de votre société" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="address1" id="idqpz" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Appartement, étage (facultatif)</span>
    <input type="text" name="apt" id="id4o" placeholder="Appartement, étage, etc." data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="town" id="idrezbu" placeholder="Entrez votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postcode" id="idz3cdt" placeholder="Entrez votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Pays</span>
    <select name="country" id="idrb90g" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Royaume-Uni</option>
  <option>États-Unis</option>
</select>
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="user_email" id="idd6tl" placeholder="Entrez votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="idgd16" placeholder="Entrez votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mois de naissance</span>
    <select name="dobMonth" id="idc08" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janvier</option>
  <option>Février</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juillet</option>
  <option>Août</option>
  <option>Septembre</option>
  <option>Octobre</option>
  <option>Novembre</option>
  <option>Décembre</option>
</select>
  </div>
</form>

</fieldset></body></html>
