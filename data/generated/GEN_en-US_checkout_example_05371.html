<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvpyn">Country*</label>
    <select name="country" id="idvpyn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="idalqiw">First name*</label>
    <input type="text" name="fname" id="idalqiw" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="ids1wb">Last name*</label>
    <input type="text" name="lname" id="ids1wb" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idvw">Country code*</label>
    <select name="countryCode" id="idvw" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 (USA)</option>
  <option>+1 (Canada)</option>
  <option>+52 (Mexico)</option>
  <option>+44 (UK)</option>
  <option>+61 (Australia)</option>
</select>
  </div>
  <div>
    <label for="id5wafl">Mobile number*</label>
    <input type="tel" name="id22b" id="id5wafl" placeholder="Enter your mobile number" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="idlodj9">Search by ZIP code, street, or address</label>
    <input type="text" name="idws" id="idlodj9" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="id8h">Street*</label>
    <input type="text" name="streetName" id="id8h" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idql">Apt, suite, unit, etc. (optional)</label>
    <input type="text" name="id7k" id="idql" placeholder="Apt, suite, unit, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="idwc">State*</label>
    <select name="stateProvince" id="idwc" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <label for="id63">City*</label>
    <input type="text" name="locality" id="id63" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id7tl4">ZIP code*</label>
    <input type="text" name="zipCode" id="id7tl4" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
