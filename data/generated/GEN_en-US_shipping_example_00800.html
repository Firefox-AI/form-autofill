<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id06oz">Email Address</label>
    <input type="email" name="mail" id="id06oz" placeholder="yourname@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idqgn">Full Name</label>
    <input type="text" name="fullName" id="idqgn" placeholder="Enter your full name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idaxpj3">City</label>
    <input type="text" name="locality" id="idaxpj3" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id033">State</label>
    <select name="province" id="id033" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idtqjb">Street Address</label>
    <input type="text" name="addr" id="idtqjb" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idl4">Country Code</label>
    <input type="tel" name="countryCode" id="idl4" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="idb9">Phone Number</label>
    <input type="tel" name="id4v" id="idb9" placeholder="(555) 555-5555" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
