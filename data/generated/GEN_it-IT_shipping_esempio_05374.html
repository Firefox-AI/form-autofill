<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="fullName" id="idasy" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="addr1" id="id2jk3c" placeholder="Via Roma 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Codice postale</span>
    <input type="text" name="zip" id="id0jttj" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="locality2" id="idjqgj" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Paese</span>
    <select name="country" id="idjopgt" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
  <div>
    <span>Ulteriori informazioni sull&#x27;indirizzo</span>
    <input type="text" name="addressLine2" id="idqrva" placeholder="Piano 2, Scala B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Numero appartamento</span>
    <input type="text" name="apt" id="idkuhv" placeholder="A1" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
