<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;azienda" aria-label="Azienda (opzionale)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Es. Piano, interno" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>CAP
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il tuo CAP" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="telExtension">Interno (opzionale)</label>
    <input type="number" name="telExtension" id="telExtension" placeholder="Inserisci numero interno" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <label for="apartment">Appartamento (opzionale)</label>
    <input type="text" name="apartment" id="apartment" placeholder="Es. 101" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
