<body>

<fieldset>

<form method="post">

  <div>

  </div>
  <div>
    <input type="text" name="zip" id="idft" placeholder="Código postal" aria-label="Código postal" data-moz-autofill-type="postal-code">

  <div>
    <label for="idl6gzj">País</label>
    <select name="countryName" id="idl6gzj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label>Correo electrónico
    <input type="email" name="email_address" id="idrkmfp" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="mobile" id="id2hcct" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idt7r39">Apartamento</label>
    <input type="text" name="apartment" id="idt7r39" placeholder="Número de apartamento (opcional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idex" id="idga0g" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
