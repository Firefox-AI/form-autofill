<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Adınız</label>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Soyadınız</label>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-posta Adresiniz</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numaranız</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Doğum Tarihiniz</label>
    <input type="text" name="bday" id="bday" placeholder="GG/AA/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="nickname">Kullanıcı Adınız (isteğe bağlı)</label>
    <input type="text" name="nickname" id="nickname" placeholder="Kullanıcı adınızı girin" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="field">Şifre</label>
    <input type="password" name="field" id="field" placeholder="Şifrenizi girin">
  </div>
  <div>
    <button name="field" id="field" type="submit">Kaydol</button>
  </div>
</form>

</fieldset></body></html>
