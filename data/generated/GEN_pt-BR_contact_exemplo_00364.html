<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Digite seu nome completo" aria-label="Nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="seuemail@exemplo.com" aria-label="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(xx) xxxxx-xxxx" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Av., etc." aria-label="Endereço" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Digite sua cidade" aria-label="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="XXXXX-XXX" aria-label="CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel4" id="addressLevel4" aria-label="Estado" data-moz-autofill-type="address-level4">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espirito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rio de Janeiro</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>Santa Catarina</option>
  <option>São Paulo</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
