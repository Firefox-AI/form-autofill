<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagosfáciles.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqebh">Nombre como aparece en la tarjeta</label>
    <input type="text" name="ccName" id="idqebh" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idazm">Número de tarjeta</label>
    <input type="number" name="ccNumber" id="idazm" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idmx">Mes de expiración</label>
    <select name="expMonth1" id="idmx" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="idli">Año de expiración</label>
    <select name="ccExpYear" id="idli" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idzt">Código de seguridad</label>
    <input type="number" name="cvc" id="idzt" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idfmdho">Tipo de tarjeta</label>
    <select name="ccType" id="idfmdho" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="id42r">Dirección de facturación</label>
    <input type="text" name="streetAddress" id="id42r" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
