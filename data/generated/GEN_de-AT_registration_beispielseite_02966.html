<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="first_name" id="idlb" placeholder="z.B. Max" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="lname" id="idre" placeholder="z.B. Mustermann" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="idhw" placeholder="z.B. max@beispiel.at" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="telephone" id="idvbkgm" placeholder="z.B. +43 660 1234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Geburtsdatum</span>
    <select name="dob" id="idpl" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Tag</option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <span>Spitzname (optional)</span>
    <input type="text" name="displayName" id="idh5pl" placeholder="z.B. Maxl" data-moz-autofill-type="nickname">
  </div>
  <div>
    <button name="idyf5" id="idh6e" type="submit">Registrieren</button>
  </div>
</form>

</fieldset></body></html>
