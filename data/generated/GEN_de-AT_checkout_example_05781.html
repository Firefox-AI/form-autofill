<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idc2g3">Land *</label>
    <select name="country" id="idc2g3" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Frankreich</option>
  <option>Italien</option>
</select>
  </div>
  <div>
    <label for="idnwe">Name *</label>
    <input type="text" name="yourName" id="idnwe" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id7hkag">Adresse *</label>
    <input type="text" name="addressLine1" id="id7hkag" placeholder="Hauptadresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idoe0">Adresse 2</label>
    <input type="text" name="addr2" id="idoe0" placeholder="Zusätzliche Adresse" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id37563">Stadt *</label>
    <input type="text" name="city" id="id37563" placeholder="Stadt *" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idb1ws">Bundesland</label>
    <select name="county" id="idb1ws" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <label for="idb7y52">Postleitzahl *</label>
    <input type="number" name="postcode" id="idb7y52" placeholder="PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idrxh">Telefon</label>
    <input type="tel" name="tel" id="idrxh" placeholder="07700 900 982" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
