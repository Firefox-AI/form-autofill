<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalningexempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Namn på kortet
    <input type="text" name="nameOnCard8" id="id8n" placeholder="För- och efternamn" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Kortnummer
    <input type="number" name="card_number" id="idxrp2" placeholder="xxxx-xxxx-xxxx-xxxx" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Utgångsmånad
    <select name="expMonth" id="idfm" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
    </label>
  </div>
  <div>
    <label>Utgångsår
    <select name="ccExpYear" id="idm9glp" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>CVC
    <input type="number" name="csc" id="id3zbgx" placeholder="3 siffror på baksidan av kortet" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Korttyp
    <select name="ccType" id="idckh" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <button name="idc6nbw" id="id0no9v" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
