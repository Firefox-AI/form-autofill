<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellidos</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Fecha de nacimiento</label>
    <input type="text" name="bday" id="bday" placeholder="Selecciona tu fecha de nacimiento" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Organización</label>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa o institución" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
