<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivwebshop.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Név</span>
    <input type="text" name="cardholderName" id="iddy" placeholder="Kérem, adja meg a nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Cím</span>
    <input type="text" name="addressLine1" id="idrwa" placeholder="Utca, házszám" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Lakás, emelet</span>
    <input type="text" name="addr2" id="idt7fr" placeholder="(opcionális)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Irányítószám</span>
    <input type="text" name="zip" id="idrtmx" placeholder="Irányítószám megadása" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Megye</span>
    <select name="state" id="idy0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Budapest</option>
  <option>Pest megye</option>
  <option>Fejér megye</option>
  <option>Győr-Moson-Sopron megye</option>
  <option>Hajdú-Bihar megye</option>
  <option>Heves megye</option>
  <option>Komárom-Esztergom megye</option>
  <option>Nógrád megye</option>
  <option>Somogy megye</option>
  <option>Szabolcs-Szatmár-Bereg megye</option>
  <option>Tolna megye</option>
  <option>Vas megye</option>
  <option>Veszprém megye</option>
  <option>Zala megye</option>
</select>
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="locality" id="idfl0qw" placeholder="Város megadása" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Ország</span>
    <select name="countryName" id="id3y2" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Horvátország</option>
  <option>Szerbia</option>
  <option>Szlovénia</option>
  <option>Csehország</option>
  <option>Németország</option>
  <option>Olaszország</option>
  <option>Franciaország</option>
  <option>Belgium</option>
  <option>Egyesült Királyság</option>
  <option>Spanyolország</option>
</select>
  </div>
  <div>
    <span>Telefonszám</span>
    <input type="tel" name="phone" id="id87h0j" placeholder="Kérjük, adja meg a telefonszámát" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idbupm" id="id0k6t" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
