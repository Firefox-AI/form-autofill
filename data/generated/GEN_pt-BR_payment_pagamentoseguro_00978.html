<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoseguro.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome no cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="Como está no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Número do cartão</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Mês de expiração</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Ano de expiração</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Código de segurança (CVV)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Tipo do cartão</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Elo</option>
  <option>Hipercard</option>
</select>
  </div>
  <div>
    <label for="addressLine1">Endereço</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="XXXXX-XXX" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="bdayMonth">Mês de nascimento</label>
    <select name="bdayMonth" id="bdayMonth" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
</form>

</fieldset></body></html>
