<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vollständiger Name *" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+49" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse *" data-moz-autofill-type="email">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <input type="number" name="postalCode" id="postalCode" placeholder="Postleitzahl *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt *" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Hausnummer *" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Straße *" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="Steueridentifikationsnummer/NIK/Reisepassnummer *" data-moz-autofill-type="id-number">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse *" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
