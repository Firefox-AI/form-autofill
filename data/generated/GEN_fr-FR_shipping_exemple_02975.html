<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="contactName" id="id4mwi1" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addr" id="id0o" placeholder="Numéro et nom de la rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="zip" id="id28" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="town" id="iduyk" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="id9b28" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Royaume-Uni</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Pays-Bas</option>
</select>
  </div>
  <div>
    <span>Mois de naissance</span>
    <select name="birthMonth" id="idco1" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janvier</option>
  <option>Février</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juillet</option>
  <option>Août</option>
  <option>Septembre</option>
  <option>Octobre</option>
  <option>Novembre</option>
  <option>Décembre</option>
</select>
  </div>
</form>

</fieldset></body></html>
