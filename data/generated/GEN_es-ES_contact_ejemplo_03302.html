<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Introduce tu nombre y apellidos" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="telExtension" id="telExtension" placeholder="(Opcional)" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle, número y piso" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduce tu ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Introduce el apellido tal como suena" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
