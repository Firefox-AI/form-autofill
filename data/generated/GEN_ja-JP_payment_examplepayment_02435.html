<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義人</span>
    <input type="text" name="ccName" id="ccName" placeholder="例: 山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="例: 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
  <option>2031年</option>
  <option>2032年</option>
</select>
  </div>
  <div>
    <span>セキュリティコード</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="カード裏面の3桁/4桁のコード" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードタイプ</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>ダイナースクラブ</option>
</select>
  </div>
  <div>
    <span>フロア</span>
    <input type="text" name="floor" id="floor" placeholder="例: 3階" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>生年月日（年）</span>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2000年</option>
  <option>1999年</option>
  <option>1998年</option>
  <option>1997年</option>
  <option>1996年</option>
  <option>1995年</option>
  <option>1994年</option>
  <option>1993年</option>
  <option>1992年</option>
  <option>1991年</option>
</select>
  </div>
</form>

</fieldset></body></html>
