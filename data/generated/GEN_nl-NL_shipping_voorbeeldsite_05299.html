<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpn">Naam</label>
    <input type="text" name="fullName" id="idpn" placeholder="Vul je naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idl99o">Adres</label>
    <input type="text" name="addressLine1" id="idl99o" placeholder="Straat en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="iduh">Postcode</label>
    <input type="text" name="zip_code" id="iduh" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id3pba6">Plaats</label>
    <input type="text" name="city" id="id3pba6" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idof">Land</label>
    <select name="countryName" id="idof" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Nederlandse Antillen</option>
  <option>Suriname</option>
</select>
  </div>
  <div>
    <label for="idizs">Appartement</label>
    <input type="text" name="suite" id="idizs" placeholder="Appartementnummer (optioneel)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idp5jhz">Verdieping</label>
    <input type="text" name="floor" id="idp5jhz" placeholder="Verdieping (optioneel)" data-moz-autofill-type="floor">
  </div>
</form>

</fieldset></body></html>
