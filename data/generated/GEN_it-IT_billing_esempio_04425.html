<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome sulla carta
    <input type="text" name="cardName" id="id5ynye" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Indirizzo
    <input type="text" name="streetAddress" id="idl4k0" placeholder="Via, numero civico" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="zip" id="idb7" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Città
    <input type="text" name="city" id="idd6l9b" placeholder="Nome della città" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Provincia
    <select name="stateProvince" id="idlxu" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bologna</option>
  <option>Firenze</option>
  <option>Catania</option>
  <option>Bari</option>
</select>
    </label>
  </div>
  <div>
    <label>Paese
    <select name="country" id="id76" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Giappone</option>
  <option>Cina</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
