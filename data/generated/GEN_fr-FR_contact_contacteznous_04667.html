<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>contactez-nous.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom complet
    <input type="text" name="name" id="name" placeholder="Votre nom complet" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresse e-mail
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="tel" id="tel" placeholder="06 12 34 56 78" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Rue de Exemple" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ville
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="postalCode" id="postalCode" placeholder="75000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Numéro de TVA
    <input type="text" name="vatNumber" id="vatNumber" placeholder="FR123456789" data-moz-autofill-type="vat-number">
    </label>
  </div>
</form>

</fieldset></body></html>
