<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Név
    <input type="text" name="name" id="name" placeholder="Kérem adja meg a nevét" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>E-mail cím
    <input type="email" name="email" id="email" placeholder="Kérem adja meg az e-mail címét" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="tel">Telefonszám</label>
    <input type="tel" name="tel" id="tel" placeholder="Kérem adja meg a telefonszámát" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Szervezet neve
    <input type="text" name="organization" id="organization" placeholder="Kérem adja meg a szervezet nevét" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Kérem adja meg az utcát" aria-label="Irányítószám és utca" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Város</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kérem adja meg a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Irányítószám</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Kérem adja meg az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
