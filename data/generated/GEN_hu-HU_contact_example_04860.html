<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Név
    <input type="text" name="yourName" id="idivnxb" placeholder="Kérem, írja be a nevét" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="idapv0">Email cím</label>
    <input type="email" name="email_address" id="idapv0" placeholder="Kérem, adja meg az email címét" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="phone" id="idikc4d" placeholder="Kérem, adja meg a telefonszámát" aria-label="Telefonszám" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Szervezet
    <input type="text" name="companyName" id="idbzr2" placeholder="Kérjük, adja meg a szervezet nevét" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <span>Utca és házszám</span>
    <input type="text" name="street" id="idbowwu" placeholder="Kérem, adja meg az utcát és a házszámot" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="city" id="ida4" placeholder="Kérjük, adja meg a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idefn">Irányítószám</label>
    <input type="text" name="zip_code" id="idefn" placeholder="Kérjük, adja meg az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
