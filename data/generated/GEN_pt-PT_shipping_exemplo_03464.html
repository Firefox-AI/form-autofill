<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idr9a">Nome Completo</label>
    <input type="text" name="contactName" id="idr9a" placeholder="João Silva" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idyht">Endereço</label>
    <input type="text" name="addr1" id="idyht" placeholder="Rua das Flores, 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idsydsv">Código Postal</label>
    <input type="text" name="postcode" id="idsydsv" placeholder="1000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddt">Concelho</label>
    <input type="text" name="city" id="iddt" placeholder="Lisboa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id0aqx">País</label>
    <select name="countryName" id="id0aqx" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="id3hn2">Número do Apartamento</label>
    <input type="text" name="unit" id="id3hn2" placeholder="Apt. 45B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="id48rx">Mês de Nascimento</label>
    <select name="dobMonth" id="id48rx" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <label for="id5h">Nome Adicional</label>
    <input type="text" name="ids8z" id="id5h" placeholder="Sobrenome ou nome secundário" data-moz-autofill-type="cc-additional-name">
  </div>
  <div>
    <button name="ide8" id="idqzdr" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
