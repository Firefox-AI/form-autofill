<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.examplepay.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Card Number
    <input type="number" name="cardNumber" id="id62wsx" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>CVV
    <input type="number" name="cvc" id="idhz" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Expiration Month
    <select name="exp_month" id="iddj9p5" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
    </label>
  </div>
  <div>
    <label>Expiration Year
    <select name="ccExpYear" id="idnqac" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
    </label>
  </div>
  <div>
    <label>Full Name
    <input type="text" name="fullName" id="idr34" placeholder="John Doe" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Company Name (optional)
    <input type="text" name="business" id="idoz" placeholder="Your Company" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Address
    <input type="text" name="street1" id="ida2m" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apt, Suite, Bldg (optional)
    <input type="text" name="addressLine2" id="idgm" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="locality" id="idmy" placeholder="Los Angeles" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>State
    <select name="province" id="idtqqt" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>District of Columbia</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>

  <option>Massachusetts</option>

  <option>Missouri</option>
  <option>Montana</option>

  <option>Oregon</option>
  <option>Pennsylvania</option>

  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="zipCode" id="idk4hp" placeholder="90001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Country
    <select name="countryCode" id="idstx" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>

  <option>United Kingdom</option>
</select>
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="telephone" id="idlp" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
