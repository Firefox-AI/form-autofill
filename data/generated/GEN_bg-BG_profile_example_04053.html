<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Вашето име" aria-label="Име" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Вашата фамилия" aria-label="Фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Допълнително име (по избор)" aria-label="Допълнително име" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Вашият псевдоним" aria-label="Псевдоним" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Вашият имейл" aria-label="Имейл адрес" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Вашият телефонен номер" aria-label="Телефонен номер" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Име на организация (по избор)" aria-label="Организация" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="ДД/ММ/ГГГГ" aria-label="Дата на раждане" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="password" name="field" id="field" aria-label="Парола">
  </div>
</form>

</fieldset></body></html>
