<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iddm">Nombre en la tarjeta</label>
    <input type="text" name="r:r:7:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="iddm" placeholder="Escribe el nombre del titular de la tarjeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idor1r">Número de tarjeta</label>
    <input type="number" name="r:r:7:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idor1r" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idhb">Mes de caducidad</label>
    <select name="r:r:7:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idhb" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="idzl1t">Año de caducidad</label>
    <select name="r:r:5:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idzl1t" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id8l">Código de seguridad (CSC)</label>
    <input type="number" name="r:r:1:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id8l" placeholder="3 o 4 dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id7il">Tipo de tarjeta</label>
    <select name="r:r:2:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id7il" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="ids3">Dirección</label>
    <input type="text" name="r:r:9:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="ids3" placeholder="Calle, número, piso, etc." data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
