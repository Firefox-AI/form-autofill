<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payments.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>名義人名
    <input type="text" name="r:r:3:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idni7" placeholder="カード名義人の名前を入力" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="ido0y">カード番号</label>
    <input type="number" name="r:r:2:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="ido0y" placeholder="カード番号を16桁で入力" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idl60nv">有効期限（月）</label>
    <select name="r:r:7:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idl60nv" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="idxlm9">有効期限（年）</label>
    <select name="r:r:2:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idxlm9" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
  <option>2031年</option>
  <option>2032年</option>
  <option>2033年</option>
</select>
  </div>
  <div>
    <span>セキュリティコード（CVC）</span>
    <input type="number" name="r:r:5:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id5xmgm" placeholder="カード裏面の3桁または4桁" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idu16e2">カードタイプ</label>
    <select name="r:r:6:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idu16e2" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
</form>

</fieldset></body></html>
