<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="ccName" id="idzkiq5" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Organizzazione</span>
    <input type="text" name="organization" id="idqay" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="id89zp" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Comune</span>
    <input type="text" name="locality" id="idd6mdd" placeholder="Nome del comune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Cap</span>
    <input type="text" name="zip_code" id="id88" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="state3" id="idu79" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>MI - Milano</option>
  <option>RM - Roma</option>
  <option>NA - Napoli</option>
  <option>TO - Torino</option>
  <option>FI - Firenze</option>
</select>
  </div>
  <div>
    <span>Paese</span>
    <select name="countryName" id="idg63wl" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <span>Numero di partita IVA</span>
    <input type="text" name="vatId" id="idhcd" placeholder="IT12345678901" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
