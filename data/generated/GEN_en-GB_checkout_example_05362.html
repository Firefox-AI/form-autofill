<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name *</span>
    <input type="text" name="billing_first_name" id="idil" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name *</span>
    <input type="text" name="last_name" id="idf60l" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Email Address *</span>
    <input type="email" name="email" id="idi94t" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telephone Number *</span>
    <input type="tel" name="phone" id="idi0d" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Address Line 1 *</span>
    <input type="text" name="address1" id="idt4p" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address Line 2 (optional)</span>
    <input type="text" name="addressLine2" id="id6flok" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postcode *</span>
    <input type="text" name="postcode" id="id0v9c" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
