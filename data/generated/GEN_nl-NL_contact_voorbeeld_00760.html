<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbl">Naam</label>
    <input type="text" name="name" id="idbl" placeholder="Vul uw volledige naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id6c">E-mail</label>
    <input type="email" name="emailAddress" id="id6c" placeholder="Vul uw e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idk052g">Telefoonnummer</label>
    <input type="tel" name="telephone" id="idk052g" placeholder="Vul uw telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idomd">Adres</label>
    <input type="text" name="addr" id="idomd" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id1vz">Stad</label>
    <input type="text" name="city" id="id1vz" placeholder="Vul uw stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idwt75">Postcode</label>
    <input type="text" name="zipCode" id="idwt75" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idqvn" id="idbwjkt" type="submit">Verstuur</button>
  </div>
</form>

</fieldset></body></html>
