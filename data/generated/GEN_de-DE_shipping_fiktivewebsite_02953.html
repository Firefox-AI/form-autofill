<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivewebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcea31">Vorname</label>
    <input type="text" name="fname" id="idcea31" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id2x">Nachname</label>
    <input type="text" name="last_name" id="id2x" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idt0">Geben Sie die Stadt oder Postleitzahl in die Suchleiste ein, wählen Sie einen Abholort aus der Vorschlagsliste und drücken Sie Enter, um Ihre Auswahl zu bestätigen.</label>
    <input type="text" name="zipCode" id="idt0" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id9xuq">Bundesland</label>
    <select name="city" id="id9xuq" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idxrox9">Straße und Hausnummer</label>
    <input type="text" name="street1" id="idxrox9" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfp">Gebäude / Stockwerk / Wohnung</label>
    <input type="text" name="address2" id="idfp" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idzzz">Ort / Gebiet / Platz</label>
    <input type="text" name="locality" id="idzzz" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idf8w99">Land</label>
    <select name="country_id" id="idf8w99" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Luxemburg</option>
  <option>Frankreich</option>
  <option>Polen</option>
  <option>Tschechische Republik</option>
</select>
  </div>
  <div>
    <label for="idbtys">Telefonnummer</label>
    <input type="tel" name="telephone" id="idbtys" placeholder="+49 123 4567890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
