<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Confirm Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="street" id="street" aria-label="Street Address" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" aria-label="Flat/Apartment Number" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name (again)" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name (again)" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" aria-label="Company Name" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City (again)" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="street" id="street" aria-label="Street Address (again)" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" aria-label="Flat/Apartment Number (again)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Phone Number (again)" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Subscribe to updates from 4home!" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
