<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="idiz0j1" id="id3oqx" placeholder="例: 太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="id6y3el" id="idz4km1" placeholder="例: 山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>会社名</span>
    <input type="text" name="idwk" id="idan" placeholder="例: 株式会社ABC" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="id19ypd" id="id3kjr" placeholder="例: 1-1-1　千代田区" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="idvho" id="idvd0bf" placeholder="例: 東京" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="idqgx3" id="idip" placeholder="例: 100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国名</span>
    <select name="idqdt" id="idy9v5c" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
  <option>ドイツ</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="idxuu" id="id5nnl" placeholder="例: taro@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="idin" id="idlz2n6" placeholder="例: 03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="id926" id="idzgs" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
