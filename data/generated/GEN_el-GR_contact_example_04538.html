<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ονοματεπώνυμο</span>
    <input type="text" name="name" id="id518" placeholder="Πλήρες όνομα" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Διεύθυνση Ηλεκτρονικού Ταχυδρομείου</span>
    <input type="email" name="user_email" id="id88" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="tel" id="idjmt" placeholder="(+30) 210 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Διεύθυνση</span>
    <input type="text" name="streetAddress" id="idxj2zt" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Πόλη</span>
    <input type="text" name="city" id="idnho" placeholder="Πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Ταχυδρομικός Κωδικός</span>
    <input type="text" name="zip" id="idusw3x" placeholder="123 45" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
