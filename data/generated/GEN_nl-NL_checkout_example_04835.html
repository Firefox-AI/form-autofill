<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idj8">Voornaam</label>
    <input type="text" name="firstName" id="idj8" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idj7k">Achternaam</label>
    <input type="text" name="surname" id="idj7k" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idv2j4">Bedrijfsnaam</label>
    <input type="text" name="companyName" id="idv2j4" placeholder="Vul de naam van je organisatie in" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idn5y9">Adres</label>
    <input type="text" name="streetAddress" id="idn5y9" placeholder="Vul je adres in" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idqc">Straatnaam</label>
    <input type="text" name="strasse" id="idqc" placeholder="Straatnaam" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idjpd7x">Plaats</label>
    <input type="text" name="locality" id="idjpd7x" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idnq36">Postcode</label>
    <input type="text" name="zip_code" id="idnq36" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxb">Land</label>
    <select name="countryName" id="idxb" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <label for="idmcf">E-mailadres</label>
    <input type="email" name="emailAddress" id="idmcf" placeholder="jouw@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idrz">Telefoonnummer</label>
    <input type="tel" name="mobile" id="idrz" placeholder="06-12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idy8pi0" id="idtsi" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
