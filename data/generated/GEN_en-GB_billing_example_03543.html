<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Email Address
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="email">Confirm Email Address</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" aria-label="Street Name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label>House Number
    <input type="number" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label for="addressLevel2">City or Town</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City or Town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>First Name (Again)</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name (Again)" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Company Name</label>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" aria-label="Street Name (Alternative)" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">House Number (Alternative)</label>
    <input type="number" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City or Town (Alternative)" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postcode (Alternative)</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Phone Number (Alternative)</label>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number (Alternative)" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Delivery Address Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="email">Subscribe to 4home News!</label>
    <input type="email" name="email" id="email" placeholder="Subscribe to 4home News!" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
