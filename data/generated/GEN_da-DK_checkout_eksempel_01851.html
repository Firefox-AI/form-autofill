<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Efternavn
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label for="streetAddress">Adresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Gade og husnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>By
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Island</option>
  <option>Finland</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="email" id="email" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Region</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Sealand</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
</select>
  </div>
  <div>
    <label for="vatNumber">CVR-nummer</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Indtast dit CVR-nummer" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Indtast etage eller lejlighedsnummer (hvis relevant)" aria-label="Etage/Lejlighed" data-moz-autofill-type="address-level4">
  </div>
</form>

</fieldset></body></html>
