<html><head>

</head>

<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Full Name</span>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Mobile Phone</span>
    <input type="tel" name="tel" id="tel" placeholder="7xx xxx xxx" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mobile Phone Number</span>
    <input type="tel" name="addressLookup" id="addressLookup" data-moz-autofill-type="address-lookup">
  </div>

    <span>Street Address</span>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Address Details</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Additional Information</span>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Contact Number</span>
    <input type="tel" name="tel" id="tel" placeholder="7xx xxx xxx" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mobile Contact</span>
    <input type="tel" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Address Line</span>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Extra Address Information</span>

  </div>

</fieldset></body></html>
