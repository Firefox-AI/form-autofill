<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>monprofil.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="familyName" id="familyName" placeholder="Entrez votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Nom supplémentaire</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Entrez un nom supplémentaire (si applicable)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Surnom</label>
    <input type="text" name="nickname" id="nickname" placeholder="Entrez votre surnom" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="email" placeholder="Entrez votre e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="tel" placeholder="Entrez votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Entrez le nom de votre organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Sélectionnez votre date de naissance" aria-label="Date de naissance" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Prénom phonétique</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Entrez votre prénom en phonétique (si applicable)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="Entrez votre numéro d&#x27;identification" aria-label="Numéro d&#x27;identification" data-moz-autofill-type="id-number">
  </div>
  <div>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Entrez votre nom en phonétique (si applicable)" aria-label="Nom phonétique" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <label for="field">Mot de passe</label>
    <input type="password" name="field" id="field" placeholder="Entrez votre mot de passe">
  </div>
</form>

</fieldset></body></html>
