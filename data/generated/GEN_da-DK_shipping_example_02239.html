<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn
    <input type="text" name="name" id="name" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <span>Gade</span>
    <input type="text" name="street" id="street" placeholder="F.eks. Rådhusgade" data-moz-autofill-type="street">
  </div>
  <div>
    <label>Husnummer
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="F.eks. 12" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <span>Lejlighed / Etage</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="F.eks. 3. sal" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="F.eks. 1000" aria-label="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="F.eks. København" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
    </label>
  </div>
  <div>
    <span>Lejlighed</span>
    <input type="text" name="apartment" id="apartment" placeholder="F.eks. A" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="F.eks. nær busstoppested" aria-label="Referencepunkt (valgfrit)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Region (valgfrit)</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="F.eks. Sjælland" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
