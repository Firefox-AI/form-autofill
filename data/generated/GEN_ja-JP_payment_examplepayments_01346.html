<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payments.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義人名</span>
    <input type="text" name="id7rp3" id="idwcdwc" placeholder="名義人名を入力してください" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="idpll" id="idue8e" placeholder="カード番号を入力してください" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="idkw" id="idt4pnh" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="idofb3" id="iddv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>セキュリティコード</span>
    <input type="number" name="idl5cv" id="idug" placeholder="カード裏面の3桁の数字" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードの種類</span>
    <select name="idmytq" id="idll6pr" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
</select>
  </div>
  <div>
    <span>都道府県</span>
    <select name="idxt74f" id="idbla" data-moz-autofill-type="address-level4">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>北海道</option>
  <option>愛知県</option>
  <option>福岡県</option>
  <option>京都府</option>
  <option>その他</option>
</select>
  </div>
  <div>
    <span>敬称</span>
    <select name="id36gc" id="idwtmc" data-moz-autofill-type="honorific-suffix">
  <option value=""></option>
  <option>様</option>
  <option>閣下</option>
  <option>先生</option>
  <option>氏</option>
</select>
  </div>
</form>

</fieldset></body></html>
