<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre en la tarjeta
    <input type="text" name="ccName" id="ccName" placeholder="Nombre completo tal como aparece en la tarjeta" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Dirección adicional
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, oficina, etc. (opcional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Provincia
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla-La Mancha</option>
  <option>Castilla y León</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
  <option>Ceuta</option>
  <option>Melilla</option>
</select>
    </label>
  </div>
  <div>
    <label>País
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Dinamarca</option>
  <option>Noruega</option>
  <option>Finlandia</option>
  <option>Suiza</option>
  <option>Austria</option>
  <option>Irlanda</option>
  <option>Grecia</option>
  <option>República Checa</option>
  <option>Hungría</option>
  <option>Polonia</option>
  <option>Rumanía</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
