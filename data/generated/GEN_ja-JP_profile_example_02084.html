<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="givenName" id="givenName" placeholder="山田" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>姓
    <input type="text" name="familyName" id="familyName" placeholder="太郎" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>ミドルネーム
    <input type="text" name="additionalName" id="additionalName" placeholder="次郎" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="やまちゃん" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">電話番号</label>
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="株式会社サンプル" aria-label="会社名" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="生年月日" aria-label="誕生日" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">役職</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="マネージャー" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>パスワード</span>
    <input type="password" name="field" id="field" placeholder="少なくとも8文字">
  </div>
  <div>
    <button name="field" id="field" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
