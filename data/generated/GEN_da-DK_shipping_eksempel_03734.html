<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2bd">Navn</label>
    <input type="text" name="r:r:9:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="id2bd" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idfmzug">Vej</label>
    <input type="text" name="r:r:8:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idfmzug" placeholder="Indtast vejnavn" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="idvzbd1">Husnummer</label>
    <input type="text" name="r:r:8:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idvzbd1" placeholder="Indtast husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idmwr">Yderligere adresseoplysninger</label>
    <input type="text" name="r:r:7:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idmwr" placeholder="F.eks. lejlighed, etage" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idyijat">Postnummer</label>
    <input type="text" name="r:r:1:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idyijat" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvduf1">By</label>
    <input type="text" name="r:r:6:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idvduf1" placeholder="Indtast bynavn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idbnw">Land</label>
    <select name="r:r:5:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idbnw" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norway</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idd3">Region</label>
    <input type="text" name="r:r:8:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idd3" placeholder="Indtast din region (f.eks. Sjælland)" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="r:r:8:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idpfk" type="submit">Send</button>
  </div>
</form>
