<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="contactName" id="idma" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="address13" id="id5q" placeholder="Via Roma 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postcode" id="idndy9" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="city1" id="id6k7om" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Nazione</span>
    <select name="countryName" id="idmsw" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Germania</option>
  <option>Francia</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <span>Ulteriori informazioni sull&#x27;indirizzo (opzionale)</span>
    <input type="text" name="addressLine23" id="idzl63b" placeholder="Piano 2, Interno 4" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Provincia</span>
    <input type="text" name="neighborhood" id="id05" placeholder="RM" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
