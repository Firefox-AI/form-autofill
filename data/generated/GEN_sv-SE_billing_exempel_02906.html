<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Namn på kortet</span>
    <input type="text" name="nameOnCard" id="idal" placeholder="Ange namn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Gatuadress</span>
    <input type="text" name="street1" id="idhc" placeholder="Ange gatuadress" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip" id="idge5l" placeholder="Ange postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="town" id="idtp70o" placeholder="Ange stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Län</span>
    <select name="stateProvince" id="idgoce" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Stockholm</option>
  <option>Uppsala</option>
  <option>Örebro</option>
  <option>Skåne</option>
  <option>Västra Götaland</option>
  <option>Östergötland</option>
  <option>Jönköping</option>
  <option>Halland</option>
  <option>Värmland</option>
  <option>Dalarna</option>
  <option>Gävleborg</option>
  <option>Hälsingland</option>
  <option>Norrbotten</option>
  <option>Lappland</option>
  <option>Gotland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="id4n8tv" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="id74p" placeholder="Ange telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adressrad 2 (valfritt)</span>
    <input type="text" name="addr2" id="idh6qg" placeholder="Lägenhetsnummer eller annan information" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
