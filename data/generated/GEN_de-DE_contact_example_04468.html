<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idy5jm">Vorname</label>
    <input type="text" name="givenName" id="idy5jm" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id0mpe">Nachname</label>
    <input type="text" name="last_name" id="id0mpe" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idbn">Adresse</label>
    <input type="text" name="address1" id="idbn" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idtx">Straße und Hausnummer</label>
    <input type="text" name="address2" id="idtx" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idf17w2">Wohnung, Suite, etc. (optional)</label>
    <input type="text" name="locality" id="idf17w2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idhzb2">Stadt</label>
    <input type="text" name="county" id="idhzb2" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id6tf2">Bundesland / Bezirk</label>
    <input type="text" name="zip_code" id="id6tf2" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="ide2dr">Telefonnummer (erforderlich für versandbezogene Anfragen)</label>
    <input type="tel" name="telephone" id="ide2dr" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idyt">E-Mail-Adresse</label>
    <input type="email" name="mail" id="idyt" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idcj">Rechnungsadresse</label>
    <select name="country_id" id="idcj" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="idop7">Land</label>
    <select name="firstName" id="idop7" data-moz-autofill-type="given-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="idmppb">Vorname</label>
    <input type="text" name="lastName" id="idmppb" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idlosw">Nachname</label>
    <input type="text" name="street1" id="idlosw" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idq1">Straße und Hausnummer</label>
    <input type="text" name="address2" id="idq1" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idqq">Wohnung, Suite, etc. (optional)</label>
    <input type="text" name="town" id="idqq" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idh7pip">Stadt</label>
    <input type="text" name="state" id="idh7pip" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idfg15d">Bundesland / Bezirk</label>
    <input type="text" name="zip" id="idfg15d" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id8lu8">Postleitzahl</label>
    <input type="text" name="telephone" id="id8lu8" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
