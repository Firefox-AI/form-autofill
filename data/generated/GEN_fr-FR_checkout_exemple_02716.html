<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idch">Prénom</label>
    <input type="text" name="billing_first_name" id="idch" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idc6aw">Nom de famille</label>
    <input type="text" name="billing_last_name2" id="idc6aw" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idmclt">Adresse</label>
    <input type="text" name="address1" id="idmclt" placeholder="Numéro et nom de rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idx1de">Ville</label>
    <input type="text" name="town" id="idx1de" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idine">Code postal</label>
    <input type="text" name="zipCode" id="idine" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idofco">Pays</label>
    <select name="country" id="idofco" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
  <div>
    <label for="idp9wuu">Adresse e-mail</label>
    <input type="email" name="emailAddress" id="idp9wuu" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idm8">Numéro de téléphone</label>
    <input type="tel" name="phoneNumber" id="idm8" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id9b1pl">Appartement</label>
    <input type="text" name="apartment" id="id9b1pl" placeholder="Numéro d&#x27;appartement (si applicable)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idlvl">Région</label>
    <select name="province" id="idlvl" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
</select>
  </div>
  <div>
    <button name="idz337" id="id41" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
