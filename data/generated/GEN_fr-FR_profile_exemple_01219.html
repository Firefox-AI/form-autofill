<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prénom</span>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Deuxième prénom (facultatif)</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Votre deuxième prénom" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Surnom (facultatif)</span>
    <input type="text" name="nickname" id="nickname" placeholder="Votre surnom" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.fr" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation (facultatif)</span>
    <input type="text" name="organization" id="organization" placeholder="Votre entreprise ou organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Date de naissance</span>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Jour</option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
  <option>Février</option>
  <option>Janvier</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juillet</option>
  <option>Août</option>
  <option>Septembre</option>
  <option>Octobre</option>
  <option>Novembre</option>
  <option>Décembre</option>
</select>
  </div>
  <div>
    <span>Nom de famille phonétique (facultatif)</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Prononciation du nom de famille" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>Mot de passe</span>
    <input type="password" name="field" id="field" placeholder="Choisissez un mot de passe">
  </div>
</form>

</fieldset></body></html>
