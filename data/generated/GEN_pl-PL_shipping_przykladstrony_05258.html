<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladstrony.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idjpb">Imię i nazwisko</label>
    <input type="text" name="name" id="idjpb" placeholder="Wprowadź swoje imię i nazwisko" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idomlz">Adres</label>
    <input type="text" name="addr1" id="idomlz" placeholder="Ulica i numer domu" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id6t">Kod pocztowy</label>
    <input type="text" name="postalCode" id="id6t" placeholder="00-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idqbg">Miasto</label>
    <input type="text" name="town" id="idqbg" placeholder="Wprowadź nazwę miejscowości" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id45tpn">Kraj</label>
    <select name="country" id="id45tpn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Włochy</option>
  <option>Hiszpania</option>
  <option>Wielka Brytania</option>
  <option>Szwecja</option>
  <option>Norwegia</option>
  <option>Czechy</option>
  <option>Słowacja</option>
</select>
  </div>
  <div>
    <label for="idk2">Piętro</label>
    <input type="text" name="etage" id="idk2" placeholder="Wprowadź numer piętra (jeśli dotyczy)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="id1eef">Numer budynku</label>
    <input type="text" name="idfhc" id="id1eef" placeholder="Wprowadź numer budynku (jeśli dotyczy)" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idlyckm">Dzielnica</label>
    <input type="text" name="district" id="idlyckm" placeholder="Wprowadź nazwę dzielnicy (jeśli dotyczy)" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
