<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom del titular
    <input type="text" name="r:r:1:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idqb2p" placeholder="Nom complet del titular de la targeta" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <input type="number" name="r:r:1:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idas" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mes d&#x27;expiració</span>
    <select name="r:r:1:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idurw" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gener</option>
  <option>Febrer</option>
  <option>Març</option>
  <option>Abril</option>
  <option>Maig</option>
  <option>Juny</option>
  <option>Juliol</option>
  <option>Agost</option>
  <option>Setembre</option>
  <option>Octubre</option>
  <option>Novembre</option>
  <option>Desembre</option>
</select>
  </div>
  <div>
    <select name="r:r:2:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idij" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label>Codi de seguretat
    <input type="number" name="r:r:5:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id1k" placeholder="3 o 4 dígits" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <span>Tipus de targeta</span>
    <select name="r:r:7:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idggh3b" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idwx">Adreça</label>
    <input type="text" name="r:r:3:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idwx" placeholder="Carrer, número o nom de la via" data-moz-autofill-type="address-line1">
  </div>
</form>

</fieldset></body></html>
