<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-ship.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>ФИО
    <input type="text" name="contactName" id="ida6" placeholder="Введите ваше полное имя" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Улица, дом
    <input type="text" name="address1" id="idiealh" placeholder="Например, Ленина 10" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Почтовый индекс
    <input type="text" name="postalCode" id="id80" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Город
    <input type="text" name="city" id="id5a" placeholder="Введите город" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Страна
    <select name="countryName" id="id8d" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Украина</option>
  <option>Казахстан</option>
  <option>Армения</option>
</select>
    </label>
  </div>
  <div>
    <label>Дополнительный адрес
    <input type="text" name="addr2" id="iddppo" placeholder="Квартирa, офис" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Квартира
    <input type="text" name="apt" id="id9j" placeholder="Введите номер квартиры" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Корпус
    <input type="text" name="idqq7f" id="idps5t" placeholder="Введите номер корпуса" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>Ориентир
    <input type="text" name="id9l" id="idmtahx" placeholder="Например, рядом с магазином" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Район
    <input type="text" name="district" id="idr71" placeholder="Введите район" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <button name="id5q" id="id7bl67" type="submit">Отправить</button>
  </div>
</form>

</fieldset></body></html>
