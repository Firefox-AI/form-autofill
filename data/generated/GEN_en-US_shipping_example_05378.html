<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.us</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="idz3h" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="surname" id="idas" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Country</span>
    <select name="country_id" id="id2ofm" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>Turkey</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <span>Select State</span>
    <select name="county" id="id7r2b5" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <span>Select City</span>
    <select name="town" id="idodq" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Los Angeles</option>
  <option>Houston</option>
  <option>Chicago</option>
  <option>Miami</option>
  <option>San Francisco</option>
</select>
  </div>
  <div>
    <span>Street Address</span>
    <input type="text" name="street" id="idd02ml" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Zip Code:</span>
    <input type="number" name="zipCode" id="idwz" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="mobile" id="idianer" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Tax Office:</span>
    <input type="text" name="companyName" id="id8k6" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Social Security Number:</span>
    <input type="number" name="vat" id="iddxtxn" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
