<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idchyh">Vorname</label>
    <input type="text" name="givenName" id="idchyh" placeholder="Geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idx8425">Nachname</label>
    <input type="text" name="billing_last_name" id="idx8425" placeholder="Geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idchi">Zusätzlicher Name</label>
    <input type="text" name="mname" id="idchi" placeholder="Geben Sie einen zusätzlichen Namen ein (optional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idrnpka">Spitzname</label>
    <input type="text" name="displayName" id="idrnpka" placeholder="Geben Sie Ihren Spitznamen ein (optional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="id182o">E-Mail-Adresse</label>
    <input type="email" name="emailAddress" id="id182o" placeholder="name@beispiel.at" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idui">Telefonnummer</label>
    <input type="tel" name="tel" id="idui" placeholder="+43 123 4567890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idpk">Unternehmen</label>
    <input type="text" name="organization2" id="idpk" placeholder="Name Ihres Unternehmens (optional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idx4">Geburtsdatum</label>
    <input type="text" name="dateOfBirth7" id="idx4" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
