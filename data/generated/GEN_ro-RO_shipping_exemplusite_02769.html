<html><head>

<body>

<fieldset>
<h3>exemplu-site.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>

  <div>

  <option>Ungaria</option>
  <option>Bulgaria</option>

</select>
  </div>
  <div>

  </div>
  <div>
    <button name="idx3ya" id="id0ebxi" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
