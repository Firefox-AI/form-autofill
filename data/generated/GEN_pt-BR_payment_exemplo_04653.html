<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option value=""></option>

  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>

</select>
    </label>
  </div>
  <div>

  <option>Diners Club</option>

  <div>
    <input type="text" name="r:r:3:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idaogq" placeholder="Rua, número e complemento" aria-label="Endereço de cobrança" data-moz-autofill-type="street-address">
