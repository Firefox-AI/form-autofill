<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.examplebank.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccType">Card Type</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="ccNumber">Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Enter your card number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccName">Cardholder Name</label>
    <input type="text" name="ccName" id="ccName" placeholder="Full name as shown on card" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - January</option>
  <option>02 - February</option>
  <option>03 - March</option>
  <option>04 - April</option>
  <option>05 - May</option>
  <option>06 - June</option>
  <option>07 - July</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - October</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Expiration Year</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Security Code (CVC)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 or 4 digit code" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="addressLine1">Street Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Your address (e.g., 123 Main St)" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apt, Suite, Bldg (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">State</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <label for="postalCode">ZIP Code</label>
    <input type="number" name="postalCode" id="postalCode" placeholder="5-digit ZIP code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Mexico</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <label for="organization">Company Name (optional)</label>
    <input type="text" name="organization" id="organization" placeholder="If applicable" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="Your email for confirmation" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
