<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idquyh">Nom sur la carte</label>
    <input type="text" name="nameOnCard" id="idquyh" placeholder="Entrez le nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idje4">Adresse de facturation</label>
    <input type="text" name="streetAddress" id="idje4" placeholder="123 Rue de Exemple" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idckzn">Code postal</label>
    <input type="text" name="postcode" id="idckzn" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idjexx">Ville</label>
    <input type="text" name="city" id="idjexx" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idmyi">Région</label>
    <select name="province" id="idmyi" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <label for="idf6ef">Pays</label>
    <select name="country6" id="idf6ef" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Royaume-Uni</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
  <option>Portugal</option>
  <option>Danemark</option>
</select>
  </div>
  <div>
    <label for="idyp">Numéro de TVA intracommunautaire</label>
    <input type="text" name="vat" id="idyp" placeholder="FR12345678901" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="iditn">Numéro de téléphone</label>
    <input type="tel" name="phone9" id="iditn" placeholder="0123456789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
