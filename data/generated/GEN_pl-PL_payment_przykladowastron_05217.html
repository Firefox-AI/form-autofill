<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="nameOnCard2" id="idsu1" placeholder="Wpisz swoje imię i nazwisko" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numer karty</span>
    <input type="number" name="cardNumber" id="idkrz7" placeholder="Wpisz numer karty" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Miesiąc wygaśnięcia</span>
    <select name="expMonth6" id="idjon2" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <span>Rok wygaśnięcia</span>
    <select name="exp_year" id="idpz0f0" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Kod CVV</span>
    <input type="number" name="cvc6" id="idcnt" placeholder="3-cyfrowy kod z tyłu karty" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Rodzaj karty</span>
    <select name="cardType" id="idp1pb" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="zip" id="idbrl" placeholder="Wpisz swój kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idxkrk" id="idnz" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
