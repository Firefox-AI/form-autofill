<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Име
    <input type="text" name="name" id="name" placeholder="Вашето име" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="addressLine2">Допълнителна информация (по желание)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Например, етаж, апартамент" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Номер на сграда
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Сградата ви номер" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Име на улицата" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Вашият пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Град/село
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Вашият град или село" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="countryName">Държава</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Гърция</option>
  <option>Румъния</option>
  <option>Турция</option>
  <option>Сърбия</option>
</select>
  </div>
</form>

</fieldset></body></html>
