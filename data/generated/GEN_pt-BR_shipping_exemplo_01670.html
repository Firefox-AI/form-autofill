<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome completo
    <input type="text" name="name" id="id0kx1b" placeholder="Seu nome completo aqui" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <input type="text" name="addressLine1" id="iddddl9" placeholder="Rua, Avenida, etc." aria-label="Endereço" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addr2" id="idb0qgd" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="town" id="idasg" placeholder="Sua cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ideg">CEP</label>
    <input type="text" name="zipCode" id="ideg" placeholder="Seu CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="idub" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Colômbia</option>
  <option>Uruguai</option>
</select>
  </div>
  <div>
    <input type="text" name="neighborhood" id="id4e34" placeholder="Seu estado" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
