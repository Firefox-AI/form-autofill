<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="la tua.email@esempio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Es. +39 012 345 6789" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Data di nascita" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Il tuo soprannome (opzionale)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Password">
  </div>
</form>

</fieldset></body></html>
