<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>First Name
    <input type="text" name="fname" id="idui" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="surname" id="idz0" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Email Address
    <input type="email" name="emailAddress" id="ides" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="mobile" id="idsfrsp" placeholder="e.g. 07123 456 789" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="streetAddress" id="id3v" placeholder="House number and street name" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Address Line 2 (optional)
    <input type="text" name="street2" id="idsk4" placeholder="Apartment, suite, unit, building, floor, etc." data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="idmab" placeholder="e.g. SW1A 1AA" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City or Town
    <input type="text" name="locality" id="iditmm" data-moz-autofill-type="address-level2">
    </label>
  </div>
</form>

</fieldset></body></html>
