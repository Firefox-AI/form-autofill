<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="billing_first_name" id="idd3y" aria-label="First Name *" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="lastName" id="idhyrp" aria-label="Last Name *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="user_email" id="idp3" aria-label="Email Address *" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="telephone" id="idmfz1" placeholder="e.g. 020 1234 5678" aria-label="Phone Number *" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="address" id="idcv4as" placeholder="House number and street" aria-label="Address Line 1 *" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zip_code" id="id2w" placeholder="e.g. SW1A 1AA" aria-label="Postcode *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="city" id="idhg" aria-label="City/Town *" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
