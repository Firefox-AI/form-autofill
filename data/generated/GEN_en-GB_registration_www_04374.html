<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name *" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address *" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="e.g. 020 1234 5678" aria-label="Phone Number *" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" aria-label="Address Line 1 *" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postcode *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City/Town *" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
