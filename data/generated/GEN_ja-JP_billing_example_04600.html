<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1cr">お名前</label>
    <input type="text" name="cardName" id="id1cr" placeholder="山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idltb9">住所</label>
    <input type="text" name="address1" id="idltb9" placeholder="1-2-3 新宿" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idvl47t">郵便番号</label>
    <input type="text" name="zipCode" id="idvl47t" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id3zv">市区町村</label>
    <input type="text" name="city4" id="id3zv" placeholder="新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idv2">都道府県</label>
    <select name="province" id="idv2" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
</select>
  </div>
  <div>
    <label for="iddus8g">国</label>
    <select name="countryName" id="iddus8g" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
</select>
  </div>
  <div>
    <label for="id1eay">電話番号</label>
    <input type="tel" name="phoneNumber" id="id1eay" placeholder="03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idkzfrs">丁目</label>
    <input type="text" name="addressLine26" id="idkzfrs" placeholder="4丁目" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idon">アパート名</label>
    <input type="text" name="apartment6" id="idon" placeholder="ヒルズ203号室" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
