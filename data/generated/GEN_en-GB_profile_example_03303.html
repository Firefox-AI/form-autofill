<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqeq">Country</label>
    <select name="r:r:5:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idqeq" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <label for="idtqie">First Name</label>
    <input type="text" name="r:r:4:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idtqie" placeholder="First Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idjou">Last Name</label>
    <input type="text" name="r:r:9:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idjou" placeholder="Last Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id8tt">Address Lookup</label>
    <input type="text" name="r:r:4:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="id8tt" placeholder="Address Lookup" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="idh2">Address Lookup Continued</label>
    <input type="text" name="r:r:4:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idh2" placeholder="Address Lookup Continued" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="idyc0x">Street Name</label>
    <input type="text" name="r:r:5:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idyc0x" placeholder="Street Name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idh9">Additional Street Name</label>
    <input type="text" name="r:r:7:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idh9" placeholder="Additional Street Name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id3ts8k">House Number</label>
    <input type="text" name="r:r:1:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="id3ts8k" placeholder="House Number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idtr5">Flat/Unit Number</label>
    <input type="text" name="r:r:1:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idtr5" placeholder="Flat/Unit Number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idlmhm">Address Line 2 (optional)</label>
    <input type="text" name="r:r:2:m:r:10:cr:1:c:pr:1:container:fs:i:input" id="idlmhm" placeholder="Address Line 2 (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id8xr">Postcode</label>
    <input type="text" name="r:r:5:m:r:11:cr:2:c:pr:1:container:fs:i:input" id="id8xr" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id2n">Confirm Postcode</label>
    <input type="text" name="r:r:6:m:r:12:cr:3:c:pr:1:container:fs:i:input" id="id2n" placeholder="Confirm Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddw5rz">City/Town</label>
    <input type="text" name="r:r:9:m:r:13:cr:2:c:pr:1:container:fs:i:input" id="iddw5rz" placeholder="City/Town" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id9bu78">County</label>
    <input type="text" name="r:r:8:m:r:14:cr:3:c:pr:1:container:fs:i:input" id="id9bu78" placeholder="County" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idhr">Country Code</label>
    <select name="r:r:8:m:r:15:cr:3:c:pr:1:container:fs:i:input" id="idhr" data-moz-autofill-type="tel-country-code">

  <option>+44</option>
  <option>+1</option>
  <option>+61</option>
  <option>+49</option>
  <option>+33</option>
  <option>+39</option>
  <option>+34</option>
</select>
  </div>
  <div>
    <label for="idnr">Telephone Number</label>
    <input type="tel" name="r:r:9:m:r:16:cr:1:c:pr:1:container:fs:i:input" id="idnr" placeholder="Enter a 9-10 digit number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
