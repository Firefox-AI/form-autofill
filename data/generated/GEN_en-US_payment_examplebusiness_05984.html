<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplebusiness.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idousv">First Name</label>
    <input type="text" name="billing_first_name" id="idousv" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idnap">Last Name</label>
    <input type="text" name="lname" id="idnap" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idsjoog">Address: Line 1</label>
    <input type="text" name="streetName" id="idsjoog" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id1oj">Height</label>
    <input type="text" name="houseNumber" id="id1oj" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idvy26">Apartment/Suite</label>
    <input type="text" name="suite" id="idvy26" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idu4q">State</label>
    <select name="locality" id="idu4q" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idpv0">Province</label>
    <select name="province" id="idpv0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
</select>
  </div>
  <div>
    <label for="id2qzs8">Province</label>
    <select name="county" id="id2qzs8" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
</select>
  </div>
  <div>
    <label for="ideg">Province</label>
    <select name="stateProvince" id="ideg" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
</select>
  </div>
  <div>
    <label for="idon">City</label>
    <input type="text" name="town" id="idon" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idmi">Locality</label>
    <input type="text" name="locality" id="idmi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idrkt">Neighborhood</label>
    <input type="text" name="district" id="idrkt" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="id5tmn">Zip Code</label>
    <input type="text" name="postalCode" id="id5tmn" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idndk86">Phone Number</label>
    <input type="tel" name="mobile" id="idndk86" placeholder="+1 (__) ___-____" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id0d7k">Billing Address</label>
    <input type="text" name="street" id="id0d7k" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idirak">RUT Number</label>
    <input type="text" name="hausnummer" id="idirak" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="id079">Date of Birth</label>
    <input type="text" name="dateOfBirth" id="id079" placeholder="MM/DD/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idhm">Country</label>
    <select name="country" id="idhm" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="iddfcyv">Company</label>
    <input type="text" name="business" id="iddfcyv" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id3y">Email Address</label>
    <input type="email" name="mail" id="id3y" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
