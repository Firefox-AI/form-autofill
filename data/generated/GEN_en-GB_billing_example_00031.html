<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="Enter your National Insurance or ID number" aria-label="National ID Number" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="Enter your email address" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Search Address...</span>
    <input type="text" name="addressLookup" id="addressLookup" placeholder="Type your address" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Street</span>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Enter your house number" aria-label="House Number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Flat, Door and Additional Information</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Enter flat or door details" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
