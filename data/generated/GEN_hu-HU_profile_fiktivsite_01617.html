<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivsite.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Keresztnév
    <input type="text" name="fname" id="idtu" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Vezetéknév
    <input type="text" name="last_name" id="idz8kz" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Középső név
    <input type="text" name="middleName" id="idvel5v" placeholder="Opció: középső név (ha van)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Becenév
    <input type="text" name="handle" id="idmymuc" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Email cím
    <input type="email" name="user_email" id="ideh6pj" placeholder="Például: valami@példa.hu" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonszám
    <input type="tel" name="tel9" id="id86g" placeholder="Írd be a telefonszámod" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Szervezet
    <input type="text" name="companyName8" id="idov7nu" placeholder="Szólj, hogy melyik szervezethez tartozol" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Születési dátum
    <input type="text" name="dob" id="id8qf5l" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Személyi azonosító szám
    <input type="text" name="taxId" id="idsnx" placeholder="Írd be a személyi azonosítódat" data-moz-autofill-type="id-number">
    </label>
  </div>
  <div>
    <label>Jelszó
    <input type="password" name="idua" id="iddbmd" placeholder="Írd be a jelszavad">
    </label>
  </div>
</form>

</fieldset></body></html>
