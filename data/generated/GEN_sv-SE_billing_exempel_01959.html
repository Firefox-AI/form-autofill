<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Namn på kortet</label>
    <input type="text" name="ccName" id="ccName" placeholder="Skriv ditt namn som det står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Gatuadress</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ange din gatuadress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Lägenhetsnummer eller extra adressrad</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Ange lägenhetsnummer om tillämpligt" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ange ditt postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ange din stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Län</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Stockholm</option>
  <option>Göteborg</option>
  <option>Malmö</option>
  <option>Uppsala</option>
  <option>Örebro</option>
  <option>Linköping</option>
  <option>Helsingborg</option>
  <option>Norrköping</option>
  <option>Jönköping</option>
  <option>Västerås</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannien</option>
  <option>USA</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Momsregistreringsnummer</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Ange ditt momsregistreringsnummer" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
