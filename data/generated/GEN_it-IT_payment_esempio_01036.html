<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="id8e38" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="idmi" placeholder="1234 5678 9012 3456" aria-label="Numero della carta" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="expMonth" id="idkb7p" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label>Anno di scadenza
    <select name="expYear" id="id6on5" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
    </label>
  </div>
  <div>
    <label>Codice di sicurezza (CVC)
    <input type="number" name="csc" id="idfqd9" placeholder="123" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <span>Tipo di carta</span>
    <select name="cardType" id="idns" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label>Indirizzo di fatturazione
    <input type="text" name="street" id="idksh3k" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <button name="idie" id="id20h" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
