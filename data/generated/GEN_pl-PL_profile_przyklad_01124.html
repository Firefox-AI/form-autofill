<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Imię</label>
    <input type="text" name="givenName" id="givenName" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nazwisko</label>
    <input type="text" name="familyName" id="familyName" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Dodatkowe imię</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Wprowadź dodatkowe imię (opcjonalnie)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Pseudonim</label>
    <input type="text" name="nickname" id="nickname" placeholder="Wprowadź swój pseudonim" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Wprowadź adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Wprowadź numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organizacja</label>
    <input type="text" name="organization" id="organization" placeholder="Nazwa Twojej organizacji" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Data urodzenia</label>
    <input type="text" name="bday" id="bday" placeholder="Wybierz datę urodzenia" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">Stanowisko</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Twoje stanowisko w organizacji" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="idNumber">Numer identyfikacyjny</label>
    <input type="text" name="idNumber" id="idNumber" placeholder="Wprowadź swój numer identyfikacyjny" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="field">Hasło</label>
    <input type="password" name="field" id="field" placeholder="Wprowadź swoje hasło">
  </div>
</form>

</fieldset></body></html>
