<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

    <label for="idr7d">Imię</label>
    <input type="text" name="fname" id="idr7d" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">

  <div>
    <label for="idxz11">Nazwisko</label>
