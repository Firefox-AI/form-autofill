<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>姓</span>
    <input type="text" name="lastName9" id="idmp" placeholder="山田　(例: 山田)" data-moz-autofill-type="family-name">

    <label for="idmu2">名</label>

  </div>
  <div>
    <input type="tel" name="phoneNumber" id="idh9" placeholder="050-1234-5678" aria-label="電話番号" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idqjxy">所属組織</label>
    <input type="text" name="business5" id="idqjxy" placeholder="会社名や学校名" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="birthday" id="idbd" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>選択してください</option>
  <option>1990年1月1日</option>
  <option>1991年2月2日</option>
  <option>1992年3月3日</option>
</select>
  </div>
  <div>
    <label for="id9u">名のフリガナ</label>
    <input type="text" name="id6ux" id="id9u" placeholder="たろう" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <input type="password" name="id5w" id="idg6" placeholder="パスワード">
  </div>
</form>

</fieldset></body></html>
