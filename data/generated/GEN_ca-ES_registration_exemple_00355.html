<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvtmln">Nom</label>
    <input type="text" name="billing_first_name" id="idvtmln" placeholder="El teu nom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Cognoms</span>
    <input type="text" name="last_name" id="idaem" placeholder="Els teus cognoms" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Correu electrònic
    <input type="email" name="user_email" id="idn3ecc" placeholder="exemple@domini.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <span>Telèfon</span>
    <input type="tel" name="telephone" id="idhxq" placeholder="Només números" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Data de naixement</span>
    <input type="text" name="dob" id="idpjy8" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="unit" id="idel" placeholder="Pis o número d&#x27;apartament" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idswlos" id="idqhtrl" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
