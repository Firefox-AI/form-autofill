<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nom</label>
    <input type="text" name="givenName" id="givenName" placeholder="El teu nom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Cognoms
    <input type="text" name="familyName" id="familyName" placeholder="Els teus cognoms" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="exemple@domini.com" aria-label="Correu electrònic" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telèfon
    <input type="tel" name="tel" id="tel" placeholder="El teu telèfon" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label for="bday">Data de naixement</label>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Número del pis (si escau)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrar-se</button>
  </div>
</form>

</fieldset></body></html>
