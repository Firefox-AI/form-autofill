<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idisp4r">カード名義人名</label>
    <input type="text" name="cardholderName" id="idisp4r" placeholder="例：山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idh1g">住所（番地）</label>
    <input type="text" name="addr1" id="idh1g" placeholder="例：1-2-3" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idajbr">郵便番号</label>
    <input type="text" name="postalCode" id="idajbr" placeholder="例：123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddq">市区町村</label>
    <input type="text" name="town4" id="iddq" placeholder="例：中央区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idcvz1n">都道府県</label>

  <option>栃木県</option>
  <option>群馬県</option>
  <option>埼玉県</option>
  <option>千葉県</option>
  <option>東京都</option>
  <option>神奈川県</option>
  <option>新潟県</option>
  <option>富山県</option>
  <option>石川県</option>
  <option>福井県</option>
  <option>山梨県</option>
  <option>長野県</option>
  <option>岐阜県</option>
  <option>静岡県</option>
  <option>愛知県</option>
  <option>三重県</option>
  <option>滋賀県</option>
  <option>京都府</option>
  <option>大阪府</option>
  <option>兵庫県</option>
  <option>奈良県</option>
  <option>和歌山県</option>
  <option>鳥取県</option>
  <option>島根県</option>
  <option>岡山県</option>
  <option>広島県</option>
  <option>山口県</option>
  <option>徳島県</option>
  <option>香川県</option>
  <option>愛媛県</option>
  <option>高知県</option>
  <option>福岡県</option>
  <option>佐賀県</option>
  <option>長崎県</option>
  <option>熊本県</option>
  <option>大分県</option>
  <option>宮崎県</option>
  <option>鹿児島県</option>
  <option>沖縄県</option>
</select>
  </div>
  <div>
    <label for="idcexye">国</label>
    <select name="country" id="idcexye" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>イギリス</option>
  <option>カナダ</option>
  <option>オーストラリア</option>
  <option>インド</option>
</select>
  </div>
  <div>
    <label for="id1j7">VAT番号</label>
    <input type="text" name="vatNumber" id="id1j7" placeholder="例：JP123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idbsx8">会社名</label>
    <input type="text" name="business" id="idbsx8" placeholder="例：株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id7ew9">住所（建物名）</label>
    <input type="text" name="addr2" id="id7ew9" placeholder="例：サンプルマンション101" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <button name="idz9" id="idt9ij" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
