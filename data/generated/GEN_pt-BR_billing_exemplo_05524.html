<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome do titular do cartão</span>
    <input type="text" name="cardholderName" id="iduf" placeholder="Nome como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Empresa (opcional)</span>
    <input type="text" name="business" id="idapf" placeholder="Nome da empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="street" id="idq6gv" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bairro</span>
    <input type="text" name="locality" id="idd8" placeholder="Nome do bairro" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>CEP</span>
    <input type="text" name="postcode" id="idepnjh" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Estado</span>
    <select name="county" id="idvy5" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>São Paulo</option>
  <option>Rio de Janeiro</option>
  <option>Minas Gerais</option>
  <option>Bahia</option>
  <option>Paraná</option>
  <option>Rio Grande do Sul</option>
  <option>Santa Catarina</option>
  <option>Ceará</option>
  <option>Pernambuco</option>
  <option>Pará</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="idkrq8y" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
</form>

</fieldset></body></html>
