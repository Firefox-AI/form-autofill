<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Név</label>
    <input type="text" name="name" id="name" placeholder="Írd be a neved" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-mail cím</label>
    <input type="email" name="email" id="email" placeholder="Például: pelda@example.hu" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonszám</label>
    <input type="tel" name="tel" id="tel" placeholder="Formátum: +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Utca és házszám</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Például: Fő utca 123." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Város</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Írd be a város nevét" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Irányítószám</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Például: 1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Ország</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szerbia</option>
</select>
  </div>
</form>

</fieldset></body></html>
