<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0syje">Navn</label>
    <input type="text" name="contactName" id="id0syje" placeholder="Skriv inn ditt fulle navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idzvve">Gateadresse</label>
    <input type="text" name="addr" id="idzvve" placeholder="F.eks. Storgata 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idc5b">Postnummer</label>
    <input type="text" name="zip" id="idc5b" placeholder="F.eks. 0123" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7fq">By</label>
    <input type="text" name="town" id="id7fq" placeholder="Skriv inn byen din" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idvn">Land</label>
    <select name="countryName" id="idvn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idci5a">Tilleggsnavn (valgfritt)</label>
    <input type="text" name="idxby" id="idci5a" placeholder="F.eks. C/O Ola Nordmann" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
