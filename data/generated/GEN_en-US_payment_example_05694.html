<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idw6lcq">ZIP Code</label>
    <input type="text" name="postalCode" id="idw6lcq" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id8g4q1">Email Address for Confirmation</label>
    <input type="email" name="emailAddress" id="id8g4q1" placeholder="Enter your email here" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idxdga">Phone Number for SMS Notifications</label>
    <input type="tel" name="telephone" id="idxdga" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idoyw0c">First Name</label>
    <input type="text" name="firstName" id="idoyw0c" placeholder="Your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idc0i">Last Name</label>
    <input type="text" name="lastName" id="idc0i" placeholder="Your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5x9xm">Street Address</label>
    <input type="text" name="address" id="id5x9xm" placeholder="Your street address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id6y6">ZIP Code (Again)</label>
    <input type="text" name="postalCode" id="id6y6" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddbm3">City</label>
    <input type="text" name="town" id="iddbm3" placeholder="Your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id4v">First Name (Again)</label>
    <input type="text" name="billing_first_name" id="id4v" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idqp">Last Name (Again)</label>
    <input type="text" name="lastName" id="idqp" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idls">Street Address (Again)</label>
    <input type="text" name="street" id="idls" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idt8">ZIP Code (Final)</label>
    <input type="text" name="postcode" id="idt8" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idtm">City (Final)</label>
    <input type="text" name="city" id="idtm" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
