<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Jméno a příjmení
    <input type="text" name="ccName" id="ida4" placeholder="Například Jan Novák" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Ulice a číslo popisné
    <input type="text" name="streetAddress" id="idig0eq" placeholder="Například Hlavní 123" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>PSČ
    <input type="text" name="zip" id="idad" placeholder="Například 110 00" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Město
    <input type="text" name="city" id="idnwg" placeholder="Například Praha" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="province" id="id8j" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Zlínský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
    </label>
  </div>
  <div>
    <label>Země
    <select name="country" id="iddak" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovenská republika</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
  <option>Francie</option>
  <option>Spojené státy</option>
  <option>Velká Británie</option>
  <option>Itálie</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
