<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Surname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Phonetic Surname" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Phonetic First Name" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <input type="number" name="bdayYear" id="bdayYear" placeholder="Year of Birth" data-moz-autofill-type="bday-year">
  </div>
  <div>
    <select name="bdayMonth" id="bdayMonth" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <input type="number" name="bdayDay" id="bdayDay" placeholder="Day of Birth" data-moz-autofill-type="bday-day">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Address Line 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
