<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.fiktivnistranka.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardName" id="idd3zl6" placeholder="Jméno a příjmení na kartě" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="idbbr" placeholder="xxxx xxxx xxxx xxxx" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="exp_month" id="idlkc" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1 - Leden</option>
  <option>2 - Únor</option>
  <option>3 - Březen</option>
  <option>4 - Duben</option>
  <option>5 - Květen</option>
  <option>6 - Červen</option>
  <option>7 - Červenec</option>
  <option>8 - Srpen</option>
  <option>9 - Září</option>
  <option>10 - Říjen</option>
  <option>11 - Listopad</option>
  <option>12 - Prosinec</option>
</select>
  </div>
  <div>
    <select name="expYear" id="idctp" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <input type="number" name="csc" id="idmn" placeholder="Tříciferný kód na zadní straně" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="cardType" id="id5w" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <button name="idsjc" id="id0t" type="submit">Zaplatit</button>
  </div>
</form>

</fieldset></body></html>
