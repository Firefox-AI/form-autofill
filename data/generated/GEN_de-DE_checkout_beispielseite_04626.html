<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idh4">Land*</label>
    <select name="r:r:7:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idh4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="idcjct">Vorname*</label>
    <input type="text" name="r:r:7:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idcjct" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="ida5cc">Nachname*</label>
    <input type="text" name="r:r:9:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="ida5cc" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id14">Vorwahl*</label>
    <select name="r:r:3:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="id14" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+49</option>
  <option>+43</option>
  <option>+41</option>
</select>
  </div>
  <div>
    <label for="idpfvm">Handynummer*</label>
    <input type="tel" name="r:r:6:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idpfvm" placeholder="Ihre Handynummer" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="id13g">Nach Postleitzahl, Straße oder Adresse suchen</label>
    <input type="text" name="r:r:7:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="id13g" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="id26pr">Straße*</label>
    <input type="text" name="r:r:2:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id26pr" placeholder="Ihre Straße" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idhanpx">Wohnung, Suite, Einheit usw. (optional)</label>
    <input type="text" name="r:r:6:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idhanpx" placeholder="Z.B. Wohnung 2B" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="idf2">Bundesland*</label>
    <select name="r:r:9:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="idf2" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idpde">Stadt*</label>
    <input type="text" name="r:r:2:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idpde" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxd">Postleitzahl*</label>
    <input type="text" name="r:r:3:m:r:11:cr:1:c:pr:1:container:fs:i:input" id="idxd" placeholder="Ihre Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
