<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-store.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>敬称</span>
    <select name="title" id="idjxf" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>様</option>
  <option>先生</option>
  <option>女性</option>
  <option>男性</option>
  <option>企業</option>
</select>
  </div>
  <div>
    <span>名</span>
    <input type="text" name="fname" id="ida8vxu" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="last_name" id="id1z" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>会社名</span>
    <input type="text" name="organization" id="idibaf" placeholder="例：株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="street" id="id1r" placeholder="例：1-2-3" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="city" id="idqihue" placeholder="例：新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>町名・番地</span>
    <input type="text" name="neighborhood" id="idpk6rb" placeholder="例：西新宿" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>建物名</span>
    <input type="text" name="id6e1" id="idvcc" placeholder="例：新宿パークタワー" data-moz-autofill-type="address-level4">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="zip" id="idjhp" placeholder="例：160-0000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="country" id="idg637" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>中国</option>
  <option>韓国</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="email" id="id30o" placeholder="例：example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="telephone" id="idr3u03" placeholder="例：03-1234-5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
