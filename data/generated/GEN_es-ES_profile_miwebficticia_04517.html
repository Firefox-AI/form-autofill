<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>miwebficticia.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellido</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tu apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Segundo nombre</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Opcional" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Apodo</label>
    <input type="text" name="nickname" id="nickname" placeholder="Introduce tu apodo" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="555-123-456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organización</label>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Fecha de nacimiento</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="phoneticGivenName">Nombre fonético</label>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Introduce el nombre en caracteres fonéticos (opcional)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label for="field">Contraseña</label>
    <input type="password" name="field" id="field" placeholder="Crea una contraseña segura">
  </div>
</form>

</fieldset></body></html>
