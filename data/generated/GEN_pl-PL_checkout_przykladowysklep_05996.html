<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowy-sklep.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iddz">Tytuł</label>
    <select name="title" id="iddz" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pan</option>
  <option>Pani</option>
  <option>Pani Profesor</option>
  <option>Pan Doktor</option>
</select>
  </div>
  <div>
    <label for="idhj">Imię</label>
    <input type="text" name="first_name" id="idhj" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idoqob">Nazwisko</label>
    <input type="text" name="last_name" id="idoqob" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id26tt">Nazwa firmy (jeśli dotyczy)</label>
    <input type="text" name="organization" id="id26tt" placeholder="Nazwa firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id4v2">Ulica i numer</label>
    <input type="text" name="address1" id="id4v2" placeholder="Wprowadź ulicę i numer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idquyi">Mieszkanie (jeśli dotyczy)</label>
    <input type="text" name="flat" id="idquyi" placeholder="Numer mieszkania" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idbfrp">Budynek (jeśli dotyczy)</label>
    <input type="text" name="id47w9" id="idbfrp" placeholder="Numer budynku" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idlk1x">Miasto</label>
    <input type="text" name="town" id="idlk1x" placeholder="Wprowadź miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxc8">Kod pocztowy</label>
    <input type="text" name="postcode" id="idxc8" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7rs">Kraj</label>
    <select name="countryName" id="id7rs" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <label for="id4trih">Adres e-mail</label>
    <input type="email" name="emailAddress" id="id4trih" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idoa6">Numer telefonu</label>
    <input type="tel" name="mobile" id="idoa6" placeholder="Wprowadź numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id32">Numer VAT (jeśli dotyczy)</label>
    <input type="text" name="vatId" id="id32" placeholder="Wprowadź numer VAT" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
