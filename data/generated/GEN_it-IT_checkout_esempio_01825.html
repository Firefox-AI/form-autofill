<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id5u">Nome</label>
    <input type="text" name="firstName" id="id5u" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idyblx">Cognome</label>
    <input type="text" name="lastName" id="idyblx" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idfjy">Indirizzo</label>
    <input type="text" name="addr1" id="idfjy" placeholder="Via e numero civico" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id6sh">Appartamento</label>
    <input type="text" name="apartment" id="id6sh" placeholder="Numero appartamento (se presente)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idywm">Città</label>
    <input type="text" name="town" id="idywm" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id5p">CAP</label>
    <input type="text" name="postcode" id="id5p" placeholder="Inserisci il tuo codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idjve">Paese</label>
    <select name="countryName" id="idjve" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <label for="idlr">Email</label>
    <input type="email" name="email" id="idlr" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id9tvn">Prefisso</label>
    <input type="tel" name="areaCode" id="id9tvn" placeholder="+39" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="idqdk20">Numero di telefono</label>
    <input type="tel" name="phoneNumber" id="idqdk20" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
