<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

</select>
  </div>

  <div>
    <button name="r:r:8:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="id2t" type="submit">Submit</button>
  </div>
</form>
