</head>

<body>

<fieldset>
<h3>example.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="yourName1" id="idi2lqg" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="ide43" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Téléphone</span>
    <input type="tel" name="tel" id="id0b7ec" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="street" id="idl7" placeholder="Numéro et nom de la rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="city" id="idtp8l" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="zip" id="idld" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName5" id="idxw" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
</form>

</fieldset></body></html>
