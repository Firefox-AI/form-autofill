<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkkisivusto.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Yritys (valinnainen)</label>
    <input type="text" name="organization" id="organization" placeholder="Esim. Oy, Ab" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Katuosoite</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Osoite, esim. Katu 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Esim. 00100" aria-label="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Maa" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
  <option>Kanada</option>
</select>
  </div>
  <div>
    <span>Sähköposti</span>
    <input type="email" name="email" id="email" placeholder="Esim. nimi@esimerkki.fi" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Esim. 040 123 4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
