<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Enter Recipient&#x27;s Name</label>
    <input type="text" name="name" id="name" placeholder="Enter Recipient&#x27;s Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="888 1234 5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Enter Email Address</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="streetAddress">Enter Full Address</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Enter Full Address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" aria-label="State/Province" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="postalCode">Enter Zip Code</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
