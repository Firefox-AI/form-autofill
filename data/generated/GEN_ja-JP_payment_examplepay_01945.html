<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-pay.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iduqcxz">カード名義人</label>
    <input type="text" name="ccName" id="iduqcxz" placeholder="例: 山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idtce">クレジットカード番号</label>
    <input type="number" name="cardNo" id="idtce" placeholder="番号を入力してください" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id5sp">有効期限（月）</label>
    <select name="exp_month" id="id5sp" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="idjfux">有効期限（年）</label>
    <select name="expYear" id="idjfux" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
</select>
  </div>
  <div>
    <label for="idkyq">セキュリティコード</label>
    <input type="number" name="csc" id="idkyq" placeholder="カード裏面の3桁" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idemtn0">カードの種類</label>
    <select name="cardType" id="idemtn0" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <label for="id8c">都道府県</label>
    <input type="text" name="id4y4hv" id="id8c" placeholder="例: 東京都" data-moz-autofill-type="address-level4">
  </div>
</form>

</fieldset></body></html>
