<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-pay.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="cc_name_7420">カード名義人</label>
    <input type="text" name="cc_name_8399" id="cc_name_7420" placeholder="例: 山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="cc_number_6853">クレジットカード番号</label>
    <input type="number" name="cc_number_8690" id="cc_number_6853" placeholder="例: 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="cc_exp_month_4328">有効期限（月）</label>
    <select name="cc_exp_month_5370" id="cc_exp_month_4328" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="cc_exp_year_6078">有効期限（年）</label>
    <select name="cc_exp_year_715" id="cc_exp_year_6078" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
</select>
  </div>
  <div>
    <label for="cc_csc_8162">セキュリティコード</label>
    <input type="number" name="cc_csc_6621" id="cc_csc_8162" placeholder="例: 123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="cc_type_8821">カードの種類</label>
    <select name="cc_type_5012" id="cc_type_8821" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="address_level4_5074">都道府県</label>
    <input type="text" name="address_level4_3665" id="address_level4_5074" placeholder="例: 東京都" data-moz-autofill-type="address-level4">
  </div>
</form>

</fieldset></body></html>
