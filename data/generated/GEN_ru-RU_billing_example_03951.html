<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvyj4">Имя на карте</label>
    <input type="text" name="nameOnCard" id="idvyj4" placeholder="Как на карте" data-moz-autofill-type="cc-name">

  <div>

    <input type="text" name="street" id="idf5djd" placeholder="Введите адрес" data-moz-autofill-type="street-address">

  <div>
    <label for="idi6l">Почтовый индекс</label>
    <input type="text" name="zipCode" id="idi6l" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">

  <div>
    <label for="idla1m">Город</label>

  <div>
    <label for="idmxqc0">Регион</label>
    <select name="region" id="idmxqc0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Москва</option>
  <option>Санкт-Петербург</option>
  <option>Новосибирск</option>
  <option>Екатеринбург</option>
  <option>Казань</option>
  <option>Нижний Новгород</option>
  <option>Челябинск</option>
  <option>Омск</option>
  <option>Ростов-на-Дону</option>
  <option>Уфа</option>
</select>
  </div>
  <div>
    <label for="id52jy">Страна</label>
    <select name="countryName" id="id52jy" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Украина</option>
  <option>Казахстан</option>
  <option>Грузия</option>
  <option>Армения</option>
  <option>Азербайджан</option>
  <option>Молдова</option>
  <option>Латвия</option>
  <option>Литва</option>
</select>
  </div>
  <div>
    <button name="idai" id="idhf" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
