<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introdueix el teu nom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognoms</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introdueix els teus cognoms" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Correu electrònic</label>
    <input type="email" name="email" id="email" placeholder="Introdueix la teva adreça de correu electrònic" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telèfon</label>
    <input type="tel" name="tel" id="tel" placeholder="Introdueix el teu número de telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data de naixement</label>
    <input type="text" name="bday" id="bday" placeholder="Selecciona la teva data de naixement" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="field">Contrasenya</label>
    <input type="password" name="field" id="field" placeholder="Introdueix una contrasenya">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrar-se</button>
  </div>
</form>

</fieldset></body></html>
