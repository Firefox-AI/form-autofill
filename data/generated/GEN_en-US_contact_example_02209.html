<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idnw">Email Address*</label>
    <input type="email" name="user_email" id="idnw" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idmiv">Country/Region</label>
    <select name="country" id="idmiv" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <label for="idrty97">First Name*</label>
    <input type="text" name="billing_first_name" id="idrty97" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idrn2g">Last Name*</label>
    <input type="text" name="lastName" id="idrn2g" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id7ow">Street Address &amp; Number* (No shipping to P.O. Boxes or Parcel Lockers)</label>
    <input type="text" name="address1" id="id7ow" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idytl57">Address Line 2 (optional)</label>
    <input type="text" name="addr2" id="idytl57" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idxb7tu">Postal Code (optional)</label>
    <input type="text" name="postalCode" id="idxb7tu" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idfcou">City*</label>
    <input type="text" name="city" id="idfcou" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ids4">State/Province</label>
    <select name="state" id="ids4" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="id3svw">Mobile Phone Number*</label>
    <input type="tel" name="phone" id="id3svw" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idvd1">First Name*</label>
    <input type="text" name="billing_first_name" id="idvd1" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idllqkq">Last Name*</label>
    <input type="text" name="lastName" id="idllqkq" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idtc5f">Street Address*</label>
    <input type="text" name="addr1" id="idtc5f" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idzti">Apartment, suite, unit, etc. (optional)</label>
    <input type="text" name="addr2" id="idzti" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id3cqb">City*</label>
    <input type="text" name="city" id="id3cqb" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyamp">Country*</label>
    <select name="countryCode" id="idyamp" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <label for="iduv50">State/Province*</label>
    <select name="stateProvince" id="iduv50" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idfmak">State/Province*</label>
    <select name="stateProvince" id="idfmak" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="iduymb">State/Province*</label>
    <select name="province" id="iduymb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idia">Postal Code*</label>
    <input type="text" name="postalCode" id="idia" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idj5i">Phone Number*</label>
    <input type="tel" name="idpp" id="idj5i" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
