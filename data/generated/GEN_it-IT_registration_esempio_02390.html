<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <input type="text" name="bday" id="bday" placeholder="GG/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Organizzazione (opzionale)</label>
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;organizzazione" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressStreetname">Indirizzo</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Via e numero civico" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="stair">Scala (opzionale)</label>
    <input type="text" name="stair" id="stair" placeholder="Numero della scala" data-moz-autofill-type="stair">
  </div>
  <div>
    <label for="field">Password</label>
    <input type="password" name="field" id="field" placeholder="Inserisci la tua password">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrati</button>
  </div>
</form>

</fieldset></body></html>
