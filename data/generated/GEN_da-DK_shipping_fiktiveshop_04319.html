<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktiveshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn</span>
    <input type="text" name="name" id="idga3" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addr1" id="idod" placeholder="Gader og husnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip" id="id5vy64" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="town" id="idxupq" placeholder="Indtast bynavn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="idsp" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Lejlighed</span>
    <input type="text" name="unit" id="idtgqj2" placeholder="Lejlighed (hvis relevant)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Etage</span>
    <input type="text" name="etage" id="id2gq" placeholder="Indtast etage (hvis relevant)" data-moz-autofill-type="floor">
  </div>
</form>

</fieldset></body></html>
