<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idnuc3">Surname *</label>
    <input type="text" name="lname" id="idnuc3" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idlo2l">First Name *</label>
    <input type="text" name="firstName" id="idlo2l" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="ideayv">Country Code *</label>
    <select name="countryCode" id="ideayv" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+36</option>
  <option>+33</option>
  <option>+49</option>
  <option>+39</option>
</select>
  </div>
  <div>
    <label for="idf5ba">Phone Number (Hungary)</label>
    <input type="tel" name="mobile" id="idf5ba" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idj76">Country *</label>
    <select name="country" id="idj76" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Hungary</option>
  <option>Germany</option>
  <option>Italy</option>
  <option>France</option>
</select>
  </div>
  <div>
    <label for="idel">Street Address *</label>
    <input type="text" name="streetAddress" id="idel" placeholder="123 Example Street" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idbe28v">Additional Information</label>
    <input type="text" name="idoqeh" id="idbe28v" placeholder="Any additional information" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="idvr3">Postcode *</label>
    <input type="text" name="zip_code" id="idvr3" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idmts">City/Town *</label>
    <input type="text" name="city" id="idmts" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
