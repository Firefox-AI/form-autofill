<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" placeholder="Max" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname</label>
    <input type="text" name="familyName" id="familyName" placeholder="Mustermann" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Zusätzlicher Name</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Hans" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Spitzname</label>
    <input type="text" name="nickname" id="nickname" placeholder="Maxi" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" placeholder="max.mustermann@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="+43 660 1234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Unternehmen</label>
    <input type="text" name="organization" id="organization" placeholder="Muster GmbH" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Geburtstag</label>
    <input type="text" name="bday" id="bday" placeholder="Geburtstag" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">Position</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Geschäftsführer" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="idNumber">Personalausweisnummer</label>
    <input type="text" name="idNumber" id="idNumber" placeholder="A12345678" data-moz-autofill-type="id-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
