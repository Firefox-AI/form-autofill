<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>billing-express.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="id8a" placeholder="Наприклад, Іван Іванов" aria-label="Ім&#x27;я власника картки" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="business" id="idtk48" placeholder="Ваша компанія" aria-label="Назва компанії" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="addr" id="id4f" placeholder="Вулиця, будинок, квартира" aria-label="Вулиця та номер будинку" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="city" id="idkf" placeholder="Ваше місто" aria-label="Місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postcode" id="idn3y9" placeholder="Ваш поштовий індекс" aria-label="Поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="state" id="id8e" aria-label="Область" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
  <option>Запорізька</option>
  <option>Чернігівська</option>
  <option>Вінницька</option>
  <option>Сумська</option>
  <option>Івано-Франківська</option>
</select>
  </div>
  <div>
    <select name="country" id="idyv85" aria-label="Країна" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Румунія</option>
  <option>Молдова</option>
  <option>Білорусь</option>
  <option>США</option>
  <option>Канада</option>
  <option>Німеччина</option>
  <option>Франція</option>
</select>
  </div>
</form>

</fieldset></body></html>
