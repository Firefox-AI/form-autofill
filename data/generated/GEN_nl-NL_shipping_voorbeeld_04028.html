<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id4y06r">Naam</label>
    <input type="text" name="yourName6" id="id4y06r" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id87l">Straat en huisnummer</label>
    <input type="text" name="addr1" id="id87l" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idae">Postcode</label>
    <input type="text" name="zipCode" id="idae" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idza2">Plaats</label>
    <input type="text" name="town" id="idza2" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id3b">Land</label>
    <select name="country3" id="id3b" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zwitserland</option>
</select>
  </div>
  <div>
    <label for="idlmlw">Extra adresinformatie (optioneel)</label>
    <input type="text" name="street2" id="idlmlw" placeholder="Bijvoorbeeld: verdieping of achteringang" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id073c">Appartement</label>
    <input type="text" name="apartment" id="id073c" placeholder="Appartementnummer (indien van toepassing)" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
