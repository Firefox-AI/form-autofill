<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre
    <input type="text" name="givenName" id="id25f" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Apellidos
    <input type="text" name="surname" id="ido4r" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Empresa (opcional)
    <input type="text" name="companyName" id="idwk" placeholder="Introduce el nombre de tu empresa" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="addr" id="idn1cw" placeholder="Calle y número" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="city" id="idbop0" placeholder="Introduce tu ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zipCode" id="idot0b3" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>País
    <select name="country" id="id4h" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
</select>
    </label>
  </div>
  <div>
    <label>Correo electrónico
    <input type="email" name="email_address" id="idf64t1" placeholder="ejemplo@dominio.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="tel" id="idspu7k" placeholder="Introduce tu teléfono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="id8i64d" id="idhf" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
