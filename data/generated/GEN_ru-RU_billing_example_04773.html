<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Имя владельца карты</span>
    <input type="text" name="cardholderName" id="idohx" placeholder="ФИО владельца карты" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Улица, дом</span>
    <input type="text" name="address1" id="id1x" placeholder="Укажите адрес" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Почтовый индекс</span>
    <input type="text" name="zip_code" id="idejt8" placeholder="123456" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Город</span>
    <input type="text" name="city" id="idcjhy" placeholder="Введите название города" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Область / край</span>
    <select name="stateProvince" id="ida02hh" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Москва</option>
  <option>Санкт-Петербург</option>
  <option>Калининградская область</option>
  <option>Свердловская область</option>
  <option>Приморский край</option>
</select>
  </div>
  <div>
    <span>Страна</span>
    <select name="country" id="id2s9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Кыргызстан</option>
</select>
  </div>
  <div>
    <span>Организация</span>
    <input type="text" name="organization" id="id7bp" placeholder="Название компании" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Квартира, офис</span>
    <input type="text" name="address2" id="idxxt6" placeholder="Номер квартиры или офиса" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <button name="id4l" id="idya7" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
