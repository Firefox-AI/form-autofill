<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Cognome</span>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Via</span>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Nome della via" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Numero civico e nome della via" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="La tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Paese</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="tel" id="tel" placeholder="Il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Completa l&#x27;ordine</button>
  </div>
</form>

</fieldset></body></html>
