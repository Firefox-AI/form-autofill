<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Naam</span>
    <input type="text" name="name" id="name" placeholder="Voor- en achternaam" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="email" placeholder="jouw@voorbeeld.nl" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="0612345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Straat</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Bijv. Hoofdstraat 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Plaats</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Bijv. Amsterdam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
