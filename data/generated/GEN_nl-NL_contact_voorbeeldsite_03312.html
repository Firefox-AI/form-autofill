<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Naam</span>
    <input type="text" name="contactName" id="idc9" placeholder="Voor- en achternaam" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="idtb" placeholder="jouw@voorbeeld.nl" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="idoxtlo" placeholder="0612345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="address" id="idcb" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Plaats</span>
    <input type="text" name="city" id="idfd" placeholder="Stad of dorp" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="zip" id="idah2" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idtbkz" id="idlhn99" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
