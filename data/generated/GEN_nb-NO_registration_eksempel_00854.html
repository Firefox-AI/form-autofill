<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Skriv inn fornavnet ditt" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Skriv inn etternavnet ditt" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Skriv inn e-postadressen din" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Velg fødselsdato" data-moz-autofill-type="bday">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrer</button>
  </div>
</form>

</fieldset></body></html>
