<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome no Cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="Nome e sobrenome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization">Nome da Empresa</label>
    <input type="text" name="organization" id="organization" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Endereço</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código Postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Concelho</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Braga</option>
  <option>Coimbra</option>
  <option>Setúbal</option>
  <option>Aveiro</option>
  <option>Évora</option>
  <option>Faro</option>
  <option>Leiria</option>
  <option>Viana do Castelo</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">Distrito</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Braga</option>
  <option>Coimbra</option>
  <option>Setúbal</option>
  <option>Aveiro</option>
  <option>Évora</option>
  <option>Faro</option>
  <option>Leiria</option>
  <option>Viana do Castelo</option>
  <option>Castelo Branco</option>
  <option>Guarda</option>
  <option>Santarém</option>
  <option>Portalegre</option>
  <option>Beja</option>
  <option>Madeira</option>
  <option>Açores</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Brasil</option>
  <option>Estados Unidos</option>
  <option>Outros</option>
</select>
  </div>
</form>

</fieldset></body></html>
