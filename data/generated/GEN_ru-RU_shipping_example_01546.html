<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>ФИО</span>
    <input type="text" name="name" id="name" placeholder="Введите ваше полное имя" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Дополнительная информация</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Например, ориентир или комментарий" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Номер дома</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Введите номер дома" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Улица</span>
    <input type="text" name="street" id="street" placeholder="Введите название улицы" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Почтовый индекс</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Город</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Страна</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
</select>
  </div>
  <div>
    <span>Этаж</span>
    <input type="text" name="floor" id="floor" placeholder="Введите этаж" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Квартира</span>
    <input type="text" name="apartment" id="apartment" placeholder="Введите номер квартиры" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
