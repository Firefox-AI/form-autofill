<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idgvax9">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="idgvax9" placeholder="Ex : Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ideojb">Adresse</label>
    <input type="text" name="street" id="ideojb" placeholder="Ex : 123 rue de l&#x27;Exemple" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idr3pif">Code postal</label>
    <input type="text" name="postcode" id="idr3pif" placeholder="Ex : 75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idz7hk">Ville</label>
    <input type="text" name="town" id="idz7hk" placeholder="Ex : Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id2dir">Région</label>
    <select name="county" id="id2dir" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Bretagne</option>
  <option>Centre-Val de Loire</option>
  <option>Corse</option>
  <option>Grand Est</option>
  <option>Hauts-de-France</option>
  <option>Île-de-France</option>
  <option>Normandie</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Pays de la Loire</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
</select>
  </div>
  <div>
    <label for="idn63mr">Pays</label>
    <select name="country" id="idn63mr" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
  <option>Royaume-Uni</option>
  <option>Suisse</option>
</select>
  </div>
  <div>
    <label for="idzxr">Numéro de TVA</label>
    <input type="text" name="vatId" id="idzxr" placeholder="Ex : FR123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idqqms1" id="idua6e" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
