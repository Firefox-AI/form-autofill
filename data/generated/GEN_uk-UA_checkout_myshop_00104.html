<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>myshop.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ім&#x27;я</span>
    <input type="text" name="givenName" id="givenName" placeholder="Ваше ім&#x27;я" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Прізвище</span>
    <input type="text" name="familyName" id="familyName" placeholder="Ваше прізвище" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Вулиця, номер будинку</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Вулиця, номер" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Місто</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ваше місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Поштовий індекс</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ваш поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Країна</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Румунія</option>
  <option>Угорщина</option>
</select>
  </div>
  <div>
    <span>Електронна пошта</span>
    <input type="email" name="email" id="email" placeholder="example@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Телефон</span>
    <input type="tel" name="tel" id="tel" placeholder="Ваш телефон" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Область</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київ</option>
  <option>Львів</option>
  <option>Одеська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
</select>
  </div>
  <div>
    <span>Район</span>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Ваш район" data-moz-autofill-type="address-level4">
  </div>
  <div>
    <span>Фонетичне прізвище</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Фонетичне написання прізвища" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
