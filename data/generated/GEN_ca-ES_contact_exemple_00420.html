<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.ca</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="name" id="idlnycv" placeholder="El teu nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correu electrònic</span>
    <input type="email" name="mail" id="ido1" placeholder="exemple@correu.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telèfon</span>
    <input type="tel" name="phoneNumber" id="idiou" placeholder="El teu telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adreça</span>
    <input type="text" name="addr" id="id2c" placeholder="Carrer, número, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciutat</span>
    <input type="text" name="locality" id="idtd5fs" placeholder="La teva ciutat" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="zip_code" id="idp1263" placeholder="Codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Punt de referència</span>
    <input type="text" name="idx47i" id="idg2z3e" placeholder="Ex: Al costat de la biblioteca" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
