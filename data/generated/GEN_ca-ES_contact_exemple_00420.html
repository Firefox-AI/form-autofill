<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.ca</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="name" id="name" placeholder="El teu nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correu electrònic</span>
    <input type="email" name="email" id="email" placeholder="exemple@domena.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telèfon</span>
    <input type="tel" name="tel" id="tel" placeholder="El teu telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adreça</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Carrer, número, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciutat</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="La teva ciutat" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="El teu codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Punt de referència</span>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Punt de referència (opcional)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
