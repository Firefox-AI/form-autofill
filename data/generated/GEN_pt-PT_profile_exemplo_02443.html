<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id070">Primeiro Nome</label>
    <input type="text" name="fname" id="id070" placeholder="Insira o seu primeiro nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Último Nome</span>
    <input type="text" name="billing_last_name" id="idarqk0" placeholder="Insira o seu último nome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idp5m9">Nome do Meio</label>
    <input type="text" name="mname" id="idp5m9" placeholder="Insira o seu nome do meio (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idrf6wf">Apelido</label>
    <input type="text" name="handle" id="idrf6wf" placeholder="Insira o seu apelido" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idvdzma">Email</label>
    <input type="email" name="email_address" id="idvdzma" placeholder="Insira o seu email" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telefone
    <input type="tel" name="mobile" id="idb3pp5" placeholder="Insira o seu número de telefone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <span>Organização</span>
    <input type="text" name="organization" id="id4hg" placeholder="Insira o nome da sua organização" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="iddv">Data de Nascimento</label>
    <input type="text" name="dob" id="iddv" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label>Título da Organização
    <input type="text" name="position" id="idnmccu" placeholder="Insira o seu título na organização" data-moz-autofill-type="organization-title">
    </label>
  </div>
  <div>
    <label for="idon0la">Número de Identificação</label>
    <input type="text" name="idNumber" id="idon0la" placeholder="Insira o seu número de identificação" data-moz-autofill-type="id-number">
  </div>
  <div>
    <input type="password" name="iddq1" id="id2jvsy" aria-label="Senha">
  </div>
</form>

</fieldset></body></html>
