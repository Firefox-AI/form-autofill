<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Primeiro Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Insira o seu primeiro nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Último Nome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Insira o seu último nome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Nome do Meio</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Insira o seu nome do meio (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Insira o seu apelido" aria-label="Apelido" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="email" placeholder="Insira o seu email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Insira o seu número de telefone" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organização</span>
    <input type="text" name="organization" id="organization" placeholder="Insira o nome da sua organização" data-moz-autofill-type="organization">
  </div>
  <div>
    <label>Data de Nascimento
    <input type="text" name="bday" id="bday" placeholder="Selecione a sua data de nascimento" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Insira o seu cargo" aria-label="Cargo" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Número de Identificação</span>
    <input type="text" name="idNumber" id="idNumber" placeholder="Insira o seu número de identificação" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="field">Password</label>
    <input type="password" name="field" id="field" placeholder="Password">
  </div>
</form>

</fieldset></body></html>
