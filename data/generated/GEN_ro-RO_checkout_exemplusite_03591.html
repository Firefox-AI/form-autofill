<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu-site.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prenume</span>
    <input type="text" name="billing_first_name" id="idff73" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nume de familie</span>
    <input type="text" name="lname" id="id8d" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adresă</span>
    <input type="text" name="addr1" id="idan4qb" placeholder="Strada și numărul" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apartament</span>
    <input type="text" name="apt" id="idtnq" placeholder="Numărul apartamentului (opțional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Localitate</span>
    <input type="text" name="city" id="idy4bk" placeholder="Orașul sau comuna" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="zip_code" id="idimr" placeholder="Introduceti codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Țară</span>
    <select name="country" id="idjnwmq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="idh7c" placeholder="Introduceți adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Număr de telefon</span>
    <input type="tel" name="mobile" id="idkhf3" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
