<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>名
    <input type="text" name="givenName" id="givenName" placeholder="例: 太郎" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>姓
    <input type="text" name="familyName" id="familyName" placeholder="例: 山田" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>ミドルネーム
    <input type="text" name="additionalName" id="additionalName" placeholder="例: 一郎" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>ニックネーム
    <input type="text" name="nickname" id="nickname" placeholder="例: タロちゃん" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>メールアドレス
    <input type="email" name="email" id="email" placeholder="例: taro@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>電話番号
    <input type="tel" name="tel" id="tel" placeholder="例: 090-1234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>会社名
    <input type="text" name="organization" id="organization" placeholder="例: 株式会社サンプル" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>生年月日
    <input type="text" name="bday" id="bday" placeholder="例: 1990年1月1日" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>役職
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="例: マネージャー" data-moz-autofill-type="organization-title">
    </label>
  </div>
  <div>
    <label>パスワード
    <input type="password" name="field" id="field" placeholder="ここにパスワードを入力">
    </label>
  </div>
</form>

</fieldset></body></html>
