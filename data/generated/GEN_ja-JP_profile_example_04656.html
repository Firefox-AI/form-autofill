<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>姓
    <input type="text" name="last_name" id="idzrcwq" placeholder="例: 山田" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>名
    <input type="text" name="firstName" id="idy8yo" placeholder="例: 太郎" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>ミドルネーム
    <input type="text" name="mname" id="idl1" placeholder="例: 一郎" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>ニックネーム
    <input type="text" name="handle" id="id74dm" placeholder="例: タロウ" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>メールアドレス
    <input type="email" name="user_email" id="id7r" placeholder="例: taro@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>電話番号
    <input type="tel" name="tel" id="idjd" placeholder="例: 090-1234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>会社名
    <input type="text" name="company" id="id4w8p3" placeholder="例: 株式会社サンプル" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>役職
    <input type="text" name="role" id="idca" placeholder="例: マネージャー" data-moz-autofill-type="organization-title">
    </label>
  </div>
  <div>
    <label>生年月日
    <select name="dob" id="id96h" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>日</option>
  <option>月</option>
  <option>年</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
