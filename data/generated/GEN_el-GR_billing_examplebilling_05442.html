<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplebilling.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcs">Ονοματεπώνυμο Κατόχου Κάρτας</label>
    <input type="text" name="cardholderName" id="idcs" placeholder="Εισάγετε το ονοματεπώνυμό σας" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Διεύθυνση</span>
    <input type="text" name="addr1" id="id5wo" placeholder="Οδός και αριθμός" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="id23wca" placeholder="Διαμέρισμα ή πολυκατοικία" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postcode" id="ideg5n7" placeholder="Εισάγετε τον ταχυδρομικό σας κώδικα" aria-label="Ταχυδρομικός Κώδικας" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Περιφέρεια
    <select name="state" id="ids6g" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Μακεδονία</option>
  <option>Θεσσαλία</option>
  <option>Ήπειρος</option>
  <option>Κρήτη</option>
  <option>Πελοπόννησος</option>
  <option>Νησιά Αιγαίου</option>
  <option>Νησιά Ιονίου</option>
</select>
    </label>
  </div>
  <div>
    <label for="idfec">Πόλη</label>
    <input type="text" name="town" id="idfec" placeholder="Εισάγετε την πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Χώρα
    <select name="countryName" id="idja06" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ηνωμένο Βασίλειο</option>
  <option>Ηνωμένες Πολιτείες</option>
  <option>Καναδάς</option>
</select>
    </label>
  </div>
  <div>
    <button name="idhsx" id="idzanmm" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
