<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Surname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="honorificSuffix">Suffix (optional)</label>
    <input type="text" name="honorificSuffix" id="honorificSuffix" placeholder="Suffix (optional)" data-moz-autofill-type="honorific-suffix">
  </div>
  <div>
    <label for="street">Address</label>
    <input type="text" name="street" id="street" placeholder="123 Main St" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="apartment">Apartment, suite, or building (optional)</label>
    <input type="text" name="apartment" id="apartment" placeholder="Apartment, suite, or building (optional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="addressExtra">Additional address information (optional)</label>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="country" aria-label="Country/Area" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="example@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Mobile Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="07123 456789" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address (optional)" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
