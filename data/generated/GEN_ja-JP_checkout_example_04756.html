<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idwo">姓</label>
    <input type="text" name="r:r:1:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idwo" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5sm">名</label>
    <input type="text" name="r:r:9:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="id5sm" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idv417t">住所</label>
    <input type="text" name="r:r:4:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idv417t" placeholder="1-2-3 新宿" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idnsvmm">市区町村</label>
    <input type="text" name="r:r:7:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idnsvmm" placeholder="新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id4t">郵便番号</label>
    <input type="text" name="r:r:9:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id4t" placeholder="160-0022" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddpdr">国</label>
    <select name="r:r:3:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="iddpdr" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>中国</option>
  <option>韓国</option>
  <option>カナダ</option>
  <option>イギリス</option>
</select>
  </div>
  <div>
    <label for="idfc">メールアドレス</label>
    <input type="email" name="r:r:5:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idfc" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idspqwn">電話番号</label>
    <input type="tel" name="r:r:1:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idspqwn" placeholder="03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idr1gb">都道府県</label>
    <select name="r:r:4:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idr1gb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
</select>
  </div>
</form>

</fieldset></body></html>
