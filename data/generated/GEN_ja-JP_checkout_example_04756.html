<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">名</label>
    <input type="text" name="givenName" id="givenName" placeholder="山田" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">姓</label>
    <input type="text" name="familyName" id="familyName" placeholder="太郎" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">住所</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="1-1-1 中央区" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">市区町村</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>千葉県</option>
  <option>神奈川県</option>
  <option>埼玉県</option>
  <option>兵庫県</option>
  <option>宮城県</option>
</select>
  </div>
  <div>
    <label for="postalCode">郵便番号</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">国</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>中国</option>
  <option>韓国</option>
  <option>ドイツ</option>
  <option>フランス</option>
  <option>イギリス</option>
  <option>カナダ</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="email">メールアドレス</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">電話番号</label>
    <input type="tel" name="tel" id="tel" placeholder="03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel1">都道府県</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>北海道</option>
  <option>青森県</option>
  <option>岩手県</option>
  <option>宮城県</option>
  <option>秋田県</option>
  <option>山形県</option>
  <option>福島県</option>
  <option>茨城県</option>
  <option>栃木県</option>
  <option>群馬県</option>
  <option>埼玉県</option>
  <option>千葉県</option>
  <option>神奈川県</option>
  <option>新潟県</option>
  <option>富山県</option>
  <option>石川県</option>
  <option>福井県</option>
  <option>山梨県</option>
  <option>長野県</option>
  <option>岐阜県</option>
  <option>静岡県</option>
  <option>愛知県</option>
  <option>三重県</option>
  <option>滋賀県</option>
  <option>京都府</option>
  <option>大阪府</option>
  <option>兵庫県</option>
  <option>奈良県</option>
  <option>和歌山県</option>
  <option>鳥取県</option>
  <option>島根県</option>
  <option>岡山県</option>
  <option>広島県</option>
  <option>山口県</option>
  <option>徳島県</option>
  <option>香川県</option>
  <option>愛媛県</option>
  <option>高知県</option>
  <option>福岡県</option>
  <option>佐賀県</option>
  <option>長崎県</option>
  <option>熊本県</option>
  <option>大分県</option>
  <option>宮崎県</option>
  <option>鹿児島県</option>
  <option>沖縄県</option>
</select>
  </div>
  <div>
    <label for="phoneticName">フリガナ</label>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="ヤマダ タロウ" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
