<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="cc_name_409">Nombre completo del titular de la tarjeta</label>
    <input type="text" name="cc_name_5865" id="cc_name_409" placeholder="Ej: Juan Pérez" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization_4999">Nombre de la empresa (opcional)</label>
    <input type="text" name="organization_8856" id="organization_4999" placeholder="Ej: Empresa S.A." data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="street_address_9467">Dirección</label>
    <input type="text" name="street_address_2541" id="street_address_9467" placeholder="Calle, número, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="address_line2_2969">Apartamiento, piso, etc. (opcional)</label>
    <input type="text" name="address_line2_1907" id="address_line2_2969" placeholder="Ej: 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postal_code_5074">Código postal</label>
    <input type="text" name="postal_code_6532" id="postal_code_5074" placeholder="Ej: 28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_level2_957">Ciudad</label>
    <input type="text" name="address_level2_7774" id="address_level2_957" placeholder="Ej: Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="address_level1_3564">Provincia</label>
    <select name="address_level1_8053" id="address_level1_3564" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Bilbao</option>
  <option>Alicante</option>
  <option>Córdoba</option>
</select>
  </div>
  <div>
    <label for="country_name_971">País</label>
    <select name="country_name_5660" id="country_name_971" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Dinamarca</option>
</select>
  </div>
  <div>
    <label for="tel_5547">Teléfono</label>
    <input type="tel" name="tel_1579" id="tel_5547" placeholder="Ej: 612345678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
