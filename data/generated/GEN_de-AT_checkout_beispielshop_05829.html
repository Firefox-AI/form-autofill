<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Vorname
    <input type="text" name="firstName" id="idfe" placeholder="Geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nachname
    <input type="text" name="billing_last_name" id="id8b8" placeholder="Geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Firma (optional)
    <input type="text" name="company" id="idmodk" placeholder="Geben Sie den Firmennamen ein" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="address" id="idhp" placeholder="Geben Sie Ihre Straße und Hausnummer ein" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Bundesland
    <select name="province" id="idev" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
    </label>
  </div>
  <div>
    <label>Bezirk
    <input type="text" name="city" id="idt4" placeholder="Geben Sie Ihren Bezirk ein" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="postcode" id="idqoc" placeholder="Geben Sie Ihre Postleitzahl ein" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="idm9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
    </label>
  </div>
  <div>
    <label>E-Mail-Adresse
    <input type="email" name="user_email" id="idnm6tw" placeholder="Geben Sie Ihre E-Mail-Adresse ein" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="id0md" placeholder="Geben Sie Ihre Telefonnummer ein" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
