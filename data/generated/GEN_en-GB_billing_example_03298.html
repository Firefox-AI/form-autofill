<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2p5t">Street Name</label>
    <input type="text" name="strasse" id="id2p5t" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idbt0">House Number</label>
    <input type="number" name="number" id="idbt0" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="ida2xd">Apartment Number</label>
    <input type="text" name="unit" id="ida2xd" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idu2l">Floor Level</label>
    <input type="text" name="floor" id="idu2l" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idj5imu">Surname</label>
    <input type="text" name="last_name" id="idj5imu" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idaz2jy">First Name</label>
    <input type="text" name="fname" id="idaz2jy" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idlvq">Middle Name</label>
    <input type="text" name="middle_name" id="idlvq" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idawi">Mobile Phone Number</label>
    <input type="tel" name="telephone1" id="idawi" placeholder="e.g. 07123 456 789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
