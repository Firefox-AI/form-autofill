<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">お名前</label>
    <input type="text" name="name" id="name" placeholder="山田 太郎" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">住所</label>
    <input type="text" name="street" id="street" placeholder="例：田町2丁目1-1" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">番地</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">建物名・部屋番号（任意）</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="田町マンション501" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">郵便番号</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">市区町村</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="港区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">国</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="addressLevel3">都道府県</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="東京都" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
