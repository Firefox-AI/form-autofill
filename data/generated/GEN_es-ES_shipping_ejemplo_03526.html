<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="contactName" id="iduoy" placeholder="Introduce tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="address1" id="idcm" placeholder="Calle y número" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip" id="idk0fen" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="city" id="idqd8r" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="idgkdi" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
</select>
  </div>
  <div>
    <span>Apartamento</span>
    <input type="text" name="flat" id="idyv" placeholder="Número del apartamento (opcional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Provincia</span>
    <input type="text" name="suburb" id="idwt24" placeholder="Provincia" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Extensión</span>
    <input type="tel" name="id5434" id="idk4ddb" placeholder="Extensión (opcional)" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <button name="idlv0" id="idxbt" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
