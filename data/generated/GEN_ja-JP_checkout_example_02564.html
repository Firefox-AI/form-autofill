<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="firstName" id="idjpt" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="lastName" id="ids5g" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="addressLine12" id="idoq" placeholder="1-2-3" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="city" id="id4h" placeholder="新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="zip_code3" id="idk3f4" placeholder="160-0022" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="country8" id="idhv" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>カナダ</option>
  <option>オーストラリア</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="user_email" id="idd1" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="phoneNumber" id="idon" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>町名</span>
    <input type="text" name="addressLine2" id="idpya" placeholder="西新宿" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>アパート名・部屋番号</span>
    <input type="text" name="apt" id="id30z" placeholder="101" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>都道府県</span>
    <select name="region" id="idtk" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>京都府</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>兵庫県</option>
  <option>埼玉県</option>
  <option>千葉県</option>
  <option>静岡県</option>
</select>
  </div>
  <div>
    <span>ブロック番号</span>
    <input type="text" name="idptli" id="idfqt" placeholder="5" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="idflpi" id="idf7e7" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
