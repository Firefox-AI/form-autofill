<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Förnamn
    <input type="text" name="givenName" id="givenName" placeholder="Ange ditt förnamn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Efternamn
    <input type="text" name="familyName" id="familyName" placeholder="Ange ditt efternamn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-post
    <input type="email" name="email" id="email" placeholder="Ange din e-postadress" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="tel" placeholder="Ange ditt telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Födelsedatum
    <input type="text" name="bday" id="bday" placeholder="Välj ditt födelsedatum" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Kön
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Kvinna</option>
  <option>Man</option>
  <option>Annat</option>
  <option>Föredrar att inte ange</option>
</select>
    </label>
  </div>
  <div>
    <label>Smeknamn
    <input type="text" name="nickname" id="nickname" placeholder="Ange ditt smeknamn (valfritt)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Lösenord
    <input type="password" name="field" id="field" placeholder="Skapa ett lösenord">
    </label>
  </div>
</form>

</fieldset></body></html>
