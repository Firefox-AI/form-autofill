<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Jméno a příjmení</label>
    <input type="text" name="name" id="name" placeholder="Např. Jan Novák" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="jmeno@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="+420 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Ulice a číslo popisné</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulice 1234" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Město</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Např. Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">PSČ</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Např. 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Země</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
</select>
  </div>
</form>

</fieldset></body></html>
