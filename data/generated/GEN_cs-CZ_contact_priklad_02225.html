<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idmk">Jméno a příjmení</label>
    <input type="text" name="contactName" id="idmk" placeholder="Jan Novák" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iduec40">E-mail</label>
    <input type="email" name="email_address" id="iduec40" placeholder="vas@email.cz" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idxux8f">Telefonní číslo</label>
    <input type="tel" name="phone" id="idxux8f" placeholder="+420 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idtgl">Ulice a číslo popisné</label>
    <input type="text" name="addr" id="idtgl" placeholder="Hlavní 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idv1l">Město</label>
    <input type="text" name="locality" id="idv1l" placeholder="Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idng">PSČ</label>
    <input type="text" name="zip" id="idng" placeholder="123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idnf3">Země</label>
    <select name="country" id="idnf3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Polsko</option>
  <option>Německo</option>
  <option>Rakousko</option>
</select>
  </div>
</form>

</fieldset></body></html>
