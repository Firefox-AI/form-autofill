  </div>

  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
  <option>Italy</option>
</select>

  <div>
    <label for="addressLevel2">City</label>

  </div>

    <label for="addressLevel1">County / State</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="e.g. Greater London" data-moz-autofill-type="address-level1">
