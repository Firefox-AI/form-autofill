<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idljbt">Navn på kortet</label>
    <input type="text" name="r:r:1:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idljbt" placeholder="Skriv inn navnet slik det står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id51vi">Kortnummer</label>
    <input type="number" name="r:r:6:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="id51vi" placeholder="Skriv inn kortnummeret" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id99">Utløpsmåned</label>
    <select name="r:r:8:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="id99" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Mars</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Desember</option>
</select>
  </div>
  <div>
    <label for="id9im2">Utløpsår</label>
    <select name="r:r:8:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="id9im2" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idw99e">Sikkerhetskode (CVV)</label>
    <input type="number" name="r:r:1:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idw99e" placeholder="3- eller 4-sifret kode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idfl">Korttype</label>
    <select name="r:r:5:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idfl" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idmy1b">Adresse</label>
    <input type="text" name="r:r:6:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="idmy1b" placeholder="Gateadresse" data-moz-autofill-type="address-line1">
  </div>
</form>

</fieldset></body></html>
