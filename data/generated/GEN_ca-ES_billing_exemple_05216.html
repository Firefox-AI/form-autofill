<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom a la targeta de crèdit</span>
    <input type="text" name="ccName" id="id80c" placeholder="Nom complet com apareix a la targeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Direcció</span>
    <input type="text" name="addr" id="ide7" placeholder="Carrer, número i, si cal, pis" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="postalCode" id="idmwi" placeholder="Codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciutat</span>
    <input type="text" name="locality" id="idr8ob" placeholder="Ciutat" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Província</span>
    <select name="region" id="id91jz" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Barcelona</option>
  <option>Girona</option>
  <option>Lleida</option>
  <option>Tarragona</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="country" id="id1b8qb" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Espanya</option>
  <option>França</option>
  <option>Portugal</option>
  <option>Itàlia</option>
</select>
  </div>
</form>

</fieldset></body></html>
