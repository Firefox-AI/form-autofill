<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ort</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Straße</span>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Hausnummer</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>(Optional)</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>(Optional)</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
