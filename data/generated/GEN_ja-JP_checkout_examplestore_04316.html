<html><head>

<body>

  <option>長野県</option>
  <option>岐阜県</option>
  <option>静岡県</option>
  <option>愛知県</option>

  </div>

  </div>
  <div>
    <label for="idc4p7v">郵便番号</label>
    <input type="text" name="postcode" id="idc4p7v" placeholder="例: 150-0001" data-moz-autofill-type="postal-code">
