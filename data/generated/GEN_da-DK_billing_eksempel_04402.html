<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>

</select>
  </div>
  <div>

  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="id7zrc7">Virksomhed</label>
    <input type="text" name="company7" id="id7zrc7" placeholder="Indtast firmanavn (hvis relevant)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="idoom0f" id="idd2pz" type="submit">Submit</button>
  </div>

</fieldset></body></html>
