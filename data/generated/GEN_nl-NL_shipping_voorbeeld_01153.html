<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Naam</label>
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Straat</label>
    <input type="text" name="street" id="street" placeholder="Vul uw straatnaam in" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Huisnummer</label>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Vul uw huisnummer in" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Toevoeging</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. A, B of C" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Plaats</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw woonplaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
</select>
  </div>
</form>

</fieldset></body></html>
