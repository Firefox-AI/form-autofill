<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idr68rr">Suffix</label>
    <input type="text" name="idjnzz" id="idr68rr" placeholder="t.ex. Jr, Sr" data-moz-autofill-type="honorific-suffix">
  </div>
  <div>
    <label for="idv3gyb">Namn</label>
    <input type="text" name="yourName" id="idv3gyb" placeholder="Ditt fullständiga namn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="ida2xte">E-post</label>
    <input type="email" name="email" id="ida2xte" placeholder="din.email@exempel.se" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idk7g">Landskod</label>
    <input type="text" name="areaCode" id="idk7g" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="id6camg">Telefonnummer</label>
    <input type="tel" name="mobile" id="id6camg" placeholder="Ditt telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id7rhb">Gatuadress</label>
    <input type="text" name="addr" id="id7rhb" placeholder="Din gatuadress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idwx">Stad</label>
    <input type="text" name="city" id="idwx" placeholder="Din stad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id5q4c">Postnummer</label>
    <input type="text" name="zip" id="id5q4c" placeholder="Ditt postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idhi">Land</label>
    <select name="countryName" id="idhi" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
