<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificSuffix">Suffix</label>
    <input type="text" name="honorificSuffix" id="honorificSuffix" placeholder="t.ex. Jr, Sr" data-moz-autofill-type="honorific-suffix">
  </div>
  <div>
    <label for="name">Namn</label>
    <input type="text" name="name" id="name" placeholder="För- och efternamn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-post</label>
    <input type="email" name="email" id="email" placeholder="din.email@exempel.se" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telAreaCode">Landskod</label>
    <input type="text" name="telAreaCode" id="telAreaCode" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="ditt telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Gatuadress</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Gatuadress, t.ex. Storgatan 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ort</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="t.ex. Stockholm" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="t.ex. 123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Norge</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
