<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paiement-exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom sur la carte
    <input type="text" name="r:r:1:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idpfax" placeholder="Votre nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Numéro de la carte
    <input type="number" name="r:r:7:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idp2ue" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Mois d&#x27;expiration
    <select name="r:r:2:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idy2lo" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
    </label>
  </div>
  <div>
    <label>Année d&#x27;expiration
    <select name="r:r:4:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idtvh" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
    </label>
  </div>
  <div>
    <label>Cryptogramme (CSC)
    <input type="number" name="r:r:6:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idkbt" placeholder="XXX" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Type de carte
    <select name="r:r:8:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idgn" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="r:r:2:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id5mhb" placeholder="Votre adresse" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="r:r:7:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="id708" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="r:r:6:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="iddqh9" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
