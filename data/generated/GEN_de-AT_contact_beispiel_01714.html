<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ihr Name</span>
    <input type="text" name="fullName" id="id5fi" placeholder="Max Mustermann" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="mail" id="id8bl" placeholder="max.mustermann@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="idurxy" placeholder="+43 660 1234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="address" id="idt4" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="town" id="idrjgo" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Burgenland</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="zip_code" id="id24m" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="id5h" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Liechtenstein</option>
  <option>Andere</option>
</select>
  </div>
  <div>
    <button name="idfyn" id="id5y8h" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
