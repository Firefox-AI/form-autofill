<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ihr Name</span>
    <input type="text" name="name" id="name" placeholder="Max Mustermann" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" placeholder="max.mustermann@beispiel.at" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="+43 664 1234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Beispielstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="number" name="postalCode" id="postalCode" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Liechtenstein</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Absenden</button>
  </div>
</form>

</fieldset></body></html>
