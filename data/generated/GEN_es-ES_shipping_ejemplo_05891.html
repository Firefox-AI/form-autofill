<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre completo
    <input type="text" name="contactName" id="idplhaa" placeholder="Juan Pérez" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="street11" id="idkhr" placeholder="Calle Mayor 10" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zipCode4" id="idc7pd" placeholder="28001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="locality" id="ida8v" placeholder="Madrid" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>País
    <select name="countryName" id="id5af65" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Portugal</option>
</select>
    </label>
  </div>
  <div>
    <label>Edificio
    <input type="text" name="idfdf5v" id="idi1" placeholder="Edificio A" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>Punto de referencia
    <input type="text" name="iduwil" id="id12e" placeholder="Cerca del parque" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Apartamento
    <input type="text" name="unit" id="idavw" placeholder="Piso 1" data-moz-autofill-type="apartment">
    </label>
  </div>
</form>

</fieldset></body></html>
