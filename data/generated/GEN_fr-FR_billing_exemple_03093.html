<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom sur la carte</span>
    <input type="text" name="ccName" id="ccName" placeholder="Votre nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Numéro et nom de la rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Complément d&#x27;adresse (facultatif)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, bâtiment, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Région</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Bretagne</option>
  <option>Hauts-de-France</option>
  <option>Normandie</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>Pays-Bas</option>
  <option>Portugal</option>
  <option>Danemark</option>
  <option>Suède</option>
  <option>Autriche</option>
  <option>Irlande</option>
  <option>Norvège</option>
  <option>Finlande</option>
</select>
  </div>
  <div>
    <span>Numéro de TVA (facultatif)</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Votre numéro de TVA intracommunautaire" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
