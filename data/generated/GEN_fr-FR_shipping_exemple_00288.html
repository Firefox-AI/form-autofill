<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="contactName" id="id0x3" placeholder="Jean Dupont" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addr1" id="idcq" placeholder="123 Rue de Paris" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="zipCode" id="iduc5l8" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="town" id="idlvp" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Pays</span>
    <select name="country" id="id452" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Luxembourg</option>
  <option>Suisse</option>
</select>
  </div>
  <div>
    <span>Appartement</span>
    <input type="text" name="suite" id="idoh" placeholder="Apt 4B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Indicatif téléphonique</span>
    <select name="countryCode" id="idfl8" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+41</option>
</select>
  </div>
  <div>
    <span>Numéro de zone</span>
    <input type="tel" name="areaCode" id="id2z4" placeholder="1" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <button name="idlf4" id="id5ao" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
