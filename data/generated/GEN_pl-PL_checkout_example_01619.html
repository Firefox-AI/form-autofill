<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię</span>
    <input type="text" name="givenName" id="givenName" placeholder="Twoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nazwisko</span>
    <input type="text" name="familyName" id="familyName" placeholder="Twoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Nazwa firmy (opcjonalnie)
    <input type="text" name="organization" id="organization" placeholder="Nazwa Twojej firmy" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label for="streetAddress">Ulica i numer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulica i numer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Czechy</option>
  <option>Słowacja</option>
  <option>Francja</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Twój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="addressLevel1">Województwo</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Mazowieckie</option>
  <option>Małopolskie</option>
  <option>Śląskie</option>
  <option>Wielkopolskie</option>
  <option>Pomorskie</option>
</select>
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Imię fonetyczne" aria-label="Imię fonetyczne (opcjonalnie)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <input type="text" name="stair" id="stair" placeholder="Numer klatki schodowej" aria-label="Klatka schodowa (opcjonalnie)" data-moz-autofill-type="stair">
  </div>
</form>

</fieldset></body></html>
