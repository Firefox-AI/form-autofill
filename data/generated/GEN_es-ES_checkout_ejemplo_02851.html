<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellidos</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Empresa (opcional)</label>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Provincia</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
</select>
  </div>
  <div>
    <label for="postalCode">Código Postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Suecia</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Austria</option>
</select>
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Teléfono móvil" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Correo Electrónico</label>
    <input type="email" name="email" id="email" placeholder="tu.email@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="floor">Piso (opcional)</label>
    <input type="text" name="floor" id="floor" placeholder="Número de piso" data-moz-autofill-type="floor">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
