<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalen.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardName" id="id773h" placeholder="Bijv. J. de Vries" aria-label="Naam op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Kaartnummer
    <input type="number" name="ccNumber" id="idg5" placeholder="xxxx xxxx xxxx xxxx" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <select name="ccExpMonth" id="id7tys" aria-label="Maand van vervaldatum" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Maart</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="id5l35" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>CVC</span>
    <input type="number" name="csc" id="idemij" placeholder="3 cijfers op de achterkant" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idjl">Kaarttype</label>
    <select name="ccType" id="idjl" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <label for="idd6">Adres</label>
    <input type="text" name="address" id="idd6" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="id6upnw" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
