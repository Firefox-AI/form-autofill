<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalen.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Naam zoals op de kaart" aria-label="Kaartnaam" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kaartnummer</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Voer uw kaartnummer in" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Maart</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label>Vervaldatum (jaar)
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
    </label>
  </div>
  <div>
    <label for="ccCsc">CVC</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 cijfers op de achterkant" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Kaarttype</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <label>Adres
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Straat en huisnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Bijv. 1234 AB" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
