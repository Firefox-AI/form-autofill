<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>shop-example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idd276">Обращение</label>
    <select name="prefix" id="idd276" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Г-н</option>
  <option>Г-жа</option>
  <option>Г-же</option>
</select>
  </div>
  <div>
    <label for="idctw">Имя</label>
    <input type="text" name="fname" id="idctw" placeholder="Ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idautdf">Фамилия</label>
    <input type="text" name="lastName7" id="idautdf" placeholder="Ваша фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id63m">Улица, дом</label>
    <input type="text" name="addr1" id="id63m" placeholder="Например, Ленина, 15" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idki35">Город</label>
    <input type="text" name="town" id="idki35" placeholder="Ваш город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ida6tfr">Почтовый индекс</label>
    <input type="text" name="postalCode4" id="ida6tfr" placeholder="Ваш почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idsq">Страна</label>
    <select name="country" id="idsq" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Казахстан</option>
  <option>Беларусь</option>
  <option>Узбекистан</option>
  <option>Украина</option>
</select>
  </div>
  <div>
    <label for="id6x">Электронная почта</label>
    <input type="email" name="emailAddress" id="id6x" placeholder="Ваш email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idk9os7">Телефон</label>
    <input type="tel" name="phoneNumber4" id="idk9os7" placeholder="Ваш телефон" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
