<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbvjht">Nombre completo</label>

  <div>

  <div>
    <label for="id2z3ay">Código postal</label>

  <div>

  <div>

  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
</select>
  </div>
  <div>

  <div>

  <div>

    <input type="text" name="neighborhood" id="idqj" placeholder="Provincia" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="idn3l5">Nombre adicional (opcional)</label>
    <input type="text" name="id7x" id="idn3l5" placeholder="Ejemplo: Juanito" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
