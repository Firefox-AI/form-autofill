<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Country
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Mexico</option>
  <option>Australia</option>
  <option>India</option>
  <option>Germany</option>
  <option>France</option>
  <option>Brazil</option>
  <option>Japan</option>
  <option>South Africa</option>
</select>
    </label>
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Street Address
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <span>Street Address 2 (optional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt, suite, etc. (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
  <option>Pennsylvania</option>
  <option>Ohio</option>
  <option>Georgia</option>
  <option>North Carolina</option>
  <option>Michigan</option>
</select>
  </div>
  <div>
    <label for="postalCode">Zip Code</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Zip code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="yourname@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Re-enter your email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Phone Number</label>
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="+1" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <input type="tel" name="telNational" id="telNational" placeholder="Your phone number" aria-label="Phone Number (required)" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
