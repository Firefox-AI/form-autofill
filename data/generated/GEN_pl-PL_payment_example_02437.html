<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
