<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempelbutikk.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn på kortet</span>
    <input type="text" name="nameOnCard1" id="idjk8" placeholder="Skriv inn navnet som står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Gateadresse</span>
    <input type="text" name="street1" id="idg1hr" placeholder="Skriv inn gateadressen din" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="postcode8" id="idzr" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="town4" id="idu3j" placeholder="Skriv inn byen din" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Fylke</span>
    <select name="county" id="idjb3p" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Viken</option>
  <option>Vestfold og Telemark</option>
  <option>Agder</option>
  <option>Rogaland</option>
  <option>Vestland</option>
  <option>Møre og Romsdal</option>
  <option>Trøndelag</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
  <option>Innlandet</option>
  <option>Vestfold</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="idxnb9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannia</option>
  <option>USA</option>
</select>
  </div>
  <div>
    <span>MVA-nummer</span>
    <input type="text" name="vatNumber" id="id2rls" placeholder="Skriv inn MVA-nummeret ditt" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="telephone" id="id6qw1" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Leilighetsnummer</span>
    <input type="text" name="unit" id="idcsdwn" placeholder="Skriv inn leilighetsnummeret (hvis aktuelt)" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
