<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vaše jméno" aria-label="Jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Vaše příjmení" aria-label="Příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Např. druhé jméno" aria-label="Doplňkové jméno" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Vaše přezdívka" aria-label="Přezdívka" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="např. vasemail@example.cz" aria-label="E-mailová adresa" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+420 123 456 789" aria-label="Telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Název vaší organizace" aria-label="Organizace" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" aria-label="Datum narození" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="Vaše ID číslo" aria-label="Identifikační číslo" data-moz-autofill-type="id-number">
  </div>
</form>

</fieldset></body></html>
