<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>comprasfáciles.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="id38" placeholder="Nombre y apellidos" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id04">Número de tarjeta</label>
    <input type="number" name="cardNo" id="id04" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id8c">Mes de caducidad</label>
    <select name="ccExpMonth" id="id8c" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <select name="expYear" id="idy6ge" aria-label="Año de caducidad" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label>Código de seguridad (CSC)
    <input type="number" name="cardCode" id="id639x" placeholder="XXX" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <span>Tipo de tarjeta</span>
    <select name="cardType" id="idu0" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="idvhlvp">Dirección</label>
    <input type="text" name="address" id="idvhlvp" placeholder="Calle, número, piso, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="id96" id="idvlpm" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
