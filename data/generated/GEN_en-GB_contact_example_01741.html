<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Country Code</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+20</option>
  <option>+1</option>
  <option>+61</option>
  <option>+91</option>
</select>
  </div>
  <div>
    <span>Mobile Number</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Egypt</option>
  <option>France</option>
  <option>Germany</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Select your Region" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Select an option…</option>
  <option>Scotland</option>
  <option>Wales</option>
  <option>Northern Ireland</option>
  <option>England</option>
</select>
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="House number and street name" aria-label="Address Line 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City or Town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Country Code</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+20</option>
  <option>+1</option>
  <option>+61</option>
  <option>+91</option>
</select>
  </div>
  <div>
    <input type="tel" name="telNational" id="telNational" placeholder="Phone Number" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <select name="telCountryCode" id="telCountryCode" aria-label="Country Code" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+20</option>
  <option>+1</option>
  <option>+61</option>
  <option>+91</option>
</select>
  </div>
  <div>
    <label for="telNational">Phone Number</label>
    <input type="tel" name="telNational" id="telNational" placeholder="Phone Number" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+20</option>
  <option>+1</option>
  <option>+61</option>
  <option>+91</option>
</select>
  </div>
  <div>
    <input type="tel" name="telNational" id="telNational" placeholder="Phone Number" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
