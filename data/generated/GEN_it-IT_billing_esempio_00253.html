<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Mario Rossi" aria-label="Nome sulla carta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma 123" aria-label="Indirizzo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartamento 4B" aria-label="Ulteriori informazioni sull&#x27;indirizzo (opzionale)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" aria-label="Codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" aria-label="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Provincia" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Torino</option>
  <option>Napoli</option>
  <option>Palermo</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Germania</option>
  <option>Francia</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="IT12345678901" aria-label="Numero di partita IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+39 06 12345678" aria-label="Numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <select name="bdayYear" id="bdayYear" aria-label="Anno di nascita" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>1980</option>
  <option>1981</option>
  <option>1982</option>
  <option>1983</option>
  <option>1984</option>
  <option>1985</option>
  <option>1986</option>
  <option>1987</option>
  <option>1988</option>
  <option>1989</option>
  <option>1990</option>
  <option>1991</option>
  <option>1992</option>
  <option>1993</option>
  <option>1994</option>
  <option>1995</option>
  <option>1996</option>
  <option>1997</option>
  <option>1998</option>
  <option>1999</option>
  <option>2000</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
