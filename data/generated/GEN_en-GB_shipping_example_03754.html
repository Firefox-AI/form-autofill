<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Confirm Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <select name="country" id="country" aria-label="Country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
  <option>Italy</option>
  <option>Netherlands</option>
</select>
  </div>
  <div>
    <input type="text" name="name" id="name" placeholder="Enter your full name" aria-label="Full Name" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Main Street" aria-label="Street Address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="e.g. 4B" aria-label="Apartment Number (optional)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Your city or town" aria-label="City or Town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="Your county or region" aria-label="County or Region" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="e.g. SW1A 1AA" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="e.g. 01234 567890" aria-label="Telephone Number (optional)" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
