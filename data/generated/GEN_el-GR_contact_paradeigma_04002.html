<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paradeigma.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Όνομα</label>
    <input type="text" name="name" id="name" placeholder="Το όνομά σας" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="example@domain.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Τηλεφωνικό νούμερο" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κώδικας</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel3">Περιοχή</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Περιοχή ή γειτονιά" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="building">Κτίριο (προαιρετικό)</label>
    <input type="text" name="building" id="building" placeholder="Π.χ. 1η πτέρυγα" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
