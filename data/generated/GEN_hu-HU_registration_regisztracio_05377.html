</head>

<body>

<fieldset>
<h3>regisztracio.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Családnév</span>
    <input type="text" name="billing_last_name" id="idm3" placeholder="Írja be a családnevét" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Keresztnév</span>
    <input type="text" name="givenName" id="idzdjp" placeholder="Írja be a keresztnevét" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>E-mail cím</span>
    <input type="email" name="email" id="id3c" placeholder="Például: nev@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonszám</span>
    <input type="tel" name="phone" id="id96s0" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Születési dátum</span>
    <input type="text" name="dateOfBirth" id="idutuf" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Neme</span>
    <select name="gender" id="id21m" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Férfi</option>
  <option>Nő</option>
  <option>Egyéb</option>
</select>
  </div>
</form>

</fieldset></body></html>
