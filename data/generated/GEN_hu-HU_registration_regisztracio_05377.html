<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>regisztracio.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Keresztnév</span>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Vezetéknév</span>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-mail cím</span>
    <input type="email" name="email" id="email" placeholder="Például: pelda@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonszám</span>
    <input type="tel" name="tel" id="tel" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Születési dátum</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Neme</span>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Férfi</option>
  <option>Nő</option>
  <option>Egyéb</option>
</select>
  </div>
</form>

</fieldset></body></html>
