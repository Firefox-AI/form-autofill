<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Όνομα</label>
    <input type="text" name="name" id="name" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Οδός</label>
    <input type="text" name="street" id="street" placeholder="Πληκτρολογήστε την οδό σας" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Αριθμός</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Πληκτρολογήστε τον αριθμό της κατοικίας" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Διεύθυνση (πρόσθετες λεπτομέρειες)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Πληροφορίες για διεύθυνση, αν χρειάζεται" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κώδικας</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Πληκτρολογήστε τον ταχυδρομικό κώδικα" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Επιλέξτε ή πληκτρολογήστε την πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
  <option>Ηνωμένες Πολιτείες</option>
  <option>Ηνωμένο Βασίλειο</option>
</select>
  </div>
  <div>
    <label for="floor">Όροφος</label>
    <input type="text" name="floor" id="floor" placeholder="Επιλέξτε τον όροφο, αν υπάρχει" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="apartment">Διαμέρισμα</label>
    <input type="text" name="apartment" id="apartment" placeholder="Πληκτρολογήστε αριθμό διαμερίσματος, αν υπάρχει" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="referencePoint">Σημείο αναφοράς</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Πληροφορίες όπως κοντινό σημείο ή ο landmark" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
