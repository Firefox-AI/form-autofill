<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkb">Ім&#x27;я на картці</label>
    <input type="text" name="cardName" id="idkb" placeholder="Введіть ім&#x27;я, як на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idb4kbf">Адреса</label>
    <input type="text" name="address" id="idb4kbf" placeholder="Введіть вашу вулицю та номер будинку" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idobwc">Поштовий індекс</label>
    <input type="text" name="postalCode" id="idobwc" placeholder="Введіть ваш поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idy155">Місто</label>
    <input type="text" name="locality" id="idy155" placeholder="Введіть ваше місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idi4b">Область</label>
    <select name="province" id="idi4b" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київ</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Харківська</option>
  <option>Дніпропетровська</option>
</select>
  </div>
  <div>
    <label for="idxj">Країна</label>
    <select name="countryName" id="idxj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Росія</option>
  <option>Словаччина</option>
  <option>Угорщина</option>
</select>
  </div>
  <div>
    <button name="idmyqyr" id="id8n" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
