<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idiqht">First Name</label>
    <input type="text" name="first_name" id="idiqht" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idvlui">Last Name</label>
    <input type="text" name="lastName" id="idvlui" placeholder="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idmp">Company (optional)</label>
    <input type="text" name="company" id="idmp" placeholder="Company (optional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idt66">Address</label>
    <input type="text" name="address1" id="idt66" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idlit">Postal Code</label>
    <input type="number" name="zip6" id="idlit" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvs">City</label>
    <input type="text" name="locality" id="idvs" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idoktg">Email</label>
    <input type="email" name="mail" id="idoktg" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idsmuwr">Phone Number</label>
    <input type="tel" name="telephone" id="idsmuwr" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
