<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>platizhak.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iduaz">Ім’я на картці</label>
    <input type="text" name="nameOnCard" id="iduaz" placeholder="Ім’я та прізвище" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idf9">Номер картки</label>
    <input type="number" name="card_number" id="idf9" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idma">Місяць дії картки</label>
    <select name="expMonth" id="idma" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Січень</option>
  <option>Лютий</option>
  <option>Березень</option>
  <option>Квітень</option>
  <option>Травень</option>
  <option>Червень</option>
  <option>Липень</option>
  <option>Серпень</option>
  <option>Вересень</option>
  <option>Жовтень</option>
  <option>Листопад</option>
  <option>Грудень</option>
</select>
  </div>
  <div>
    <label for="idixclx">Рік дії картки</label>
    <select name="exp_year1" id="idixclx" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idyhdf">Код безпеки (CSC)</label>
    <input type="number" name="cvc" id="idyhdf" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="iddms">Тип картки</label>
    <select name="cardType" id="iddms" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Мир</option>
</select>
  </div>
  <div>
    <label for="iduxq">Додаткове ім’я</label>
    <input type="text" name="idwbd2z" id="iduxq" placeholder="Ім’я, якщо є" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
