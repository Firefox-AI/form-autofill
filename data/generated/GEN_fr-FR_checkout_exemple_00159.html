<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idd1u">Prénom</label>
    <input type="text" name="firstName" id="idd1u" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idcb">Nom de famille</label>
    <input type="text" name="lastName" id="idcb" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idmy7h5">Adresse</label>
    <input type="text" name="address1" id="idmy7h5" placeholder="Adresse de livraison" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idojbi">Complément d&#x27;adresse (facultatif)</label>
    <input type="text" name="address2" id="idojbi" placeholder="Appartement, bâtiment, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="iday1">Ville</label>
    <input type="text" name="town" id="iday1" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idm8">Code postal</label>
    <input type="text" name="postcode" id="idm8" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idd86b">Pays</label>
    <select name="countryName" id="idd86b" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
</select>
  </div>
  <div>
    <label for="id8v">E-mail</label>
    <input type="email" name="emailAddress" id="id8v" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id5xoah">Téléphone</label>
    <input type="tel" name="telephone" id="id5xoah" placeholder="Numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idppixb">Numéro d&#x27;appartement</label>
    <input type="text" name="suite" id="idppixb" placeholder="Numéro d&#x27;appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="id5vr">Mois de naissance</label>
    <select name="birthMonth" id="id5vr" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janvier</option>
  <option>Février</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juillet</option>
  <option>Août</option>
  <option>Septembre</option>
  <option>Octobre</option>
  <option>Novembre</option>
  <option>Décembre</option>
</select>
  </div>
  <div>
    <button name="idzuns9" id="idbue" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
