<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykład.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię</span>
    <input type="text" name="givenName" id="givenName" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nazwisko</span>
    <input type="text" name="familyName" id="familyName" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nazwa firmy</span>
    <input type="text" name="organization" id="organization" placeholder="Wprowadź nazwę firmy (opcjonalnie)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ulica i numer budynku</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Wprowadź adres (ulica i numer)" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Piętro</span>
    <input type="text" name="floor" id="floor" placeholder="Wprowadź piętro (opcjonalnie)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Blok</span>
    <input type="text" name="block" id="block" placeholder="Wprowadź blok (opcjonalnie)" data-moz-autofill-type="block">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wprowadź miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kraj</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
</select>
  </div>
  <div>
    <span>Adres e-mail</span>
    <input type="email" name="email" id="email" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numer telefonu</span>
    <input type="tel" name="tel" id="tel" placeholder="Wprowadź numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Złóż zamówienie</button>
  </div>
</form>

</fieldset></body></html>
