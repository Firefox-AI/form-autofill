<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Zahlung sicher durchführen – Ihre Daten bleiben vollständig geschützt.</span>
    <input type="email" name="email_6557" id="email_3092" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Lieferadresse (Straße) *</span>
    <input type="text" name="address_streetname_1521" id="address_streetname_4653" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Hausnummer *</span>
    <input type="text" name="address_housenumber_8439" id="address_housenumber_2858" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Land *</span>
    <select name="country_3499" id="country_210" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Luxemburg</option>
</select>
  </div>
  <div>
    <span>Postleitzahl *</span>
    <input type="text" name="postal_code_1840" id="postal_code_8664" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Zusätzliche Lieferdetails</span>
    <input type="text" name="given_name_1367" id="given_name_2667" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Name *</span>
    <input type="text" name="family_name_9488" id="family_name_8966" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Telefonnummer *</span>
    <input type="tel" name="tel_6022" id="tel_2177" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
