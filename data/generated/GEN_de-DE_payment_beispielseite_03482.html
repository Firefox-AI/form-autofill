<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Vorname
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nachname
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Frankreich</option>
  <option>Belgien</option>
</select>
    </label>
  </div>
  <div>
    <label>Stadt
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>E-Mail-Adresse
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Vorwahl
    <input type="tel" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
    </label>
  </div>
</form>

</fieldset></body></html>
