<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Vorname *
    <input type="text" name="givenName" id="id424fr" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nachname *
    <input type="text" name="surname" id="id1qx" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Land *
    <select name="countryCode" id="idz33v" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
    </label>
  </div>
  <div>
    <label>Bundesland/Stadt *
    <input type="text" name="locality" id="iduyd" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>E-Mail-Adresse *
    <input type="email" name="emailAddress" id="idvhur" placeholder="example@domain.de" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Ländervorwahl
    <input type="tel" name="countryCode" id="id7my67" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="idljap" id="idqbqx" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer *
    <input type="text" name="addr" id="id6eia" data-moz-autofill-type="street-address">
    </label>
  </div>
</form>

</fieldset></body></html>
