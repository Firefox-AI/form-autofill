<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Card Number
    <input type="number" name="ccNumber" id="ccNumber" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Name on the Card
    <input type="text" name="ccName" id="ccName" placeholder="Enter your name as it appears on the card" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Expiration Month
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
    </label>
  </div>
  <div>
    <label>Expiration Year
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
</select>
    </label>
  </div>
  <div>
    <label>Security Code
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Last 3 digits on the back of your card" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Email Address
    <input type="email" name="email" id="email" placeholder="We are Safe, Secure, Dependable, and Trusted" data-moz-autofill-type="email">
    </label>
  </div>
</form>

</fieldset></body></html>
