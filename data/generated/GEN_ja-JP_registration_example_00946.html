<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idsby">苗字</label>
    <input type="text" name="r:r:3:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idsby" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idindr">名前</label>
    <input type="text" name="r:r:8:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idindr" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id2ha">苗字（フリガナ）</label>
    <input type="text" name="r:r:4:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="id2ha" placeholder="例：ヤマダ" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="idil07">メールアドレス</label>
    <input type="email" name="r:r:4:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idil07" placeholder="例：example@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idu1ju">電話番号</label>
    <input type="tel" name="r:r:5:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="idu1ju" placeholder="例：0301234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idu0mm">生年月日</label>
    <select name="r:r:2:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idu0mm" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>日</option>
  <option>月</option>
  <option>年</option>
</select>
  </div>
  <div>
    <label for="idk7">所属</label>
    <input type="text" name="r:r:9:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idk7" placeholder="例：株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idapciw">追加名</label>
    <input type="text" name="r:r:4:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idapciw" placeholder="例：太郎" data-moz-autofill-type="cc-additional-name">
  </div>
  <div>
    <label for="id1u">パスワード</label>
    <input type="password" name="r:r:8:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="id1u" placeholder="8文字以上の英数字">
  </div>
  <div>
    <button name="r:r:4:m:r:10:cr:3:c:pr:1:container:fs:i:input" id="idjzdbc" type="submit">登録</button>
  </div>
</form>

</fieldset></body></html>
