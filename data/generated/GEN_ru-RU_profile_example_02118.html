<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Фамилия</label>
    <input type="text" name="familyName" id="familyName" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="givenName">Имя</label>
    <input type="text" name="givenName" id="givenName" placeholder="Введите ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="additionalName">Отчество</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Введите ваше отчество (если есть)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Псевдоним</label>
    <input type="text" name="nickname" id="nickname" placeholder="Введите ваш псевдоним (если есть)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Электронная почта</label>
    <input type="email" name="email" id="email" placeholder="Введите ваш email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Организация</label>
    <input type="text" name="organization" id="organization" placeholder="Введите название вашей организации" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Дата рождения</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>

  <option>15</option>
  <option>16</option>

  <option>20</option>

  <option>31</option>
  <option>1</option>
  <option>Февраль</option>
  <option>Март</option>
  <option>Апрель</option>
  <option>Май</option>
  <option>Июнь</option>
  <option>Июль</option>
  <option>Август</option>
  <option>Сентябрь</option>

  <option>Декабрь</option>
</select>
  </div>
  <div>
    <label for="phoneticFamilyName">Фамилия (фоническое написание)</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Введите фамилию, как она звучит" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
