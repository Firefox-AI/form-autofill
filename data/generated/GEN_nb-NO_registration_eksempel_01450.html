<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Skriv inn ditt fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Etternavn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Skriv inn ditt etternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-postadresse</span>
    <input type="email" name="email" id="email" placeholder="E-post" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Fødselsdato</span>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Mars</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Desember</option>
</select>
  </div>
</form>

</fieldset></body></html>
