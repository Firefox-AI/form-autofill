<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname *</span>
    <input type="text" name="givenName" id="ids7zhb" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname *</span>
    <input type="text" name="last_name" id="idula" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-Mail *</span>
    <input type="email" name="email" id="id1wip" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer *</span>
    <input type="tel" name="mobile" id="id4d" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Straße und Hausnummer *</span>
    <input type="text" name="addr1" id="idbq" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Adresszeile 2 (optional)</span>
    <input type="text" name="addressLine2" id="idn7r" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postleitzahl *</span>
    <input type="text" name="zipCode" id="idhpfjk" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
