<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbnsgt">Nombre completo</label>
    <input type="text" name="name" id="idbnsgt" placeholder="Juan Pérez" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idjob">Dirección</label>
    <input type="text" name="address1" id="idjob" placeholder="Calle Mayor, 10" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idy5i">Código postal</label>
    <input type="text" name="zip_code" id="idy5i" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7t">Ciudad</label>
    <input type="text" name="town" id="id7t" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idalnxs">País</label>
    <select name="country" id="idalnxs" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Portugal</option>
</select>
  </div>
  <div>
    <label for="idp4">Apartamentos, piso, etc.</label>
    <input type="text" name="street2" id="idp4" placeholder="2ºA" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ida8xn">Punto de referencia (opcional)</label>
    <input type="text" name="idj2b" id="ida8xn" placeholder="Cerca de la estación de tren" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <button name="ideph" id="id74" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
