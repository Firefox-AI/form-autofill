<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="name" id="name" placeholder="Tu nombre y apellidos" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Calle</span>
    <input type="text" name="street" id="street" placeholder="Nombre de la calle" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Número</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número de tu casa" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Complemento (opcional)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, piso, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Tu código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Malaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
  <option>Granada</option>
  <option>Córdoba</option>
  <option>Valladolid</option>
  <option>Cádiz</option>
  <option>San Sebastián</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Suiza</option>
  <option>Suecia</option>
  <option>Países Bajos</option>
</select>
  </div>
  <div>
    <span>Piso (opcional)</span>
    <input type="text" name="floor" id="floor" placeholder="Número de piso" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Tu ciudad" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Bloque (opcional)</span>
    <input type="text" name="block" id="block" placeholder="Bloque de tu casa" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
