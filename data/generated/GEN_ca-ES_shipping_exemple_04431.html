<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>

  </div>
  <div>
    <span>Adreça</span>
    <input type="text" name="address1" id="idh5" placeholder="Carrer, avinguda, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="postalCode" id="id1y" placeholder="Codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciutat</span>

  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="idwykty" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Espanya</option>
  <option>França</option>
  <option>Itàlia</option>
  <option>Portugal</option>
  <option>Alemania</option>
</select>
  </div>
  <div>
    <span>Pis</span>
    <input type="text" name="apt" id="id5ctit" placeholder="Pis o número d&#x27;apartament" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Punt de referència</span>
    <input type="text" name="idi8dnb" id="idoc" placeholder="A prop de..." data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Regió</span>
    <input type="text" name="district" id="idr905f" placeholder="Comunitat autònoma o província" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
