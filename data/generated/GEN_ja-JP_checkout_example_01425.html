<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>名
    <input type="text" name="givenName" id="givenName" placeholder="山田" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>姓
    <input type="text" name="familyName" id="familyName" placeholder="太郎" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>住所
    <input type="text" name="streetAddress" id="streetAddress" placeholder="1-2-3 新宿" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>都道府県
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
</select>
    </label>
  </div>
  <div>
    <label>郵便番号
    <input type="text" name="postalCode" id="postalCode" placeholder="100-0001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>国
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>イギリス</option>
  <option>中国</option>
  <option>韓国</option>
</select>
    </label>
  </div>
  <div>
    <label>メールアドレス
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>電話番号
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>建物名・部屋番号（任意）
    <input type="text" name="addressLine2" id="addressLine2" placeholder="マンション名 101号室" data-moz-autofill-type="address-line2">
    </label>
  </div>
</form>

</fieldset></body></html>
