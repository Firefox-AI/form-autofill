<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Ich möchte nicht, dass meine persönlichen Daten verkauft oder weitergegeben werden

    <label>Nachname

  <div>

  </div>
  <div>
    <label>Telefonnummer

  </div>
  <div>
    <label>Postleitzahl
    <input type="number" name="postal_code_8367" id="postal_code_8378" data-moz-autofill-type="postal-code">

  </div>
  <div>
    <label>Bundesland

  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>

  <option>Hessen</option>

  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
    </label>
  </div>
  <div>
    <label>Stadt
    <input type="text" name="address_level2_4575" id="address_level2_2599" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country_1776" id="country_6398" data-moz-autofill-type="country">

  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>

  <option>Liechtenstein</option>

  </div>

    </label>
  </div>
</form>

</fieldset></body></html>
