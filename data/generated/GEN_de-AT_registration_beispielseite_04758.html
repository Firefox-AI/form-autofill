<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Ihr Vorname" aria-label="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Ihr Nachname" aria-label="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="beispiel@domain.at" aria-label="E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" aria-label="Geburtsdatum" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Ihr Unternehmen (optional)" aria-label="Unternehmen" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Ihr Spitzname (optional)" aria-label="Spitzname" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="password" name="field" id="field" aria-label="Passwort">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrieren</button>
  </div>
</form>

</fieldset></body></html>
