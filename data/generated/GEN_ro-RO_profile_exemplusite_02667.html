<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplusite.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prenume</span>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nume de familie</span>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nume suplimentar</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Introduceti un nume suplimentar (opțional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Poreclă</span>
    <input type="text" name="nickname" id="nickname" placeholder="Introduceti porecla (opțional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="Introduceti adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefon</span>
    <input type="tel" name="tel" id="tel" placeholder="Introduceti numărul de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organizație</span>
    <input type="text" name="organization" id="organization" placeholder="Introduceti numele organizației (opțional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Data nașterii</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
