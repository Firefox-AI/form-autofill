<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternavn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="Indtast din emailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Fødselsdato</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Køn</span>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Mand</option>
  <option>Kvinde</option>
  <option>Andet</option>
</select>
  </div>
  <div>
    <span>Kaldenavn</span>
    <input type="text" name="nickname" id="nickname" placeholder="Indtast dit kaldenavn" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Adgangskode</span>
    <input type="password" name="field" id="field" placeholder="Indtast en adgangskode">
  </div>
  <div>
    <button name="field" id="field" type="submit">Tilmeld</button>
  </div>
</form>

</fieldset></body></html>
