<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>
    <label>Град
    <input type="text" name="locality" id="id3239i" placeholder="Вашият град" data-moz-autofill-type="address-level2">

  </div>
  <div>

  <option>Пловдив</option>
  <option>Варна</option>
  <option>Бургас</option>
  <option>Русе</option>

  <option>Добрич</option>
  <option>Сливен</option>
  <option>Перник</option>
  <option>Хасково</option>
</select>
    </label>
  </div>
  <div>
    <label>Държава
    <select name="countryName5" id="id3mx" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Гърция</option>
  <option>Румъния</option>
  <option>Сърбия</option>
  <option>Турция</option>
  <option>Италия</option>
  <option>Германия</option>
</select>
    </label>
  </div>
  <div>
    <label>Фирма
    <input type="text" name="company" id="idu3" placeholder="Името на вашата организация" data-moz-autofill-type="organization">

  </div>
  <div>

    <input type="text" name="idegwh" id="ids7" placeholder="Допълнителни указания" data-moz-autofill-type="address-extra">

  <div>
    <label>Квартал
    <input type="text" name="idfyein" id="idn4a0b" placeholder="Вашият квартал" data-moz-autofill-type="address-level4">
    </label>
  </div>
</form>
