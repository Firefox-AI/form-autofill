<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idi09">Naam</label>
    <input type="text" name="name" id="idi09" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id7av">E-mail</label>
    <input type="email" name="email" id="id7av" placeholder="Vul uw e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="iddy2z3">Telefoonnummer</label>
    <input type="tel" name="phone" id="iddy2z3" placeholder="Vul uw telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id9i">Straat en huisnummer</label>
    <input type="text" name="street" id="id9i" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idogjja">Stad</label>
    <input type="text" name="locality" id="idogjja" placeholder="Vul uw stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ids3tf">Postcode</label>
    <input type="text" name="zipCode" id="ids3tf" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
