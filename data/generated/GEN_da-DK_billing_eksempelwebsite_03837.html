<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempelwebsite.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn</span>
    <input type="text" name="cardholderName" id="idjkz9" placeholder="Fulde navn" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="address" id="id5g37p" placeholder="Gade og husnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip" id="idlsrj" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="town" id="idul5" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Region</span>
    <select name="region" id="idp377" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Sjælland</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idj1ril" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>Polen</option>
</select>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="phone" id="id7d0" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
