<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="contactName" id="idql0zx" aria-label="Vollständiger Name des Empfängers" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="tel" name="telephone" id="id2u8t" placeholder="z.B. +49 123 4567890" aria-label="Telefonnummer des Empfängers" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="city" id="iddu" placeholder="Stadt eingeben" aria-label="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="region" id="id441" aria-label="Bundesland" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <select name="state" id="idwiyx4" aria-label="Land" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <input type="text" name="district" id="idmfen" placeholder="Region eingeben" aria-label="Region" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <input type="text" name="organization" id="idul" placeholder="Unternehmen oder Schulname" aria-label="Unternehmen oder Schulname (optional)" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
