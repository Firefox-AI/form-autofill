<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="name" id="name" placeholder="Mario Rossi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Via Roma" aria-label="Indirizzo" data-moz-autofill-type="street">
  </div>
  <div>
    <label>Num. Civico
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piano 3, Interno 5" aria-label="Ulteriori dettagli (opzionale)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Codice postale</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" aria-label="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Paese
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
