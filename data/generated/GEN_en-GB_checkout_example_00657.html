<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="email">Confirm Email Address</label>
    <input type="email" name="email" id="email" placeholder="Confirm Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" placeholder="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="addressLevel2">City/Town</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City/Town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="street">Street Address</label>
    <input type="text" name="street" id="street" placeholder="Street Address" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="apartment">Flat Number</label>
    <input type="text" name="apartment" id="apartment" placeholder="Flat Number" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="givenName">First Name (again)</label>
    <input type="text" name="givenName" id="givenName" placeholder="First Name (again)" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name (again)</label>
    <input type="text" name="familyName" id="familyName" placeholder="Last Name (again)" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Company Name</label>
    <input type="text" name="organization" id="organization" placeholder="Company Name" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel2">City/Town (repeat)</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City/Town (repeat)" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="street">Street Address (repeat)</label>
    <input type="text" name="street" id="street" placeholder="Street Address (repeat)" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="apartment">Flat Number (repeat)</label>
    <input type="text" name="apartment" id="apartment" placeholder="Flat Number (repeat)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="tel">Phone Number (repeat)</label>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number (repeat)" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Subscribe to our newsletter for updates from 4home!</label>
    <input type="email" name="email" id="email" placeholder="Subscribe to our newsletter for updates from 4home!" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
