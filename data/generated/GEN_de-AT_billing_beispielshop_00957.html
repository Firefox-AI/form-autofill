<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>

  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>

  </div>
  <div>

  </div>
  <div>
    <label for="idxjlv">Telefonnummer</label>
    <input type="tel" name="idbvx" id="idxjlv" placeholder="z.B. +43 1 2345678" data-moz-autofill-type="tel">

</form>

</fieldset></body></html>
