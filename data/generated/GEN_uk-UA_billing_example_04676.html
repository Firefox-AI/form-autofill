<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkx8rx">Ім&#x27;я власника картки</label>
    <input type="text" name="cardholderName" id="idkx8rx" placeholder="Введіть ім&#x27;я та прізвище" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idx7">Назва організації</label>
    <input type="text" name="companyName" id="idx7" placeholder="Введіть назву вашої компанії" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id1zklf">Вулиця та номер будинку</label>

  </div>
  <div>
    <label for="idsub">Додаткова інформація</label>
    <input type="text" name="address2" id="idsub" placeholder="Квартира, поверх або інші деталі" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ida7kx">Поштовий індекс</label>
    <input type="text" name="zip" id="ida7kx" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id2y6tz">Область</label>
    <select name="stateProvince" id="id2y6tz" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Одеська</option>
  <option>Львівська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
  <option>Запорізька</option>
  <option>Сумська</option>
  <option>Івано-Франківська</option>
  <option>Рівненська</option>
  <option>Черкаська</option>
  <option>Вінницька</option>
  <option>м. Київ</option>
</select>
  </div>
  <div>
    <label for="idl1i1">Місто</label>
    <input type="text" name="city" id="idl1i1" placeholder="Введіть назву міста" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idwb59">Країна</label>
    <select name="countryName" id="idwb59" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Німеччина</option>
  <option>США</option>
  <option>Велика Британія</option>
  <option>Франція</option>
  <option>Іспанія</option>
  <option>Канада</option>
</select>
  </div>
  <div>
    <label for="id6di9">Номер ПДВ</label>
    <input type="text" name="vat" id="id6di9" placeholder="Введіть ваш номер ПДВ" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
