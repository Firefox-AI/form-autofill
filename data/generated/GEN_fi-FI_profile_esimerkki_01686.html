<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Etunimi</label>
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sukunimi</label>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Lisänimi</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Anna lisänimi (optiol.)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Lempinimi</label>
    <input type="text" name="nickname" id="nickname" placeholder="Anna lempinimi" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Sähköposti</label>
    <input type="email" name="email" id="email" placeholder="Anna sähköpostiosoite" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Puhelinnumero</label>
    <input type="tel" name="tel" id="tel" placeholder="Anna puhelinnumero" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organisaatio</label>
    <input type="text" name="organization" id="organization" placeholder="Anna organisaation nimi (optiol.)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Syntymäpäivä</label>
    <input type="text" name="bday" id="bday" placeholder="Syntymäpäivä" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">Tehtävänimike</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Anna tehtävänimike (optiol.)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="phoneticGivenName">Foneettinen etunimi</label>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Anna foneettinen etunimi (optiol.)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label for="field">Salasana</label>
    <input type="password" name="field" id="field" placeholder="Anna salasana">
  </div>
</form>

</fieldset></body></html>
