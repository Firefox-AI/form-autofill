<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>billingexample.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="idpzz" placeholder="Ім&#x27;я та прізвище" aria-label="Ім&#x27;я на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="organization" id="id9l2ae" placeholder="Введіть назву компанії" aria-label="Назва компанії (якщо є)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="street" id="idjcq0" placeholder="Ваша адреса" aria-label="Вулиця та номер будинку" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="town" id="idj28e" placeholder="Ваше місто" aria-label="Місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zip" id="idg4jwp" placeholder="Ваш поштовий індекс" aria-label="Поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="state" id="idv9k9" aria-label="Область" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київ</option>
  <option>Львів</option>
  <option>Одеса</option>
  <option>Харків</option>
  <option>Дніпро</option>
</select>
  </div>
  <div>
    <select name="countryName" id="idpui" aria-label="Країна" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Росія</option>
  <option>Німеччина</option>
  <option>США</option>
</select>
  </div>
  <div>
    <input type="tel" name="tel" id="idxxm" placeholder="Ваш номер телефону" aria-label="Телефон" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
