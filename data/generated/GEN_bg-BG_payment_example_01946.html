<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Име на картата</span>
    <input type="text" name="cardName" id="idtf" placeholder="Например: Иван Иванов" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Номер на карта</span>
    <input type="number" name="card_number4" id="idwiavm" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Месец на изтичане</span>
    <select name="ccExpMonth" id="idnw4" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Януари</option>
  <option>Февруари</option>
  <option>Март</option>
  <option>Април</option>
  <option>Май</option>
  <option>Юни</option>
  <option>Юли</option>
  <option>Август</option>
  <option>Септември</option>
  <option>Октомври</option>
  <option>Ноември</option>
  <option>Декември</option>
</select>
  </div>
  <div>
    <span>Година на изтичане</span>
    <select name="exp_year" id="idtm" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Код за сигурност (CSC)</span>
    <input type="number" name="securityCode" id="idzk4" placeholder="Трицифрен код отзад на картата" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Тип карта</span>
    <select name="cardType" id="idmb9n" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <button name="idh8" id="id5y1" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
