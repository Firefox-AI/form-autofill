<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id5831">Naam op de kaart</label>
    <input type="text" name="ccName" id="id5831" placeholder="Vul uw naam in zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idgwe">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="idgwe" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idc9fd">Postcode</label>
    <input type="text" name="postalCode" id="idc9fd" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idqad2r">Plaats</label>
    <input type="text" name="town" id="idqad2r" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idjv382">Provincie</label>
    <select name="region" id="idjv382" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Groningen</option>
  <option>Friesland</option>
  <option>Drenthe</option>
  <option>Overijssel</option>
  <option>Flevoland</option>
  <option>Gelderland</option>
  <option>Utrecht</option>
  <option>Noord-Holland</option>
  <option>Zuid-Holland</option>
  <option>Zeeland</option>
  <option>Noord-Brabant</option>
  <option>Limburg</option>
</select>
  </div>
  <div>
    <label for="idw5cs">Land</label>
    <select name="country" id="idw5cs" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zwitserland</option>
  <option>Australië</option>
</select>
  </div>
</form>

</fieldset></body></html>
