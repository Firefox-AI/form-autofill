<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Cognome
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Azienda
    <input type="text" name="organization" id="organization" placeholder="Nome della tua azienda (se applicabile)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Indirizzo
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Città
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="La tua città" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il tuo codice postale" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Paese
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Spagna</option>
  <option>Germania</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="email" placeholder="la tua email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefono
    <input type="tel" name="tel" id="tel" placeholder="Numero di telefono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia ordine</button>
  </div>
</form>

</fieldset></body></html>
