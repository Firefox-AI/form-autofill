<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamenti.example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome sulla Carta
    <input type="text" name="ccName" id="ccName" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="ccNumber">Numero della Carta</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Mese di Scadenza</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Anno di Scadenza</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Codice di Sicurezza</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 o 4 cifre" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" aria-label="Tipo di Carta" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Numero di Partita IVA</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Inserisci il tuo numero di partita IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Cognome per pronuncia" aria-label="Cognome Foneticamente" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
