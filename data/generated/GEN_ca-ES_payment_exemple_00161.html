<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idiqyj">Nom del titular de la targeta</label>
    <input type="text" name="cardholderName" id="idiqyj" placeholder="Nom i cognoms" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id22z">Número de la targeta</label>
    <input type="number" name="cardNumber" id="id22z" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id5yupk">Mes d&#x27;expiració</label>
    <select name="ccExpMonth" id="id5yupk" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="idcdug">Any d&#x27;expiració</label>
    <select name="ccExpYear" id="idcdug" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id97">Codi de seguretat (CSC)</label>
    <input type="number" name="cvv" id="id97" placeholder="3 o 4 dígits" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idzsgh">Tipus de targeta</label>
    <select name="cardType" id="idzsgh" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
