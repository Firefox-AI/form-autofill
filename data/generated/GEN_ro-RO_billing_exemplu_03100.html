<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Numele de pe card</label>
    <input type="text" name="ccName" id="ccName" placeholder="Introduceți numele complet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization">Compania</label>
    <input type="text" name="organization" id="organization" placeholder="Numele companiei" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Apartament, etaj, birou</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Exemplu: Apartament 5, Etaj 2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Orașul sau municipiul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Județ</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alba</option>
  <option>Arad</option>
  <option>Arges</option>
  <option>Bihor</option>
  <option>Bistrita-Nasaud</option>
  <option>Botosani</option>
  <option>Brasov</option>
  <option>Braila</option>
  <option>Buzau</option>
  <option>Calarasi</option>
  <option>Caras-Severin</option>
  <option>Cluj</option>
  <option>Constanta</option>
  <option>Covasna</option>
  <option>Dambovita</option>
  <option>Dolj</option>
  <option>Galati</option>
  <option>Gorj</option>
  <option>Harghita</option>
  <option>Hunedoara</option>
  <option>Ialomita</option>
  <option>Iasi</option>
  <option>Ilfov</option>
  <option>Maramures</option>
  <option>Mehedinti</option>
  <option>Mures</option>
  <option>Neamt</option>
  <option>Olt</option>
  <option>Prahova</option>
  <option>Satu Mare</option>
  <option>Sibiu</option>
  <option>Suceava</option>
  <option>Teleorman</option>
  <option>Timis</option>
  <option>Tulcea</option>
  <option>Vaslui</option>
  <option>Valcea</option>
  <option>Vrancea</option>
</select>
  </div>
  <div>
    <label for="countryName">Țară</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cehia</option>
  <option>Croația</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Letonia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Malta</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>Slovacia</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Regatul Unit</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Număr de înregistrare TVA</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Introduceți numărul TVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Ex: 0722 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
