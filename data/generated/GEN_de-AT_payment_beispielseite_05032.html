<html><head>

<body>

<fieldset>

<form method="post">

  <div>
    <select name="ccExpMonth" id="idall" aria-label="Ablaufmonat" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>

  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <select name="ccExpYear8" id="id27" aria-label="Ablaufjahr" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>

  </div>

  <option>+43</option>
  <option>+49</option>
  <option>+41</option>
  <option>+36</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <input type="text" name="street" id="idh7" placeholder="Musterstraße 1" aria-label="Straße" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <button name="idy2y" id="ida6fa" type="submit">Bestätigen</button>
  </div>
