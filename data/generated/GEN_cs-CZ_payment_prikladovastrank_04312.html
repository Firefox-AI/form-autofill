<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>prikladova-stranka.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno na kartě</span>
    <input type="text" name="ccName" id="ccName" placeholder="Zadejte jméno, jak je uvedeno na kartě" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Číslo karty</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Zadejte číslo vaší karty" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Měsíc vypršení platnosti</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1 - Leden</option>
  <option>2 - Únor</option>
  <option>3 - Březen</option>
  <option>4 - Duben</option>
  <option>5 - Květen</option>
  <option>6 - Červen</option>
  <option>7 - Červenec</option>
  <option>8 - Srpen</option>
  <option>9 - Září</option>
  <option>10 - Říjen</option>
  <option>11 - Listopad</option>
  <option>12 - Prosinec</option>
</select>
  </div>
  <div>
    <span>Rok vypršení platnosti</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <span>CVV kód</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Zadejte 3 nebo 4 číslice" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Typ karty</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
