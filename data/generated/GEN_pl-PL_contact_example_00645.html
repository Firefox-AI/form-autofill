<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="contactName" id="idd2wt4" placeholder="Jan Kowalski" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="user_email" id="idg5xz" placeholder="przykład@domena.pl" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numer telefonu
    <input type="tel" name="phone" id="idq6" placeholder="123 456 789" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Ulica i numer
    <input type="text" name="address" id="idb1nx" placeholder="ul. Kwiatowa 15" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Miasto
    <input type="text" name="town" id="id2yw" placeholder="Warszawa" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kod pocztowy
    <input type="text" name="zip_code" id="id9u" placeholder="00-001" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="id82" id="ida08" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
