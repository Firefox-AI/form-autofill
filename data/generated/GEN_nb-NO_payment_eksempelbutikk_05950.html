<fieldset>
<h3>eksempelbutikk.no</h3>

  <option>03 - Mars</option>
  <option>04 - April</option>
  <option>05 - Mai</option>

  <option>09 - September</option>

</select>
  </div>
  <div>

  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>

    <input type="number" name="r:r:2:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id6pu" placeholder="3- eller 4-sifret kode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id1i">Korttype</label>
    <select name="r:r:1:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id1i" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visakort</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
