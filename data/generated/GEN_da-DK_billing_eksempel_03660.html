<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn på kortet
    <input type="text" name="nameOnCard" id="idyk8j3" placeholder="Fuldstændigt navn som på kortet" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Virksomhedsnavn
    <input type="text" name="business" id="idl15y" placeholder="Indtast dit virksomhedsnavn" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="addr" id="id1d" placeholder="Gade og husnummer" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="town" id="id3q" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="zipCode" id="idnm" placeholder="Postnummer til din adresse" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Region
    <select name="county" id="id1wtz" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Sjælland</option>
  <option>Syddanmark</option>
</select>
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="idrcg" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
    </label>
  </div>
  <div>
    <label>CVR-nummer
    <input type="text" name="vat" id="id94hdr" placeholder="Indtast dit CVR-nummer" data-moz-autofill-type="vat-number">
    </label>
  </div>
</form>

</fieldset></body></html>
