<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Tu apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Tu apodo (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Tu título (opcional)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Escribe tu nombre fonético (opcional)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="Tu DNI/NIE" data-moz-autofill-type="id-number">
  </div>
</form>

</fieldset></body></html>
