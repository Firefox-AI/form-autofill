<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Etunimi</span>
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sukunimi</label>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Anna lisänimi (valinnainen)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Lempinimi</span>
    <input type="text" name="nickname" id="nickname" placeholder="Anna lempinimi (valinnainen)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Anna sähköpostiosoitteesi" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Anna puhelinnumerosi" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organisaatio</label>
    <input type="text" name="organization" id="organization" placeholder="Organisaation nimi (valinnainen)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Valitse syntymäpäivä" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organizationTitle">Asema</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Asema organisaatiossa (valinnainen)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <button name="field" id="field" type="submit">Lähetä</button>
  </div>
</form>

</fieldset></body></html>
