<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqmg">Navn</label>
    <input type="text" name="r:r:9:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idqmg" placeholder="Indtast dit navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idvno3">Adresse</label>
    <input type="text" name="r:r:1:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idvno3" placeholder="Gadenavn og husnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idps">Postnummer</label>
    <input type="text" name="r:r:9:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idps" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idekr">By</label>
    <input type="text" name="r:r:6:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idekr" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idn1q4">Land</label>
    <select name="r:r:1:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idn1q4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idqss">Region</label>
    <input type="text" name="r:r:7:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idqss" placeholder="Indtast din region (hvis relevant)" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
