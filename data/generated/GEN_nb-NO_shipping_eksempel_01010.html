<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1wc4j">Navn</label>
    <input type="text" name="yourName" id="id1wc4j" placeholder="Skriv inn ditt navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idje">Adresse</label>
    <input type="text" name="addr1" id="idje" placeholder="Gateadresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="zipCode" id="idcy" placeholder="Postnummer" aria-label="Postnummer" data-moz-autofill-type="postal-code">

  <div>
    <input type="text" name="locality" id="idegu" placeholder="By" aria-label="By" data-moz-autofill-type="address-level2">

  <div>
    <select name="country" id="idhp" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Leilighet</span>
    <input type="text" name="unit" id="id9chr2" placeholder="Leilighetsnummer (hvis aktuelt)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label>Fylke
    <input type="text" name="district" id="id91afn" placeholder="Fylke" data-moz-autofill-type="address-level3">
    </label>
  </div>
</form>

</fieldset></body></html>
