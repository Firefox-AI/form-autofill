<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idiz">Naam</label>
    <input type="text" name="contactName" id="idiz" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idt8">Adres</label>
    <input type="text" name="addr18" id="idt8" placeholder="Straat en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idvcn5">Postcode</label>
    <input type="text" name="zipCode" id="idvcn5" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="ida9">Plaats</label>
    <input type="text" name="town" id="ida9" placeholder="Stad of dorp" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyprrj">Land</label>
    <select name="country" id="idyprrj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
</select>
  </div>
  <div>
    <label for="idfr">Verdieping</label>
    <input type="text" name="etage" id="idfr" placeholder="Bijv. 1e verdieping" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idk43">Referentiepunt</label>
    <input type="text" name="iddy1hr" id="idk43" placeholder="Vul een herkenningspunt in (indien nodig)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="idjb">Telefoonlandcode</label>
    <select name="countryCode" id="idjb" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+31</option>
  <option>+32</option>
  <option>+49</option>
  <option>+33</option>
  <option>+44</option>
</select>
  </div>
  <div>
    <button name="id2wrl" id="idmjn5l" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
