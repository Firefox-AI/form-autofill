<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id5p7">Nome sulla carta</label>
    <input type="text" name="cardName" id="id5p7" placeholder="Inserisci il nome come appare sulla carta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id3u">Numero della carta</label>
    <input type="number" name="card_number" id="id3u" placeholder="Inserisci il numero della tua carta" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idtadmr">Mese di scadenza</label>
    <select name="exp_month" id="idtadmr" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="id1f14">Anno di scadenza</label>
    <select name="exp_year" id="id1f14" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="idb38">Codice di sicurezza (CVC)</label>
    <input type="number" name="csc" id="idb38" placeholder="Inserisci il codice di sicurezza" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id7mp">Tipologia di carta</label>
    <select name="ccType" id="id7mp" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="id9b">Indirizzo di fatturazione</label>
    <input type="text" name="streetName" id="id9b" placeholder="Inserisci il tuo indirizzo" data-moz-autofill-type="address-streetname">
  </div>
</form>

</fieldset></body></html>
