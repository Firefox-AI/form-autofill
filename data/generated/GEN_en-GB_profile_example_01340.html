<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Email address *</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>First name *</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last name *</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Phone number prefix *</span>
    <input type="tel" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <span>Phone number *</span>
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>Street *</span>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House number *</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Flat number</span>
    <input type="text" name="apartment" id="apartment" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Postcode *</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
