<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentos.exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome no Cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="Ex: João da Silva" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccType">Tipo de Cartão</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Elo</option>
  <option>Hipercard</option>
</select>
  </div>
  <div>
    <label for="ccNumber">Número do Cartão</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Ex: 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Mês de Validade</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Ano de Validade</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Código de Segurança</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Ex: 123" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
