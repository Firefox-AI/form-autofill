<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Inserisci il tuo indirizzo email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Giorno/Mese/Anno" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nome della tua azienda (se applicabile)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Nome o numero dell&#x27;edificio" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
