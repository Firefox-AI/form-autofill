<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>contactexample.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Név
    <input type="text" name="name_8685" id="name_8562" placeholder="Kérem adja meg a nevét" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>E-mail cím
    <input type="email" name="email_4522" id="email_809" placeholder="Pl.: pelda@email.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonszám
    <input type="tel" name="tel_3403" id="tel_5705" placeholder="Pl.: +36 30 123 4567" data-moz-autofill-type="tel">

  </div>
  <div>
    <input type="text" name="street_address_2383" id="street_address_2180" placeholder="Pl.: Fő utca 12" aria-label="Utca és házszám" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="address_level2_847" id="address_level2_9666" placeholder="Pl.: Budapest" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Irányítószám
    <input type="text" name="postal_code_2396" id="postal_code_5953" placeholder="Pl.: 1011" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="field_4223" id="field_1448" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
