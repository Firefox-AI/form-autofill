<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="name" id="name" placeholder="Juan Pérez" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Dirección adicional</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Referencia o punto de interés" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Número de la casa</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Calle</span>
    <input type="text" name="street" id="street" placeholder="Calle Mayor" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
  </div>
  <div>
    <span>Número de apartamento</span>
    <input type="text" name="apartment" id="apartment" placeholder="A3" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Localidad</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Getafe" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Instrucciones especiales de entrega</span>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Dejar en la puerta si no hay respuesta" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
