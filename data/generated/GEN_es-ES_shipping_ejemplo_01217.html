<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre completo
    <input type="text" name="contactName" id="id9geg" placeholder="Tu nombre aquí" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="addressLine1" id="idt42" placeholder="Calle, número, etc." data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zipCode" id="iddgxle" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="locality" id="id8cohw" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>País
    <select name="countryName" id="idhrlrh" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
    </label>
  </div>
  <div>
    <label>Apartamento (opcional)
    <input type="text" name="flat" id="idy2" placeholder="Número de apartamento" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Punto de referencia
    <input type="text" name="idrq" id="idq3ai" placeholder="Punto de referencia, si es necesario" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Provincia
    <input type="text" name="neighborhood" id="id86hf3" placeholder="Provincia" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <label>Bloque (opcional)
    <input type="text" name="id4w2" id="id7u" placeholder="Número de bloque" data-moz-autofill-type="block">
    </label>
  </div>
</form>

</fieldset></body></html>
