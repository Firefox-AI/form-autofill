<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccType">Card Type</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="ccNumber">Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Enter your card number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Expiry Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Expiry Year</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="name">Full Name</label>
    <input type="text" name="name" id="name" placeholder="Your full name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine1">Address Line 1</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Your street address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Address Line 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City or Town</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Your city or town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">County</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="Your county" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Telephone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="Your contact number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="Sign Up For Sale + New Arrivals" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
