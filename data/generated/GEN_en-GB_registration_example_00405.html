<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtdm">Card Type</label>
    <select name="cardType" id="idtdm" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idv4lzj">Card Number</label>
    <input type="number" name="cardNo" id="idv4lzj" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idr9ed">Expiry Month</label>
    <select name="exp_month" id="idr9ed" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id3ptoy">Expiry Year</label>
    <select name="ccExpYear" id="id3ptoy" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idmksz">Name on Card</label>
    <input type="text" name="contactName" id="idmksz" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id9b">Street Address</label>
    <input type="text" name="addr1" id="id9b" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id2fi">Address Line 2</label>
    <input type="text" name="street2" id="id2fi" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id2li">City</label>
    <input type="text" name="locality" id="id2li" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxf">County</label>
    <input type="text" name="stateProvince" id="idxf" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id4i4zx">Postcode</label>
    <input type="text" name="zip" id="id4i4zx" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddw4y">Phone Number</label>
    <input type="tel" name="telephone" id="iddw4y" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idj87">Email for Sale Notifications</label>
    <input type="email" name="email_address" id="idj87" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
