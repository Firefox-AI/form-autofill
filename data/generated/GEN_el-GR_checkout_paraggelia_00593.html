<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paraggelia.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Όνομα
    <input type="text" name="givenName" id="givenName" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Πληκτρολογήστε το επίθετό σας" aria-label="Επίθετο" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Πόλη
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πληκτρολογήστε την πόλη σας" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κώδικας</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Πληκτρολογήστε τον ταχυδρομικό σας κώδικα" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Χώρα
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γαλλία</option>
  <option>Γερμανία</option>
  <option>Ιταλία</option>
  <option>Ηνωμένο Βασίλειο</option>
  <option>Ηνωμένες Πολιτείες</option>
  <option>Ιαπωνία</option>
</select>
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="email" placeholder="example@domain.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Πληκτρολογήστε τον αριθμό τηλεφώνου σας" aria-label="Τηλέφωνο" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Εταιρεία (προαιρετικό)</label>
    <input type="text" name="organization" id="organization" placeholder="Πληκτρολογήστε το όνομα της εταιρείας σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Ολοκλήρωση παραγγελίας</button>
  </div>
</form>

</fieldset></body></html>
