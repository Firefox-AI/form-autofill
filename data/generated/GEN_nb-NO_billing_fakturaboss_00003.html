<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fakturaboss.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn på kortet</span>
    <input type="text" name="ccName" id="idfu" placeholder="Skriv inn navnet som står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addressLine1" id="id3y2" placeholder="Gateadresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Adresse (valgfritt)</span>
    <input type="text" name="addressLine2" id="idug4s" placeholder="Leilighet, etasje, osv." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip_code" id="idlyl7" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Fylke</span>
    <select name="state" id="id0t" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Viken</option>
  <option>Vestfold og Telemark</option>
  <option>Aust-Agder</option>
  <option>Vest-Agder</option>
  <option>Rogaland</option>
  <option>Hedmark</option>
  <option>Oppland</option>
  <option>Buskerud</option>
  <option>Akershus</option>
  <option>Østfold</option>
  <option>Hedmark</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
  <option>Trøndelag</option>
  <option>Møre og Romsdal</option>
  <option>Sogn og Fjordane</option>
  <option>Hedmark</option>
</select>
  </div>
  <div>
    <span>Kommune</span>
    <input type="text" name="locality" id="idxj6" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="id7q" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannia</option>
  <option>USA</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Organisasjonsnummer/ MVA-nummer</span>
    <input type="text" name="vat" id="idupfi2" placeholder="Skriv inn organisasjonsnummer" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Firma</span>
    <input type="text" name="company" id="ids2" placeholder="Skriv inn firmanavn" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="id4f" id="idqi3" type="submit">Fullfør bestilling</button>
  </div>
</form>

</fieldset></body></html>
