<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name auf der Kreditkarte</span>
    <input type="text" name="nameOnCard" id="id57bw" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="addr1" id="iduz" placeholder="Musterstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="zipCode7" id="id4v8a" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="city" id="iddmw7u" placeholder="Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="stateProvince" id="id0pcfs" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idjepua" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechische Republik</option>
  <option>Slowenien</option>
  <option>Kroatien</option>
</select>
  </div>
  <div>
    <span>Zusätzliche Adresse (optional)</span>
    <input type="text" name="address2" id="id2u" placeholder="z.B. Türnummer oder Etage" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
