<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio-sito.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="cardholderName4" id="idaqyj" placeholder="Nome e cognome del titolare della carta" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="idkb">Numero carta</label>
    <input type="number" name="cardNo" id="idkb" placeholder="Numero della carta di credito" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label>Mese di scadenza
    <select name="exp_month" id="idrn" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
    </label>
  </div>
  <div>
    <span>Anno di scadenza</span>
    <select name="expYear" id="idmvs" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codice di sicurezza</span>
    <input type="number" name="securityCode" id="idiw5y" placeholder="Codice CVV" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idos" aria-label="Tipo di carta" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idqu">Indirizzo</label>
    <input type="text" name="streetAddress" id="idqu" placeholder="Indirizzo di fatturazione" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idol" id="idb1" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
