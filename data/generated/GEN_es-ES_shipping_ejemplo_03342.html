<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Tu nombre y apellido" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Calle</label>
    <input type="text" name="street" id="street" placeholder="Nombre de la calle" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Número</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número de la vivienda" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Dirección adicional</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, piso, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal de tu dirección" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad donde resides" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Alemania</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Países Bajos</option>
  <option>Bélgica</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
