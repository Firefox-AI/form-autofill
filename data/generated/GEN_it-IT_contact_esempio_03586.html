<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e Cognome

  <div>

    <input type="tel" name="tel" id="idwda0" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">

  </div>

  <div>

  <div>

  </div>
  <div>

  <option value=""></option>

  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>

    </label>
  </div>
</form>

</fieldset></body></html>
