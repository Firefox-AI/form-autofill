<html><head>

<body>

<fieldset>
<h3>paiementexemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="cc_name_9025">Nom sur la carte</label>
    <input type="text" name="cc_name_3180" id="cc_name_9025" placeholder="Nom complet tel qu&#x27;affiché sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="cc_number_2915">Numéro de carte</label>
    <input type="number" name="cc_number_3589" id="cc_number_2915" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="cc_exp_month_3483">Mois d&#x27;expiration</label>
    <select name="cc_exp_month_1939" id="cc_exp_month_3483" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <label for="cc_exp_year_8210">Année d&#x27;expiration</label>
    <select name="cc_exp_year_2827" id="cc_exp_year_8210" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="cc_csc_1999">Code de sécurité (CVV)</label>
    <input type="number" name="cc_csc_9575" id="cc_csc_1999" placeholder="3 ou 4 chiffres au dos de la carte" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="cc_type_4586">Type de carte</label>
    <select name="cc_type_8054" id="cc_type_4586" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="postal_code_3354">Code postal</label>
    <input type="text" name="postal_code_1777" id="postal_code_3354" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
