<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paiementexemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkhn">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="idkhn" placeholder="Nom complet tel qu&#x27;affiché sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id5r">Numéro de carte</label>
    <input type="number" name="ccNumber" id="id5r" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idx88r">Mois d&#x27;expiration</label>
    <select name="expMonth7" id="idx88r" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <label for="id4vn">Année d&#x27;expiration</label>
    <select name="expYear6" id="id4vn" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idszv">Code de sécurité</label>
    <input type="number" name="csc" id="idszv" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ida7yty">Type de carte</label>
    <select name="ccType" id="ida7yty" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="id7i">Code postal</label>
    <input type="text" name="postalCode" id="id7i" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
