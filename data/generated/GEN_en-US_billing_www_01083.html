<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.example-store.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Delivery Country
    <select name="countryCode" id="idq5u" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
</select>
    </label>
  </div>
  <div>
    <label>First Name
    <input type="text" name="first_name" id="id0zv4" placeholder="Enter your first name" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="last_name" id="idxux" placeholder="Enter your last name" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Mobile Phone (for delivery updates)
    <input type="tel" name="mobile" id="idqh1" placeholder="Enter your mobile number" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Locate your address
    <input type="text" name="idl39x" id="id29r" placeholder="Search for your address" data-moz-autofill-type="address-lookup">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="addressLine1" id="idega" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apartment, Suite, etc.
    <input type="text" name="street2" id="idxq" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="city" id="id2cg8" placeholder="Enter your city" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>State/Province
    <select name="state" id="id6j" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="zip_code" id="id5nf" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
