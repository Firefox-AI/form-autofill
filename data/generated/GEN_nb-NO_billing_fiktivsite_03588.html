<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>

  </div>
  <div>

    <input type="text" name="r:r:8:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idbbfhq" placeholder="Skriv inn by" data-moz-autofill-type="address-level2">

  </div>
  <div>

  <option>Viken</option>
  <option>Innlandet</option>
  <option>Vestfold og Telemark</option>
  <option>Agder</option>

  <option>Møre og Romsdal</option>
  <option>Trøndelag</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
</select>
    </label>
  </div>
  <div>
    <label>Land

  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>

  </div>
  <div>
    <label>MVA-nummer
    <input type="text" name="r:r:3:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id2b51e" placeholder="Skriv inn MVA-nummeret ditt" data-moz-autofill-type="vat-number">
