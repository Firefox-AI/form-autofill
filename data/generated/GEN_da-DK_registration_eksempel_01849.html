<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Fornavn</label>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Efternavn</label>
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Fødselsdag</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Virksomhed</label>
    <input type="text" name="organization" id="organization" placeholder="Indtast dit virksomhedsnavn (hvis relevant)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="phoneticFamilyName">Fonetik efternavn</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Indtast fonetisk efternavn (hvis nødvendigt)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="addressStreetname">Gadenavn</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Indtast gadenavn" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
