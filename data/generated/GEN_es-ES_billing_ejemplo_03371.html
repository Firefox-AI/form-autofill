<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Nombre como aparece en la tarjeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso, apartamento, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla-La Mancha</option>
  <option>Castilla y León</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
  <option>Comunidad Valenciana</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Alemania</option>
  <option>Argelia</option>
  <option>Argentina</option>
  <option>Australia</option>
  <option>Bélgica</option>
  <option>Bolivia</option>
  <option>Brasil</option>
  <option>Canadá</option>
  <option>Chile</option>
  <option>Colombia</option>
  <option>Costa Rica</option>
  <option>Cuba</option>
  <option>Dinamarca</option>
  <option>Ecuador</option>
  <option>Egipto</option>
  <option>España</option>
  <option>Estados Unidos</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Japón</option>
  <option>México</option>
  <option>Países Bajos</option>
  <option>Perú</option>
  <option>Reino Unido</option>
  <option>Suecia</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Número de registro de IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Nombre del edificio" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="number" name="telExtension" id="telExtension" placeholder="Extensión telefónica" data-moz-autofill-type="tel-extension">
  </div>
</form>

</fieldset></body></html>
