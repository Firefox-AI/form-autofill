<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>E-Mail-Adresse
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Firma</span>
    <input type="text" name="organization" id="organization" placeholder="Name Ihrer Firma" data-moz-autofill-type="organization">
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Ihre Straße und Hausnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Zusätzliche Informationen (optional)" aria-label="Adresszusatz" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Liechtenstein</option>
  <option>Italien</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">Bundesland</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Salzburg</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <input type="number" name="postalCode" id="postalCode" placeholder="Ihre Postleitzahl" aria-label="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
