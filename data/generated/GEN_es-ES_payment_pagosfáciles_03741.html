<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagosfáciles.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Ej. Juan Pérez" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Número de tarjeta
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label for="ccExpMonth">Mes de expiración</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Año de expiración</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label>Código de seguridad (CSC)
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 o 4 dígitos" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Calle, número, etc." data-moz-autofill-type="address-line1">
  </div>
</form>

</fieldset></body></html>
