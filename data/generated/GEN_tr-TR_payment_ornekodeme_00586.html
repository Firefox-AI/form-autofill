<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekodeme.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idoaj63">Kart Sahibinin Adı</label>
    <input type="text" name="cardName" id="idoaj63" placeholder="Ad ve Soyad" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idfz">Kredi Kartı Numarası</label>
    <input type="number" name="card_number" id="idfz" placeholder="Kart numaranızı girin" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idk6zgj">Kredi Kartı Türü</label>
    <select name="ccType" id="idk6zgj" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idry">Son Kullanma Ayı</label>
    <select name="exp_month" id="idry" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <label for="idfbo">Son Kullanma Yılı</label>
    <select name="exp_year" id="idfbo" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id60rx">Güvenlik Kodu (CVC)</label>
    <input type="number" name="cardCode" id="id60rx" placeholder="Arka tarafta bulunan 3 haneli kod" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
