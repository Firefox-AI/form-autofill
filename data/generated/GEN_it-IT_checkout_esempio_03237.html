<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>
    <input type="text" name="suburb" id="idp2" placeholder="Inserisci la tua provincia" aria-label="Provincia" data-moz-autofill-type="address-level3">

  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Stati Uniti</option>
</select>
  </div>

  <option>+39</option>
  <option>+33</option>
  <option>+49</option>
  <option>+34</option>
  <option>+1</option>
</select>
  </div>

  </div>
