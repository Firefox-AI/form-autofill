<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtuj">Fornavn</label>
    <input type="text" name="first_name" id="idtuj" placeholder="Skriv inn fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="billing_last_name" id="id7a" placeholder="Skriv inn etternavn" aria-label="Etternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idukr">Firma</label>
    <input type="text" name="business" id="idukr" placeholder="Skriv inn firmanavn" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idyulf">Gateadresse</label>
    <input type="text" name="addr1" id="idyulf" placeholder="F.eks. Storgata 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label>Leilighet og etasje
    <input type="text" name="addr2" id="idibp" placeholder="F.eks. Leil. 2B" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label for="idv1">By</label>
    <input type="text" name="city" id="idv1" placeholder="Skriv inn by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="region" id="id1g" aria-label="Fylke" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Akershus</option>
  <option>Hedmark</option>
  <option>Oppland</option>
  <option>Buskerud</option>
  <option>Vestfold</option>
  <option>Telemark</option>
  <option>Aust-Agder</option>
  <option>Vest-Agder</option>
  <option>Rogaland</option>
  <option>Hedmark</option>
  <option>Møre og Romsdal</option>
  <option>Sogn og Fjordane</option>
  <option>Hedmark</option>
  <option>Østfold</option>
</select>
  </div>
  <div>
    <label for="idok7y">Postnummer</label>
    <input type="text" name="zipCode" id="idok7y" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="id3dpb" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannia</option>
  <option>USA</option>
  <option>Andre</option>
</select>
  </div>
  <div>
    <label>E-postadresse
    <input type="email" name="email_address" id="id2f3" placeholder="Skriv inn e-post" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="idet">Mobilnummer</label>
    <input type="tel" name="phone" id="idet" placeholder="Skriv inn telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idtm" id="idettd9" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
