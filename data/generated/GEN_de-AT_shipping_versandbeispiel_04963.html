<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>versandbeispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name</span>
    <input type="text" name="name" id="name" placeholder="Max Mustermann" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Straße</span>
    <input type="text" name="street" id="street" placeholder="Musterstraße" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Hausnummer</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="12" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Zusatzinfo</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z.B. Wohnungsnummer" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Tschechische Republik</option>
</select>
  </div>
  <div>
    <span>Bezirk</span>
    <input type="text" name="addressLevel3" id="addressLevel3" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Absenden</button>
  </div>
</form>

</fieldset></body></html>
