<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-billing.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom du titulaire de la carte</span>
    <input type="text" name="nameOnCard" id="iditqv" placeholder="Entrez le nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Nom de l&#x27;entreprise</span>
    <input type="text" name="companyName" id="idgv" placeholder="Votre société (si applicable)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="street1" id="idrchk" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Complément d&#x27;adresse</span>
    <input type="text" name="address2" id="idlf3oe" placeholder="Appartement, étage, etc. (optionnel)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="zipCode" id="idgeuh" placeholder="Entrez votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="city" id="idqz6w7" placeholder="Nom de la ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Région</span>
    <select name="stateProvince" id="idyp" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Pays de la Loire</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <span>Pays</span>
    <select name="country" id="id2w65" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <span>Numéro de TVA</span>
    <input type="text" name="vat2" id="idwsqh" placeholder="Numéro de TVA intracommunautaire" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idejs" id="id881zk" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
