<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-us.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcvss">Email Address*</label>
    <input type="email" name="email_address" id="idcvss" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id4top">First Name*</label>
    <input type="text" name="givenName" id="id4top" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idsy0yj">Last Name*</label>
    <input type="text" name="surname" id="idsy0yj" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id05">Street Name*</label>
    <input type="text" name="streetName" id="id05" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id0ss05">House Number*</label>
    <input type="number" name="hausnummer" id="id0ss05" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="id7a">Apartment or Suite Number*</label>
    <input type="text" name="address2" id="id7a" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ids19z1">Additional Address Info</label>
    <input type="text" name="postcode" id="ids19z1" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idfw7p">Postal Code*</label>
    <input type="text" name="town" id="idfw7p" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id6a">City*</label>
    <input type="text" name="country" id="id6a" data-moz-autofill-type="country-name">
  </div>
  <div>
    <label for="idd4dkp">Country Code*</label>
    <input type="tel" name="phoneNumber" id="idd4dkp" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
