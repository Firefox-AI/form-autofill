<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idiprsy">Jméno a příjmení</label>
    <input type="text" name="contactName" id="idiprsy" placeholder="Jan Novák" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-mailová adresa</span>
    <input type="email" name="user_email" id="idq85s" placeholder="jan.novak@example.cz" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Telefonní číslo
    <input type="tel" name="phoneNumber" id="idi954" placeholder="+420 123 456 789" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <input type="text" name="streetAddress" id="idb1" placeholder="Karlova 10" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idnvb">Město</label>
    <input type="text" name="city" id="idnvb" placeholder="Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="postcode" id="idory" placeholder="110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idbr9" id="id7c" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
