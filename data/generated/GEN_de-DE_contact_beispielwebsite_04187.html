<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="name">Vollständiger Name</label>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLine1">Adresse</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Ihre Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="apartment">Wohnung, Suite, etc. (optional)</label>
    <input type="text" name="apartment" id="apartment" placeholder="z.B. 2B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="postalCodeOrSuburb">Vorort/Postleitzahl</label>
    <input type="text" name="postalCodeOrSuburb" id="postalCodeOrSuburb" placeholder="z.B. 12345 oder Musterstadt" data-moz-autofill-type="postal-code-or-suburb">
  </div>
</form>

</fieldset></body></html>
