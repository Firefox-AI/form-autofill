<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpp">E-Mail-Adresse</label>
    <input type="email" name="user_email" id="idpp" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idvh7jh">Vollständiger Name</label>
    <input type="text" name="name" id="idvh7jh" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idu3o3">Telefonnummer</label>
    <input type="tel" name="telephone" id="idu3o3" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idcb">Adresse</label>
    <input type="text" name="street1" id="idcb" placeholder="Ihre Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idsyjl">Wohnung, Suite, etc. (optional)</label>
    <input type="text" name="apartment" id="idsyjl" placeholder="z.B. 2B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idqj9u">Postleitzahl/Ort</label>
    <input type="text" name="idfx" id="idqj9u" placeholder="Ihre Postleitzahl oder Stadt" data-moz-autofill-type="postal-code-or-suburb">
  </div>
</form>

</fieldset></body></html>
