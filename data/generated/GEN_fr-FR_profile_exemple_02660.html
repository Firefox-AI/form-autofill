<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prénom</span>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nom supplémentaire</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Nom de second ou de jeune fille" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Surnom</span>
    <input type="text" name="nickname" id="nickname" placeholder="Comment vous appelez-vous ?" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation</span>
    <input type="text" name="organization" id="organization" placeholder="Votre organisation (si applicable)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Date de naissance</span>
    <input type="text" name="bday" id="bday" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Titre de l&#x27;organisation</span>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Votre titre au sein de l&#x27;organisation" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Nom de famille phonétique</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Écrivez votre nom de famille phonétiquement" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
