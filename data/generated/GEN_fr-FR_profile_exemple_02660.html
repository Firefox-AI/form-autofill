<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Prénom</span>
    <input type="text" name="fname" id="id1jhs" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="last_name" id="idhr" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nom supplémentaire</span>
    <input type="text" name="mname" id="idot16" placeholder="Nom de second ou de famille" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Surnom</span>
    <input type="text" name="handle" id="idan1" placeholder="Votre surnom ou pseudonyme" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="idz5r" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="idiq" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation</span>
    <input type="text" name="company" id="id8fbh" placeholder="Nom de l&#x27;organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Date de naissance</span>
    <input type="text" name="dob" id="idtr" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Titre au sein de l&#x27;organisation</span>
    <input type="text" name="role" id="idil2z8" placeholder="Votre titre" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Nom de famille (phonétique)</span>
    <input type="text" name="ids9r" id="idi21" placeholder="Nom de famille en phonétique" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="id12hjm" id="id0bxs" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
