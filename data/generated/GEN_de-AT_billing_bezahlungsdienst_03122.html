<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlungsdienst.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Name des Karteninhabers
    <input type="text" name="cardName9" id="ide3b5z" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="streetAddress" id="iddav" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="zipCode5" id="ido9q58" placeholder="1010" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Stadt
    <input type="text" name="town" id="idv24cw" placeholder="Wien" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Bundesland
    <select name="state" id="idax" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="idrzh" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigte Staaten</option>
  <option>Vereinigtes Königreich</option>
</select>
    </label>
  </div>
  <div>
    <label>USt-IdNr.
    <input type="text" name="vatId9" id="idh1" placeholder="ATU12345678" data-moz-autofill-type="vat-number">
    </label>
  </div>
</form>

</fieldset></body></html>
