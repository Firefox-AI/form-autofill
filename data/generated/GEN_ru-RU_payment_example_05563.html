<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>
    <input type="number" name="r:r:4:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="iddmw1" placeholder="Введите номер карты" aria-label="Номер карты" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idwm1b">Месяц окончания действия</label>

</select>

  <option>2035</option>
</select>
  </div>
  <div>

  </div>
  <div>
    <select name="r:r:6:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="ids1" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
  <option>American Express</option>
  <option>Discover</option>
</select>

  <div>

    <input type="text" name="r:r:6:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id0m" placeholder="Улица, дом" data-moz-autofill-type="street-address">

  <div>

  </div>
</form>
