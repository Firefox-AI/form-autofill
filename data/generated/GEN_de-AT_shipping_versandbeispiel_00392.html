<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>versandbeispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id3aatg">Name</label>
    <input type="text" name="name" id="id3aatg" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idnkipd">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="idnkipd" placeholder="z.B. Musterstraße 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idv2">Postleitzahl</label>
    <input type="text" name="zipCode" id="idv2" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id9m">Stadt</label>
    <input type="text" name="city" id="id9m" placeholder="z.B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idr9">Land</label>
    <select name="country" id="idr9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
  </div>
</form>

</fieldset></body></html>
