<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paraggelies.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Τύπος Κάρτας
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Πιστωτική</option>
  <option>Χρεωστική</option>
  <option>Prepaid</option>
</select>
    </label>
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Όνομα και επώνυμο" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Αριθμός Κάρτας</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="xxxx-xxxx-xxxx-xxxx" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ιανουάριος</option>
  <option>Φεβρουάριος</option>
  <option>Μάρτιος</option>
  <option>Απρίλιος</option>
  <option>Μάιος</option>
  <option>Ιούνιος</option>
  <option>Ιούλιος</option>
  <option>Αύγουστος</option>
  <option>Σεπτέμβριος</option>
  <option>Οκτώβριος</option>
  <option>Νοέμβριος</option>
  <option>Δεκέμβριος</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Έτος Λήξης</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="telExtension">Επέκταση Τηλεφώνου</label>
    <input type="tel" name="telExtension" id="telExtension" placeholder="π.χ. 123" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <label>Σημείο Αναφοράς
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Προαιρετικά" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
