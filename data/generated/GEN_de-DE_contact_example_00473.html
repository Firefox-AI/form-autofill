<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Phonetischer Nachname</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>Phonetischer Vorname</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Vorwahl</span>
    <input type="number" name="telAreaCode" id="telAreaCode" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <span>Telefonnummer Präfix</span>
    <input type="number" name="telLocalPrefix" id="telLocalPrefix" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <span>Telefonnummer Suffix</span>
    <input type="number" name="telLocalSuffix" id="telLocalSuffix" data-moz-autofill-type="tel-local-suffix">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
