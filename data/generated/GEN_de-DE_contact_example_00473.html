<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nachname</span>
    <input type="text" name="lastName" id="idiq" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="firstName" id="idej" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Phonetischer Nachname</span>
    <input type="text" name="ideej85" id="idkha0" placeholder="Nachname in Lautschrift" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>Phonetischer Vorname</span>
    <input type="text" name="id0fg" id="id2d0t" placeholder="Vorname in Lautschrift" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postcode" id="idc8p" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="state" id="id48y8" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="city" id="idi0u" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="street" id="idq02io" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Vorwahl</span>
    <input type="tel" name="areaCode" id="idd09fa" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <span>Telefonnummer (Vorwahl)</span>
    <input type="tel" name="idcf5" id="id34" placeholder="Optional" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <span>Telefonnummer (Nachwahl)</span>
    <input type="tel" name="idkn" id="id48" placeholder="Optional" data-moz-autofill-type="tel-local-suffix">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="emailAddress" id="id0vx" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
