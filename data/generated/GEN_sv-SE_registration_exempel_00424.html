<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Förnamn</label>
    <input type="text" name="givenName" id="givenName" placeholder="Ditt förnamn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Efternamn</label>
    <input type="text" name="familyName" id="familyName" placeholder="Ditt efternamn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-post</label>
    <input type="email" name="email" id="email" placeholder="exempel@domän.se" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="070-123 45 67" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Födelsedatum</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Företagsnamn (om tillämpligt)</label>
    <input type="text" name="organization" id="organization" placeholder="Ditt företagsnamn" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="field">Lösenord</label>
    <input type="password" name="field" id="field" placeholder="Ditt lösenord">
  </div>
</form>

</fieldset></body></html>
