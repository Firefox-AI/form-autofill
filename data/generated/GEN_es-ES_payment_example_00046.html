<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="idxuc" id="idcti" placeholder="Nombre y apellidos" aria-label="Nombre en la tarjeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número de tarjeta</span>
    <input type="number" name="idtf" id="idoox" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="idufi" id="idq0" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <select name="idw33" id="idswfbk" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <input type="number" name="idfc" id="iduyh" placeholder="3 o 4 dígitos" aria-label="Código de seguridad (CSC)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de tarjeta</span>
    <select name="idv7c" id="idupub" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
</form>

</fieldset></body></html>
