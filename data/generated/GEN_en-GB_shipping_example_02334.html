<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0u">Email Address</label>
    <input type="email" name="user_email3" id="id0u" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idbpeex">Confirm Email Address</label>
    <input type="email" name="emailAddress5" id="idbpeex" placeholder="re-enter your email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ided">Phone Number</label>
    <input type="tel" name="tel" id="ided" placeholder="e.g. 01234 567890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idc7">Full Name</label>
    <input type="text" name="name" id="idc7" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idefqms">Country</label>
    <select name="country_id" id="idefqms" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <label for="idgzyn">Postal Code</label>
    <input type="text" name="zipCode" id="idgzyn" placeholder="e.g. SW1A 1AA" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id6a0">City or Town</label>
    <input type="text" name="locality" id="id6a0" placeholder="London" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idfr6rl">Street Address</label>
    <input type="text" name="address" id="idfr6rl" placeholder="123 Example Street" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
