<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="honorificPrefix" id="honorificPrefix" aria-label="Título" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Seu nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Seu sobrenome" aria-label="Sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Avenida, etc." aria-label="Endereço" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Seu bairro" aria-label="Bairro" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Estado" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>Santa Catarina</option>
  <option>São Paulo</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" aria-label="CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="País" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Seu e-mail" aria-label="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(00) 0000-0000" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
