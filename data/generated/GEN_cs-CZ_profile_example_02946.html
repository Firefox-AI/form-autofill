<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Jméno</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vaše křestní jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Příjmení</label>
    <input type="text" name="familyName" id="familyName" placeholder="Vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Střední jméno</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Další jméno (nepovinné)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Přezdívka</label>
    <input type="text" name="nickname" id="nickname" placeholder="Vaše přezdívka" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Váš e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="Vaše telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organizace</label>
    <input type="text" name="organization" id="organization" placeholder="Název organizace (nepovinné)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Datum narození</label>
    <input type="text" name="bday" id="bday" placeholder="Vyberte datum narození" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="phoneticFamilyName">Fonická příjmení</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Fonické znění příjmení (nepovinné)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="field">Heslo</label>
    <input type="password" name="field" id="field" placeholder="Zadejte heslo">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
