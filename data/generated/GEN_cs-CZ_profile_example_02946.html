<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhit">Jméno</label>
    <input type="text" name="givenName" id="idhit" placeholder="Vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idbgd">Příjmení</label>
    <input type="text" name="billing_last_name" id="idbgd" placeholder="Vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id2oeh">Další jméno</label>
    <input type="text" name="middle_name" id="id2oeh" placeholder="Např. prostřední jméno" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idl1m">Přezdívka</label>
    <input type="text" name="handle" id="idl1m" placeholder="Vaše přezdívka" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idx33">E-mailová adresa</label>
    <input type="email" name="user_email" id="idx33" placeholder="např. vasemail@priklad.cz" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idkmqf">Telefonní číslo</label>
    <input type="tel" name="phoneNumber" id="idkmqf" placeholder="Např. +420 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idf6r">Organizace</label>
    <input type="text" name="company" id="idf6r" placeholder="Název firmy nebo organizace" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id02">Datum narození</label>
    <input type="text" name="dob" id="id02" placeholder="DD/MM/RRRR" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idwn3px">Fonologické příjmení</label>
    <input type="text" name="idjpd" id="idwn3px" placeholder="Vaše fonetické příjmení" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="id2jjz">Heslo</label>
    <input type="password" name="idjg4" id="id2jjz" placeholder="Zadejte heslo">
  </div>
  <div>
    <button name="idnq3al" id="id16" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
