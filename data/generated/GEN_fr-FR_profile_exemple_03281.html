<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom de famille</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Deuxième prénom (optionnel)</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Votre deuxième prénom" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Surnom (optionnel)</label>
    <input type="text" name="nickname" id="nickname" placeholder="Votre surnom" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organisation (optionnel)</label>
    <input type="text" name="organization" id="organization" placeholder="Votre organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Date de naissance</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Jour</option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
  <div>
    <label for="organizationTitle">Titre de votre poste (optionnel)</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Votre titre" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="field">Mot de passe</label>
    <input type="password" name="field" id="field" placeholder="Votre mot de passe">
  </div>
</form>

</fieldset></body></html>
