<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shipping.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>お名前
    <input type="text" name="contactName" id="idmerg" placeholder="山田 太郎" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>住所
    <input type="text" name="addr1" id="idmj" placeholder="1-2-3 〇〇ビル" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>郵便番号
    <input type="text" name="postcode" id="idy7z" placeholder="123-4567" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>市区町村
    <input type="text" name="locality" id="idopxk" placeholder="東京都" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>国
    <select name="country" id="idcvp" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>中国</option>
  <option>韓国</option>
</select>
    </label>
  </div>
  <div>
    <label>階
    <input type="number" name="etage7" id="idtw" placeholder="例: 3" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <label>建物名
    <input type="text" name="idb9" id="idott" placeholder="〇〇マンション" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <label>電話番号（市外局番）
    <input type="tel" name="areaCode3" id="idsf4" placeholder="03" data-moz-autofill-type="tel-area-code">
    </label>
  </div>
  <div>
    <label>生まれた月
    <select name="dobMonth" id="idjdem" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
