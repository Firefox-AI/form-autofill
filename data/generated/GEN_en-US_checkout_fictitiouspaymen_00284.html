<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitiouspaymentportal.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccType">Card Type</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="ccNumber">Card Number:</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Enter your card number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Month:</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Expiration Year:</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
</select>
  </div>
  <div>
    <label for="ccName">Cardholder Name</label>
    <input type="text" name="ccName" id="ccName" placeholder="Enter the name on the card" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="name">Full Name:</label>
    <input type="text" name="name" id="name" placeholder="Enter your full name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine1">Address Line 1:</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Street address, P.O. box, company name, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Address Line 2:</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, suite, unit, building, floor, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City:</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Country:</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postal Code:</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postal code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Phone Number:</label>
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
