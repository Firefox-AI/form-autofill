<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Indicatif du pays</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+31</option>
  <option>+44</option>
</select>
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Date de naissance</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Jour</option>
  <option>Mois</option>
  <option>Année</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Numéro de TVA</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Votre numéro de TVA (facultatif)" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
