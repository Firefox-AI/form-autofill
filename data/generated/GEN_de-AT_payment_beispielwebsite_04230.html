<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzct">Kontakt E-Mail</label>
    <input type="email" name="emailAddress" id="idzct" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id49ba">Kontaktname</label>
    <input type="text" name="contactName" id="id49ba" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idc2vx">Adresse Zeile 1</label>
    <input type="text" name="street1" id="idc2vx" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfrwd">Adresse Zeile 2</label>
    <input type="text" name="address2" id="idfrwd" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idftx95">Stadt</label>
    <input type="text" name="locality" id="idftx95" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idphb">Bundesland</label>
    <select name="state" id="idphb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Kärnten</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <label for="id87">PLZ</label>
    <input type="text" name="zipCode" id="id87" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id2c">Telefonnummer</label>
    <input type="tel" name="phoneNumber" id="id2c" placeholder="+43" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
