<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="first_name3" id="idcs" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="lastName2" id="idtbjyz" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idgi3uo">E-Mail-Adresse</label>
    <input type="email" name="mail" id="idgi3uo" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idzqa3">Handynummer</label>
    <input type="tel" name="phone" id="idzqa3" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id61bs">Wiederholen Sie die Handynummer</label>
    <input type="tel" name="telephone" id="id61bs" placeholder="Wiederholen Sie die Handynummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Straße</span>
    <input type="text" name="street" id="id0gm" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id0i7">Hausnummer</label>
    <input type="number" name="streetNumber8" id="id0i7" placeholder="Hausnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label>(optional) Etage
    <input type="text" name="floor" id="idfv5" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <input type="number" name="zip" id="id3aw" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddi">Stadt</label>
    <input type="text" name="city7" id="iddi" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
