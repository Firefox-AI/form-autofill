<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkmsi">Navn på kortindehaver</label>
    <input type="text" name="r:r:6:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idkmsi" placeholder="Fuldstændigt navn" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id6k">Vejadresse</label>
    <input type="text" name="r:r:3:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="id6k" placeholder="F.eks. Hovedgaden 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idwm">Adresse (linje 2)</label>
    <input type="text" name="r:r:9:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idwm" placeholder="F.eks. Lejlighed eller etage" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idbzws">Postnummer</label>
    <input type="text" name="r:r:5:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idbzws" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idoc1t">By</label>
    <input type="text" name="r:r:4:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idoc1t" placeholder="F.eks. København" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idsw">Region</label>
    <select name="r:r:9:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idsw" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Syddanmark</option>
  <option>Sjælland</option>
</select>
  </div>
  <div>
    <label for="idimh8">Land</label>
    <select name="r:r:8:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idimh8" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Island</option>
  <option>Finland</option>
</select>
  </div>
  <div>
    <button name="r:r:1:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idibs" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
