<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Navn</label>
    <input type="text" name="name" id="name" placeholder="Skriv inn navnet ditt" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-post adresse</label>
    <input type="email" name="email" id="email" placeholder="Skriv inn e-posten din" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Gateadresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Skriv inn gateadressen din" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Skriv inn byen din" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Skriv inn postnummeret ditt" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Send</button>
  </div>
</form>

</fieldset></body></html>
