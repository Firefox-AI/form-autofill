<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Beruflich</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Bitte geben Sie mindestens eine Telefonnummer an</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mobiltelefon</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Festnetztelefon</span>
    <input type="tel" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Adresszusatz</span>
    <input type="text" name="building" id="building" data-moz-autofill-type="building">
  </div>
  <div>
    <span>Gebäude</span>
    <input type="text" name="stair" id="stair" data-moz-autofill-type="stair">
  </div>
  <div>
    <span>Stockwerk</span>
    <input type="text" name="floor" id="floor" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Wohnung</span>
    <input type="text" name="apartment" id="apartment" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
