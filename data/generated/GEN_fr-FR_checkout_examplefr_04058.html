<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-fr.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id4ka0p">Prénom</label>
    <input type="text" name="firstName" id="id4ka0p" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idtm">Nom de famille</label>
    <input type="text" name="last_name" id="idtm" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idor">Adresse</label>
    <input type="text" name="address" id="idor" placeholder="Numéro et nom de la rue" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idi3">Ville</label>
    <input type="text" name="town" id="idi3" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idctbla">Code postal</label>
    <input type="text" name="zip" id="idctbla" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idha">Pays</label>
    <select name="countryName" id="idha" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>Belgique</option>
  <option>Suisse</option>
</select>
  </div>
  <div>
    <label for="idfxgtk">Email</label>
    <input type="email" name="email_address" id="idfxgtk" placeholder="Votre adresse email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id6v">Téléphone</label>
    <input type="tel" name="phone" id="id6v" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idw1jc">Région</label>
    <select name="state" id="idw1jc" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Occitanie</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
</select>
  </div>
  <div>
    <label for="idmm8d">Jour de naissance</label>
    <select name="dobDay" id="idmm8d" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
</form>

</fieldset></body></html>
