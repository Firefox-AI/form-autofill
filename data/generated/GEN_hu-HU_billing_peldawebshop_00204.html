<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>peldawebshop.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idjf">Kártyatulajdonos neve</label>
    <input type="text" name="cardholderName8" id="idjf" placeholder="Írja be a kártyatulajdonos nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idk7">Utca és házszám</label>
    <input type="text" name="address1" id="idk7" placeholder="Pl. Fő utca 12." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="address2" id="idmw" placeholder="Pl. 2. emelet 5." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="apartment" id="idmf" placeholder="Lakás szám, ha van" aria-label="Lakás szám" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="zip" id="idu2fzq" placeholder="Pl. 1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxmqjr">Megye</label>
    <select name="city4" id="idxmqjr" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Budapest</option>
  <option>Baranya</option>
  <option>Békés</option>
  <option>Borsod-Abaúj-Zemplén</option>
  <option>Csongrád-Csanád</option>
  <option>Fejér</option>
  <option>Győr-Moson-Sopron</option>
  <option>Hajdú-Bihar</option>
  <option>Heves</option>
  <option>Jász-Nagykun-Szolnok</option>
  <option>Komárom-Esztergom</option>
  <option>Nógrád</option>
  <option>Pest</option>
  <option>Somogy</option>
  <option>Szabolcs-Szatmár-Bereg</option>
  <option>Tolna</option>
  <option>Vas</option>
  <option>Veszprém</option>
  <option>Zala</option>
</select>
  </div>
  <div>
    <input type="text" name="state4" id="ida6" placeholder="Pl. Budapest" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idw7p">Ország</label>
    <select name="countryName" id="idw7p" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szerbia</option>
  <option>Horvátország</option>
  <option>Csehország</option>
  <option>Szlovénia</option>
  <option>Németország</option>
  <option>Franciaország</option>
  <option>Olaszország</option>
  <option>Spanyolország</option>
  <option>Egyesült Királyság</option>
  <option>Egyesült Államok</option>
  <option>Kanada</option>
</select>
  </div>
  <div>
    <label for="idjz">ÁFA szám</label>
    <input type="text" name="vatId" id="idjz" placeholder="Pl. HU12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idra">Cég neve</label>
    <input type="text" name="organization" id="idra" placeholder="Írja be a cég nevét" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idbwgr">Telefonszám</label>
    <input type="tel" name="phone" id="idbwgr" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
