<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Titlen</span>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Hr.</option>
  <option>Fr.</option>
  <option>Hr. og Hr.</option>
  <option>Fr. og Fr.</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Efternavn
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <span>Virksomhed</span>
    <input type="text" name="organization" id="organization" placeholder="Valgfrit: Indtast din virksomheds navn" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Indtast gadenavn og husnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Adresse 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Valgfrit: Indtast lejlighed eller etage" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast din by" aria-label="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Tyskland</option>
</select>
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
