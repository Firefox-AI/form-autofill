<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="esempio@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+39 123 456 7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
</form>

</fieldset></body></html>
