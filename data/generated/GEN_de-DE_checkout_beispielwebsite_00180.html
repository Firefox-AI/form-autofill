<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Land*</span>
    <select name="r:r:4:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="id5zbb" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <span>Vorname*</span>
    <input type="text" name="r:r:4:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idec" placeholder="Bitte geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname*</span>
    <input type="text" name="r:r:6:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idf7j" placeholder="Bitte geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Vorwahl*</span>
    <select name="r:r:7:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idt0t3" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+49</option>
  <option>+43</option>
  <option>+41</option>
</select>
  </div>
  <div>
    <span>Handynummer*</span>
    <input type="tel" name="r:r:3:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id2e54e" placeholder="Bitte geben Sie Ihre Handynummer ein" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>Suche nach PLZ, Straße oder Adresse</span>
    <input type="text" name="r:r:9:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idi04v" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <span>Straße*</span>
    <input type="text" name="r:r:4:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idpbv" placeholder="Bitte geben Sie Ihre Straße ein" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Wohnung, Suite, Einheit, etc. (optional)</span>
    <input type="text" name="r:r:8:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id8bb" placeholder="Optional" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Bundesland*</span>
    <select name="r:r:4:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="id8nbq" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Stadt*</span>
    <input type="text" name="r:r:7:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idn41" placeholder="Bitte geben Sie Ihre Stadt ein" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl*</span>
    <input type="text" name="r:r:9:m:r:11:cr:1:c:pr:1:container:fs:i:input" id="id9c" placeholder="Bitte geben Sie Ihre PLZ ein" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
