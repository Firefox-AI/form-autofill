<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="countryName">Land*</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <label for="givenName">Vorname*</label>
    <input type="text" name="givenName" id="givenName" placeholder="Bitte geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname*</label>
    <input type="text" name="familyName" id="familyName" placeholder="Bitte geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="telCountryCode">Vorwahl*</label>
    <input type="tel" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="telNational">Handynummer*</label>
    <input type="tel" name="telNational" id="telNational" placeholder="Bitte geben Sie Ihre Handynummer ein" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="addressLookup">Adresse suchen mit PLZ, Straße oder Adresse</label>
    <input type="text" name="addressLookup" id="addressLookup" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="addressStreetname">Straße*</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Bitte geben Sie den Straßennamen ein" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressExtra">Wohnung, Suite, Einheit, etc. (optional)</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Optional" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="addressLevel1">Bundesland*</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="addressLevel2">Stadt*</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Bitte geben Sie den Stadtnamen ein" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl*</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Bitte geben Sie die Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
