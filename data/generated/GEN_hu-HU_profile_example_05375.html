<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Keresztnév</label>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Vezetéknév</label>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Középső név</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Írd be a középső neved (ha van)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Becenév</label>
    <input type="text" name="nickname" id="nickname" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-mail cím</label>
    <input type="email" name="email" id="email" placeholder="pl. pelda@domain.hu" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonszám</label>
    <input type="tel" name="tel" id="tel" placeholder="Írd be a telefonszámod" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Szervezet</label>
    <input type="text" name="organization" id="organization" placeholder="Írd be a szervezet nevét (ha van)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Születési dátum</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Év</option>
  <option>Hónap</option>
  <option>Nap</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
