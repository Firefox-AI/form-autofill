<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>nakytestore.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno</span>
    <input type="text" name="givenName" id="id7s" placeholder="Zadejte své jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Příjmení</span>
    <input type="text" name="last_name" id="idpt3" placeholder="Zadejte své příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Ulice a číslo popisné</span>
    <input type="text" name="streetAddress" id="idfbg" placeholder="Např. Ulice 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Město</span>
    <input type="text" name="city" id="idbz" placeholder="Zadejte město" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="zipCode" id="idq1" placeholder="Zadejte poštovní směrovací číslo" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Země</span>
    <select name="country" id="id7r7" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
</select>
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="user_email" id="id3x" placeholder="Zadejte svůj e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefon</span>
    <input type="tel" name="tel" id="idqdf" placeholder="Např. +420 123 456 789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
