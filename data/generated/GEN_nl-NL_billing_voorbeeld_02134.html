<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Voor- en achternaam" aria-label="Naam op de creditcard" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Bijv. Hoofdstraat 123" aria-label="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. A, bkg. 1" aria-label="Toevoeging" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Bijv. Amsterdam" aria-label="Plaats" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Provincie" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Utrecht</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="0612345678" aria-label="Telefoonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
