<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitious-site.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Adınız</label>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Soyadınız</label>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Sokak Adresi</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak adresinizi girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Adres Ek Bilgisi (opsiyonel)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartman, daire vs." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Şehir</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>İstanbul</option>
  <option>Ankara</option>
  <option>İzmir</option>
  <option>Bursa</option>
  <option>Antalya</option>
  <option>Adana</option>
  <option>Konya</option>
  <option>Gaziantep</option>
  <option>Hatay</option>
  <option>Kayseri</option>
</select>
  </div>
  <div>
    <label for="postalCode">Posta Kodu</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Ülke</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İtalya</option>
  <option>İspanya</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>Kanada</option>
  <option>Avustralya</option>
  <option>Hindistan</option>
</select>
  </div>
  <div>
    <label for="email">E-posta Adresiniz</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numaranız</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel1">Bölge/İlçe</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Marmara</option>
  <option>Ege</option>
  <option>Akdeniz</option>
  <option>Karadeniz</option>
  <option>İç Anadolu</option>
  <option>Doğu Anadolu</option>
  <option>Güneydoğu Anadolu</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Gönder</button>
  </div>
</form>

</fieldset></body></html>
