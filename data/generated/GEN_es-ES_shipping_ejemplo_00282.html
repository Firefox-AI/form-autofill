<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="name" id="name" placeholder="Introduce tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Calle</span>
    <input type="text" name="street" id="street" placeholder="Calle donde se envía el paquete" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Número de la casa</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Apartamento, piso, etc.</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, piso (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad donde se envía el paquete" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <span>Piso</span>
    <input type="text" name="floor" id="floor" placeholder="Piso (opcional)" data-moz-autofill-type="floor">
  </div>
</form>

</fieldset></body></html>
