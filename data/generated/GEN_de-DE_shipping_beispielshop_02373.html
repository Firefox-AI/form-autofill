<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idgm">Gastbestellung (wir speichern Ihre Daten nicht)</label>
    <input type="email" name="user_email" id="idgm" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idaz9">Vorname (Rechnungsadresse)</label>
    <input type="text" name="billing_first_name" id="idaz9" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idvoj">Nachname (Rechnungsadresse)</label>
    <input type="text" name="billing_last_name" id="idvoj" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idudp">Land (Rechnungsadresse)</label>
    <select name="country" id="idudp" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="idjkxak">Straße und Hausnummer (Rechnungsadresse)</label>
    <input type="text" name="street1" id="idjkxak" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id6n0z">Wohnung, Suite, etc. (Rechnungsadresse)</label>
    <input type="text" name="addr2" id="id6n0z" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idl0">Stadt (Rechnungsadresse)</label>
    <input type="text" name="locality" id="idl0" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idjia">Bundesland (Rechnungsadresse)</label>
    <select name="region" id="idjia" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="id7f5is">Postleitzahl (Rechnungsadresse)</label>
    <input type="text" name="zip" id="id7f5is" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idp4z">Telefon (Geschäftlich)</label>
    <input type="tel" name="phoneNumber" id="idp4z" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id3nb">Vorname (Lieferadresse)</label>
    <input type="text" name="fname" id="id3nb" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idbzt">Nachname (Lieferadresse)</label>
    <input type="text" name="billing_last_name" id="idbzt" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id0qfb">Land (Lieferadresse)</label>
    <select name="countryName" id="id0qfb" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="idlu64">Straße und Hausnummer (Lieferadresse)</label>
    <input type="text" name="addr1" id="idlu64" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfw">Wohnung, Suite, etc. (Lieferadresse)</label>
    <input type="text" name="addr2" id="idfw" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id538">Stadt (Lieferadresse)</label>
    <input type="text" name="city" id="id538" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id13">Bundesland (Lieferadresse)</label>
    <select name="province" id="id13" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="idqt">Postleitzahl (Lieferadresse)</label>
    <input type="text" name="zipCode" id="idqt" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idm4xl">Telefon (Geschäftlich)</label>
    <input type="tel" name="mobile" id="idm4xl" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idget">Kreditkartennummer</label>
    <input type="number" name="ccNumber" id="idget" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id6wf">Ablaufmonat</label>
    <select name="ccExpMonth" id="id6wf" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id76k">Ablaufjahr</label>
    <select name="ccExpYear" id="id76k" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id2jrp">Sicherheitscode (CVV)</label>
    <input type="number" name="securityCode" id="id2jrp" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id0pes">E-Mail</label>
    <input type="email" name="user_email" id="id0pes" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
