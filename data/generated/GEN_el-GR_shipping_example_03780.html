<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1u">Ονοματεπώνυμο</label>
    <input type="text" name="contactName" id="id1u" placeholder="Πλήρες όνομα" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idnb">Διεύθυνση</label>
    <input type="text" name="addressLine1" id="idnb" placeholder="Οδός και αριθμός" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idr0">Περιοχή/Συνοικία</label>
    <input type="text" name="address2" id="idr0" placeholder="Προαιρετικά" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idpvl7">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postcode" id="idpvl7" placeholder="Κωδικός Ταχυδρομείου" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvyx">Πόλη</label>
    <input type="text" name="locality" id="idvyx" placeholder="Εισάγετε την πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id5h">Χώρα</label>
    <select name="country" id="id5h" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
  <option>Ηνωμένο Βασίλειο</option>
  <option>Ηνωμένες Πολιτείες</option>
</select>
  </div>
</form>

</fieldset></body></html>
