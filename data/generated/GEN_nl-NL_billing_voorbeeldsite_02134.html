<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idox">Naam op de creditcard</label>
    <input type="text" name="nameOnCard" id="idox" placeholder="Vul de naam in zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idpo8t">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="idpo8t" placeholder="Bijvoorbeeld: Hoofdstraat 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idfi">Postcode</label>
    <input type="text" name="postcode1" id="idfi" placeholder="Bijvoorbeeld: 1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idsb">Plaats</label>
    <input type="text" name="town" id="idsb" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ids1">Provincie</label>
    <select name="province5" id="ids1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Utrecht</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <label for="idhhw84">Land</label>
    <select name="countryName" id="idhhw84" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <label for="id2kyz">Telefoonnummer</label>
    <input type="tel" name="mobile" id="id2kyz" placeholder="Bijvoorbeeld: 0612345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="ide9" id="id14e" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
