<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Imię i nazwisko</label>
    <input type="text" name="name" id="name" placeholder="Wpisz swoje imię i nazwisko" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Adres e-mail</label>
    <input type="email" name="email" id="email" placeholder="Wpisz swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Kod kraju</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+48</option>
  <option>+1</option>
  <option>+44</option>
  <option>+49</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Wpisz numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Ulica i numer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Wpisz adres ulicy" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wpisz nazwę miasta" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Wpisz kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="organization">Nazwa firmy</label>
    <input type="text" name="organization" id="organization" placeholder="Wpisz nazwę swojej firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Stany Zjednoczone</option>
</select>
  </div>
  <div>
    <label for="bdayYear">Rok urodzenia</label>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>1980</option>
  <option>1981</option>
  <option>1982</option>
  <option>1983</option>
  <option>1984</option>
  <option>1985</option>
  <option>1986</option>
  <option>1987</option>
  <option>1988</option>
  <option>1989</option>
  <option>1990</option>
  <option>1991</option>
  <option>1992</option>
  <option>1993</option>
  <option>1994</option>
  <option>1995</option>
  <option>1996</option>
  <option>1997</option>
  <option>1998</option>
  <option>1999</option>
  <option>2000</option>
</select>
  </div>
</form>

</fieldset></body></html>
