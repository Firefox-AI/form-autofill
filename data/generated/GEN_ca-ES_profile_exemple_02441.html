<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Escriviu el vostre nom" aria-label="Nom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Escriviu el vostre cognom" aria-label="Cognom" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Opcional: escriviu un nom addicional" aria-label="Nom addicional" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Escriviu un àlies" aria-label="Àlies" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="exemple@domini.com" aria-label="Correu electrònic" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Escriviu el vostre telèfon" aria-label="Telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Escriviu el nom de l&#x27;organització" aria-label="Organització" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Seleccioneu la vostra data de naixement" aria-label="Data de naixement" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
