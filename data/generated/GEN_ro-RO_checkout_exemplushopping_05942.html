<html><head>

<body>

<fieldset>
<h3>exemplu-shopping.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id3ahx">Prenume</label>
    <input type="text" name="firstName" id="id3ahx" placeholder="Introduceți prenumele dvs." data-moz-autofill-type="given-name">

  <div>
    <label for="idy6u1">Nume</label>

  <div>

  </div>
  <div>

  </div>
  <div>
    <label for="idmsy">Țară</label>
    <select name="countryName2" id="idmsy" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Croația</option>
  <option>Cehia</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Islanda</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Latvia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Malta</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>Slovacia</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Regatul Unit</option>
</select>
  </div>
  <div>
    <label for="id4wb">Email</label>
    <input type="email" name="emailAddress" id="id4wb" placeholder="exemplu@domeniu.ro" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idjpmm">Număr de telefon</label>
    <input type="tel" name="tel" id="idjpmm" placeholder="0740 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id1gmb">Județ</label>
    <input type="text" name="neighborhood" id="id1gmb" placeholder="Alegeți județul" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
