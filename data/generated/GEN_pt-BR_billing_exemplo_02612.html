<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome no Cartão
    <input type="text" name="ccName" id="idzz" placeholder="Nome completo como no cartão" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Nome da Empresa
    <input type="text" name="companyName" id="idul" placeholder="Digite o nome da empresa" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Endereço
    <input type="text" name="address" id="id6r" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Cidade
    <input type="text" name="city" id="idx9c" placeholder="Digite a cidade" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>CEP
    <input type="text" name="zipCode" id="id6cdq" placeholder="00000-000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Estado
    <select name="province" id="idvcfrz" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>Santa Catarina</option>
  <option>São Paulo</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
    </label>
  </div>
  <div>
    <label>País
    <select name="country" id="idvx6td" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
    </label>
  </div>
  <div>
    <label>Número de Inscrição Estadual (IE)
    <input type="text" name="vatNumber" id="idw896" placeholder="Inscrição Estadual" data-moz-autofill-type="vat-number">
    </label>
  </div>
</form>

</fieldset></body></html>
