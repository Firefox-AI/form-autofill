<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Февраль</option>
  <option>Март</option>
  <option>Апрель</option>
  <option>Май</option>
  <option>Июнь</option>
  <option>Июль</option>
  <option>Август</option>
  <option>Сентябрь</option>
  <option>Октябрь</option>
  <option>Ноябрь</option>
  <option>Декабрь</option>
</select>
    </label>
  </div>

  <option>2035</option>
</select>
  </div>
  <div>
    <input type="number" name="cardCode" id="idfhe7" placeholder="3 цифры сзади карты" aria-label="Код безопасности (CVC)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idzx0" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Мир</option>
</select>
  </div>
