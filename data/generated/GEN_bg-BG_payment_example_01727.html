<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id44h">Име на картата</label>
    <input type="text" name="cardName" id="id44h" placeholder="Име и фамилия" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idfpk">Номер на карта</label>
    <input type="number" name="cardNo" id="idfpk" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ide1nlb">Месец на изтичане</label>
    <select name="expMonth" id="ide1nlb" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Януари</option>
  <option>Февруари</option>
  <option>Март</option>
  <option>Април</option>
  <option>Май</option>
  <option>Юни</option>
  <option>Юли</option>
  <option>Август</option>
  <option>Септември</option>
  <option>Октомври</option>
  <option>Ноември</option>
  <option>Декември</option>
</select>
  </div>
  <div>
    <label for="id7y">Година на изтичане</label>
    <select name="exp_year2" id="id7y" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <label for="idsphfa">Код за сигурност (CSC)</label>
    <input type="number" name="csc" id="idsphfa" placeholder="3-цифрен код" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idqhh">Тип на карта</label>
    <select name="cardType" id="idqhh" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idfmhi">Адрес на фактуриране</label>
    <input type="text" name="streetAddress" id="idfmhi" placeholder="Напишете адреса си" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="ids8" id="idi2r4f" type="submit">Научете повече</button>
  </div>
</form>

</fieldset></body></html>
