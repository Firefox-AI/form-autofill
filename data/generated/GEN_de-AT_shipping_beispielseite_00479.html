<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>*Nachname</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="*Straße" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">*Hausnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>*Zusatz</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="number" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" aria-label="*Bundesland" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Burgenland</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <label for="country">*Land</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechien</option>
  <option>Slowenien</option>
</select>
  </div>
  <div>
    <label>Wählen Sie die Landesvorwahl
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+43</option>
  <option>+49</option>
  <option>+41</option>
  <option>+39</option>
  <option>+36</option>
  <option>+421</option>
  <option>+420</option>
  <option>+386</option>
</select>
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Rechnungsadresse ist gleich" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="*Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>*Straße</span>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">*Hausnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>*Zusatz</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="number" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>*Bundesland
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Burgenland</option>
  <option>Vorarlberg</option>
</select>
    </label>
  </div>
  <div>
    <label>*Land
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechien</option>
  <option>Slowenien</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
