<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>profiloldal.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Keresztnév
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Vezetéknév
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Középső név
    <input type="text" name="additionalName" id="additionalName" placeholder="Írd be a középső neved (ha van)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Becenév
    <input type="text" name="nickname" id="nickname" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>E-mail cím
    <input type="email" name="email" id="email" placeholder="Például: pelda@domain.hu" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonszám
    <input type="tel" name="tel" id="tel" placeholder="Kérjük, add meg a telefonszámod" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Szervezet
    <input type="text" name="organization" id="organization" placeholder="Írd be a szervezet nevét (ha van)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Születési dátum
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Nap</option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
    </label>
  </div>
  <div>
    <label>Személyi azonosító szám
    <input type="text" name="idNumber" id="idNumber" placeholder="Írd be a személyi azonosítód" data-moz-autofill-type="id-number">
    </label>
  </div>
</form>

</fieldset></body></html>
