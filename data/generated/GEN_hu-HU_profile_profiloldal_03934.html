<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>profiloldal.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Keresztnév
    <input type="text" name="billing_first_name" id="idje" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Vezetéknév
    <input type="text" name="surname" id="idig" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Középső név
    <input type="text" name="mname" id="idvngi" placeholder="Írd be a középső neved (ha van)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Becenév
    <input type="text" name="handle" id="idy6vd" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>E-mail cím
    <input type="email" name="email_address" id="id1fr" placeholder="Írd be az e-mail címed" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonszám
    <input type="tel" name="tel" id="id8g" placeholder="Írd be a telefonszámod" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Szervezet
    <input type="text" name="organization" id="ida4y" placeholder="Írd be a szervezet nevét (ha van)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Születési dátum
    <input type="text" name="dateOfBirth" id="ide8fd" placeholder="Válaszd ki a születési dátumodat" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Személyi azonosító
    <input type="text" name="nationalId" id="idpf" placeholder="Írd be a személyi azonosítódat" data-moz-autofill-type="id-number">
    </label>
  </div>
</form>

</fieldset></body></html>
