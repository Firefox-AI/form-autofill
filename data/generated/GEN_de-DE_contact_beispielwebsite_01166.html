<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname und Nachname*</span>
    <input type="text" name="yourName" id="id0ag" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse*</span>
    <input type="text" name="streetAddress" id="id7c" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postleitzahl*</span>
    <input type="text" name="postalCode2" id="idpl88g" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt*</span>
    <input type="text" name="city" id="idzv" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land*</span>
    <select name="countryCode" id="idrz" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <span>Telefonnummer*</span>
    <input type="tel" name="tel" id="id7ua" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>E-Mail*</span>
    <input type="email" name="mail" id="id77" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
