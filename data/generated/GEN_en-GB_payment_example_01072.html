<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Email Address
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telephone Number
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>First Name
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Address
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
