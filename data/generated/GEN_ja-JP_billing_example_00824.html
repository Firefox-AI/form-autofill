<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義</span>
    <input type="text" name="nameOnCard5" id="idsf" placeholder="カードに記載の名前" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>住所</span>

  <div>

    <input type="text" name="postalCode9" id="idb0iq" placeholder="例: 123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="town" id="id4g" placeholder="市区町村名" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>都道府県</span>
    <select name="state8" id="idnb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>神奈川県</option>
  <option>千葉県</option>
  <option>埼玉県</option>
  <option>兵庫県</option>
  <option>京都府</option>
  <option>広島県</option>
  <option>宮城県</option>
  <option>茨城県</option>
  <option>静岡県</option>
  <option>福島県</option>
  <option>岐阜県</option>
  <option>栃木県</option>
  <option>群馬県</option>
  <option>山口県</option>
  <option>奈良県</option>
  <option>長野県</option>
  <option>熊本県</option>
</select>
  </div>
  <div>
    <span>国</span>
    <select name="country" id="idr607" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
  <option>ブラジル</option>
</select>
  </div>
  <div>
    <span>VAT番号</span>
    <input type="text" name="vatId" id="idw98" placeholder="VAT番号を入力" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>建物名</span>
    <input type="text" name="street2" id="id5l0" placeholder="アパート名やビル名" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>フリガナ（姓）</span>
    <input type="text" name="idqkn4q" id="id7aga" placeholder="フリガナを入力" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
