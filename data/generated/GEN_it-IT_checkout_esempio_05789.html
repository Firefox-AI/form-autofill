<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idstb2">Nome</label>
    <input type="text" name="firstName" id="idstb2" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id1d">Cognome</label>
    <input type="text" name="surname" id="id1d" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5a">Azienda (opzionale)</label>
    <input type="text" name="organization" id="id5a" placeholder="Nome dell&#x27;azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id18ud">Indirizzo</label>
    <input type="text" name="addressLine1" id="id18ud" placeholder="Via e numero civico" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idp60h">Ulteriori informazioni sull&#x27;indirizzo (opzionale)</label>
    <input type="text" name="addr2" id="idp60h" placeholder="Piano, interno, ecc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idxn">Città</label>
    <input type="text" name="town" id="idxn" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id5b">CAP</label>
    <input type="text" name="zip" id="id5b" placeholder="Inserisci il tuo codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idhjej">Paese</label>
    <select name="countryName" id="idhjej" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="id3ye">Email</label>
    <input type="email" name="email_address" id="id3ye" placeholder="Es. nome@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idu9s4">Telefono</label>
    <input type="tel" name="phone" id="idu9s4" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
