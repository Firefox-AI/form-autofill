<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Wpisz swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Wpisz swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Wpisz swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Wpisz swój numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Data urodzenia" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Wpisz nazwę swojej firmy (opcjonalnie)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Zarejestruj się</button>
  </div>
</form>

</fieldset></body></html>
