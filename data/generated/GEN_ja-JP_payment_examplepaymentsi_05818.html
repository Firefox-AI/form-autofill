<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment-site.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id3r">カード名義人名</label>
    <input type="text" name="nameOnCard" id="id3r" placeholder="山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id7s">カード番号</label>
    <input type="number" name="card_number" id="id7s" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idsstn">有効期限（月）</label>
    <select name="expMonth" id="idsstn" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="idpmouu">有効期限（年）</label>
    <select name="ccExpYear" id="idpmouu" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id51rv">セキュリティコード（CVC）</label>
    <input type="number" name="cvv" id="id51rv" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idvf8">カード種類</label>
    <select name="cardType" id="idvf8" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <label for="id5a6">郵便番号</label>
    <input type="text" name="zip" id="id5a6" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
