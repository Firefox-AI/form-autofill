<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idp3v">Nome</label>
    <input type="text" name="billing_first_name" id="idp3v" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id5608">Cognome</label>
    <input type="text" name="billing_last_name" id="id5608" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idwh">Nickname</label>
    <input type="text" name="handle" id="idwh" placeholder="Nome utente o soprannome" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idy6l">Email</label>
    <input type="email" name="email_address" id="idy6l" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id88">Telefono</label>
    <input type="tel" name="tel" id="id88" placeholder="Il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ido9r">Data di nascita</label>
    <input type="text" name="birthday" id="ido9r" placeholder="GG/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idy447z">Organizzazione</label>
    <input type="text" name="organization" id="idy447z" placeholder="Il tuo ente o azienda (opzionale)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id72">Password</label>
    <input type="password" name="idg6" id="id72" placeholder="Crea una password">
  </div>
</form>

</fieldset></body></html>
