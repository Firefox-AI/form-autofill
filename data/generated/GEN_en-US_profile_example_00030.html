<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Select your country</span>
    <select name="country_3662" id="country_8298" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>Germany</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
  <option>Brazil</option>
  <option>India</option>
  <option>China</option>
  <option>Japan</option>
  <option>South Korea</option>
</select>
  </div>
  <div>
    <span>Full name (first and last)</span>
    <input type="text" name="name_9675" id="name_5643" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Cell phone for delivery</span>
    <input type="tel" name="tel_1988" id="tel_1301" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Address line 1</span>
    <input type="text" name="address_line1_1491" id="address_line1_9710" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address line 2 (optional)</span>
    <input type="text" name="address_line2_2722" id="address_line2_9566" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="address_level2_8137" id="address_level2_8018" placeholder="Los Angeles" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>State</span>
    <select name="address_level1_6186" id="address_level1_5019" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Pennsylvania</option>
  <option>Ohio</option>
  <option>Georgia</option>
  <option>North Carolina</option>
  <option>Michigan</option>
</select>
  </div>
  <div>
    <span>Neighborhood / Village</span>
    <input type="text" name="address_level3_948" id="address_level3_6390" placeholder="Downtown" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Postal code</span>
    <input type="text" name="postal_code_6301" id="postal_code_8431" placeholder="90001" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
