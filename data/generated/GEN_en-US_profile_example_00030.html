<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Select your country</span>
    <select name="country_id6" id="idef" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>Germany</option>
  <option>United Kingdom</option>
  <option>France</option>
  <option>Australia</option>
  <option>India</option>
  <option>Brazil</option>
  <option>Japan</option>
  <option>China</option>
  <option>South Africa</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
</select>
  </div>
  <div>
    <span>Full name (first and last)</span>
    <input type="text" name="yourName" id="id4xtdy" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Cell phone for delivery</span>
    <input type="tel" name="mobile" id="idhrmcy" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Address line 1</span>
    <input type="text" name="addr1" id="idjc0c5" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address line 2 (optional)</span>
    <input type="text" name="address24" id="idq5" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="city" id="idk8e" placeholder="Los Angeles" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>State</span>
    <select name="stateProvince" id="id74" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Pennsylvania</option>
  <option>Ohio</option>
  <option>Georgia</option>
  <option>North Carolina</option>
  <option>Michigan</option>
</select>
  </div>
  <div>
    <span>Neighborhood / Village</span>
    <input type="text" name="district6" id="idgdv8s" placeholder="Downtown" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Postal code</span>
    <input type="text" name="postcode6" id="idm4c1e" placeholder="90001" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
