<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome
    <input type="text" name="billing_first_name" id="idon" placeholder="Insira o seu nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sobrenome
    <input type="text" name="surname" id="idnls" placeholder="Insira o seu sobrenome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label for="idme">Empresa</label>
    <input type="text" name="business" id="idme" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idlsfrv">Endereço</label>
    <input type="text" name="address1" id="idlsfrv" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="apt" id="idomi" placeholder="Número do apartamento, se aplicável" aria-label="Apartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="locality" id="id3j" placeholder="Insira a sua cidade" aria-label="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zip_code" id="idkbj" placeholder="Código postal da sua área" aria-label="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idejld">País</label>
    <select name="countryName" id="idejld" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <input type="email" name="email_address" id="idhcagd" placeholder="exemplo@dominio.com" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="telephone" id="idg6ss" placeholder="Seu número de telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idyfp" id="idyng" type="submit">Finalizar Pedido</button>
  </div>
</form>

</fieldset></body></html>
