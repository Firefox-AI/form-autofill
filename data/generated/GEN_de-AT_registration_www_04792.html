<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Kartennummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="text" name="ccExp" id="ccExp" placeholder="Ablaufdatum" data-moz-autofill-type="cc-exp">
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Sicherheitscode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <input type="text" name="ccGivenName" id="ccGivenName" placeholder="Vorname" data-moz-autofill-type="cc-given-name">
  </div>
  <div>
    <input type="text" name="ccFamilyName" id="ccFamilyName" placeholder="Nachname" data-moz-autofill-type="cc-family-name">
  </div>
  <div>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Straßenadresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Zusätzliche Adresse (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
</select>
  </div>
  <div>
    <input type="number" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
