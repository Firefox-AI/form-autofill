<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>prikladova-stranka.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno na kartě</span>
    <input type="text" name="r:r:9:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idexph" placeholder="Jméno a příjmení majitele karty" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Číslo karty</span>
    <input type="number" name="r:r:6:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idka" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Měsíc expirace</span>
    <select name="r:r:1:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idau" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1 - Leden</option>
  <option>2 - Únor</option>
  <option>3 - Březen</option>
  <option>4 - Duben</option>
  <option>5 - Květen</option>
  <option>6 - Červen</option>
  <option>7 - Červenec</option>
  <option>8 - Srpen</option>
  <option>9 - Září</option>
  <option>10 - Říjen</option>
  <option>11 - Listopad</option>
  <option>12 - Prosinec</option>
</select>
  </div>
  <div>
    <span>Rok expirace</span>
    <select name="r:r:2:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idba4" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="r:r:6:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idv41" placeholder="3 nebo 4 číslice" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Typ karty</span>
    <select name="r:r:5:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idqain" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Adresa</span>
    <input type="text" name="r:r:2:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="id5q2fk" placeholder="Ulice a číslo popisné" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="r:r:3:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idc341" placeholder="Např. 100 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="r:r:2:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idvq" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
