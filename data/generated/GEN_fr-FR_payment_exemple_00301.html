<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="idl9b" placeholder="Votre nom tel qu&#x27;il apparaît sur la carte" aria-label="Nom sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="ida8" placeholder="1234 5678 9012 3456" aria-label="Numéro de la carte" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="exp_month" id="idmsd" aria-label="Mois d&#x27;expiration" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="idq8" aria-label="Année d&#x27;expiration" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <input type="number" name="cardCode" id="ida17" placeholder="123" aria-label="Code de sécurité" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="cardType2" id="idlr" aria-label="Type de carte" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <input type="text" name="idvkk" id="idbr" placeholder="Nom de famille en phonétique (facultatif)" aria-label="Nom de famille (phonétique)" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
