<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplosite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Fecha de nacimiento" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Calle y número" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="telExtension" id="telExtension" placeholder="Ej: 123" data-moz-autofill-type="tel-extension">
  </div>
</form>

</fieldset></body></html>
