<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1ac26">Ім&#x27;я на картці</label>
    <input type="text" name="nameOnCard" id="id1ac26" placeholder="Введіть ім&#x27;я, як на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="iduxx">Номер картки</label>
    <input type="number" name="cardNumber" id="iduxx" placeholder="Введіть номер картки" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idtz72">Місяць закінчення терміну дії</label>
    <select name="exp_month" id="idtz72" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Січень</option>
  <option>Лютий</option>
  <option>Березень</option>
  <option>Квітень</option>
  <option>Травень</option>
  <option>Червень</option>
  <option>Липень</option>
  <option>Серпень</option>
  <option>Вересень</option>
  <option>Жовтень</option>
  <option>Листопад</option>
  <option>Грудень</option>
</select>
  </div>
  <div>
    <label for="idh19k">Рік закінчення терміну дії</label>
    <select name="ccExpYear" id="idh19k" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idmb">CVV</label>
    <input type="number" name="cvv" id="idmb" placeholder="Введіть код CVV" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id4k">Тип картки</label>
    <select name="cardType" id="id4k" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
