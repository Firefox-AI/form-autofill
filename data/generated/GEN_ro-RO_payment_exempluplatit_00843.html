<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu-platit.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele titularului</span>
    <input type="text" name="ccName6" id="id6i" placeholder="Introdu numele titularului cardului" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="card_number" id="idkk9r5" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="exp_month" id="iduqw3w" aria-label="Luna expirării" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <label for="id4y">Anul expirării</label>
    <select name="ccExpYear" id="id4y" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idbzcf">Codul de securitate</label>
    <input type="number" name="cvv" id="idbzcf" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="cardType5" id="idhm7r" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="id9p">Adresa de facturare</label>
    <input type="text" name="addr" id="id9p" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
