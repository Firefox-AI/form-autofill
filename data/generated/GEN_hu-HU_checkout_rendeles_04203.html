<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>rendeles.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Keresztnév</span>
    <input type="text" name="firstName" id="id07" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Vezetéknév</span>
    <input type="text" name="billing_last_name" id="idafi" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Cím</span>
    <input type="text" name="street1" id="idwir" placeholder="Utca és házszám" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Kiegészítő cím</span>
    <input type="text" name="address2" id="idg0i" placeholder="Például lépcsőház vagy emelet" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="town" id="idup2" placeholder="Írd be a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Irányítószám</span>
    <input type="text" name="postalCode" id="iden" placeholder="Írd be az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ország</span>
    <select name="countryName" id="idbl" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Románia</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Szlovénia</option>
  <option>Horvátország</option>
  <option>Csehország</option>
  <option>Németország</option>
</select>
  </div>
  <div>
    <span>E-mail cím</span>
    <input type="email" name="user_email" id="idcg1" placeholder="Például: pelda@domain.hu" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonszám</span>
    <input type="tel" name="telephone" id="id5y7" placeholder="Például: +36 20 123 4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
