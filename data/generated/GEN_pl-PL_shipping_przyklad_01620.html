<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i Nazwisko</span>
    <input type="text" name="name" id="idc6tz" placeholder="Wpisz swoje imię i nazwisko" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adres</span>

  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="zip" id="iduf6" placeholder="Wpisz kod pocztowy" data-moz-autofill-type="postal-code">

  <option>Francja</option>
  <option>Włochy</option>
  <option>Hiszpania</option>

</select>
  </div>
  <div>
    <span>Numer budynku</span>

  </div>
  <div>
    <button name="idi6" id="idbbni" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
