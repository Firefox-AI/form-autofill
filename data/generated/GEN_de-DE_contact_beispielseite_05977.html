<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2ubtw">Straßenadresse</label>
    <input type="text" name="addr" id="id2ubtw" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id8km4n">Vollständiger Name</label>
    <input type="text" name="name" id="id8km4n" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iddn">Telefonnummer</label>
    <input type="tel" name="tel" id="iddn" placeholder="z.B. +49 123 4567890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
