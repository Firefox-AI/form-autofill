<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Име на картата</label>
    <input type="text" name="ccName" id="ccName" placeholder="Име на картата" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Номер на карта</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Номер на карта" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Месец на изтичане</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Януари</option>
  <option>Февруари</option>
  <option>Март</option>
  <option>Април</option>
  <option>Май</option>
  <option>Юни</option>
  <option>Юли</option>
  <option>Август</option>
  <option>Септември</option>
  <option>Октомври</option>
  <option>Ноември</option>
  <option>Декември</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Година на изтичане</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Код за сигурност</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Код за сигурност" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Тип на карта</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="addressLine1">Адрес за фактура</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Улица, номер, населено място" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
