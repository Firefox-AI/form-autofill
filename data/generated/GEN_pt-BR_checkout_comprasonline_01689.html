<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>comprasonline.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificPrefix">Título</label>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
  </div>
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sobrenome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="exemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefone</label>
    <input type="tel" name="tel" id="tel" placeholder="(00) 00000-0000" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Endereço</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Av, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Cidade</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Estado</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>São Paulo</option>
  <option>Rio de Janeiro</option>
  <option>Minas Gerais</option>
  <option>Bahia</option>
  <option>Rio Grande do Sul</option>
  <option>Paraná</option>
  <option>Santa Catarina</option>
  <option>Ceará</option>
  <option>Pernambuco</option>
  <option>Pará</option>
  <option>Maranhão</option>
  <option>Goiás</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Acre</option>
  <option>Roraima</option>
  <option>Tocantins</option>
  <option>Sergipe</option>
  <option>Piauí</option>
  <option>Mato Grosso do Sul</option>
  <option>Mato Grosso</option>
  <option>Amazonas</option>
</select>
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
