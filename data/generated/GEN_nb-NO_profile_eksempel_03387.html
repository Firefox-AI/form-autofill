<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Fornavn
    <input type="text" name="fname" id="ida3" placeholder="Skriv inn fornavn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Etternavn
    <input type="text" name="surname2" id="idnh8" placeholder="Skriv inn etternavn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Mellomnavn
    <input type="text" name="middleName" id="id2p" placeholder="Skriv inn mellomnavn (valgfritt)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Kallenavn
    <input type="text" name="displayName4" id="idte" placeholder="Skriv inn kallenavn (valgfritt)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>E-postadresse
    <input type="email" name="email" id="idah6" placeholder="Skriv inn e-postadresse" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="phoneNumber" id="idns" placeholder="Skriv inn telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organisasjon
    <input type="text" name="companyName" id="idb36" placeholder="Skriv inn organisasjonsnavn (valgfritt)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Fødselsdato
    <input type="text" name="dateOfBirth" id="idmiv" placeholder="Velg fødselsdato" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Fonetsk etternavn
    <input type="text" name="idy5b46" id="idzq0b" placeholder="Skriv inn fonetisk etternavn (valgfritt)" data-moz-autofill-type="phonetic-family-name">
    </label>
  </div>
  <div>
    <label>Passord
    <input type="password" name="idxjsk" id="iddwm" placeholder="Skriv inn passord">
    </label>
  </div>
</form>

</fieldset></body></html>
