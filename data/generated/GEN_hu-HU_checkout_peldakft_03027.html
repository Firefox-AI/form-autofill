<html><head>

</head>

<body>

<fieldset>
<h3>peldakft.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Keresztnév
    <input type="text" name="r:r:1:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="id50p" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">

  </div>
  <div>
    <label>Vezetéknév
    <input type="text" name="r:r:3:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idio3s" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">

  </div>
  <div>

  </div>
  <div>

    <input type="text" name="r:r:9:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="ido1" placeholder="Pl. Budapest" data-moz-autofill-type="address-level2">

</select>

  </div>
  <div>

  <div>

  </div>
  <div>
    <label>Cég neve (ha van)
    <input type="text" name="r:r:7:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="idli" placeholder="Pl. Példa Kft." data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Megye
    <select name="r:r:1:m:r:10:cr:1:c:pr:1:container:fs:i:input" id="id6q" data-moz-autofill-type="address-level1">

  <option>Bács-Kiskun</option>
  <option>Baranya</option>
  <option>Békés</option>

    </label>
  </div>

    <input type="text" name="r:r:8:m:r:11:cr:2:c:pr:1:container:fs:i:input" id="idzozcs" placeholder="Pl. Példa" data-moz-autofill-type="phonetic-family-name">
    </label>
  </div>
  <div>
    <button name="r:r:5:m:r:12:cr:3:c:pr:1:container:fs:i:input" id="id8kcs" type="submit">Küldés</button>
