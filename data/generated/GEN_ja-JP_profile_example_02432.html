<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>名
    <input type="text" name="r:r:8:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idu8" placeholder="例: 太郎" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>姓
    <input type="text" name="r:r:2:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idue" placeholder="例: 山田" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>ミドルネーム
    <input type="text" name="r:r:2:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idm2v" placeholder="例: 次郎" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>ニックネーム
    <input type="text" name="r:r:4:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idj68" placeholder="例: タロ" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>メールアドレス
    <input type="email" name="r:r:3:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id6nh" placeholder="例: taro@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>電話番号
    <input type="tel" name="r:r:5:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idm2" placeholder="例: 090-1234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>所属団体
    <input type="text" name="r:r:3:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="idup4" placeholder="例: 株式会社サンプル" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>誕生日
    <input type="text" name="r:r:3:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id8fva" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>フリガナ（姓）
    <input type="text" name="r:r:7:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idvjy" placeholder="例: ヤマダ" data-moz-autofill-type="phonetic-family-name">
    </label>
  </div>
  <div>
    <label>誕生月
    <select name="r:r:2:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="id731" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
    </label>
  </div>
  <div>
    <label>市区町村
    <input type="text" name="r:r:5:m:r:11:cr:2:c:pr:1:container:fs:i:input" id="id5d3d" placeholder="例: 渋谷区" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <label>パスワード
    <input type="password" name="r:r:4:m:r:12:cr:1:c:pr:1:container:fs:i:input" id="idxc37" placeholder="ここに入力">
    </label>
  </div>
</form>

</fieldset></body></html>
