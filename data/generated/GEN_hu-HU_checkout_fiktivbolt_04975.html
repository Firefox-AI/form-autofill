<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivbolt.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Keresztnév</label>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Vezetéknév</label>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Utca, házszám</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Pl. Árpád utca 10" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Város</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Írd be a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Irányítószám</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Pl. 1055" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Ország</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szerbia</option>
  <option>Csehország</option>
</select>
  </div>
  <div>
    <label for="email">E-mail cím</label>
    <input type="email" name="email" id="email" placeholder="Pl. pelda@domain.hu" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonszám</label>
    <input type="tel" name="tel" id="tel" placeholder="Pl. +36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
