<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" aria-label="E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="name" id="name" aria-label="Registrierter Benutzer" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="loginname" id="loginname" aria-label="Ich möchte mich registrieren und meine Daten für zukünftige Bestellungen speichern" data-moz-autofill-type="loginname">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" aria-label="Abholung von einem Econt-Büro" data-moz-autofill-type="street-address">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Gebiet:" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Stadt</option>
  <option>Bezirk</option>
  <option>Landkreis</option>
</select>
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" aria-label="Standort:" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Zentrum</option>
  <option>Vorort</option>
  <option>Ländlich</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postleitzahl:" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" aria-label="Straße:" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" aria-label="Hausnummer:" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Hausnummer:" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="country" aria-label="Land:" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
</form>

</fieldset></body></html>
