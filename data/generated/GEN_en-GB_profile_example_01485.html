<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idxvr">Country*</label>
    <select name="country" id="idxvr" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Australia</option>
  <option>Canada</option>
  <option>New Zealand</option>
  <option>South Africa</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <label for="idxm">First Name*</label>
    <input type="text" name="fname" id="idxm" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id4gfs">Last Name*</label>
    <input type="text" name="surname" id="id4gfs" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id4j0jv">Region/County*</label>
    <input type="text" name="county" id="id4j0jv" placeholder="Enter your region or county" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idilwzr">Postcode*</label>
    <input type="text" name="postcode" id="idilwzr" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idnn">City/Town*</label>
    <input type="text" name="town" id="idnn" placeholder="Enter your city or town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id1bu1w">Street Address*</label>
    <input type="text" name="street" id="id1bu1w" placeholder="Enter your street address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id385s">Phone Number*</label>
    <input type="tel" name="phone" id="id385s" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
