<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre</span>
    <input type="text" name="givenName" id="givenName" placeholder="Juan" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apellido</span>
    <input type="text" name="familyName" id="familyName" placeholder="Pérez" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Segundo nombre</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Miguel" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Apodo</span>
    <input type="text" name="nickname" id="nickname" placeholder="Juancito" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="email" id="email" placeholder="juan.perez@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="tel" placeholder="612345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organización</span>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Fecha de nacimiento</span>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Apellido (fonético)</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Pérez" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>Contraseña</span>
    <input type="password" name="field" id="field">
  </div>
</form>

</fieldset></body></html>
