<html><head>

</head>

<body>

<fieldset>
<h3>example.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

    <span>Ваше ім&#x27;я</span>

  </div>
  <div>
    <button name="idyitfm" id="idl0" type="submit">Надіслати</button>
  </div>
</form>

</fieldset></body></html>
