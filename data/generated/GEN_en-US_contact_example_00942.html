<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.us</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="addressLookup">Courier Service</label>
    <select name="addressLookup" id="addressLookup" data-moz-autofill-type="address-lookup">
  <option value=""></option>
  <option>USPS</option>
  <option>FedEx</option>
  <option>UPS</option>
  <option>DHL</option>
</select>
  </div>
  <div>
    <label for="apartment">Apartment / Office</label>
    <input type="text" name="apartment" id="apartment" placeholder="Enter your apartment or office number" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="addressExtra">Entrance</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Specify the entrance if applicable" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="floor">Floor</label>
    <input type="text" name="floor" id="floor" placeholder="Enter the floor number" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="addressLookup">Select Floor</label>
    <select name="addressLookup" id="addressLookup" data-moz-autofill-type="address-lookup">
  <option value=""></option>
  <option>1st Floor</option>
  <option>2nd Floor</option>
  <option>3rd Floor</option>
  <option>4th Floor</option>
  <option>5th Floor</option>
  <option>Penthouse</option>
</select>
  </div>
</form>

</fieldset></body></html>
