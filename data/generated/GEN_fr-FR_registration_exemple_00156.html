<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhwg">Prénom</label>
    <input type="text" name="billing_first_name" id="idhwg" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id3iaa">Nom de famille</label>
    <input type="text" name="lname" id="id3iaa" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idb3mdn">Email</label>
    <input type="email" name="user_email" id="idb3mdn" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id6xe9">Téléphone</label>
    <input type="tel" name="phoneNumber" id="id6xe9" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idij9z">Date de naissance</label>
    <input type="text" name="dob" id="idij9z" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idkobzh">Mot de passe</label>
    <input type="password" name="idrh" id="idkobzh" placeholder="Mot de passe">
  </div>
</form>

</fieldset></body></html>
