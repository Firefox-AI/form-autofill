<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nom de famille</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Date de naissance</label>
    <input type="text" name="bday" id="bday" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="field">Mot de passe</label>
    <input type="password" name="field" id="field" placeholder="Mot de passe">
  </div>
</form>

</fieldset></body></html>
