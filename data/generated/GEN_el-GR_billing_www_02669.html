<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.paraggelies.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Όνομα κατόχου κάρτας
    <input type="text" name="cardName" id="id211s4" placeholder="Πλήρες όνομα" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Διεύθυνση
    <input type="text" name="address" id="id71xr" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ταχυδρομικός Κωδικός
    <input type="text" name="zip" id="idt2" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Πόλη
    <input type="text" name="city" id="idh4" placeholder="Πόλη" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Περιφέρεια
    <select name="county" id="ido0nda" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττικής</option>
  <option>Κεντρικής Μακεδονίας</option>
  <option>Δυτικής Μακεδονίας</option>
  <option>Θεσσαλίας</option>
  <option>Ηπείρου</option>
  <option>Πελοποννήσου</option>
  <option>Στερεάς Ελλάδας</option>
  <option>Νησιά Αιγαίου</option>
  <option>Νησιά Ιονίου</option>
</select>
    </label>
  </div>
  <div>
    <label>Χώρα
    <select name="country" id="id7qyv" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ηνωμένο Βασίλειο</option>
  <option>Ηνωμένες Πολιτείες</option>
</select>
    </label>
  </div>
  <div>
    <label>Εταιρεία
    <input type="text" name="organization" id="idfsx5" placeholder="Όνομα επιχείρησης" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Τηλέφωνο
    <input type="tel" name="mobile" id="idcc" placeholder="Π.χ. 2101234567" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="idwo" id="id0i" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
