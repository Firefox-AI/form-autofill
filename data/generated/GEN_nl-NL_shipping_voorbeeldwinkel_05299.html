<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Voor- en achternaam" aria-label="Naam" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Straatnaam" aria-label="Straat" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Huisnummer" aria-label="Huisnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijvoorbeeld: appartement of verdieping" aria-label="Extra adresinformatie" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Plaatsnaam" aria-label="Plaats" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Appartementnummer (indien van toepassing)" aria-label="Appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Gebouwnaam (indien van toepassing)" aria-label="Gebouw" data-moz-autofill-type="building">
  </div>
</form>

</fieldset></body></html>
