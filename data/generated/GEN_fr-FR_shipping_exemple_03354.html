<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idfexb">Nom complet</label>
    <input type="text" name="fullName" id="idfexb" placeholder="Entrez votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id4g434">Adresse</label>
    <input type="text" name="addressLine1" id="id4g434" placeholder="Numéro et rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id9g4">Code postal</label>
    <input type="text" name="zip_code" id="id9g4" placeholder="Entrez votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idur">Ville</label>
    <input type="text" name="locality" id="idur" placeholder="Entrez votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idu11">Pays</label>
    <select name="countryName" id="idu11" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
</select>
  </div>
  <div>
    <label for="idxwi4g">Complément d&#x27;adresse (optionnel)</label>
    <input type="text" name="addressLine2" id="idxwi4g" placeholder="Étage, bâtiment, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idbujnq">Numéro d&#x27;appartement</label>
    <input type="text" name="apt" id="idbujnq" placeholder="Entrez le numéro d&#x27;appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="id8awjx">Étage</label>
    <input type="text" name="floor" id="id8awjx" placeholder="Entrez l&#x27;étage" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="id0j">Bâtiment</label>
    <input type="text" name="id792oj" id="id0j" placeholder="Nom ou numéro du bâtiment" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="idedav" id="idry" type="submit">Soumettre</button>
  </div>
</form>

</fieldset></body></html>
