<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.pt</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ide7i7">Nome completo</label>
    <input type="text" name="contactName" id="ide7i7" placeholder="Nome e sobrenome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idrqs4">Endereço</label>
    <input type="text" name="street1" id="idrqs4" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idif3p">Complemento</label>
    <input type="text" name="addressLine2" id="idif3p" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idv3rh3">Código postal</label>
    <input type="text" name="zipCode" id="idv3rh3" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idw67w">Localidade</label>
    <input type="text" name="locality" id="idw67w" placeholder="Cidade ou Vila" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idvr">País</label>
    <select name="country" id="idvr" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
</select>
  </div>
  <div>
    <label for="id8v">Escada</label>
    <input type="text" name="id4j" id="id8v" placeholder="Número da escada (se aplicável)" data-moz-autofill-type="stair">
  </div>
  <div>
    <label for="idyuvd">Nome adicional do cartão</label>
    <input type="text" name="idqvc5" id="idyuvd" placeholder="Nome que aparece no cartão (se houver)" data-moz-autofill-type="cc-additional-name">
  </div>
</form>

</fieldset></body></html>
