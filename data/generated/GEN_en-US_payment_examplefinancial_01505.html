<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplefinancialservices.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Country</span>
    <select name="r:r:9:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idgk" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
</select>
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="r:r:1:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idubcpf" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="r:r:6:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idw4" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Company Name</span>
    <input type="text" name="r:r:7:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idgni" placeholder="Enter your company name" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Address</span>
    <input type="text" name="r:r:5:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id9go" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="r:r:6:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idw7" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Credit Card Number</span>
    <input type="number" name="r:r:2:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="ide7z" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Cardholder&#x27;s Name</span>
    <input type="text" name="r:r:5:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idc9ekb" placeholder="Name as it appears on card" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Expiration Month</span>
    <select name="r:r:7:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="id2fkn6" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 (Jan)</option>
  <option>02 (Feb)</option>
  <option>03 (Mar)</option>
  <option>04 (Apr)</option>
  <option>05 (May)</option>
  <option>06 (Jun)</option>
  <option>07 (Jul)</option>
  <option>08 (Aug)</option>
  <option>09 (Sep)</option>
  <option>10 (Oct)</option>
  <option>11 (Nov)</option>
  <option>12 (Dec)</option>
</select>
  </div>
  <div>
    <span>Expiration Year</span>
    <select name="r:r:1:m:r:10:cr:1:c:pr:1:container:fs:i:input" id="id0n" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Security Code (CVV)</span>
    <input type="number" name="r:r:5:m:r:11:cr:2:c:pr:1:container:fs:i:input" id="idmqnam" placeholder="3 or 4 digit code" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
