<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ф.И.О.</span>
    <input type="text" name="name" id="name" placeholder="Введите ваше имя, фамилию и отчество" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Электронная почта
    <input type="email" name="email" id="email" placeholder="example@mail.ru" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Телефон
    <input type="tel" name="tel" id="tel" placeholder="+7 (___) ___-__-__" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label for="streetAddress">Улица, дом</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введите адрес" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Город</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Почтовый индекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Введите название организации" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Отправить</button>
  </div>
</form>

</fieldset></body></html>
