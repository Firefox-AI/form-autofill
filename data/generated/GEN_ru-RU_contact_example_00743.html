<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ф.И.О.</span>
    <input type="text" name="fullName" id="ide5uo" placeholder="Введите ваше имя, фамилию и отчество" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="mail" id="idt0n" placeholder="example@mail.ru" aria-label="Электронная почта" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Телефон</span>
    <input type="tel" name="telephone" id="idhvv1v" placeholder="+7 (___) ___-__-__" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="addr" id="idph" placeholder="Введите адрес (улица, дом)" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Город
    <input type="text" name="town" id="idbpio" placeholder="Введите город" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="idqdiiw">Почтовый индекс</label>
    <input type="text" name="zip_code" id="idqdiiw" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Организация
    <input type="text" name="business" id="id7hfe" placeholder="Введите название организации (если есть)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <button name="idyc" id="id5f1l" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
