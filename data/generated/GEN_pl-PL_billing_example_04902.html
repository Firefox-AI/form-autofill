<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iddng">Imię i nazwisko</label>
    <input type="text" name="cardName" id="iddng" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id30f">Ulica i numer</label>
    <input type="text" name="addressLine1" id="id30f" placeholder="ul. Główna 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idu3c7f">Adres dodatkowy (opcjonalnie)</label>
    <input type="text" name="street2" id="idu3c7f" placeholder="Mieszkanie 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idzos">Kod pocztowy</label>
    <input type="text" name="postalCode" id="idzos" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id3vm0w">Miasto</label>
    <input type="text" name="locality" id="id3vm0w" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxd">Województwo</label>
    <select name="province" id="idxd" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Mazowieckie</option>
  <option>Wielkopolskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Pomorskie</option>
  <option>Zachodniopomorskie</option>
  <option>Małopolskie</option>
  <option>Śląskie</option>
  <option>Dolnośląskie</option>
  <option>Lubusz</option>
  <option>Opolskie</option>
  <option>Świętokrzyskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Lubelskie</option>
</select>
  </div>
  <div>
    <label for="idss">Kraj</label>
    <select name="country" id="idss" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Czechy</option>
  <option>Słowacja</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Holandia</option>
  <option>Szwecja</option>
  <option>Norwegia</option>
</select>
  </div>
  <div>
    <label for="idho">Numer VAT</label>
    <input type="text" name="vat" id="idho" placeholder="PL1234567890" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idduh">Numer telefonu</label>
    <input type="tel" name="telephone" id="idduh" placeholder="123 456 789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
