<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekodeme.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Adınızı ve Soyadınızı girin" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Kredi Kartı Numarası
    <input type="number" name="ccNumber" id="ccNumber" placeholder="16 haneli kart numaranızı yazın" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <span>Son Kullanma Yılı</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label>Güvenlik Kodu (CVC)
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Kartın arkasındaki 3 haneli kod" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label for="ccType">Kart Tipi</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Fatura için adresinizi girin" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <button name="field" id="field" type="submit">Ödeme Yap</button>
  </div>
</form>

</fieldset></body></html>
