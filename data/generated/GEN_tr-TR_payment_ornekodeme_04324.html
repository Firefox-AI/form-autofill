<html><head>

<body>

<fieldset>
<h3>ornekodeme.com</h3>

    <select name="ccExpMonth" id="idab4" data-moz-autofill-type="cc-exp-month">

  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <select name="expYear" id="idwon" aria-label="Son Kullanım Yılı" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="cardCode" id="idcvnc" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idq3w3" aria-label="Kart Türü" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="id6ds">Fatura Adresi</label>
    <input type="text" name="addr" id="id6ds" placeholder="Sokak, Cadde, Apartman" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idx69" id="id4620q" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
