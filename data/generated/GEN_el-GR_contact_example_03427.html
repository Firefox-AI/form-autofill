<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="ida94" placeholder="Πλήρες όνομα" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idrke">Ηλεκτρονικό ταχυδρομείο</label>
    <input type="email" name="emailAddress" id="idrke" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="mobile" id="id566" placeholder="Πρότυπο: 2101234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Διεύθυνση</span>
    <input type="text" name="street" id="idtx" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="locality7" id="idqlf" placeholder="Πόλη" aria-label="Πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zip" id="idlj" placeholder="Ταχυδρομικός κωδικός" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="country3" id="idt1" aria-label="Χώρα" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Βρετανία</option>
</select>
  </div>
</form>

</fieldset></body></html>
