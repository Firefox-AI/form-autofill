<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom sur la carte</span>
    <input type="text" name="cardName" id="id9b" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Nom de l&#x27;entreprise</span>
    <input type="text" name="companyName" id="iduog" placeholder="Votre entreprise" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="address" id="idre03" placeholder="123 Rue de Paris" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="locality" id="idi25i" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode2" id="id80fww" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Région</span>
    <select name="region" id="idcb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
</select>
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName2" id="idk5" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
</select>
  </div>
  <div>
    <span>Numéro de TVA</span>
    <input type="text" name="vat" id="idkjp2x" placeholder="FR123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idxm" id="idf9dw" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
