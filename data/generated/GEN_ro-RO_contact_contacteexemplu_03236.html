<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>contacteexemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nume complet</label>
    <input type="text" name="name" id="name" placeholder="Introdu numele tău complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Adresă de email</label>
    <input type="email" name="email" id="email" placeholder="email@exemplu.ro" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Introdu numărul tău de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada, numărul, apartamentul (dacă este cazul)" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introdu orașul tău" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
