<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Ditt fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Etternavn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Ditt etternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Mellomnavn</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Ditt mellomnavn (valgfritt)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Kallenavn</span>
    <input type="text" name="nickname" id="nickname" placeholder="Ditt kallenavn (valgfritt)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-postadresse</span>
    <input type="email" name="email" id="email" placeholder="navn@eksempel.no" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="(+47) 123 45 678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisasjon</span>
    <input type="text" name="organization" id="organization" placeholder="Din organisasjons navn (valgfritt)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Fødselsdato</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
