<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Jméno na kartě</label>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Novák" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization">Společnost</label>
    <input type="text" name="organization" id="organization" placeholder="Název firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Ulice a číslo popisné</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Hlavní 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Další adresa</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Byt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">PSČ</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="100 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Město</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Kraj</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský</option>
  <option>Jihočeský</option>
  <option>Plzeňský</option>
  <option>Karlovarský</option>
  <option>Ústecký</option>
  <option>Liberecký</option>
  <option>Královéhradecký</option>
  <option>Pardubický</option>
  <option>Vysočina</option>
  <option>Jihomoravský</option>
  <option>Olomoucký</option>
  <option>Zlínský</option>
  <option>Moravskoslezský</option>
</select>
  </div>
  <div>
    <label for="countryName">Země</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Polsko</option>
  <option>Rakousko</option>
  <option>Maďarsko</option>
  <option>Francie</option>
  <option>Itálie</option>
  <option>Velká Británie</option>
  <option>USA</option>
</select>
  </div>
</form>

</fieldset></body></html>
