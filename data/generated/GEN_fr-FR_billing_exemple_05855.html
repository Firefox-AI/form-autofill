<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idql">Nom sur la carte</label>
    <input type="text" name="ccName8" id="idql" placeholder="Insérez le nom tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idqr8">Adresse</label>
    <input type="text" name="address1" id="idqr8" placeholder="Numéro et rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idb4q">Complément d&#x27;adresse</label>
    <input type="text" name="addr2" id="idb4q" placeholder="Appartement, étage, etc. (facultatif)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idywh8">Numéro d&#x27;appartement</label>
    <input type="text" name="apt3" id="idywh8" placeholder="Votre numéro d&#x27;appartement (si applicable)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idefoa6">Code postal</label>
    <input type="text" name="postalCode4" id="idefoa6" placeholder="Entrer votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idno">Ville</label>
    <input type="text" name="locality" id="idno" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxnfxj">Région</label>
    <select name="region" id="idxnfxj" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Alsace</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Corse</option>
  <option>Îles de la Mer Méditerranée</option>
  <option>Guadeloupe</option>
  <option>Martinique</option>
  <option>La Réunion</option>
  <option>Guyane</option>
</select>
  </div>
  <div>
    <label for="idbuc24">Pays</label>
    <select name="country" id="idbuc24" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
  <option>Canada</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Royaume-Uni</option>
  <option>Italie</option>
</select>
  </div>
  <div>
    <label for="idcf2jc">Société</label>
    <input type="text" name="organization1" id="idcf2jc" placeholder="Nom de votre entreprise (le cas échéant)" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
