<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Titlu
    <select name="prefix" id="idt9" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Domn</option>
  <option>Doamnă</option>
  <option>Domnișoară</option>
</select>
    </label>
  </div>
  <div>
    <label for="idb8pfh">Prenume</label>
    <input type="text" name="first_name" id="idb8pfh" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="billing_last_name" id="idi4l" placeholder="Introduceti numele de familie" aria-label="Nume de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Adresă
    <input type="text" name="street5" id="id2r" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <input type="text" name="locality" id="idpy6" placeholder="Introduceti orașul" aria-label="Oraș" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="zip" id="idky5o4" placeholder="Introduceti codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="idef2" aria-label="Țară" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cehia</option>
  <option>Croația</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Letonia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Malta</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>Slovacia</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Regatul Unit</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="emailAddress" id="ide1" placeholder="Introduceti adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="telephone" id="idqgw" placeholder="Introduceti numărul de telefon" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
