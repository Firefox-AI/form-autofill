<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idfi">Name auf der Kreditkarte</label>
    <input type="text" name="r:r:9:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idfi" placeholder="Vor- und Nachname" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idbeu1">Straße und Hausnummer</label>
    <input type="text" name="r:r:8:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idbeu1" placeholder="z.B. Hauptstraße 12" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="ids5">Postleitzahl</label>
    <input type="text" name="r:r:5:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="ids5" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idabll">Stadt</label>
    <input type="text" name="r:r:6:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idabll" placeholder="z.B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ide9ofy">Bundesland</label>
    <select name="r:r:8:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="ide9ofy" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <label for="idifs0">Land</label>
    <select name="r:r:5:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idifs0" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Vereinigte Staaten</option>
  <option>Vereinigtes Königreich</option>
</select>
  </div>
  <div>
    <label for="idww">Telefonnummer</label>
    <input type="tel" name="r:r:5:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="idww" placeholder="z.B. +43 1 2345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id7b0">Zusatzadresse (optional)</label>
    <input type="text" name="r:r:7:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="id7b0" placeholder="z.B. Top 3B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idg28i">Wohnung (optional)</label>
    <input type="text" name="r:r:1:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="idg28i" placeholder="z.B. 3B" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
