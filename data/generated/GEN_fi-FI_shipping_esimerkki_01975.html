<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nimi</label>
    <input type="text" name="name" id="name" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Katu</label>
    <input type="text" name="street" id="street" placeholder="Katuosoite" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Talon numero</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Talon numero" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Osoitteen lisätiedot</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lisätiedot (esim. kerros)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postinumero</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
</select>
  </div>
  <div>
    <label for="apartment">Asunto</label>
    <input type="text" name="apartment" id="apartment" placeholder="Asunnon numero" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="vatNumber">ALV-numero</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="ALV-tunnus" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="phoneticName">Äänteellinen nimi</label>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Nimi ääntämistä varten" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Lähetä</button>
  </div>
</form>

</fieldset></body></html>
