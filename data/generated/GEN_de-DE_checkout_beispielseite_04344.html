<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname *" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Straße *" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Hausnummer *" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="number" name="apartment" id="apartment" placeholder="Wohnungsnummer" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="number" name="postalCode" id="postalCode" placeholder="Postleitzahl *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="E-Mail *" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer *" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
