<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzodhc">Vorname *</label>
    <input type="text" name="billing_first_name8" id="idzodhc" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idx7">Nachname *</label>
    <input type="text" name="billing_last_name" id="idx7" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id71yd">Straße *</label>
    <input type="text" name="streetName8" id="id71yd" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idht">Hausnummer *</label>
    <input type="text" name="houseNumber" id="idht" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="id52yam">Wohnungsnummer</label>
    <input type="number" name="flat" id="id52yam" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="ida8jd">Postleitzahl *</label>
    <input type="number" name="postalCode" id="ida8jd" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id5bwi">E-Mail *</label>
    <input type="email" name="email" id="id5bwi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idlv">Telefonnummer *</label>
    <input type="tel" name="tel" id="idlv" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
