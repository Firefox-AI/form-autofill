<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Имя
    <input type="text" name="givenName" id="givenName" placeholder="Ваше имя" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Фамилия
    <input type="text" name="familyName" id="familyName" placeholder="Ваша фамилия" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Отчество
    <input type="text" name="additionalName" id="additionalName" placeholder="Ваше отчество (если есть)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Псевдоним
    <input type="text" name="nickname" id="nickname" placeholder="Ваш никнейм" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Электронная почта
    <input type="email" name="email" id="email" placeholder="example@domain.ru" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Телефон
    <input type="tel" name="tel" id="tel" placeholder="Ваш номер телефона" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Организация
    <input type="text" name="organization" id="organization" placeholder="Ваша организация (если есть)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Дата рождения
    <input type="text" name="bday" id="bday" placeholder="ДД/MM/ГГГГ" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Идентификационный номер
    <input type="text" name="idNumber" id="idNumber" placeholder="Ваш ID номер" data-moz-autofill-type="id-number">
    </label>
  </div>
  <div>
    <label>Пароль
    <input type="password" name="field" id="field" placeholder="Введите пароль">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Отправить</button>
  </div>
</form>

</fieldset></body></html>
