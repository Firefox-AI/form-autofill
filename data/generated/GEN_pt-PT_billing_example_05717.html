<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ide2kc">Nome no Cartão</label>
    <input type="text" name="cardholderName" id="ide2kc" placeholder="Nome completo como no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idd5">Morada</label>
    <input type="text" name="address8" id="idd5" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idzo">Código Postal</label>
    <input type="text" name="postalCode" id="idzo" placeholder="Ex: 1234-567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxa">Concelho</label>
    <input type="text" name="locality" id="idxa" placeholder="Concelho" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id9c">Distrito</label>
    <select name="region" id="id9c" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Braga</option>
  <option>Coimbra</option>
  <option>Setúbal</option>
  <option>Aveiro</option>
  <option>Évora</option>
  <option>Faro</option>
  <option>Leiria</option>
  <option>Viseu</option>
</select>
  </div>
  <div>
    <label for="idn7">País</label>
    <select name="country" id="idn7" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="idgoku">Número de Contribuinte</label>
    <input type="text" name="vat" id="idgoku" placeholder="NIF" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
