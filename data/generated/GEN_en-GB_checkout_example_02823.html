<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id75rz">Country *</label>
    <select name="countryCode" id="id75rz" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Scotland</option>
  <option>Wales</option>
  <option>Northern Ireland</option>
</select>
  </div>
  <div>
    <label for="id1bi">Full Name *</label>
    <input type="text" name="contactName" id="id1bi" placeholder="Enter your full name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="ido4eu9">Address Line 1 *</label>
    <input type="text" name="addr1" id="ido4eu9" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idyusdi">Address Line 2</label>
    <input type="text" name="addressLine2" id="idyusdi" placeholder="Flat, Suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idctk">City *</label>
    <input type="text" name="town" id="idctk" placeholder="London" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idy6bhi">Region</label>
    <select name="county" id="idy6bhi" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>East Midlands</option>
  <option>East of England</option>
  <option>London</option>
  <option>North East</option>
  <option>North West</option>
  <option>Northern Ireland</option>
  <option>Scotland</option>
  <option>South East</option>
  <option>South West</option>
  <option>Wales</option>
  <option>West Midlands</option>
  <option>Yorkshire and the Humber</option>
</select>
  </div>
  <div>
    <label for="id3qndm">Postcode *</label>
    <input type="text" name="postcode" id="id3qndm" placeholder="E.g. SW1A 1AA" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7bgb4">Phone Number</label>
    <input type="tel" name="phoneNumber" id="id7bgb4" placeholder="07700 900 982" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
