<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id6a">Naam op de creditcard</label>
    <input type="text" name="cardName" id="id6a" placeholder="Vul uw naam in zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idkcjh">Straat en huisnummer</label>
    <input type="text" name="addr" id="idkcjh" placeholder="Voer uw straat en huisnummer in" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idmvu5">Postcode</label>
    <input type="text" name="zip7" id="idmvu5" placeholder="Voer uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id3r">Plaats</label>
    <input type="text" name="town" id="id3r" placeholder="Voer uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idp5">Provincie</label>
    <select name="province" id="idp5" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Noord-Holland</option>
  <option>Zuid-Holland</option>
  <option>Utrecht</option>
  <option>Flevoland</option>
  <option>Gelderland</option>
  <option>Overijssel</option>
  <option>Drenthe</option>
  <option>Friesland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Zeeland</option>
</select>
  </div>
  <div>
    <label for="idk7rn">Land</label>
    <select name="countryName2" id="idk7rn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
</select>
  </div>
  <div>
    <label for="idujzuf">BTW-nummer</label>
    <input type="text" name="vatId" id="idujzuf" placeholder="Vul uw BTW-nummer in" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
