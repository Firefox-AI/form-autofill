<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idajq">Imię i nazwisko</label>
    <input type="text" name="fullName" id="idajq" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idbh2dj">Ulica i numer</label>
    <input type="text" name="addressLine1" id="idbh2dj" placeholder="ul. Kwiatowa 15" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id5vuds">Kod pocztowy</label>
    <input type="text" name="zip_code" id="id5vuds" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idoam">Miasto</label>
    <input type="text" name="city" id="idoam" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idw3z">Kraj</label>
    <select name="countryName" id="idw3z" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <label for="id2wulu">Piętro</label>
    <input type="text" name="etage" id="id2wulu" placeholder="np. 2" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idiw">Numer budynku</label>
    <input type="text" name="ids3bj" id="idiw" placeholder="Budynek A" data-moz-autofill-type="building">
  </div>
</form>

</fieldset></body></html>
