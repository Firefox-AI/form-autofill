<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Имя владельца карты
    <input type="text" name="ccName" id="id3i" placeholder="ФИО владельца карты" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Улица и дом
    <input type="text" name="addr" id="id4w" placeholder="Введите адрес" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Почтовый индекс
    <input type="text" name="zip" id="iduj73" placeholder="Почтовый индекс" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Город
    <input type="text" name="town" id="idhqtz" placeholder="Введите город" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Регион
    <select name="state" id="id2n" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Москва</option>
  <option>Санкт-Петербург</option>
  <option>Калуга</option>
  <option>Тверь</option>
  <option>Новосибирск</option>
  <option>Екатеринбург</option>
  <option>Казань</option>
</select>
    </label>
  </div>
  <div>
    <label>Страна
    <select name="country" id="ide9f12" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Армения</option>
</select>
    </label>
  </div>
  <div>
    <label>Номер НДС
    <input type="text" name="vatNumber" id="id7ohw8" placeholder="Номер НДС (если есть)" data-moz-autofill-type="vat-number">
    </label>
  </div>
</form>

</fieldset></body></html>
