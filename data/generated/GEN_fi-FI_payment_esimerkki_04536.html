<html><head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nimi</span>
    <input type="text" name="cardName" id="idfr" placeholder="Tätä nimeä käytetään kortilla" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kortin numero</span>
    <input type="number" name="ccNumber5" id="idinuv" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Voimassaolo kuukausi</span>
    <select name="exp_month8" id="id4wvcc" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1 - Tammikuu</option>
  <option>2 - Helmikuu</option>
  <option>3 - Maaliskuu</option>
  <option>4 - Huhtikuu</option>
  <option>5 - Toukokuu</option>
  <option>6 - Kesäkuu</option>
  <option>7 - Heinäkuu</option>
  <option>8 - Elokuu</option>
  <option>9 - Syyskuu</option>
  <option>10 - Lokakuu</option>
  <option>11 - Marraskuu</option>
  <option>12 - Joulukuu</option>
</select>
  </div>
  <div>
    <span>Voimassaolo vuosi</span>
    <select name="expYear" id="idq1nn" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="cvv" id="idwmp" placeholder="3- tai 4-numeroinen koodi" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kortin tyyppi</span>
    <select name="ccType" id="idtdcm" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idy7" id="idr9y" type="submit">Lähetä</button>
  </div>
</form>

</fieldset></body></html>
