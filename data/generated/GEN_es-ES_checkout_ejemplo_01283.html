<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellidos</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Empresa
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa (si aplica)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso, puerta o referencia" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduce la ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" aria-label="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label>Correo Electrónico
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Finalizar Compra</button>
  </div>
</form>

</fieldset></body></html>
