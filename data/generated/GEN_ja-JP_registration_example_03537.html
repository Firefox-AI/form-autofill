<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="生年月日" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>男性</option>
  <option>女性</option>
  <option>その他</option>
</select>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="パスワード">
  </div>
</form>

</fieldset></body></html>
