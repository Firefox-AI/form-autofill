<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="fullName4" id="idwo" placeholder="Mario Rossi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="emailAddress" id="id2v" placeholder="esempio@gmail.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefono
    <input type="tel" name="tel" id="idg4" placeholder="+39 345 678 9101" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Indirizzo
    <input type="text" name="address1" id="id7ng" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Città
    <input type="text" name="city" id="idqr97v" placeholder="Milano" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="zip_code" id="idcu2" placeholder="20100" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Azienda (opzionale)
    <input type="text" name="organization1" id="id9hwa" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Paese
    <select name="countryName" id="idz8uv" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
