<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>kontakt.example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" aria-label="Imię i nazwisko" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="jan.kowalski@example.com" aria-label="Adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="123-456-789" aria-label="Numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder=" ul. Przykładowa 12/3" aria-label="Ulica i numer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" aria-label="Miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-000" aria-label="Kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="PL1234567890" aria-label="Numer VAT" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
