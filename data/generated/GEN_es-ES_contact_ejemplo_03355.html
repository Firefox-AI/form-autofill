<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Introduce tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduce tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="floor">Piso</label>
    <input type="text" name="floor" id="floor" placeholder="Número de piso (si aplica)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="bdayDay">Día de nacimiento</label>
    <select name="bdayDay" id="bdayDay" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
