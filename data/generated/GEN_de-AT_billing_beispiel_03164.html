<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Karteninhaber
    <input type="text" name="cardName" id="idxsl7" placeholder="Wie auf der Karte angegeben" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="idwbb">Straße und Hausnummer</label>
    <input type="text" name="addressLine1" id="idwbb" placeholder="Beispielstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idxjz">Postleitzahl</label>
    <input type="text" name="postalCode" id="idxjz" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idosdl">Stadt</label>
    <input type="text" name="town" id="idosdl" placeholder="Stadt eingeben" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="county" id="idrd3q0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="idxpb3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="id974bl" placeholder="ATU12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="text" name="companyName" id="idxjo6" placeholder="Name Ihres Unternehmens" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Wohnung</span>
    <input type="text" name="flat" id="idyq" placeholder="z.B. 2B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="ids81" id="idt2h7j" type="submit">Bestellen</button>
  </div>
</form>

</fieldset></body></html>
