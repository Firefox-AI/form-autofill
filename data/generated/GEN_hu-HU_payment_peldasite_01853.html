<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>peldasite.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idu2">Kártya tulajdonos neve</label>
    <input type="text" name="nameOnCard" id="idu2" placeholder="Írja be a kártya nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idhs">Kártyaszám</label>
    <input type="number" name="card_number" id="idhs" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idb4xry">Lejárati hónap</label>
    <select name="expMonth" id="idb4xry" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idpc">Lejárati év</label>
    <select name="ccExpYear" id="idpc" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idta7wt">CVC kód</label>
    <input type="number" name="csc" id="idta7wt" placeholder="Háromjegyű kód" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="iddjh59">Kártya típusa</label>
    <select name="ccType4" id="iddjh59" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
