<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idl1b">Nombre completo</label>

  </div>

    <label for="idtt8">Dirección</label>

  </div>
  <div>
    <label for="idzw">Código postal</label>

  </div>
  <div>
    <label for="idkprjl">Ciudad</label>

  <div>

  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="idf8tn5">Dirección adicional (opcional)</label>
    <input type="text" name="addressLine2" id="idf8tn5" placeholder="Apto. 5B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idqup">Detalles adicionales (opcional)</label>
    <input type="text" name="id13" id="idqup" placeholder="Código de acceso, referencias, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <button name="idmi1v" id="idwn" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
