<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Фамилия</label>
    <input type="text" name="familyName" id="familyName" placeholder="Иванов" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Имя</span>
    <input type="text" name="givenName" id="givenName" placeholder="Иван" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ленина" aria-label="Улица" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, офис" aria-label="Дополнительная информация" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Город</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Москва" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Почтовый индекс
    <input type="number" name="postalCode" id="postalCode" placeholder="123456" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Украина</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Другие</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="example@mail.ru" aria-label="Электронная почта" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+7 (900) 123-45-67" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Оформить заказ</button>
  </div>
</form>

</fieldset></body></html>
