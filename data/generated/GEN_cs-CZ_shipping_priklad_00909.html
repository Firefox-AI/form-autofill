<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno a příjmení</span>
    <input type="text" name="fullName" id="ids8q" placeholder="Např. Jan Novák" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ulice a číslo popisné</span>
    <input type="text" name="address1" id="idvj" placeholder="Např. Hlavní 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="postalCode" id="id7ow" placeholder="Např. 100 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Město</span>
    <input type="text" name="locality" id="iddvm0" placeholder="Např. Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Země</span>
    <select name="countryName" id="idwpb75" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
</select>
  </div>
  <div>
    <span>Číslo bytu</span>
    <input type="text" name="apartment" id="idi39i" placeholder="Např. 5B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Poschodí</span>
    <input type="text" name="floor" id="idzx" placeholder="Např. 2." data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Orientační bod</span>
    <input type="text" name="idws4m" id="idin9" placeholder="Např. Vedle obchodu XYZ" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Čtvrť</span>
    <input type="text" name="district" id="id6zo" placeholder="Např. Vinohrady" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="ids1" id="idga" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
