<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyfac">Nome</label>
    <input type="text" name="firstName" id="idyfac" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idfli6">Cognome</label>
    <input type="text" name="last_name" id="idfli6" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idcmj5">Indirizzo</label>
    <input type="text" name="addressLine1" id="idcmj5" placeholder="Via e numero civico" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id5y">Città</label>
    <input type="text" name="town" id="id5y" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="iday0j">CAP</label>
    <input type="text" name="zip" id="iday0j" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id02i7q">Paese</label>
    <select name="country" id="id02i7q" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="idzs6l">Indirizzo email</label>
    <input type="email" name="user_email" id="idzs6l" placeholder="esempio@dominio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idywze">Telefono</label>
    <input type="tel" name="telephone" id="idywze" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idp58du">Indirizzo (linea 2)</label>
    <input type="text" name="street2" id="idp58du" placeholder="Piano, interno, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idgoilc">Appartamento</label>
    <input type="text" name="unit" id="idgoilc" placeholder="Numero dell&#x27;appartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idu753o">Nome della via</label>
    <input type="text" name="strasse" id="idu753o" placeholder="Inserisci il nome della via" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <button name="idnk" id="idbjmm" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
