<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Februar</option>
  <option>Mars</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>

  <option>August</option>
  <option>September</option>

  <option>November</option>
  <option>Desember</option>
</select>
  </div>
  <div>
    <span>Utløpsår</span>

  <option>2024</option>
  <option>2025</option>
  <option>2026</option>

  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <span>Sikkerhetskode</span>
    <input type="number" name="r:r:7:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idov" placeholder="3- eller 4-sifret kode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Korttype</span>
    <select name="r:r:4:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id25vb" data-moz-autofill-type="cc-type">

  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
