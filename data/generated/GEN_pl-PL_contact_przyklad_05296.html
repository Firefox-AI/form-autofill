<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Imię i nazwisko</label>
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="adres@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="+48 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Ulica</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ul. Główna 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="organization">Nazwa firmy</label>
    <input type="text" name="organization" id="organization" placeholder="Firma XYZ" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
