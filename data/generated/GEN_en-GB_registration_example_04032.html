<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name *</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name *</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="addressLookup">Address (optional)</label>
    <input type="text" name="addressLookup" id="addressLookup" placeholder="Enter your address" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="stair">Stair (optional)</label>
    <input type="text" name="stair" id="stair" data-moz-autofill-type="stair">
  </div>
  <div>
    <label for="postalCode">Postcode *</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="e.g. SW1A 1AA" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City/Town *</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="country">Country *</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <label for="email">Email Address *</label>
    <input type="email" name="email" id="email" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Phone Number *</label>
    <input type="tel" name="tel" id="tel" placeholder="e.g. 01234 567890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
