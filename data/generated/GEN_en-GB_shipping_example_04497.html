<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Delivery Email Address
    <input type="email" name="user_email" id="idcc" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Confirm Email Address
    <input type="email" name="emailAddress" id="idxccm" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Full Name
    <input type="text" name="contactName" id="idl0zid" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>University/College Name
    <input type="text" name="organization" id="id7u" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="streetAddress" id="idc35c" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>City/Town
    <input type="text" name="locality" id="idwzt" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postcode" id="idtb" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Telephone Code
    <input type="tel" name="phoneCountryCode" id="id366" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Telephone Number
    <input type="tel" name="id42d" id="id4k8y" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <label>Login Note
    <input type="text" name="fullName" id="idhls" placeholder="You must log in to register for a bike with the given email." data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Residential Address
    <input type="text" name="streetAddress" id="id8xq7p" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>City/Town
    <input type="text" name="town" id="idqh3q" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postcode" id="idnzzj" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Telephone Code
    <input type="tel" name="countryCode" id="idk2lew" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Telephone Number
    <input type="tel" name="idwke77" id="id16" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <label>VAT Number (if applicable)
    <input type="text" name="vat" id="idqoq" data-moz-autofill-type="vat-number">
    </label>
  </div>
  <div>
    <label>Additional Note
    <input type="text" name="yourName" id="idfjed" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Student Status Confirmation
    <input type="text" name="contactName" id="idut" placeholder="Please confirm if you have a valid ISIC card." data-moz-autofill-type="name">
    </label>
  </div>
</form>

</fieldset></body></html>
