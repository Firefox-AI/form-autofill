<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="idal" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Sobrenome</span>
    <input type="text" name="billing_last_name" id="idsie" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="street1" id="idyr" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Complemento</span>
    <input type="text" name="address2" id="idchf" placeholder="Apartamento, andar, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Apartamento</span>
    <input type="text" name="unit" id="idlvtq" placeholder="Número do apartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="locality" id="id2w" placeholder="Digite a cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código Postal</span>
    <input type="text" name="zip_code" id="idhx3" placeholder="Digite o código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="id5mj9e" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email_address" id="iddm37" placeholder="Digite seu email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefone</span>
    <input type="tel" name="telephone" id="idaln" placeholder="Inclua o código de área" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
