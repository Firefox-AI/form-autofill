<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Tratamento</span>
    <select name="r:r:8:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idli" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
  </div>
  <div>
    <span>Nome próprio</span>
    <input type="text" name="r:r:5:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="ide3b" placeholder="Introduza o seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apelido</span>
    <input type="text" name="r:r:7:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idgoch" placeholder="Introduza o seu apelido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="r:r:2:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idlvtq" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Complemento do endereço</span>
    <input type="text" name="r:r:2:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id9ohx" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Concelho</span>
    <input type="text" name="r:r:8:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id5mj9e" placeholder="Concelho onde reside" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="r:r:6:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idm3" placeholder="Ex: 1234-567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="r:r:9:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idaln" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="r:r:5:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="id8llg0" placeholder="Introduza o seu email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefone</span>
    <input type="tel" name="r:r:4:m:r:10:cr:3:c:pr:1:container:fs:i:input" id="idijz" placeholder="Ex: 912345678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
