<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-billing.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="ccName" id="ccName" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Appartamento, piano o altro</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt 5B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Codice postale</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bologna</option>
  <option>Firenze</option>
  <option>Bari</option>
  <option>Verona</option>
</select>
  </div>
  <div>
    <span>Regione</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lazio</option>
  <option>Lombardia</option>
  <option>Campania</option>
  <option>Piemonte</option>
  <option>Sicilia</option>
  <option>Liguria</option>
  <option>Emilia-Romagna</option>
  <option>Toscana</option>
  <option>Puglia</option>
  <option>Veneto</option>
</select>
  </div>
  <div>
    <span>Paese</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Giappone</option>
  <option>Cina</option>
  <option>Australia</option>
</select>
  </div>
</form>

</fieldset></body></html>
