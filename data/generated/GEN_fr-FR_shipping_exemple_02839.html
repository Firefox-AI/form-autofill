<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Jean Dupont" aria-label="Nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="12" aria-label="Numéro de la maison" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="street">Rue</label>
    <input type="text" name="street" id="street" placeholder="Rue de la République" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
  <div>
    <label for="apartment">Numéro d&#x27;appartement</label>
    <input type="text" name="apartment" id="apartment" placeholder="A1" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="FR123456789" aria-label="Numéro de TVA intracommunautaire (facultatif)" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
