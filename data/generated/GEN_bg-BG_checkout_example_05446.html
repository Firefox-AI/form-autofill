<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Заглавие</span>
    <select name="prefix" id="idhwf9m" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>г-н</option>
  <option>г-жа</option>
  <option>г-ца</option>
</select>
  </div>
  <div>
    <span>Име</span>
    <input type="text" name="first_name" id="idreu5z" placeholder="Вашето име" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Фамилия</span>
    <input type="text" name="lname" id="id21ae4" placeholder="Вашата фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Адрес</span>
    <input type="text" name="streetAddress" id="idlvy" placeholder="Улица и номер" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Град</span>
    <input type="text" name="locality" id="idxsw" placeholder="Град или село" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Област</span>
    <select name="province" id="idy0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>София</option>
  <option>Пловдив</option>
  <option>Варна</option>
  <option>Бургас</option>
  <option>Стара Загора</option>
  <option>Русе</option>
  <option>Добрич</option>
  <option>Шумен</option>
  <option>Перник</option>
  <option>Сливен</option>
  <option>Ямбол</option>
  <option>Хасково</option>
</select>
  </div>
  <div>
    <span>Пощенски код</span>
    <input type="text" name="zip_code" id="id01hf5" placeholder="Пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Държава</span>
    <select name="country" id="idr24" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Гърция</option>
  <option>Румъния</option>
  <option>Сърбия</option>
  <option>Македония</option>
  <option>Турция</option>
</select>
  </div>
  <div>
    <span>Имейл адрес</span>
    <input type="email" name="mail" id="id68" placeholder="Вашият имейл" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Телефонен номер</span>
    <input type="tel" name="mobile" id="id7bkyk" placeholder="Вашият телефон" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
