<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>livrari-exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nume complet</label>
    <input type="text" name="name" id="name" placeholder="Introdu numele tău aici" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Stradă</label>
    <input type="text" name="street" id="street" placeholder="Introduceți numele străzii" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Număr</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numărul clădirii" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Etaj/Suite</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Etaj/Suite (opțional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduceți orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Țară</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>SUA</option>
  <option>Marea Britanie</option>
</select>
  </div>
  <div>
    <label for="referencePoint">Punct de reper</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Ex: lângă supermarket" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
