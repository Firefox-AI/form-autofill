<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivniobchod.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Titul
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pan</option>
  <option>Paní</option>
  <option>Doktor</option>
  <option>Profesor</option>
</select>
    </label>
  </div>
  <div>
    <label>Jméno
    <input type="text" name="givenName" id="givenName" placeholder="Zadejte své jméno" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Příjmení
    <input type="text" name="familyName" id="familyName" placeholder="Zadejte své příjmení" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Firma
    <input type="text" name="organization" id="organization" placeholder="Název vaší firmy (pokud je to relevantní)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Ulice a číslo popisné
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulice, č.p. nebo č.e." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Město
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Zadejte město" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Kraj
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
    </label>
  </div>
  <div>
    <label>PSČ
    <input type="text" name="postalCode" id="postalCode" placeholder="Zadejte PSČ" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Země
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
  <option>Francie</option>
  <option>Itálie</option>
  <option>Spanyol</option>
  <option>Velká Británie</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mailová adresa
    <input type="email" name="email" id="email" placeholder="Zadejte svůj e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonní číslo
    <input type="tel" name="tel" id="tel" placeholder="Zadejte telefonní číslo" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
