<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccNumber">Kartennummer</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Kartennummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Ablaufdatum</span>
    <input type="tel" name="ccExp" id="ccExp" data-moz-autofill-type="cc-exp">
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Sicherheitscode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname</label>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Land
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Frankreich</option>
  <option>Niederlande</option>
  <option>Luxemburg</option>
  <option>Dänemark</option>
  <option>Schweden</option>
  <option>Norwegen</option>
  <option>Finnland</option>
  <option>Italien</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
  <option>Irland</option>
  <option>Polen</option>
  <option>Tschechische Republik</option>
  <option>Ungarn</option>
  <option>Rumänien</option>
  <option>Portugal</option>
  <option>Slowakei</option>
  <option>Kroatien</option>
  <option>Slowenien</option>
  <option>Estland</option>
  <option>Lettland</option>
  <option>Litauen</option>
  <option>Bulgarien</option>
  <option>Zypern</option>
  <option>Malta</option>
  <option>Griechenland</option>
  <option>Island</option>
  <option>Albanien</option>
  <option>Serbien</option>
  <option>Bosnien und Herzegowina</option>
  <option>Nordmazedonien</option>
  <option>Kosovo</option>
  <option>Montenegro</option>
  <option>Ukraine</option>
  <option>Russland</option>
  <option>Weißrussland</option>
  <option>Moldawien</option>
  <option>Georgien</option>
  <option>Armenien</option>
  <option>Aserbaidschan</option>
  <option>Kasachstan</option>
  <option>Usbekistan</option>
  <option>Kirgisistan</option>
  <option>Tadschikistan</option>
  <option>Turkmenistan</option>
  <option>Afrika</option>
  <option>Asien</option>
  <option>Nordamerika</option>
  <option>Südamerika</option>
  <option>Ozeanien</option>
</select>
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Adresse 2 (optional)
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Bundesland</label>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
