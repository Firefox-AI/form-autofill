<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ids9zm">Kartennummer</label>
    <input type="number" name="cardNumber" id="ids9zm" placeholder="Kartennummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="text" name="expiry" id="id9ifh" placeholder="Ablaufdatum" data-moz-autofill-type="cc-exp">
  </div>
  <div>
    <label for="idv8ij">Sicherheitscode</label>
    <input type="number" name="csc" id="idv8ij" placeholder="Sicherheitscode" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="first_name" id="idwbxow" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Nachname
    <input type="text" name="lastName" id="id9s3co" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <span>Land</span>
    <select name="country_id" id="id5rze" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Frankreich</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Italien</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
  <option>USA</option>
  <option>Kanada</option>
  <option>Australien</option>
  <option>Neuseeland</option>
</select>
  </div>
  <div>
    <label for="idm9">Adresse</label>
    <input type="text" name="address1" id="idm9" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addr2" id="idg38r" aria-label="Zusätzliche Adresse (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Stadt
    <input type="text" name="city" id="idgjk" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <span>Bundesland/Provinz/Region</span>
    <input type="text" name="county" id="idag" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="zipCode" id="idz5" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="phoneNumber" id="idul" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
