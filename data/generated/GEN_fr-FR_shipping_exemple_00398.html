<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Votre numéro" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Nom de la rue" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bâtiment, appartement, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Votre étage (si applicable)" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Un point de repère à proximité (facultatif)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Votre région" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
