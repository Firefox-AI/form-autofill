<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Naam
    <input type="text" name="name" id="idbly" placeholder="Voer uw naam in" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>E-mailadres
    <input type="email" name="mail" id="id028" placeholder="jij@voorbeeld.nl" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefoonnummer
    <input type="tel" name="mobile" id="idca" placeholder="06-12345678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Adres
    <input type="text" name="address" id="idgx4g" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Woonplaats
    <input type="text" name="city" id="idlv4" placeholder="Stad of dorp" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="zip_code" id="id05" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Referentiepunt (optioneel)
    <input type="text" name="id0j" id="idsue9" placeholder="Bijv. nabij een herkenningspunt" data-moz-autofill-type="reference-point">
    </label>
  </div>
</form>

</fieldset></body></html>
