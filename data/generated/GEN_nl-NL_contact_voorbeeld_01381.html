<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Naam
    <input type="text" name="name" id="name" placeholder="Voer uw naam in" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>E-mailadres
    <input type="email" name="email" id="email" placeholder="jij@voorbeeld.nl" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefoonnummer
    <input type="tel" name="tel" id="tel" placeholder="06-12345678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Straatnaam en huisnummer
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Bijv. Hoofdstraat 1" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Stad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Voer uw stad in" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Referentiepunt
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Bijv. Dichtbij het station" data-moz-autofill-type="reference-point">
    </label>
  </div>
</form>

</fieldset></body></html>
