<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="you@example.com" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your Zip Code" aria-label="Zip Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="country" id="country" aria-label="Country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="John" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Doe" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressLookup" id="addressLookup" placeholder="Search for your address" aria-label="Address Lookup" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Main St" aria-label="Street Address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" aria-label="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your Zip Code" aria-label="Zip Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="+1" aria-label="Phone Country Code" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(555) 555-5555" aria-label="Phone Number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
