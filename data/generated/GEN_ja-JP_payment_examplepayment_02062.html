<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="id0kkhw" placeholder="例: 山田 太郎" aria-label="カード名義人" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="card_number" id="idlo7jk" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idpc0fw">有効期限（月）</label>
    <select name="ccExpMonth" id="idpc0fw" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id28mf">有効期限（年）</label>
    <select name="exp_year" id="id28mf" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idmust">セキュリティコード</label>
    <input type="number" name="cvv" id="idmust" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードの種類</span>
    <select name="ccType" id="idttbw" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="id1j4n8">住所</label>
    <input type="text" name="addr" id="id1j4n8" placeholder="例: 1-2-3 新宿" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idzz" id="idbytg" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
