<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shop.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Фамилия</span>
    <input type="text" name="r:r:7:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="iduia" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Имя</span>
    <input type="text" name="r:r:2:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="id94" placeholder="Введите ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Название компании</span>
    <input type="text" name="r:r:7:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idmgtk" placeholder="Введите название компании (если есть)" data-moz-autofill-type="organization">

  <div>
    <span>Улица, дом</span>
    <input type="text" name="r:r:2:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idku" placeholder="Введите адрес (улица и номер дома)" data-moz-autofill-type="street-address">

  <div>
    <span>Город</span>
    <input type="text" name="r:r:9:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idpw" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Почтовый индекс</span>
    <input type="text" name="r:r:5:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idt0p5q" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Страна</span>
    <select name="r:r:8:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idniu" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Армения</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
</select>
  </div>
  <div>
    <span>Электронная почта</span>
    <input type="email" name="r:r:8:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idmh" placeholder="Введите ваш email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Телефон</span>
    <input type="tel" name="r:r:9:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idl3" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
  </div>
