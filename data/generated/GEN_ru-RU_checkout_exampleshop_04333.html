<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shop.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Фамилия</span>
    <input type="text" name="surname" id="id6lu" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Имя</span>
    <input type="text" name="fname" id="id8c" placeholder="Введите ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Название компании (если есть)</span>
    <input type="text" name="business" id="idmgtk" placeholder="Введите название вашей компании" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Улица, дом</span>
    <input type="text" name="address" id="idku" placeholder="Введите адрес (улица, дом)" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Город</span>
    <input type="text" name="locality" id="idbp" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Почтовый индекс</span>
    <input type="text" name="postalCode7" id="id0p5q" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Страна</span>
    <select name="countryName3" id="idiu4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Армения</option>
  <option>Грузия</option>
  <option>Узбекистан</option>
</select>
  </div>
  <div>
    <span>Электронная почта</span>
    <input type="email" name="email_address" id="idh8z" placeholder="Введите ваш email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Телефон</span>
    <input type="tel" name="tel8" id="id2wdn" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
