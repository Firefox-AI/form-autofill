<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>odemeornek.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id3sw3v">Kart Üzerindeki İsim</label>
    <input type="text" name="nameOnCard" id="id3sw3v" placeholder="Adınız ve Soyadınız" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Kredi Kartı Numarası
    <input type="number" name="card_number" id="idq4" placeholder="Kart numaranızı girin" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <select name="ccExpMonth" id="id19" aria-label="Son Kullanma Ayı" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="iddfsjb" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idzn">Güvenlik Kodu</label>
    <input type="number" name="cvc" id="idzn" placeholder="Arka taraftaki 3 haneli kod" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idmw" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
