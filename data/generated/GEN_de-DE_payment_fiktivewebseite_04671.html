<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktive-webseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vollständiger Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Postleitzahl
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="addressLevel1">Bundesland - Landkreis</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Sachsen</option>
  <option>Rheinland-Pfalz</option>
  <option>Niedersachsen</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Sachsen-Anhalt</option>
  <option>Thüringen</option>
  <option>Schleswig-Holstein</option>
  <option>Hamburg</option>
  <option>Bremen</option>
</select>
  </div>
  <div>
    <label for="addressLevel3">Stadtteil</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Stadtteil" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Straßenname</span>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="number" name="addressHousenumber" id="addressHousenumber" aria-label="Hausnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label>Referenzpunkte (z.B. zwischen Straßen)
    <input type="text" name="referencePoint" id="referencePoint" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Straße</span>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">Außenhausnummer</label>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Außenhausnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="number" name="apartment" id="apartment" placeholder="Wohnungsnummer" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="referencePoint">Referenzpunkt</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Referenzpunkt" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Empfänger" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadtteil</span>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <span>Bundesland oder Stadt</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Sachsen</option>
  <option>Rheinland-Pfalz</option>
  <option>Niedersachsen</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Sachsen-Anhalt</option>
  <option>Thüringen</option>
  <option>Schleswig-Holstein</option>
  <option>Hamburg</option>
  <option>Bremen</option>
</select>
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" aria-label="Bundesland oder Stadt" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Straße" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="apartment">Außen-Nr.</label>
    <input type="number" name="apartment" id="apartment" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Innen-Nr. (Optional)</span>
    <input type="number" name="referencePoint" id="referencePoint" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Referenzen (z.B. Farbe des Hauses, zwischen welchen Straßen, Tor...)</span>
    <input type="text" name="idNumber" id="idNumber" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="givenName">Referenzen (z.B. Farbe des Hauses, zwischen welchen Straßen, Tor...)</label>
    <input type="text" name="givenName" id="givenName" placeholder="Referenzen (z.B. Farbe des Hauses, zwischen welchen Straßen, Tor...)" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="additionalName">Erster Vorname</label>
    <input type="text" name="additionalName" id="additionalName" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label>Zweiter Vorname
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label for="tel">Zweiter Nachname</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Handynummer</span>
    <input type="tel" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Postleitzahl *</span>
    <input type="number" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Straße *</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="apartment">Außen-Nr. *</label>
    <input type="number" name="apartment" id="apartment" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="referencePoint">Innen-Nr. (Optional)</label>
    <input type="number" name="referencePoint" id="referencePoint" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="name">Versandreferenz* (z.B. Turm B, blaues Gebäude, zwischen Straßen...) *</label>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
</form>

</fieldset></body></html>
