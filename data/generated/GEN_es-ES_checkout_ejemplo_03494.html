<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.tienda</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre</span>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apellidos</span>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Empresa (opcional)</span>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="tel" placeholder="Teléfono de contacto" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
