<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielversand.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idc45zh">Name</label>
    <input type="text" name="contactName" id="idc45zh" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id983b">Straße und Hausnummer</label>
    <input type="text" name="address1" id="id983b" placeholder="Z.B. Musterstraße 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id3pb">Postleitzahl</label>
    <input type="text" name="zip_code" id="id3pb" placeholder="Z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idqw">Stadt</label>
    <input type="text" name="locality" id="idqw" placeholder="Z.B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id1qzd5">Land</label>
    <select name="countryName" id="id1qzd5" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigte Staaten</option>
</select>
  </div>
  <div>
    <label for="ida2">Wohnung</label>
    <input type="text" name="apartment" id="ida2" placeholder="Z.B. Top 5" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="iddt0">Bezirk</label>
    <input type="text" name="district" id="iddt0" placeholder="Z.B. Innere Stadt" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
