<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betaling.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn på kortet</span>
    <input type="text" name="nameOnCard" id="idbd" placeholder="Indtast navnet som det fremgår af kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kortnummer</span>
    <input type="number" name="card_number" id="idzq" placeholder="Indtast dit kortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Udløbs måned</span>
    <select name="ccExpMonth" id="idiy" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <span>Udløbs år</span>
    <select name="expYear" id="ida1q" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Sikkerhedskode</span>
    <input type="number" name="securityCode" id="idsx6v" placeholder="Indtast de tre eller fire cifre" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Korttype</span>
    <select name="cardType" id="id1kt" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idoo2p" id="id7r" type="submit">Betal</button>
  </div>
</form>

</fieldset></body></html>
