<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.shop</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id4jd6">Nome sulla carta</label>
    <input type="text" name="cardName" id="id4jd6" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id6ozhv">Numero della carta</label>
    <input type="number" name="card_number" id="id6ozhv" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="iduh">Mese di scadenza</label>
    <select name="ccExpMonth" id="iduh" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="id5r">Anno di scadenza</label>
    <select name="ccExpYear3" id="id5r" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id25e">Codice di sicurezza</label>
    <input type="number" name="cvv" id="id25e" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idxwdk">Tipo di carta</label>
    <select name="ccType1" id="idxwdk" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
