<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlungsportal.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name auf der Kreditkarte</span>
    <input type="text" name="cardName" id="id6e3bc" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="address1" id="idwj505" placeholder="Musterstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="zip" id="idyi" placeholder="1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="city" id="idjcu1" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Kärnten</option>
  <option>Burgenland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="province" id="iddw" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechische Republik</option>
  <option>Slowenien</option>
  <option>Liechtenstein</option>
</select>
  </div>
  <div>
    <span>Zusatzadresse (optional)</span>
    <input type="text" name="address2" id="iddl3" placeholder="z.B. C/O oder Wohnungsnummer" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
