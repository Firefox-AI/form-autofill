<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>billingexample.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Введіть ім&#x27;я, як на картці" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введіть вулицю та номер" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Наприклад, квартира або офіс" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Київ</option>
  <option>Львів</option>
  <option>Одеса</option>
  <option>Дніпро</option>
  <option>Харків</option>
</select>
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київська</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Дніпропетровська</option>
  <option>Харківська</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Угорщина</option>
  <option>Румунія</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Введіть місто" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <input type="text" name="block" id="block" placeholder="Введіть корпус (якщо є)" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
