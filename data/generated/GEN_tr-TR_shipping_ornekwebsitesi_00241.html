<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Adınız ve Soyadınız
    <input type="text" name="name" id="name" placeholder="Ad ve soyadınızı girin" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Cadde / Sokak
    <input type="text" name="street" id="street" placeholder="Cadde veya sokak adını yazın" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Bina Numarası
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Bina numarasını yazın" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Apt / Daire
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Varsa kat veya daire numarası" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Posta Kodu
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunu yazın" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Şehir
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Şehir adını girin" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Ülke
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İngiltere</option>
  <option>Amerika Birleşik Devletleri</option>
</select>
    </label>
  </div>
  <div>
    <label>Kat
    <input type="text" name="floor" id="floor" placeholder="Kaçıncı katta?" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <label>Bina Adı
    <input type="text" name="building" id="building" placeholder="Eğer varsa bina adını yazın" data-moz-autofill-type="building">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Gönder</button>
  </div>
</form>

</fieldset></body></html>
