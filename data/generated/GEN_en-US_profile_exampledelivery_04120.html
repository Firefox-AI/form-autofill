<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-delivery.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Please enter your delivery address:</span>
    <input type="text" name="address" id="idylrg" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Floor Number</span>
    <input type="text" name="floor6" id="id6jhn" data-moz-autofill-type="floor">
  </div>
  <div>
    <label>Floor Level
    <input type="text" name="floor" id="ide8" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <input type="text" name="unit" id="idygh" placeholder="e.g., The Bell" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="suite" id="idgf2" placeholder="e.g., 101" aria-label="Apartment Number" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="street" id="idzx" aria-label="Please enter your full delivery address:" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Please enter your complete delivery address:
    <input type="text" name="addr" id="id9vzdj" data-moz-autofill-type="street-address">
    </label>
  </div>
</form>

</fieldset></body></html>
