<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn</span>
    <input type="text" name="name" id="name" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Vejnavn</span>
    <input type="text" name="street" id="street" placeholder="Indtast vejnavn" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Husnummer</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Indtast husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Evt. adresselinje 2</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="F.eks. c/o navn" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Lejlighed</span>
    <input type="text" name="apartment" id="apartment" placeholder="Indtast lejlighedsnummer (hvis relevant)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Fonetik navn</span>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Indtast navn i fonetisk form (valgfrit)" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Send</button>
  </div>
</form>

</fieldset></body></html>
