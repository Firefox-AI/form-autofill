<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>odemeornek.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kart üzerindeki isim</span>
    <input type="text" name="ccName" id="id7rk" placeholder="İsim ve soyisim" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kredi kartı numarası</span>
    <input type="number" name="ccNumber1" id="idmqhd" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Son kullanma tarihi (Ay)</span>
    <select name="ccExpMonth" id="idbrmz" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <span>Son kullanma tarihi (Yıl)</span>
    <select name="exp_year" id="idnv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Güvenlik kodu (CVC)</span>
    <input type="number" name="securityCode" id="idv2s" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kart türü</span>
    <select name="cardType" id="ida9" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Kat</span>
    <input type="number" name="etage" id="ida4gde" placeholder="Eğer varsa, kat numarasını giriniz" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Telefon numarası uzantısı</span>
    <input type="tel" name="idaomyu" id="idw0ap4" placeholder="Varsa, uzantıyı giriniz" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <button name="id5zt" id="idffcv" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
