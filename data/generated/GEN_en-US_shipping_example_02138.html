<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="postalCodeAndCity">Search for City, Neighborhood, Zip Code, County, or School</label>
    <input type="text" name="postalCodeAndCity" id="postalCodeAndCity" placeholder="Search for City, Neighborhood, Zip Code, County, or School" data-moz-autofill-type="postal-code-and-city">
  </div>
  <div>
    <input type="text" name="postalCodeAndCity" id="postalCodeAndCity" aria-label="Search for City, Neighborhood, Zip Code, County, or School" data-moz-autofill-type="postal-code-and-city">
  </div>
  <div>
    <label for="email">Email Address</label>

  </div>
</form>

</fieldset></body></html>
