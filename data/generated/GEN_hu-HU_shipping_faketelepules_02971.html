<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>faketelepules.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Név
    <input type="text" name="name" id="name" placeholder="Kérem a teljes nevet" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Utca
    <input type="text" name="street" id="street" placeholder="Kérem az utcanevet" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Házszám
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Kérem a házszámot" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Kiegészítő cím
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lepje meg a lakást vagy egyéb info" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Irányítószám
    <input type="text" name="postalCode" id="postalCode" placeholder="Kérem az irányítószámot" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Megye
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Budapest</option>
  <option>Pest megye</option>
  <option>Fejér megye</option>
  <option>Komárom-Esztergom megye</option>
  <option>Veszprém megye</option>
  <option>Zala megye</option>
  <option>Somogy megye</option>
  <option>Tolna megye</option>
  <option>Baranya megye</option>
  <option>Bács-Kiskun megye</option>
  <option>Csongrád-Csanád megye</option>
  <option>Hajdú-Bihar megye</option>
  <option>Szabolcs-Szatmár-Bereg megye</option>
  <option>Heves megye</option>
  <option>Borsod-Abaúj-Zemplén megye</option>
  <option>Nógrád megye</option>
  <option>Győr-Moson-Sopron megye</option>
  <option>Vas megye</option>
  <option>Jakabfalva</option>
</select>
    </label>
  </div>
  <div>
    <label>Ország
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szerbia</option>
  <option>Ukrajna</option>
  <option>Szlovénia</option>
</select>
    </label>
  </div>
  <div>
    <label>Lakcím azonosító
    <input type="text" name="apartment" id="apartment" placeholder="Lakás száma vagy azonosító" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
