<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="name" id="name" placeholder="Escriu el teu nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correu electrònic</span>
    <input type="email" name="email" id="email" placeholder="Escriu el teu correu electrònic" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telèfon</span>
    <input type="tel" name="tel" id="tel" placeholder="Escriu el teu número de telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adreça</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Carrer i número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciutat</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Escriu la teva ciutat" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Escriu el teu codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
