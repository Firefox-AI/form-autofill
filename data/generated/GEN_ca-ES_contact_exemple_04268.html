<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="contactName" id="idfbb9w" placeholder="Escriu el teu nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Correu electrònic</span>
    <input type="email" name="emailAddress" id="iddg0" placeholder="Escriu el teu correu electrònic" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telèfon</span>
    <input type="tel" name="phone" id="idtu" placeholder="Escriu el teu número de telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adreça</span>
    <input type="text" name="streetAddress" id="id78uso" placeholder="Carrer i número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciutat</span>
    <input type="text" name="town" id="id9hq" placeholder="Escriu la teva ciutat" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Codi postal</span>
    <input type="text" name="zipCode" id="id62n" placeholder="Escriu el teu codi postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="id64" id="id2d1ci" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
