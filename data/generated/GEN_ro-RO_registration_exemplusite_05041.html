<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplusite.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prenume</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceți prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nume de familie</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceți numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Introduceți adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data nașterii</label>
    <input type="text" name="bday" id="bday" placeholder="Selectați data nașterii" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="sex">Sex</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Masculin</option>
  <option>Feminin</option>
  <option>Altul</option>
</select>
  </div>
  <div>
    <label for="nickname">Pseudonim</label>
    <input type="text" name="nickname" id="nickname" placeholder="Introduceți pseudonimul" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="field">Parolă</label>
    <input type="password" name="field" id="field" placeholder="Creați o parolă">
  </div>
</form>

</fieldset></body></html>
