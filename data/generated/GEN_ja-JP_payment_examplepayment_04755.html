<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="cc_name_8614">カード名義人名</label>
    <input type="text" name="cc_name_4576" id="cc_name_8614" placeholder="名義人名を入力" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="cc_number_7935">カード番号</label>
    <input type="number" name="cc_number_8744" id="cc_number_7935" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="cc_exp_month_2984">有効期限（月）</label>
    <select name="cc_exp_month_3048" id="cc_exp_month_2984" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="cc_exp_year_7279">有効期限（年）</label>
    <select name="cc_exp_year_7675" id="cc_exp_year_7279" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
</select>
  </div>
  <div>
    <label for="cc_csc_3631">セキュリティコード</label>
    <input type="number" name="cc_csc_6469" id="cc_csc_3631" placeholder="カード裏面の3桁" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="cc_type_7309">カードの種類</label>
    <select name="cc_type_8406" id="cc_type_7309" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
</form>

</fieldset></body></html>
