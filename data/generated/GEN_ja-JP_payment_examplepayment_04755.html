<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idll32y">カード名義人名</label>
    <input type="text" name="nameOnCard" id="idll32y" placeholder="例：山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id50r">カード番号</label>
    <input type="number" name="ccNumber" id="id50r" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idx9uy4">有効期限（月）</label>
    <select name="ccExpMonth" id="idx9uy4" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="id20b">有効期限（年）</label>
    <select name="ccExpYear" id="id20b" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
</select>
  </div>
  <div>
    <label for="iddq0">セキュリティコード（CVC）</label>
    <input type="number" name="securityCode" id="iddq0" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idbb">カードタイプ</label>
    <select name="cardType" id="idbb" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
</form>

</fieldset></body></html>
