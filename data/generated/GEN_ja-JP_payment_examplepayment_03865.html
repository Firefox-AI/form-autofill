<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="idh2h" placeholder="山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNumber" id="idoan" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="idud7x" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="idpp" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
</select>
  </div>
  <div>
    <input type="number" name="csc" id="idpdm" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idfl4ri" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <input type="text" name="zipCode" id="idx9a" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idchlxp" id="id4a" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
