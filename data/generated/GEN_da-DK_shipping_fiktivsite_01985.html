<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktiv-site.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Indtast dit navn" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Indtast vejnavn" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Indtast husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lejlighedsnummer eller etage (valgfrit)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast bynavn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Island</option>
  <option>Færøerne</option>
</select>
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Indtast etagenummer (valgfrit)" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="Indtast områdekode" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
