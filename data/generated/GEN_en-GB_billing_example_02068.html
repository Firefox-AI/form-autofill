<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Australia</option>
  <option>Canada</option>
  <option>United States</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City/Town</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" aria-label="Street Name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">House Number</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="House Number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressExtra">(Optional)</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Flat, Floor, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>E-mail Address</span>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label>(Optional)
    <input type="tel" name="tel" id="tel" placeholder="Phone Number" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
