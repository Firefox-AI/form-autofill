<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>contacte-exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nume</span>
    <input type="text" name="name" id="name" placeholder="Introduceti numele dumneavoastră" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="exemplu@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Număr de telefon</span>
    <input type="tel" name="tel" id="tel" placeholder="0722 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adresă</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Oraș</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Orașul dumneavoastră" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
