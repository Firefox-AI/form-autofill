<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>contacteexemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nume complet</span>
    <input type="text" name="contactName" id="idyw" placeholder="Introduceți numele dumneavoastră" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="user_email" id="idbt" placeholder="exemplu@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Număr de telefon</span>
    <input type="tel" name="phone" id="id03q" placeholder="0722 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adresă</span>
    <input type="text" name="street" id="idt7l2" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Oraș</span>
    <input type="text" name="town" id="id7b11a" placeholder="Orașul dumneavoastră" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="zip" id="idfiq" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idc5e" id="idss6" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
