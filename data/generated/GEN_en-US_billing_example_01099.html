<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="organization">Company Name *</label>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="givenName">First Name *</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name *</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email Address *</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="email">Confirm Email *</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Country Code *</label>
    <input type="text" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="telNational">Phone Number *</label>
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="addressLine1">Address *</label>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Additional Address Details</label>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Zip Code *</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City *</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">State *</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
  <option>Pennsylvania</option>
  <option>Ohio</option>
  <option>Georgia</option>
  <option>North Carolina</option>
  <option>Michigan</option>
</select>
  </div>
  <div>
    <label for="country">Country *</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Mexico</option>
  <option>Japan</option>
</select>
  </div>
  <div>
    <label for="country">Country *</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Mexico</option>
  <option>Japan</option>
</select>
  </div>
  <div>
    <label for="email">Join the Oysho Community</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
