<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.shop</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyre22">敬称</label>
    <select name="salutation" id="idyre22" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>選択してください</option>
  <option>Mr.</option>
  <option>Ms.</option>
  <option>Mrs.</option>
  <option>Dr.</option>
</select>
  </div>
  <div>
    <label for="idesxi">名</label>
    <input type="text" name="firstName" id="idesxi" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idabj">姓</label>
    <input type="text" name="surname" id="idabj" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idpdbpn">住所</label>
    <input type="text" name="addr" id="idpdbpn" placeholder="例：1-1-1 渋谷区" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idrdkjp">市区町村</label>
    <input type="text" name="city" id="idrdkjp" placeholder="例：渋谷区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idgshg">郵便番号</label>
    <input type="text" name="zip" id="idgshg" placeholder="例：150-0002" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7h">国</label>
    <select name="countryName" id="id7h" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="idm85f">メールアドレス</label>
    <input type="email" name="emailAddress" id="idm85f" placeholder="例：example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idva4u">電話番号</label>
    <input type="tel" name="phoneNumber" id="idva4u" placeholder="例：0312345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idty3za" id="iddzw" type="submit">確認</button>
  </div>
</form>

</fieldset></body></html>
