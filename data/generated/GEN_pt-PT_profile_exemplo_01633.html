<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Insira o seu nome próprio" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Insira o seu apelido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Insira o seu segundo nome (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Insira o seu apelido (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Insira o seu email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Insira o seu número de telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Insira o nome da sua organização (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Selecione a sua data de nascimento" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Palavra-passe">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
