<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivwebshop.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kártyabirtokos neve</span>
    <input type="text" name="cardholderName" id="idag8w" placeholder="Írd be a kártyabirtokos nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Kártya szám</span>
    <input type="number" name="cardNumber" id="idmzk" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Lejárati hónap</span>
    <select name="ccExpMonth4" id="id0waw" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1 - Január</option>
  <option>2 - Február</option>
  <option>3 - Március</option>
  <option>4 - Április</option>
  <option>5 - Május</option>
  <option>6 - Június</option>
  <option>7 - Július</option>
  <option>8 - Augusztus</option>
  <option>9 - Szeptember</option>
  <option>10 - Október</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <span>Lejárati év</span>
    <select name="ccExpYear" id="iddd6" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>CVV kód</span>
    <input type="number" name="securityCode6" id="idkrj" placeholder="Három számjegy a kártya hátoldalán" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kártya típusa</span>
    <select name="cardType" id="id9tp" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
</form>

</fieldset></body></html>
