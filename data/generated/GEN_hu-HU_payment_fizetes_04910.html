<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fizetes.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7tmv">Kártyatulajdonos neve</label>
    <input type="text" name="nameOnCard" id="id7tmv" placeholder="Írd be a kártya nevét" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idvp2i">Kártyaszám</label>
    <input type="number" name="cardNumber" id="idvp2i" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idcg">Lejárati hónap</label>
    <select name="exp_month" id="idcg" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idt7wm">Lejárati év</label>
    <select name="ccExpYear" id="idt7wm" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <label for="idd7">CVV/CVC kód</label>
    <input type="number" name="securityCode" id="idd7" placeholder="A kártya hátoldalán található" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idk5wb">Kártyatípus</label>
    <select name="cardType" id="idk5wb" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
</form>

</fieldset></body></html>
