<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" aria-label="Geben Sie den Namen des Empfängers ein" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="888 1234 5678" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Geben Sie Ihre E-Mail-Adresse ein" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" aria-label="Vollständige Adresse eingeben" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="Stadt oder Gemeinde" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" aria-label="Bezirk oder Landkreis" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Geben Sie die Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
