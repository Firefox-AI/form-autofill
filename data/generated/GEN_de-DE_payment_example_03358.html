<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="fullName" id="idzoh" aria-label="Geben Sie den Namen des Empfängers ein" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="tel" name="phoneNumber" id="id98" placeholder="888 1234 5678" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email_address" id="id6mc8" aria-label="Geben Sie Ihre E-Mail-Adresse ein" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="address" id="idepp" aria-label="Vollständige Adresse eingeben" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="city" id="idtsc2z" aria-label="Stadt oder Gemeinde" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="neighborhood" id="idp3vil" aria-label="Stadtteil oder Bezirk" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <input type="text" name="zipCode" id="idc8" aria-label="Geben Sie die Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
