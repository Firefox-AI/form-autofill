<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">ПІБ</label>
    <input type="text" name="name" id="name" placeholder="Введіть ваше ПІБ" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Вулиця</label>
    <input type="text" name="street" id="street" placeholder="Введіть назву вулиці" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Номер будинку</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Введіть номер будинку" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Додаткова адреса</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, поверх тощо (необов&#x27;язково)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Поштовий індекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Місто</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введіть місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Країна</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Росія</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Чехія</option>
  <option>Угорщина</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
