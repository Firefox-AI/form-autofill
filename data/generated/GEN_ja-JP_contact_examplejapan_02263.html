<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-japan.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>お名前
    <input type="text" name="name" id="name" placeholder="山田 太郎" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="email">メールアドレス</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label>電話番号
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>住所
    <input type="text" name="streetAddress" id="streetAddress" placeholder="1-1-1 代々木" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label for="addressLevel2">市区町村</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="渋谷区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">郵便番号</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="150-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
