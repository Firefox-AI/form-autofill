<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Jméno na kartě</label>
    <input type="text" name="ccName" id="ccName" placeholder="Zadejte jméno a příjmení" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Ulice a číslo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Například Ulice 1234" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Další adresa</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt, blok nebo jiná specifikace" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">PSČ</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Například 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Město</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Kraj</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
  </div>
  <div>
    <label for="countryName">Země</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Polsko</option>
  <option>Německo</option>
  <option>Rakousko</option>
</select>
  </div>
  <div>
    <label for="tel">Telefonní číslo</label>
    <input type="tel" name="tel" id="tel" placeholder="Například +420 123 456 789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
