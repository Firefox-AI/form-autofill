<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhcci">First Name*</label>
    <input type="text" name="billing_first_name" id="idhcci" placeholder="First Name*" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idnvi">Last Name*</label>
    <input type="text" name="billing_last_name" id="idnvi" placeholder="Last Name*" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idzt8">Country Code*</label>
    <select name="countryCode" id="idzt8" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 (USA)</option>
  <option>+44 (UK)</option>
  <option>+61 (Australia)</option>
  <option>+91 (India)</option>
  <option>+81 (Japan)</option>
</select>
  </div>
  <div>
    <label for="idvgsd">Phone Number*</label>
    <input type="tel" name="id0ca" id="idvgsd" placeholder="(123) 456-7890" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="idi0dd">City*</label>
    <input type="text" name="town" id="idi0dd" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id8d5f7">State/Province*</label>
    <select name="province7" id="id8d5f7" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="idjjva3">Street Address*</label>
    <input type="text" name="addr6" id="idjjva3" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idzj1">Nearest Landmark (Optional)</label>
    <input type="text" name="idyzlr" id="idzj1" placeholder="e.g., near Central Park" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
