<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="given_name_7847">First Name*</label>
    <input type="text" name="given_name_9115" id="given_name_7847" placeholder="First Name*" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_9462">Last Name*</label>
    <input type="text" name="family_name_4227" id="family_name_9462" placeholder="Last Name*" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="tel_country_code_654">Country Code*</label>
    <select name="tel_country_code_1900" id="tel_country_code_654" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 (USA)</option>
  <option>+44 (UK)</option>
  <option>+61 (Australia)</option>
  <option>+91 (India)</option>
  <option>+81 (Japan)</option>
</select>
  </div>
  <div>
    <label for="tel_national_2314">Phone Number*</label>
    <input type="tel" name="tel_national_622" id="tel_national_2314" placeholder="(123) 456-7890" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="address_level2_6291">City*</label>
    <input type="text" name="address_level2_9546" id="address_level2_6291" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="address_level1_3613">State/Province*</label>
    <select name="address_level1_3975" id="address_level1_3613" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <label for="street_address_2197">Street Address*</label>
    <input type="text" name="street_address_5640" id="street_address_2197" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="reference_point_4119">Nearest Landmark (Optional)</label>
    <input type="text" name="reference_point_7247" id="reference_point_4119" placeholder="e.g., near Central Park" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
