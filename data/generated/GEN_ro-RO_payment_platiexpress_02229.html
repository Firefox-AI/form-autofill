<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>plati-express.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idnhim2">Numele de pe card</label>
    <input type="text" name="nameOnCard" id="idnhim2" placeholder="Nume complet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idpczx">Numărul cardului</label>
    <input type="number" name="ccNumber" id="idpczx" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idr98">Luna expirării</label>
    <select name="exp_month" id="idr98" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <label for="id2j">Anul expirării</label>
    <select name="exp_year" id="id2j" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="id7i">Codul de securitate</label>
    <input type="number" name="cvc" id="id7i" placeholder="CVC" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idv4">Tipul cardului</label>
    <select name="ccType" id="idv4" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="iddc76" id="idr3wgl" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
