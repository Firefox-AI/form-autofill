<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>plati-express.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Numele deținătorului cardului</label>
    <input type="text" name="ccName" id="ccName" placeholder="Scrieți numele exact ca pe card" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Numărul cardului</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXXXXXXXXXXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Luna expirării</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Anul expirării</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Codul de securitate (CSC)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 sau 4 cifre" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Tipul cardului</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Trimiteți</button>
  </div>
</form>

</fieldset></body></html>
