<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivbolt.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Név</span>
    <input type="text" name="name" id="name" placeholder="Kérem a teljes nevét" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Utca</span>
    <input type="text" name="street" id="street" placeholder="Kérem az utcai nevet" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Házszám</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Kérem a házszámot" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Cím kiegészítés</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lásd pl. lépcsőház, bejárat" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Irányítószám</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Kérem az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Megye</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kérem a megyét" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Ország</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szlovénia</option>
  <option>Csehország</option>
  <option>Németország</option>
  <option>Olaszország</option>
</select>
  </div>
  <div>
    <span>Lakás</span>
    <input type="text" name="apartment" id="apartment" placeholder="Kérem a lakás számát" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Város</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Kérem a város nevét" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
