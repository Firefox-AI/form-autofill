<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name</span>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ländervorwahl</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+49</option>
  <option>+41</option>
  <option>+43</option>
  <option>+44</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <span>Vorwahl</span>
    <input type="number" name="telAreaCode" id="telAreaCode" placeholder="z.B. 30" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <span>Lokale Vorwahl</span>
    <input type="number" name="telLocalPrefix" id="telLocalPrefix" placeholder="z.B. 123" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <span>Lokale Nummer</span>
    <input type="number" name="telLocalSuffix" id="telLocalSuffix" placeholder="z.B. 4567" data-moz-autofill-type="tel-local-suffix">
  </div>
  <div>
    <span>Erweiterung</span>
    <input type="number" name="telExtension" id="telExtension" placeholder="z.B. 89" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <span>Ländervorwahl (für Zweitnummer)</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+49</option>
  <option>+41</option>
  <option>+43</option>
  <option>+44</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <span>Vorwahl (für Zweitnummer)</span>
    <input type="number" name="telAreaCode" id="telAreaCode" placeholder="z.B. 30" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <span>Lokale Vorwahl (für Zweitnummer)</span>
    <input type="number" name="telLocalPrefix" id="telLocalPrefix" placeholder="z.B. 123" data-moz-autofill-type="tel-local-prefix">
  </div>
  <div>
    <span>Lokale Nummer (für Zweitnummer)</span>
    <input type="number" name="telLocalSuffix" id="telLocalSuffix" placeholder="z.B. 4567" data-moz-autofill-type="tel-local-suffix">
  </div>
</form>

</fieldset></body></html>
