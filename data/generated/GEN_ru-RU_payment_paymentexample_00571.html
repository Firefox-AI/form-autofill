<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paymentexample.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Как указано на карте" aria-label="Имя владельца карты" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Введите номер карты" aria-label="Номер карты" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Месяц окончания" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 Январь</option>
  <option>02 Февраль</option>
  <option>03 Март</option>
  <option>04 Апрель</option>
  <option>05 Май</option>
  <option>06 Июнь</option>
  <option>07 Июль</option>
  <option>08 Август</option>
  <option>09 Сентябрь</option>
  <option>10 Октябрь</option>
  <option>11 Ноябрь</option>
  <option>12 Декабрь</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" aria-label="Год окончания" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Три цифры на обратной стороне карты" aria-label="CVV" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" aria-label="Тип карты" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Мир</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Укажите ваш адрес" aria-label="Адрес" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Введите этаж" aria-label="Этаж" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="password" name="field" id="field" aria-label="">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
