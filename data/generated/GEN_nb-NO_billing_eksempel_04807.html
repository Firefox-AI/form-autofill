<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhzz">Navn på kort</label>
    <input type="text" name="cardholderName" id="idhzz" placeholder="Skriv inn navnet som står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idjihj">Gateadresse</label>
    <input type="text" name="street1" id="idjihj" placeholder="Gateadresse (f.eks. Storgata 1)" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idd70">Leilighet, etasje, osv.</label>
    <input type="text" name="address29" id="idd70" placeholder="Leilighet eller etasje (valgfritt)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idx918">Postnummer</label>
    <input type="text" name="zipCode" id="idx918" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id7be">By eller sted</label>
    <input type="text" name="town" id="id7be" placeholder="Skriv inn byen eller stedet" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idbmu">Fylke</label>
    <select name="stateProvince" id="idbmu" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Viken</option>
  <option>Innlandet</option>
  <option>Vestfold og Telemark</option>
  <option>Agder</option>
  <option>Rogaland</option>
  <option>Vestland</option>
  <option>Møre og Romsdal</option>
  <option>Trøndelag</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
</select>
  </div>
  <div>
    <label for="id0ret4">Land</label>
    <select name="country" id="id0ret4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
