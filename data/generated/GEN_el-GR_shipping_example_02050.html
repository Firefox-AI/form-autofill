<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="name" id="name" placeholder="Γράψτε το όνομά σας" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Διεύθυνση (προαιρετικά)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Π.χ. Συναυλία ή Διαμέρισμα" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Οδός</span>
    <input type="text" name="street" id="street" placeholder="Οδό και αριθμό" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Αριθμός σπιτιού</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Αριθμός σπιτιού" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Ταχυδρομικός κώδικας</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ταχυδρομικός κώδικας" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Πόλη</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πόλη" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Χώρα</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
</select>
  </div>
  <div>
    <span>Όροφος</span>
    <input type="text" name="floor" id="floor" placeholder="Π.χ. 2ος" data-moz-autofill-type="floor">
  </div>
  <div>
    <button name="field" id="field" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
