<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>regisztracio.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Írja be a keresztnevét" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Írja be a vezetéknevét" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="példa@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(+36) 20 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Születési dátum" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Írja be a cég nevét" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Férfi</option>
  <option>Nő</option>
  <option>Egyéb</option>
</select>
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Írja be a becenevét" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Válasszon egy jelszót">
  </div>
</form>

</fieldset></body></html>
