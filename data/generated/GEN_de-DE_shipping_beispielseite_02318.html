<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="email">E-Mail-Adresse bestätigen</label>
    <input type="email" name="email" id="email" placeholder="E-Mail erneut eingeben" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="name">Vollständiger Name</label>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="country">Land</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="number" name="postalCode" id="postalCode" placeholder="Ihre PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
