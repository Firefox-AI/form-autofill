<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>примеренсайт.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Име</label>
    <input type="text" name="givenName" id="givenName" placeholder="Вашето име" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Фамилия</label>
    <input type="text" name="familyName" id="familyName" placeholder="Вашата фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Допълнително име</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Допълнително име (по желание)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Псевдоним</label>
    <input type="text" name="nickname" id="nickname" placeholder="Вашият псевдоним" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Имейл</label>
    <input type="email" name="email" id="email" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="Вашият телефонен номер" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Организация</label>
    <input type="text" name="organization" id="organization" placeholder="Вашата организация (по желание)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Дата на раждане</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Януари</option>
  <option>Февруари</option>
  <option>Март</option>
  <option>Април</option>
  <option>Май</option>
  <option>Юни</option>
  <option>Юли</option>
  <option>Август</option>
  <option>Септември</option>
  <option>Октомври</option>
  <option>Ноември</option>
  <option>Декември</option>
</select>
  </div>
  <div>
    <label for="field">Парола</label>
    <input type="password" name="field" id="field" placeholder="Вашата парола">
  </div>
</form>

</fieldset></body></html>
