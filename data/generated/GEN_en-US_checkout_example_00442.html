<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(123) 456-7890" aria-label="Phone Number" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" aria-label="Street Address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" aria-label="Address Line 2 (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Zip Code" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
