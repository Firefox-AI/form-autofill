<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idfh">Email Address</label>
    <input type="email" name="mail" id="idfh" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idfmax">First Name</label>
    <input type="text" name="firstName" id="idfmax" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="ido61fv">Last Name</label>
    <input type="text" name="lname" id="ido61fv" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id4l">Pack Station Number</label>
    <input type="number" name="cardNumber" id="id4l" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id3m50">Postal Code</label>
    <input type="number" name="card_number" id="id3m50" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id6zvmg">Phone Number (+420)</label>
    <input type="tel" name="telephone" id="id6zvmg" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idt91l">First Name (again)</label>
    <input type="text" name="first_name" id="idt91l" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idjw">Last Name (again)</label>
    <input type="text" name="lname" id="idjw" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id6kb8d">Phone Number (+44)</label>
    <input type="tel" name="telephone" id="id6kb8d" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idlmogt">Account Holder Name</label>
    <input type="text" name="ccName" id="idlmogt" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idp533">Credit Card Number</label>
    <input type="number" name="ccNumber" id="idp533" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idt39lu">Name on Card</label>
    <input type="text" name="ccName" id="idt39lu" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id2y">Expiration Month</label>
    <select name="ccExpMonth" id="id2y" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idoii">Expiration Year</label>
    <select name="exp_year" id="idoii" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="idj1v">Security Code (CID)</label>
    <input type="number" name="cardCode" id="idj1v" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
