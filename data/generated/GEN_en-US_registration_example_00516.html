<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Select your country</span>
    <select name="country_id3" id="id2c6x" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
  <option>Italy</option>
  <option>Netherlands</option>
  <option>Sweden</option>
  <option>Norway</option>
  <option>Denmark</option>
  <option>Finland</option>
  <option>Ireland</option>
  <option>New Zealand</option>
  <option>Japan</option>
  <option>China</option>
  <option>India</option>
  <option>Brazil</option>
  <option>South Africa</option>
</select>
  </div>
  <div>
    <span>Full Name (First and Last Name) *</span>
    <input type="text" name="contactName" id="idvb" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Phone Number *</span>
    <input type="tel" name="mobile" id="idcd" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Address Line 1 *</span>
    <input type="text" name="addr1" id="idai" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address Line 2</span>
    <input type="text" name="addressLine23" id="idoujo" placeholder="Apt, suite, etc. (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postcode *</span>
    <input type="text" name="postcode1" id="idcr" placeholder="ZIP code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="city" id="idlzu" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
