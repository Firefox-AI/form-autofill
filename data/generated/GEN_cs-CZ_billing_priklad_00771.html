<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno na kartě</span>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Novák" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Ulice a číslo popisné</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Například Křižíkova 1234" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Doplňující adresa</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Například patro 3" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Například 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Město</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kraj</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
  </div>
  <div>
    <span>Země</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
  <option>Francie</option>
  <option>Itálie</option>
  <option>Spojené království</option>
  <option>Spojené státy</option>
  <option>Japonsko</option>
</select>
  </div>
  <div>
    <span>Název společnosti</span>
    <input type="text" name="organization" id="organization" placeholder="Například ABC s.r.o." data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
