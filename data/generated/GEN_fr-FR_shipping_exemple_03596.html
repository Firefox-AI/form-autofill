<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nom complet</label>
    <input type="text" name="name" id="name" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressStreetname">Nom de la rue</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Nom de la rue" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressHousenumber">Numéro de la maison</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numéro de la maison" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Informations complémentaires</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Compléments d&#x27;adresse (facultatif)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Pays</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
</select>
  </div>
  <div>
    <label for="addressLevel3">Département</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Département" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
