<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

    <label for="idn64j">Imię</label>
    <input type="text" name="firstName" id="idn64j" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">

  <div>
    <label for="idxl5">Nazwisko</label>

  <div>
    <label for="idqpll9">Miasto</label>
    <input type="text" name="city7" id="idqpll9" placeholder="Wprowadź nazwę miasta" data-moz-autofill-type="address-level2">

  <div>

  </div>
  <div>
    <label for="idsc38">Kraj</label>

  <option value=""></option>
  <option>Polska</option>

  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
</select>
  </div>
  <div>

  </div>
  <div>

  <div>

  </div>
</form>
