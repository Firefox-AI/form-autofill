<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Naam</span>
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Straat</span>
    <input type="text" name="street" id="street" placeholder="Straatnaam" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Huisnummer</span>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Huisnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Toevoeging</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijvoorbeeld &#x27;A&#x27; of &#x27;B&#x27; (optioneel)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Plaats</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Luxemburg</option>
  <option>Zwitserland</option>
  <option>Spanje</option>
  <option>Italië</option>
</select>
  </div>
  <div>
    <span>Gebouw</span>
    <input type="text" name="building" id="building" placeholder="Naam of nummer van het gebouw (optioneel)" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
