<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sobrenome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefone</label>
    <input type="tel" name="tel" id="tel" placeholder="(XX) XXXXX-XXXX" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data de Nascimento</label>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="field">Senha</label>
    <input type="password" name="field" id="field" placeholder="Escolha uma senha">
  </div>
</form>

</fieldset></body></html>
