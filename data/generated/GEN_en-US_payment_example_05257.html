<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Payment Method
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Name *
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Address *
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Enter your address details" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Apartment/Info
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter apartment or additional info" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Postal Code *
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>City *
    <input type="text" name="country" id="country" data-moz-autofill-type="country">
    </label>
  </div>
  <div>
    <label>Country *
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
</select>
    </label>
  </div>
  <div>
    <label>State/Province *
    <input type="text" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>State/Province *
    <input type="text" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
    </label>
  </div>
  <div>
    <label>Product Inquiry
    <input type="email" name="email" id="email" placeholder="Enter your email to get product details" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Social Media Links
    <input type="email" name="email" id="email" placeholder="Enter your social media profile" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Send Inquiry
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Send Feedback
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Extranet Access
    <input type="email" name="email" id="email" placeholder="Enter your email for extranet access" data-moz-autofill-type="email">
    </label>
  </div>
</form>

</fieldset></body></html>
