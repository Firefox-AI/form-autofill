<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Last Name *
    <input type="text" name="last_name" id="idbn5qw" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>First Name *
    <input type="text" name="billing_first_name" id="id5o" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Email Address *
    <input type="email" name="mail" id="id3d" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Phone Number *
    <input type="tel" name="mobile" id="id0nu" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>ZIP Code *
    <input type="number" name="zip_code" id="idwb" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City *
    <input type="text" name="locality" id="idzn90" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Street Address *
    <input type="text" name="streetAddress" id="idirku" placeholder="123 Main St" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Full Name
    <input type="text" name="fullName" id="idnqj" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="number" name="zip_code" id="idfuh" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="city" id="idejm" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Street
    <input type="text" name="addr" id="idpd" data-moz-autofill-type="street-address">
    </label>
  </div>
</form>

</fieldset></body></html>
