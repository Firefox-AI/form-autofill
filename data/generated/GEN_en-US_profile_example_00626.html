<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Last Name *
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>First Name *
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Email Address *
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Phone Number *
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>ZIP Code *
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City *
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Street Address *
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Main St" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Full Name
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Street
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
    </label>
  </div>
</form>

</fieldset></body></html>
