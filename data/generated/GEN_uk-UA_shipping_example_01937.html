<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">ПІБ</label>
    <input type="text" name="name" id="name" placeholder="Введіть ваше ПІБ" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLevel2">Область</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Київська</option>
  <option>Львівська</option>
  <option>Одеська</option>
  <option>Харківська</option>
  <option>Дніпропетровська</option>
  <option>Запорізька</option>
  <option>Полтавська</option>
  <option>Івано-Франківська</option>
  <option>Тернопільська</option>
  <option>Черкаська</option>
</select>
  </div>
  <div>
    <label for="addressLine2">Вулиця</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Введіть назву вулиці" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressHousenumber">Будинок</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Введіть номер будинку" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="apartment">Квартира</label>
    <input type="text" name="apartment" id="apartment" placeholder="Введіть номер квартири (якщо є)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="postalCode">Поштовий індекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Країна</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Словаччина</option>
  <option>Румунія</option>
  <option>Молдова</option>
</select>
  </div>
  <div>
    <label for="referencePoint">Орієнтир</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Наприклад, біля супермаркету" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="addressLevel3">Місто</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Введіть місто" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
