<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoexemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no Cartão</span>
    <input type="text" name="ccName" id="ccName" placeholder="Digite o nome como no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número do Cartão</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Número de 16 dígitos" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mês de Validade</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <span>Ano de Validade</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Código de Segurança</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Últimos 3 dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de Cartão</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Elo</option>
  <option>Hipercard</option>
</select>
  </div>
  <div>
    <span>CEP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Digite seu CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Código do País</span>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+55 Brasil</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Finalizar Pagamento</button>
  </div>
</form>

</fieldset></body></html>
