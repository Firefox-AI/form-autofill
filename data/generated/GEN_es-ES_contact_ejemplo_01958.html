<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Tu nombre y apellidos" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" aria-label="Correo electrónico" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" aria-label="Dirección" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Tu ciudad" aria-label="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" aria-label="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="organization">Organización</label>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa (si aplica)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
