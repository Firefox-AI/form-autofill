<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" placeholder="Ihre E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Geburtsdatum</span>
    <input type="text" name="bday" id="bday" placeholder="TT.MM.JJJJ" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Firma (optional)</span>
    <input type="text" name="organization" id="organization" placeholder="Ihre Firmenbezeichnung" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrieren</button>
  </div>
</form>

</fieldset></body></html>
