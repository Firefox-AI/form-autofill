<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="billing_first_name" id="id2vhb" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="billing_last_name" id="idhr" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="mail" id="id3x2l8" placeholder="Ihre E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="mobile" id="idbf" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Geburtsdatum</span>
    <input type="text" name="dateOfBirth" id="idcu7e6" placeholder="TT/MM/JJJJ" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Firma/Organisation (optional)</span>
    <input type="text" name="business" id="idl1" placeholder="Ihre Firma" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="idma" id="idquw2" type="submit">Registrieren</button>
  </div>
</form>

</fieldset></body></html>
