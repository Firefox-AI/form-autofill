<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekodeme.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Isim Soyisim" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Sokak adı ve numarası" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="block" id="block" placeholder="Blok numarası (varsa)" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">ÖDE</button>
  </div>
</form>

</fieldset></body></html>
