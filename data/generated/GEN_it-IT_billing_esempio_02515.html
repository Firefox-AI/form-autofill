<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome sulla carta</span>
    <input type="text" name="nameOnCard" id="id3a1" placeholder="Inserisci il nome come appare sulla carta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="id9c" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postcode" id="id4vd" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="locality" id="id988le" placeholder="Nome della città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Provincia</span>
    <select name="stateProvince" id="idzjqu" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Genova</option>
  <option>Palermo</option>
  <option>Bari</option>
  <option>Verona</option>
</select>
  </div>
  <div>
    <span>Nazione</span>
    <select name="country" id="id7ekm1" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Giappone</option>
  <option>Cina</option>
</select>
  </div>
  <div>
    <span>Azienda</span>
    <input type="text" name="organization" id="idir" placeholder="Nome dell&#x27;azienda (se applicabile)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="mobile" id="ideqmx" placeholder="Numero di telefono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
