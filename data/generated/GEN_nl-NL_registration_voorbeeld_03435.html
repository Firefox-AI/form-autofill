<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Voornaam</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Achternaam</label>
    <input type="text" name="familyName" id="familyName" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="jouwnaam@voorbeeld.nl" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefoonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="06-12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Geboortedatum</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Organisatie</label>
    <input type="text" name="organization" id="organization" placeholder="Vul de naam van je organisatie in" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="sex">Geslacht</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Man</option>
  <option>Vrouw</option>
  <option>Anders</option>
</select>
  </div>
  <div>
    <label for="phoneticFamilyName">Fonetische achternaam</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Vul je fonetische achternaam in (optioneel)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="addressLevel4">Plaats</label>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Vul je woonplaats in" data-moz-autofill-type="address-level4">
  </div>
  <div>
    <label for="field">Wachtwoord</label>
    <input type="password" name="field" id="field" placeholder="Kies een wachtwoord">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registreren</button>
  </div>
</form>

</fieldset></body></html>
