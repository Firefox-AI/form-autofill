<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idha3">Naam</label>
    <input type="text" name="name" id="idha3" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idnxb">E-mailadres</label>
    <input type="email" name="user_email" id="idnxb" placeholder="Vul uw e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idvsc">Telefoonnummer</label>
    <input type="tel" name="telephone" id="idvsc" placeholder="Vul uw telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idboc1a">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="idboc1a" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idnp5">Plaats</label>
    <input type="text" name="city" id="idnp5" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idoiut">Postcode</label>
    <input type="text" name="postcode" id="idoiut" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxkv4o">Land</label>
    <select name="countryName" id="idxkv4o" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
</select>
  </div>
  <div>
    <label for="idgh">Fonetische achternaam</label>
    <input type="text" name="idw3x4t" id="idgh" placeholder="Vul uw fonetische achternaam in (optioneel)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="id3sk2t" id="idab" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
