<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Naam</label>
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-mailadres</label>
    <input type="email" name="email" id="email" placeholder="Vul uw e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefoonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Vul uw telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Plaats</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
</select>
  </div>
  <div>
    <label for="phoneticFamilyName">Fonetische achternaam</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Vul uw fonetische achternaam in (optioneel)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
