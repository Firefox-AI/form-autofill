<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>zakupy.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Ulica
    <input type="text" name="street" id="street" placeholder="Na przykład: Lipowa" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label for="addressHousenumber">Numer budynku</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Dodatkowe informacje (opcjonalnie)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Mieszkanie 10" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="12-345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
</select>
  </div>
  <div>
    <span>Piętro</span>
    <input type="text" name="floor" id="floor" placeholder="Na przykład: 2" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="building">Budowla</label>
    <input type="text" name="building" id="building" placeholder="Nr 5" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
