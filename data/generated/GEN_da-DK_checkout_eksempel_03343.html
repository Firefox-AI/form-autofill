<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Titel</span>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Hr.</option>
  <option>Fr.</option>
  <option>Fru.</option>
  <option>Dk.</option>
</select>
  </div>
  <div>
    <span>Fornavn</span>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternavn</span>
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Gadeadresse</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Indtast din gadeadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="email" id="email" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
