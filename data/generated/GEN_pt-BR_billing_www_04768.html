<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome no cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="Digite o nome como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Endereço</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Av., etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Cidade</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Nome da cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Estado</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>São Paulo</option>
  <option>Rio de Janeiro</option>
  <option>Minas Gerais</option>
  <option>Bahia</option>
  <option>Paraná</option>
  <option>Rio Grande do Sul</option>
  <option>Santa Catarina</option>
  <option>Distrito Federal</option>
  <option>Ceará</option>
  <option>Pernambuco</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Número do CNPJ</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Somente números" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="tel">Telefone</label>
    <input type="tel" name="tel" id="tel" placeholder="(00) 0000-0000" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="apartment">Número do apartamento</label>
    <input type="text" name="apartment" id="apartment" placeholder="Ex: 101" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="addressStreetname">Nome da rua</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Digite o nome da rua" data-moz-autofill-type="address-streetname">
  </div>
</form>

</fieldset></body></html>
