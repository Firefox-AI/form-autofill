<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="given_name_574">First Name *</label>
    <input type="text" name="given_name_7917" id="given_name_574" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_7795">Last Name *</label>
    <input type="text" name="family_name_6750" id="family_name_7795" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email_1558">Email Address *</label>
    <input type="email" name="email_2208" id="email_1558" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel_5802">Phone Number *</label>
    <input type="tel" name="tel_5256" id="tel_5802" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="street_address_4258">Street Address *</label>
    <input type="text" name="street_address_1320" id="street_address_4258" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="postal_code_9294">Postal Code *</label>
    <input type="text" name="postal_code_6707" id="postal_code_9294" placeholder="90210" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_level2_7715">City *</label>
    <input type="text" name="address_level2_3088" id="address_level2_7715" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
