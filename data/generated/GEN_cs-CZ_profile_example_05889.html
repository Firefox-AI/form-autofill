<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="id32wio" placeholder="Vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="last_name" id="idk0zp" placeholder="Vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="middle_name" id="idgn" placeholder="Např. prostřední jméno" aria-label="Doplňkové jméno" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="id5uq" placeholder="Např. oblíbená přezdívka" data-moz-autofill-type="nickname">

  <div>
    <label>Emailová adresa
    <input type="email" name="email" id="ido5" placeholder="Váš email" data-moz-autofill-type="email">

  </div>
  <div>
    <input type="tel" name="telephone" id="id171u5" placeholder="Např. +420 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="business" id="idhrs" placeholder="Název vaší organizace" aria-label="Organizace" data-moz-autofill-type="organization">
  </div>
  <div>
    <label>Datum narození
    <input type="text" name="birthday" id="idqq" placeholder="DD/MM/YYYY" data-moz-autofill-type="bday">
    </label>
  </div>
</form>

</fieldset></body></html>
