<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccGivenName">First Name</label>
    <input type="text" name="ccGivenName" id="ccGivenName" placeholder="Please enter your first name." data-moz-autofill-type="cc-given-name">
  </div>
  <div>
    <label for="ccFamilyName">Last Name</label>
    <input type="text" name="ccFamilyName" id="ccFamilyName" placeholder="Please enter your last name." data-moz-autofill-type="cc-family-name">
  </div>
  <div>
    <label for="ccNumber">Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Expiry Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Expiry Year</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">CVV</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="CVV required." data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
  <option>Italy</option>
  <option>Netherlands</option>
  <option>Belgium</option>
</select>
  </div>
  <div>
    <label for="addressLine1">Address</label>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Address Line 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="organization">Organization</label>
    <input type="text" name="organization" id="organization" placeholder="Optional" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">County</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Greater London</option>
  <option>West Midlands</option>
  <option>West Yorkshire</option>
  <option>Merseyside</option>
  <option>Lancashire</option>
  <option>Kent</option>
  <option>Surrey</option>
  <option>Essex</option>
</select>
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
