<html><head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>

  <option>2026</option>
  <option>2027</option>

  <div>

  <div>
