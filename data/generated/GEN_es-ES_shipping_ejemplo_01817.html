<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>

  </div>
  <div>
    <label for="idc8">Número</label>
    <input type="text" name="r:r:5:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idc8" placeholder="Número de la casa o edificio" data-moz-autofill-type="address-housenumber">

  <div>

  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
</select>

  <option>2022</option>
  <option>2021</option>
  <option>2020</option>
  <option>2019</option>
  <option>2018</option>
  <option>2017</option>
  <option>2016</option>
  <option>2015</option>
  <option>2014</option>
  <option>2013</option>
  <option>2012</option>
  <option>2011</option>
  <option>2010</option>
</select>
  </div>
  <div>

    <input type="text" name="r:r:6:m:r:10:cr:3:c:pr:1:container:fs:i:input" id="idmai" placeholder="Escribe tus apellidos" data-moz-autofill-type="phonetic-family-name">

  <div>
    <button name="r:r:2:m:r:11:cr:1:c:pr:1:container:fs:i:input" id="id69" type="submit">Submit</button>
  </div>
