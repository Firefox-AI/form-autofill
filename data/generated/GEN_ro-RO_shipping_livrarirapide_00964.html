<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>livrari-rapide.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nume complet</span>
    <input type="text" name="contactName" id="id8hdd" placeholder="Introduceti numele dumneavoastră" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresă</span>
    <input type="text" name="addr1" id="idzh" placeholder="Strada, număr, apartament" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="postalCode" id="idgc4" placeholder="Codul dumneavoastră poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Oraș</span>
    <input type="text" name="locality" id="idkcc" placeholder="Orașul dumneavoastră" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Țară</span>
    <select name="countryName" id="idhpw" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
  </div>
  <div>
    <span>Etaj</span>
    <input type="text" name="floor" id="idc2" placeholder="Etajul (opțional)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Punct de reper</span>
    <input type="text" name="idj3" id="idf7" placeholder="Punct de reper (opțional)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Luna nașterii</span>
    <select name="birthMonth" id="idktb" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
</form>

</fieldset></body></html>
