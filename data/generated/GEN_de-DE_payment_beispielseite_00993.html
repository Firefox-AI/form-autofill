<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0nc">Postleitzahl *</label>
    <input type="text" name="zipCode" id="id0nc" placeholder="Geben Sie Ihre Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id8znf">Vorname *</label>
    <input type="text" name="firstName" id="id8znf" placeholder="Geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idp2">Nachname *</label>
    <input type="text" name="lname" id="idp2" placeholder="Geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idzcbt">E-Mail *</label>
    <input type="email" name="mail" id="idzcbt" placeholder="Geben Sie Ihre E-Mail-Adresse ein" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id25">E-Mail bestätigen *</label>
    <input type="email" name="user_email" id="id25" placeholder="Bestätigen Sie Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idvh2d">Adresse *</label>
    <input type="text" name="addr" id="idvh2d" placeholder="Geben Sie Ihre Adresse ein" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idup">Postleitzahl *</label>
    <input type="text" name="postalCode" id="idup" placeholder="Geben Sie erneut Ihre Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idpvhh">Stadt *</label>
    <input type="text" name="city" id="idpvhh" placeholder="Geben Sie Ihre Stadt ein" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id80">Telefonnummer *</label>
    <input type="tel" name="phone" id="id80" placeholder="Geben Sie Ihre Telefonnummer ein" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
