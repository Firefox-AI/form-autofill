<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idjxypc">Nombre del titular de la tarjeta</label>
    <input type="text" name="nameOnCard" id="idjxypc" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idun10">Dirección</label>
    <input type="text" name="street" id="idun10" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idiuc">Código postal</label>
    <input type="text" name="zipCode" id="idiuc" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="ide3">Ciudad</label>
    <input type="text" name="city" id="ide3" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idolb">Provincia</label>
    <select name="province" id="idolb" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
</select>
  </div>
  <div>
    <label for="idctkt">País</label>
    <select name="country" id="idctkt" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
  </div>
  <div>
    <button name="idhz8" id="idnzn" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
