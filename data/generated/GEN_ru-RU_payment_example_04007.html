<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>01</option>
  <option>02</option>
  <option>03</option>

  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>

  <option>MasterCard</option>
  <option>American Express</option>
  <option>Мир</option>
</select>
