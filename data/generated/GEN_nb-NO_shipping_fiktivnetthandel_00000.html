<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivnetthandel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn</span>
    <input type="text" name="contactName" id="idaf" placeholder="Skriv inn ditt fulle navn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="address1" id="idgw" placeholder="Gateadresse eller postboks" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zipCode" id="idbb" placeholder="Skriv inn postnummeret" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="town" id="id3jflh" placeholder="Skriv inn byen" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idpe83e" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>Tilleggsadresse</span>
    <input type="text" name="address2" id="idr9" placeholder="Leilighet, etasje eller lignende" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Leilighetsnummer</span>
    <input type="text" name="apt" id="id4wrp" placeholder="Skriv inn leilighetsnummer" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Referansepunkt</span>
    <input type="text" name="id37b" id="idav" placeholder="Beskriv et kjent landemerke" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Bygning</span>
    <input type="text" name="id4yk" id="ide5" placeholder="Skriv inn bygningens navn" data-moz-autofill-type="building">
  </div>
  <div>
    <span>MVA-nummer</span>
    <input type="text" name="vat" id="id9n" placeholder="Skriv inn ditt MVA-nummer (hvis aktuelt)" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="idbwh" id="idt3c" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
