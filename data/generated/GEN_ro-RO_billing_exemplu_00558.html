<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele de pe card</span>
    <input type="text" name="ccName" id="idbm" placeholder="Introdu numele tău" data-moz-autofill-type="cc-name">
  </div>
  <div>

  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="zip_code" id="idv5" placeholder="Introduce codul postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Orașul</span>
    <input type="text" name="locality" id="idva95i" placeholder="Oraș" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Județul</span>
    <select name="county" id="id6mi" data-moz-autofill-type="address-level1">

  <option>Arad</option>
  <option>Bacău</option>
  <option>Bihor</option>

  <option>Brașov</option>
  <option>București</option>
  <option>Buzău</option>
  <option>Caraș-Severin</option>
  <option>Călărași</option>
  <option>Cluj</option>
  <option>Constanța</option>
  <option>Dâmbovița</option>
  <option>Dolj</option>
  <option>Galați</option>
  <option>Giurgiu</option>
  <option>Gorj</option>
  <option>Harghita</option>
  <option>Hunedoara</option>
  <option>Ialomița</option>
  <option>Iași</option>
  <option>Maramureș</option>
  <option>Mehedinți</option>
  <option>Mureș</option>
  <option>Olt</option>
  <option>Prahova</option>
  <option>Satu Mare</option>
  <option>Sălaj</option>
  <option>Sibiu</option>
  <option>Suceava</option>
  <option>Teleorman</option>
  <option>Timiș</option>
  <option>Tulcea</option>
  <option>Vâlcea</option>
  <option>Vrancea</option>
</select>
  </div>
  <div>
    <span>Țara</span>
    <select name="countryName" id="id52c" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cehia</option>
  <option>Croația</option>
  <option>Danemarca</option>
  <option>Elveția</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Irlanda</option>
  <option>Islanda</option>
  <option>Italia</option>
  <option>Letonia</option>
  <option>Lituania</option>

</select>
  </div>
  <div>
    <span>Numărul de telefon</span>
    <input type="tel" name="phone" id="idtn" placeholder="Ex. 0123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Apartament, etaj</span>
    <input type="text" name="address2" id="idzwipq" placeholder="Apartament, etaj (opțional)" data-moz-autofill-type="address-line2">
  </div>

    <button name="idliue" id="idaap54" type="submit">Trimite</button>
  </div>

</fieldset></body></html>
