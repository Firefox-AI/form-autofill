<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Country
    <select name="r:r:1:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="id4ohjc" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="r:r:2:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idnu" data-moz-autofill-type="family-name">

  </div>
  <div>
    <label>First Name
    <input type="text" name="r:r:9:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idii20" data-moz-autofill-type="given-name">

  </div>
  <div>

    </label>
  </div>
  <div>

    <input type="text" name="r:r:8:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idgzu80" placeholder="Enter your full address" data-moz-autofill-type="street-address">

  </div>
  <div>

  <option>05 - May</option>

  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>

  </div>
  <div>
