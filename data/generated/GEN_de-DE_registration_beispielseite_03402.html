<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname</label>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Adresszusatz (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Adresszusatz (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
