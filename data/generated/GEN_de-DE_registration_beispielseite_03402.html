<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcns0">Vorname</label>
    <input type="text" name="firstName" id="idcns0" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="ide9">Nachname</label>
    <input type="text" name="last_name" id="ide9" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id47">E-Mail-Adresse</label>
    <input type="email" name="mail" id="id47" placeholder="E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idke">Telefonnummer</label>
    <input type="tel" name="telephone" id="idke" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idybr9">Straße und Hausnummer</label>
    <input type="text" name="address" id="idybr9" placeholder="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idp5wy">Adresszusatz (optional)</label>
    <input type="text" name="street2" id="idp5wy" placeholder="Adresszusatz (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id1jpw">Postleitzahl</label>
    <input type="text" name="zip_code" id="id1jpw" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idc8q">Stadt</label>
    <input type="text" name="locality" id="idc8q" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
