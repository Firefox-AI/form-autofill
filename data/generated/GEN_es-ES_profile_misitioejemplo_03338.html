<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>misitioejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Segundo nombre</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Cómo te llaman tus amigos" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="email" id="email" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="tel" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Organización
    <input type="text" name="organization" id="organization" placeholder="Nombre de tu organización" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <input type="text" name="bday" id="bday" aria-label="Cumpleaños" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="bdayDay">Día</label>
    <select name="bdayDay" id="bdayDay" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
  <div>
    <span>Nombre familiar (fonético)</span>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Escribe tu nombre familiar como suena" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <span>Contraseña</span>
    <input type="password" name="field" id="field" placeholder="Introduce tu contraseña">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
