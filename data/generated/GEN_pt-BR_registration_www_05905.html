<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome
    <input type="text" name="fname" id="id7we1l" placeholder="Seu nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sobrenome
    <input type="text" name="last_name" id="id3nn" placeholder="Seu sobrenome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="email" id="idgzfb" placeholder="Seu e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefone
    <input type="tel" name="mobile" id="idzq" placeholder="(xx) xxxxx-xxxx" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Data de nascimento
    <input type="text" name="birthdate" id="idsu" placeholder="dd/mm/yyyy" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Cidade
    <input type="text" name="suburb" id="idg0bi" placeholder="Sua cidade" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <label>Senha
    <input type="password" name="idvq" id="idjg9" placeholder="Crie uma senha">
    </label>
  </div>
</form>

</fieldset></body></html>
