  <option>2009</option>
  <option>2010</option>
</select>
  </div>
  <div>
    <label for="idhbu">Organizația</label>
    <input type="text" name="organization" id="idhbu" placeholder="Numele organizației (opțional)" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
