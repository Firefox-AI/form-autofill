<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplusite.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Introdu numele tău" aria-label="Numele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Introdu prenumele tău" aria-label="Prenumele" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Adresa de email</label>
    <input type="email" name="email" id="email" placeholder="exemplu@domeniu.ro" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numărul de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="0740 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data nașterii</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Zi</option>
  <option>Lună</option>
  <option>An</option>
</select>
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Numele companiei (dacă este cazul)" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
