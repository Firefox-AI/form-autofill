<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>

  <option>Merseyside</option>
  <option>West Yorkshire</option>
  <option>Kent</option>
  <option>Surrey</option>
  <option>Essex</option>
  <option>Berkshire</option>
  <option>South Yorkshire</option>
  <option>Lancashire</option>
</select>
  </div>

  </div>

  </div>

  <div>
    <input type="text" name="street" id="ids3" placeholder="Address:*" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Reference Point (e.g. 3005123456)
    <input type="text" name="idi9h9" id="id7q4" data-moz-autofill-type="reference-point">

  </div>
  <div>
    <label>Full Name*
    <input type="text" name="contactName" id="idpl" data-moz-autofill-type="name">

  </div>
  <div>
    <input type="tel" name="phone" id="id3kx" placeholder="+44" data-moz-autofill-type="tel">

  </div>
  <div>
    <input type="number" name="card_number" id="ids6nfm" placeholder="Card Number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="text" name="expiry" id="id2i" placeholder="Expiry Date*" data-moz-autofill-type="cc-exp">
  </div>
  <div>
    <span>Name on Card*</span>
    <input type="text" name="ccName" id="idjhoc" data-moz-autofill-type="cc-name">

  <div>
    <select name="province" id="iddkor" data-moz-autofill-type="address-level1">

  <option>Greater London</option>
  <option>West Midlands</option>
  <option>Merseyside</option>
  <option>West Yorkshire</option>
  <option>Kent</option>
  <option>Surrey</option>
  <option>Essex</option>
  <option>Berkshire</option>
  <option>South Yorkshire</option>
  <option>Lancashire</option>
</select>
  </div>
  <div>
    <label for="idcm">Street Address*</label>
    <input type="text" name="streetAddress" id="idcm" placeholder="Street Address*" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="fullName" id="idrghuc" aria-label="Full Name*" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id6pa">+44</label>
    <input type="tel" name="mobile" id="id6pa" placeholder="+44" data-moz-autofill-type="tel">
  </div>
