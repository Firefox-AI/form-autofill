<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>

  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Address:" data-moz-autofill-type="street-address">

  <div>
    <span>Full Name*</span>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>

  </div>

    <input type="email" name="email" id="email" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
  <div>

    <input type="number" name="ccNumber" id="ccNumber" placeholder="Enter your card number" data-moz-autofill-type="cc-number">

  <div>
    <label for="addressLevel1">County*</label>
