<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="idct" placeholder="Ex: Maria da Silva" aria-label="Nome do titular do cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="id1cyyq" placeholder="Rua, Avenida, etc." aria-label="Endereço" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postcode" id="iddi" placeholder="00000-000" aria-label="CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="town" id="idpm9h" placeholder="Ex: São Paulo" aria-label="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="province" id="idlcg" aria-label="Estado" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>Santa Catarina</option>
  <option>São Paulo</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
  </div>
  <div>
    <select name="country" id="idj4rh" aria-label="País" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <input type="tel" name="mobile" id="id2tdng" placeholder="(11) 91234-5678" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idje2" id="idebv" type="submit">Finalizar pagamento</button>
  </div>
</form>

</fieldset></body></html>
