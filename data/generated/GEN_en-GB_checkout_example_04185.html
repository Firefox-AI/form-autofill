<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Email Address
    <input type="email" name="mail" id="id9ac" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Full Name (First and Last Name)
    <input type="text" name="fullName" id="idwdd" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <input type="text" name="addr" id="idex" placeholder="Address" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="idvyv7g" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <input type="text" name="town" id="idss" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="email" name="email_address" id="idez" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="phoneNumber" id="idfn" placeholder="+44" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
