<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>plati-sigure.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="id06ip9" placeholder="Numele de pe card" aria-label="Numele titularului cardului" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="idzd" placeholder="XXXX-XXXX-XXXX-XXXX" aria-label="Numărul cardului" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="expMonth3" id="idsy" aria-label="Luna expirării" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="idtneh6" aria-label="Anul expirării" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <input type="number" name="cardCode" id="idvwe" placeholder="3 sau 4 cifre" aria-label="Codul de securitate (CVV)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idrx" aria-label="Tipul cardului" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
</form>

</fieldset></body></html>
