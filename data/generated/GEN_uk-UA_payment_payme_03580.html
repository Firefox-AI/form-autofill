<html><head>

<body>

<fieldset>

  <option>2025</option>

  <option>Discover</option>

  <option>Diners Club</option>
</select>
  </div>
  <div>
    <button name="id91v" id="idmgn9" type="submit">Підтвердити платіж</button>
  </div>
</form>

</fieldset></body></html>
