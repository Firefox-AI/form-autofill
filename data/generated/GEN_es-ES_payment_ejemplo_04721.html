<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idz6e">Nombre del titular de la tarjeta</label>
    <input type="text" name="cardholderName4" id="idz6e" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id4g">Número de tarjeta</label>
    <input type="number" name="cardNo" id="id4g" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id5o9mv">Mes de expiración</label>
    <select name="expMonth" id="id5o9mv" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="iden">Año de expiración</label>
    <select name="exp_year9" id="iden" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="idxcp">Código de seguridad</label>
    <input type="number" name="securityCode" id="idxcp" placeholder="3 dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id9ofi">Tipo de tarjeta</label>
    <select name="cardType" id="id9ofi" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idi73ps">Código postal</label>
    <input type="text" name="postalCode" id="idi73ps" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
