<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="cc_name_1744">Nombre del titular de la tarjeta</label>
    <input type="text" name="cc_name_3679" id="cc_name_1744" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="cc_number_4124">Número de tarjeta</label>
    <input type="number" name="cc_number_7140" id="cc_number_4124" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="cc_exp_month_6623">Mes de expiración</label>
    <select name="cc_exp_month_2934" id="cc_exp_month_6623" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <label for="cc_exp_year_1319">Año de expiración</label>
    <select name="cc_exp_year_8437" id="cc_exp_year_1319" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="cc_csc_6269">Código de seguridad</label>
    <input type="number" name="cc_csc_6557" id="cc_csc_6269" placeholder="3 o 4 dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="cc_type_7954">Tipo de tarjeta</label>
    <select name="cc_type_586" id="cc_type_7954" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <label for="postal_code_1787">Código postal</label>
    <input type="text" name="postal_code_1719" id="postal_code_1787" placeholder="Ej: 28001" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
