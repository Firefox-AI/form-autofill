<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id9vt2">Country *</label>
    <select name="country" id="id9vt2" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="idhnyb">Full Name *</label>
    <input type="text" name="contactName" id="idhnyb" placeholder="Enter your full name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id7izfw">Address Line 1 *</label>
    <input type="text" name="addr1" id="id7izfw" placeholder="House number and street name" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idj9pwx">Address Line 2</label>
    <input type="text" name="street2" id="idj9pwx" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idweh2">City *</label>
    <input type="text" name="locality" id="idweh2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idaba2">Region</label>
    <select name="county" id="idaba2" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>England</option>
  <option>Scotland</option>
  <option>Wales</option>
  <option>Northern Ireland</option>
</select>
  </div>
  <div>
    <label for="ideozs">Postcode *</label>
    <input type="text" name="zipCode" id="ideozs" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idd7">Telephone</label>
    <input type="tel" name="tel" id="idd7" placeholder="e.g. 07700 900 982" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
