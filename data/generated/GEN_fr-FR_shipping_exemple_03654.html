<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <label for="idrt8x">Point de repère (facultatif)</label>
    <input type="text" name="idfj7q" id="idrt8x" placeholder="Ex. Près de la boulangerie" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <button name="idedl3" id="id887" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
