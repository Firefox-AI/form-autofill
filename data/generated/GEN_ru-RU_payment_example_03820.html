<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Имя владельца карты
    <input type="text" name="ccName" id="ccName" placeholder="Ф.И.О. владельца карты" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Номер карты
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Введите номер карты" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Месяц окончания действия
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Январь</option>
  <option>Февраль</option>
  <option>Март</option>
  <option>Апрель</option>
  <option>Май</option>
  <option>Июнь</option>
  <option>Июль</option>
  <option>Август</option>
  <option>Сентябрь</option>
  <option>Октябрь</option>
  <option>Ноябрь</option>
  <option>Декабрь</option>
</select>
    </label>
  </div>
  <div>
    <label>Год окончания действия
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Код безопасности (CVV)
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Три цифры на обратной стороне карты" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Тип карты
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
  <option>American Express</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
