<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad-strony.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="cardholderName" id="id5yle" placeholder="Wpisz imię i nazwisko właściciela karty" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numer karty</span>
    <input type="number" name="cardNo" id="id2dm" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Miesiąc ważności</span>
    <select name="ccExpMonth" id="ideodab" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <span>Rok ważności</span>
    <select name="exp_year" id="idyndm" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <span>Kod CVV</span>
    <input type="number" name="csc" id="id0fum" placeholder="3-cyfrowy kod z tyłu karty" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Typ karty</span>
    <select name="cardType" id="idge6" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="address" id="id2w3ki" placeholder="Wpisz adres zamieszkania" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
