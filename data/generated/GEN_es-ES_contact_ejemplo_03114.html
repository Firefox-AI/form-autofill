<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idgz">Nombre completo</label>
    <input type="text" name="r:r:2:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idgz" placeholder="Tu nombre y apellidos" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idba">Correo electrónico</label>
    <input type="email" name="r:r:4:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idba" placeholder="tu.email@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id2fop">Teléfono</label>
    <input type="tel" name="r:r:2:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="id2fop" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id5zp">Dirección</label>
    <input type="text" name="r:r:5:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="id5zp" placeholder="Calle, número y piso" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="r:r:1:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="idsu01" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="r:r:3:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id0h1t" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="r:r:1:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="iddfi9m" placeholder="Nombre de la organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idfpwbs">País</label>
    <select name="r:r:5:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idfpwbs" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Alemania</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
  <option>México</option>
</select>
  </div>
  <div>
    <label for="idfh">Edificio</label>
    <input type="text" name="r:r:9:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idfh" placeholder="Nombre del edificio (opcional)" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="r:r:2:m:r:10:cr:1:c:pr:1:container:fs:i:input" id="iddi" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
