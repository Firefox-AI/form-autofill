<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyv1d">Όνομα κάρτας</label>
    <input type="text" name="ccName" id="idyv1d" placeholder="Το όνομα που αναγράφεται στην κάρτα" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idaksr">Αριθμός κάρτας</label>
    <input type="number" name="cardNumber" id="idaksr" placeholder="Π.χ. 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idjvbbz">Μήνας λήξης</label>
    <select name="exp_month" id="idjvbbz" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ιανουάριος</option>
  <option>Φεβρουάριος</option>
  <option>Μάρτιος</option>
  <option>Απρίλιος</option>
  <option>Μάιος</option>
  <option>Ιούνιος</option>
  <option>Ιούλιος</option>
  <option>Αύγουστος</option>
  <option>Σεπτέμβριος</option>
  <option>Οκτώβριος</option>
  <option>Νοέμβριος</option>
  <option>Δεκέμβριος</option>
</select>
  </div>
  <div>
    <label for="idt47t5">Έτος λήξης</label>
    <select name="expYear7" id="idt47t5" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id7qov">CVV</label>
    <input type="number" name="cvc" id="id7qov" placeholder="3 ή 4 ψηφία" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ide8s">Τύπος κάρτας</label>
    <select name="ccType" id="ide8s" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idqgz1" id="id1s" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
