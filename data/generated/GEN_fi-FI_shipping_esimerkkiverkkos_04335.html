<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki-verkkosivusto.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nimi
    <input type="text" name="name" id="name" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="street">Katuosoite</label>
    <input type="text" name="street" id="street" placeholder="Katuosoite" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Osoitenumero</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Osoitenumero" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Osoite (lisätiedot)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esimerkiksi asunto, toimisto tai muu" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" aria-label="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Kaupunki
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupunki" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
</select>
  </div>
  <div>
    <span>Kerros</span>
    <input type="text" name="floor" id="floor" placeholder="Kerros (valinnainen)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="building">Rakennus</label>
    <input type="text" name="building" id="building" placeholder="Rakennus (valinnainen)" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Alue (valinnainen)" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
