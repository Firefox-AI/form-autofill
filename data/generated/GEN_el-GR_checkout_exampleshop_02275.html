<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shop.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Π.χ. Γιάννης" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επίθετο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Π.χ. Παπαδόπουλος" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Π.χ. Αθήνα" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός κώδικας</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Π.χ. 10558" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
  <option>Μεγάλη Βρετανία</option>
  <option>Ηνωμένες Πολιτείες</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="συνάδελφος@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Π.χ. 2101234567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Εταιρεία (προαιρετικό)</label>
    <input type="text" name="organization" id="organization" placeholder="Π.χ. ABC Α.Ε." data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel1">Περιοχή</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Μακεδονία</option>
  <option>Θεσσαλία</option>
  <option>Στερεά Ελλάδα</option>
  <option>Πελοπόννησος</option>
  <option>Νησιά Αιγαίου</option>
  <option>Κρήτη</option>
</select>
  </div>
</form>

</fieldset></body></html>
