<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0e">Nome</label>
    <input type="text" name="firstName" id="id0e" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idgmgy">Cognome</label>
    <input type="text" name="billing_last_name" id="idgmgy" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idne8lv">Indirizzo</label>
    <input type="text" name="streetAddress" id="idne8lv" placeholder="Via, numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id21">Città</label>
    <input type="text" name="locality" id="id21" placeholder="La tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idwvn">Codice postale</label>
    <input type="text" name="zip" id="idwvn" placeholder="Il tuo codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idyt9">Paese</label>
    <select name="countryName" id="idyt9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Germania</option>
  <option>Francia</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="ido8aih">Email</label>
    <input type="email" name="email_address" id="ido8aih" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idad">Telefono</label>
    <input type="tel" name="phoneNumber3" id="idad" placeholder="Il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idq68ks">Provincia</label>
    <select name="county" id="idq68ks" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Firenze</option>
</select>
  </div>
  <div>
    <label for="idexzm">Mese di nascita</label>
    <select name="birthMonth" id="idexzm" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <button name="idit" id="id9w" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
