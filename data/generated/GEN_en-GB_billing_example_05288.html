<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idrpgx8">Email Address</label>
    <input type="email" name="email_address" id="idrpgx8" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idgfzx3">First Name</label>
    <input type="text" name="billing_first_name" id="idgfzx3" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idcncop">Last Name</label>
    <input type="text" name="lastName" id="idcncop" placeholder="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idup6wh">Phone Number</label>
    <input type="tel" name="phone" id="idup6wh" placeholder="e.g. 01234 567890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idyt82">Street Name</label>
    <input type="text" name="street" id="idyt82" placeholder="Street Name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idbfr">House Number</label>

  </div>
  <div>

  </div>
  <div>

    <input type="text" name="town" id="idqdzsa" placeholder="Town" data-moz-autofill-type="address-level2">
  </div>
  <div>

    <input type="text" name="zipCode" id="idku7" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idaxvs">Region</label>
    <input type="text" name="province" id="idaxvs" placeholder="Region" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idbc2r">County</label>
    <input type="text" name="stateProvince" id="idbc2r" placeholder="County" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idfp19">E-mail Address</label>
    <input type="email" name="email_address" id="idfp19" placeholder="E-mail Address" data-moz-autofill-type="email">
  </div>
</form>
