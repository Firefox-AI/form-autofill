<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Inserisci il tuo indirizzo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressStreetname">Nome della via</label>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Nome della strada" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Codice postale</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="example@esempio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="referencePoint">Punto di riferimento (opzionale)</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Esempio: vicino al parco" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
