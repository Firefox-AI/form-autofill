<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Secondo nome</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Il tuo secondo nome (opzionale)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Soprannome</label>
    <input type="text" name="nickname" id="nickname" placeholder="Il tuo soprannome (se ne hai uno)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Es. nome@esempio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organizzazione</label>
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;azienda o organizzazione (opzionale)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="field">Password</label>
    <input type="password" name="field" id="field" placeholder="Crea una password">
  </div>
</form>

</fieldset></body></html>
