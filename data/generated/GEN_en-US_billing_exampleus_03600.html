<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-us.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="given_name_5320">First Name</label>
    <input type="text" name="given_name_9855" id="given_name_5320" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_643">Last Name</label>
    <input type="text" name="family_name_184" id="family_name_643" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="street_address_2747">Street Address</label>
    <input type="text" name="street_address_204" id="street_address_2747" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="address_extra_3031">Additional Address Info</label>
    <input type="text" name="address_extra_3624" id="address_extra_3031" placeholder="Apartment, Suite, Unit, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postal_code_4644">ZIP Code</label>
    <input type="number" name="postal_code_3850" id="postal_code_4644" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_level2_4048">City</label>
    <input type="text" name="address_level2_3264" id="address_level2_4048" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
