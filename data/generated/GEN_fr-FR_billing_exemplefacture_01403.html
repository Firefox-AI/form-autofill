<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplefacture.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id15tu7">Nom sur la carte</label>
    <input type="text" name="nameOnCard" id="id15tu7" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idbtkop">Adresse</label>

  </div>
  <div>
    <label for="id8dh71">Code postal</label>
    <input type="text" name="postalCode" id="id8dh71" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idq144k">Ville</label>
    <input type="text" name="city" id="idq144k" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="iduz">Région</label>
    <select name="stateProvince" id="iduz" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Pays de la Loire</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Centre-Val de Loire</option>
  <option>Alsace</option>
</select>
  </div>
  <div>
    <label for="idj1td">Pays</label>
    <select name="countryName" id="idj1td" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <label for="idhpw">Numéro de TVA intracommunautaire</label>
    <input type="text" name="vatNumber" id="idhpw" placeholder="FR123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idhao">Nom phonétique</label>
    <input type="text" name="idwjfvc" id="idhao" placeholder="Jean Dupont" data-moz-autofill-type="phonetic-name">
  </div>
</form>

</fieldset></body></html>
