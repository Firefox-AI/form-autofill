<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccNumber">Credit Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExp">Expiration Date (MM/YY)</label>
    <input type="text" name="ccExp" id="ccExp" data-moz-autofill-type="cc-exp">
  </div>
  <div>
    <label for="ccCsc">Security Code (CVC)</label>
    <input type="number" name="ccCsc" id="ccCsc" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
