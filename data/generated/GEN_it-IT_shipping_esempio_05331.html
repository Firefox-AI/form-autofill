<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome completo</span>
    <input type="text" name="name" id="name" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="street" id="street" placeholder="Via, Strada" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Numero civico</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numero" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Ulteriori informazioni</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartamento, piano, interno" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Nazione</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Piano</span>
    <input type="text" name="floor" id="floor" placeholder="Inserisci il piano" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Edificio</span>
    <input type="text" name="building" id="building" placeholder="Nome dell&#x27;edificio (se necessario)" data-moz-autofill-type="building">
  </div>
</form>

</fieldset></body></html>
