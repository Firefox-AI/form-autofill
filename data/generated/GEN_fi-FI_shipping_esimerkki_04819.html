<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nimi</span>
    <input type="text" name="fullName" id="idpc" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Osoite</span>
    <input type="text" name="address1" id="idwy" placeholder="Katuosoite" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Osoitteen lisätiedot</span>
    <input type="text" name="street2" id="idn9i" placeholder="Esim. asunnon numero tai c/o" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postinumero</span>
    <input type="text" name="postcode" id="id3o" placeholder="Esimerkiksi 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kaupunki</span>
    <input type="text" name="town" id="idvl" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Maa</span>
    <select name="countryName" id="idxfvi0" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
</select>
  </div>
  <div>
    <span>Kerros</span>
    <input type="text" name="etage" id="id4t9m" placeholder="Kerros (jos sovellettavissa)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Maakunta</span>
    <input type="text" name="suburb" id="iduu3o" placeholder="Maakunnan nimi" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
