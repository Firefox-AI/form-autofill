<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome e cognome</label>
    <input type="text" name="ccName" id="ccName" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="organization">Azienda</label>
    <input type="text" name="organization" id="organization" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Ulteriori dettagli</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartamento, piano, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">CAP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Comune</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Nome del comune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Provincia</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Torino</option>
  <option>Napoli</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bari</option>
  <option>Verona</option>
</select>
  </div>
  <div>
    <label for="countryName">Nazione</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Giappone</option>
  <option>Cina</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Partita IVA</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="IT12345678901" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="tel">Numero di telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="+39 06 12345678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
