<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idj82uf">Nombre</label>
    <input type="text" name="givenName" id="idj82uf" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idwbfxy">Apellidos</label>
    <input type="text" name="surname" id="idwbfxy" placeholder="Tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idwk">Segundo nombre</label>
    <input type="text" name="middleName" id="idwk" placeholder="Tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idxhkym">Apodo</label>
    <input type="text" name="handle" id="idxhkym" placeholder="Tu apodo" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="idy5">Correo electrónico</label>
    <input type="email" name="emailAddress" id="idy5" placeholder="Tu email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idmbl">Teléfono</label>
    <input type="tel" name="telephone" id="idmbl" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="iduhx">Organización</label>
    <input type="text" name="company" id="iduhx" placeholder="Tu organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idaz">Fecha de nacimiento</label>
    <select name="birthdate" id="idaz" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>día</option>
  <option>mes</option>
  <option>año</option>
</select>
  </div>
  <div>
    <label for="idcrva">Nombre fonético</label>
    <input type="text" name="idubty" id="idcrva" placeholder="Tu nombre en caracteres fonéticos (opcional)" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="idqyehf" id="id3nje" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
