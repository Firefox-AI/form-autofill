<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no cartão</span>
    <input type="text" name="ccName" id="ccName" placeholder="Nome completo como no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Complemento</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>CEP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Estado</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>Santa Catarina</option>
  <option>São Paulo</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <span>Número de Inscrição Estadual</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Ex: 123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Nome da Empresa</span>
    <input type="text" name="organization" id="organization" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
