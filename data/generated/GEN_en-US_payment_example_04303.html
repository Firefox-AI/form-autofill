<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="To complete your request, please fill in your account details first. You can modify this information at any time." data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Email Address *</label>
    <input type="email" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Mobile Phone:</span>
    <input type="tel" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>Last Name
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="addressLevel1">Last Name</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="Last Name" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <input type="text" name="organization" id="organization" aria-label="Company" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Company Name</span>
    <input type="text" name="vatNumber" id="vatNumber" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
