<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Όνομα</label>
    <input type="text" name="name" id="name" placeholder="Εισάγετε το όνομά σας" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Εισάγετε το email σας" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telAreaCode">Κωδικός περιοχής</label>
    <input type="text" name="telAreaCode" id="telAreaCode" placeholder="Κωδικός περιοχής (π.χ. 210)" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Εισάγετε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Εισάγετε την πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Εισάγετε τον ταχυδρομικό κωδικό σας" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="email">Επιβεβαίωση Email</label>
    <input type="email" name="email" id="email" placeholder="Επαναλάβετε το email σας" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
