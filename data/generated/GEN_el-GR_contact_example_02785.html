<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idag">Όνομα</label>
    <input type="text" name="contactName" id="idag" placeholder="Το όνομά σας" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idkmo">Διεύθυνση ηλεκτρονικού ταχυδρομείου</label>
    <input type="email" name="emailAddress" id="idkmo" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idp4en4">Κωδικός περιοχής</label>
    <input type="tel" name="areaCode" id="idp4en4" placeholder="Π.χ. 210" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="id21d">Τηλέφωνο</label>
    <input type="tel" name="mobile" id="id21d" placeholder="Το τηλέφωνό σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idyda">Διεύθυνση</label>
    <input type="text" name="street" id="idyda" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idtf">Πόλη</label>
    <input type="text" name="city" id="idtf" placeholder="Η πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="iddc">Ταχυδρομικός Κώδικας</label>
    <input type="text" name="zipCode" id="iddc" placeholder="Ο ταχυδρομικός σας κώδικας" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
