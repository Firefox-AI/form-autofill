<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="given_name_1205" id="given_name_9337" placeholder="Introduza o seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Sobrenome</span>
    <input type="text" name="family_name_9775" id="family_name_2404" placeholder="Introduza o seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="street_address_7835" id="street_address_793" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Complemento</span>
    <input type="text" name="address_line2_332" id="address_line2_4132" placeholder="Apartamento, andar, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Concelho</span>
    <select name="address_level2_9527" id="address_level2_2212" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Funchal</option>
</select>
  </div>
  <div>
    <span>Código Postal</span>
    <input type="text" name="postal_code_7987" id="postal_code_5350" placeholder="Ex: 1000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="country_name_6419" id="country_name_592" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Itália</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email_8281" id="email_3902" placeholder="Introduza o seu email" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefone</span>
    <input type="tel" name="tel_2450" id="tel_2534" placeholder="Ex: 912 345 678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Nome Fonético</span>
    <input type="text" name="phonetic_name_8981" id="phonetic_name_7385" placeholder="Como se pronuncia o seu nome? (opcional)" data-moz-autofill-type="phonetic-name">
  </div>
</form>

</fieldset></body></html>
