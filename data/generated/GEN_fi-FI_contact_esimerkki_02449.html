<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idm6">Nimi</label>
    <input type="text" name="contactName" id="idm6" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iddcdr3">Sähköposti</label>
    <input type="email" name="emailAddress" id="iddcdr3" placeholder="esimerkki@domain.fi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idbe">Puhelinnumero</label>
    <input type="tel" name="telephone" id="idbe" placeholder="045 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id2mok">Katuosoite</label>
    <input type="text" name="addr" id="id2mok" placeholder="Katu ja numero" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idok">Kaupunginosa</label>
    <input type="text" name="city" id="idok" placeholder="Kaupunginosa tai kunnasta" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id26">Postinumero</label>
    <input type="text" name="zip" id="id26" placeholder="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id112">Maa</label>
    <select name="countryName" id="id112" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Italia</option>
  <option>Yhdysvallat</option>
  <option>Iso-Britannia</option>
</select>
  </div>
</form>

</fieldset></body></html>
