<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nimi</label>
    <input type="text" name="name" id="name" placeholder="Etunimi ja sukunimi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Sähköposti</label>
    <input type="email" name="email" id="email" placeholder="esimerkki@domain.fi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Puhelinnumero</label>
    <input type="tel" name="tel" id="tel" placeholder="045 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Katuosoite</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Katu ja numero" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Kaupunginosa</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupunginosa tai kunnasta" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postinumero</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Italia</option>
  <option>Yhdysvallat</option>
  <option>Iso-Britannia</option>
</select>
  </div>
</form>

</fieldset></body></html>
