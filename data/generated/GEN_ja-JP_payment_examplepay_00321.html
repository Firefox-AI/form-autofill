<html><head>

<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

  <div>

  <option>3月</option>

  <option>5月</option>
  <option>6月</option>

  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>

  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>

  </div>

</form>
