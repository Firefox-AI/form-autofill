<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Delivery Country</span>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Mobile Number (For delivery updates)</span>
    <input type="tel" name="tel" id="tel" placeholder="Enter your mobile number" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Search for your address</span>
    <input type="text" name="addressLookup" id="addressLookup" placeholder="Type your address here" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <span>House Number or Name</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="e.g. 35" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Street Name</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="e.g. High Street" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City/Town</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="e.g. London" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>County</span>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="e.g. Greater London" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="e.g. SW1A 1AA" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
