<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Имя на карте</span>
    <input type="text" name="ccName" id="ccName" placeholder="ФИО как на карте" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Улица</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введите название улицы" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Дополнительный адрес</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, офис и т.д." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Почтовый индекс</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Город</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Регион</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Московская область</option>
  <option>Санкт-Петербург</option>
  <option>Татарстан</option>
  <option>Свердловская область</option>
  <option>Нижегородская область</option>
</select>
  </div>
  <div>
    <span>Страна</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
  <option>Армения</option>
</select>
  </div>
  <div>
    <span>Номер НДС</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Введите номер НДС" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
