<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>

</select>
  </div>
  <div>
    <label for="bdayYear">Anno di nascita</label>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">

  </div>
  <div>
    <label for="organization">Nome dell&#x27;organizzazione (opzionale)</label>
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome della tua organizzazione" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="field">Password</label>
    <input type="password" name="field" id="field" placeholder="Crea una password">
  </div>
</form>

</fieldset></body></html>
