<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Nome secondario (opzionale)</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Inserisci un nome aggiuntivo" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Soprannome (opzionale)</label>
    <input type="text" name="nickname" id="nickname" placeholder="Inserisci il tuo soprannome" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="esempio@dominio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telAreaCode">Prefisso telefonico</label>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="Inserisci il prefisso" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="tel">Numero di telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organizzazione</label>
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome dell&#x27;organizzazione" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="organizationTitle">Titolo dell&#x27;organizzazione</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Inserisci il titolo dell&#x27;organizzazione" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <input type="text" name="bday" id="bday" placeholder="GG/MM/AAAA" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
