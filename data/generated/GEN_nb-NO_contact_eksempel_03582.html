<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn</span>
    <input type="text" name="name_9843" id="name_9292" placeholder="Fornavn Etternavn" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-post</span>
    <input type="email" name="email_2134" id="email_1933" placeholder="f.eks. navn@domene.no" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>

  </div>
  <div>
    <span>Gateadresse</span>

  <div>
    <span>By</span>

  </div>
  <div>
    <span>Tilleggsadresse</span>
    <input type="text" name="address_extra_8493" id="address_extra_6962" placeholder="Leilighet, etasje eller bygg" data-moz-autofill-type="address-extra">
  </div>
</form>
