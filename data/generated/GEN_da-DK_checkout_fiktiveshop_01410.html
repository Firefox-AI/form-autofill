<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktiveshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Fornavn
    <input type="text" name="firstName" id="idex5l" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Efternavn
    <input type="text" name="last_name" id="idug9" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Virksomhed (valgfrit)
    <input type="text" name="company" id="idnd7" placeholder="Indtast virksomhedens navn" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="street1" id="id07fl" placeholder="Gadeadresse" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Lejlighed (valgfrit)
    <input type="text" name="flat" id="idahsxb" placeholder="F.eks. 1. sal, A" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="city" id="idhcn" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postcode" id="id6pg2" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country" id="idjmy" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>Storbritannien</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="emailAddress" id="idw0v" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="phone" id="id2v3n" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
