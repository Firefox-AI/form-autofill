<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Vul uw straatnaam in" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Vul uw huisnummer in" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. toevoegingen of extra informatie" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zwitserland</option>
  <option>Zweden</option>
  <option>Noorwegen</option>
</select>
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Vul uw verdieping in (indien van toepassing)" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Vul uw appartementnummer in (indien van toepassing)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Vul uw fonetische achternaam in (indien van toepassing)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Verstuur</button>
  </div>
</form>

</fieldset></body></html>
