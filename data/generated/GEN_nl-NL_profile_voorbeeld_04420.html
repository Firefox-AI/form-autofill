<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Voornaam</span>
    <input type="text" name="first_name" id="idy2" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Achternaam</span>
    <input type="text" name="last_name" id="idlj8" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Tussenvoegsel</span>
    <input type="text" name="mname" id="idh3" placeholder="Vul je tussenvoegsel in (indien van toepassing)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Bijnaam</span>
    <input type="text" name="displayName" id="idt7" placeholder="Vul je bijnaam in" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="user_email" id="id5e31" placeholder="Vul je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="telephone" id="id5jr2" placeholder="Vul je telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisatie</span>
    <input type="text" name="company" id="idzs" placeholder="Vul je organisatie in" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Functietitel</span>
    <input type="text" name="jobTitle" id="idhg6a" placeholder="Vul je functietitel in" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Geboortedatum</span>
    <input type="text" name="dateOfBirth" id="id8cp" placeholder="Kies je geboortedatum" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
