<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Voornaam</span>
    <input type="text" name="givenName" id="givenName" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Achternaam</span>
    <input type="text" name="familyName" id="familyName" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Tussenvoegsel</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Vul je tussenvoegsel in (indien van toepassing)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Bijnaam</span>
    <input type="text" name="nickname" id="nickname" placeholder="Vul je bijnaam in" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="email" id="email" placeholder="Vul je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Vul je telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisatie</span>
    <input type="text" name="organization" id="organization" placeholder="Vul je organisatie in" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Geboortedatum</span>
    <input type="text" name="bday" id="bday" placeholder="Kies je geboortedatum" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Functietitel</span>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Vul je functietitel in" data-moz-autofill-type="organization-title">
  </div>
</form>

</fieldset></body></html>
