<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id9y">Navn</label>
    <input type="text" name="contactName" id="id9y" placeholder="Skriv inn navnet ditt" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idvvr6e">E-post</label>
    <input type="email" name="emailAddress" id="idvvr6e" placeholder="Skriv inn e-postadressen din" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idpo">Telefonnummer</label>
    <input type="tel" name="phone1" id="idpo" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idjal">Adresse</label>
    <input type="text" name="addressLine1" id="idjal" placeholder="Gateadresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idopd">By</label>
    <input type="text" name="city8" id="idopd" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id3rw">Postnummer</label>
    <input type="text" name="postcode" id="id3rw" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id53tuc">Land</label>
    <select name="countryName" id="id53tuc" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idq3bvg">Etasje</label>
    <input type="text" name="floor" id="idq3bvg" placeholder="Etasje (hvis aktuelt)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="id58b">Bygning</label>
    <input type="text" name="idpj" id="id58b" placeholder="Bygning (hvis aktuelt)" data-moz-autofill-type="building">
  </div>
</form>

</fieldset></body></html>
