<body>

<fieldset>

  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>

  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>

  <option>2026</option>
  <option>2027</option>
  <option>2028</option>

  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <span>CVV/CVC szám</span>

  <div>
    <span>Kártya típusa</span>

  <option>VISA</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Maestro</option>
</select>

    <input type="text" name="r:r:4:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idph" placeholder="Város neve" data-moz-autofill-type="address-level3">

  <div>
    <button name="r:r:9:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id5w3b4" type="submit">Submit</button>
  </div>
