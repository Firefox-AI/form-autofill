<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Nazwisko</label>
    <input type="text" name="familyName" id="familyName" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="givenName">Imię</label>
    <input type="text" name="givenName" id="givenName" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="email">Adres e-mail</label>
    <input type="email" name="email" id="email" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Wprowadź swój numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data urodzenia</label>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/RRRR" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="field">Hasło</label>
    <input type="password" name="field" id="field">
  </div>
  <div>
    <button name="field" id="field" type="submit">Zarejestruj się</button>
  </div>
</form>

</fieldset></body></html>
