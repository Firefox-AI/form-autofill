<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladsitex.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Imię i nazwisko</label>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Ulica i numer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="ul. Główna 15" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Mieszkanie, lokal</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt 3B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-123" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Miasto</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Województwo</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Mazowieckie</option>
  <option>Małopolskie</option>
  <option>Śląskie</option>
  <option>Wielkopolskie</option>
  <option>Pomorskie</option>
  <option>Zachodniopomorskie</option>
  <option>Lubusz</option>
  <option>Dolnośląskie</option>
  <option>Opolskie</option>
  <option>Łódzkie</option>
  <option>Świętokrzyskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Lubusz</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Warmińsko-Mazurskie</option>
</select>
  </div>
  <div>
    <label for="countryName">Kraj</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>USA</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Austria</option>
  <option>Szwajcaria</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
