<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome sulla carta</span>
    <input type="text" name="nameOnCard" id="idbd" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numero della carta</span>
    <input type="number" name="ccNumber" id="id1u0io" placeholder="Inserisci il numero della carta" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Tipo di carta</span>
    <select name="ccType" id="idvpxo" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Mese di scadenza</span>
    <select name="expMonth" id="id9o" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <span>Anno di scadenza</span>
    <select name="exp_year" id="id8lo" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codice di sicurezza (CSC)</span>
    <input type="number" name="cardCode" id="idet5ne" placeholder="3 o 4 cifre" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <button name="iddflpo" id="idbv3ac" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
