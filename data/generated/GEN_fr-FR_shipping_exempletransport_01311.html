<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple-transport.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Entrez votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numéro" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Nom de la rue" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Batiment, appartement, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Entrez votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
</select>
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Par exemple, près de la gare" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
