<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Förnamn</span>
    <input type="text" name="firstName" id="idt8ab" placeholder="Ditt förnamn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternamn</span>
    <input type="text" name="billing_last_name" id="idmgize" placeholder="Ditt efternamn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Gatuadress</span>
    <input type="text" name="street1" id="idizy" placeholder="Exempelgatan 12" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Län</span>
    <select name="county" id="id8bv" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Stockholm</option>
  <option>Göteborg</option>
  <option>Malmö</option>
  <option>Uppsala</option>
  <option>Västerås</option>
  <option>Örebro</option>
  <option>Linköping</option>
  <option>Helsingborg</option>
  <option>Norrköping</option>
  <option>Jönköping</option>
</select>
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="town" id="idx7" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zip_code6" id="idz7c" placeholder="123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="country6" id="idje" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <span>E-postadress</span>
    <input type="email" name="user_email" id="idi8ga" placeholder="exempel@domain.se" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="mobile4" id="id1v" placeholder="07XX-XXXXXX" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Lägenhetsnummer</span>
    <input type="text" name="apartment" id="idee" placeholder="Lägenhet 3B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Fonetic efternamn</span>
    <input type="text" name="idesuxz" id="idca" placeholder="Ditt fonetiska efternamn" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
