<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Country</span>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>Zip Code</span>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Street Address</span>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="123 Main St" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House Number</span>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>(Optional)</span>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Email Address</span>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Phone Number (Optional)</span>
    <input type="tel" name="tel" id="tel" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
