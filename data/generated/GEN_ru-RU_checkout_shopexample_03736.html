<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>shop-example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Фамилия
    <input type="text" name="familyName" id="familyName" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Имя
    <input type="text" name="givenName" id="givenName" placeholder="Введите ваше имя" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Улица и дом
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введите адрес (улица, дом)" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Город
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Почтовый индекс
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Страна
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Армения</option>
  <option>Беларусь</option>
  <option>Казахстан</option>
  <option>Украина</option>
</select>
    </label>
  </div>
  <div>
    <label>Электронная почта
    <input type="email" name="email" id="email" placeholder="Введите адрес электронной почты" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Телефон
    <input type="tel" name="tel" id="tel" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
