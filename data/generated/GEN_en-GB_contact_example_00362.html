<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="organization" id="organization" aria-label="Organization Name" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Optional" aria-label="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Last Name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" aria-label="Street Address and House Number" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" aria-label="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="country" aria-label="Country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Spain</option>
  <option>France</option>
  <option>Germany</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="telCountryCode" id="telCountryCode" aria-label="Country Code" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <input type="tel" name="telNational" id="telNational" aria-label="Phone Number" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
