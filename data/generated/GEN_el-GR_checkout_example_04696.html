<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="firstName" id="idh4" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Επίθετο</span>
    <input type="text" name="lastName" id="idg5ngu" placeholder="Πληκτρολογήστε το επίθετό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Οργανισμός (προαιρετικά)</span>
    <input type="text" name="organization3" id="idrrj" placeholder="Πληκτρολογήστε τον οργανισμό σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Διεύθυνση</span>
    <input type="text" name="address1" id="id5ii" placeholder="Οδός και αριθμός" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Διαμέρισμα (προαιρετικά)</span>
    <input type="text" name="flat" id="id6p9q" placeholder="Αριθμός διαμερίσματος" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Πόλη</span>
    <input type="text" name="locality7" id="id80p4" placeholder="Πληκτρολογήστε την πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Περιοχή</span>
    <select name="county" id="ido4" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Μακεδονία</option>
  <option>Θεσσαλία</option>
  <option>Πελοπόννησος</option>
  <option>Κρήτη</option>
  <option>Νησιά Αιγαίου</option>
  <option>Νησιά Ιονίου</option>
</select>
  </div>
  <div>
    <span>Τ.Κ.</span>
    <input type="text" name="zip_code" id="idqd" placeholder="Πληκτρολογήστε τον ταχυδρομικό κωδικό σας" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Χώρα</span>
    <select name="country" id="iduvd9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Κύπρος</option>
  <option>Τουρκία</option>
</select>
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="tel" id="idwt6m" placeholder="Πληκτρολογήστε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="mail2" id="idyj" placeholder="Διεύθυνση ηλεκτρονικού ταχυδρομείου" data-moz-autofill-type="email">
  </div>
  <div>
    <button name="idux" id="id0si" type="submit">Ολοκλήρωση</button>
  </div>
</form>

</fieldset></body></html>
