<html><head>

<body>

<fieldset>
<h3>fictitiouspayment.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

    <span>Navn på kortet</span>
    <input type="text" name="r:r:2:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idji" placeholder="Fuldstændigt navn som på kortet" data-moz-autofill-type="cc-name">

  </div>
  <div>
    <span>Udløbs måned</span>

  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <span>Udløbs år</span>
    <select name="r:r:2:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idj0j88" data-moz-autofill-type="cc-exp-year">

  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>

  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Kontrolnummer (CSC)</span>
    <input type="number" name="r:r:9:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="idlsi" placeholder="3 eller 4 cifre (bag på kortet)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Korttype</span>
    <select name="r:r:4:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idk084" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="r:r:3:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idh9k" type="submit">Betal</button>
  </div>
