<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Spain</option>
  <option>France</option>
  <option>Germany</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="addressLine1">Address Line 1</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="House number and street name" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Address Line 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, suite, unit, etc. (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City/Town</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city or town" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postcode again" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="telCountryCode">Phone Country Code</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+34</option>
  <option>+49</option>
  <option>+33</option>
  <option>+39</option>
</select>
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
