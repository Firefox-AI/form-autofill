<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhqf">Email Address</label>
    <input type="email" name="emailAddress" id="idhqf" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idpy">Postcode</label>
    <input type="text" name="zip" id="idpy" placeholder="Enter your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idn74">Country</label>
    <select name="country_id" id="idn74" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Spain</option>
  <option>France</option>
  <option>Germany</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <label for="id253ft">First Name</label>
    <input type="text" name="fname" id="id253ft" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id5e4v5">Last Name</label>
    <input type="text" name="billing_last_name" id="id5e4v5" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="iduu5">Address Line 1</label>
    <input type="text" name="street1" id="iduu5" placeholder="House number and street name" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idavk4x">Address Line 2</label>
    <input type="text" name="street2" id="idavk4x" placeholder="Apartment, suite, unit, building, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idyxp">City</label>
    <input type="text" name="town" id="idyxp" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idd9n92">Postcode</label>
    <input type="text" name="zip" id="idd9n92" placeholder="Confirm your postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id4zgs">Telephone Country Code</label>
    <select name="phoneCountryCode" id="id4zgs" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+34</option>
  <option>+1</option>
  <option>+49</option>
  <option>+39</option>
</select>
  </div>
  <div>
    <label for="idfr1k">Telephone Number</label>
    <input type="tel" name="mobile" id="idfr1k" placeholder="Enter your telephone number" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
