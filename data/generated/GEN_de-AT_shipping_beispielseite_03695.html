<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Name
    <input type="text" name="r:r:8:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="ide0" placeholder="Vorname und Nachname" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="r:r:5:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idy6" placeholder="z.B. Musterstraße 12" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Postleitzahl
    <input type="text" name="r:r:6:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="id3fu" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ort
    <input type="text" name="r:r:4:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="id93r0f" placeholder="z.B. Wien" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="r:r:7:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idypwn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
    </label>
  </div>
  <div>
    <label>Besondere Hinweise
    <input type="text" name="r:r:1:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idcqnm" placeholder="z.B. Nähe zur U-Bahn" data-moz-autofill-type="reference-point">
    </label>
  </div>
  <div>
    <label>Straßenname
    <input type="text" name="r:r:2:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="idtm3a" placeholder="z.B. Hauptstraße" data-moz-autofill-type="address-streetname">
    </label>
  </div>
  <div>
    <label>Bezirk
    <input type="text" name="r:r:8:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idnd3" placeholder="z.B. Innere Stadt" data-moz-autofill-type="address-level3">
    </label>
  </div>
</form>

</fieldset></body></html>
