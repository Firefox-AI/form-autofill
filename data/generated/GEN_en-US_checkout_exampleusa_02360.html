<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-usa.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="addressLine1">Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apartment, Suite, etc. (Optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">ZIP Code</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="90210" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Los Angeles" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
