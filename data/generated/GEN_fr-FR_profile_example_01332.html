<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Nom de famille</label>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="additionalName">Nom supplémentaire</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Saisissez un nom supplémentaire (facultatif)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Surnom</label>
    <input type="text" name="nickname" id="nickname" placeholder="Votre surnom (facultatif)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="Vous@example.fr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="0123456789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organisation</label>
    <input type="text" name="organization" id="organization" placeholder="Nom de votre organisation (facultatif)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="organizationTitle">Titre au sein de l&#x27;organisation</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Votre titre (facultatif)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="bday">Date de naissance</label>
    <input type="text" name="bday" id="bday" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <button name="field" id="field" type="submit">Soumettre</button>
  </div>
</form>

</fieldset></body></html>
