<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentosemplice.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="cardholderName" id="idn1a" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <input type="number" name="card_number" id="idjt" placeholder="Inserisci il numero della carta" aria-label="Numero della carta" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="exp_month" id="idhsqp" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="id0s">Anno di scadenza</label>
    <select name="expYear" id="id0s" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label>Codice di sicurezza
    <input type="number" name="cardCode" id="idchxg5" placeholder="Tre cifre sul retro della carta" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label for="id65">Tipo di carta</label>
    <select name="cardType" id="id65" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Numero di partita IVA</span>
    <input type="text" name="vatId" id="id9pn4" placeholder="Inserisci il tuo numero di partita IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="id9cpe">Cognome in fonetico</label>
    <input type="text" name="idx78" id="id9cpe" placeholder="Inserisci il tuo cognome (fonetico)" data-moz-autofill-type="phonetic-family-name">
  </div>
</form>

</fieldset></body></html>
