<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekmarket.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorificPrefix">Sayın</label>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Bay</option>
  <option>Bayan</option>
  <option>Diğer</option>
</select>
  </div>
  <div>
    <label for="givenName">Adınız</label>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Soyadınız</label>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Sokak Adresi</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak adresinizi girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Apt/Daire No</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt veya Daire numaranızı girin (isteğe bağlı)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Şehir</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Şehrinizi seçin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Posta Kodu</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Ülke</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İtalya</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>Diğer</option>
</select>
  </div>
  <div>
    <label for="email">E-posta Adresi</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numarası</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel4">Mahalle</label>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Mahalle adını girin" data-moz-autofill-type="address-level4">
  </div>
  <div>
    <button name="field" id="field" type="submit">Devam Et</button>
  </div>
</form>

</fieldset></body></html>
