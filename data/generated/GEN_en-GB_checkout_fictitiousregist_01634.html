<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitiousregistry.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Search for a Registry" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Enter your email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Payment will be processed in a new window" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Enter the name as shown on the card" data-moz-autofill-type="cc-name">
  </div>
</form>

</fieldset></body></html>
