<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentosexemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome no cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="Nome completo como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Número do cartão</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Mês de expiração</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janeiro</option>
  <option>02 - Fevereiro</option>
  <option>03 - Março</option>
  <option>04 - Abril</option>
  <option>05 - Maio</option>
  <option>06 - Junho</option>
  <option>07 - Julho</option>
  <option>08 - Agosto</option>
  <option>09 - Setembro</option>
  <option>10 - Outubro</option>
  <option>11 - Novembro</option>
  <option>12 - Dezembro</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Ano de expiração</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Código de segurança</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Tipo de cartão</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
