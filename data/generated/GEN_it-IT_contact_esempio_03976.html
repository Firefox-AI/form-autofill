<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="name" id="idfabs" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="mail" id="id4m5" placeholder="mario.rossi@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numero di telefono</span>
    <input type="tel" name="telephone" id="idk7" placeholder="+39 06 12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="addr" id="idadutx" placeholder="Via Roma 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="city" id="idjy2" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postcode" id="idutks" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Seleziona il paese</span>
    <select name="countryName" id="idcy8l" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
</form>

</fieldset></body></html>
