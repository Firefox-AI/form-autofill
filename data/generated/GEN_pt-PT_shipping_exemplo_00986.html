<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idm16k">Nome completo</label>
    <input type="text" name="name" id="idm16k" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id98s">Endereço</label>
    <input type="text" name="street1" id="id98s" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id05za">Apartamento</label>
    <input type="text" name="flat" id="id05za" placeholder="Número do apartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idxexb3">Andar</label>
    <input type="text" name="etage" id="idxexb3" placeholder="Número do andar" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idjq71v">Cidade</label>
    <input type="text" name="town" id="idjq71v" placeholder="Digite sua cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ids4zqu">Código Postal</label>
    <input type="text" name="postalCode" id="ids4zqu" placeholder="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idact">País</label>
    <select name="country" id="idact" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Itália</option>
  <option>Reino Unido</option>
</select>
  </div>
</form>

</fieldset></body></html>
