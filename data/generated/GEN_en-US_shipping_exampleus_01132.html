<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-us.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idimwnf">First Name</label>
    <input type="text" name="givenName" id="idimwnf" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id5qwl">Last Name</label>
    <input type="text" name="lastName" id="id5qwl" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idxru67">Start by entering your city or postal code in the search bar, select a pickup point from the suggestions, and hit Enter to confirm your choice.</label>
    <input type="text" name="postcode" id="idxru67" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="iddhd8u">City</label>
    <input type="text" name="locality" id="iddhd8u" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idsd">Street Address</label>
    <input type="text" name="addressLine1" id="idsd" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id8c">Building / Floor / Apartment</label>
    <input type="text" name="addressLine2" id="id8c" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id1nmoq">Locality / Zone / Place</label>
    <input type="text" name="town" id="id1nmoq" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idnz">Country</label>
    <select name="country_id" id="idnz" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
</select>
  </div>
  <div>
    <label for="idm0">Phone Number</label>
    <input type="tel" name="phoneNumber" id="idm0" placeholder="+1 (555) 123-4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
