<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Etunimi
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label for="familyName">Sukunimi</label>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Anna sähköpostiosoitteesi" aria-label="Sähköposti" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Anna puhelinnumerosi" aria-label="Puhelinnumero" data-moz-autofill-type="tel">
  </div>
  <div>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
  <div>
    <span>Syntymäkuukausi</span>
    <select name="bdayMonth" id="bdayMonth" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Tammikuu</option>
  <option>Helmikuu</option>
  <option>Maaliskuu</option>
  <option>Huhtikuu</option>
  <option>Toukokuu</option>
  <option>Kesäkuu</option>
  <option>Heinäkuu</option>
  <option>Elokuu</option>
  <option>Syyskuu</option>
  <option>Lokakuu</option>
  <option>Marraskuu</option>
  <option>Joulukuu</option>
</select>
  </div>
  <div>
    <label for="bdayYear">Syntymävuosi</label>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2000</option>
  <option>1999</option>
  <option>1998</option>
  <option>1997</option>
  <option>1996</option>
  <option>1995</option>
  <option>1994</option>
  <option>1993</option>
  <option>1992</option>
  <option>1991</option>
  <option>1990</option>
  <option>1989</option>
  <option>1988</option>
  <option>1987</option>
  <option>1986</option>
  <option>1985</option>
  <option>1984</option>
  <option>1983</option>
  <option>1982</option>
  <option>1981</option>
  <option>1980</option>
</select>
  </div>
  <div>
    <span>Salasana</span>
    <input type="password" name="field" id="field" placeholder="Valitse salasana">
  </div>
</form>

</fieldset></body></html>
