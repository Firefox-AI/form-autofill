<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-forms.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Surname</label>
    <input type="text" name="familyName" id="familyName" placeholder="Surname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="First Name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="postalCodeAndCity">Postal Code / City</label>
    <input type="text" name="postalCodeAndCity" id="postalCodeAndCity" placeholder="Postal Code / City" data-moz-autofill-type="postal-code-and-city">
  </div>
  <div>
    <label for="street">Street Address, House Number</label>
    <input type="text" name="street" id="street" placeholder="123 Main St" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressExtra">Additional Address Information</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Apartment, Suite, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="name">Full Name</label>
    <input type="text" name="name" id="name" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="postalCodeAndCity">Postal Code / Municipality</label>
    <input type="text" name="postalCodeAndCity" id="postalCodeAndCity" placeholder="Postal Code / Municipality" data-moz-autofill-type="postal-code-and-city">
  </div>
  <div>
    <label for="street">Street Address, House Number</label>
    <input type="text" name="street" id="street" placeholder="123 Main St" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressExtra">Additional Address Information</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Apartment, Suite, etc." data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
