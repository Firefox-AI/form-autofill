<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via, numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">CAP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il tuo codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Regno Unito</option>
  <option>Spagna</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Es. nome@esempio.it" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Azienda (facoltativo)</label>
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="vatNumber">Partita IVA (facoltativo)</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Inserisci il tuo numero di partita IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="stair">Scala (se applicabile)</label>
    <input type="text" name="stair" id="stair" placeholder="Indica la scala se necessaria" data-moz-autofill-type="stair">
  </div>
  <div>
    <label for="field"></label>
    <input type="password" name="field" id="field">
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
