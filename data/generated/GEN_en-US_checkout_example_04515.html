<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>First Name *
    <input type="text" name="billing_first_name" id="idem" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name *
    <input type="text" name="lastName" id="idi2m" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Email Address *
    <input type="email" name="email" id="idoivph" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Phone Number *
    <input type="tel" name="tel" id="id44" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Street Address *
    <input type="text" name="address1" id="id8k94" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Address Line 2 (optional)
    <input type="text" name="address2" id="idegquv" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>ZIP Code *
    <input type="text" name="postcode" id="idrf" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
