<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Ad ve Soyad</label>
    <input type="text" name="name" id="name" placeholder="Adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-posta Adresi</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numarası</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Sokak Adresi</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak adresinizi girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Şehir</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Şehir adını girin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Posta Kodu</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="organization">Şirket Adı (varsa)</label>
    <input type="text" name="organization" id="organization" placeholder="Şirket adını girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="block">Blok (varsa)</label>
    <input type="text" name="block" id="block" placeholder="Blok numarasını girin" data-moz-autofill-type="block">
  </div>
</form>

</fieldset></body></html>
