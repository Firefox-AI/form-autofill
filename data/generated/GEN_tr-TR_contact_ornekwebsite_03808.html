<html><head>

<body>

<fieldset>
<h3>ornekwebsite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idchf">Ad ve Soyad</label>
    <input type="text" name="yourName" id="idchf" placeholder="Adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iddqnn">E-posta Adresi</label>
    <input type="email" name="email_address" id="iddqnn" placeholder="email@ornek.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idhlmru">Telefon Numarası</label>
    <input type="tel" name="phoneNumber" id="idhlmru" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id6k0">Adres</label>
    <input type="text" name="address" id="id6k0" placeholder="Sokak adı ve numarası" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idp86o">İlçe</label>
    <select name="city" id="idp86o" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Beyoğlu</option>
  <option>Kadıköy</option>
  <option>Şişli</option>
  <option>Beşiktaş</option>
  <option>Karaköy</option>
</select>
  </div>
  <div>
    <label for="idxkwdr">Posta Kodu</label>
    <input type="text" name="zip" id="idxkwdr" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id54p">Şirket Adı (varsa)</label>
    <input type="text" name="business" id="id54p" placeholder="Şirket adınızı belirtin" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id0v">Bina Bloku (varsa)</label>
    <input type="text" name="id7at" id="id0v" placeholder="Bina bloğunu belirtin" data-moz-autofill-type="block">
  </div>
</form>

</fieldset></body></html>
