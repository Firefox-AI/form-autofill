<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id8sz">Jméno a příjmení</label>
    <input type="text" name="fullName" id="id8sz" placeholder="Napište své jméno a příjmení" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idmjbp">E-mail</label>
    <input type="email" name="email_address" id="idmjbp" placeholder="Zadejte svůj e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id7sh">Telefonní číslo</label>
    <input type="tel" name="tel" id="id7sh" placeholder="Zadejte své telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id25">Ulice a číslo popisné</label>
    <input type="text" name="street4" id="id25" placeholder="Např. Hlavní 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idzuc">Město</label>
    <input type="text" name="locality5" id="idzuc" placeholder="Napište své město" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idva">PSČ</label>
    <input type="text" name="postalCode" id="idva" placeholder="Např. 100 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="idt21" id="id01j" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
