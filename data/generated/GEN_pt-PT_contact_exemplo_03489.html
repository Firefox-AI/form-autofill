<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="João Silva" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="exemplo@dominio.com" aria-label="Endereço de e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="912 345 678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Morada</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua das Flores 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Concelho
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Lisboa" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label for="postalCode">Código Postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="1000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
