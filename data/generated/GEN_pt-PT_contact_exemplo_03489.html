<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="contactName" id="id87ma" placeholder="João Silva" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idl62vo">Endereço de e-mail</label>
    <input type="email" name="email_address" id="idl62vo" placeholder="exemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="telephone" id="id4eow2" placeholder="(+351) 912 345 678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Morada</span>
    <input type="text" name="streetAddress" id="idnjsal" placeholder="Rua das Flores, 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Cidade
    <input type="text" name="locality" id="idida" placeholder="Lisboa" data-moz-autofill-type="address-level2">
    </label>
  </div>

  </div>

</fieldset></body></html>
