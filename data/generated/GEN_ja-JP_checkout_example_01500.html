<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="fname8" id="idtfkgv" placeholder="太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="surname7" id="id4zw" placeholder="山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>会社名（任意）</span>
    <input type="text" name="organization" id="idxnq" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="address1" id="idbw" placeholder="1-2-3 中央区" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>建物名・部屋番号（任意）</span>
    <input type="text" name="addr2" id="idux" placeholder="サンプルマンション101号" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="locality" id="id24z" placeholder="東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="postalCode" id="ida0v" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="country4" id="idsllbo" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>イギリス</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="email" id="idof" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="mobile" id="id5l7" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
