<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prenume</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nume</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Adresă de email</label>
    <input type="email" name="email" id="email" placeholder="Introduceti adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduceti numărul de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data nașterii</label>
    <input type="text" name="bday" id="bday" placeholder="Selectați data nașterii" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
