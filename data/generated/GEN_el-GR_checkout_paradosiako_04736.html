<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paradosiako.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επίθετο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Πληκτρολογήστε το επίθετό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Εταιρεία (προαιρετικά)</label>
    <input type="text" name="organization" id="organization" placeholder="Πληκτρολογήστε την εταιρεία σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Διεύθυνση</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Διεύθυνση γραμμής 2 (προαιρετικά)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Πρόσθετες λεπτομέρειες διεύθυνσης" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πληκτρολογήστε την πόλη σας" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Πληκτρολογήστε τον ταχυδρομικό σας κωδικό" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
</select>
  </div>
  <div>
    <label for="email">Διεύθυνση Email</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telAreaCode">Κωδικός Περιοχής</label>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="Πληκτρολογήστε τον κωδικό περιοχής" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Πληκτρολογήστε το τηλέφωνό σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Ολοκλήρωση Παραγγελίας</button>
  </div>
</form>

</fieldset></body></html>
