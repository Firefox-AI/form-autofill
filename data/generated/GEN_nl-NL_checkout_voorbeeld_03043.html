<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Voornaam</span>
    <input type="text" name="firstName" id="id8i84" placeholder="Voer je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Achternaam</span>
    <input type="text" name="lastName" id="id3o" placeholder="Voer je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="streetAddress" id="idibgw8" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="locality" id="id575" placeholder="Voer je stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="zipCode" id="idh1pa" placeholder="Voer je postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="idy82" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="idm9j3" placeholder="Voer je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="phoneNumber" id="idd8m" placeholder="Voer je telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Fonetische achternaam</span>
    <input type="text" name="idiq" id="idv5" placeholder="(optioneel)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="id0r9z" id="idk3gi" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
