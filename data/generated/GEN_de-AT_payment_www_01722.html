<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.fiktivewebsite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7yxo">Postleitzahl</label>
    <input type="text" name="zip_code" id="id7yxo" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idlk">Lieferadresse</label>
    <input type="text" name="postalCode" id="idlk" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id5c">Um den Kauf abzuschließen, geben Sie bitte Ihre E-Mail ein.</label>
    <input type="email" name="mail" id="id5c" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idz1jw6">E-Mail</label>
    <input type="email" name="emailAddress" id="idz1jw6" placeholder="E-Mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id02h1l">Vorname</label>
    <input type="text" name="firstName" id="id02h1l" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idy5fj">Nachname</label>
    <input type="text" name="surname" id="idy5fj" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id1w">Personalausweisnummer</label>
    <input type="text" name="taxId" id="id1w" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="ids532">Telefonnummer</label>
    <input type="tel" name="telephone" id="ids532" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idk0kq">Internationale Telefonnummer</label>
    <input type="tel" name="phoneNumber" id="idk0kq" placeholder="Internationale Vorwahl" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id3uoii">Unternehmensname</label>
    <input type="text" name="business" id="id3uoii" placeholder="Name Ihrer Firma" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idyu6">Lieferadresse</label>
    <input type="text" name="postalCode" id="idyu6" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
