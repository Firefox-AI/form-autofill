<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idn89o7">Nom</label>
    <input type="text" name="firstName" id="idn89o7" placeholder="El teu nom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="lname" id="idkd4e8" placeholder="El teu cognom" aria-label="Cognom" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Nom addicional</span>
    <input type="text" name="middle_name" id="idsc" placeholder="Nom addicional opcional" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label>Àlies
    <input type="text" name="nickname" id="idqmpyq" placeholder="El teu àlies" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label for="idmqd0e">Correu electrònic</label>
    <input type="email" name="email_address" id="idmqd0e" placeholder="El teu correu" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id3l">Telèfon</label>
    <input type="tel" name="mobile" id="id3l" placeholder="El teu telèfon" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idqb66j">Organització</label>
    <input type="text" name="organization" id="idqb66j" placeholder="Nom de l&#x27;organització" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idmzfi">Data de naixement</label>
    <input type="text" name="dateOfBirth" id="idmzfi" placeholder="Selecciona una data" data-moz-autofill-type="bday">
  </div>
  <div>
    <label>Nom fonètic
    <input type="text" name="idgw" id="id3m" placeholder="Fonèticament, com es pronuncia el teu nom" data-moz-autofill-type="phonetic-given-name">
    </label>
  </div>
  <div>
    <input type="password" name="idvo" id="id4p9" aria-label="Password">
  </div>
</form>

</fieldset></body></html>
