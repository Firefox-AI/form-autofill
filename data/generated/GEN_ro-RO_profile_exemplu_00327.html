<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceti prenumele" aria-label="Prenume" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceti numele de familie" aria-label="Nume de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Introduceti numele suplimentar (opțional)" aria-label="Nume suplimentar" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Introduceti o porecla (opțional)" aria-label="Poreclă" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Introduceti adresa de email" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Introduceti numărul de telefon" aria-label="Număr de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Introduceti numele organizației (opțional)" aria-label="Organizație" data-moz-autofill-type="organization">
  </div>
  <div>
    <select name="bday" id="bday" aria-label="Data nașterii" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Zi</option>
  <option>Lună</option>
  <option>An</option>
</select>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Introduceti parola" aria-label="Parolă">
  </div>
</form>

</fieldset></body></html>
