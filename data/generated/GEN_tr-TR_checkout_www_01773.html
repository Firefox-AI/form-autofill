<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.alisveris.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Adınız</span>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Soyadınız</span>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak, Apartman No, Daire No" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Şehir</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Posta Kodu</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ülke</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İtalya</option>
  <option>İspanya</option>
  <option>Amerika Birleşik Devletleri</option>
  <option>Birleşik Krallık</option>
</select>
  </div>
  <div>
    <span>E-posta Adresi</span>
    <input type="email" name="email" id="email" placeholder="Örneğin: ornek@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefon Numarası</span>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Şirket Adı (varsa)</span>
    <input type="text" name="organization" id="organization" placeholder="Şirket adınızı girin" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
