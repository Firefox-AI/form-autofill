<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idy0qt">Nome completo</label>
    <input type="text" name="contactName" id="idy0qt" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Endereço
    <input type="text" name="street1" id="idm8zv" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>CEP
    <input type="text" name="postalCode" id="id06s" placeholder="00000-000" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="idodf">Cidade</label>
    <input type="text" name="locality" id="idodf" placeholder="Nome da cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id9r">País</label>
    <select name="country" id="id9r" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Estados Unidos</option>
  <option>Canadá</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine2" id="idwtnq" placeholder="Apartamento, bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
