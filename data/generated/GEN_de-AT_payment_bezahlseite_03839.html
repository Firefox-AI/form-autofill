<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7o">Name auf der Karte</label>
    <input type="text" name="cardholderName" id="id7o" placeholder="Vor- und Nachname" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id27">Kreditkartennummer</label>
    <input type="number" name="cardNumber" id="id27" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idukw">Monat der Gültigkeit</label>
    <select name="ccExpMonth" id="idukw" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="idshp">Jahr der Gültigkeit</label>
    <select name="exp_year" id="idshp" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id248o">Sicherheitscode (CVC)</label>
    <input type="number" name="cvc" id="id248o" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idncy">Kartentyp</label>
    <select name="ccType" id="idncy" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <button name="idf3p" id="idhg7" type="submit">Zahlung bestätigen</button>
  </div>
</form>

</fieldset></body></html>
