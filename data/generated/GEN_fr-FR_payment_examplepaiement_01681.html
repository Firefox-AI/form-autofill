<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-paiement.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nom sur la carte
    <input type="text" name="r:r:1:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idpfax" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Numéro de carte
    <input type="number" name="r:r:7:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idp2ue" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Mois d&#x27;expiration
    <select name="r:r:2:m:r:3:cr:3:c:pr:1:container:fs:i:input" id="idy2lo" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janv.</option>
  <option>Févr.</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juil.</option>
  <option>Août</option>
  <option>Sept.</option>
  <option>Oct.</option>
  <option>Nov.</option>
  <option>Déc.</option>
</select>
    </label>
  </div>
  <div>
    <label>Année d&#x27;expiration
    <select name="r:r:4:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idtvh" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
    </label>
  </div>
  <div>
    <label>Cryptogramme
    <input type="number" name="r:r:6:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idkbt" placeholder="3 chiffres au dos" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Type de carte
    <select name="r:r:8:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idgn" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Diners Club</option>
</select>
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="r:r:2:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="id5mhb" placeholder="123 Rue de la Paix" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="r:r:7:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="id708" placeholder="75001" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
