<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko właściciela karty
    <input type="text" name="cardholderName" id="idkv35l" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Numer karty kredytowej
    <input type="number" name="cardNo" id="idvxq" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Miesiąc ważności
    <select name="exp_month" id="ida9" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Styczeń</option>
  <option>02 - Luty</option>
  <option>03 - Marzec</option>
  <option>04 - Kwiecień</option>
  <option>05 - Maj</option>
  <option>06 - Czerwiec</option>
  <option>07 - Lipiec</option>
  <option>08 - Sierpień</option>
  <option>09 - Wrzesień</option>
  <option>10 - Październik</option>
  <option>11 - Listopad</option>
  <option>12 - Grudzień</option>
</select>
    </label>
  </div>
  <div>
    <label>Rok ważności
    <select name="expYear" id="id3jw" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Kod zabezpieczający (CVC)
    <input type="number" name="csc" id="idf9" placeholder="123" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Typ karty
    <select name="cardType" id="idi351b" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
