<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempiosito.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="idi1" placeholder="Inserisci il nome come appare sulla carta" aria-label="Nome sulla carta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="address" id="idskb" placeholder="Via e numero civico" aria-label="Indirizzo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postcode" id="idyb" placeholder="Inserisci il codice postale" aria-label="Codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="locality" id="idnazi" placeholder="Inserisci la tua città" aria-label="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="state" id="idf42b8" aria-label="Provincia" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bari</option>
  <option>Verona</option>
</select>
  </div>
  <div>
    <select name="country" id="idvj" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Giappone</option>
  <option>Cina</option>
  <option>Australia</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <input type="text" name="vatId" id="idm4q55" placeholder="Inserisci la tua partita IVA" aria-label="Partita IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="tel" name="phone" id="idjapo" placeholder="Inserisci il tuo numero di telefono" aria-label="Telefono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
