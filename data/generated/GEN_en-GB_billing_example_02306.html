<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name*</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name*</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Street Address*</label>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressExtra">Address Line 2</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Additional Address Information" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postcode*</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">City/Town*</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
