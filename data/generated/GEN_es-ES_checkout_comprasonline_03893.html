<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>comprasonline.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre
    <input type="text" name="givenName" id="givenName" placeholder="Tu nombre" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Apellidos
    <input type="text" name="familyName" id="familyName" placeholder="Tus apellidos" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle y número" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Tu ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="postalCode" id="postalCode" placeholder="Tu código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>País
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
</select>
    </label>
  </div>
  <div>
    <label>Correo electrónico
    <input type="email" name="email" id="email" placeholder="Tu correo electrónico" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="tel" id="tel" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Provincia
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Cataluña</option>
  <option>Andalucía</option>
  <option>Valencia</option>
  <option>Galicia</option>
  <option>País Vasco</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
