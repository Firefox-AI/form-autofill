<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Име, изписано на картата" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Улица, номер на сградата" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Апартамент, етаж и др." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Град" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>София</option>
  <option>Пловдив</option>
  <option>Варна</option>
  <option>Бургас</option>
  <option>Стара Загора</option>
  <option>Русе</option>
  <option>Сливен</option>
  <option>Добрич</option>
  <option>Търговище</option>
  <option>Разград</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Германия</option>
  <option>Франция</option>
  <option>Италия</option>
  <option>Испания</option>
  <option>Великобритания</option>
  <option>САЩ</option>
  <option>Австралия</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Данъчен номер по ДДС" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Наименование на фирмата" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
