<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Email Address
    <input type="email" name="email" id="email" placeholder="you@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Country
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Spain</option>
</select>
    </label>
  </div>
  <div>
    <label>First Name
    <input type="text" name="givenName" id="givenName" placeholder="Your first name" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" placeholder="Your last name" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apartment, Suite, etc.
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt 4B (optional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Phone Country Code
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="+1" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="tel" id="tel" placeholder="(555) 555-5555" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
