<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Email Address
    <input type="email" name="email_address" id="iddks" placeholder="you@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="postalCode" id="idc9u96" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Country
    <select name="countryCode" id="idn5" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Spain</option>
</select>
    </label>
  </div>
  <div>
    <label>First Name
    <input type="text" name="firstName" id="idwarap" placeholder="Your first name" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="surname" id="id2ep" placeholder="Your last name" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="street1" id="idc530n" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apartment, Suite, etc.
    <input type="text" name="street2" id="id70il" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="town" id="idb41uw" placeholder="City" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="postcode" id="idtw" placeholder="Enter your ZIP code again" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Phone Country Code
    <input type="tel" name="phoneCountryCode" id="id1atye" placeholder="+1" data-moz-autofill-type="tel-country-code">
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="tel" id="ide7i" placeholder="(555) 123-4567" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
