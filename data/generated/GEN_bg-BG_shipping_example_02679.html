<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>

<form method="post">

  </div>
  <div>
    <input type="text" name="street1" id="idwdl" placeholder="Улица и номер" aria-label="Адрес" data-moz-autofill-type="address-line1">

  <div>
    <input type="text" name="postcode" id="id9bn" placeholder="Пощенски код" aria-label="Пощенски код" data-moz-autofill-type="postal-code">

    <input type="text" name="city" id="id0yi9n" placeholder="Община" aria-label="Община" data-moz-autofill-type="address-level2">

  <div>
    <select name="countryName" id="id3wp5" aria-label="Държава" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>

  <option>Франция</option>
  <option>Италия</option>

</select>
  </div>
  <div>
    <input type="text" name="address2" id="id6odq4" placeholder="Етаж, апартамент и др." aria-label="Допълнителна информация" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="neighborhood" id="idqwkc" placeholder="Град" aria-label="Град" data-moz-autofill-type="address-level3">
  </div>
