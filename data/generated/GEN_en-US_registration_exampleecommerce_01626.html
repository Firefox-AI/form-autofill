<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-ecommerce.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="organization">Company Name</label>
    <input type="text" name="organization" id="organization" placeholder="Enter your company name" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLine1">Street Address: Line 1</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Street Address: Line 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt, Suite, etc. (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel1">State</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">City</label>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="addressLevel2">Zip Code</label>
    <input type="number" name="addressLevel2" id="addressLevel2" placeholder="12345" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Country</label>
    <select name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
  <option>India</option>
  <option>China</option>
  <option>Japan</option>
  <option>Brazil</option>
  <option>South Africa</option>
</select>
  </div>
  <div>
    <label for="country">Phone Number</label>
    <input type="tel" name="country" id="country" placeholder="(123) 456-7890" data-moz-autofill-type="country">
  </div>
  <div>
    <label for="tel">Credit Card Number</label>
    <input type="number" name="tel" id="tel" placeholder="1234 5678 9012 3456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>

  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="ccExpMonth">Expiration Year</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>

  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="ccExpMonth">Expiration Date</label>
    <input type="text" name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Date</label>
    <input type="text" name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  </div>
  <div>
    <label for="ccExpMonth">Card Verification Number</label>
    <input type="number" name="ccExpMonth" id="ccExpMonth" placeholder="123" data-moz-autofill-type="cc-exp-month">
  </div>
  <div>
    <label for="ccCsc">Card Verification Number</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 digits on the back" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
