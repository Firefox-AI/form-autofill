<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoseguro.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no cartão</span>
    <input type="text" name="cardName1" id="idrwg2o" placeholder="Nome completo como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número do cartão</span>
    <input type="number" name="card_number" id="idcwtk3" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mês de validade</span>
    <select name="ccExpMonth" id="id1fc7d" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janeiro</option>
  <option>02 - Fevereiro</option>
  <option>03 - Março</option>
  <option>04 - Abril</option>
  <option>05 - Maio</option>
  <option>06 - Junho</option>
  <option>07 - Julho</option>
  <option>08 - Agosto</option>
  <option>09 - Setembro</option>
  <option>10 - Outubro</option>
  <option>11 - Novembro</option>
  <option>12 - Dezembro</option>
</select>
  </div>
  <div>
    <span>Ano de validade</span>
    <select name="ccExpYear" id="idumf" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Código de segurança (CVV)</span>
    <input type="number" name="cvv" id="idmcf" placeholder="Três ou quatro dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de cartão</span>
    <select name="cardType" id="idai" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Endereço de cobrança</span>
    <input type="text" name="addr9" id="ida5l" placeholder="Rua, número, complemento" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idvke04" id="id3q" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
