<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Anrede</span>
    <select name="salutation" id="id8l" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Herr</option>
  <option>Frau</option>
  <option>Diverse</option>
</select>
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="firstName" id="idi5z" placeholder="Ihr Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="surname" id="idlc" placeholder="Ihr Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="addr" id="idu5j" placeholder="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="locality" id="idv7xv" placeholder="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="idj8" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="idn5iy" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Vereinigte Staaten</option>
</select>
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="user_email" id="idrzn7" placeholder="Ihre E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="mobile" id="idgo00z" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
