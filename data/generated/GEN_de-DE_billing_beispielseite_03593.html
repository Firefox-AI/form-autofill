<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname *</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname *" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname *</label>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Strassenadresse *</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strassenadresse *" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressExtra">Adresszusatz</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="z.B. c/o, Wohnung 2" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postleitzahl *</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl *" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Bundesland *</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
</form>

</fieldset></body></html>
