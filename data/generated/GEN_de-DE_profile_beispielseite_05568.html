<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idd0r">Nachname | *</label>
    <input type="text" name="lastName" id="idd0r" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idd1q">Vorname | *</label>
    <input type="text" name="givenName" id="idd1q" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idnfe">E-Mail | *</label>
    <input type="email" name="mail" id="idnfe" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idzax5b">Telefonnummer | *</label>
    <input type="tel" name="mobile" id="idzax5b" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id6o">Postleitzahl | *</label>
    <input type="number" name="zipCode" id="id6o" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id12p5">Stadt | *</label>
    <input type="text" name="locality" id="id12p5" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyffc">Straße | *</label>
    <input type="text" name="address" id="idyffc" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idkytl">Name</label>
    <input type="text" name="contactName" id="idkytl" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idehqwk">Postleitzahl</label>
    <input type="number" name="zipCode" id="idehqwk" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id4e">Stadt</label>
    <input type="text" name="town" id="id4e" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idx8fx">Straße</label>
    <input type="text" name="address" id="idx8fx" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
