<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Name</label>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Straße</label>
    <input type="text" name="street" id="street" placeholder="Straßenname" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Hausnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Nummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Zusätzliche Adresse</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z.B. Wohnungsnummer oder Stiege" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt oder Ort" aria-label="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
