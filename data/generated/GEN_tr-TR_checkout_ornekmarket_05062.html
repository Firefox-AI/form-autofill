<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekmarket.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Adınız</label>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Soyadınız</label>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Şirket Adı (varsa)</label>
    <input type="text" name="organization" id="organization" placeholder="Şirketinizi girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel1">İl</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>İstanbul</option>
  <option>Ankara</option>
  <option>İzmir</option>
  <option>Bursa</option>
  <option>Bodrum</option>
  <option>Antalya</option>
</select>
  </div>
  <div>
    <label for="addressLevel2">İlçe</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="İlçenizi girin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="streetAddress">Adres</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Sokak, caddesi ve bina numarasını girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="postalCode">Posta Kodu</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="email">E-posta Adresi</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numarası</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
