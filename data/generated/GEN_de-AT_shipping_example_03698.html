<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Name</span>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Straße</span>
    <input type="text" name="street" id="street" placeholder="Straße eingeben" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Hausnummer</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Nr. eingeben" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Zusätzliche Adresszeile</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Z.B. c/o oder Unternehmensname" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl eingeben" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt eingeben" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Tschechische Republik</option>
</select>
  </div>
  <div>
    <span>Stockwerk</span>
    <input type="text" name="floor" id="floor" placeholder="Stockwerk (falls relevant)" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Wohnung</span>
    <input type="text" name="apartment" id="apartment" placeholder="Wohnungsnummer (falls vorhanden)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Stiege</span>
    <input type="text" name="stair" id="stair" placeholder="Stiege (falls relevant)" data-moz-autofill-type="stair">
  </div>
  <div>
    <span>Telefonvorwahl</span>
    <input type="text" name="telExtension" id="telExtension" placeholder="Vorwahl eingeben" data-moz-autofill-type="tel-extension">
  </div>
</form>

</fieldset></body></html>
