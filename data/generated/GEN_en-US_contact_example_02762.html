<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email Address</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Phone Number</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="addressLevel2">City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">ZIP Code</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="country">Country</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Greece</option>
</select>
  </div>
  <div>
    <label for="addressLine1">Street Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Street and Number" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apartment, Suite, etc. (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel1">State</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Ohio</option>
</select>
  </div>
  <div>
    <label for="organization">Organization Name</label>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="vatNumber">VAT Number</label>
    <input type="text" name="vatNumber" id="vatNumber" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="givenName">First Name (Re-enter)</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Last Name (Re-enter)</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Organization Name (Re-enter)</label>
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="country">Country/Region</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Cyprus</option>
  <option>Greece</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Germany</option>
</select>
  </div>
  <div>
    <label for="addressLine1">Street Address and Number</label>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apartment, Suite, Unit, etc. (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">City (Re-enter)</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">State (Re-enter)</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Ohio</option>
</select>
  </div>
  <div>
    <label for="postalCode">ZIP Code (Re-enter)</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
