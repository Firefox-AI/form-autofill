<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2b6">First Name</label>
    <input type="text" name="givenName" id="id2b6" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idnn">Last Name</label>
    <input type="text" name="billing_last_name" id="idnn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5f">Email Address</label>
    <input type="email" name="user_email" id="id5f" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idtxiso">Phone Number</label>
    <input type="tel" name="phoneNumber" id="idtxiso" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idkb">City</label>
    <input type="text" name="town" id="idkb" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idev">ZIP Code</label>
    <input type="text" name="postalCode" id="idev" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idsqhak">Country</label>
    <select name="country_id" id="idsqhak" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Greece</option>
</select>
  </div>
  <div>
    <label for="ida0">Street Address</label>
    <input type="text" name="addr1" id="ida0" placeholder="Street and Number" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idkpgb">Apartment, Suite, etc. (optional)</label>
    <input type="text" name="addr2" id="idkpgb" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idyjyf">State</label>
    <select name="region" id="idyjyf" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Ohio</option>
</select>
  </div>
  <div>
    <label for="idywya">Organization</label>
    <input type="text" name="company" id="idywya" placeholder="Company Name" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id9aoh">VAT Number</label>
    <input type="text" name="vatNumber" id="id9aoh" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idw4tf4">First Name (Re-enter)</label>
    <input type="text" name="first_name" id="idw4tf4" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id62">Last Name (Re-enter)</label>
    <input type="text" name="last_name" id="id62" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id0am">Organization (Re-enter)</label>
    <input type="text" name="companyName" id="id0am" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id3x6s">Country/Region</label>
    <select name="country_id" id="id3x6s" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Cyprus</option>
  <option>Greece</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Germany</option>
</select>
  </div>
  <div>
    <label for="idyl">Street Address and Number</label>
    <input type="text" name="address1" id="idyl" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id768s">Apartment, Suite, Unit, etc. (optional)</label>
    <input type="text" name="addressLine2" id="id768s" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ids9">City (Re-enter)</label>
    <input type="text" name="town" id="ids9" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idi8u">State (Re-enter)</label>
    <select name="region" id="idi8u" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>New York</option>
  <option>Illinois</option>
  <option>Ohio</option>
</select>
  </div>
  <div>
    <label for="ids04aq">ZIP Code (Re-enter)</label>
    <input type="text" name="zip_code" id="ids04aq" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
