<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Etunimi</label>
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sukunimi</label>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Sähköpostiosoite</label>
    <input type="email" name="email" id="email" placeholder="esimerkki@domeeni.fi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Puhelinnumero</label>
    <input type="tel" name="tel" id="tel" placeholder="+358 40 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Syntymäpäivä</label>
    <input type="text" name="bday" id="bday" placeholder="PP.KK.VVVV" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Organisaatio</label>
    <input type="text" name="organization" id="organization" placeholder="Työnantajan nimi (valinnainen)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="nickname">Kutsumanimi</label>
    <input type="text" name="nickname" id="nickname" placeholder="Lisää kutsumanimesi (valinnainen)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="field">Salasana</label>
    <input type="password" name="field" id="field" placeholder="Valitse salasana">
  </div>
</form>

</fieldset></body></html>
