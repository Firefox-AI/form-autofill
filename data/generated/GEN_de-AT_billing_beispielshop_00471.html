<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Karteninhaber</label>
    <input type="text" name="ccName" id="ccName" placeholder="Wie auf der Karte angegeben" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="z.B. Hauptstraße 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Zusätzliche Adresse</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z.B. Wohnung, Suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Stadt oder Gemeinde" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Bundesland</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
  <option>USA</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
