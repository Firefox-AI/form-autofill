<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Country*</span>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
</select>
  </div>
  <div>
    <span>First Name*</span>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name*</span>
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Name*</span>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House Number*</span>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Enter your house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Address Line 2</span>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Apt, Unit, Suite, Building, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Postal Code*</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Enter your postal code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City*</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Date of Birth*</span>
    <input type="text" name="bday" id="bday" placeholder="MM/DD/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Phone Number*</span>
    <input type="tel" name="tel" id="tel" placeholder="(XXX) XXX-XXXX" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Email Address*</span>
    <input type="email" name="email" id="email" placeholder="Enter your email" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
