<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Country*</span>
    <select name="countryCode" id="idibdl" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <span>First Name*</span>
    <input type="text" name="firstName" id="idly" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name*</span>
    <input type="text" name="surname" id="id7dw" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Name*</span>
    <input type="text" name="strasse" id="id5pmu" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House Number*</span>
    <input type="number" name="hausnummer" id="idyn0aa" placeholder="Enter your house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Address Line 2</span>
    <input type="text" name="idgf" id="idcyp" placeholder="Apt, Suite, etc." data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Postal Code*</span>
    <input type="text" name="zip" id="idf8" placeholder="Enter your postal code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City*</span>
    <input type="text" name="town" id="idp2g" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Date of Birth*</span>
    <input type="text" name="birthday" id="idrxjp" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Phone Number*</span>
    <input type="tel" name="phone" id="idv1fkc" placeholder="(XXX) XXX-XXXX" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Email Address*</span>
    <input type="email" name="mail" id="idt9xyk" placeholder="Enter your email address" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
