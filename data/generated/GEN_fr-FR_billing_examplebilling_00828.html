<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-billing.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom sur la carte</span>
    <input type="text" name="ccName" id="ccName" placeholder="John Doe" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Rue de l&#x27;Exemple" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Complément d&#x27;adresse</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Région</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Martinique</option>
  <option>Guadeloupe</option>
  <option>La Réunion</option>
  <option>Guyane</option>
</select>
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Portugal</option>
  <option>Royaume-Uni</option>
  <option>États-Unis</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Numéro de TVA</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="FR12345678901" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Société</span>
    <input type="text" name="organization" id="organization" placeholder="Votre entreprise" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
