<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Título</span>
    <select name="title" id="idkcna" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
  </div>
  <div>
    <span>Nombre</span>
    <input type="text" name="firstName" id="idp2" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apellido</span>
    <input type="text" name="lastName" id="id9gfe" placeholder="Tu apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="street" id="idrxmm" placeholder="Calle, número, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="locality" id="idod9" placeholder="Tu ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Provincia</span>
    <input type="text" name="neighborhood" id="idip" placeholder="Tu provincia" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip" id="idqnwhz" placeholder="CP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="id9a" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="user_email" id="idfmn" placeholder="tucorreo@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="idbj" placeholder="Tu teléfono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
