<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowa-strona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Imię</label>
    <input type="text" name="givenName" id="givenName" placeholder="Twoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nazwisko</label>
    <input type="text" name="familyName" id="familyName" placeholder="Twoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Drugie imię</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Dodatkowe imię (jeśli dotyczy)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Pseudonim</label>
    <input type="text" name="nickname" id="nickname" placeholder="Twój pseudonim" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Twój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Numer telefonu</label>
    <input type="tel" name="tel" id="tel" placeholder="Numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organizacja</label>
    <input type="text" name="organization" id="organization" placeholder="Nazwa organizacji (jeśli dotyczy)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Data urodzenia</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="phoneticFamilyName">Fonetyczne nazwisko</label>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Fonetyczne nazwisko" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <label for="phoneticName">Fonetyczne imię</label>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Fonetyczne imię" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <label for="field">Hasło</label>
    <input type="password" name="field" id="field">
  </div>
</form>

</fieldset></body></html>
