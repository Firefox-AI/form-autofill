<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn
    <input type="text" name="name" id="id9rc" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="addr1" id="idz1y" placeholder="Gade og husnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="zip" id="idwtxv9" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="city" id="idxl71" placeholder="Byens navn" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="country" id="idsy3e" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
    </label>
  </div>
  <div>
    <label>Lejlighed
    <input type="text" name="flat" id="idvp1zz" placeholder="Lejlighedsnummer (hvis relevant)" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Mærkepunkt
    <input type="text" name="idetz" id="idnu" placeholder="Nærmeste kendte sted" data-moz-autofill-type="reference-point">
    </label>
  </div>
</form>

</fieldset></body></html>
