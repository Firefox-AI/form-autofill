<html><head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcna">カード名義人</label>

  <div>

    <select name="id9fy4" id="idvo" data-moz-autofill-type="cc-exp-month">

  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>

  <option>11</option>

</select>
  </div>
  <div>

  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>

  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="idaos">セキュリティコード</label>
    <input type="number" name="id7ky" id="idaos" placeholder="カード裏面の3桁の番号" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ida0">カード種類</label>

</select>
  </div>
  <div>
    <label for="id9llrv">住所</label>
    <input type="text" name="id7uf" id="id9llrv" placeholder="例）東京都千代田区1-1-1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="iddc">身分証明書番号</label>
    <input type="text" name="idw5" id="iddc" placeholder="例）123456789012" data-moz-autofill-type="id-number">
  </div>
</form>

</fieldset></body></html>
