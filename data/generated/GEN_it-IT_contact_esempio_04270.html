<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbaa">Nome e Cognome</label>
    <input type="text" name="name" id="idbaa" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idy1kx">Email</label>
    <input type="email" name="email" id="idy1kx" placeholder="esempio@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idqkjs">Telefono</label>
    <input type="tel" name="telephone" id="idqkjs" placeholder="+39 012 345 6789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id98eem">Indirizzo</label>
    <input type="text" name="street" id="id98eem" placeholder="Via Roma, 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idpd">Città</label>
    <input type="text" name="locality" id="idpd" placeholder="Milano" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idmm">CAP</label>
    <input type="text" name="zip_code" id="idmm" placeholder="20100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id4806q">Paese</label>
    <select name="countryName" id="id4806q" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="id0zq">Interno</label>
    <input type="text" name="idgs" id="id0zq" placeholder="A" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="iddv" id="idj6" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
