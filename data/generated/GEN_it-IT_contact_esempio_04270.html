<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome e Cognome</label>
    <input type="text" name="name" id="name" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="esempio@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="+39 012 345 6789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Indirizzo</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via Roma, 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Milano" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">CAP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="20100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="block">Interno</label>
    <input type="text" name="block" id="block" placeholder="A" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
