<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre</span>
    <input type="text" name="given_name_8789" id="given_name_7453" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="family_name_4652" id="family_name_4475" placeholder="Introduce tu apellido" aria-label="Apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="street_address_8459">Dirección</label>
    <input type="text" name="street_address_3827" id="street_address_8459" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="building_9889" id="building_7993" placeholder="Nombre del edificio (opcional)" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="address_level2_2233">Ciudad</label>
    <input type="text" name="address_level2_9816" id="address_level2_2233" placeholder="Introduce tu ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postal_code_2918">Código postal</label>
    <input type="text" name="postal_code_4139" id="postal_code_2918" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>País
    <select name="country_name_2910" id="country_name_8205" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
    </label>
  </div>
  <div>
    <label for="email_5699">Correo electrónico</label>
    <input type="email" name="email_2896" id="email_5699" placeholder="ejemplo@correo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <select name="tel_country_code_6778" id="tel_country_code_372" aria-label="Código de país" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+34</option>
  <option>+33</option>
  <option>+49</option>
  <option>+39</option>
  <option>+44</option>
</select>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="tel_2782" id="tel_8780" placeholder="Número de teléfono" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
