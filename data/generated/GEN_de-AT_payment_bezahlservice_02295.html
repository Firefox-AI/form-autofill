<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlservice.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Name auf der Kreditkarte
    <input type="text" name="ccName" id="ccName" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="ccNumber">Kreditkartennummer</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label>Monat der Gültigkeit
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
    </label>
  </div>
  <div>
    <label for="ccExpYear">Jahr der Gültigkeit</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Sicherheitscode (CVC)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label>Straße und Hausnummer
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Musterstraße 1" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="1010" aria-label="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Zusätzliche Adresse (optional)
    <input type="text" name="addressExtra" id="addressExtra" placeholder="z.B. Apartmentnummer" data-moz-autofill-type="address-extra">
    </label>
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Maks Mustermans" aria-label="Phonetischer Vorname (optional)" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
