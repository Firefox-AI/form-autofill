<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>bezahlservice.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Name des Karteninhabers
    <input type="text" name="cardholderName" id="idlx9" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <input type="number" name="cardNo" id="idau6i2" placeholder="1234 5678 9012 3456" aria-label="Kreditkartennummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="idrarko" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="id54bi">Jahr der Gültigkeit</label>
    <select name="ccExpYear" id="id54bi" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <input type="number" name="csc" id="idl4z" placeholder="123" aria-label="Sicherheitscode (CVC)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id6yv">Kreditkartenart</label>
    <select name="ccType" id="id6yv" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="street" id="ida8c" placeholder="Musterstraße 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zip" id="idj4u" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Zusatzinformation (optional)
    <input type="text" name="idcda" id="idz3fo" placeholder="z.B. Wohnung, Etage" data-moz-autofill-type="address-extra">
    </label>
  </div>
  <div>
    <label for="idx9">Phonetischer Vorname (optional)</label>
    <input type="text" name="idmfdx" id="idx9" placeholder="Mak Muster" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
