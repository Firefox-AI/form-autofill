<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbgn0">Kaartnaam</label>
    <input type="text" name="ccName" id="idbgn0" placeholder="Naam zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idjpiu">Adres</label>
    <input type="text" name="addressLine1" id="idjpiu" placeholder="Straat en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idbri">Postcode</label>
    <input type="text" name="postalCode" id="idbri" placeholder="Bijvoorbeeld 1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idk2pbk">Plaats</label>
    <input type="text" name="town" id="idk2pbk" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idtu">Provincie</label>
    <select name="province" id="idtu" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Utrecht</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <label for="idysc">Land</label>
    <select name="country" id="idysc" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
  <option>Spanje</option>
  <option>Italië</option>
</select>
  </div>
  <div>
    <label for="iddx">Appartement</label>
    <input type="text" name="apartment" id="iddx" placeholder="Optioneel, bijvoorbeeld A of 2B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idatra" id="idaxcn" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
