<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Naam op de kaart</label>
    <input type="text" name="ccName" id="ccName" placeholder="Bijv. Jan Jansen" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccType">Kaarttype</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <label for="ccNumber">Kaartnummer</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Vervaldatum (maand)</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Januari</option>
  <option>02 - Februari</option>
  <option>03 - Maart</option>
  <option>04 - April</option>
  <option>05 - Mei</option>
  <option>06 - Juni</option>
  <option>07 - Juli</option>
  <option>08 - Augustus</option>
  <option>09 - September</option>
  <option>10 - Oktober</option>
  <option>11 - November</option>
  <option>12 - December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Vervaldatum (jaar)</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">CVC</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3-cijferige code" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="addressLine1">Adres</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Straat en huisnummer" data-moz-autofill-type="address-line1">
  </div>
</form>

</fieldset></body></html>
