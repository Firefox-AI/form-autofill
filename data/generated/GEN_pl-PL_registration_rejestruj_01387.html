<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>rejestruj.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Wpisz swoje imię" aria-label="Imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Wpisz swoje nazwisko" aria-label="Nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Wpisz swój adres e-mail" aria-label="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Wpisz swój numer telefonu" aria-label="Numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Wybierz swoją datę urodzenia" aria-label="Data urodzenia" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Wpisz swój pseudonim" aria-label="Pseudonim" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="password" name="field" id="field" aria-label="Hasło">
  </div>
</form>

</fieldset></body></html>
