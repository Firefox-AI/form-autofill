<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno a příjmení</span>
    <input type="text" name="name" id="name" placeholder="Jan Novák" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ulice</span>
    <input type="text" name="street" id="street" placeholder="Hlavní ulice" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Číslo popisné</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Další adresa (pokud je potřeba)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Název budovy" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="123 45" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Město</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Země</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Polsko</option>
  <option>Německo</option>
  <option>Rakousko</option>
</select>
  </div>
  <div>
    <span>Poschodí</span>
    <input type="text" name="floor" id="floor" placeholder="2" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Číslo bytu</span>
    <input type="text" name="apartment" id="apartment" placeholder="A12" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Další informace (např. interkom)</span>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Zvonit na 12" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
