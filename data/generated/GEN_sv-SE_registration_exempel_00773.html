<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Förnamn
    <input type="text" name="givenName" id="givenName" placeholder="Skriv ditt förnamn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Efternamn
    <input type="text" name="familyName" id="familyName" placeholder="Skriv ditt efternamn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-postadress
    <input type="email" name="email" id="email" placeholder="exempel@domain.se" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="tel" placeholder="Skriv ditt telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Födelsedatum
    <input type="text" name="bday" id="bday" placeholder="DD/MM/ÅÅÅÅ" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Organisation (valfritt)
    <input type="text" name="organization" id="organization" placeholder="Skriv din organisationsnamn" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Lösenord
    <input type="password" name="field" id="field" placeholder="Välj ett lösenord">
    </label>
  </div>
</form>

</fieldset></body></html>
