<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Förnamn
    <input type="text" name="first_name" id="idmnffa" placeholder="Skriv ditt förnamn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Efternamn
    <input type="text" name="billing_last_name" id="idycos" placeholder="Skriv ditt efternamn" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-postadress
    <input type="email" name="email" id="idecs30" placeholder="exempel@domain.se" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="phoneNumber" id="idnu44o" placeholder="Skriv ditt telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Födelsedatum
    <input type="text" name="birthday" id="id6h" placeholder="DD/MM/ÅÅÅÅ" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Organisation (valfritt)
    <input type="text" name="companyName" id="idm9" placeholder="Skriv din organisationsnamn" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Lösenord
    <input type="password" name="idym" id="id6i">
    </label>
  </div>
</form>

</fieldset></body></html>
