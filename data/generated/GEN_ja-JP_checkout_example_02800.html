<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="firstName" id="id16" placeholder="山田" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="billing_last_name" id="idon" placeholder="太郎" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>住所1</span>
    <input type="text" name="addressLine1" id="id9dp" placeholder="1-2-3 新宿" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>都道府県</span>
    <select name="stateProvince" id="idx8khw" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>北海道</option>
  <option>青森県</option>
  <option>岩手県</option>
  <option>宮城県</option>
  <option>秋田県</option>
  <option>山形県</option>
  <option>福島県</option>
  <option>茨城県</option>
  <option>栃木県</option>
  <option>群馬県</option>
  <option>埼玉県</option>
  <option>千葉県</option>
  <option>東京都</option>
  <option>神奈川県</option>
  <option>新潟県</option>
  <option>富山県</option>
  <option>石川県</option>
  <option>福井県</option>
  <option>山梨県</option>
  <option>長野県</option>
  <option>岐阜県</option>
  <option>静岡県</option>
  <option>愛知県</option>
  <option>三重県</option>
  <option>滋賀県</option>
  <option>京都府</option>
  <option>大阪府</option>
  <option>兵庫県</option>
  <option>奈良県</option>
  <option>和歌山県</option>
  <option>鳥取県</option>
  <option>島根県</option>
  <option>岡山県</option>
  <option>広島県</option>
  <option>山口県</option>
  <option>徳島県</option>
  <option>香川県</option>
  <option>愛媛県</option>
  <option>高知県</option>
  <option>福岡県</option>
  <option>佐賀県</option>
  <option>長崎県</option>
  <option>熊本県</option>
  <option>大分県</option>
  <option>宮崎県</option>
  <option>鹿児島県</option>
  <option>沖縄県</option>
</select>
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="town" id="idc8yd" placeholder="新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="zip_code" id="idyg5" placeholder="100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="country" id="idxc7b" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="email" id="idft1hj" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="phone" id="id7xk3c" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>住所2</span>
    <input type="text" name="addressLine2" id="idwkzv" placeholder="マンション名・部屋番号" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>その他の情報</span>
    <input type="text" name="id32" id="ido4" placeholder="例: 特記事項" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
