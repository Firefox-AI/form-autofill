<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idu5">Nome no cartão</label>
    <input type="text" name="cardholderName" id="idu5" placeholder="Digite o nome como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ideh">Número do cartão</label>
    <input type="number" name="cardNo" id="ideh" placeholder="Digite o número do cartão" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id72c">Tipo do cartão</label>
    <select name="ccType" id="id72c" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idws">Mês de validade</label>
    <select name="ccExpMonth" id="idws" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janeiro</option>
  <option>02 - Fevereiro</option>
  <option>03 - Março</option>
  <option>04 - Abril</option>
  <option>05 - Maio</option>
  <option>06 - Junho</option>
  <option>07 - Julho</option>
  <option>08 - Agosto</option>
  <option>09 - Setembro</option>
  <option>10 - Outubro</option>
  <option>11 - Novembro</option>
  <option>12 - Dezembro</option>
</select>
  </div>
  <div>
    <label for="idelz">Ano de validade</label>
    <select name="exp_year" id="idelz" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id588">Código de segurança</label>
    <input type="number" name="cardCode" id="id588" placeholder="3 ou 4 dígitos do código de segurança" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idvfq">Endereço</label>
    <input type="text" name="street" id="idvfq" placeholder="Rua, número, apartamento" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
