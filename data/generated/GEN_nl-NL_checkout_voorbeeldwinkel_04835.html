<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Voornaam</span>
    <input type="text" name="givenName" id="givenName" placeholder="Voer uw voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Achternaam</span>
    <input type="text" name="familyName" id="familyName" placeholder="Voer uw achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Voer uw stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Verenigd Koninkrijk</option>
  <option>Frankrijk</option>
</select>
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="email" placeholder="jouw@email.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="06-12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Bedrijfsnaam (optioneel)</span>
    <input type="text" name="organization" id="organization" placeholder="Voer uw bedrijfsnaam in" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
