<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paiementexemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idrlik">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="idrlik" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id05">Numéro de la carte</label>
    <input type="number" name="ccNumber" id="id05" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idtb">Mois d’expiration</label>
    <select name="expMonth6" id="idtb" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <label for="idpo">Année d’expiration</label>
    <select name="exp_year9" id="idpo" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idfja0k">Cryptogramme visuel</label>
    <input type="number" name="csc" id="idfja0k" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idkg9">Type de carte</label>
    <select name="ccType4" id="idkg9" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idu7ci">Code postal</label>
    <input type="text" name="zip" id="idu7ci" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
