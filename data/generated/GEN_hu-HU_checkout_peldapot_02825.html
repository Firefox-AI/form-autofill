<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>peldapot.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idx7">Keresztnév</label>
    <input type="text" name="firstName" id="idx7" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id09l">Vezetéknév</label>
    <input type="text" name="lastName" id="id09l" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idyi">Cég neve</label>
    <input type="text" name="business" id="idyi" placeholder="Írd be a cég nevét (ha van)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id4yox">Utca és házszám</label>
    <input type="text" name="streetAddress" id="id4yox" placeholder="Írd be az utcát és házszámot" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id4tnh">Város</label>
    <input type="text" name="city" id="id4tnh" placeholder="Írd be a várost" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idi8sb">Irányítószám</label>
    <input type="text" name="zip_code" id="idi8sb" placeholder="Írd be az irányítószámot" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvtwy3">Ország</label>
    <select name="countryName" id="idvtwy3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Magyarország</option>
  <option>Ausztria</option>
  <option>Szlovákia</option>
  <option>Románia</option>
  <option>Szerbia</option>
  <option>Horvátország</option>
  <option>Szlovénia</option>
  <option>Csehország</option>
  <option>Németország</option>
  <option>Franciaország</option>
</select>
  </div>
  <div>
    <label for="idai20">E-mail cím</label>
    <input type="email" name="user_email" id="idai20" placeholder="Írd be az e-mail címed" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ide0p8">Telefonszám</label>
    <input type="tel" name="phone" id="ide0p8" placeholder="Írd be a telefonszámod" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="iddqq">Születési hónap</label>
    <select name="dobMonth" id="iddqq" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idthp">Referencia pont (pl. közel a bevásárlóközponthoz)</label>
    <input type="text" name="idmwznr" id="idthp" placeholder="Írd be a referencia pontot (opcionális)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <button name="idx2nkb" id="ids8kw5" type="submit">Küldés</button>
  </div>
</form>

</fieldset></body></html>
