<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Flat &amp; Floor No. / House No. (Required)" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Building / Development Name (Required)" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Street Name / Landmark" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Directions to Location" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Given Name (Required)" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Surname (Required)" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Phone Number (Required)" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
