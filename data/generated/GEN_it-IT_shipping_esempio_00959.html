<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idmqt62">Nome e Cognome</label>
    <input type="text" name="fullName" id="idmqt62" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idcol">Indirizzo</label>
    <input type="text" name="street16" id="idcol" placeholder="Via Roma 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id725">CAP</label>
    <input type="text" name="zip" id="id725" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idt7c">Città</label>
    <input type="text" name="locality" id="idt7c" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idgfj">Paese</label>
    <select name="countryName7" id="idgfj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="id2omc">Edificio (opzionale)</label>
    <input type="text" name="id681" id="id2omc" placeholder="Palazzina A" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idcswv3">Provincia</label>
    <input type="text" name="district" id="idcswv3" placeholder="RM" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
