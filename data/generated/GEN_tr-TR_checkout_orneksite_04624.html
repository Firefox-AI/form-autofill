<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>orneksite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2dp">Adınız</label>
    <input type="text" name="firstName" id="id2dp" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idar6">Soyadınız</label>
    <input type="text" name="surname" id="idar6" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idc6ev9">Adres</label>
    <input type="text" name="addr" id="idc6ev9" placeholder="Sokak, cadde veya mahalle adı" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idnyvy">Şehir</label>
    <input type="text" name="locality9" id="idnyvy" placeholder="Şehir adını girin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idxfgh">Posta Kodu</label>
    <input type="text" name="postalCode8" id="idxfgh" placeholder="Posta kodunu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxtv1">Ülke</label>
    <select name="countryName" id="idxtv1" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İspanya</option>
  <option>İtalya</option>
</select>
  </div>
  <div>
    <label for="id90">E-posta Adresi</label>
    <input type="email" name="mail" id="id90" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id94f">Telefon Numarası</label>
    <input type="tel" name="phoneNumber" id="id94f" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idllx">Şirket Adı (varsa)</label>
    <input type="text" name="company" id="idllx" placeholder="Şirket adınızı girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="idpw" id="idwcbo" type="submit">Devam Et</button>
  </div>
</form>

</fieldset></body></html>
