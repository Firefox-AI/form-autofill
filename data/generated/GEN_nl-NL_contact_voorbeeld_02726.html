<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Volledige naam</label>
    <input type="text" name="name" id="name" placeholder="Vul hier uw volledige naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-mailadres</label>
    <input type="email" name="email" id="email" placeholder="jij@voorbeeld.nl" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefoonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="06-12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straatnaam 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Stad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressExtra">Extra adresinformatie (optioneel)</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Bijv. appartement, verdieping" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
