<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7i5">Nome e cognome</label>
    <input type="text" name="nameOnCard" id="id7i5" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id3njn8">Azienda</label>
    <input type="text" name="organization" id="id3njn8" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idyyb">Indirizzo</label>
    <input type="text" name="street" id="idyyb" placeholder="Via Roma 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id3zaom">Comune</label>
    <input type="text" name="city" id="id3zaom" placeholder="Nome del comune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idnr">Codice postale</label>
    <input type="text" name="zipCode" id="idnr" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id013p">Provincia</label>
    <select name="county" id="id013p" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Torino</option>
  <option>Firenze</option>
  <option>Napoli</option>
  <option>Bologna</option>
  <option>Genova</option>
  <option>Palermo</option>
  <option>Barbate</option>
  <option>Catania</option>
</select>
  </div>
  <div>
    <label for="iddc">Nazione</label>
    <select name="countryName" id="iddc" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
  <option>Australia</option>
  <option>Giappone</option>
  <option>Cina</option>
</select>
  </div>
</form>

</fieldset></body></html>
