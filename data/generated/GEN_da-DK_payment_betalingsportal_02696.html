<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalingsportal.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idy3h">Navn på kortet</label>
    <input type="text" name="cardholderName" id="idy3h" placeholder="Indtast navn som det vises på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idblcq">Kreditkortnummer</label>
    <input type="number" name="card_number" id="idblcq" placeholder="Indtast dit kreditkortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idrx70">Udløbs måned</label>
    <select name="expMonth" id="idrx70" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idpv">Udløbs år</label>
    <select name="ccExpYear6" id="idpv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idqjkb">CVV/CVC</label>
    <input type="number" name="cvv" id="idqjkb" placeholder="Indtast de 3 cifre bag på kortet" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idly">Korttype</label>
    <select name="cardType8" id="idly" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
