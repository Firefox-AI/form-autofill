<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Lütfen adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="example@ornek.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefon Numarası</span>
    <input type="tel" name="tel" id="tel" placeholder="(555) 123 45 67" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Cadde ve Sokak</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Lütfen adresinizi girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Şehir
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Şehir adı" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Posta kodunuzu girin" aria-label="Posta Kodu" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Ülke
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>Kanada</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
