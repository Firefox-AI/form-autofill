<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="id71" placeholder="Lütfen adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <label>E-posta Adresi
    <input type="email" name="user_email" id="idzhz" placeholder="example@ornek.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label for="idfl">Telefon Numarası</label>
    <input type="tel" name="phone" id="idfl" placeholder="(555) 123 45 67" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idf8">Cadde ve Sokak</label>
    <input type="text" name="addr" id="idf8" placeholder="Lütfen adresinizi girin" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Şehir</span>
    <input type="text" name="town" id="idveps" placeholder="Şehir adı" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Posta Kodu
    <input type="text" name="postalCode" id="id264yh" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <select name="countryName" id="idbnexw" aria-label="Ülke" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>Kanada</option>
</select>
  </div>
</form>

</fieldset></body></html>
