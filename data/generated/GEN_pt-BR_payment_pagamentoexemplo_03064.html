<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoexemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardName" id="idgeg" placeholder="Nome completo como no cartão" aria-label="Nome do titular do cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="iddl4" placeholder="XXXX-XXXX-XXXX-XXXX" aria-label="Número do cartão" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="id9v" aria-label="Mês de validade" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="idakno" aria-label="Ano de validade" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <input type="number" name="csc" id="idaz" placeholder="Últimos 3 dígitos do cartão" aria-label="Código de segurança" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="id26o" aria-label="Tipo do cartão" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="addr" id="idea" placeholder="Rua, número, complemento" aria-label="Endereço" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postcode" id="id7msdk" placeholder="XXXXX-XXX" aria-label="CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="id8r" id="id4kv" placeholder="Sobrenome como deve ser pronunciado" aria-label="Sobrenome (fonético)" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="id2hvyc" id="idc36" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
