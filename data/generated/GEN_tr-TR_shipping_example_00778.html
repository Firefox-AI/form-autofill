<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhdpl">Ad ve Soyad</label>
    <input type="text" name="fullName" id="idhdpl" placeholder="Adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="iduw4">Adres</label>
    <input type="text" name="street1" id="iduw4" placeholder="Sokak adı ve numarası" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id3lfk">Posta Kodu</label>
    <input type="text" name="zip" id="id3lfk" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id8fs">Şehir</label>
    <input type="text" name="locality" id="id8fs" placeholder="Şehir adı" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idc6x5">Ülke</label>
    <select name="countryName" id="idc6x5" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>İtalya</option>
</select>
  </div>
  <div>
    <label for="idz37">Ek Adres (isteğe bağlı)</label>
    <input type="text" name="street2" id="idz37" placeholder="Apartman, daire gibi ek bilgiler" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idbryh">Daire No</label>
    <input type="text" name="flat" id="idbryh" placeholder="Daire numarasını girin" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idsn806">Bina Adı</label>
    <input type="text" name="idyput3" id="idsn806" placeholder="Bina adını girin" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idmaa">Referans Noktası</label>
    <input type="text" name="id5c3wk" id="idmaa" placeholder="Tanıdık bir yer belirtin (örneğin, marketin yanındaki bina)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="idha">İlçe</label>
    <input type="text" name="neighborhood" id="idha" placeholder="İlçe adı" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
