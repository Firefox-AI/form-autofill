<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>примеренсайт.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Име</label>
    <input type="text" name="name" id="name" placeholder="Вашето име" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Улица</label>
    <input type="text" name="street" id="street" placeholder="Име на улицата" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Номер</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Номер на сградата" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Допълнителна информация</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Апартамент, етаж и др." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Пощенски код</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Град</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Град" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Държава</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>България</option>
  <option>Австрия</option>
  <option>Белгия</option>
  <option>Великобритания</option>
  <option>Германия</option>
  <option>Гърция</option>
  <option>Италия</option>
  <option>Испания</option>
  <option>Португалия</option>
  <option>Франция</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Изпрати</button>
  </div>
</form>

</fieldset></body></html>
