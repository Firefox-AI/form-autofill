<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>お名前</span>
    <input type="text" name="id0ub" id="id5kju" placeholder="例: 山田 太郎" data-moz-autofill-type="name">
  </div>
  <div>
    <span>都道府県</span>
    <input type="text" name="idjd" id="idffiax" placeholder="例: 東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="id5jx" id="idadx" placeholder="例: 123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>番地</span>
    <input type="text" name="id0n6" id="idka8" placeholder="例: 1-2-3" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>町名・通り名</span>
    <input type="text" name="idlvg" id="idybq" placeholder="例: 本町" data-moz-autofill-type="street">
  </div>
  <div>
    <span>建物名</span>
    <input type="text" name="idf5t" id="idkvpi" placeholder="例: マンション名" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>国</span>
    <select name="id4rx" id="idkuwo" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
</select>
  </div>
  <div>
    <span>階</span>
    <input type="text" name="idf8vh" id="idfr" placeholder="例: 3階" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>部屋番号</span>
    <input type="text" name="idnjug" id="id6h4" placeholder="例: 101" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
