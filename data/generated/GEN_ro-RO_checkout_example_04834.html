<html><head>

<body>

<fieldset>
<h3>example.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prenume
    <input type="text" name="first_name" id="id02r" placeholder="Introduceți prenumele dvs." data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <input type="text" name="lastName" id="idrt55" placeholder="Introduceți numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="street" id="idyy" placeholder="Strada și numărul" aria-label="Adresă" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="city" id="id12g9m" placeholder="Introduceți orașul dvs." aria-label="Oraș" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idlz">Cod poștal</label>
    <input type="text" name="postcode" id="idlz" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id4jn3">Țară</label>
    <select name="country" id="id4jn3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
  </div>
  <div>
    <label for="id1d">Adresă de email</label>
    <input type="email" name="emailAddress" id="id1d" placeholder="Introduceți adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="tel" id="idi7zh" placeholder="Număr de telefon" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organizație (opțional)
    <input type="text" name="organization" id="id7g" placeholder="Numele organizației dvs." data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <button name="idc4g" id="idpv7hk" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
