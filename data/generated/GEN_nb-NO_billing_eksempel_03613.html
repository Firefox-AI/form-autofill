<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Navn på kortet</label>
    <input type="text" name="ccName" id="ccName" placeholder="Skriv inn navnet som står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Gateadresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Gateadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Leilighet, etasje eller lignende (valgfritt)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Leilighet eller etasje" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Fylke</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Oslo</option>
  <option>Viken</option>
  <option>Innlandet</option>
  <option>Vestfold og Telemark</option>
  <option>Agder</option>
  <option>Rogaland</option>
  <option>Vestland</option>
  <option>Møre og Romsdal</option>
  <option>Trøndelag</option>
  <option>Nordland</option>
  <option>Troms og Finnmark</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="vatNumber">MVA-nummer</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Skriv inn MVA-nummeret" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
