<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shopping.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="honorific_suffix_9405">敬称</label>
    <input type="text" name="honorific_suffix_1493" id="honorific_suffix_9405" data-moz-autofill-type="honorific-suffix">
  </div>
  <div>
    <label for="given_name_3501">名</label>
    <input type="text" name="given_name_6005" id="given_name_3501" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_8055">姓</label>
    <input type="text" name="family_name_4121" id="family_name_8055" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="street_address_9641">住所</label>
    <input type="text" name="street_address_5210" id="street_address_9641" placeholder="番地、建物名など" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="apartment_2167">アパート名・部屋番号</label>
    <input type="text" name="apartment_3506" id="apartment_2167" placeholder="例：101号室" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="address_level2_5075">市区町村</label>
    <input type="text" name="address_level2_677" id="address_level2_5075" placeholder="例：東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postal_code_5431">郵便番号</label>
    <input type="text" name="postal_code_2845" id="postal_code_5431" placeholder="例：100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="country_name_2190">国</label>
    <select name="country_name_9630" id="country_name_2190" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="email_4094">メールアドレス</label>
    <input type="email" name="email_3985" id="email_4094" placeholder="例：example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel_3173">電話番号</label>
    <input type="tel" name="tel_7835" id="tel_3173" placeholder="例：090-1234-5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
