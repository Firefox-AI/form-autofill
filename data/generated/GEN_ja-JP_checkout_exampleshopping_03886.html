<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shopping.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>名</span>
    <input type="text" name="idnp5t" id="idict" placeholder="たろう" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="iduip" id="id4m7" placeholder="やまもと" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="id15e4a" id="idhc2v" placeholder="1-2-3 さくら町" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="idxm5xh" id="idnkep" placeholder="東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="idy7g2" id="idnpra7" placeholder="100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="id7t" id="idht" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>オーストラリア</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="idin2z" id="idwib" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="idcp" id="idr3jd" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>都道府県</span>
    <select name="idpnx" id="idlbozt" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>神奈川県</option>
  <option>千葉県</option>
  <option>埼玉県</option>
  <option>広島県</option>
  <option>京都府</option>
</select>
  </div>
</form>

</fieldset></body></html>
