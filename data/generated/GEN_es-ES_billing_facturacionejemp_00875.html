<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>facturacionejemplo.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre en la tarjeta
    <input type="text" name="cardName" id="idgrj" placeholder="Escribe el nombre como aparece en la tarjeta" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="street1" id="idp2" placeholder="Calle, número y piso" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zipCode" id="idu0a" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="city3" id="idn7wqx" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Provincia
    <select name="county" id="idxv" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Málaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
</select>
    </label>
  </div>
  <div>
    <label>País
    <select name="country" id="idfmdks" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
    </label>
  </div>
  <div>
    <label>Empresa
    <input type="text" name="companyName" id="idw8du" placeholder="Nombre de la empresa (si corresponde)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Teléfono
    <input type="tel" name="mobile" id="idtzb5" placeholder="Incluye el código de país" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Apartamento
    <input type="text" name="apartment" id="idtm" placeholder="Número de apartamento (si aplicable)" data-moz-autofill-type="apartment">
    </label>
  </div>
</form>

</fieldset></body></html>
