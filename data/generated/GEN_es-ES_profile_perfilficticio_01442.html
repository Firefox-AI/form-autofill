<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>perfil-ficticio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre</span>
    <input type="text" name="billing_first_name" id="idkl3t2" placeholder="Tu nombre aquí" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apellidos</span>
    <input type="text" name="billing_last_name9" id="idi6d" placeholder="Tus apellidos aquí" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Segundo nombre</span>
    <input type="text" name="middleName" id="idsl" placeholder="(opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Apodo</span>
    <input type="text" name="displayName" id="idjfj" placeholder="Tu apodo o nombre preferido" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="emailAddress" id="idejt" placeholder="tuemail@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="id3qs" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Código del país</span>
    <select name="countryCode9" id="id5ls" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+34</option>
  <option>+1</option>
  <option>+44</option>
  <option>+49</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <span>Organización</span>
    <input type="text" name="company" id="idcd" placeholder="Tu empresa o institución" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Fecha de nacimiento</span>
    <input type="text" name="dob" id="idz4nk" placeholder="DD/MM/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Número de identificación</span>
    <input type="text" name="idNumber" id="idkpr" placeholder="Tu DNI o pasaporte" data-moz-autofill-type="id-number">
  </div>
  <div>
    <span>Contraseña</span>
    <input type="password" name="idl74" id="idgho2" placeholder="Crea una contraseña">
  </div>
</form>

</fieldset></body></html>
