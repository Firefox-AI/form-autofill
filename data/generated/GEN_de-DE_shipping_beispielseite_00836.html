<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse *" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+36" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+386" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Adresse" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Vorname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Nachname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Straße" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Hausnummer/Etage/Tür" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Postleitzahl" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Siedlung" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Hat das Gebäude einen Aufzug? (optional)" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
