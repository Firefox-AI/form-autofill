<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shop.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>敬称</span>
    <select name="r:r:2:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idnj" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>様</option>
  <option>先生</option>
  <option>博士</option>
</select>
  </div>
  <div>
    <span>名</span>
    <input type="text" name="r:r:4:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idu8" placeholder="例：太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>姓</span>
    <input type="text" name="r:r:3:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idgkggd" placeholder="例：山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="r:r:4:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idu9" placeholder="例：1-2-3" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>建物名・部屋番号</span>
    <input type="text" name="r:r:1:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="id9s" placeholder="例：マンション名101" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="r:r:9:m:r:6:cr:1:c:pr:1:container:fs:i:input" id="idk3f4" placeholder="例：東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="r:r:4:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idbhv0c" placeholder="例：123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="r:r:1:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="id8aon" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
</select>
  </div>
  <div>
    <span>メールアドレス</span>
    <input type="email" name="r:r:3:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idopya" placeholder="例：example@mail.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="r:r:1:m:r:10:cr:3:c:pr:1:container:fs:i:input" id="id30z" placeholder="例：03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>生年</span>
    <select name="r:r:5:m:r:11:cr:3:c:pr:1:container:fs:i:input" id="idtk" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2000</option>
  <option>1999</option>
  <option>1998</option>
  <option>1997</option>
  <option>1996</option>
</select>
  </div>
  <div>
    <span>その他の情報</span>
    <input type="text" name="r:r:6:m:r:12:cr:1:c:pr:1:container:fs:i:input" id="idliif" placeholder="例：配達希望時間" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <button name="r:r:5:m:r:13:cr:2:c:pr:1:container:fs:i:input" id="idflpi" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
