<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prenume
    <input type="text" name="givenName" id="givenName" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nume de familie
    <input type="text" name="familyName" id="familyName" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="email" placeholder="Introduceți adresa de email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="tel" id="tel" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Data nașterii
    <input type="text" name="bday" id="bday" placeholder="Alegeți data nașterii" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Parola
    <input type="password" name="field" id="field" placeholder="Creați o parolă">
    </label>
  </div>
</form>

</fieldset></body></html>
