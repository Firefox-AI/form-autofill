<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>platnosci.example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="ccName" id="ccName" placeholder="Wpisz imię i nazwisko posiadacza karty" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numer karty</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Wprowadź numer karty" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Miesiąc ważności</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <span>Rok ważności</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Kod CVV</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3-cyfrowy kod z tyłu karty" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Rodzaj karty</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Wpisz swój adres" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <button name="field" id="field" type="submit">Zatwierdź</button>
  </div>
</form>

</fieldset></body></html>
