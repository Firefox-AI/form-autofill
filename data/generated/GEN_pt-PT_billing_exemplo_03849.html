<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>

  <option>Espanha</option>

  </div>
  <div>
    <input type="text" name="id99pp" id="ideyx" placeholder="Ex: Próximo da escola" aria-label="Ponto de referência" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
