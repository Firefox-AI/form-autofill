<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id0ax">Vorname</label>
    <input type="text" name="firstName" id="id0ax" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>* Nachname
    <input type="text" name="surname" id="idze9aa" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <select name="birthDay" id="id3t3tb" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>Männlich</option>
  <option>Weiblich</option>
  <option>Divers</option>
</select>
  </div>
  <div>
    <span>* Geschlecht</span>
    <select name="dobMonth" id="idjye" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Männlich</option>
  <option>Weiblich</option>
  <option>Divers</option>
</select>
  </div>
  <div>
    <select name="dobYear" id="idpj" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>Männlich</option>
  <option>Weiblich</option>
  <option>Divers</option>
</select>
  </div>
  <div>
    <label for="idnse">* Telefonnummer</label>
    <input type="tel" name="tel" id="idnse" placeholder="Bitte geben Sie Ihre Telefonnummer ein" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="zipCode" id="idak" placeholder="Ihre Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="strasse" id="idvg2" placeholder="Straßenname eingeben" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="houseNumber" id="idebi" placeholder="Hausnummer eingeben" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label>* Zusatz
    <input type="text" name="id89g" id="idz5mln" placeholder="Zusatz (z. B. Wohnungsnummer)" data-moz-autofill-type="address-extra">
    </label>
  </div>
  <div>
    <label>Zusatz (optional)
    <input type="text" name="suburb" id="idqcx" placeholder="Optionaler Zusatz" data-moz-autofill-type="address-level3">
    </label>
  </div>
  <div>
    <label for="id7h3">* Bundesland</label>
    <select name="county" id="id7h3" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Sachsen</option>
</select>
  </div>
  <div>
    <label>* Bundesland
    <select name="town" id="idw55yn" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Sachsen</option>
</select>
    </label>
  </div>
  <div>
    <label for="idjkf8p">* Stadt</label>
    <input type="text" name="id935" id="idjkf8p" placeholder="Stadt eingeben" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <input type="email" name="mail" id="idpcvl" placeholder="E-Mail-Adresse (optional)" aria-label="Referenzpunkt (optional)" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
