<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>magazin-exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prenume</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nume de familie</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Companie (opțional)</label>
    <input type="text" name="organization" id="organization" placeholder="Numele companiei" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Apartament (opțional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartament, etaj sau alte detalii" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Orașul dumneavoastră" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduceti codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Țară</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Germania</option>
  <option>Austria</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
  <option>Ungaria</option>
</select>
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="Introduceti adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Număr de telefon" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
