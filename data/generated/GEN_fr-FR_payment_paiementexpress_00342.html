<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paiement-express.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ids5">Nom sur la carte</label>
    <input type="text" name="r:r:9:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="ids5" placeholder="Jean Dupont" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idliz">Numéro de carte</label>
    <input type="number" name="r:r:1:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idliz" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idoos">Mois d’expiration</label>
    <select name="r:r:3:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idoos" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janvier</option>
  <option>02 - Février</option>
  <option>03 - Mars</option>
  <option>04 - Avril</option>
  <option>05 - Mai</option>
  <option>06 - Juin</option>
  <option>07 - Juillet</option>
  <option>08 - Août</option>
  <option>09 - Septembre</option>
  <option>10 - Octobre</option>
  <option>11 - Novembre</option>
  <option>12 - Décembre</option>
</select>
  </div>
  <div>
    <label for="ida1v9p">Année d’expiration</label>
    <select name="r:r:7:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="ida1v9p" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="id80">Cryptogramme visuel</label>
    <input type="number" name="r:r:9:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id80" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id7e">Type de carte</label>
    <select name="r:r:2:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="id7e" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Carte Bleue</option>
</select>
  </div>
  <div>
    <label for="idqpz">Ville</label>
    <input type="text" name="r:r:7:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="idqpz" placeholder="Paris" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="r:r:7:m:r:8:cr:1:c:pr:1:container:fs:i:input" id="idtzh" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
