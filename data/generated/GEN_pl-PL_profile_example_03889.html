<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Twoje imię" aria-label="Imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Twoje nazwisko" aria-label="Nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Twoje drugie imię" aria-label="Drugie imię" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Twój pseudonim" aria-label="Pseudonim" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Twój adres e-mail" aria-label="Adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Twój numer telefonu" aria-label="Numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nazwa organizacji" aria-label="Organizacja" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Wybierz datę urodzenia" aria-label="Data urodzenia" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Twoje stanowisko" aria-label="Stanowisko" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Twoje fonetyczne imię (opcjonalnie)" aria-label="Fonetyczne imię" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Zatwierdź</button>
  </div>
</form>

</fieldset></body></html>
