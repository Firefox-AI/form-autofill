<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idrm2ed">Nom complet</label>
    <input type="text" name="contactName" id="idrm2ed" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="address1" id="id96c" placeholder="Numéro et nom de la rue" aria-label="Adresse" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id47n8">Complément d&#x27;adresse</label>
    <input type="text" name="address2" id="id47n8" placeholder="Étage, appartement, ou autre info" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Bâtiment</span>
    <input type="text" name="id9d08" id="id2vtjn" placeholder="Nom du bâtiment ou numéro" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="zipCode" id="id6y" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="town" id="id1h" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Pays</span>
    <select name="country" id="idphhn" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>États-Unis</option>
  <option>Canada</option>
</select>
  </div>
</form>

</fieldset></body></html>
