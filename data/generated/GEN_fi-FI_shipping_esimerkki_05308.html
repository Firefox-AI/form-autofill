<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nimi</label>
    <input type="text" name="name" id="name" placeholder="Anna nimesi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Katuosoite</label>
    <input type="text" name="street" id="street" placeholder="Esimerkiksi: Mannerheimintie" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Talon numero</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Esimerkiksi: 42" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Lisäosoite</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esimerkiksi: Asunto 5B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postinumero</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Esimerkiksi: 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kirjoita kaupunki" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
</select>
  </div>
  <div>
    <label for="building">Rakennus</label>
    <input type="text" name="building" id="building" placeholder="Esimerkiksi: Pääty" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="addressLevel3">Alue</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Esimerkiksi: Kamppi" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Lähetä</button>
  </div>
</form>

</fieldset></body></html>
