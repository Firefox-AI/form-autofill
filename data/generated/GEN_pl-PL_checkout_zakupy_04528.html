<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>zakupy.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="prefix" id="idjd" aria-label="Tytuł" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pan</option>
  <option>Pani</option>
  <option>Pani Doktor</option>
  <option>Pan Profesor</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="id81y" placeholder="Wpisz swoje imię" aria-label="Imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="billing_last_name" id="idpt" placeholder="Wpisz swoje nazwisko" aria-label="Nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressLine1" id="idq8n" placeholder="Ulica i numer domu" aria-label="Adres" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="address2" id="idbb" placeholder="Numer mieszkania (opcjonalnie)" aria-label="Mieszkanie" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="locality" id="id5i" placeholder="Wpisz miasto" aria-label="Miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zip" id="idyr" placeholder="Wpisz kod pocztowy" aria-label="Kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="country" id="idsm" aria-label="Kraj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Włochy</option>
  <option>Hiszpania</option>
  <option>Zjednoczone Królestwo</option>
  <option>Stany Zjednoczone</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="idu9l" placeholder="Wpisz swój adres e-mail" aria-label="Adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="phoneNumber" id="idzc6" placeholder="Wpisz swój numer telefonu" aria-label="Numer telefonu" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
