<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" aria-label="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <label>First Name
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Surname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" aria-label="Organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" aria-label="Address Line 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Address Line 2</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Town/City</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Country</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">County</label>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel1">Region</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="Region" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label>Contact Number
    <input type="tel" name="tel" id="tel" placeholder="e.g. 01234 567890" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label for="name">Full Name</label>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Company Name
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label for="addressLine1">Address Line 1</label>
    <input type="text" name="addressLine1" id="addressLine1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address Line 2</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Country</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">State/Province</label>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="State/Province" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label>Region
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>First Name
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" aria-label="Surname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="ccGivenName">Name on Card</label>
    <input type="text" name="ccGivenName" id="ccGivenName" placeholder="Name on Card" data-moz-autofill-type="cc-given-name">
  </div>
  <div>
    <input type="text" name="ccFamilyName" id="ccFamilyName" aria-label="Surname on Card" data-moz-autofill-type="cc-family-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" aria-label="Card Number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Expiry Month" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <span>Expiry Year</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Security Code (CVV)</span>
    <input type="number" name="ccCsc" id="ccCsc" data-moz-autofill-type="cc-csc">
  </div>
</form>

</fieldset></body></html>
