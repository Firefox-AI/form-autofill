<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivbolt.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Kártyatulajdonos neve</label>
    <input type="text" name="ccName" id="ccName" placeholder="Például: Kovács János" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Kártyaszám</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Kártya lejárati hónap</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Január</option>
  <option>Február</option>
  <option>Március</option>
  <option>Április</option>
  <option>Május</option>
  <option>Június</option>
  <option>Július</option>
  <option>Augusztus</option>
  <option>Szeptember</option>
  <option>Október</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Kártya lejárati év</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Kártyaellenőrző szám (CSC)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Három vagy négy szám" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Kártyatípus</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <label for="postalCode">Irányítószám</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Irányítószám megadása" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
