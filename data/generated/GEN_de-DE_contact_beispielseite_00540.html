<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Vollständiger Name *</label>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="tel">Telefonnummer *</label>
    <input type="tel" name="tel" id="tel" placeholder="+49" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">E-Mail-Adresse *</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="addressLevel1">Bundesland oder Provinz *</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postleitzahl *</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Stadt oder Gemeinde *</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressHousenumber">Hausnummer *</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressStreetname">Straße *</label>
    <input type="text" name="addressStreetname" id="addressStreetname" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idNumber">Steueridentifikationsnummer/NIK/Reisepassnummer *</label>
    <input type="text" name="idNumber" id="idNumber" data-moz-autofill-type="id-number">
  </div>
  <div>
    <label for="email">E-Mail-Adresse *</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
