<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplusite.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Numele titularului cardului
    <input type="text" name="nameOnCard3" id="idh1n" placeholder="Introdu numele tău aici" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Numărul cardului
    <input type="number" name="cardNumber" id="idfxi9" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Luna expirării
    <select name="exp_month" id="idhr2" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
    </label>
  </div>
  <div>
    <label>Anul expirării
    <select name="ccExpYear6" id="idc6p" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Codul de securitate (CSC)
    <input type="number" name="cvc" id="idvn7x9" placeholder="CVC" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Tipul cardului
    <select name="ccType" id="ida676s" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>Cod poștal
    <input type="text" name="zip2" id="idf4" placeholder="Introdu codul poștal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <button name="idsd6m" id="idydc" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
