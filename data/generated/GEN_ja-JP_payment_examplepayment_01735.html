<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>カード名義人
    <input type="text" name="ccName" id="idivd" placeholder="例: 山田 太郎" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>カード番号
    <input type="number" name="cardNo" id="ide44vt" placeholder="例: 1234 5678 9012 3456" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>有効期限（月）
    <select name="ccExpMonth" id="idnc" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
    </label>
  </div>
  <div>
    <label>有効期限（年）
    <select name="ccExpYear" id="id3p2" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>セキュリティコード
    <input type="number" name="cardCode" id="id7n" placeholder="例: 123" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>カードタイプ
    <select name="cardType" id="idevg6" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
    </label>
  </div>
  <div>
    <label>フリガナ
    <input type="text" name="idfai" id="idk0dqs" placeholder="例: ヤマダ タロウ" data-moz-autofill-type="phonetic-name">
    </label>
  </div>
</form>

</fieldset></body></html>
