<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-payment.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>カード名義人
    <input type="text" name="ccName" id="ccName" placeholder="例: 山田 太郎" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>クレジットカード番号
    <input type="number" name="ccNumber" id="ccNumber" placeholder="カード番号を入力してください" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>有効期限（月）
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
    </label>
  </div>
  <div>
    <label>有効期限（年）
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>セキュリティコード
    <input type="number" name="ccCsc" id="ccCsc" placeholder="カード裏面の3桁" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>カードの種類
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
</select>
    </label>
  </div>
  <div>
    <label>フリガナ
    <input type="text" name="phoneticName" id="phoneticName" placeholder="例: ヤマダ タロウ" data-moz-autofill-type="phonetic-name">
    </label>
  </div>
</form>

</fieldset></body></html>
