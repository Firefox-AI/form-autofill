<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Voornaam
    <input type="text" name="givenName" id="givenName" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <span>Achternaam</span>
    <input type="text" name="familyName" id="familyName" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">Bedrijfsnaam (optioneel)</label>
    <input type="text" name="organization" id="organization" placeholder="Vul je bedrijfsnaam in" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Bijv. Hoofdstraat 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Toevoeging</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. Appartement 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul je stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Bijv. 1234 AB" aria-label="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zwitserland</option>
  <option>Australië</option>
  <option>Verenigde Staten</option>
</select>
  </div>
  <div>
    <label for="email">E-mailadres</label>
    <input type="email" name="email" id="email" placeholder="Vul je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Vul je telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Bestel</button>
  </div>
</form>

</fieldset></body></html>
