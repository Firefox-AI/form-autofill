<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Titolo</span>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sig.</option>
  <option>Sig.ra</option>
  <option>Dr.</option>
  <option>Dott.ssa</option>
</select>
  </div>
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Cognome</span>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Azienda</span>
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome dell&#x27;azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Comune</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Provincia</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Torino</option>
  <option>Firenze</option>
  <option>Bologna</option>
  <option>Napoli</option>
</select>
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Paese</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="tel" id="tel" placeholder="Numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Anno di nascita</span>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>1980</option>
  <option>1981</option>
  <option>1982</option>
  <option>1983</option>
  <option>1984</option>
  <option>1985</option>
  <option>1986</option>
  <option>1987</option>
  <option>1988</option>
  <option>1989</option>
  <option>1990</option>
</select>
  </div>
  <div>
    <span>Nome fonetico</span>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="Nome pronunciato" data-moz-autofill-type="phonetic-given-name">
  </div>
</form>

</fieldset></body></html>
