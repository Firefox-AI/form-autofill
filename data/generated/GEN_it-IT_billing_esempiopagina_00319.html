<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempiopagina.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome e cognome
    <input type="text" name="ccName" id="id0y" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label for="idvv">Indirizzo</label>
    <input type="text" name="address1" id="idvv" placeholder="Via Roma 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="street2" id="idpq00" placeholder="Interno 4, Scala A" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label>Codice postale
    <input type="text" name="zip_code" id="id04ix" placeholder="00100" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label for="idkj">Città</label>
    <select name="town" id="idkj" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Roma</option>
  <option>Milano</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Palermo</option>
  <option>Genova</option>
  <option>Bologna</option>
  <option>Firenze</option>
  <option>Bari</option>
  <option>Catania</option>
</select>
  </div>
  <div>
    <label>Provincia
    <select name="province" id="id756" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>RM</option>
  <option>MI</option>
  <option>NA</option>
  <option>TO</option>
  <option>PA</option>
  <option>GE</option>
  <option>BO</option>
  <option>FI</option>
  <option>BA</option>
  <option>CT</option>
</select>
    </label>
  </div>
  <div>
    <select name="country" id="idtxb" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
  <option>Canada</option>
</select>
  </div>
</form>

</fieldset></body></html>
