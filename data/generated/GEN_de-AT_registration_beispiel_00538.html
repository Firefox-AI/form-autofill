<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname*</label>
    <input type="text" name="familyName" id="familyName" placeholder="Nachname*" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-Mail-Adresse*</label>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse*" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer*</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefonnummer*" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bdayDay">Geburtstag - Tag*</label>
    <input type="number" name="bdayDay" id="bdayDay" placeholder="Geburtstag - Tag*" data-moz-autofill-type="bday-day">
  </div>
  <div>
    <label for="bdayMonth">Geburtstag - Monat*</label>
    <input type="number" name="bdayMonth" id="bdayMonth" placeholder="Geburtstag - Monat*" data-moz-autofill-type="bday-month">
  </div>
  <div>
    <label for="bdayYear">Geburtstag - Jahr*</label>
    <input type="number" name="bdayYear" id="bdayYear" placeholder="Geburtstag - Jahr*" data-moz-autofill-type="bday-year">
  </div>
</form>

</fieldset></body></html>
