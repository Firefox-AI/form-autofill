<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vul je naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Straatnaam" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Huisnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Eventuele toevoeging" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Provincie" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
