<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplusite.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele de pe card</span>
    <input type="text" name="nameOnCard" id="id2c" placeholder="Introdu numele complet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numărul cardului</span>
    <input type="number" name="ccNumber" id="idarmp" placeholder="Numărul de 16 cifre" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Luna expirării</span>
    <select name="exp_month4" id="ida3db" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ianuarie</option>
  <option>Februarie</option>
  <option>Martie</option>
  <option>Aprilie</option>
  <option>Mai</option>
  <option>Iunie</option>
  <option>Iulie</option>
  <option>August</option>
  <option>Septembrie</option>
  <option>Octombrie</option>
  <option>Noiembrie</option>
  <option>Decembrie</option>
</select>
  </div>
  <div>
    <span>Anul expirării</span>
    <select name="exp_year" id="idlu" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <span>Codul de securitate (CVV)</span>
    <input type="number" name="csc" id="id90" placeholder="3 cifre pe spatele cardului" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipul cardului</span>
    <select name="cardType" id="idnyr6" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
