<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Navn</label>
    <input type="text" name="name" id="name" placeholder="Skriv inn ditt navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">E-post</label>
    <input type="email" name="email" id="email" placeholder="Skriv inn din e-postadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetAddress">Gateadresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Gateadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="By eller kommune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="bdayYear">Fødselsår</label>
    <select name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2023</option>
  <option>2022</option>
  <option>2021</option>
  <option>2020</option>
  <option>2019</option>
  <option>2018</option>
  <option>2017</option>
  <option>2016</option>
  <option>2015</option>
  <option>2014</option>
  <option>2013</option>
  <option>2012</option>
  <option>2011</option>
  <option>2010</option>
  <option>2009</option>
  <option>2008</option>
  <option>2007</option>
  <option>2006</option>
  <option>2005</option>
  <option>2004</option>
  <option>2003</option>
  <option>2002</option>
  <option>2001</option>
  <option>2000</option>
</select>
  </div>
  <div>
    <label for="addressLevel3">Område</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Distrikt eller område" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
