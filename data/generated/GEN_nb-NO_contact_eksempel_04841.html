<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqksj">Navn</label>
    <input type="text" name="name" id="idqksj" placeholder="Skriv inn ditt navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idys">E-post</label>
    <input type="email" name="email_address" id="idys" placeholder="Skriv inn din e-postadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id8n">Telefonnummer</label>
    <input type="tel" name="tel" id="id8n" placeholder="Skriv inn telefonnummeret ditt" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idognv5">Gateadresse</label>
    <input type="text" name="streetAddress" id="idognv5" placeholder="Gateadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idu5p">By</label>
    <input type="text" name="town" id="idu5p" placeholder="By eller kommune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idgdr">Postnummer</label>
    <input type="text" name="postcode" id="idgdr" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id86dy">Land</label>
    <select name="countryName" id="id86dy" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idesi">Fødselsår</label>
    <select name="dobYear" id="idesi" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2023</option>
  <option>2022</option>
  <option>2021</option>
  <option>2020</option>
  <option>2019</option>
  <option>2018</option>
  <option>2017</option>
  <option>2016</option>
  <option>2015</option>
  <option>2014</option>
  <option>2013</option>
  <option>2012</option>
  <option>2011</option>
  <option>2010</option>
  <option>2009</option>
  <option>2008</option>
  <option>2007</option>
  <option>2006</option>
  <option>2005</option>
  <option>2004</option>
  <option>2003</option>
  <option>2002</option>
  <option>2001</option>
  <option>2000</option>
</select>
  </div>
  <div>
    <label for="id3rp5v">Område</label>
    <input type="text" name="suburb" id="id3rp5v" placeholder="Distrikt eller område" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="idwlwtl" id="idfwb" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
