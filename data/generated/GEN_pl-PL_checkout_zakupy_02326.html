<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>zakupy.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Tytuł grzecznościowy</span>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pani</option>
  <option>Pan</option>
  <option>Państwo</option>
</select>
  </div>
  <div>
    <span>Imię</span>
    <input type="text" name="givenName" id="givenName" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nazwisko</span>
    <input type="text" name="familyName" id="familyName" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulica i numer domu" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Wprowadź nazwę miasta" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kraj</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
</select>
  </div>
  <div>
    <span>Adres e-mail</span>
    <input type="email" name="email" id="email" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numer telefonu</span>
    <input type="tel" name="tel" id="tel" placeholder="Wprowadź numer telefonu" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Województwo</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Dolnośląskie</option>
  <option>Kujawsko-Pomorskie</option>
  <option>Lubusz</option>
  <option>Lubusz</option>
  <option>Łódzkie</option>
  <option>Małopolskie</option>
  <option>Mazowieckie</option>
  <option>Opolskie</option>
  <option>Podkarpackie</option>
  <option>Podlaskie</option>
  <option>Pomorskie</option>
  <option>Śląskie</option>
  <option>Świętokrzyskie</option>
  <option>Warmińsko-Mazurskie</option>
  <option>Wielkopolskie</option>
  <option>Zachodniopomorskie</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
  <div>
    <button name="field" id="field" type="submit">Złóż zamówienie</button>
  </div>
</form>

</fieldset></body></html>
