<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>

  <div>

  <div>

  <option value=""></option>

  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>

</select>
  </div>
  <div>

  </div>
  <div>
    <label for="idx7">Appartement of verdieping</label>
    <input type="text" name="id56p27" id="idx7" placeholder="Bijv. 2e verdieping, A" data-moz-autofill-type="address-level4">

  <div>
    <button name="idhbr1u" id="id4pdf" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
