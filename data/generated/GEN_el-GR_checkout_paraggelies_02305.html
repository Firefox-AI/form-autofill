<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paraggelies.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Πώς σε λένε;" aria-label="Όνομα" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επώνυμο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Εισάγετε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Πόλη</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ποια είναι η πόλη σας;" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ταχυδρομικός κώδικας" aria-label="Ταχυδρομικός Κώδικας" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Χώρα
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ισπανία</option>
  <option>Ηνωμένες Πολιτείες</option>
</select>
    </label>
  </div>
  <div>
    <label for="email">Διεύθυνση Email</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="π.χ. 2101234567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
