<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplepaiement.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ide46">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="ide46" placeholder="Nom complet tel qu&#x27;il apparaît sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idu5xj5">Nom de l&#x27;entreprise (si applicable)</label>
    <input type="text" name="companyName" id="idu5xj5" placeholder="Votre entreprise" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idl9h3">Adresse</label>
    <input type="text" name="address1" id="idl9h3" placeholder="Numéro et rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idgkosn">Complément d&#x27;adresse (facultatif)</label>
    <input type="text" name="address2" id="idgkosn" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idze">Code postal</label>
    <input type="text" name="zipCode" id="idze" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idv3">Ville</label>
    <input type="text" name="locality" id="idv3" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyn">Région</label>
    <select name="region" id="idyn" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Pays de la Loire</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <label for="idz2b7d">Pays</label>
    <select name="country" id="idz2b7d" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>Pays-Bas</option>
  <option>Portugal</option>
  <option>Autre</option>
</select>
  </div>
  <div>
    <label for="id302">Numéro de TVA (facultatif)</label>
    <input type="text" name="vat" id="id302" placeholder="Votre numéro de TVA" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
