<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname</label>
    <input type="text" name="givenName" id="givenName" placeholder="Max" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname</label>
    <input type="text" name="familyName" id="familyName" placeholder="Muster" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Straße und Hausnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Beispielstraße 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Zusatzinformationen (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z.B. Stiege 2, Tür 5" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Stadt</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Graz</option>
  <option>Linz</option>
  <option>Salzburg</option>
  <option>Innsbruck</option>
  <option>Klagenfurt</option>
  <option>Villach</option>
  <option>Wels</option>
  <option>Sankt Pölten</option>
  <option>Dornbirn</option>
</select>
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="1234" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Spanien</option>
  <option>Vereinigte Staaten</option>
</select>
  </div>
  <div>
    <label for="email">E-Mail-Adresse</label>
    <input type="email" name="email" id="email" placeholder="max.muster@beispiel.at" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="+43 123 456789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Firma (optional)</label>
    <input type="text" name="organization" id="organization" placeholder="Beispiel GmbH" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel1">Bundesland</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Salzburg</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Bestellen</button>
  </div>
</form>

</fieldset></body></html>
