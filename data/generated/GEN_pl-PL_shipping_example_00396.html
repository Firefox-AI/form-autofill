<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Imię i nazwisko
    <input type="text" name="contactName" id="idvv1r" placeholder="Wpisz swoje imię i nazwisko" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label for="idn5s">Adres</label>
    <input type="text" name="address" id="idn5s" placeholder="Ulica i numer domu" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id3df8">Kod pocztowy</label>
    <input type="text" name="zipCode" id="id3df8" placeholder="Wpisz kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idcgr">Miasto</label>
    <input type="text" name="town" id="idcgr" placeholder="Wpisz miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kraj</span>
    <select name="country" id="idxj" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Włochy</option>
  <option>Hiszpania</option>
  <option>Wielka Brytania</option>
</select>
  </div>
  <div>
    <button name="idpp" id="idrfoff" type="submit">Wyślij</button>
  </div>
</form>

</fieldset></body></html>
