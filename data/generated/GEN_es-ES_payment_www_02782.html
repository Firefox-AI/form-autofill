<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.ejemplopago.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre en la tarjeta</span>
    <input type="text" name="cc_name_2880" id="cc_name_4711" placeholder="Nombre completo como aparece en la tarjeta" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Número de tarjeta</span>
    <input type="number" name="cc_number_2472" id="cc_number_2794" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mes de caducidad</span>
    <select name="cc_exp_month_511" id="cc_exp_month_7965" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Enero</option>
  <option>Febrero</option>
  <option>Marzo</option>
  <option>Abril</option>
  <option>Mayo</option>
  <option>Junio</option>
  <option>Julio</option>
  <option>Agosto</option>
  <option>Septiembre</option>
  <option>Octubre</option>
  <option>Noviembre</option>
  <option>Diciembre</option>
</select>
  </div>
  <div>
    <span>Año de caducidad</span>
    <select name="cc_exp_year_106" id="cc_exp_year_4680" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
</select>
  </div>
  <div>
    <span>Código de seguridad</span>
    <input type="number" name="cc_csc_1364" id="cc_csc_3637" placeholder="Tres dígitos en el reverso" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo de tarjeta</span>
    <select name="cc_type_6559" id="cc_type_2145" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="address_line1_7972" id="address_line1_5472" placeholder="Calle, número y piso" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Nombre fonético</span>
    <input type="text" name="phonetic_name_4004" id="phonetic_name_8205" placeholder="Cómo se pronuncia tu nombre" data-moz-autofill-type="phonetic-name">
  </div>
</form>

</fieldset></body></html>
