<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>First Name
    <input type="text" name="given_name_887" id="given_name_3558" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="family_name_2992" id="family_name_9990" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="tel_7606" id="tel_9977" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Street Address
    <input type="text" name="address_line1_4586" id="address_line1_4327" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apartment, suite, etc. (optional)
    <input type="text" name="address_line2_7543" id="address_line2_4268" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>ZIP Code
    <input type="text" name="postal_code_4726" id="postal_code_4167" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City
    <input type="text" name="address_level2_9882" id="address_level2_5788" data-moz-autofill-type="address-level2">
    </label>
  </div>
</form>

</fieldset></body></html>
