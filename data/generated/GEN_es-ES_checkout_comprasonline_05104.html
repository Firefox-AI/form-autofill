<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>comprasonline.es</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre</span>
    <input type="text" name="firstName" id="idcjwey" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Apellidos</span>
    <input type="text" name="lastName" id="id9ldb" placeholder="Tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="addr" id="idh2" placeholder="Calle, número, piso" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="locality" id="id79n" placeholder="Ejemplo: Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip" id="idetp" placeholder="Te ayudamos con tu código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="idqia5" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Reino Unido</option>
  <option>Italia</option>
</select>
  </div>
  <div>
    <span>Correo electrónico</span>
    <input type="email" name="mail" id="iduokp" placeholder="tu@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="phoneNumber" id="idok1jk" placeholder="Tu teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Provincia</span>
    <input type="text" name="neighborhood" id="idz440" placeholder="Ejemplo: Madrid" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
