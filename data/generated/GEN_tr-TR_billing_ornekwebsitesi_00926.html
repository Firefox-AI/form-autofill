<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Adınızı ve Soyadınızı girin" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Sokak Adresi
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Örn: 1234 Main St." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartman, Daire numarası vb." aria-label="Adresin Ek Bilgisi (isteğe bağlı)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Örn: 12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>İlçe</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>İstanbul</option>
  <option>Ankara</option>
  <option>İzmir</option>
  <option>Bursa</option>
  <option>Antalya</option>
  <option>Adana</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">İl</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Aydın</option>
  <option>Bursa</option>
  <option>Çankırı</option>
  <option>Diyarbakır</option>
  <option>Edirne</option>
  <option>Giresun</option>
  <option>İstanbul</option>
  <option>Kahramanmaraş</option>
  <option>Sakarya</option>
  <option>Trabzon</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>Amerika Birleşik Devletleri</option>
  <option>İngiltere</option>
  <option>İtalya</option>
  <option>İspanya</option>
</select>
  </div>
  <div>
    <label for="organization">Şirket Adı (varsa)</label>
    <input type="text" name="organization" id="organization" placeholder="Şirket adınızı girin" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="telAreaCode">Alan Kodu</label>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="Örn: 0212" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Örn: 555-123-4567" aria-label="Telefon Numarası" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="building">Bina Adı (isteğe bağlı)</label>
    <input type="text" name="building" id="building" placeholder="Bina adını girin" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Gönder</button>
  </div>
</form>

</fieldset></body></html>
