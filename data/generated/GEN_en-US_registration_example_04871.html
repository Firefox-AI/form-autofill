<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Email Address" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="Credit Card Number" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label>Expiration Month
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
    </label>
  </div>
  <div>
    <label for="ccExpMonth">Expiration Year</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Security Code (CVV)</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Security Code (CVV)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Cardholder Name" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Postal Code
    <input type="text" name="postalCode" id="postalCode" placeholder="Please enter a zipcode or city" data-moz-autofill-type="postal-code">
    </label>
  </div>
</form>

</fieldset></body></html>
