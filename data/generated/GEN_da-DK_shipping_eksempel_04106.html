<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn
    <input type="text" name="contactName" id="idbd" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="street1" id="id8wix" placeholder="Gadenavn og husnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postcode" id="id5q" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="locality" id="id4x282" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="id5vsl0" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
    </label>
  </div>
  <div>
    <label>Evt. adresseoplysninger
    <input type="text" name="addr2" id="idkr4" placeholder="F.eks. c/o eller afdeling" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Etage
    <input type="text" name="floor" id="idwkhln" placeholder="Indtast din etage (hvis relevant)" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <label>Områdekode
    <input type="tel" name="areaCode" id="id3f" placeholder="For eksempel 45" data-moz-autofill-type="tel-area-code">
    </label>
  </div>
  <div>
    <label>Fødselsår
    <select name="dobYear" id="idwk7" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2023</option>
  <option>2022</option>
  <option>2021</option>
  <option>2020</option>
  <option>2019</option>
  <option>2018</option>
  <option>2017</option>
  <option>2016</option>
  <option>2015</option>
  <option>2014</option>
  <option>2013</option>
  <option>2012</option>
  <option>2011</option>
  <option>2010</option>
  <option>2009</option>
  <option>2008</option>
  <option>2007</option>
  <option>2006</option>
  <option>2005</option>
  <option>2004</option>
  <option>2003</option>
  <option>2002</option>
  <option>2001</option>
  <option>2000</option>
</select>
    </label>
  </div>
  <div>
    <button name="idgim0" id="id1tr" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
