<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Fulde navn</label>
    <input type="text" name="name" id="name" placeholder="Indtast dit fulde navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Gade</label>
    <input type="text" name="street" id="street" placeholder="Indtast gadenavn" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Husnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Indtast husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Adresse 2 (valgfri)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Tilføj evt. lejlighed eller suite" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Indtast bynavn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>Finland</option>
</select>
  </div>
  <div>
    <label for="floor">Etage (valgfri)</label>
    <input type="text" name="floor" id="floor" placeholder="Indtast etage, hvis relevant" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="building">Bygning (valgfri)</label>
    <input type="text" name="building" id="building" placeholder="Indtast bygning, hvis relevant" data-moz-autofill-type="building">
  </div>
</form>

</fieldset></body></html>
