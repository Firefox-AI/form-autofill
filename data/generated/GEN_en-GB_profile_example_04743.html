<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="given_name_4347">First Name*</label>
    <input type="text" name="given_name_7463" id="given_name_4347" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_9390">Last Name*</label>
    <input type="text" name="family_name_7516" id="family_name_9390" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="tel_country_code_5470">Country Code</label>
    <input type="tel" name="tel_country_code_7009" id="tel_country_code_5470" placeholder="e.g. +44" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="tel_national_3602">Mobile Number*</label>
    <input type="tel" name="tel_national_5945" id="tel_national_3602" placeholder="Enter your phone number" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="address_level2_8961">Town/City*</label>
    <input type="text" name="address_level2_8858" id="address_level2_8961" placeholder="Your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="address_level1_8924">County*</label>
    <input type="text" name="address_level1_9177" id="address_level1_8924" placeholder="Your county" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="street_address_5899">Street Address*</label>
    <input type="text" name="street_address_4909" id="street_address_5899" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="reference_point_1582">Nearest Landmark (Optional)</label>
    <input type="text" name="reference_point_7253" id="reference_point_1582" placeholder="e.g. Near the park" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
