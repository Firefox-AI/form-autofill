<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Numele complet</span>
    <input type="text" name="name" id="name" placeholder="Introduceti numele dumneavoastră" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Strada</span>
    <input type="text" name="street" id="street" placeholder="Numele străzii" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Numărul clădirii</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Număr" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Apartament, Etaj</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartament, Etaj (opțional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Cod poștal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Cod poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Orașul</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Oraș" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Țara</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
  <option>Marea Britanie</option>
  <option>Ungaria</option>
  <option>Polonia</option>
</select>
  </div>
</form>

</fieldset></body></html>
