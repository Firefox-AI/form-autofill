<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  </div>
  <div>
    <label for="id4c">Nume de familie fonetic</label>
    <input type="text" name="idpjay0" id="id4c" placeholder="Introduceti numele de familie fonetic" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="id9k" id="idepeez" type="submit">Submit</button>
  </div>
