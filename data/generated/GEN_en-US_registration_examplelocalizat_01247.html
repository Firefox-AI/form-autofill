<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-localization.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Country
    <select name="country" id="idyx4" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>India</option>
  <option>Brazil</option>
  <option>Japan</option>
  <option>China</option>
  <option>South Africa</option>
</select>
    </label>
  </div>
  <div>
    <label>Full Name (First and Last Name) *
    <input type="text" name="yourName" id="id07vg8" placeholder="John Doe" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Phone Number *
    <input type="tel" name="phone" id="idh4s0" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Address Line 1 *
    <input type="text" name="address1" id="iddqdak" placeholder="123 Main St" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Address Line 2
    <input type="text" name="addressLine2" id="idqt1uf" placeholder="Apt, suite, etc. (optional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Postcode *
    <input type="number" name="zipCode" id="idso" placeholder="12345" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>City *
    <input type="text" name="city" id="idwo" placeholder="Your city" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>State / Province
    <select name="region" id="idpz7o" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
    </label>
  </div>
  <div>
    <label>ID Number (Learn more)
    <input type="text" name="taxId" id="id441" data-moz-autofill-type="id-number">
    </label>
  </div>
</form>

</fieldset></body></html>
