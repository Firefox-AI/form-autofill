<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbfm">名</label>
    <input type="text" name="givenName" id="idbfm" placeholder="例: 太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idx9">姓</label>
    <input type="text" name="last_name" id="idx9" placeholder="例: 山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idfw">住所</label>
    <input type="text" name="addr1" id="idfw" placeholder="例: 1-2-3 ショッピングビル" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idx0h7">建物名・部屋番号</label>
    <input type="text" name="addr2" id="idx0h7" placeholder="例: フローラ303" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idamy">市区町村</label>
    <input type="text" name="locality" id="idamy" placeholder="例: 新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ido8">郵便番号</label>
    <input type="text" name="zip" id="ido8" placeholder="例: 123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idyuao">国</label>
    <select name="country" id="idyuao" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ合衆国</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>オーストラリア</option>
</select>
  </div>
  <div>
    <label for="id49">メールアドレス</label>
    <input type="email" name="user_email" id="id49" placeholder="例: taro@example.jp" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id2sdlv">電話番号</label>
    <input type="tel" name="telephone" id="id2sdlv" placeholder="例: 090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idm3n">アパート名</label>
    <input type="text" name="flat" id="idm3n" placeholder="例: グリーンハイツ" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="id3fc4b" id="ida76o" type="submit">送信</button>
  </div>
</form>

</fieldset></body></html>
