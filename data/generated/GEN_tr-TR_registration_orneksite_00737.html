<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>orneksite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Adınız</label>
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Soyadınız</label>
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-posta Adresi</label>
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefon Numarası</label>
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Doğum Tarihi</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gizle</option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
</form>

</fieldset></body></html>
