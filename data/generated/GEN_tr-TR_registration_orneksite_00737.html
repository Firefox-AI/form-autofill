<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>orneksite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idooqa">Adınız</label>
    <input type="text" name="fname" id="idooqa" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idcx">Soyadınız</label>
    <input type="text" name="surname" id="idcx" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id8q3">E-posta Adresi</label>
    <input type="email" name="mail" id="id8q3" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idhgfnr">Telefon Numarası</label>
    <input type="tel" name="tel" id="idhgfnr" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idv6q">Doğum Tarihi</label>
    <select name="dob" id="idv6q" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gizli</option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
</form>

</fieldset></body></html>
