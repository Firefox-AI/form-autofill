<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nombre completo</label>
    <input type="text" name="name" id="name" placeholder="Escribe tu nombre completo" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Calle</label>
    <input type="text" name="street" id="street" placeholder="Calle donde vives" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Número</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número de la vivienda" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Piso / Apartamento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Opcional: indica el piso o apartamento" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introducir el código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad de envío" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="floor">Piso</label>
    <input type="text" name="floor" id="floor" placeholder="Número del piso" data-moz-autofill-type="floor">
  </div>
</form>

</fieldset></body></html>
