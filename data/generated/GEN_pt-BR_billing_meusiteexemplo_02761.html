<html><head>

<body>

<fieldset>

  <option>Paraíba</option>

  <option>Piauí</option>
  <option>Rio de Janeiro</option>

  <option>Rio Grande do Sul</option>

  </div>
  <div>
    <input type="text" name="organization" id="idx5n2j" placeholder="Se aplicável" aria-label="Nome da empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="tel" name="tel" id="ida8xd" placeholder="(00) 00000-0000" aria-label="Telefone" data-moz-autofill-type="tel">
