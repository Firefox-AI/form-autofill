<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <div>

  <div>

  <option value=""></option>

  <option>Duitsland</option>

</select>
  </div>
  <div>

  </div>
  <div>
    <button name="idhuiw" id="id8fue" type="submit">Verzenden</button>
  </div>
