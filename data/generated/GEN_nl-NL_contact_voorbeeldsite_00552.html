<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Naam</span>
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="email" placeholder="Vul uw e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefoonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Vul uw telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Adres</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Vul uw straat en huisnummer in" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Stad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul uw postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
</select>
  </div>
  <div>
    <span>BTW-nummer</span>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Vul uw BTW-nummer in" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
