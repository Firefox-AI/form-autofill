<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpjsu">Nome sulla carta</label>
    <input type="text" name="r:r:3:m:r:1:cr:1:c:pr:1:container:fs:i:input" id="idpjsu" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idpl">Numero della carta</label>
    <input type="number" name="r:r:9:m:r:2:cr:1:c:pr:1:container:fs:i:input" id="idpl" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idvohsc">Mese di scadenza</label>
    <select name="r:r:3:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idvohsc" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <label for="idjyqb">Anno di scadenza</label>
    <select name="r:r:4:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idjyqb" data-moz-autofill-type="cc-exp-year">

  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="id2j4p">Codice di sicurezza</label>
    <input type="number" name="r:r:4:m:r:5:cr:3:c:pr:1:container:fs:i:input" id="id2j4p" placeholder="3 o 4 cifre" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idrxc7">Tipo di carta</label>
    <select name="r:r:3:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idrxc7" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <label for="idc7">Indirizzo di fatturazione</label>
    <input type="text" name="r:r:1:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="idc7" placeholder="Via, numero civico" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id8h0q">Codice postale</label>
    <input type="text" name="r:r:3:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="id8h0q" placeholder="CAP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="r:r:4:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="idsz" type="submit">Submit</button>
  </div>

</fieldset></body></html>
