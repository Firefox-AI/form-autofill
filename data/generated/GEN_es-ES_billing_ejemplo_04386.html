<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nombre del titular de la tarjeta</label>
    <input type="text" name="ccName" id="ccName" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle, número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Dirección adicional</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartamento, oficina, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ciudad</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Provincia</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Cantabria</option>
  <option>Castilla y León</option>
  <option>Castilla-La Mancha</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>La Rioja</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>País Vasco</option>
  <option>Comunidad Valenciana</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
  <option>Canadá</option>
  <option>México</option>
  <option>Argentina</option>
  <option>Chile</option>
</select>
  </div>
  <div>
    <label for="vatNumber">Número de IVA</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Número de IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="phoneticName">Nombre fonético</label>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Pronunciación del nombre" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
