<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-pay.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="nameOnCard" id="idgs" placeholder="名義人の名前を入力" aria-label="カード名義人" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="idxth" placeholder="カード番号を入力" aria-label="カード番号" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="expMonth" id="idr4t5c" aria-label="カード有効期限（月）" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <select name="expYear" id="id1yo" aria-label="カード有効期限（年）" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="cardCode6" id="id4s" placeholder="カード裏面の3桁の数字" aria-label="セキュリティコード（CVC）" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="idu6" aria-label="カードの種類" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <input type="text" name="street" id="idx0b3" placeholder="例：東京都千代田区1-1-1" aria-label="住所" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idwmolm" id="idi7za" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
