<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idqurp">E-Mail</label>
    <input type="email" name="email_address" id="idqurp" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idjwnq">Registrierter Benutzer</label>
    <input type="text" name="name" id="idjwnq" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="id41bi2">E-Mail</label>
    <input type="email" name="email_address" id="id41bi2" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id24zg">Telefonnummer</label>
    <input type="tel" name="phoneNumber" id="id24zg" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idow">Ich möchte mich registrieren und meine Daten für zukünftige Bestellungen speichern</label>
    <input type="text" name="username" id="idow" data-moz-autofill-type="loginname">
  </div>
  <div>
    <label for="idawfo4">Abholung von einem Econt-Büro</label>
    <input type="text" name="addr" id="idawfo4" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idxw1">Gebiet:</label>
    <select name="county" id="idxw1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Berlin</option>
  <option>München</option>
  <option>Hamburg</option>
  <option>Köln</option>
  <option>Frankfurt</option>
</select>
  </div>
  <div>
    <label for="id2br">Standort:</label>
    <input type="text" name="city" id="id2br" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idg3k7">Postleitzahl:</label>
    <input type="text" name="zip_code" id="idg3k7" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idkqk0">Straße:</label>
    <input type="text" name="strasse" id="idkqk0" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="idogdg8">Hausnummer:</label>
    <input type="text" name="streetNumber" id="idogdg8" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="id3b5t8">Hausnummer:</label>
    <input type="text" name="city" id="id3b5t8" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idcq09t">Land:</label>
    <select name="country" id="idcq09t" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
</form>

</fieldset></body></html>
