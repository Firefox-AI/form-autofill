<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name *</span>
    <input type="text" name="fname" id="id4ch" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name *</span>
    <input type="text" name="surname" id="idiu4" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Address Line 1 *</span>
    <input type="text" name="address" id="idpmr" placeholder="123 Example Street" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postcode * *</span>
    <input type="text" name="postalCode" id="id9skj0" placeholder="E.g. SW1A 1AA" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City/Town *</span>
    <input type="text" name="locality" id="idhqb1d" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Country *</span>
    <select name="country_id" id="id95zke" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>France</option>
  <option>Germany</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <span>Mobile Number *</span>
    <input type="tel" name="mobile" id="id35" placeholder="07123 456789" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Fixed Phone</span>
    <input type="tel" name="telephone" id="id93qi" placeholder="020 1234 5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
