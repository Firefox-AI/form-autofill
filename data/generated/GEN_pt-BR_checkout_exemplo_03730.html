<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome</span>
    <input type="text" name="givenName" id="idh3b6" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Sobrenome</span>
    <input type="text" name="billing_last_name" id="idllw" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Empresa (opcional)</span>
    <input type="text" name="organization" id="idybil" placeholder="Nome da empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="streetAddress" id="iduw5uc" placeholder="Rua, Av. ou Estrada" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="locality" id="id0d9" placeholder="Digite sua cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>CEP</span>
    <input type="text" name="zip_code" id="id4h" placeholder="Digite seu CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="idf7" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Colômbia</option>
  <option>Uruguai</option>
</select>
  </div>
  <div>
    <span>E-mail</span>
    <input type="email" name="user_email" id="idoiq" placeholder="seuemail@exemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefone</span>
    <input type="tel" name="phone" id="idjfb" placeholder="(XX) 9XXXX-XXXX" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
