<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki-verkkosivusto.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Etunimi</label>
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Sukunimi</label>
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Katuosoite</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Osoite, johon toimitus tapahtuu" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Osoiteosa</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esim. Huoneisto tai kerros" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Kaupunki</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Postinumero</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Esim. 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Maa</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
</select>
  </div>
  <div>
    <label for="email">Sähköposti</label>
    <input type="email" name="email" id="email" placeholder="Anna sähköpostiosoitteesi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Puhelinnumero</label>
    <input type="tel" name="tel" id="tel" placeholder="Esim. +358 40 123 4567" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
