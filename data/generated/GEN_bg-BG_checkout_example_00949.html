<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.bg</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Господин</option>
  <option>Госпожа</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Вашето име" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Вашата фамилия" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Име на фирмата (по желание)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Улица и номер" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Вашият град" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>София</option>
  <option>Пловдив</option>
  <option>Варна</option>
  <option>Бургас</option>
  <option>Русе</option>
  <option>Стара Загора</option>
  <option>Добрич</option>
  <option>Сливен</option>
  <option>Разград</option>
  <option>Кърджали</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Вашият пощенски код" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Вашият имейл адрес" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Вашият телефонен номер" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
