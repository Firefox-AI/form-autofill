<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple-achat.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="firstName" id="ideun24" placeholder="Votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="lname" id="id0yfm" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Société (optionnel)
    <input type="text" name="organization" id="idjeg" placeholder="Nom de votre société" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="addr1" id="id7omu" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Complément d&#x27;adresse (optionnel)
    <input type="text" name="addr2" id="idys" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Région
    <select name="state" id="idhffu" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
  <option>Bretagne</option>
  <option>Grand Est</option>
  <option>Normandie</option>
  <option>Occitanie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
  <option>Mayotte</option>
  <option>Guadeloupe</option>
  <option>Martinique</option>
  <option>Réunion</option>
</select>
    </label>
  </div>
  <div>
    <label>Ville
    <input type="text" name="town" id="idz2nu" placeholder="Votre ville" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Code postal
    <input type="text" name="postalCode" id="idts4" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Pays
    <select name="countryName" id="idxqm" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>Pays-Bas</option>
  <option>Portugal</option>
  <option>Danemark</option>
  <option>Irlande</option>
  <option>Suède</option>
</select>
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="emailAddress" id="idcio" placeholder="Votre adresse email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Téléphone
    <input type="tel" name="tel" id="idrok6i" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
