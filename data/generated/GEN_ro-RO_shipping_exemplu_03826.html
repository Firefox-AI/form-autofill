<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Introduceti numele complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Strada
    <input type="text" name="street" id="street" placeholder="Introduceti numele străzii" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numărul clădirii" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Apartament sau etaj</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartament, etaj sau alte informații" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Cod Poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ex: 123456" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Oraș</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Alegeți orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="Introduceti etajul" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="addressLevel3">Regiune</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Introduceti regiunea" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
