<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtv">Vorname</label>
    <input type="text" name="givenName" id="idtv" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idgu">Nachname</label>
    <input type="text" name="lname" id="idgu" placeholder="Familienname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idqkrmq">E-Mail</label>
    <input type="email" name="mail" id="idqkrmq" placeholder="E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idz1l">Telefonnummer</label>
    <input type="tel" name="telephone" id="idz1l" placeholder="Telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idiamo">Geburtstag (Tag)</label>
    <input type="number" name="dobDay" id="idiamo" placeholder="Geburtstag (Tag)" data-moz-autofill-type="bday-day">
  </div>
  <div>
    <label for="idsf">Geburtstag (Monat)</label>
    <input type="number" name="birthMonth" id="idsf" placeholder="Geburtstag (Monat)" data-moz-autofill-type="bday-month">
  </div>
  <div>
    <label for="idelu">Geburtstag (Jahr)</label>
    <input type="number" name="dobYear" id="idelu" placeholder="Geburtstag (Jahr)" data-moz-autofill-type="bday-year">
  </div>
</form>

</fieldset></body></html>
