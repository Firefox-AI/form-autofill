<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betalingen.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iduj22e">Naam op de kaart</label>
    <input type="text" name="nameOnCard" id="iduj22e" placeholder="Voor- en achternaam" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id5jc40">Kaartnummer</label>
    <input type="number" name="ccNumber" id="id5jc40" placeholder="Vul het kaartnummer in" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idki5">Vervaldatum (maand)</label>
    <select name="expMonth" id="idki5" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januari</option>
  <option>Februari</option>
  <option>Maart</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Augustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="idy9fv">Vervaldatum (jaar)</label>
    <select name="ccExpYear" id="idy9fv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="idkol8">CVC/CVV</label>
    <input type="number" name="cardCode" id="idkol8" placeholder="3 cijfers op de achterkant" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id6ttdy">Kaarttype</label>
    <select name="ccType" id="id6ttdy" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <button name="idk7p5" id="id2ndn" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
