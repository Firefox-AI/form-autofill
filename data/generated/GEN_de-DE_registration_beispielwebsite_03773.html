<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">

<body>

<fieldset>
<h3>beispielwebsite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="E-Mail-Adresse" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vorname" data-moz-autofill-type="given-name">

  <div>

  </div>
  <div>

  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl" data-moz-autofill-type="postal-code">

  <div>

  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>

  <option>Thüringen</option>
</select>
  </div>

</select>

  </div>

    <input type="number" name="ccNumber" id="ccNumber" placeholder="Kreditkartennummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Sicherheitscode (CVC)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Name auf der Kreditkarte" data-moz-autofill-type="cc-name">
