<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Örn: Ahmet Yılmaz" aria-label="Kart Üzerindeki İsim" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" aria-label="Kredi Kartı Numarası" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Son Kullanma Ayı" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" aria-label="Son Kullanma Yılı" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Arka tarafta, 3 haneli" aria-label="Güvenlik Kodu (CVC)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" aria-label="Kart Türü" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Örneğin: İkinci kat" aria-label="Açıklama (isteğe bağlı)" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <input type="text" name="addressLevel4" id="addressLevel4" placeholder="Örn: Kadıköy" aria-label="Semt" data-moz-autofill-type="address-level4">
  </div>
</form>

</fieldset></body></html>
