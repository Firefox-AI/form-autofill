<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義人名</span>
    <input type="text" name="cardName" id="idip7" placeholder="カード名義人のフルネーム" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="cardNumber" id="id6p" placeholder="カード番号を入力してください" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="ccExpMonth2" id="ideex" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="exp_year" id="idrv" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <span>セキュリティコード</span>
    <input type="number" name="securityCode" id="id6b" placeholder="カードの裏面にある3桁または4桁の番号" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードの種類</span>
    <select name="cardType" id="id7ee0" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <span>生年月日（年）</span>
    <select name="dobYear" id="idwbz6q" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2000</option>
  <option>2001</option>
  <option>2002</option>
  <option>2003</option>
  <option>2004</option>
  <option>2005</option>
  <option>2006</option>
  <option>2007</option>
  <option>2008</option>
  <option>2009</option>
  <option>2010</option>
</select>
  </div>
</form>

</fieldset></body></html>
