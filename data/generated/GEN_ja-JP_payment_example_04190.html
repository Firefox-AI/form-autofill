<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>カード名義人名</span>
    <input type="text" name="cc_name_9839" id="cc_name_8840" placeholder="カード名義人のフルネーム" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>カード番号</span>
    <input type="number" name="cc_number_1300" id="cc_number_1322" placeholder="クレジットカード番号を入力" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>有効期限（月）</span>
    <select name="cc_exp_month_2379" id="cc_exp_month_2336" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <span>有効期限（年）</span>
    <select name="cc_exp_year_4139" id="cc_exp_year_8681" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
  <option>2031年</option>
  <option>2032年</option>
</select>
  </div>
  <div>
    <span>CVVコード</span>
    <input type="number" name="cc_csc_9740" id="cc_csc_1421" placeholder="カード裏面に記載の3桁または4桁の番号" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>カードの種類</span>
    <select name="cc_type_5360" id="cc_type_1216" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>JCB</option>
  <option>American Express</option>
</select>
  </div>
  <div>
    <span>生年月日（年）</span>
    <select name="bday_year_8343" id="bday_year_4108" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2000年</option>
  <option>2001年</option>
  <option>2002年</option>
  <option>2003年</option>
  <option>2004年</option>
  <option>2005年</option>
  <option>2006年</option>
  <option>2007年</option>
  <option>2008年</option>
  <option>2009年</option>
</select>
  </div>
</form>

</fieldset></body></html>
