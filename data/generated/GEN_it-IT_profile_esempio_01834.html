<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Cognome
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nome
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nome aggiuntivo
    <input type="text" name="additionalName" id="additionalName" placeholder="Inserisci un nome aggiuntivo (opzionale)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Soprannome
    <input type="text" name="nickname" id="nickname" placeholder="Inserisci il tuo soprannome (opzionale)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefono
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organizzazione
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome dell&#x27;organizzazione (opzionale)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Data di nascita
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Numero identificativo
    <input type="text" name="idNumber" id="idNumber" placeholder="Inserisci il tuo numero identificativo" data-moz-autofill-type="id-number">
    </label>
  </div>
  <div>
    <label>Password
    <input type="password" name="field" id="field" placeholder="Inserisci una password">
    </label>
  </div>
</form>

</fieldset></body></html>
