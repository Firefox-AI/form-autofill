<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome
    <input type="text" name="first_name" id="idmb1" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Cognome
    <input type="text" name="surname" id="idt21cr" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nome aggiuntivo
    <input type="text" name="middle_name" id="idjgnv8" placeholder="Eventuale secondo nome" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Soprannome
    <input type="text" name="displayName" id="idwto1" placeholder="Il tuo soprannome" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="idsej" placeholder="La tua email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefono
    <input type="tel" name="phone" id="idhim" placeholder="Il tuo numero di telefono" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organizzazione
    <input type="text" name="organization" id="id1dt" placeholder="Il tuo datore di lavoro o organizzazione" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Data di nascita
    <select name="dob" id="ididq" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Numero identificativo
    <input type="text" name="idNumber" id="id8i0" placeholder="Codice Fiscale o altro documento" data-moz-autofill-type="id-number">
    </label>
  </div>
  <div>
    <label>Password
    <input type="password" name="idx2zt" id="idkfv5d" placeholder="Inserisci la tua password">
    </label>
  </div>
</form>

</fieldset></body></html>
