<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktiveshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Fornavn
    <input type="text" name="firstName" id="id16" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <span>Efternavn</span>
    <input type="text" name="lastName" id="idwqy" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addr" id="idrr6m" placeholder="Indtast din adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idzz">By</label>
    <input type="text" name="locality" id="idzz" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="zipCode" id="idob46" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idcxta8">Land</label>
    <select name="country" id="idcxta8" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
  <option>Tyskland</option>
  <option>Storbritannien</option>
  <option>Frankrig</option>
  <option>USA</option>
  <option>Andre</option>
</select>
  </div>
  <div>
    <label for="idso">E-mail</label>
    <input type="email" name="email_address" id="idso" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="mobile2" id="iddy" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idmemcs">Region</label>
    <select name="region" id="idmemcs" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Sydjylland</option>
  <option>Sjælland</option>
</select>
  </div>
</form>

</fieldset></body></html>
