<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="idesepg" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>

    <input type="text" name="fullName" id="idjnb6q" placeholder="Enter your first and last name" data-moz-autofill-type="name">

  </div>
  <div>
    <label for="idc3">Address</label>
    <input type="text" name="address4" id="idc3" placeholder="Enter your street address" data-moz-autofill-type="street-address">

    <input type="text" name="postcode" id="idihvv" placeholder="Enter your zip code" data-moz-autofill-type="postal-code">
