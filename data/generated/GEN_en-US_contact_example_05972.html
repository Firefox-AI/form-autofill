<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Organization</span>
    <input type="text" name="business" id="idcuk1" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>First Name (optional)</span>
    <input type="text" name="firstName" id="idy6p" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="billing_last_name" id="idogciy" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Address</span>
    <input type="text" name="streetAddress" id="idz1n" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postal Code</span>
    <input type="text" name="zipCode" id="id8s87" placeholder="ZIP Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City</span>
    <input type="text" name="city" id="id29bi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>State</span>
    <select name="country_id" id="id1hjk" data-moz-autofill-type="country">
  <option value=""></option>
  <option>California</option>
  <option>Texas</option>
  <option>New York</option>
  <option>Florida</option>
  <option>Illinois</option>
</select>
  </div>
  <div>
    <span>Email Address</span>
    <input type="email" name="emailAddress" id="idfvmm" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Country Code</span>
    <select name="phoneCountryCode" id="id8q6l" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1</option>
  <option>+44</option>
  <option>+91</option>
  <option>+33</option>
</select>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="id7u9x" id="idln" placeholder="(123) 456-7890" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
