<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Country
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Australia</option>
  <option>Canada</option>
  <option>United States</option>
</select>
    </label>
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>First Name
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Company Name
    <input type="text" name="organization" id="organization" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Address
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Enter your address" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Phone Number
    <input type="tel" name="tel" id="tel" placeholder="Enter your phone number" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Card Number
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Name on Card
    <input type="text" name="ccName" id="ccName" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Expiry Month
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
    </label>
  </div>
  <div>
    <label>Expiry Year
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
    </label>
  </div>
  <div>
    <label>Security Code (CVV)
    <input type="number" name="ccCsc" id="ccCsc" placeholder="3 digits on the back of the card" data-moz-autofill-type="cc-csc">
    </label>
  </div>
</form>

</fieldset></body></html>
