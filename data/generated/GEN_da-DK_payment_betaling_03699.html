<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>betaling.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idan0zl">Navn på kortet</label>
    <input type="text" name="nameOnCard" id="idan0zl" placeholder="Indtast navn som det står på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idx9ejm">Kortnummer</label>
    <input type="number" name="card_number" id="idx9ejm" placeholder="Indtast dit kortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idgfq">Udløbsmåned</label>
    <select name="exp_month" id="idgfq" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>Marts</option>
  <option>April</option>
  <option>Maj</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <label for="id97">Udløbsår</label>
    <select name="ccExpYear" id="id97" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <label for="idn26rg">Sikkerhedskode (CVV)</label>
    <input type="number" name="cardCode" id="idn26rg" placeholder="Indtast de tre cifre på bagsiden af kortet" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="id812">Korttype</label>
    <select name="cardType" id="id812" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
