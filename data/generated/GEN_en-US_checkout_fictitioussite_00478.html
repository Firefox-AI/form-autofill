<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitious-site.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name*</span>
    <input type="text" name="firstName" id="idq4" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name*</span>
    <input type="text" name="lastName" id="idb7" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Organization (optional)</span>
    <input type="text" name="business" id="idpd" placeholder="Your organization name" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Country*</span>
    <select name="country_id" id="id8njy9" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>Street Address*</span>
    <input type="text" name="id87x8" id="id0xx" placeholder="123 Main St" data-moz-autofill-type="building">
  </div>
  <div>
    <span>Address Line 1 (optional)</span>
    <input type="text" name="addressLine1" id="idsap5" placeholder="Apartment, suite, unit, building, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Address Line 2 (optional)</span>
    <input type="text" name="address2" id="idchi2h" placeholder="Additional address information" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>City*</span>
    <input type="text" name="county" id="idxzn" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <span>Postal Code (optional)</span>
    <input type="text" name="postalCode" id="idbw" placeholder="ZIP Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Phone*</span>
    <input type="tel" name="phoneNumber" id="idn9" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Email Address*</span>
    <input type="email" name="email" id="id42" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
