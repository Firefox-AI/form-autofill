<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbf4kl">Navn på kort</label>
    <input type="text" name="cardName" id="idbf4kl" placeholder="Indtast navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id6i">Adresse</label>
    <input type="text" name="addr1" id="id6i" placeholder="Husnummer og gade" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idhc7ki">Evt. adresseoplysninger</label>
    <input type="text" name="address2" id="idhc7ki" placeholder="Lejlighed, etage, mv." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="ido2">Postnummer</label>
    <input type="text" name="postalCode" id="ido2" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idcz9">By</label>
    <input type="text" name="town" id="idcz9" placeholder="Indtast bynavn" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id4u">Region</label>
    <select name="province" id="id4u" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Sjælland</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
</select>
  </div>
  <div>
    <label for="id5b9">Land</label>
    <select name="countryName" id="id5b9" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="id7s6si">Telefonnummer</label>
    <input type="tel" name="telephone" id="id7s6si" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idqn" id="idll3j0" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
