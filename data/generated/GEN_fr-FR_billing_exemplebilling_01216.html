<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple-billing.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idsip">Nom sur la carte</label>
    <input type="text" name="nameOnCard" id="idsip" placeholder="Nom comme sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idsv">Adresse</label>
    <input type="text" name="address1" id="idsv" placeholder="Numéro et rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id4ucp">Code postal</label>
    <input type="text" name="postcode" id="id4ucp" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idaw">Ville</label>
    <input type="text" name="locality" id="idaw" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idvh">Région</label>
    <select name="stateProvince" id="idvh" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Normandie</option>
  <option>Bretagne</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
  <option>Martinique</option>
  <option>Guadeloupe</option>
  <option>Réunion</option>
  <option>Guyane</option>
</select>
  </div>
  <div>
    <label for="idooc91">Pays</label>
    <select name="country" id="idooc91" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Belgique</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>Suisse</option>
  <option>Pays-Bas</option>
  <option>Canada</option>
  <option>États-Unis</option>
</select>
  </div>
  <div>
    <label for="idm67">Numéro de TVA</label>
    <input type="text" name="vatId" id="idm67" placeholder="Votre numéro de TVA intracommunautaire" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="id46">Téléphone</label>
    <input type="tel" name="telephone" id="id46" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idu6">Complément d&#x27;adresse</label>
    <input type="text" name="addr2" id="idu6" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id7fi">Numéro d&#x27;appartement</label>
    <input type="text" name="flat" id="id7fi" placeholder="Numéro de votre appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="ide98v">Quartier</label>
    <input type="text" name="suburb" id="ide98v" placeholder="Votre quartier (facultatif)" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="idto">Nom phonétique</label>
    <input type="text" name="idh6cad" id="idto" placeholder="Nom prononcé" data-moz-autofill-type="phonetic-name">
  </div>
</form>

</fieldset></body></html>
