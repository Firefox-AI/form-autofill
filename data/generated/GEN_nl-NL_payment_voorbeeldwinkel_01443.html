<body>

<fieldset>
<h3>voorbeeldwinkel.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Oktober</option>

  <option>December</option>
</select>
  </div>
  <div>

  <option>2024</option>
  <option>2025</option>
  <option>2026</option>

  <option>2029</option>

  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <span>CVV</span>
    <input type="number" name="r:r:9:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idzne21" placeholder="Beveiligingscode (achterzijde creditcard)" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Creditcardtype</span>
    <select name="r:r:4:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="id9eg" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Maestro</option>
</select>
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="r:r:2:m:r:7:cr:3:c:pr:1:container:fs:i:input" id="id7u0cg" placeholder="Bijv. 1234 AB" data-moz-autofill-type="postal-code">
