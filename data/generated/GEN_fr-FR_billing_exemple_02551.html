<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">

  <option>Normandie</option>

  <option>Alsace</option>

  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>

  <option>Portugal</option>
  <option>États-Unis</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Numéro de TVA</span>
    <input type="text" name="r:r:9:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idoobu" placeholder="Ex. FR123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="r:r:2:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="ida0nb2" type="submit">Envoyer</button>
  </div>
