<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome e cognome</label>
    <input type="text" name="name" id="name" placeholder="Mario Rossi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Via</label>
    <input type="text" name="street" id="street" placeholder="Via Roma" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Numero civico</label>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="10" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Interno/Scala</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Interno 5, Scala A" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">CAP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Roma" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Nazione</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="building">Edificio</label>
    <input type="text" name="building" id="building" placeholder="Nome edificio" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
