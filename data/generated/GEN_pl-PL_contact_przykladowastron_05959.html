<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idvwypd">Imię i nazwisko</label>
    <input type="text" name="name" id="idvwypd" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idgh5">Adres e-mail</label>
    <input type="email" name="email" id="idgh5" placeholder="jan.kowalski@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idnzs">Numer telefonu</label>
    <input type="tel" name="phoneNumber" id="idnzs" placeholder="123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ida1wv">Adres</label>
    <input type="text" name="streetAddress" id="ida1wv" placeholder="ul. Przykładowa 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idzmpcr">Miasto</label>
    <input type="text" name="locality" id="idzmpcr" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idllofd">Kod pocztowy</label>
    <input type="text" name="zip" id="idllofd" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
