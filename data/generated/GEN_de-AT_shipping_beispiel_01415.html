<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtn">Name</label>
    <input type="text" name="fullName" id="idtn" placeholder="Ihr Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idfdv">Straße und Hausnummer</label>
    <input type="text" name="addr1" id="idfdv" placeholder="Z.B. Musterstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id66">Postleitzahl</label>
    <input type="text" name="zipCode" id="id66" placeholder="Z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idvfy">Ort</label>
    <input type="text" name="locality" id="idvfy" placeholder="Z.B. Wien" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id1b">Land</label>
    <select name="country" id="id1b" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Liechtenstein</option>
  <option>Italien</option>
  <option>Ungarn</option>
</select>
  </div>
  <div>
    <label for="idue5m">Adresszusatz</label>
    <input type="text" name="addressLine2" id="idue5m" placeholder="z.B. c/o Muster" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idx4cr0">Wohnung</label>
    <input type="text" name="unit" id="idx4cr0" placeholder="Z.B. 5B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idhhl" id="iddh" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
