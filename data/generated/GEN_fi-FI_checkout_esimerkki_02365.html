<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2ycw1">Etunimi</label>
    <input type="text" name="billing_first_name" id="id2ycw1" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idpin">Sukunimi</label>
    <input type="text" name="billing_last_name" id="idpin" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id5vyn9">Katuosoite</label>
    <input type="text" name="streetAddress" id="id5vyn9" placeholder="Katuosoite, esim. Toinen katu 10" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id6l88l">Kaupunginosa</label>
    <input type="text" name="locality" id="id6l88l" placeholder="Kaupunginosa tai muu alue" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idpdlz">Postinumero</label>
    <input type="text" name="postalCode" id="idpdlz" placeholder="Postinumero, esim. 00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id2w6">Maa</label>
    <select name="country" id="id2w6" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
</select>
  </div>
  <div>
    <label for="idn2tx7">Sähköposti</label>
    <input type="email" name="emailAddress" id="idn2tx7" placeholder="Sähköpostiosoitteesi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idd0xs">Puhelinnumero</label>
    <input type="tel" name="tel" id="idd0xs" placeholder="Puhelinnumerosi, esim. +358 40 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id20">Maakunta</label>
    <select name="stateProvince" id="id20" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Uusimaa</option>
  <option>Pirkanmaa</option>
  <option>Varsinais-Suomi</option>
  <option>Pohjois-Pohjanmaa</option>
  <option>Etelä-Karjala</option>
</select>
  </div>
</form>

</fieldset></body></html>
