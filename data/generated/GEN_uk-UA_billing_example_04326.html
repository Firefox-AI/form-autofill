<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ім&#x27;я на картці</span>
    <input type="text" name="ccName" id="ccName" placeholder="Введіть ім&#x27;я та прізвище" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Вулиця та номер будинку</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введіть адресу" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Квартира, офіс або додаткова адреса</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="(необов&#x27;язково)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Поштовий індекс</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Місто</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введіть місто" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Область</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Київ</option>
  <option>Харків</option>
  <option>Одеса</option>
  <option>Дніпро</option>
  <option>Львів</option>
  <option>Запоріжжя</option>
  <option>Кривий Ріг</option>
  <option>Миколаїв</option>
  <option>Вінниця</option>
  <option>Чернігів</option>
</select>
  </div>
  <div>
    <span>Країна</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Росія</option>
  <option>Білорусь</option>
  <option>Словаччина</option>
  <option>Угорщина</option>
</select>
  </div>
  <div>
    <span>Номер телефону</span>
    <input type="tel" name="tel" id="tel" placeholder="Введіть номер телефону" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
