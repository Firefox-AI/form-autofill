<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id3z">Fornavn</label>
    <input type="text" name="billing_first_name" id="id3z" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idfyt5">Efternavn</label>
    <input type="text" name="surname" id="idfyt5" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id3k1">Adresse</label>
    <input type="text" name="addressLine1" id="id3k1" placeholder="F.eks. Gade 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idd60q9">Yderligere adresse info (valgfrit)</label>
    <input type="text" name="street2" id="idd60q9" placeholder="F.eks. Lejlighed 4, Trappe B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idg1ph">By</label>
    <input type="text" name="locality" id="idg1ph" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="iduz8">Postnummer</label>
    <input type="text" name="zipCode" id="iduz8" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idy8x">Land</label>
    <select name="countryName" id="idy8x" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="idq7j">E-mail</label>
    <input type="email" name="user_email" id="idq7j" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id1skw">Telefonnummer</label>
    <input type="tel" name="telephone" id="id1skw" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="idqp" id="idqp" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
