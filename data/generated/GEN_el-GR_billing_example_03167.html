<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idzi">Όνομα κατόχου κάρτας</label>
    <input type="text" name="nameOnCard" id="idzi" placeholder="Εισάγετε το όνομα όπως εμφανίζεται στην κάρτα" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idx033c">Διεύθυνση</label>
    <input type="text" name="addr" id="idx033c" placeholder="Οδός και αριθμός" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idin9">Ταχυδρομικός κώδικας</label>
    <input type="text" name="postalCode" id="idin9" placeholder="Εισάγετε τον ταχυδρομικό κώδικα" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idwqf">Περιοχή</label>
    <input type="text" name="locality" id="idwqf" placeholder="Εισάγετε την περιοχή" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idwtre">Νομός</label>
    <select name="state" id="idwtre" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Θεσσαλονίκη</option>
  <option>Κρήτη</option>
  <option>Πελοπόννησος</option>
  <option>Στερεά Ελλάδα</option>
  <option>Βόρειο Αιγαίο</option>
  <option>Νότιο Αιγαίο</option>
  <option>Δυτική Ελλάδα</option>
  <option>Δυτική Μακεδονία</option>
  <option>Κεντρική Μακεδονία</option>
  <option>Ανατολική Μακεδονία και Θράκη</option>
</select>
  </div>
  <div>
    <label for="idaw">Χώρα</label>
    <select name="countryName" id="idaw" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Τουρκία</option>
  <option>Ιταλία</option>
</select>
  </div>
  <div>
    <label for="ideau">Τηλέφωνο</label>
    <input type="tel" name="tel" id="ideau" placeholder="Εισάγετε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
