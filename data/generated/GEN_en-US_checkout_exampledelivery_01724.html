<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-delivery.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idirrs">Delivery Address</label>
    <input type="text" name="name" id="idirrs" placeholder="Delivery Address" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="ided8">Postal Code</label>
    <input type="text" name="postcode" id="ided8" placeholder="Enter your postal code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idcph">City</label>
    <input type="text" name="city" id="idcph" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idl24zs">Landmark or Reference Point</label>
    <input type="text" name="idlqw" id="idl24zs" placeholder="Nearby landmark (if any)" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="idue">Street Name</label>
    <input type="text" name="streetName" id="idue" placeholder="Enter your street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="id6k">House Number / Apt # *</label>
    <input type="number" name="houseNumber" id="id6k" placeholder="Enter your house number" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idkwh">Building Name</label>
    <input type="text" name="idbpvs" id="idkwh" placeholder="Enter building name if applicable" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="idk228q">Floor Number</label>
    <input type="number" name="etage" id="idk228q" placeholder="Enter floor number if applicable" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idsfnr">Apartment/Suite Number</label>
    <input type="text" name="unit" id="idsfnr" placeholder="Enter apartment or suite number" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
