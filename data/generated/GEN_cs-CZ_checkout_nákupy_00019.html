<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>nákupy.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="honorificPrefix" id="honorificPrefix" aria-label="Pan/Paní" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pan</option>
  <option>Paní</option>
  <option>Jiný</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Zadejte vaše jméno" aria-label="Jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Zadejte vaše příjmení" aria-label="Příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ulice, číslo popisné" aria-label="Ulice a číslo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Zadejte město" aria-label="Město" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Kraj" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Zadejte poštovní směrovací číslo" aria-label="PSČ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Země" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Rakousko</option>
  <option>Polsko</option>
  <option>Maďarsko</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Zadejte váš e-mail" aria-label="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Zadejte telefonní číslo" aria-label="Telefonní číslo" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
