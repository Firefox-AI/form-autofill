<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentoexemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardName" id="idy57" placeholder="Como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="cardNo" id="idtu" placeholder="Digite o número do cartão" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="exp_month" id="ids5" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janeiro</option>
  <option>02 - Fevereiro</option>
  <option>03 - Março</option>
  <option>04 - Abril</option>
  <option>05 - Maio</option>
  <option>06 - Junho</option>
  <option>07 - Julho</option>
  <option>08 - Agosto</option>
  <option>09 - Setembro</option>
  <option>10 - Outubro</option>
  <option>11 - Novembro</option>
  <option>12 - Dezembro</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="idmys" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="csc" id="idlvh" placeholder="Últimos 3 dígitos no verso" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="cardType" id="idvb" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <input type="text" name="addr" id="idwjekm" placeholder="Rua, número, complemento" data-moz-autofill-type="street-address">
  </div>
</form>

</fieldset></body></html>
