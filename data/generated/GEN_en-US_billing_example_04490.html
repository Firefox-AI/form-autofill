<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Last Name *</span>
    <input type="text" name="family_name_260" id="family_name_3104" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>First Name *</span>
    <input type="text" name="given_name_1569" id="given_name_3912" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Phone Country Code *</span>
    <select name="tel_country_code_2529" id="tel_country_code_2839" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 (USA)</option>
  <option>+44 (UK)</option>
  <option>+33 (France)</option>
  <option>+49 (Germany)</option>
  <option>+36 (Hungary)</option>
</select>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="tel_2335" id="tel_5779" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Country *</span>
    <select name="country_1453" id="country_8782" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Hungary</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <span>Street Address *</span>
    <input type="text" name="street_address_6212" id="street_address_693" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Additional Information</span>
    <input type="text" name="address_extra_8305" id="address_extra_482" placeholder="Any additional details" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Zip Code *</span>
    <input type="text" name="postal_code_3558" id="postal_code_9527" placeholder="Enter your zip code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="address_level2_2005" id="address_level2_9219" placeholder="Your city" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
