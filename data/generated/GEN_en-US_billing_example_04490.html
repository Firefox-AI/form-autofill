<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Last Name *</span>
    <input type="text" name="lastName2" id="idjki" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>First Name *</span>
    <input type="text" name="first_name" id="idc6bn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Country Code *</span>
    <select name="phoneCountryCode" id="idbd" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 (USA)</option>
  <option>+44 (UK)</option>
  <option>+33 (France)</option>
  <option>+49 (Germany)</option>
  <option>+36 (Hungary)</option>
</select>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="phone7" id="idf5t8" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Country *</span>
    <select name="country_id1" id="idiv8" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Hungary</option>
</select>
  </div>
  <div>
    <span>Street Address *</span>
    <input type="text" name="address1" id="idw5" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Additional Information</span>
    <input type="text" name="idud7" id="idx5qlg" placeholder="Any additional info" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <span>Postal Code *</span>
    <input type="text" name="postalCode" id="idq0" placeholder="ZIP Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City *</span>
    <input type="text" name="city" id="idufq" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
