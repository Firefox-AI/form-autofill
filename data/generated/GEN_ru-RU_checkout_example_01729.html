<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="familyName">Фамилия</label>
    <input type="text" name="familyName" id="familyName" placeholder="Введите вашу фамилию" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="givenName">Имя</label>
    <input type="text" name="givenName" id="givenName" placeholder="Введите ваше имя" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="organization">Организация (если применимо)</label>
    <input type="text" name="organization" id="organization" placeholder="Введите название организации" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Адрес</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введите адрес доставки" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Город</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Почтовый индекс</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Страна</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>США</option>
  <option>Германия</option>
  <option>Франция</option>
  <option>Испания</option>
  <option>Италия</option>
  <option>Китай</option>
  <option>Япония</option>
</select>
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="Введите номер телефона" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
