<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivshop.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Navn på kortet
    <input type="text" name="cardholderName" id="id8bgf" placeholder="Fulde navn som på kortet" data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Adresse
    <input type="text" name="address1" id="idm1" placeholder="Husnummer og vejnavn" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postcode" id="idubzhq" placeholder="Postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>By
    <input type="text" name="town" id="idlh6" placeholder="By" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Region
    <select name="state" id="id1re5w" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Sjælland</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
</select>
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="id90" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
</select>
    </label>
  </div>
  <div>
    <label>CVR-nummer
    <input type="text" name="vatNumber" id="ids9l" placeholder="Virksomhedens CVR-nummer" data-moz-autofill-type="vat-number">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="mobile" id="idi5i" placeholder="Telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Yderligere adresse
    <input type="text" name="addr2" id="idy3" placeholder="Evt. etage eller dør" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Lejlighed
    <input type="text" name="apartment" id="idw0f" placeholder="Lejlighedsnummer" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <button name="id8abt" id="id1hpf" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
