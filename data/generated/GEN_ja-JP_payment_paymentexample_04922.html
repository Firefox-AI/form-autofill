<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paymentexample.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7b3j">カード名義人</label>
    <input type="text" name="cardName" id="id7b3j" placeholder="カードに記載の名前" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idswc">カード番号</label>
    <input type="number" name="cardNo" id="idswc" placeholder="クレジットカード番号を入力" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="id26nrb">有効期限（月）</label>
    <select name="expMonth" id="id26nrb" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>1月</option>
  <option>2月</option>
  <option>3月</option>
  <option>4月</option>
  <option>5月</option>
  <option>6月</option>
  <option>7月</option>
  <option>8月</option>
  <option>9月</option>
  <option>10月</option>
  <option>11月</option>
  <option>12月</option>
</select>
  </div>
  <div>
    <label for="idie5p9">有効期限（年）</label>
    <select name="ccExpYear2" id="idie5p9" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023年</option>
  <option>2024年</option>
  <option>2025年</option>
  <option>2026年</option>
  <option>2027年</option>
  <option>2028年</option>
  <option>2029年</option>
  <option>2030年</option>
  <option>2031年</option>
  <option>2032年</option>
  <option>2033年</option>
</select>
  </div>
  <div>
    <label for="ideaea">セキュリティコード（CVC）</label>
    <input type="number" name="cvv" id="ideaea" placeholder="カード裏面の3桁の数字" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idjqguk">カードの種類</label>
    <select name="cardType" id="idjqguk" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>JCB</option>
  <option>Diners Club</option>
</select>
  </div>
</form>

</fieldset></body></html>
