<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prenume
    <input type="text" name="firstName" id="idv10" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nume de familie
    <input type="text" name="last_name4" id="id9l8" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Adresă
    <input type="text" name="addr17" id="id21" placeholder="Strada și numărul" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Apartament, etaj, etc.
    <input type="text" name="addressLine2" id="id5x7j2" placeholder="(opțional) Apartament, etaj" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Oraș
    <input type="text" name="city" id="idfou" placeholder="Orașul" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Cod poștal
    <input type="text" name="zip_code6" id="idef3" placeholder="Codul poștal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Țară
    <select name="country8" id="idgsf" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cehia</option>
  <option>Croația</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Latvia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>Slovacția</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Marea Britanie</option>
  <option>Statele Unite</option>
</select>
    </label>
  </div>
  <div>
    <label>Email
    <input type="email" name="email" id="idaui" placeholder="email@exemplu.ro" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="phone" id="idcl4ty" placeholder="0740 123 456" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
