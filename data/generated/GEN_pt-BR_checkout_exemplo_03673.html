<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Título
    <select name="r:r:5:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idwq" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
    </label>
  </div>
  <div>
    <label>Nome
    <input type="text" name="r:r:4:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idj3nhd" placeholder="Seu primeiro nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sobrenome
    <input type="text" name="r:r:6:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idkq" placeholder="Seu sobrenome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Empresa
    <input type="text" name="r:r:7:m:r:4:cr:3:c:pr:1:container:fs:i:input" id="idcm" placeholder="Nome da sua empresa (opcional)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Endereço
    <input type="text" name="r:r:7:m:r:5:cr:2:c:pr:1:container:fs:i:input" id="idvbsn7" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Cidade
    <input type="text" name="r:r:4:m:r:6:cr:2:c:pr:1:container:fs:i:input" id="idga1i" placeholder="Sua cidade" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Estado
    <select name="r:r:5:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="id2ul2" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Acre</option>
  <option>Alagoas</option>
  <option>Amapá</option>
  <option>Amazonas</option>
  <option>Bahia</option>
  <option>Ceará</option>
  <option>Distrito Federal</option>
  <option>Espírito Santo</option>
  <option>Goiás</option>
  <option>Maranhão</option>
  <option>Mato Grosso</option>
  <option>Mato Grosso do Sul</option>
  <option>Minas Gerais</option>
  <option>Pará</option>
  <option>Paraíba</option>
  <option>Paraná</option>
  <option>Pernambuco</option>
  <option>Piauí</option>
  <option>Rio de Janeiro</option>
  <option>Rio Grande do Norte</option>
  <option>Rio Grande do Sul</option>
  <option>Rio de Janeiro</option>
  <option>Rondônia</option>
  <option>Roraima</option>
  <option>São Paulo</option>
  <option>Santa Catarina</option>
  <option>Sergipe</option>
  <option>Tocantins</option>
</select>
    </label>
  </div>
  <div>
    <label>CEP
    <input type="text" name="r:r:1:m:r:8:cr:2:c:pr:1:container:fs:i:input" id="idnyhv" placeholder="Seu CEP" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>País
    <select name="r:r:8:m:r:9:cr:3:c:pr:1:container:fs:i:input" id="idtqbi" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="r:r:8:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idid" placeholder="seuemail@exemplo.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefone
    <input type="tel" name="r:r:3:m:r:11:cr:3:c:pr:1:container:fs:i:input" id="idwg" placeholder="(XX) XXXX-XXXX" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
