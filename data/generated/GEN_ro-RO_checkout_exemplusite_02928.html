<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu-site.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpyhm">Prenume</label>
    <input type="text" name="fname" id="idpyhm" placeholder="Introduceti prenumele" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Nume de familie
    <input type="text" name="last_name" id="idpkom" placeholder="Introduceti numele de familie" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <input type="text" name="addr1" id="idbnr5" placeholder="Strada, numărul" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idyon">Oraș</label>
    <input type="text" name="town" id="idyon" placeholder="Introduceti orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idnu1">Cod poștal</label>
    <input type="text" name="postcode" id="idnu1" placeholder="Cod poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Țară
    <select name="countryName" id="idqdqgf" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Austria</option>
  <option>Belgia</option>
  <option>Bulgaria</option>
  <option>Cipru</option>
  <option>Croația</option>
  <option>Cehia</option>
  <option>Danemarca</option>
  <option>Estonia</option>
  <option>Finlanda</option>
  <option>Franța</option>
  <option>Germania</option>
  <option>Grecia</option>
  <option>Ungaria</option>
  <option>Islanda</option>
  <option>Irlanda</option>
  <option>Italia</option>
  <option>Latvia</option>
  <option>Lituania</option>
  <option>Luxemburg</option>
  <option>Malta</option>
  <option>Olanda</option>
  <option>Polonia</option>
  <option>Portugalia</option>
  <option>România</option>
  <option>Slovacia</option>
  <option>Slovenia</option>
  <option>Spania</option>
  <option>Suedia</option>
  <option>Marea Britanie</option>
</select>
    </label>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="user_email" id="id60wi" placeholder="Introduceti adresa de email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="phone" id="iduvayn" placeholder="Introduceți numărul de telefon" aria-label="Număr de telefon" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Apartament (opțional)</span>
    <input type="text" name="flat" id="idz9r" placeholder="Număr apartament" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
