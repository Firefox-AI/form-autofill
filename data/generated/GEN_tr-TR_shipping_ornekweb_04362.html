<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekweb.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhdsor">Adınız ve Soyadınız</label>
    <input type="text" name="contactName" id="idhdsor" placeholder="Adınızı ve soyadınızı girin" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="ida2">Adres</label>
    <input type="text" name="addressLine1" id="ida2" placeholder="Sokak, cadde veya mahalle adı" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idrc">Posta Kodu</label>
    <input type="text" name="zipCode" id="idrc" placeholder="Posta kodunuzu girin" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id0d">İl</label>
    <input type="text" name="locality" id="id0d" placeholder="İlinizi seçin" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id30f">Ülke</label>
    <select name="countryName" id="id30f" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Türkiye</option>
  <option>Almanya</option>
  <option>Fransa</option>
  <option>İngiltere</option>
  <option>ABD</option>
  <option>İtalya</option>
  <option>İspanya</option>
  <option>Hollanda</option>
  <option>Kanada</option>
  <option>Avustralya</option>
</select>
  </div>
  <div>
    <label for="id2mh">Kat</label>
    <input type="text" name="floor" id="id2mh" placeholder="Örneğin: 5" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idv4b2">İlçe</label>
    <input type="text" name="suburb" id="idv4b2" placeholder="İlçenizi girin" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="idsq">Doğum Günü (Gün)</label>
    <select name="birthDay" id="idsq" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
</form>

</fieldset></body></html>
