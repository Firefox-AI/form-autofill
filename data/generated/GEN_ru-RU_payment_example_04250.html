<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Имя владельца карты</span>
    <input type="text" name="cardName" id="id19" placeholder="ФИО владельца карты" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Номер карты</span>
    <input type="number" name="card_number" id="id9m71" placeholder="Введите номер карты" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Месяц окончания</span>
    <select name="exp_month" id="id5wwvl" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Январь</option>
  <option>Февраль</option>
  <option>Март</option>
  <option>Апрель</option>
  <option>Май</option>
  <option>Июнь</option>
  <option>Июль</option>
  <option>Август</option>
  <option>Сентябрь</option>
  <option>Октябрь</option>
  <option>Ноябрь</option>
  <option>Декабрь</option>
</select>
  </div>
  <div>
    <span>Год окончания</span>
    <select name="exp_year" id="idr2t1b" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Код безопасности (CVC)</span>
    <input type="number" name="securityCode" id="ida8qlm" placeholder="3 цифры на обратной стороне карты" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Тип карты</span>
    <select name="cardType" id="id9q" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
  <option>American Express</option>
</select>
  </div>
</form>

</fieldset></body></html>
