<html><head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id43par">Nome sulla carta</label>
    <input type="text" name="ccName" id="id43par" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">

  <div>
    <label for="idbg">Codice postale</label>
    <input type="text" name="zip_code" id="idbg" placeholder="00000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id9vj7">Città</label>
    <input type="text" name="city" id="id9vj7" placeholder="Nome della città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idj5sy">Regione</label>
    <select name="county" id="idj5sy" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lazio</option>
  <option>Lombardia</option>
  <option>Campania</option>
  <option>Sicilia</option>
  <option>Veneto</option>
  <option>Emilia-Romagna</option>
  <option>Puglia</option>
  <option>Piemonte</option>
  <option>Calabria</option>
  <option>Toscana</option>
  <option>Liguria</option>
  <option>Marche</option>
  <option>Abruzzo</option>
  <option>Friuli-Venezia Giulia</option>
  <option>Umbria</option>
  <option>Basilicata</option>
  <option>Molise</option>
  <option>Sardegna</option>
  <option>Aosta Valley</option>
  <option>Trentino-Alto Adige</option>
</select>
  </div>
  <div>
    <label for="id0v">Paese</label>
    <select name="countryName" id="id0v" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Belgio</option>
  <option>Paesi Bassi</option>
  <option>Svezia</option>
  <option>Danimarca</option>
  <option>Finlandia</option>
  <option>Austria</option>
  <option>Svizzera</option>
  <option>Polonia</option>
  <option>Cechia</option>
  <option>Ungheria</option>
  <option>Slovacchia</option>
  <option>Slovenia</option>
</select>
  </div>
</form>

</fieldset></body></html>
