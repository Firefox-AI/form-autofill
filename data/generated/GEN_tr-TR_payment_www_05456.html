<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.alisveris.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idslim">Kart Üzerindeki İsim</label>
    <input type="text" name="ccName" id="idslim" placeholder="Adınız ve Soyadınız" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ids9e">Kredi Kartı Numarası</label>
    <input type="number" name="ccNumber" id="ids9e" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idit">Son Kullanma Ayı</label>
    <select name="expMonth" id="idit" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <label for="idji">Son Kullanma Yılı</label>
    <select name="ccExpYear" id="idji" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idjewww">Güvenlik Kodu</label>
    <input type="number" name="csc" id="idjewww" placeholder="Arka yüzünde bulunan 3 haneli kod" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idl3">Kart Tipi</label>
    <select name="cardType" id="idl3" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Maestro</option>
  <option>Discover</option>
</select>
  </div>
</form>

</fieldset></body></html>
