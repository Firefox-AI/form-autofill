<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id98wf4">Nome no cartão</label>
    <input type="text" name="ccName" id="id98wf4" placeholder="Como está no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idk4">Número do cartão</label>
    <input type="number" name="cardNo" id="idk4" placeholder="0000 0000 0000 0000" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idoasza">Mês de validade</label>
    <select name="ccExpMonth" id="idoasza" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <label for="idpwr">Ano de validade</label>
    <select name="expYear" id="idpwr" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
</select>
  </div>
  <div>
    <label for="id11y">Código de segurança</label>
    <input type="number" name="cvv" id="id11y" placeholder="3 ou 4 dígitos" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idw0n9">Tipo do cartão</label>
    <select name="ccType" id="idw0n9" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>Mastercard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Elo</option>
  <option>Hipercard</option>
</select>
  </div>
  <div>
    <button name="idp49e6" id="id7mx31" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
