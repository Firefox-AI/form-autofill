<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prenume
    <input type="text" name="givenName" id="givenName" placeholder="Introduceți prenumele" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nume de familie
    <input type="text" name="familyName" id="familyName" placeholder="Introduceți numele de familie" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nume suplimentar
    <input type="text" name="additionalName" id="additionalName" placeholder="Introduceți numele suplimentar (opțional)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Poreclă
    <input type="text" name="nickname" id="nickname" placeholder="Introduceți o poreclă (opțional)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Adresă de email
    <input type="email" name="email" id="email" placeholder="Introduceți adresa de email" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="tel" id="tel" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organizație
    <input type="text" name="organization" id="organization" placeholder="Introduceți numele organizației (opțional)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Data nașterii
    <select name="bday" id="bday" data-moz-autofill-type="bday">

  <option>22</option>

  <option>31</option>
</select>
    </label>
  </div>
  <div>
    <label>Titlu organizație
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Introduceți titlul rolului (opțional)" data-moz-autofill-type="organization-title">
    </label>
  </div>
</form>

</fieldset></body></html>
