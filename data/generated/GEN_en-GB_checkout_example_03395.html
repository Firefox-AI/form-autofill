<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idue33z">First Name</label>
    <input type="text" name="billing_first_name" id="idue33z" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idae5j">Last Name</label>

  </div>
  <div>
    <label for="ide9g">Street Address</label>
    <input type="text" name="addr1" id="ide9g" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idg8n">Address Line 2 (Optional)</label>
    <input type="text" name="street2" id="idg8n" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="iduz18p">Country</label>
    <select name="country" id="iduz18p" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="id7gp9">County</label>
    <input type="text" name="state" id="id7gp9" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idm7l">County</label>
    <input type="text" name="state" id="idm7l" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idv8oii">City</label>
    <input type="text" name="city" id="idv8oii" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idavh9n">Postcode</label>
    <input type="text" name="zipCode" id="idavh9n" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idcrl2">Phone Number</label>
    <input type="tel" name="tel" id="idcrl2" placeholder="Please enter a valid British phone number. Example: 020 1234 5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idu33">Please enter a valid British phone number. Example: 020 1234 5678</label>
    <input type="tel" name="state" id="idu33" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idmm">Please enter a valid British phone number. Example: 020 1234 5678</label>
    <input type="tel" name="region" id="idmm" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id3rj1">Please enter a valid British phone number. Example: 020 1234 5678</label>
    <input type="tel" name="region" id="id3rj1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id58m2">Please enter a valid British phone number. Example: 020 1234 5678</label>
    <input type="tel" name="stateProvince" id="id58m2" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idmz">Please enter a valid British phone number. Example: 020 1234 5678</label>
    <input type="tel" name="stateProvince" id="idmz" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="idy3t">Email Address</label>
    <input type="email" name="province" id="idy3t" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="id1u5">Name on Card</label>
    <input type="text" name="emailAddress" id="id1u5" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idav1">Card Type</label>
    <select name="nameOnCard" id="idav1" data-moz-autofill-type="cc-name">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idb5w6">Card Number</label>
    <input type="number" name="cardType" id="idb5w6" data-moz-autofill-type="cc-type">
  </div>
  <div>
    <label for="idwjx5n">Expiry Month</label>
    <select name="ccNumber" id="idwjx5n" data-moz-autofill-type="cc-number">

  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>

  <option value=""></option>

  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idwni">Security Code</label>
    <input type="number" name="exp_year" id="idwni" data-moz-autofill-type="cc-exp-year">
  </div>
  <div>
    <label for="idf5">Standard UK Shipping</label>
    <select name="cvv" id="idf5" data-moz-autofill-type="cc-csc">
  <option value=""></option>
  <option>Standard</option>
  <option>Express</option>
  <option>Next Day</option>
</select>
  </div>
  <div>
    <label for="idm9">Change your shipping country</label>
    <select name="email_address" id="idm9" data-moz-autofill-type="email">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
  </div>
</form>

</fieldset></body></html>
