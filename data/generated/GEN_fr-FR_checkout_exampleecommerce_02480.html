<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-ecommerce.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idp5">Prénom</label>
    <input type="text" name="first_name" id="idp5" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idc2m">Nom</label>
    <input type="text" name="billing_last_name" id="idc2m" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idh7">Adresse</label>
    <input type="text" name="addr1" id="idh7" placeholder="Numéro et rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idar2rk">Ville</label>
    <input type="text" name="locality" id="idar2rk" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idgk4f">Code postal</label>
    <input type="text" name="postalCode" id="idgk4f" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idqr">Pays</label>
    <select name="country" id="idqr" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <label for="id4ja">E-mail</label>
    <input type="email" name="mail" id="id4ja" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idwyl0">Téléphone</label>
    <input type="tel" name="telephone" id="idwyl0" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idg9se">Société (facultatif)</label>
    <input type="text" name="organization" id="idg9se" placeholder="Nom de votre société" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idda">Appartement (facultatif)</label>
    <input type="text" name="unit" id="idda" placeholder="Numéro de l&#x27;appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="idnlip" id="idun" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
