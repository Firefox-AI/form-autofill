<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name*</span>
    <input type="text" name="firstName" id="idwlg" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name*</span>
    <input type="text" name="lastName" id="id1cq" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Street Address*</span>
    <input type="text" name="address1" id="idhj" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>House Number*</span>
    <input type="number" name="number" id="idh0j" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Apartment/Flat</span>
    <input type="text" name="addressLine2" id="id3j65" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Postcode*</span>
    <input type="text" name="zipCode" id="id9yd4" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>City/Town*</span>
    <input type="text" name="city" id="idrbl" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Mobile Number*</span>
    <input type="tel" name="phone" id="iduygd3" placeholder="e.g. 07123456789" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
