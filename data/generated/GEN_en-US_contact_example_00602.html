<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>House Number</span>
    <input type="number" name="houseNumber" id="id0o0" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Street Name</span>
    <input type="text" name="streetName" id="idd5" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Apartment, Suite, etc.</span>
    <input type="text" name="suite" id="idwlld" placeholder="Optional" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Additional Address Information (optional)</span>
    <input type="text" name="city" id="idjz" placeholder="e.g. Floor, Unit" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>ZIP Code</span>
    <input type="number" name="zipCode" id="idtrnk" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
