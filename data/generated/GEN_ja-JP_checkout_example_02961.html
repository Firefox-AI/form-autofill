<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">名</label>
    <input type="text" name="givenName" id="givenName" placeholder="山田" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">姓</label>
    <input type="text" name="familyName" id="familyName" placeholder="太郎" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="organization">会社名</label>
    <input type="text" name="organization" id="organization" placeholder="例：株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">住所</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="1-2-3 例町" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">市区町村</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="例市" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">郵便番号</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">国</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>フランス</option>
</select>
  </div>
  <div>
    <label for="email">メールアドレス</label>
    <input type="email" name="email" id="email" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">電話番号</label>
    <input type="tel" name="tel" id="tel" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
