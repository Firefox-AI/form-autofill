<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktifodeme.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="id2hx" placeholder="Ad ve Soyadınızı Girin" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idle">Kredi Kartı Numarası</label>
    <input type="number" name="ccNumber4" id="idle" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Son Kullanma Ayı</span>
    <select name="expMonth" id="idjbx4" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Ocak</option>
  <option>Şubat</option>
  <option>Mart</option>
  <option>Nisan</option>
  <option>Mayıs</option>
  <option>Haziran</option>
  <option>Temmuz</option>
  <option>Ağustos</option>
  <option>Eylül</option>
  <option>Ekim</option>
  <option>Kasım</option>
  <option>Aralık</option>
</select>
  </div>
  <div>
    <label for="id25">Son Kullanma Yılı</label>
    <select name="expYear" id="id25" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Güvenlik Kodu (CVC)</span>
    <input type="number" name="securityCode" id="idqu" placeholder="Arka Tarafta 3 Haneli Kod" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Kart Tipi</span>
    <select name="cardType" id="idswx" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idxhsou" id="idhifza" type="submit">Ödeme Yap</button>
  </div>
</form>

</fieldset></body></html>
