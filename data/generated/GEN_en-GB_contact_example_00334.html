<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id7mzb2">First and Last Name*</label>
    <input type="text" name="name" id="id7mzb2" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idmd">Address*</label>
    <input type="text" name="addr" id="idmd" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idta">Postcode*</label>
    <input type="text" name="zip_code" id="idta" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idt6d8">Town/City*</label>
    <input type="text" name="city" id="idt6d8" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idfo">Country*</label>
    <select name="country" id="idfo" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <label for="idpopof">Telephone*</label>
    <input type="tel" name="phoneNumber" id="idpopof" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idnay">Email Address*</label>
    <input type="email" name="email_address" id="idnay" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
