<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">First and Last Name*</label>
    <input type="text" name="name" id="name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="streetAddress">Address*</label>
    <input type="text" name="streetAddress" id="streetAddress" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="postalCode">Postcode*</label>
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Town/City*</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="country">Country*</label>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <label for="tel">Telephone*</label>
    <input type="tel" name="tel" id="tel" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email">Email Address*</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
