<body>

<fieldset>

<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Recipient&#x27;s Name</span>
    <input type="text" name="name" id="idkb71" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Telephone Number</span>

  </div>
  <div>
    <span>Full Address</span>

  <div>
    <span>Town/City</span>

  <div>
    <span>Postal Code</span>
    <input type="text" name="zipCode" id="idkhtrs" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
