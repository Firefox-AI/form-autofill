<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nom complet</span>
    <input type="text" name="name" id="name" placeholder="Jean Dupont" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Numéro de la maison</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Rue</span>
    <input type="text" name="street" id="street" placeholder="Rue de la Paix" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Complément d&#x27;adresse (optionnel)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Appartement, étage, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
  <option>Suisse</option>
</select>
  </div>
  <div>
    <span>Étage (si applicable)</span>
    <input type="text" name="floor" id="floor" placeholder="2" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Bâtiment (si applicable)</span>
    <input type="text" name="building" id="building" placeholder="A" data-moz-autofill-type="building">
  </div>
  <div>
    <span>Point de repère (facultatif)</span>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Près de la gare" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
