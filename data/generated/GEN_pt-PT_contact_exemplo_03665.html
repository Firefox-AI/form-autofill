<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.pt</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idw3">Sufixo de honorífico</label>
    <input type="text" name="idwl" id="idw3" placeholder="(ex: Jr., Sr.)" data-moz-autofill-type="honorific-suffix">
  </div>
  <div>
    <label for="idi0rta">Nome completo</label>
    <input type="text" name="name" id="idi0rta" placeholder="Seu nome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idkmw">Email</label>
    <input type="email" name="email_address" id="idkmw" placeholder="seuemail@exemplo.pt" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id6ecd">Número de telefone</label>
    <input type="tel" name="mobile" id="id6ecd" placeholder="(123) 456-789" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idh7r1z">Organização</label>
    <input type="text" name="business" id="idh7r1z" placeholder="Nome da empresa ou organização" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idog">Endereço</label>
    <input type="text" name="street" id="idog" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id076">Cidade</label>
    <input type="text" name="city" id="id076" placeholder="Sua cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id9mr0q">Código postal</label>
    <input type="text" name="postalCode" id="id9mr0q" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idm4">País</label>
    <select name="country" id="idm4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Reino Unido</option>
  <option>Alemanha</option>
</select>
  </div>
  <div>
    <label for="idzwl">Escada</label>
    <input type="text" name="idrfvp" id="idzwl" placeholder="Número da escada ou andar" data-moz-autofill-type="stair">
  </div>
</form>

</fieldset></body></html>
