<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-billing.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>会社名</span>
    <input type="text" name="organization3" id="idl2t6" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>カード名義人</span>
    <input type="text" name="cardName2" id="idgi" placeholder="山田 太郎" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>住所</span>
    <input type="text" name="address13" id="idjn081" placeholder="1-2-3 サンプルビル" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>建物名・部屋番号</span>
    <input type="text" name="address2" id="idaw8gn" placeholder="サンプルマンション101" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>都道府県</span>
    <select name="region" id="idh1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
  <option>神奈川県</option>
  <option>兵庫県</option>
  <option>千葉県</option>
  <option>埼玉県</option>
  <option>静岡県</option>
  <option>茨城県</option>
  <option>京都府</option>
  <option>広島県</option>
  <option>新潟県</option>
  <option>宮城県</option>
  <option>福島県</option>
</select>
  </div>
  <div>
    <span>市区町村</span>
    <input type="text" name="locality" id="idcjvh" placeholder="新宿区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>郵便番号</span>
    <input type="text" name="zip_code" id="idccm" placeholder="100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>国</span>
    <select name="countryName" id="idc1ce" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>イギリス</option>
  <option>ドイツ</option>
  <option>フランス</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
  <option>オーストラリア</option>
  <option>カナダ</option>
</select>
  </div>
  <div>
    <span>電話番号</span>
    <input type="tel" name="phoneNumber" id="id8k0" placeholder="03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>VAT番号</span>
    <input type="text" name="vatId" id="idq8" placeholder="JP123456789" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>ID番号</span>
    <input type="text" name="taxId" id="id5lwhk" placeholder="1234567890" data-moz-autofill-type="id-number">
  </div>
</form>

</fieldset></body></html>
