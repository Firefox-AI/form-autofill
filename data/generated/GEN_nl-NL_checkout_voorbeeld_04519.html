<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Voornaam</span>
    <input type="text" name="givenName" id="givenName" placeholder="Vul je voornaam in" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Vul je achternaam in" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Straat</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Plaats</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postcode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
</select>
  </div>
  <div>
    <span>E-mailadres</span>
    <input type="email" name="email" id="email" placeholder="Vul je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Telefoonnummer" aria-label="Telefoonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Bedrijfsnaam (optioneel)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel1">Provincie</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Groningen</option>
  <option>Friesland</option>
  <option>Drenthe</option>
  <option>Overijssel</option>
  <option>Flevoland</option>
  <option>Gelderland</option>
  <option>Utrecht</option>
  <option>Noord-Holland</option>
  <option>Zuid-Holland</option>
  <option>Zeeland</option>
  <option>Noord-Brabant</option>
  <option>Limburg</option>
</select>
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Appartement of eenheid (optioneel)" aria-label="Appartement" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="addressExtra">Aanvullende informatie</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Bijvoorbeeld een etage of een referentie" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <button name="field" id="field" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
