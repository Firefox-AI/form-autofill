<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome completo</span>
    <input type="text" name="contactName" id="idi8fm7" placeholder="Insira o seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="address1" id="idqj" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Código Postal</span>
    <input type="text" name="zip" id="id4r" placeholder="Insira o código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="locality" id="ider2d" placeholder="Insira a cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="ido4h" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Países Baixos</option>
  <option>Bélgica</option>
  <option>Irlanda</option>
  <option>Suíça</option>
</select>
  </div>
  <div>
    <span>Edifício</span>
    <input type="text" name="idvl4" id="iduog6" placeholder="Insira o nome do edifício (se aplicável)" data-moz-autofill-type="building">
  </div>
  <div>
    <span>Mês de Nascimento</span>
    <select name="birthMonth" id="id96" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
  <option>Maio</option>
  <option>Junho</option>
  <option>Julho</option>
  <option>Agosto</option>
  <option>Setembro</option>
  <option>Outubro</option>
  <option>Novembro</option>
  <option>Dezembro</option>
</select>
  </div>
  <div>
    <button name="ide782" id="idbg" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
