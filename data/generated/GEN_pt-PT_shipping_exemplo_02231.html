<html><head>

</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome Completo</span>
    <input type="text" name="r:r:3:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="idm7" placeholder="Insira o seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Rua</span>

  </div>
  <div>
    <span>Número</span>
    <input type="text" name="r:r:2:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="idr9ver" placeholder="Número da casa/apartamento" data-moz-autofill-type="address-housenumber">

  <div>

  </div>

    <span>Código Postal</span>

  <div>
    <span>Concelho</span>

  <option value=""></option>

  <option>Coimbra</option>
  <option>Braga</option>
  <option>Évora</option>
  <option>Madeira</option>
  <option>Açores</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="r:r:9:m:r:7:cr:1:c:pr:1:container:fs:i:input" id="ide782" data-moz-autofill-type="country-name">

  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Outros</option>
</select>
  </div>

    <span>Ponto de Referência</span>

  </div>
  <div>
    <button name="r:r:8:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="idb82" type="submit">Submit</button>
  </div>
</form>
