<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>priklad.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Vaše příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Například druhé jméno" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Vaše přezdívka" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Vaše e-mailová adresa" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Vaše telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Název organizace" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Datum narození" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Vaše pracovní pozice" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Zadejte heslo">
  </div>
  <div>
    <button name="field" id="field" type="submit">Odeslat</button>
  </div>
</form>

</fieldset></body></html>
