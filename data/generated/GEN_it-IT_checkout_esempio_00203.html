<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" aria-label="Cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Inserisci il nome della tua azienda" aria-label="Azienda (opzionale)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Inserisci il tuo indirizzo" aria-label="Indirizzo" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" aria-label="Città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Inserisci il tuo codice postale" aria-label="CAP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" aria-label="Telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Provincia" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Torino</option>
  <option>Napoli</option>
  <option>Firenze</option>
</select>
  </div>
</form>

</fieldset></body></html>
