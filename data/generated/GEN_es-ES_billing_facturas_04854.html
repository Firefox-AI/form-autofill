<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>facturas.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre completo</span>
    <input type="text" name="ccName" id="ccName" placeholder="Tu nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Dirección</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle, número, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso, puerta, etc. (opcional)" aria-label="Dirección adicional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" aria-label="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Provincia</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
  <option>Malaga</option>
  <option>Murcia</option>
  <option>Palma</option>
  <option>Bilbao</option>
  <option>Alicante</option>
  <option>Granada</option>
  <option>Tenerife</option>
  <option>Cádiz</option>
  <option>Córdoba</option>
  <option>La Coruña</option>
</select>
  </div>
  <div>
    <label>País
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Portugal</option>
  <option>Bélgica</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
  <option>Noruega</option>
</select>
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
