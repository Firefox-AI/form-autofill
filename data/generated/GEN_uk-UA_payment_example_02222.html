<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Ім&#x27;я на картці</span>
    <input type="text" name="ccName" id="ccName" placeholder="Прізвище, Ім&#x27;я" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Номер картки</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX XXXX XXXX XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Місяць закінчення</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>Рік закінчення</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>CVV код</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Три цифри на звороті картки" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Тип картки</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Адреса</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Вулиця та номер будинку" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Будинок</span>
    <input type="text" name="building" id="building" placeholder="Наприклад, корпус, секція" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="field" id="field" type="submit">Підтвердити</button>
  </div>
</form>

</fieldset></body></html>
