<html><head>

<body>

<fieldset>

  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>

  </div>
  <div>

  </div>
  <div>
    <span>Тип картки</span>

  </div>
  <div>
    <span>Будинок</span>
    <input type="text" name="idw1" id="idoj" placeholder="Номер будинку" data-moz-autofill-type="building">
  </div>
  <div>
    <button name="id587v9" id="id7bk" type="submit">Submit</button>
  </div>
  <div>
    <button name="id57gwx" id="id2a1q6" type="submit">Submit</button>
  </div>
