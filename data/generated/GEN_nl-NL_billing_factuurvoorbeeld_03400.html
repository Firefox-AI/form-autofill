<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>factuurvoorbeeld.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idbpbx">Kaartnaam</label>
    <input type="text" name="cardName" id="idbpbx" placeholder="Naam zoals op de kaart" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id5xvc2">Adres</label>
    <input type="text" name="addressLine1" id="id5xvc2" placeholder="Straatnaam en huisnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id9elg">Postcode</label>
    <input type="text" name="zip_code" id="id9elg" placeholder="Bijv. 1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idaq">Plaats</label>
    <input type="text" name="locality" id="idaq" placeholder="Plaatsnaam" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idn8">Provincie</label>
    <select name="region" id="idn8" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Utrecht</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <label for="id4nwd">Land</label>
    <select name="countryName4" id="id4nwd" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
  <option>Spanje</option>
  <option>Italië</option>
</select>
  </div>
  <div>
    <label for="idrsdc1">BTW-nummer</label>
    <input type="text" name="vat5" id="idrsdc1" placeholder="Bijv. NL123456789B01" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idlvl2c">Extra adresinformatie</label>
    <input type="text" name="address2" id="idlvl2c" placeholder="Bijv. Appartement, verdieping, etc." data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
