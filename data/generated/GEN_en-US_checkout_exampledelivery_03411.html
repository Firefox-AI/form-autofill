<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-delivery.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Delivery Address" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Zip Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="E.g., near the train station" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Enter street name" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="E.g., 123" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="E.g., Oakwood Apartments" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="floor" id="floor" placeholder="E.g., 3rd floor" data-moz-autofill-type="floor">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="E.g., A1" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
