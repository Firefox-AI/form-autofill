<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Namn
    <input type="text" name="name" id="name" placeholder="För- och efternamn" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Gata
    <input type="text" name="street" id="street" placeholder="Ange gatan" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Husnummer
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Ange husnummer" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Adressrad 2 (valfritt)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Lägenhetsnummer eller annan information" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Postnummer
    <input type="text" name="postalCode" id="postalCode" placeholder="Ange postnummer" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Stad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ange stad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
    </label>
  </div>
  <div>
    <label>Lägenhet (valfritt)
    <input type="text" name="apartment" id="apartment" placeholder="Ange lägenhetsnummer" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">.</button>
  </div>
</form>

</fieldset></body></html>
