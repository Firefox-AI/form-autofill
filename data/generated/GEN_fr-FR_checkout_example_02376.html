<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prénom</label>
    <input type="text" name="givenName" id="givenName" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom</span>
    <input type="text" name="familyName" id="familyName" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Votre adresse complète" aria-label="Adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label>Ville
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Pays
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
  <option>Royaume-Uni</option>
  <option>États-Unis</option>
</select>
    </label>
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="email" placeholder="Votre e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Numéro de téléphone</span>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Région
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Hauts-de-France</option>
  <option>Normandie</option>
  <option>Bretagne</option>
  <option>Grand Est</option>
  <option>Centre-Val de Loire</option>
  <option>Occitanie</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Pays de la Loire</option>
  <option>Alsace</option>
  <option>Languedoc-Roussillon</option>
  <option>Corse</option>
</select>
    </label>
  </div>
</form>

</fieldset></body></html>
