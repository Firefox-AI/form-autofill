<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="givenName" id="givenName" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="familyName" id="familyName" placeholder="Entrez votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Autre prénom
    <input type="text" name="additionalName" id="additionalName" placeholder="Entrez un autre prénom (si applicable)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Surnom
    <input type="text" name="nickname" id="nickname" placeholder="Entrez votre surnom" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Adresse e-mail
    <input type="email" name="email" id="email" placeholder="Entrez votre adresse e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Téléphone
    <input type="tel" name="tel" id="tel" placeholder="Entrez votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organisation
    <input type="text" name="organization" id="organization" placeholder="Nom de votre entreprise ou organisation" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Date de naissance
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Janvier</option>
  <option>Février</option>
  <option>Mars</option>
  <option>Avril</option>
  <option>Mai</option>
  <option>Juin</option>
  <option>Juillet</option>
  <option>Août</option>
  <option>Septembre</option>
  <option>Octobre</option>
  <option>Novembre</option>
  <option>Décembre</option>
</select>
    </label>
  </div>
  <div>
    <label>Mot de passe
    <input type="password" name="field" id="field" placeholder="Choisissez un mot de passe">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
