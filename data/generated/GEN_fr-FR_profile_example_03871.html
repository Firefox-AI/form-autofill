<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Prénom
    <input type="text" name="givenName" id="id2l2" placeholder="Votre prénom" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nom de famille
    <input type="text" name="lastName" id="idasm" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Nom secondaire
    <input type="text" name="middleName" id="idut" placeholder="Votre nom secondaire (si applicable)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Surnom
    <input type="text" name="handle" id="idr800k" placeholder="Votre surnom" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>Adresse email
    <input type="email" name="user_email" id="idvp4" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Numéro de téléphone
    <input type="tel" name="telephone" id="idjqks" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Organisation
    <input type="text" name="business" id="idbaa" placeholder="Votre entreprise ou organisation" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Date de naissance
    <input type="text" name="dob" id="idpiv" placeholder="JJ/MM/AAAA" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Mot de passe
    <input type="password" name="idnx9ca" id="idwr4r7" placeholder="Votre mot de passe">
    </label>
  </div>
  <div>
    <button name="idszs25" id="idewfqk" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
