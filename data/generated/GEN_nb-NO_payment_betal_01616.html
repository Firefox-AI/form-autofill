<html><head>

<body>

<fieldset>
<h3>betal.com</h3>

  </div>
  <div>
    <input type="number" name="cardNumber" id="idacm" placeholder="XXXX XXXX XXXX XXXX" aria-label="Kortnummer" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idpbklo">Utløpsmåned</label>
    <select name="exp_month" id="idpbklo" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id9xz3m">Utløpsår</label>
    <select name="ccExpYear" id="id9xz3m" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>CVV</span>

  </div>
  <div>
    <select name="ccType" id="ideai" aria-label="Korttype" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="id9d44i" id="id1xj" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
