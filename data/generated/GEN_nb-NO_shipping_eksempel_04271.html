<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Skriv inn ditt navn" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Leilighet, etasje osv. (valgfritt)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Gateadresse" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Skriv inn postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Navn på by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
