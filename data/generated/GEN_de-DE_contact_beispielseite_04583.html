<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email_address" id="idhw" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Vorname</span>
    <input type="text" name="billing_first_name" id="idskg2" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="lname" id="idocer" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Geschlecht</span>
    <select name="sex" id="idm0qs" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Männlich</option>
  <option>Weiblich</option>
  <option>Divers</option>
</select>
  </div>
  <div>
    <span>Unternehmen</span>
    <input type="text" name="company" id="idn2fnp" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addressLine1" id="idy0v3o" placeholder="Straße und Hausnummer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Land</span>
    <select name="countryCode" id="idhfwg" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
</select>
  </div>
  <div>
    <span>Bundesland</span>
    <select name="county" id="id1d" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="locality" id="id9h3p" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="number" name="zip" id="id5tz" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="telephone" id="id76" placeholder="Vorwahl und Rufnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Personalausweisnummer</span>
    <input type="text" name="nationalId" id="id48s" data-moz-autofill-type="id-number">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="id4ra13" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
