<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Escribe tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Escribe tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="additionalName" id="additionalName" placeholder="Escribe tu segundo nombre (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Escribe tu apodo (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Tu dirección de correo electrónico" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nombre de tu empresa (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Selecciona tu fecha de nacimiento" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Tu cargo en la empresa (opcional)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
