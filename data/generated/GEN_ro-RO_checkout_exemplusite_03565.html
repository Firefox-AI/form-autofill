<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu-site.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Prenume</label>
    <input type="text" name="givenName" id="givenName" placeholder="Introduceți prenumele dvs." data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nume de familie</label>
    <input type="text" name="familyName" id="familyName" placeholder="Introduceți numele de familie" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="streetAddress">Adresă</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada și numărul" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Apartament, etaj, etc. (opțional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Introduceți informații suplimentare despre adresă" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Oraș</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduceți orașul" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Cod poștal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="countryName">Țară</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Austria</option>
  <option>Bulgaria</option>
  <option>Ungaria</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
  </div>
  <div>
    <label for="email">Adresă de email</label>
    <input type="email" name="email" id="email" placeholder="Introduceți adresa dvs. de email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Număr de telefon</label>
    <input type="tel" name="tel" id="tel" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
