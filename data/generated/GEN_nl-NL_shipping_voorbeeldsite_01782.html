<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Volledige naam
    <input type="text" name="name" id="name" placeholder="Vul uw naam in" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Straat
    <input type="text" name="street" id="street" placeholder="Straatnaam" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Huisnummer
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="Huisnummer" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Toevoeging
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. A of 1A" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Postcode
    <input type="text" name="postalCode" id="postalCode" placeholder="1234 AB" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Stad
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul uw stad in" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Land
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Portugal</option>
  <option>Zwitserland</option>
</select>
    </label>
  </div>
  <div>
    <label>Verdieping
    <input type="number" name="floor" id="floor" placeholder="Verdieping (indien van toepassing)" data-moz-autofill-type="floor">
    </label>
  </div>
</form>

</fieldset></body></html>
