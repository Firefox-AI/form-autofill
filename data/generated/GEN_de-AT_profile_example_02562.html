<body>

<fieldset>
<h3>example.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="countryCode" id="idwpcu" aria-label="Land" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Frankreich</option>
  <option>Italien</option>
  <option>Spanien</option>
  <option>Vereinigtes Königreich</option>
  <option>Niederlande</option>
  <option>Belgien</option>
  <option>Türkei</option>
  <option>Vereinigte Staaten</option>
  <option>Kanada</option>
  <option>Australien</option>
  <option>Neuseeland</option>
  <option>Weitere</option>
</select>
  </div>
  <div>
    <input type="text" name="contactName" id="idgr" placeholder="Max Mustermann" aria-label="Vollständiger Name (Vorname und Nachname)" data-moz-autofill-type="name">

  <div>

    <input type="text" name="town" id="idyjk" placeholder="Wien" aria-label="Stadt" data-moz-autofill-type="address-level2">

  <div>
    <input type="text" name="province" id="id97uc" placeholder="Innere Stadt" aria-label="Bezirk" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <input type="text" name="suburb5" id="idq8" placeholder="Leopoldstadt" aria-label="Nachbarschaft / Dorf" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <input type="text" name="zip8" id="id8k" placeholder="1010" aria-label="Postleitzahl" data-moz-autofill-type="postal-code">
  </div>
