<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Ονοματεπωνυμο</label>
    <input type="text" name="name" id="name" placeholder="Το ονομα και το επιθετο σας" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Οδός</label>
    <input type="text" name="street" id="street" placeholder="Ονομα οδου" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Αριθμός</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Αριθμός σπιτιού" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Πρόσθετες πληροφορίες</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="π.χ. Διαμέρισμα ή Στέγη" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Ταχυδρομικος κωδικος" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Περιοχή</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Περιοχή ή Δήμος" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
</select>
  </div>
  <div>
    <label for="apartment">Διαμέρισμα</label>
    <input type="text" name="apartment" id="apartment" placeholder="Διαμέρισμα (προαιρετικό)" data-moz-autofill-type="apartment">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
