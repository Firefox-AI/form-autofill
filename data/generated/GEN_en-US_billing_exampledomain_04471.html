<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exampledomain.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="country_949">Delivery Country</label>
    <select name="country_3917" id="country_949" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="given_name_7886">First Name</label>
    <input type="text" name="given_name_5420" id="given_name_7886" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="family_name_5396">Last Name</label>
    <input type="text" name="family_name_2053" id="family_name_5396" placeholder="Enter your last name" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="tel_7199">Mobile Number (for delivery updates)</label>
    <input type="tel" name="tel_7840" id="tel_7199" placeholder="Enter your mobile number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="address_lookup_370">Search for Address</label>
    <input type="text" name="address_lookup_8354" id="address_lookup_370" placeholder="Start typing your address" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="address_line1_1810">Street Address</label>
    <input type="text" name="address_line1_9641" id="address_line1_1810" placeholder="House number and street name" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="address_line2_4623">Apartment, Suite, etc. (optional)</label>
    <input type="text" name="address_line2_3650" id="address_line2_4623" placeholder="Optional" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="address_level2_856">City</label>
    <input type="text" name="address_level2_741" id="address_level2_856" placeholder="Enter your city" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="address_level1_466">State/Province</label>
    <select name="address_level1_4201" id="address_level1_466" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>California</option>
  <option>New York</option>
  <option>Texas</option>
  <option>Florida</option>
  <option>Illinois</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <label for="postal_code_6085">ZIP Code</label>
    <input type="text" name="postal_code_8344" id="postal_code_6085" placeholder="Enter your ZIP code" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset></body></html>
