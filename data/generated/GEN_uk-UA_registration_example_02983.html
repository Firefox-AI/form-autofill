<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Ім&#x27;я</label>
    <input type="text" name="givenName" id="givenName" placeholder="Ваше ім&#x27;я" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Прізвище</label>
    <input type="text" name="familyName" id="familyName" placeholder="Ваше прізвище" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Електронна пошта</label>
    <input type="email" name="email" id="email" placeholder="example@domain.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Телефон</label>
    <input type="tel" name="tel" id="tel" placeholder="+380 (XX) XXX-XX-XX" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Дата народження</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Організація (необов&#x27;язково)</label>
    <input type="text" name="organization" id="organization" placeholder="Ваша організація" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="sex">Стать</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Чоловіча</option>
  <option>Жіноча</option>
  <option>Не вказано</option>
</select>
  </div>
  <div>
    <label for="field">Пароль</label>
    <input type="password" name="field" id="field" placeholder="Введіть пароль">
  </div>
</form>

</fieldset></body></html>
