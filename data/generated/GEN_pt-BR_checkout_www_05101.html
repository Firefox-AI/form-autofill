<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <select name="honorificPrefix" id="honorificPrefix" aria-label="Título" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Sr.</option>
  <option>Sra.</option>
  <option>Srta.</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Sobrenome</span>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Av., etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Digite sua cidade" aria-label="Cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">CEP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Digite seu CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="País" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Uruguai</option>
</select>
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="seuemail@exemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(XX) XXXXX-XXXX" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
