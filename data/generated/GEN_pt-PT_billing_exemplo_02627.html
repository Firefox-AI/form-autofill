<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no cartão</span>
    <input type="text" name="ccName" id="id2b" placeholder="Digite o nome como está no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="address1" id="id9y" placeholder="Rua, Avenida, etc." data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Apartamento</span>
    <input type="text" name="unit" id="id16" placeholder="Número do apartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="zip_code" id="id1zg" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Concelho</span>
    <input type="text" name="locality" id="idbco6" placeholder="Concelho" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Distrito</span>
    <select name="state" id="ids4a" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Setúbal</option>
  <option>Braga</option>
  <option>Aveiro</option>
  <option>Évora</option>
  <option>Faro</option>
  <option>Coimbra</option>
  <option>Leiria</option>
  <option>Santarem</option>
  <option>Madeira</option>
  <option>Açores</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="idlo3c1" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Países Baixos</option>
  <option>Bélgica</option>
  <option>Suécia</option>
  <option>Irlanda</option>
</select>
  </div>
  <div>
    <span>NIF</span>
    <input type="text" name="vatNumber" id="iduw1" placeholder="Número de Identificação Fiscal" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
