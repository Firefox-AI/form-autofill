<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>zakupyprzezinternet.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idcbik">Tytuł</label>
    <select name="title" id="idcbik" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Pan</option>
  <option>Pani</option>
  <option>Pani Doktor</option>
  <option>Pan Profesor</option>
</select>
  </div>
  <div>
    <label for="id7gakm">Imię</label>
    <input type="text" name="givenName" id="id7gakm" placeholder="Wprowadź swoje imię" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id0g">Nazwisko</label>
    <input type="text" name="lastName" id="id0g" placeholder="Wprowadź swoje nazwisko" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idod5p8">Nazwa firmy (opcjonalnie)</label>
    <input type="text" name="companyName" id="idod5p8" placeholder="Wprowadź nazwę firmy" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idssgk">Ulica i numer</label>
    <input type="text" name="addressLine1" id="idssgk" placeholder="Wprowadź ulicę i numer" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id7djc">Mieszkanie (opcjonalnie)</label>
    <input type="text" name="flat" id="id7djc" placeholder="Wprowadź numer mieszkania" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idkkt3f">Miasto</label>
    <input type="text" name="locality" id="idkkt3f" placeholder="Wprowadź miasto" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyjti">Kod pocztowy</label>
    <input type="text" name="zip" id="idyjti" placeholder="Wprowadź kod pocztowy" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idgmz">Kraj</label>
    <select name="country" id="idgmz" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Wielka Brytania</option>
  <option>USA</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
</select>
  </div>
  <div>
    <label for="idv7i">Adres e-mail</label>
    <input type="email" name="mail" id="idv7i" placeholder="Wprowadź swój adres e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ids7y41">Numer telefonu</label>
    <input type="tel" name="tel" id="ids7y41" placeholder="Wprowadź numer telefonu" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
