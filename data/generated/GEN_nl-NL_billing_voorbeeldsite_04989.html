<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Kaartnaam</label>
    <input type="text" name="ccName" id="ccName" placeholder="Voer de naam op de kaart in" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Straat en huisnummer</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Bijv. Hoofdstraat 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Extra adresregel</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Bijv. Appartement of verdieping" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postcode</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Bijv. 1234 AB" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Plaats</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Voer uw plaats in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">Provincie</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Drenthe</option>
  <option>Flevoland</option>
  <option>Friesland</option>
  <option>Gelderland</option>
  <option>Groningen</option>
  <option>Limburg</option>
  <option>Noord-Brabant</option>
  <option>Noord-Holland</option>
  <option>Overijssel</option>
  <option>Zeeland</option>
  <option>Zuid-Holland</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zwitserland</option>
  <option>Australië</option>
  <option>Verenigde Staten</option>
</select>
  </div>
</form>

</fieldset></body></html>
