<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome completo</span>
    <input type="text" name="yourName" id="idtf2cp" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Endereço</span>
    <input type="text" name="addr1" id="idlde8q" placeholder="Rua e número" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="town" id="idehd" placeholder="Nome da cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="idde" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>País</span>
    <select name="country" id="id0eqz2" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
</select>
  </div>
  <div>
    <span>Andar</span>
    <input type="text" name="etage" id="idc4b7" placeholder="Número do andar (se aplicável)" data-moz-autofill-type="floor">
  </div>
  <div>
    <button name="idtvs" id="id5zz" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
