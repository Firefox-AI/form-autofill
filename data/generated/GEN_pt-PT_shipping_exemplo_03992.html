<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome completo
    <input type="text" name="r:r:7:m:r:1:cr:3:c:pr:1:container:fs:i:input" id="id5tf" placeholder="Digite o seu nome completo" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Complemento
    <input type="text" name="r:r:8:m:r:2:cr:3:c:pr:1:container:fs:i:input" id="idps" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Número
    <input type="text" name="r:r:7:m:r:3:cr:1:c:pr:1:container:fs:i:input" id="ide8" placeholder="Número da sua casa" data-moz-autofill-type="address-housenumber">
    </label>
  </div>
  <div>
    <label>Rua
    <input type="text" name="r:r:5:m:r:4:cr:2:c:pr:1:container:fs:i:input" id="idehd" placeholder="Nome da rua" data-moz-autofill-type="street">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="r:r:6:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="idde" placeholder="Código postal (ex: 1234-567)" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Concelho
    <select name="r:r:2:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="id910" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Funchal</option>
  <option>Évora</option>
  <option>Setúbal</option>
  <option>Guarda</option>
  <option>Aveiro</option>
  <option>Leiria</option>
</select>
    </label>
  </div>
  <div>
    <label>País
    <select name="r:r:2:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="id2zvc4" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Reino Unido</option>
  <option>Alemanha</option>
  <option>Itália</option>
</select>
    </label>
  </div>
  <div>
    <label>Código de área
    <input type="tel" name="r:r:1:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="idtvs" placeholder="Ex: 21" data-moz-autofill-type="tel-area-code">
    </label>
  </div>
  <div>
    <label>Número de identificação
    <input type="number" name="r:r:4:m:r:9:cr:2:c:pr:1:container:fs:i:input" id="idzqgyz" placeholder="NIF ou número de cartão de cidadão" data-moz-autofill-type="id-number">
    </label>
  </div>
</form>

</fieldset></body></html>
