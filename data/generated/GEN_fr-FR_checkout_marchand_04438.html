<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>marchand.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idsaq">Prénom</label>
    <input type="text" name="firstName" id="idsaq" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idtzgui">Nom de famille</label>
    <input type="text" name="last_name" id="idtzgui" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idynp">Société (facultatif)</label>
    <input type="text" name="organization" id="idynp" placeholder="Votre société" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idk4">Adresse</label>
    <input type="text" name="streetAddress" id="idk4" placeholder="Votre adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idql3">Région</label>
    <select name="province" id="idql3" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Bretagne</option>
  <option>Hauts-de-France</option>
  <option>Normandie</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Occitanie</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Centre-Val de Loire</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <label for="id7iy">Ville</label>
    <input type="text" name="locality" id="id7iy" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idoox6o">Code postal</label>
    <input type="text" name="zip" id="idoox6o" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idkhs">Pays</label>
    <select name="countryName" id="idkhs" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Royaume-Uni</option>
  <option>États-Unis</option>
</select>
  </div>
  <div>
    <label for="idcbn">Email</label>
    <input type="email" name="user_email" id="idcbn" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id1c">Téléphone</label>
    <input type="tel" name="phoneNumber" id="id1c" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
