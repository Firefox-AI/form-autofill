<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad-zakupu.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Imię i nazwisko</label>
    <input type="text" name="ccName" id="ccName" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ccNumber">Numer karty</label>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Miesiąc wygaśnięcia</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Styczeń</option>
  <option>Luty</option>
  <option>Marzec</option>
  <option>Kwiecień</option>
  <option>Maj</option>
  <option>Czerwiec</option>
  <option>Lipiec</option>
  <option>Sierpień</option>
  <option>Wrzesień</option>
  <option>Październik</option>
  <option>Listopad</option>
  <option>Grudzień</option>
</select>
  </div>
  <div>
    <label for="ccExpYear">Rok wygaśnięcia</label>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
</select>
  </div>
  <div>
    <label for="ccCsc">Kod zabezpieczający</label>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="ccType">Typ karty</label>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="postalCode">Kod pocztowy</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
