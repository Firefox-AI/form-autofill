<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przyklad-zakupu.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idd24">Imię i nazwisko</label>
    <input type="text" name="ccName" id="idd24" placeholder="Jan Kowalski" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idknux0">Numer karty</label>
    <input type="number" name="ccNumber" id="idknux0" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idd4">Miesiąc wygaśnięcia</label>
    <select name="ccExpMonth" id="idd4" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="idf22">Rok wygaśnięcia</label>
    <select name="ccExpYear" id="idf22" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idrjz">Kod zabezpieczający (CVV)</label>
    <input type="number" name="csc" id="idrjz" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idcb9">Typ karty</label>
    <select name="cardType" id="idcb9" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idjq">Kod pocztowy</label>
    <input type="text" name="zip" id="idjq" placeholder="00-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <button name="id5y" id="idbc4" type="submit">Złóż zamówienie</button>
  </div>
</form>

</fieldset></body></html>
