<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idfmq">Last Name *</label>
    <input type="text" name="billing_last_name1" id="idfmq" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idtor">First Name *</label>
    <input type="text" name="firstName" id="idtor" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id75dsz">Country Code *</label>
    <select name="countryCode" id="id75dsz" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+1 - United States</option>
  <option>+44 - United Kingdom</option>
  <option>+36 - Hungary</option>
  <option>+49 - Germany</option>
  <option>+33 - France</option>
</select>
  </div>
  <div>
    <label for="idzhm">Phone Number</label>
    <input type="tel" name="tel2" id="idzhm" placeholder="Enter your phone number" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="iddpp">Country *</label>
    <select name="countryCode" id="iddpp" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Hungary</option>
  <option>Germany</option>
  <option>France</option>
  <option>United Kingdom</option>
</select>
  </div>
  <div>
    <label for="idfmkqy">Street Address *</label>
    <input type="text" name="street" id="idfmkqy" placeholder="123 Main St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id8hkar">Additional Information</label>
    <input type="text" name="id4r" id="id8hkar" placeholder="Any additional information" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="idxso9">Postal Code *</label>
    <input type="text" name="zip_code" id="idxso9" placeholder="ZIP Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idmp3nh">City/Town *</label>
    <input type="text" name="town" id="idmp3nh" placeholder="Enter your city or town" data-moz-autofill-type="address-level2">
  </div>
</form>

</fieldset></body></html>
