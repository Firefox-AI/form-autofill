<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhq">Nom complet</label>
    <input type="text" name="name" id="idhq" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idov209">Adresse e-mail</label>
    <input type="email" name="mail" id="idov209" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ida7pn">Code pays</label>
    <select name="phoneCountryCode" id="ida7pn" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+41</option>
  <option>+31</option>
  <option>+34</option>
</select>
  </div>
  <div>
    <label for="idda2">Numéro de téléphone</label>
    <input type="tel" name="tel" id="idda2" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id0eod9">Adresse</label>
    <input type="text" name="streetAddress" id="id0eod9" placeholder="Adresse de votre domicile" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="id0q">Ville</label>
    <input type="text" name="city" id="id0q" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idw5m">Code postal</label>
    <input type="text" name="zip_code" id="idw5m" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id24">Organisation (facultatif)</label>
    <input type="text" name="companyName" id="id24" placeholder="Nom de votre organisation" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idgqik">Informations supplémentaires (facultatif)</label>
    <input type="text" name="id18vap" id="idgqik" placeholder="Compléments d&#x27;adresse" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
