<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nom complet</label>
    <input type="text" name="name" id="name" placeholder="Votre nom complet" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="email">Adresse e-mail</label>
    <input type="email" name="email" id="email" placeholder="Votre e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Indicatif téléphonique</label>
    <select name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+33</option>
  <option>+32</option>
  <option>+31</option>
  <option>+41</option>
  <option>+44</option>
</select>
  </div>
  <div>
    <label for="tel">Numéro de téléphone</label>
    <input type="tel" name="tel" id="tel" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organisation</label>
    <input type="text" name="organization" id="organization" placeholder="Votre entreprise ou organisation (facultatif)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="streetAddress">Adresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Votre adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLevel2">Ville</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="postalCode">Code postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressExtra">Complément d&#x27;adresse</label>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Ex : appartement, étage (facultatif)" data-moz-autofill-type="address-extra">
  </div>
</form>

</fieldset></body></html>
