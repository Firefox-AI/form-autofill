<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-us.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="iduy">Email Address</label>
    <input type="email" name="email_address" id="iduy" placeholder="your.email@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id07">Confirm Email Address</label>
    <input type="email" name="emailAddress" id="id07" placeholder="your.email@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idkz">Country</label>
    <select name="countryCode" id="idkz" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>Mexico</option>
  <option>United Kingdom</option>
  <option>Australia</option>
</select>
  </div>
  <div>
    <label for="id8ne">Full Name</label>
    <input type="text" name="fullName" id="id8ne" placeholder="John Doe" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idclc">Street Address</label>
    <input type="text" name="address" id="idclc" placeholder="1234 Elm St" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idr6gl4">Apartment, Suite, etc. (optional)</label>
    <input type="text" name="apartment" id="idr6gl4" placeholder="Apt 101" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idm2">City</label>
    <input type="text" name="locality" id="idm2" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idr0">State</label>
    <select name="state" id="idr0" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <label for="idw8vog">ZIP Code</label>
    <input type="number" name="zip_code" id="idw8vog" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idnqmh">Phone Number (optional)</label>
    <input type="tel" name="mobile" id="idnqmh" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
