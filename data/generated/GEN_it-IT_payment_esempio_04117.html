<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome sulla carta</span>
    <input type="text" name="ccName" id="ccName" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numero della carta</span>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mese di scadenza</span>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <span>Anno di scadenza</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codice di sicurezza</span>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="CVV" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo di carta</span>
    <select name="ccType" id="ccType" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Via Roma 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
