<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkkikauppa.fi</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Etunimi
    <input type="text" name="givenName" id="givenName" placeholder="Anna etunimesi" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sukunimi
    <input type="text" name="familyName" id="familyName" placeholder="Anna sukunimesi" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Yritys
    <input type="text" name="organization" id="organization" placeholder="Jos käyttämäsi on yritys, kirjoita nimi" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Katuosoite
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Osoite, jossa asut" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Osoite (lisätiedot)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Esim. asunto, kerros tai muu lisätieto" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <label>Maakunta
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Uusimaa</option>
  <option>Varsinais-Suomi</option>
  <option>Satakunta</option>
  <option>Kanta-Häme</option>
  <option>Päijät-Häme</option>
  <option>Kymenlaakso</option>
  <option>Etelä-Karjala</option>
  <option>Etelä-Savo</option>
  <option>Pohjois-Savo</option>
  <option>Pohjois-Karjala</option>
  <option>Keski-Suomi</option>
  <option>Etelä-Pohjanmaa</option>
  <option>Pohjanmaa</option>
  <option>Keski-Pohjanmaa</option>
  <option>Pohjois-Pohjanmaa</option>
  <option>Kainuu</option>
  <option>Lapland</option>
  <option>Ahvenanmaa</option>
</select>
    </label>
  </div>
  <div>
    <label>Kaupunki
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Kirjoita kaupunki" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Postinumero
    <input type="text" name="postalCode" id="postalCode" placeholder="Esim. 00100" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Maa
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
  <option>Kanada</option>
  <option>Austria</option>
  <option>Alankomaat</option>
  <option>Italy</option>
  <option>Espanja</option>
  <option>Puola</option>
  <option>Tšekki</option>
  <option>Unkari</option>
</select>
    </label>
  </div>
  <div>
    <label>Sähköposti
    <input type="email" name="email" id="email" placeholder="Anna sähköpostiosoitteesi" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Puhelinnumero
    <input type="tel" name="tel" id="tel" placeholder="Esim. +358 40 123 4567" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>ALV-numero
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Jos yrityksesi on rekisteröitynyt, syötä ALV-numero" data-moz-autofill-type="vat-number">
    </label>
  </div>
  <div>
    <label>Salasana
    <input type="password" name="field" id="field" placeholder="Syötä salasana">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Lähetä</button>
  </div>
</form>

</fieldset></body></html>
