<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Navn på kortet</span>
    <input type="text" name="nameOnCard" id="id4vjj" placeholder="Fulde navn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="addr" id="id0ldzl" placeholder="Gadeadresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Postnummer</span>
    <input type="text" name="zipCode" id="idvmhs" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>By</span>
    <input type="text" name="city" id="id9p049" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Region</span>
    <select name="province" id="idamio" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Syddanmark</option>
  <option>Sjælland</option>
</select>
  </div>
  <div>
    <span>Land</span>
    <select name="country" id="id67" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>England</option>
</select>
  </div>
</form>

</fieldset></body></html>
