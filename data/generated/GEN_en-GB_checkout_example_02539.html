<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Email Address</span>
    <input type="email" name="idkzjc8" id="id3x" data-moz-autofill-type="email">
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="idyp" id="idt8" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="idmhl" id="idk7y" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Country Code</span>
    <select name="idyr" id="idmhn" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+1</option>
  <option>+49</option>
  <option>+33</option>
  <option>+39</option>
</select>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="id6gy" id="idwq8" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>Country</span>
    <select name="id5ew" id="idnm" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <span>Search Address</span>
    <input type="text" name="idndv" id="iddzb" placeholder="Enter your address" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="idcgb0u" id="idq9q40" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Town/City</span>
    <input type="text" name="id8jzi" id="id9drh" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Street</span>
    <input type="text" name="idrd" id="id549" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House Number</span>
    <input type="number" name="idpog" id="ids2l" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Optional Suffix</span>
    <input type="text" name="idtlls" id="idpf" placeholder="e.g. Flat 2" data-moz-autofill-type="address-extra-housesuffix">
  </div>
</form>

</fieldset></body></html>
