<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Email Address</span>
    <input type="email" name="emailAddress" id="idc8c" data-moz-autofill-type="email">
  </div>
  <div>
    <span>First Name</span>
    <input type="text" name="givenName" id="idyp" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="lastName" id="id8pmh" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Country Code</span>
    <select name="phoneCountryCode" id="id7ya" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+44</option>
  <option>+1</option>
  <option>+49</option>
  <option>+33</option>
  <option>+39</option>
</select>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="idrnmhn" id="id6gy" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <span>Country</span>
    <select name="country" id="id8l5e" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
</select>
  </div>
  <div>
    <span>Search Address</span>
    <input type="text" name="iddnmk" id="iddvp" placeholder="Enter your address" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <span>Postcode</span>
    <input type="text" name="zip" id="idb4cgb" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Town/City</span>
    <input type="text" name="town" id="idq9q40" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Street</span>
    <input type="text" name="strasse" id="id8jzi" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>House Number</span>
    <input type="text" name="number" id="idhdrd" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Optional Suffix</span>
    <input type="text" name="id549" id="idpog" placeholder="e.g. Flat 2" data-moz-autofill-type="address-extra-housesuffix">
  </div>
</form>

</fieldset></body></html>
