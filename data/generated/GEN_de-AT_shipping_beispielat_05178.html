<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel-at.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idz4q">Name</label>
    <input type="text" name="yourName" id="idz4q" placeholder="Vollständiger Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idqb">Straße und Hausnummer</label>
    <input type="text" name="address1" id="idqb" placeholder="z.B. Hauptstraße 5" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idoq9s">Postleitzahl</label>
    <input type="text" name="zipCode" id="idoq9s" placeholder="z.B. 1010" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idbr4kw">Stadt</label>
    <input type="text" name="city" id="idbr4kw" placeholder="Ort" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id8anoe">Land</label>
    <select name="countryName" id="id8anoe" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
</select>
  </div>
  <div>
    <label for="id8152t">Stockwerk</label>
    <input type="text" name="floor" id="id8152t" placeholder="z.B. 2. Stock" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="idokdoa">Orientierungspunkt</label>
    <input type="text" name="id45" id="idokdoa" placeholder="z.B. gegenüber dem Supermarkt" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <label for="idxs">Bezirk</label>
    <input type="text" name="district" id="idxs" placeholder="z.B. Innere Stadt" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="id75ncj" id="id441rw" type="submit">Absenden</button>
  </div>
</form>

</fieldset></body></html>
