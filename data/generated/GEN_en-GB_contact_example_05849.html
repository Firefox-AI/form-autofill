<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idpo">Surname</label>
    <input type="text" name="billing_last_name" id="idpo" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idbh">First Name</label>
    <input type="text" name="first_name" id="idbh" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idobcgz">Middle Name</label>
    <input type="text" name="mname" id="idobcgz" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="idt77d">Phone Number (Country Code)</label>
    <input type="tel" name="countryCode" id="idt77d" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="id8b">Phone Number</label>
    <input type="tel" name="idv0wio" id="id8b" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="idg1mi">E-mail Address</label>
    <input type="email" name="user_email" id="idg1mi" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idzt9">City</label>
    <input type="text" name="locality" id="idzt9" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idhgq">Street</label>
    <input type="text" name="street" id="idhgq" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="ids0">House Number</label>
    <input type="text" name="streetNumber" id="ids0" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="idbvzr">Flat/Apartment</label>
    <input type="text" name="flat" id="idbvzr" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
