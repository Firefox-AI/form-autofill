<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idyp">Όνομα</label>
    <input type="text" name="first_name" id="idyp" placeholder="Γράψτε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idm2">Επώνυμο</label>
    <input type="text" name="lastName" id="idm2" placeholder="Γράψτε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idi2ko">Ψευδώνυμο</label>
    <input type="text" name="handle" id="idi2ko" placeholder="Προαιρετικό: Γράψτε το ψευδώνυμό σας" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="id0xz">Email</label>
    <input type="email" name="email" id="id0xz" placeholder="Γράψτε τη διεύθυνση email σας" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idapkg1">Τηλέφωνο</label>
    <input type="tel" name="phone" id="idapkg1" placeholder="Γράψτε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idzlq">Ημερομηνία γέννησης</label>
    <input type="text" name="dob" id="idzlq" placeholder="Ημερομηνία γέννησης (π.χ. 01/01/2000)" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idsv">Οργανισμός</label>
    <input type="text" name="company" id="idsv" placeholder="Προαιρετικό: Γράψτε την οργανωτική σας μονάδα" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
