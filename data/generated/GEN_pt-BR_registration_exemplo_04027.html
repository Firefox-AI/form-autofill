<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nome
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Sobrenome
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-mail
    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefone
    <input type="tel" name="tel" id="tel" placeholder="(11) 91234-5678" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Data de nascimento
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Confirmar e-mail
    <input type="email" name="email" id="email" placeholder="Confirme seu e-mail" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
