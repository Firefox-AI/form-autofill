<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id2r3ig">Nombre en la tarjeta</label>
    <input type="text" name="cardholderName" id="id2r3ig" placeholder="Juan Pérez" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idmy47">Dirección</label>
    <input type="text" name="street1" id="idmy47" placeholder="Calle Mayor, 10" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id3n">Código postal</label>
    <input type="text" name="zipCode" id="id3n" placeholder="28001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idyclpi">Ciudad</label>
    <input type="text" name="locality" id="idyclpi" placeholder="Madrid" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idtn4j">Provincia</label>
    <select name="stateProvince" id="idtn4j" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Madrid</option>
  <option>Barcelona</option>
  <option>Valencia</option>
  <option>Sevilla</option>
  <option>Zaragoza</option>
</select>
  </div>
  <div>
    <label for="idsn3">País</label>
    <select name="countryName" id="idsn3" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Alemania</option>
  <option>Italia</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="idvzyx">Teléfono</label>
    <input type="tel" name="phone" id="idvzyx" placeholder="600 123 456" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ido7nee">Apartamento (opcional)</label>
    <input type="text" name="apartment" id="ido7nee" placeholder="Piso 2, letra B" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
