<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="cardName" id="idl3" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Numero della carta</span>
    <input type="number" name="cardNo" id="idih4" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Mese di scadenza</span>
    <select name="ccExpMonth" id="idfdnl" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>Gennaio</option>
  <option>Febbraio</option>
  <option>Marzo</option>
  <option>Aprile</option>
  <option>Maggio</option>
  <option>Giugno</option>
  <option>Luglio</option>
  <option>Agosto</option>
  <option>Settembre</option>
  <option>Ottobre</option>
  <option>Novembre</option>
  <option>Dicembre</option>
</select>
  </div>
  <div>
    <span>Anno di scadenza</span>
    <select name="exp_year" id="idlr8bu" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Codice di sicurezza</span>
    <input type="number" name="securityCode" id="idl7" placeholder="XXX" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Tipo di carta</span>
    <select name="cardType" id="id67" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Diners Club</option>
  <option>JCB</option>
</select>
  </div>
  <div>
    <span>Indirizzo di fatturazione</span>
    <input type="text" name="addr" id="ids4c25" placeholder="Via, numero, città" data-moz-autofill-type="street-address">
  </div>
  <div>
    <button name="idzubwr" id="idwhz" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
