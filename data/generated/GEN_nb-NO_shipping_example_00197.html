<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Fyll inn ditt navn" aria-label="Navn" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Eksempel: Leilighet, Etasje" aria-label="Eventuell tilleggsadresse" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="apartment" id="apartment" placeholder="Leilighetsnummer (hvis aktuelt)" aria-label="Leilighetsnummer" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Fyll inn gatenavnet" aria-label="Gate" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Husnummer" aria-label="Husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Fyll inn kommunenavn" aria-label="Kommune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Fyll inn postnummer" aria-label="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
</form>

</fieldset></body></html>
