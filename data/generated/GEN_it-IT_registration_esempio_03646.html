<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Inserisci il tuo indirizzo email" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="telAreaCode" id="telAreaCode" placeholder="+39" data-moz-autofill-type="tel-area-code">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Data di nascita" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="nickname" id="nickname" placeholder="Inserisci il tuo soprannome (opzionale)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Inserisci il tuo numero di partita IVA (se applicabile)" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Crea una password">
  </div>
</form>

</fieldset></body></html>
