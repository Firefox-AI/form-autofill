<body>

<fieldset>
<h3>fiktivsite.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name_3014">Navn</label>
    <input type="text" name="name_7111" id="name_3014" placeholder="Fulde navn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street_5005">Vej</label>

  <div>
    <label for="address_housenumber_5201">Husnummer</label>
    <input type="text" name="address_housenumber_9894" id="address_housenumber_5201" placeholder="Nummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>

  </div>
  <div>
    <label for="postal_code_2233">Postnummer</label>
    <input type="text" name="postal_code_2273" id="postal_code_2233" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_level2_2589">By</label>
    <input type="text" name="address_level2_4910" id="address_level2_2589" placeholder="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="country_name_8827">Land</label>
    <select name="country_name_4093" id="country_name_8827" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="floor_3438">Etage</label>
    <input type="text" name="floor_8079" id="floor_3438" placeholder="Etage (hvis relevant)" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="apartment_412">Lejlighed</label>

  <div>
    <label for="tel_country_code_4141">Landskode</label>
    <select name="tel_country_code_9924" id="tel_country_code_4141" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+45</option>
  <option>+46</option>
  <option>+47</option>
  <option>+358</option>
  <option>+354</option>
</select>
  </div>
  <div>
    <label for="bday_year_6614">År for fødselsdag</label>
    <select name="bday_year_972" id="bday_year_6614" data-moz-autofill-type="bday-year">
  <option value=""></option>
  <option>2020</option>
  <option>2019</option>
  <option>2018</option>
  <option>2017</option>
  <option>2016</option>
  <option>2015</option>
</select>
  </div>
</form>

</fieldset></body></html>
