<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno</span>
    <input type="text" name="givenName" id="givenName" placeholder="Vaše jméno" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Vaše příjmení" aria-label="Příjmení" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label>E-mailová adresa
    <input type="email" name="email" id="email" placeholder="například: vy@example.cz" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Vaše telefonní číslo" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Datum narození
    <input type="text" name="bday" id="bday" placeholder="DD/MM/RRRR" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Název vaší organizace" data-moz-autofill-type="organization">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
