<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Fornavn</label>
    <input type="text" name="givenName" id="givenName" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Efternavn</label>
    <input type="text" name="familyName" id="familyName" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">E-mailadresse</label>
    <input type="email" name="email" id="email" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonnummer</label>
    <input type="tel" name="tel" id="tel" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Fødselsdato</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Virksomhed (hvis relevant)</label>
    <input type="text" name="organization" id="organization" placeholder="Indtast din virksomhed" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="sex">Køn</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Mand</option>
  <option>Kvinde</option>
  <option>Andet</option>
</select>
  </div>
</form>

</fieldset></body></html>
