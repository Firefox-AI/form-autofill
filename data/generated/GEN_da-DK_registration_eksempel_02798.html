<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id1d">Fornavn</label>
    <input type="text" name="firstName" id="id1d" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idv4">Efternavn</label>
    <input type="text" name="last_name" id="idv4" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id2w">E-mailadresse</label>
    <input type="email" name="email_address" id="id2w" placeholder="Indtast din e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idmr">Telefonnummer</label>
    <input type="tel" name="phone" id="idmr" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idxm7bs">Fødselsdato</label>
    <input type="text" name="birthdate" id="idxm7bs" placeholder="Vælg din fødselsdato" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idnde">Virksomhed</label>
    <input type="text" name="companyName" id="idnde" placeholder="Indtast din virksomhed (hvis relevant)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idl4szn">Køn</label>
    <select name="gender" id="idl4szn" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Mand</option>
  <option>Kvinde</option>
  <option>Andet</option>
</select>
  </div>
</form>

</fieldset></body></html>
