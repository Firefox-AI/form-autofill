<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nombre completo
    <input type="text" name="fullName" id="idl5o3r" placeholder="Tu nombre completo" data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Dirección
    <input type="text" name="address1" id="idqx0vo" placeholder="Calle, número" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label>Código postal
    <input type="text" name="zip_code" id="id6v" placeholder="Código postal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Ciudad
    <input type="text" name="locality" id="idb4p8p" placeholder="Ciudad" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>País
    <select name="country" id="id4ge" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Alemania</option>
  <option>Portugal</option>
</select>
    </label>
  </div>
  <div>
    <label>Apartamento
    <input type="text" name="flat" id="idnoewh" placeholder="Número de apartamento" data-moz-autofill-type="apartment">
    </label>
  </div>
  <div>
    <label>Piso
    <input type="text" name="floor" id="id5mv" placeholder="Número de piso" data-moz-autofill-type="floor">
    </label>
  </div>
  <div>
    <button name="idwwj" id="idiqam" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
