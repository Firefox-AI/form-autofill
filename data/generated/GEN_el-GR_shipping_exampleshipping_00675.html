<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example-shipping.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Ονοματεπώνυμο</label>
    <input type="text" name="name" id="name" placeholder="Πλήρες όνομα" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine2">Διεύθυνση (Πρόσθετες Πληροφορίες)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Π.χ. Όροφος, Διαμέρισμα" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="street">Οδός</label>
    <input type="text" name="street" id="street" placeholder="Ονομασία οδού" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Αριθμός</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Αριθμός κατοικίας" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="floor">Όροφος</label>
    <input type="text" name="floor" id="floor" placeholder="Π.χ. 2ος" data-moz-autofill-type="floor">
  </div>
  <div>
    <label for="apartment">Διαμέρισμα</label>
    <input type="text" name="apartment" id="apartment" placeholder="Π.χ. Α, Β, Γ" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="postalCode">Ταχυδρομικός Κωδικός</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Π.χ. 54625" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Περιοχή</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Πόλη ή Δημοτική Ενότητα" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel3">Πόλη</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Πόλη" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="countryName">Χώρα</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Γερμανία</option>
  <option>Γαλλία</option>
  <option>Ιταλία</option>
  <option>Ηνωμένο Βασίλειο</option>
  <option>Ισπανία</option>
  <option>Αυστραλία</option>
</select>
  </div>
</form>

</fieldset></body></html>
