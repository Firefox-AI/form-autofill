<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idrp5sn">Nombre</label>
    <input type="text" name="first_name" id="idrp5sn" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idtnoyj">Apellidos</label>
    <input type="text" name="surname" id="idtnoyj" placeholder="Tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id41p">Dirección</label>
    <input type="text" name="addr8" id="id41p" placeholder="Calle y número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idq3ag">Ciudad</label>
    <input type="text" name="locality" id="idq3ag" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id04mqe">Código postal</label>
    <input type="text" name="zip_code" id="id04mqe" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idlivwz">País</label>
    <select name="countryName" id="idlivwz" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Países Bajos</option>
  <option>Suecia</option>
</select>
  </div>
  <div>
    <label for="idbrsa">Correo electrónico</label>
    <input type="email" name="emailAddress7" id="idbrsa" placeholder="tu_email@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idez">Teléfono</label>
    <input type="tel" name="phoneNumber" id="idez" placeholder="Número de teléfono" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
