<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>billing-portal.ua</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Введіть назву вашої компанії" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Введіть адресу" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Будь ласка, введіть додаткову інформацію (якщо потрібно)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введіть поштовий індекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Київ</option>
  <option>Львів</option>
  <option>Одеса</option>
  <option>Дніпро</option>
  <option>Харків</option>
  <option>Запоріжжя</option>
</select>
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Вінницька</option>
  <option>Волинська</option>
  <option>Дніпропетровська</option>
  <option>Донецька</option>
  <option>Житомирська</option>
  <option>Закарпатська</option>
  <option>Запорізька</option>
  <option>Івано-Франківська</option>
  <option>Київська</option>
  <option>Кіровоградська</option>
  <option>Львівська</option>
  <option>Миколаївська</option>
  <option>Одеська</option>
  <option>Полтавська</option>
  <option>Рівненська</option>
  <option>Сумська</option>
  <option>Тернопільська</option>
  <option>Харківська</option>
  <option>Херсонська</option>
  <option>Хмельницька</option>
  <option>Черкаська</option>
  <option>Чернівецька</option>
  <option>Чернігівська</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Україна</option>
  <option>Польща</option>
  <option>Росія</option>
  <option>Білорусь</option>
  <option>Молдова</option>
</select>
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Введіть назву організації" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
