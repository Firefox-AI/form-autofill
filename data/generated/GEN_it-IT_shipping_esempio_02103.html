<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Nome e cognome</label>
    <input type="text" name="name" id="name" placeholder="Inserisci il tuo nome e cognome" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Indirizzo</label>
    <input type="text" name="street" id="street" placeholder="Via, piazza, ecc." data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Numero civico</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Numero" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Es. appartamento, interno" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">CAP</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Codice di avviamento postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Città</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Inserisci la tua città" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Paese</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
