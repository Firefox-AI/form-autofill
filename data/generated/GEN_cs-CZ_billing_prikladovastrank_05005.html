<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>prikladova-stranka.cz</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Jméno na kartě</span>
    <input type="text" name="cardName6" id="idwc" placeholder="Například: Jan Novák" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Název firmy</span>
    <input type="text" name="company5" id="idtm" placeholder="Například: ABC s.r.o." data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ulice a číslo</span>
    <input type="text" name="addr1" id="idsv81" placeholder="Například: Smetanova 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Číslo bytu (pokud se vztahuje)</span>
    <input type="text" name="apt" id="idxovtt" placeholder="Například: 2B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Město</span>
    <input type="text" name="locality" id="id0p" placeholder="Například: Praha" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>PSČ</span>
    <input type="text" name="zip" id="idly" placeholder="Například: 110 00" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Kraj</span>
    <select name="state" id="idql2i" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Praha</option>
  <option>Středočeský kraj</option>
  <option>Jihočeský kraj</option>
  <option>Plzeňský kraj</option>
  <option>Karlovarský kraj</option>
  <option>Ústecký kraj</option>
  <option>Liberecký kraj</option>
  <option>Královéhradecký kraj</option>
  <option>Pardubický kraj</option>
  <option>Vysočina</option>
  <option>Jihomoravský kraj</option>
  <option>Olomoucký kraj</option>
  <option>Zlínský kraj</option>
  <option>Moravskoslezský kraj</option>
</select>
  </div>
  <div>
    <span>Země</span>
    <select name="countryName" id="idk4n" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Česká republika</option>
  <option>Slovensko</option>
  <option>Německo</option>
  <option>Polsko</option>
  <option>Rakousko</option>
  <option>Francie</option>
  <option>Velká Británie</option>
  <option>USA</option>
  <option>Japonsko</option>
  <option>Čína</option>
</select>
  </div>
</form>

</fieldset></body></html>
