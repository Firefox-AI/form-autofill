<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idkyx">Cognome</label>
    <input type="text" name="lastName" id="idkyx" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idqkulw">Nome</label>
    <input type="text" name="givenName" id="idqkulw" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="iduc">Email</label>
    <input type="email" name="mail" id="iduc" placeholder="Inserisci la tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id08o">Telefono</label>
    <input type="tel" name="telephone" id="id08o" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="id7j">Data di nascita</label>
    <input type="text" name="birthday" id="id7j" placeholder="GG/MM/AAAA" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="idkrut">Organizzazione</label>
    <input type="text" name="company" id="idkrut" placeholder="Inserisci il nome della tua organizzazione" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idduyh">Genere</label>
    <select name="gender" id="idduyh" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Maschio</option>
  <option>Femmina</option>
  <option>Altro</option>
</select>
  </div>
  <div>
    <label for="id4a">Soprannome</label>
    <input type="text" name="handle" id="id4a" placeholder="Inserisci il tuo soprannome" data-moz-autofill-type="nickname">
  </div>
  <div>
    <button name="idqz" id="idyfv8a" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
