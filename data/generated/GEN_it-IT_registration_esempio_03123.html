<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nome</label>
    <input type="text" name="givenName" id="givenName" placeholder="Il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Cognome</label>
    <input type="text" name="familyName" id="familyName" placeholder="Il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="La tua email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="organization">Organizzazione</label>
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;organizzazione (opzionale)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="sex">Genere</label>
    <select name="sex" id="sex" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Maschio</option>
  <option>Femmina</option>
  <option>Altro</option>
</select>
  </div>
  <div>
    <label for="nickname">Soprannome</label>
    <input type="text" name="nickname" id="nickname" placeholder="Il tuo soprannome (opzionale)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrati</button>
  </div>
</form>

</fieldset></body></html>
