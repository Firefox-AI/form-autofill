<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielshop.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="idsz" placeholder="Max Mustermann" aria-label="Name auf der Kreditkarte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="business" id="id0ud" placeholder="Ihre Firma" aria-label="Firma (optional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="street" id="id3m" placeholder="Musterstraße 1" aria-label="Straße und Hausnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zipCode" id="ids2y" placeholder="1010" aria-label="PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="locality" id="id1225f" placeholder="Wien" aria-label="Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="county" id="id8clu" aria-label="Bundesland" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Burgenland</option>
  <option>Kärnten</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
  <option>Wien</option>
</select>
  </div>
  <div>
    <select name="country" id="idke" aria-label="Land" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Frankreich</option>
  <option>Vereinigte Staaten</option>
</select>
  </div>
  <div>
    <input type="tel" name="phone" id="id33c" placeholder="+43 1 2345678" aria-label="Telefonnummer" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
