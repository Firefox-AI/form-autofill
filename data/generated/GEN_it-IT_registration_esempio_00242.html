<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Cognome
    <input type="text" name="familyName" id="familyName" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <span>Soprannome</span>
    <input type="text" name="nickname" id="nickname" placeholder="Inserisci un soprannome (opzionale)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Inserisci la tua email" aria-label="Email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefono</label>
    <input type="tel" name="tel" id="tel" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="bday">Data di nascita</label>
    <input type="text" name="bday" id="bday" placeholder="Seleziona la tua data di nascita" data-moz-autofill-type="bday">
  </div>
  <div>
    <label>Organizzazione
    <input type="text" name="organization" id="organization" placeholder="Nome dell&#x27;organizzazione (opzionale)" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
