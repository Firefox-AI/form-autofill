<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="billing_first_name" id="id08" placeholder="Inserisci il tuo nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Cognome</span>
    <input type="text" name="billing_last_name" id="idhpoa" placeholder="Inserisci il tuo cognome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idz30f">Email</label>
    <input type="email" name="mail" id="idz30f" placeholder="esempio@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idim">Telefono</label>
    <input type="tel" name="phoneNumber" id="idim" placeholder="Inserisci il tuo numero di telefono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Data di nascita
    <input type="text" name="birthday" id="idblg" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <span>Organizzazione (facoltativo)</span>
    <input type="text" name="company" id="idbnu" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <label>Soprannome (facoltativo)
    <input type="text" name="handle" id="idaedzr" placeholder="Inserisci un soprannome" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <button name="idec" id="idbjyy" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
