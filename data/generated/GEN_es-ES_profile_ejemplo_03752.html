<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Nombre</label>
    <input type="text" name="givenName" id="givenName" placeholder="Tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Apellido</label>
    <input type="text" name="familyName" id="familyName" placeholder="Tu apellido" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Segundo apellido</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="Tu segundo apellido (opcional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Apodo</label>
    <input type="text" name="nickname" id="nickname" placeholder="Tu apodo (opcional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="tucorreo@ejemplo.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Teléfono</label>
    <input type="tel" name="tel" id="tel" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Organización</label>
    <input type="text" name="organization" id="organization" placeholder="Tu empresa u organización (opcional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Fecha de nacimiento</label>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/YYYY" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="field">Contraseña</label>
    <input type="password" name="field" id="field" placeholder="Contraseña">
  </div>
</form>

</fieldset></body></html>
