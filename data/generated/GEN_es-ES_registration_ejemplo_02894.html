<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Introduce tu nombre" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Introduce tus apellidos" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="ejemplo@dominio.com" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Tu número de teléfono" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="Fecha de nacimiento" data-moz-autofill-type="bday">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nombre de tu organización" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Crea una contraseña">
  </div>
  <div>
    <button name="field" id="field" type="submit">Registrarse</button>
  </div>
</form>

</fieldset></body></html>
