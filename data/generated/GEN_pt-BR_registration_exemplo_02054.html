<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Digite seu nome" aria-label="Nome" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Digite seu sobrenome" aria-label="Sobrenome" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="nome@exemplo.com" aria-label="E-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(xx) xxxxx-xxxx" aria-label="Telefone" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="bday" id="bday" placeholder="DD/MM/AAAA" aria-label="Data de Nascimento" data-moz-autofill-type="bday">
  </div>
  <div>
    <select name="sex" id="sex" aria-label="Sexo" data-moz-autofill-type="sex">
  <option value=""></option>
  <option>Masculino</option>
  <option>Feminino</option>
  <option>Outro</option>
</select>
  </div>
  <div>
    <input type="password" name="field" id="field" placeholder="Digite sua senha" aria-label="Senha">
  </div>
</form>

</fieldset></body></html>
