<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Kartentyp</span>
    <select name="ccType" id="iducg2" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Discover</option>
  <option>Diners Club</option>
</select>
  </div>
  <div>
    <span>Kreditkartennummer</span>
    <input type="number" name="ccNumber" id="idkd" placeholder="1234 5678 9012 3456" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <span>Karteninhaber</span>
    <input type="text" name="ccName" id="idiy" placeholder="Max Mustermann" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Ablaufmonat</span>
    <select name="exp_month" id="id3h" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <span>Ablaufjahr</span>
    <select name="exp_year" id="idos7" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <span>Sicherheitscode (CVC)</span>
    <input type="number" name="cvv" id="ida9" placeholder="123" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <span>Straße und Hausnummer</span>
    <input type="text" name="addr1" id="idek1" placeholder="Musterstraße 1" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Adresszusatz</span>
    <input type="text" name="addr2" id="idplh" placeholder="z.B. Apartment 12" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Stadt</span>
    <input type="text" name="town" id="idsiu7" placeholder="Musterstadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Bundesland</span>
    <select name="province" id="idqnx" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
  <div>
    <span>Postleitzahl</span>
    <input type="number" name="zipCode" id="id123" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Land</span>
    <select name="countryCode" id="idblu" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Belgien</option>
  <option>Niederlande</option>
  <option>Frankreich</option>
</select>
  </div>
  <div>
    <span>Unternehmen</span>
    <input type="text" name="organization" id="idhdv77" placeholder="Musterfirma GmbH" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="idchy" placeholder="Ihre E-Mail" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
