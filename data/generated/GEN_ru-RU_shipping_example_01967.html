<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Введите ваше полное имя" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="street" id="street" placeholder="Введите название улицы" data-moz-autofill-type="street">
  </div>
  <div>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Введите номер дома" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Квартира, подъезд и т.д." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>Беларусь</option>
  <option>Украина</option>
  <option>Казахстан</option>
  <option>Армения</option>
  <option>Грузия</option>
  <option>Азербайджан</option>
</select>
  </div>
  <div>
    <input type="text" name="building" id="building" placeholder="Введите информацию о корпусе" data-moz-autofill-type="building">
  </div>
  <div>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Например, ближайший магазин или школа" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Введите район" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
