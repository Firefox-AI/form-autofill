<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idhoi">Ваше имя</label>
    <input type="text" name="contactName3" id="idhoi" placeholder="Введите ваше имя" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idl6p">Электронная почта</label>
    <input type="email" name="email_address" id="idl6p" placeholder="example@domain.ru" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idzdf4">Телефон</label>
    <input type="tel" name="tel" id="idzdf4" placeholder="+7 (___) ___-__-__" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idyvr">Улица, дом</label>
    <input type="text" name="street1" id="idyvr" placeholder="Введите адрес (улица, дом)" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idnlj">Город</label>
    <input type="text" name="locality" id="idnlj" placeholder="Введите город" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id6gd">Почтовый индекс</label>
    <input type="text" name="zipCode2" id="id6gd" placeholder="Введите почтовый индекс" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idw8y">Страна</label>
    <select name="country" id="idw8y" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Россия</option>
  <option>США</option>
  <option>Германия</option>
  <option>Франция</option>
  <option>Италия</option>
  <option>Испания</option>
</select>
  </div>
  <div>
    <label for="iddeoc">Квартира</label>
    <input type="text" name="apt" id="iddeoc" placeholder="Введите номер квартиры" data-moz-autofill-type="apartment">
  </div>
</form>

</fieldset></body></html>
