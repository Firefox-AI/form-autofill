<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Vorname
    <input type="text" name="givenName" id="givenName" placeholder="Geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Nachname
    <input type="text" name="familyName" id="familyName" placeholder="Geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>E-Mail-Adresse
    <input type="email" name="email" id="email" placeholder="name@beispiel.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefonnummer
    <input type="tel" name="tel" id="tel" placeholder="+43 123 4567890" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Geburtsdatum
    <input type="text" name="bday" id="bday" placeholder="TT.MM.JJJJ" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <label>Zusätzliche Informationen
    <input type="text" name="addressExtra" id="addressExtra" placeholder="z.B. besondere Hinweise" data-moz-autofill-type="address-extra">
    </label>
  </div>
  <div>
    <label>Passwort
    <input type="password" name="field" id="field" placeholder="Geben Sie Ihr Passwort ein">
    </label>
  </div>
</form>

</fieldset></body></html>
