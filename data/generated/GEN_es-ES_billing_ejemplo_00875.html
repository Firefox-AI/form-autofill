<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ejemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nombre del titular de la tarjeta</span>
    <input type="text" name="ccName" id="ccName" placeholder="Nombre completo" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Nombre de la empresa</span>
    <input type="text" name="organization" id="organization" placeholder="Nombre de la empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Dirección</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Calle, número" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Piso, puerta o referencia</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piso, puerta, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Código postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Ciudad</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Ciudad" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Provincia</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Andalucía</option>
  <option>Aragón</option>
  <option>Asturias</option>
  <option>Islas Baleares</option>
  <option>Canarias</option>
  <option>Castilla y León</option>
  <option>Castilla-La Mancha</option>
  <option>Cataluña</option>
  <option>Extremadura</option>
  <option>Galicia</option>
  <option>Madrid</option>
  <option>Murcia</option>
  <option>Navarra</option>
  <option>La Rioja</option>
  <option>País Vasco</option>
  <option>Valencia</option>
</select>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>España</option>
  <option>Alemania</option>
  <option>Francia</option>
  <option>Italia</option>
  <option>Reino Unido</option>
  <option>Estados Unidos</option>
  <option>Canadá</option>
  <option>México</option>
  <option>Brasil</option>
  <option>Argentina</option>
</select>
  </div>
  <div>
    <span>Teléfono</span>
    <input type="tel" name="tel" id="tel" placeholder="Teléfono de contacto" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
