<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fictitious.hu</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Keresztnév</label>
    <input type="text" name="givenName" id="givenName" placeholder="Írd be a keresztneved" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Vezetéknév</label>
    <input type="text" name="familyName" id="familyName" placeholder="Írd be a vezetékneved" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Kiegészítő név</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="(opcionális)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Becenév</label>
    <input type="text" name="nickname" id="nickname" placeholder="Írd be a beceneved" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">E-mail cím</label>
    <input type="email" name="email" id="email" placeholder="plebs@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Telefonszám</label>
    <input type="tel" name="tel" id="tel" placeholder="+36 30 123 4567" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Cégnév</label>
    <input type="text" name="organization" id="organization" placeholder="Írd be a céged nevét" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Születési dátum</label>
    <select name="bday" id="bday" data-moz-autofill-type="bday">
  <option value=""></option>
  <option>Nap</option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
  <option></option>
</select>
  </div>
  <div>
    <label for="organizationTitle">Pozíció</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Írd be a pozíciódat" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="phoneticGivenName">Kiejtés szerinti kereszt név</label>
    <input type="text" name="phoneticGivenName" id="phoneticGivenName" placeholder="(opcionális)" data-moz-autofill-type="phonetic-given-name">
  </div>
  <div>
    <label for="vatNumber">Áfa szám</label>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Írd be az áfa számot" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="field">Jelszó</label>
    <input type="password" name="field" id="field" placeholder="Írd be a jelszavad">
  </div>
</form>

</fieldset></body></html>
