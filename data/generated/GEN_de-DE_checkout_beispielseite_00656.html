<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idojz">Zahlungsmethode</label>
    <select name="cardType" id="idojz" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <label for="idxf">Kartennummer:</label>
    <input type="number" name="cardNo" id="idxf" placeholder="Bitte geben Sie die Kartennummer ein" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idx5ad">Ablaufmonat:</label>
    <select name="ccExpMonth" id="idx5ad" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Januar</option>
  <option>02 - Februar</option>
  <option>03 - März</option>
  <option>04 - April</option>
  <option>05 - Mai</option>
  <option>06 - Juni</option>
  <option>07 - Juli</option>
  <option>08 - August</option>
  <option>09 - September</option>
  <option>10 - Oktober</option>
  <option>11 - November</option>
  <option>12 - Dezember</option>
</select>
  </div>
  <div>
    <select name="exp_year" id="id8n" aria-label="Ablaufjahr:" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <label for="idckjz5">Karteninhaber</label>
    <input type="text" name="ccName" id="idckjz5" placeholder="Vor- und Nachname des Karteninhabers" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="id2ubr">Vor- und Zuname:</label>
    <input type="text" name="yourName" id="id2ubr" placeholder="Ihr vollständiger Name" data-moz-autofill-type="name">
  </div>
  <div>
    <label>Adressfeld 1:
    <input type="text" name="addressLine1" id="idka8" placeholder="Straße und Hausnummer" data-moz-autofill-type="address-line1">
    </label>
  </div>
  <div>
    <label for="idm3s">Adressfeld 2:</label>
    <input type="text" name="addr2" id="idm3s" placeholder="Zusätzliche Informationen (optional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Stadt:</span>
    <input type="text" name="town" id="idvre" placeholder="Ihre Stadt" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Land:
    <select name="country" id="id4s2k" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
  <option>Frankreich</option>
  <option>Niederlande</option>
</select>
    </label>
  </div>
  <div>
    <span>Postleitzahl:</span>
    <input type="text" name="zipCode" id="iddq" placeholder="Ihre PLZ" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Telefonnummer:
    <input type="tel" name="mobile" id="id9ol" placeholder="Ihre Telefonnummer" data-moz-autofill-type="tel">
    </label>
  </div>
</form>

</fieldset></body></html>
