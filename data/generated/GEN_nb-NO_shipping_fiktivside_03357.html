<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>fiktivside.no</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Navn</label>
    <input type="text" name="name" id="name" placeholder="Fornavn og etternavn" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Gate</label>
    <input type="text" name="street" id="street" placeholder="Skriv inn gatenavn" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Husnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Husnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Leilighet, etasje eller annet</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Leilighetsnummer eller etasje" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">By</label>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="By eller sted" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Norge</option>
  <option>Sverige</option>
  <option>Danmark</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <label for="referencePoint">Referansepunkt (valgfritt)</label>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="F.eks. nær en kjent bygning" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
