<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>

  </div>
  <div>
    <input type="text" name="address" id="idky1q" placeholder="Rua, Avenida, etc." aria-label="Endereço" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zip" id="id80wzp" placeholder="Código Postal (ex: 1000-123)" aria-label="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="city" id="idp78qv" placeholder="Concelho" aria-label="Concelho" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="region" id="iddj" aria-label="Distrito" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Évora</option>
  <option>Setúbal</option>
  <option>Leiria</option>
  <option>Aveiro</option>
  <option>Viana do Castelo</option>
  <option>Bragança</option>
  <option>Faro</option>
  <option>Guarda</option>
  <option>Castelo Branco</option>
  <option>Santarém</option>
  <option>Portalegre</option>
  <option>Vila Real</option>
  <option>Madeira</option>
  <option>Açores</option>
</select>
  </div>
  <div>
    <select name="country" id="idjz8" aria-label="País" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Bélgica</option>
  <option>Países Baixos</option>
  <option>Suiça</option>
  <option>Outros</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="id22hxy" placeholder="Número de identificação fiscal" aria-label="Número de IVA" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="id5w" id="idid3e" type="submit">Enviar</button>
  </div>
</form>

</fieldset></body></html>
