<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome no Cartão</span>
    <input type="text" name="ccName" id="ccName" placeholder="Informe o nome como aparece no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Endereço
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Av., etc." data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Complemento
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apart., Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Código Postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Concelho</span>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Braga</option>
  <option>Coimbra</option>
  <option>Setúbal</option>
  <option>Aveiro</option>
  <option>Faro</option>
  <option>Évora</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">Distrito</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Braga</option>
  <option>Coimbra</option>
  <option>Setúbal</option>
  <option>Aveiro</option>
  <option>Faro</option>
  <option>Évora</option>
</select>
  </div>
  <div>
    <label>País
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
  <option>Itália</option>
  <option>Brasil</option>
</select>
    </label>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="Número de Identificação Fiscal (NIF)" aria-label="Nº de VAT" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
