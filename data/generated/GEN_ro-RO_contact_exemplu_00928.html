<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplu.ro</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Nume complet
    <input type="text" name="name" id="name" placeholder="Introduceti numele dvs." data-moz-autofill-type="name">
    </label>
  </div>
  <div>
    <label>Adresă de email
    <input type="email" name="email" id="email" placeholder="introduceti-email@exemplu.ro" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Număr de telefon
    <input type="tel" name="tel" id="tel" placeholder="Introduceți numărul de telefon" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Adresă
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Strada, nr. apartament" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Oraș
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Introduceți orașul" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <label>Cod poștal
    <input type="text" name="postalCode" id="postalCode" placeholder="Introduceți codul poștal" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <label>Țară
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>România</option>
  <option>Albania</option>
  <option>Germania</option>
  <option>Franța</option>
  <option>Italia</option>
  <option>Spania</option>
</select>
    </label>
  </div>
  <div>
    <label>Nume suplimentar (opțional)
    <input type="text" name="ccAdditionalName" id="ccAdditionalName" placeholder="Dacă este cazul" data-moz-autofill-type="cc-additional-name">
    </label>
  </div>
  <div>
    <label>Titlu organizație (opțional)
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Introduceți titlul organizației dvs." data-moz-autofill-type="organization-title">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Trimite</button>
  </div>
</form>

</fieldset></body></html>
