<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idir">名</label>
    <input type="text" name="r:r:2:m:r:1:cr:2:c:pr:1:container:fs:i:input" id="idir" placeholder="例: 太郎" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idyta">姓</label>
    <input type="text" name="r:r:2:m:r:2:cr:2:c:pr:1:container:fs:i:input" id="idyta" placeholder="例: 山田" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idxqlg">住所</label>
    <input type="text" name="r:r:6:m:r:3:cr:2:c:pr:1:container:fs:i:input" id="idxqlg" placeholder="例: 1-2-3 中央区" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idnl">都道府県</label>
    <input type="text" name="r:r:2:m:r:4:cr:1:c:pr:1:container:fs:i:input" id="idnl" placeholder="例: 東京都" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id7ef">郵便番号</label>
    <input type="text" name="r:r:9:m:r:5:cr:1:c:pr:1:container:fs:i:input" id="id7ef" placeholder="例: 100-0001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idtcga">国</label>
    <select name="r:r:9:m:r:6:cr:3:c:pr:1:container:fs:i:input" id="idtcga" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
  <option>ドイツ</option>
  <option>中国</option>
  <option>韓国</option>
  <option>インド</option>
</select>
  </div>
  <div>
    <label for="idfkes">メールアドレス</label>
    <input type="email" name="r:r:4:m:r:7:cr:2:c:pr:1:container:fs:i:input" id="idfkes" placeholder="例: taro@example.jp" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="ido7">電話番号</label>
    <input type="tel" name="r:r:4:m:r:8:cr:3:c:pr:1:container:fs:i:input" id="ido7" placeholder="例: 03-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="ido8pc9">国番号</label>
    <select name="r:r:7:m:r:9:cr:1:c:pr:1:container:fs:i:input" id="ido8pc9" data-moz-autofill-type="tel-country-code">
  <option value=""></option>
  <option>+81</option>
  <option>+1</option>
  <option>+44</option>
  <option>+33</option>
  <option>+49</option>
  <option>+86</option>
  <option>+82</option>
  <option>+91</option>
</select>
  </div>
  <div>
    <button name="r:r:4:m:r:10:cr:2:c:pr:1:container:fs:i:input" id="idbp" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
