<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.jp</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id83">名</label>
    <input type="text" name="firstName" id="id83" placeholder="山田" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idkj">姓</label>
    <input type="text" name="lname" id="idkj" placeholder="太郎" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idj97m">住所1</label>
    <input type="text" name="address1" id="idj97m" placeholder="1-2-3 日本町" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id42">市区町村</label>
    <input type="text" name="town" id="id42" placeholder="中央区" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyhdj">郵便番号</label>
    <input type="text" name="postalCode" id="idyhdj" placeholder="123-4567" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id8wesz">国</label>
    <select name="countryName" id="id8wesz" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>日本</option>
  <option>アメリカ</option>
  <option>カナダ</option>
  <option>イギリス</option>
  <option>フランス</option>
</select>
  </div>
  <div>
    <label for="idqa1">メールアドレス</label>
    <input type="email" name="mail" id="idqa1" placeholder="example@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id9mpg">電話番号</label>
    <input type="tel" name="phone" id="id9mpg" placeholder="090-1234-5678" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idf5kx">会社名</label>
    <input type="text" name="companyName" id="idf5kx" placeholder="株式会社サンプル" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id1sfr0">住所2（アパート名等）</label>
    <input type="text" name="addressLine2" id="id1sfr0" placeholder="グリーンビル101" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idpyn3l">都道府県</label>
    <select name="province" id="idpyn3l" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>東京都</option>
  <option>大阪府</option>
  <option>愛知県</option>
  <option>北海道</option>
  <option>福岡県</option>
</select>
  </div>
  <div>
    <button name="id9w9v7" id="idmj8wv" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
