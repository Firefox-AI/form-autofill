<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome e cognome</span>
    <input type="text" name="nameOnCard" id="idpybi" placeholder="Mario Rossi" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <span>Azienda</span>
    <input type="text" name="business" id="idtcfw0" placeholder="Nome della tua azienda" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Indirizzo</span>
    <input type="text" name="street" id="idqp" placeholder="Via Roma 1" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Comune</span>
    <input type="text" name="locality" id="idde" placeholder="Nome del comune" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>CAP</span>
    <input type="text" name="zip_code" id="idwhurg" placeholder="00100" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Provincia</span>
    <select name="province" id="idvmnt" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>MI - Milano</option>
  <option>RM - Roma</option>
  <option>NA - Napoli</option>
  <option>TO - Torino</option>
  <option>FI - Firenze</option>
  <option>BO - Bologna</option>
  <option>GE - Genova</option>
</select>
  </div>
  <div>
    <span>Paese</span>
    <select name="countryName" id="idakj2j" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
  <option>Stati Uniti</option>
</select>
  </div>
  <div>
    <span>Numero di partita IVA</span>
    <input type="text" name="vatId" id="id1k" placeholder="IT12345678901" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <span>Telefono</span>
    <input type="tel" name="phone" id="idzn" placeholder="+39 06 12345678" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Password</span>
    <input type="password" name="idsnw" id="id6l7">
  </div>
  <div>
    <button name="id8x" id="idblgpi" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
