<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>voorbeeldsite.nl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Vul je naam in" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Vul je e-mailadres in" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="Vul je telefoonnummer in" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Straat en huisnummer" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Vul je stad in" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Vul je postcode in" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Nederland</option>
  <option>België</option>
  <option>Duitsland</option>
  <option>Frankrijk</option>
  <option>Verenigd Koninkrijk</option>
  <option>Verenigde Staten</option>
  <option>Spanje</option>
  <option>Italië</option>
  <option>Zweden</option>
  <option>Noorwegen</option>
</select>
  </div>
  <div>
    <input type="text" name="addressExtra" id="addressExtra" placeholder="Bijvoorbeeld appartement of verdieping" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <button name="field" id="field" type="submit">Verzenden</button>
  </div>
</form>

</fieldset></body></html>
