<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>ornekwebsitesi.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Adınız
    <input type="text" name="givenName" id="givenName" placeholder="Adınızı girin" data-moz-autofill-type="given-name">
    </label>
  </div>
  <div>
    <label>Soyadınız
    <input type="text" name="familyName" id="familyName" placeholder="Soyadınızı girin" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label>Orta adınız
    <input type="text" name="additionalName" id="additionalName" placeholder="Orta adınızı girin (isteğe bağlı)" data-moz-autofill-type="additional-name">
    </label>
  </div>
  <div>
    <label>Takma adınız
    <input type="text" name="nickname" id="nickname" placeholder="Takma adınızı girin (isteğe bağlı)" data-moz-autofill-type="nickname">
    </label>
  </div>
  <div>
    <label>E-posta adresiniz
    <input type="email" name="email" id="email" placeholder="E-posta adresinizi girin" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <label>Telefon numaranız
    <input type="tel" name="tel" id="tel" placeholder="Telefon numaranızı girin" data-moz-autofill-type="tel">
    </label>
  </div>
  <div>
    <label>Şirketiniz (isteğe bağlı)
    <input type="text" name="organization" id="organization" placeholder="Şirket adınızı girin" data-moz-autofill-type="organization">
    </label>
  </div>
  <div>
    <label>Doğum tarihiniz
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
    </label>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
