<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Nome completo</span>
    <input type="text" name="name" id="name" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Rua</span>
    <input type="text" name="street" id="street" placeholder="Nome da rua" data-moz-autofill-type="street">
  </div>
  <div>
    <span>Número</span>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Número da casa/apartamento" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Complemento</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>CEP</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="Digite seu CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Cidade</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Nome da cidade" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Uruguai</option>
  <option>Paraguai</option>
  <option>Colômbia</option>
  <option>Peru</option>
</select>
  </div>
  <div>
    <span>Ponto de referência</span>
    <input type="text" name="referencePoint" id="referencePoint" placeholder="Ex: Próximo à escola" data-moz-autofill-type="reference-point">
  </div>
  <div>
    <span>Estado</span>
    <select name="addressLevel3" id="addressLevel3" data-moz-autofill-type="address-level3">
  <option value=""></option>
  <option>São Paulo</option>
  <option>Rio de Janeiro</option>
  <option>Minas Gerais</option>
  <option>Bahia</option>
  <option>Paraná</option>
  <option>Rio Grande do Sul</option>
</select>
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
