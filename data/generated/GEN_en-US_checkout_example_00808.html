<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="family_name_3268">Last Name</label>
    <input type="text" name="family_name_746" id="family_name_3268" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="given_name_3064">First Name</label>
    <input type="text" name="given_name_8344" id="given_name_3064" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="tel_6489">Phone Number</label>
    <input type="tel" name="tel_4593" id="tel_6489" placeholder="(123) 456-7890" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="email_4980">Email Address</label>
    <input type="email" name="email_4700" id="email_4980" placeholder="you@example.com" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="postal_code_7391">Zip Code</label>
    <input type="text" name="postal_code_6027" id="postal_code_7391" placeholder="12345" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="street_2958">Street Address</label>
    <input type="text" name="street_708" id="street_2958" placeholder="123 Main St" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="address_line2_128">Apartment, Suite, etc.</label>
    <input type="text" name="address_line2_840" id="address_line2_128" placeholder="Apt 4B" data-moz-autofill-type="address-line2">
  </div>
</form>

</fieldset></body></html>
