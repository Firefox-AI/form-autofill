<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>First Name</span>
    <input type="text" name="firstName" id="idiwt" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Last Name</span>
    <input type="text" name="last_name" id="idngymi" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Please start by entering your locality or postcode in the search bar, select a collection point from the list of suggestions, and press Enter to confirm your choice</span>
    <input type="text" name="zip_code" id="idzrd" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="id5my">City</label>
    <input type="text" name="town" id="id5my" placeholder="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addr1" id="idy2wm" placeholder="Street Address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Building / Floor / Apartment</span>
    <input type="text" name="addressLine2" id="idup" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="id5ch">Locality / Zone / Place</label>
    <input type="text" name="city" id="id5ch" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Country
    <select name="country_id" id="ide5" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>United States</option>
  <option>Canada</option>
  <option>Australia</option>
</select>
    </label>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="tel" id="idz0r8" placeholder="+44" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
