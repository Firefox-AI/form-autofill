<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="id4et">Kortinnehavare</label>
    <input type="text" name="ccName" id="id4et" placeholder="Ange namn som på kortet" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="idic">Kortnummer</label>
    <input type="number" name="cardNumber" id="idic" placeholder="XXXX-XXXX-XXXX-XXXX" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="idbih">Utgångsmånad</label>
    <select name="exp_month2" id="idbih" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
  </div>
  <div>
    <label for="id21rs">Utgångsår</label>
    <select name="exp_year" id="id21rs" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
</select>
  </div>
  <div>
    <label for="id95maw">CVV-kod</label>
    <input type="number" name="cardCode" id="id95maw" placeholder="3 siffror på baksidan av kortet" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <label for="idqm">Korttyp</label>
    <select name="cardType" id="idqm" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
</select>
  </div>
  <div>
    <button name="idrgj" id="id194" type="submit">Betala</button>
  </div>
</form>

</fieldset></body></html>
