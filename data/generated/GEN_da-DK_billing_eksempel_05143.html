<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempel.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Navn på kortet</label>
    <input type="text" name="ccName" id="ccName" placeholder="F.eks. Jens Hansen" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Gadeadresse</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="F.eks. Nørregade 12" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Lejlighed eller etage (valgfrit)</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="F.eks. Lej. 3B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postnummer</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="F.eks. 8000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="F.eks. Aarhus" aria-label="By" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label>Region
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
  <option>Sjælland</option>
  <option>Sydjylland</option>
</select>
    </label>
  </div>
  <div>
    <span>Land</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Finland</option>
  <option>Island</option>
</select>
  </div>
  <div>
    <input type="text" name="vatNumber" id="vatNumber" placeholder="F.eks. 12345678" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
