<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Titre</span>
    <select name="honorificPrefix" id="honorificPrefix" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Monsieur</option>
  <option>Madame</option>
  <option>Mademoiselle</option>
</select>
  </div>
  <div>
    <span>Prénom</span>
    <input type="text" name="givenName" id="givenName" placeholder="Entrez votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nom de famille</span>
    <input type="text" name="familyName" id="familyName" placeholder="Entrez votre nom" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Société (facultatif)</span>
    <input type="text" name="organization" id="organization" placeholder="Entrez le nom de votre société" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Adresse</span>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="123 Rue Exemples" data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Ville</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Entrez votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Région</span>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Occitanie</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Pays de la Loire</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Centre-Val de Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <span>Code postal</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Pays</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Canada</option>
</select>
  </div>
  <div>
    <span>Adresse e-mail</span>
    <input type="email" name="email" id="email" placeholder="exemple@domaine.com" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Téléphone</span>
    <input type="tel" name="tel" id="tel" placeholder="06 12 34 56 78" data-moz-autofill-type="tel">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
