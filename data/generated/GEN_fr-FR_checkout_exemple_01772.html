<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idc8o7c">Prénom</label>
    <input type="text" name="billing_first_name" id="idc8o7c" placeholder="Votre prénom" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idb2">Nom de famille</label>
    <input type="text" name="lastName" id="idb2" placeholder="Votre nom de famille" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="idux">Société (facultatif)</label>
    <input type="text" name="companyName" id="idux" placeholder="Nom de votre société" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="id2k5my">Adresse</label>
    <input type="text" name="addressLine1" id="id2k5my" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idfadb">Appartement, suite (facultatif)</label>
    <input type="text" name="flat" id="idfadb" placeholder="Numéro d&#x27;appartement ou de suite" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idue6">Ville</label>
    <input type="text" name="city" id="idue6" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idngsu">Code postal</label>
    <input type="text" name="postcode" id="idngsu" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idd5">Pays</label>
    <select name="country" id="idd5" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Pays-Bas</option>
  <option>Royaume-Uni</option>
</select>
  </div>
  <div>
    <label for="idept84">Adresse e-mail</label>
    <input type="email" name="email_address" id="idept84" placeholder="Votre adresse e-mail" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idwpbqm">Numéro de téléphone</label>
    <input type="tel" name="telephone" id="idwpbqm" placeholder="Votre numéro de téléphone" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
