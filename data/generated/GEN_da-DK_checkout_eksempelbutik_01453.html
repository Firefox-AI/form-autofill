<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>eksempelbutik.dk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idtu">Titel</label>
    <select name="title" id="idtu" data-moz-autofill-type="honorific-prefix">
  <option value=""></option>
  <option>Hr.</option>
  <option>Fr.</option>
  <option>Frøken</option>
</select>
  </div>
  <div>
    <label for="id1lici">Fornavn</label>
    <input type="text" name="fname" id="id1lici" placeholder="Indtast dit fornavn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idbw">Efternavn</label>
    <input type="text" name="billing_last_name" id="idbw" placeholder="Indtast dit efternavn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id38quz">Virksomhed</label>
    <input type="text" name="business" id="id38quz" placeholder="Indtast virksomhedens navn (valgfrit)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idy1v7f">Adresse</label>
    <input type="text" name="address" id="idy1v7f" placeholder="Indtast din adresse" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="idt2pej">By</label>
    <input type="text" name="locality" id="idt2pej" placeholder="Indtast din by" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="ide156">Region</label>
    <select name="province" id="ide156" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Hovedstaden</option>
  <option>Sjælland</option>
  <option>Syddanmark</option>
  <option>Midtjylland</option>
  <option>Nordjylland</option>
</select>
  </div>
  <div>
    <label for="ideb0">Postnummer</label>
    <input type="text" name="zip" id="ideb0" placeholder="Indtast dit postnummer" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idxd2">Land</label>
    <select name="country" id="idxd2" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Danmark</option>
  <option>Sverige</option>
  <option>Norge</option>
  <option>Tyskland</option>
  <option>Finland</option>
</select>
  </div>
  <div>
    <label for="ideied">E-mail</label>
    <input type="email" name="user_email" id="ideied" placeholder="Indtast din e-mailadresse" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id5s6b">Telefonnummer</label>
    <input type="tel" name="mobile" id="id5s6b" placeholder="Indtast dit telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idkffsv">CVR-nummer</label>
    <input type="text" name="vat" id="idkffsv" placeholder="Indtast dit CVR-nummer (valgfrit)" data-moz-autofill-type="vat-number">
  </div>
</form>

</fieldset></body></html>
