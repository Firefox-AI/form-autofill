<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="organization" id="organization" placeholder="Unternehmen" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="Geben Sie Ihren Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Geben Sie Ihren Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Geben Sie Ihre Straße und Hausnummer ein" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Geben Sie Ihre Postleitzahl ein" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Geben Sie Ihre Stadt ein" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Deutschland</option>
  <option>Österreich</option>
  <option>Schweiz</option>
</select>
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Geben Sie Ihre E-Mail-Adresse ein" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="Geben Sie Ihre Vorwahl ein" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <input type="tel" name="telNational" id="telNational" placeholder="Geben Sie Ihre Telefonnummer ein" data-moz-autofill-type="tel-national">
  </div>
</form>

</fieldset></body></html>
