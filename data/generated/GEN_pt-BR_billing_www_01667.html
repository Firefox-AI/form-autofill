<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>www.exemplosite.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Como está no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="organization" id="organization" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto, Bloco, etc. (opcional)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="Digite o CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Cidade onde reside" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>AC</option>
  <option>AL</option>
  <option>AP</option>
  <option>AM</option>
  <option>BA</option>
  <option>CE</option>
  <option>DF</option>
  <option>ES</option>
  <option>GO</option>
  <option>MA</option>
  <option>MT</option>
  <option>MS</option>
  <option>MG</option>
  <option>PA</option>
  <option>PB</option>
  <option>PR</option>
  <option>PE</option>
  <option>PI</option>
  <option>RJ</option>
  <option>RN</option>
  <option>RS</option>
  <option>RO</option>
  <option>RR</option>
  <option>SC</option>
  <option>SP</option>
  <option>SE</option>
  <option>TO</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
</select>
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="(xx) xxxxx-xxxx" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
