<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>paymentexample.ru</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label>Имя владельца карты
    <input type="text" name="nameOnCard" id="idlrgsq" placeholder="Ф.И.О." data-moz-autofill-type="cc-name">
    </label>
  </div>
  <div>
    <label>Номер карты
    <input type="number" name="cardNumber" id="idooiyq" placeholder="0000 0000 0000 0000" data-moz-autofill-type="cc-number">
    </label>
  </div>
  <div>
    <label>Месяц окончания действия
    <select name="exp_month" id="idum1xf" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01</option>
  <option>02</option>
  <option>03</option>
  <option>04</option>
  <option>05</option>
  <option>06</option>
  <option>07</option>
  <option>08</option>
  <option>09</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
</select>
    </label>
  </div>
  <div>
    <label>Год окончания действия
    <select name="expYear" id="idss9q" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
    </label>
  </div>
  <div>
    <label>Код безопасности
    <input type="number" name="cardCode" id="idll9n" placeholder="123" data-moz-autofill-type="cc-csc">
    </label>
  </div>
  <div>
    <label>Тип карты
    <select name="ccType" id="idutrao" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>Visa</option>
  <option>MasterCard</option>
  <option>Мир</option>
</select>
    </label>
  </div>
  <div>
    <button name="idef" id="idcpc" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
