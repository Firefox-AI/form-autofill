<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="przykladowy@email.pl" data-moz-autofill-type="email">
  </div>
  <div>
    <input type="tel" name="tel" id="tel" placeholder="+48 123 456 789" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Ul. Kwiatowa 15" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Jon Kowalski" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <input type="text" name="idNumber" id="idNumber" placeholder="PESEL lub NIP" data-moz-autofill-type="id-number">
  </div>
</form>

</fieldset></body></html>
