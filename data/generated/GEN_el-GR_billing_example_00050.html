<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="cardholderName" id="idt830" placeholder="Π.χ. Γιάννης Παπαδόπουλος" aria-label="Όνομα κατόχου κάρτας" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="text" name="street" id="idgdp" placeholder="Οδός και αριθμός" aria-label="Διεύθυνση" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="zip" id="id8ffpo" placeholder="Π.χ. 12345" aria-label="Ταχυδρομικός Κωδικός" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="town3" id="idy2s" placeholder="Π.χ. Κέντρο, Χαλάνδρι" aria-label="Περιοχή" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="stateProvince" id="idgi" aria-label="Περιφέρεια" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Αττική</option>
  <option>Μακεδονία</option>
  <option>Θεσσαλία</option>
  <option>Κρήτη</option>
  <option>Πελοπόννησος</option>
</select>
  </div>
  <div>
    <select name="countryName" id="idezdl" aria-label="Χώρα" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Ελλάδα</option>
  <option>Κύπρος</option>
  <option>Αλβανία</option>
  <option>Βουλγαρία</option>
</select>
  </div>
  <div>
    <input type="tel" name="telephone" id="id9k" placeholder="Π.χ. 2101234567" aria-label="Τηλέφωνο" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
