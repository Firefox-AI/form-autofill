<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.co.uk</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="email" name="email" id="email" placeholder="Contact Information" data-moz-autofill-type="email">
  </div>
  <div>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>United Kingdom</option>
  <option>Ireland</option>
  <option>Germany</option>
  <option>France</option>
  <option>Spain</option>
</select>
  </div>
  <div>
    <input type="text" name="givenName" id="givenName" placeholder="First Name *" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="familyName" id="familyName" placeholder="Last Name *" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="123 Street Name" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apartment, Suite, etc." data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="City/Town *" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="County/Region *" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <input type="text" name="addressLevel1" id="addressLevel1" placeholder="e.g. SW1A 1AA" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <select name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  <option value=""></option>
  <option>+44</option>
  <option>+1</option>
  <option>+49</option>
  <option>+33</option>
  <option>+34</option>
</select>
  </div>
  <div>
    <input type="tel" name="telCountryCode" id="telCountryCode" placeholder="01234 567890" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <input type="email" name="telNational" id="telNational" placeholder="you@example.com" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <input type="tel" name="email" id="email" placeholder="01234 567890" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
