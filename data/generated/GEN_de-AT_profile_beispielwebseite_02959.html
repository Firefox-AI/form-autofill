<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielwebseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Vorname</span>
    <input type="text" name="givenName" id="givenName" placeholder="Gib deinen Vornamen ein" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Nachname</span>
    <input type="text" name="familyName" id="familyName" placeholder="Gib deinen Nachnamen ein" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Zusätzlicher Name</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="Gib einen zusätzlichen Namen ein (optional)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Spitzname</span>
    <input type="text" name="nickname" id="nickname" placeholder="Gib deinen Spitznamen ein (optional)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-Mail-Adresse</span>
    <input type="email" name="email" id="email" placeholder="Gib deine E-Mail-Adresse ein" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="tel" id="tel" placeholder="Gib deine Telefonnummer ein" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Unternehmen</span>
    <input type="text" name="organization" id="organization" placeholder="Gib den Namen deines Unternehmens ein (optional)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Geburtsdatum</span>
    <input type="text" name="bday" id="bday" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Tag</span>
    <select name="bdayDay" id="bdayDay" data-moz-autofill-type="bday-day">
  <option value=""></option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
  <option>9</option>
  <option>10</option>
  <option>11</option>
  <option>12</option>
  <option>13</option>
  <option>14</option>
  <option>15</option>
  <option>16</option>
  <option>17</option>
  <option>18</option>
  <option>19</option>
  <option>20</option>
  <option>21</option>
  <option>22</option>
  <option>23</option>
  <option>24</option>
  <option>25</option>
  <option>26</option>
  <option>27</option>
  <option>28</option>
  <option>29</option>
  <option>30</option>
  <option>31</option>
</select>
  </div>
  <div>
    <span>Positionsbezeichnung</span>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Gib deine Positionsbezeichnung ein (optional)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Passwort</span>
    <input type="password" name="field" id="field" placeholder="Wähle ein Passwort">
  </div>
</form>

</fieldset></body></html>
