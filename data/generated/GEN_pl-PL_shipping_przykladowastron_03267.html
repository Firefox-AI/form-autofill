<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>przykladowastrona.pl</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Imię i nazwisko</span>
    <input type="text" name="name" id="name" placeholder="Jan Kowalski" data-moz-autofill-type="name">
  </div>
  <div>
    <span>Ulica</span>
    <input type="text" name="addressStreetname" id="addressStreetname" placeholder="Mickiewicza" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <span>Numer domu</span>
    <input type="number" name="addressHousenumber" id="addressHousenumber" placeholder="12" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <span>Dodatkowe informacje</span>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="np. mieszkanie 4B" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <span>Kod pocztowy</span>
    <input type="text" name="postalCode" id="postalCode" placeholder="00-001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Miasto</span>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Warszawa" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Kraj</span>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Polska</option>
  <option>Niemcy</option>
  <option>Francja</option>
  <option>Hiszpania</option>
  <option>Włochy</option>
  <option>Czechy</option>
  <option>Słowacja</option>
</select>
  </div>
  <div>
    <span>Piętro</span>
    <input type="text" name="floor" id="floor" placeholder="np. 2" data-moz-autofill-type="floor">
  </div>
  <div>
    <span>Region</span>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Mazowieckie" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <span>Imię fonetyczne</span>
    <input type="text" name="phoneticName" id="phoneticName" placeholder="Jan" data-moz-autofill-type="phonetic-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Złóż zamówienie</button>
  </div>
</form>

</fieldset></body></html>
