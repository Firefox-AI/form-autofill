<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idoiv7k">Nome completo</label>
    <input type="text" name="contactName" id="idoiv7k" placeholder="Digite seu nome completo" data-moz-autofill-type="name">
  </div>
  <div>
    <input type="text" name="addr" id="idegmf" placeholder="Rua, Avenida, etc." data-moz-autofill-type="street-address">
  </div>
  <div>
    <span>Código Postal</span>
    <input type="text" name="zip_code" id="idfpeu" placeholder="XXXXX-XXX" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Cidade
    <input type="text" name="town" id="idzz" placeholder="Digite sua cidade" data-moz-autofill-type="address-level2">
    </label>
  </div>
  <div>
    <span>País</span>
    <select name="countryName" id="id94" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Brasil</option>
  <option>Argentina</option>
  <option>Chile</option>
  <option>Uruguai</option>
  <option>Paraguai</option>
</select>
  </div>
</form>

</fieldset></body></html>
