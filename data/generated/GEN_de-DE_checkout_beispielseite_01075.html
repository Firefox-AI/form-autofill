<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="givenName" id="id1dk" placeholder="Vorname" data-moz-autofill-type="given-name">
  </div>
  <div>
    <input type="text" name="surname" id="idcl" placeholder="Nachname" data-moz-autofill-type="family-name">
  </div>
  <div>
    <input type="text" name="apartment" id="idx67h" placeholder="z.B. 3B" data-moz-autofill-type="apartment">
  </div>
  <div>
    <input type="text" name="strasse" id="idtdh" placeholder="z.B. Hauptstraße" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <input type="number" name="houseNumber" id="id9e37f" placeholder="z.B. 12" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <select name="locality" id="iddk" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Riyadh</option>
  <option>Berlin</option>
  <option>München</option>
  <option>Frankfurt</option>
</select>
  </div>
  <div>
    <select name="suburb" id="idi39" data-moz-autofill-type="address-level3">
  <option value=""></option>
  <option>King Abdullah District</option>
  <option>Mitte</option>
  <option>Neukölln</option>
  <option>Schöneberg</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="idf7" placeholder="z.B. 10115" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="tel" name="tel" id="id7eg" placeholder="+49 30 12345678" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset></body></html>
