<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>pagamentos.com.br</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Nome completo como aparece no cartão" aria-label="Nome no cartão" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <input type="number" name="ccNumber" id="ccNumber" placeholder="XXXX-XXXX-XXXX-XXXX" aria-label="Número do cartão" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <select name="ccExpMonth" id="ccExpMonth" aria-label="Mês de vencimento" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>01 - Janeiro</option>
  <option>02 - Fevereiro</option>
  <option>03 - Março</option>
  <option>04 - Abril</option>
  <option>05 - Maio</option>
  <option>06 - Junho</option>
  <option>07 - Julho</option>
  <option>08 - Agosto</option>
  <option>09 - Setembro</option>
  <option>10 - Outubro</option>
  <option>11 - Novembro</option>
  <option>12 - Dezembro</option>
</select>
  </div>
  <div>
    <select name="ccExpYear" id="ccExpYear" aria-label="Ano de vencimento" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
</select>
  </div>
  <div>
    <input type="number" name="ccCsc" id="ccCsc" placeholder="Últimos 3 dígitos atrás do cartão" aria-label="Código de segurança" data-moz-autofill-type="cc-csc">
  </div>
  <div>
    <select name="ccType" id="ccType" aria-label="Tipo de cartão" data-moz-autofill-type="cc-type">
  <option value=""></option>
  <option>VISA</option>
  <option>MasterCard</option>
  <option>American Express</option>
  <option>Diners Club</option>
  <option>Discover</option>
  <option>Elo</option>
</select>
  </div>
  <div>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Rua, número, complemento" aria-label="Endereço" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="XXXXX-XXX" aria-label="CEP" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <input type="text" name="phoneticFamilyName" id="phoneticFamilyName" placeholder="Como você pronuncia seu sobrenome" aria-label="Sobrenome fonético" data-moz-autofill-type="phonetic-family-name">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
