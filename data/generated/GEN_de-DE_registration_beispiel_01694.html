<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Vorname*</label>
    <input type="text" name="givenName" id="givenName" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Nachname*</label>
    <input type="text" name="familyName" id="familyName" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="bdayDay">Geburtstag (Tag)*</label>
    <input type="number" name="bdayDay" id="bdayDay" data-moz-autofill-type="bday-day">
  </div>
  <div>
    <label for="bdayMonth">Geburtstag (Monat)*</label>
    <select name="bdayMonth" id="bdayMonth" data-moz-autofill-type="bday-month">
  <option value=""></option>
  <option>Januar</option>
  <option>Februar</option>
  <option>März</option>
  <option>April</option>
  <option>Mai</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>August</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Dezember</option>
</select>
  </div>
  <div>
    <label for="bdayYear">Geburtstag (Jahr)*</label>
    <input type="number" name="bdayYear" id="bdayYear" data-moz-autofill-type="bday-year">
  </div>
  <div>
    <label for="email">E-Mail*</label>
    <input type="email" name="email" id="email" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="telCountryCode">Vorwahl*</label>
    <input type="tel" name="telCountryCode" id="telCountryCode" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="telNational">Telefonnummer* *Ihre Telefonnummer wird in Ihrem My DC Benutzerkonto gespeichert, damit der Zusteller Sie vor der Lieferung kontaktieren kann. Sie können die Telefonnummer jederzeit in Ihrem My dm-Konto löschen.</label>
    <input type="tel" name="telNational" id="telNational" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="street">Straße und Hausnummer*</label>
    <input type="text" name="street" id="street" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressExtra">Zusätzliche Informationen zur Adresse (z.B. Etage)</label>
    <input type="text" name="addressExtra" id="addressExtra" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="postalCode">Postleitzahl*</label>
    <input type="number" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Ort*</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="countryName">Bundesland*</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Baden-Württemberg</option>
  <option>Bayern</option>
  <option>Berlin</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Hamburg</option>
  <option>Hessen</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Niedersachsen</option>
  <option>Nordrhein-Westfalen</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Sachsen</option>
  <option>Sachsen-Anhalt</option>
  <option>Schleswig-Holstein</option>
  <option>Thüringen</option>
</select>
  </div>
</form>

</fieldset></body></html>
