<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispiel.de</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idr26sd">Vorname*</label>
    <input type="text" name="givenName" id="idr26sd" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="idtwq4o">Nachname*</label>
    <input type="text" name="surname" id="idtwq4o" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id4tb">Geburtstag (Tag)*</label>
    <input type="number" name="dobDay" id="id4tb" data-moz-autofill-type="bday-day">
  </div>
  <div>
    <label for="id2ch">Geburtstag (Monat)*</label>
    <input type="number" name="birthMonth" id="id2ch" data-moz-autofill-type="bday-month">
  </div>
  <div>
    <label for="idvl">Geburtstag (Jahr)*</label>
    <input type="number" name="dobYear" id="idvl" data-moz-autofill-type="bday-year">
  </div>
  <div>
    <label for="idxasz2">E-Mail*</label>
    <input type="email" name="email" id="idxasz2" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idn6mcs">Vorwahl*</label>
    <input type="tel" name="phoneCountryCode" id="idn6mcs" data-moz-autofill-type="tel-country-code">
  </div>
  <div>
    <label for="idfu">Telefonnummer* *Ihre Telefonnummer wird in Ihrem My DC-Benutzerkonto gespeichert, damit der Lieferant Sie vor der Lieferung kontaktieren kann. Sie können die Telefonnummer jederzeit in Ihrem My dm-Konto löschen.</label>
    <input type="tel" name="idvy" id="idfu" data-moz-autofill-type="tel-national">
  </div>
  <div>
    <label for="idoiq">Straße und Hausnummer*</label>
    <input type="text" name="idi481" id="idoiq" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="id2qywq">Zusätzliche Informationen zur Adresse (z.B. Etage)</label>
    <input type="text" name="idru3qs" id="id2qywq" data-moz-autofill-type="address-extra">
  </div>
  <div>
    <label for="idt4">Postleitzahl*</label>
    <input type="text" name="postcode" id="idt4" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idof">Ort*</label>
    <input type="text" name="locality" id="idof" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idmme">Bundesland*</label>
    <select name="countryName" id="idmme" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Bayern</option>
  <option>Baden-Württemberg</option>
  <option>Nordrhein-Westfalen</option>
  <option>Hessen</option>
  <option>Hamburg</option>
  <option>Niedersachsen</option>
  <option>Sachsen</option>
  <option>Thüringen</option>
  <option>Berlin</option>
  <option>Rheinland-Pfalz</option>
  <option>Saarland</option>
  <option>Schleswig-Holstein</option>
  <option>Mecklenburg-Vorpommern</option>
  <option>Brandenburg</option>
  <option>Bremen</option>
  <option>Burgund</option>
  <option>Bayern</option>
</select>
  </div>
</form>

</fieldset></body></html>
