<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esempio.it</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="ccName" id="ccName" placeholder="Nome e cognome" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label>Indirizzo
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Via e numero civico" data-moz-autofill-type="street-address">
    </label>
  </div>
  <div>
    <label>Ulteriori informazioni sull’indirizzo (facoltativo)
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Piano, interno, ecc." data-moz-autofill-type="address-line2">
    </label>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="CAP" aria-label="Codice postale" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <span>Città</span>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <select name="addressLevel1" id="addressLevel1" aria-label="Provincia" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Milano</option>
  <option>Roma</option>
  <option>Napoli</option>
  <option>Torino</option>
  <option>Firenze</option>
</select>
  </div>
  <div>
    <select name="countryName" id="countryName" aria-label="Paese" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Italia</option>
  <option>Francia</option>
  <option>Germania</option>
  <option>Spagna</option>
  <option>Regno Unito</option>
</select>
  </div>
  <div>
    <label for="apartment">Appartamento (facoltativo)</label>
    <input type="text" name="apartment" id="apartment" placeholder="Numero appartamento" data-moz-autofill-type="apartment">
  </div>
  <div>
    <span>Codice fiscale</span>
    <input type="text" name="idNumber" id="idNumber" placeholder="Inserisci il tuo codice fiscale" data-moz-autofill-type="id-number">
  </div>
  <div>
    <span>Password</span>
    <input type="password" name="field" id="field">
  </div>
  <div>
    <button name="field" id="field" type="submit">Invia</button>
  </div>
</form>

</fieldset></body></html>
