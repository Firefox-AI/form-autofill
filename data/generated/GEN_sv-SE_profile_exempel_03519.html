<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exempel.se</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Förnamn</span>
    <input type="text" name="first_name" id="id3jb7" placeholder="Skriv ditt förnamn" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Efternamn</span>
    <input type="text" name="last_name" id="idsq3" placeholder="Skriv ditt efternamn" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Mellannamn</span>
    <input type="text" name="middleName" id="idvq" placeholder="Skriv ditt mellannamn (valfritt)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Smeknamn</span>
    <input type="text" name="nickname" id="idb8462" placeholder="Skriv ditt smeknamn (valfritt)" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>E-post</span>
    <input type="email" name="email" id="id6i4" placeholder="Skriv din e-postadress" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Telefonnummer</span>
    <input type="tel" name="telephone" id="idey0t9" placeholder="Skriv ditt telefonnummer" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Organisation</span>
    <input type="text" name="business" id="id9w732" placeholder="Skriv din organisations namn (valfritt)" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Födelsedatum</span>
    <input type="text" name="birthday" id="idd0l1" placeholder="Välj ditt födelsedatum" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Befattning</span>
    <input type="text" name="position" id="idhw0nl" placeholder="Skriv din befattning (valfritt)" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <span>Block/rum</span>
    <input type="text" name="idmt" id="idizejn" placeholder="Skriv block eller rum (valfritt)" data-moz-autofill-type="block">
  </div>
  <div>
    <button name="idt2" id="idgt" type="submit">Skicka</button>
  </div>
</form>

</fieldset></body></html>
