<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idab">Nome do titular do cartão</label>
    <input type="text" name="cardholderName" id="idab" placeholder="João Silva" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="iduuf">Endereço</label>
    <input type="text" name="address1" id="iduuf" placeholder="Rua da Liberdade, 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idl5e4k">Complemento</label>
    <input type="text" name="addressLine2" id="idl5e4k" placeholder="Apartamento 45" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idei">Código Postal</label>
    <input type="text" name="zipCode" id="idei" placeholder="1000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idyl">Concelho</label>
    <select name="town" id="idyl" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Évora</option>
</select>
  </div>
  <div>
    <label for="id9gxz5">Distrito</label>
    <select name="region" id="id9gxz5" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Aveiro</option>
  <option>Setúbal</option>
  <option>Faro</option>
</select>
  </div>
  <div>
    <label for="id0wc">País</label>
    <select name="countryName" id="id0wc" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="iddf7br">Nome da Empresa</label>
    <input type="text" name="company" id="iddf7br" placeholder="Nome da sua empresa" data-moz-autofill-type="organization">
  </div>
</form>

</fieldset></body></html>
