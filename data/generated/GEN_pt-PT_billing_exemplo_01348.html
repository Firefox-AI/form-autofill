<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemplo.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccName">Nome do titular do cartão</label>
    <input type="text" name="ccName" id="ccName" placeholder="João Silva" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="streetAddress">Endereço</label>
    <input type="text" name="streetAddress" id="streetAddress" placeholder="Rua da Alegria, 123" data-moz-autofill-type="street-address">
  </div>
  <div>
    <label for="addressLine2">Complemento</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apto 45" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Código Postal</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="1000-000" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Concelho</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Coimbra</option>
  <option>Braga</option>
  <option>Setúbal</option>
</select>
  </div>
  <div>
    <label for="addressLevel1">Distrito</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Lisboa</option>
  <option>Porto</option>
  <option>Aveiro</option>
  <option>Setúbal</option>
  <option>Évora</option>
</select>
  </div>
  <div>
    <label for="countryName">País</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Portugal</option>
  <option>Espanha</option>
  <option>França</option>
  <option>Alemanha</option>
  <option>Reino Unido</option>
</select>
  </div>
  <div>
    <label for="organization">Nome da empresa</label>
    <input type="text" name="organization" id="organization" placeholder="Exemplo SA" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="addressLevel3">Freguesia</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Santa Maria Maior" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
