<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="givenName">Όνομα</label>
    <input type="text" name="givenName" id="givenName" placeholder="Το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="familyName">Επώνυμο</label>
    <input type="text" name="familyName" id="familyName" placeholder="Το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="additionalName">Μεσαίο Όνομα</label>
    <input type="text" name="additionalName" id="additionalName" placeholder="(προαιρετικό)" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="nickname">Ψευδώνυμο</label>
    <input type="text" name="nickname" id="nickname" placeholder="Το ψευδώνυμό σας" data-moz-autofill-type="nickname">
  </div>
  <div>
    <label for="email">Διεύθυνση Email</label>
    <input type="email" name="email" id="email" placeholder="email@example.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="tel">Τηλέφωνο</label>
    <input type="tel" name="tel" id="tel" placeholder="Προτιμώμενος αριθμός τηλεφώνου" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="organization">Οργάνωση</label>
    <input type="text" name="organization" id="organization" placeholder="Η εταιρεία σας (προαιρετικό)" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="bday">Ημερομηνία Γέννησης</label>
    <input type="text" name="bday" id="bday" placeholder="Εισάγετε την ημερομηνία γέννησης" data-moz-autofill-type="bday">
  </div>
  <div>
    <label for="ccAdditionalName">Επιπλέον Όνομα Κάρτας (προαιρετικό)</label>
    <input type="text" name="ccAdditionalName" id="ccAdditionalName" placeholder="Το επιπλέον όνομα της κάρτας σας" data-moz-autofill-type="cc-additional-name">
  </div>
  <div>
    <label for="organizationTitle">Τίτλος Θέσης</label>
    <input type="text" name="organizationTitle" id="organizationTitle" placeholder="Ο τίτλος σας στην οργάνωση" data-moz-autofill-type="organization-title">
  </div>
  <div>
    <label for="field">Κωδικός Πρόσβασης</label>
    <input type="password" name="field" id="field" placeholder="Εισάγετε έναν ασφαλή κωδικό">
  </div>
  <div>
    <button name="field" id="field" type="submit">Submit</button>
  </div>
</form>

</fieldset></body></html>
