<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>versand.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="name">Name</label>
    <input type="text" name="name" id="name" placeholder="Vor- und Nachname" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="street">Straße</label>
    <input type="text" name="street" id="street" placeholder="Straße eingeben" data-moz-autofill-type="street">
  </div>
  <div>
    <label for="addressHousenumber">Hausnummer</label>
    <input type="text" name="addressHousenumber" id="addressHousenumber" placeholder="Hausnummer" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="addressLine2">Zusätzliche Angaben</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="z.B. Wohnung, Etage" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="postalCode">Postleitzahl</label>
    <input type="text" name="postalCode" id="postalCode" placeholder="Postleitzahl eingeben" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="addressLevel2">Bundesland</label>
    <select name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Burgenland</option>
  <option>Oberösterreich</option>
  <option>Salzburg</option>
  <option>Steiermark</option>
  <option>Kärnten</option>
  <option>Tirol</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <label for="countryName">Land</label>
    <select name="countryName" id="countryName" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Italien</option>
  <option>Ungarn</option>
  <option>Slowakei</option>
  <option>Tschechische Republik</option>
  <option>Slowenien</option>
</select>
  </div>
  <div>
    <label for="building">Gebäudename</label>
    <input type="text" name="building" id="building" placeholder="Name des Gebäudes (optional)" data-moz-autofill-type="building">
  </div>
  <div>
    <label for="addressLevel3">Bezirk</label>
    <input type="text" name="addressLevel3" id="addressLevel3" placeholder="Bezirk (optional)" data-moz-autofill-type="address-level3">
  </div>
</form>

</fieldset></body></html>
