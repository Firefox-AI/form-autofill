<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>examplepayment.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="ccNumber">Credit Card Number</label>
    <input type="number" name="ccNumber" id="ccNumber" data-moz-autofill-type="cc-number">
  </div>
  <div>
    <label for="ccExpMonth">Expiration Month</label>
    <select name="ccExpMonth" id="ccExpMonth" data-moz-autofill-type="cc-exp-month">
  <option value=""></option>
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>
  </div>
  <div>
    <span>Expiration Year</span>
    <select name="ccExpYear" id="ccExpYear" data-moz-autofill-type="cc-exp-year">
  <option value=""></option>
  <option>2023</option>
  <option>2024</option>
  <option>2025</option>
  <option>2026</option>
  <option>2027</option>
  <option>2028</option>
  <option>2029</option>
  <option>2030</option>
  <option>2031</option>
  <option>2032</option>
  <option>2033</option>
  <option>2034</option>
  <option>2035</option>
</select>
  </div>
  <div>
    <label for="givenName">First Name</label>
    <input type="text" name="givenName" id="givenName" placeholder="Enter your first name" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label>Last Name
    <input type="text" name="familyName" id="familyName" placeholder="Enter your last name" data-moz-autofill-type="family-name">
    </label>
  </div>
  <div>
    <label for="addressLine1">Street Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="1234 Main St" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="addressLine2">Apt, Suite, Bldg (optional)</label>
    <input type="text" name="addressLine2" id="addressLine2" placeholder="Apt #1" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <input type="text" name="addressLevel2" id="addressLevel2" placeholder="Enter your city" aria-label="City" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="addressLevel1">State</label>
    <select name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Alabama</option>
  <option>Alaska</option>
  <option>Arizona</option>
  <option>Arkansas</option>
  <option>California</option>
  <option>Colorado</option>
  <option>Connecticut</option>
  <option>Delaware</option>
  <option>Florida</option>
  <option>Georgia</option>
  <option>Hawaii</option>
  <option>Idaho</option>
  <option>Illinois</option>
  <option>Indiana</option>
  <option>Iowa</option>
  <option>Kansas</option>
  <option>Kentucky</option>
  <option>Louisiana</option>
  <option>Maine</option>
  <option>Maryland</option>
  <option>Massachusetts</option>
  <option>Michigan</option>
  <option>Minnesota</option>
  <option>Mississippi</option>
  <option>Missouri</option>
  <option>Montana</option>
  <option>Nebraska</option>
  <option>Nevada</option>
  <option>New Hampshire</option>
  <option>New Jersey</option>
  <option>New Mexico</option>
  <option>New York</option>
  <option>North Carolina</option>
  <option>North Dakota</option>
  <option>Ohio</option>
  <option>Oklahoma</option>
  <option>Oregon</option>
  <option>Pennsylvania</option>
  <option>Rhode Island</option>
  <option>South Carolina</option>
  <option>South Dakota</option>
  <option>Tennessee</option>
  <option>Texas</option>
  <option>Utah</option>
  <option>Vermont</option>
  <option>Virginia</option>
  <option>Washington</option>
  <option>West Virginia</option>
  <option>Wisconsin</option>
  <option>Wyoming</option>
</select>
  </div>
  <div>
    <input type="text" name="postalCode" id="postalCode" placeholder="12345" aria-label="Zip Code" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label>Country
    <select name="country" id="country" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
  <option>Other</option>
</select>
    </label>
  </div>
  <div>
    <span>Phone Number</span>
    <input type="tel" name="tel" id="tel" placeholder="(555) 555-5555" data-moz-autofill-type="tel">
  </div>
  <div>
    <label>Email Address
    <input type="email" name="email" id="email" placeholder="yourname@example.com" data-moz-autofill-type="email">
    </label>
  </div>
  <div>
    <input type="text" name="name" id="name" aria-label="Same as Billing Address" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="addressLine1">Same as Billing Address</label>
    <input type="text" name="addressLine1" id="addressLine1" placeholder="Same as Billing Address" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <span>Same as Billing Address</span>
    <input type="text" name="addressLine2" id="addressLine2" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="addressLevel2">Same as Billing Address</label>
    <input type="text" name="addressLevel2" id="addressLevel2" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <span>Same as Billing Address</span>
    <input type="text" name="addressLevel1" id="addressLevel1" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label>Same as Billing Address
    <input type="text" name="postalCode" id="postalCode" data-moz-autofill-type="postal-code">
    </label>
  </div>
  <div>
    <select name="country" id="country" aria-label="Same as Billing Address" data-moz-autofill-type="country">
  <option value=""></option>
  <option>United States</option>
  <option>Canada</option>
  <option>United Kingdom</option>
  <option>Australia</option>
  <option>Germany</option>
  <option>France</option>
  <option>Italy</option>
  <option>Spain</option>
  <option>Netherlands</option>
  <option>Other</option>
</select>
  </div>
  <div>
    <label for="tel">Same as Billing Address</label>
    <input type="tel" name="tel" id="tel" placeholder="Same as Billing Address" data-moz-autofill-type="tel">
  </div>
  <div>
    <input type="email" name="email" id="email" placeholder="Same as Billing Address" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
