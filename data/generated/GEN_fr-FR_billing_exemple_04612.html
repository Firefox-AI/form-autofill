<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.fr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idf3es">Nom sur la carte</label>
    <input type="text" name="cardholderName" id="idf3es" placeholder="Nom complet tel qu&#x27;affiché sur la carte" data-moz-autofill-type="cc-name">
  </div>
  <div>
    <label for="ido82v4">Adresse</label>
    <input type="text" name="address1" id="ido82v4" placeholder="Numéro et nom de la rue" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id8o">Code postal</label>
    <input type="text" name="zip_code" id="id8o" placeholder="Votre code postal" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idwd">Ville</label>
    <input type="text" name="locality" id="idwd" placeholder="Votre ville" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idfwt">Région</label>
    <select name="region" id="idfwt" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Île-de-France</option>
  <option>Provence-Alpes-Côte d&#x27;Azur</option>
  <option>Auvergne-Rhône-Alpes</option>
  <option>Nouvelle-Aquitaine</option>
  <option>Hauts-de-France</option>
  <option>Grand Est</option>
  <option>Bretagne</option>
  <option>Normandie</option>
  <option>Occitanie</option>
  <option>Centre-Val de Loire</option>
  <option>Pays de la Loire</option>
  <option>Bourgogne-Franche-Comté</option>
  <option>Alsace</option>
  <option>Corse</option>
</select>
  </div>
  <div>
    <label for="idri4el">Pays</label>
    <select name="countryName" id="idri4el" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Belgique</option>
  <option>Suisse</option>
  <option>Luxembourg</option>
  <option>Monaco</option>
</select>
  </div>
  <div>
    <label for="idgekmi">Numéro de TVA</label>
    <input type="text" name="vatNumber" id="idgekmi" placeholder="Votre numéro de TVA intracommunautaire" data-moz-autofill-type="vat-number">
  </div>
  <div>
    <label for="idp0">Numéro de téléphone</label>
    <input type="tel" name="phone" id="idp0" placeholder="Téléphone (inclure l&#x27;indicatif)" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idxbey">Complément d&#x27;adresse</label>
    <input type="text" name="address2" id="idxbey" placeholder="Appartement, étage, etc. (facultatif)" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <button name="id7jz" id="ido6pq7" type="submit">Envoyer</button>
  </div>
</form>

</fieldset></body></html>
