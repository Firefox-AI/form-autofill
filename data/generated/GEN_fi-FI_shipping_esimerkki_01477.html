<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>esimerkki.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <input type="text" name="contactName" id="idhi6" placeholder="Etunimi ja sukunimi" aria-label="Nimi" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idx9">Osoite</label>
    <input type="text" name="streetAddress" id="idx9" placeholder="Kadun nimi ja numero" data-moz-autofill-type="street-address">
  </div>
  <div>
    <input type="text" name="postcode" id="idpk6en" placeholder="Esim. 00100" aria-label="Postinumero" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idpoocb">Kaupunki</label>
    <input type="text" name="city" id="idpoocb" placeholder="Kaupungin nimi" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idhu">Maa</label>
    <select name="country" id="idhu" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>Suomi</option>
  <option>Ruotsi</option>
  <option>Norja</option>
  <option>Tanska</option>
  <option>Viro</option>
  <option>Saksa</option>
  <option>Ranska</option>
  <option>Iso-Britannia</option>
  <option>Yhdysvallat</option>
  <option>Kanada</option>
</select>
  </div>
  <div>
    <label for="idtmu">Viitepiste (valinnainen)</label>
    <input type="text" name="idyel3" id="idtmu" placeholder="Esim. lähellä 7-Eleveniä" data-moz-autofill-type="reference-point">
  </div>
</form>

</fieldset></body></html>
