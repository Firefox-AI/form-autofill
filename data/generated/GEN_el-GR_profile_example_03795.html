<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="givenName" id="givenName" placeholder="Πρώτο όνομα" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Επίθετο</span>
    <input type="text" name="familyName" id="familyName" placeholder="Επίθετο" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Μεσαίο όνομα</span>
    <input type="text" name="additionalName" id="additionalName" placeholder="(προαιρετικό) Μεσαίο όνομα" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Ψευδώνυμο</span>
    <input type="text" name="nickname" id="nickname" placeholder="Πώς σε φωνάζουν;" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Email</span>
    <input type="email" name="email" id="email" placeholder="email@παράδειγμα.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="tel" id="tel" placeholder="Καταχωρήστε το τηλέφωνό σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Οργανισμός</span>
    <input type="text" name="organization" id="organization" placeholder="Περίληψη της επιχείρησής σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ημερομηνία Γέννησης</span>
    <input type="text" name="bday" id="bday" placeholder="Ημ/νία (π.χ. 01/01/1990)" data-moz-autofill-type="bday">
  </div>
</form>

</fieldset></body></html>
