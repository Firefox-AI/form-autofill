<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>example.gr</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <span>Όνομα</span>
    <input type="text" name="billing_first_name" id="idb7" placeholder="Πληκτρολογήστε το όνομά σας" data-moz-autofill-type="given-name">
  </div>
  <div>
    <span>Επώνυμο</span>
    <input type="text" name="lname" id="iduy" placeholder="Πληκτρολογήστε το επώνυμό σας" data-moz-autofill-type="family-name">
  </div>
  <div>
    <span>Μεσαίο Όνομα</span>
    <input type="text" name="middle_name" id="idzbwtk" placeholder="Προαιρετικό: Πληκτρολογήστε το μεσαίο σας όνομα" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <span>Ψευδώνυμο</span>
    <input type="text" name="handle" id="idjnzvx" placeholder="Πληκτρολογήστε το ψευδώνυμό σας" data-moz-autofill-type="nickname">
  </div>
  <div>
    <span>Διεύθυνση email</span>
    <input type="email" name="emailAddress" id="idzhq" placeholder="example@domain.gr" data-moz-autofill-type="email">
  </div>
  <div>
    <span>Τηλέφωνο</span>
    <input type="tel" name="phoneNumber" id="ido8e" placeholder="Πληκτρολογήστε τον αριθμό τηλεφώνου σας" data-moz-autofill-type="tel">
  </div>
  <div>
    <span>Οργάνωση</span>
    <input type="text" name="company" id="idqb" placeholder="Πληκτρολογήστε το όνομα της οργάνωσής σας" data-moz-autofill-type="organization">
  </div>
  <div>
    <span>Ημερομηνία Γέννησης</span>
    <input type="text" name="birthday" id="idvm0at" placeholder="Επιλέξτε την ημερομηνία γέννησης" data-moz-autofill-type="bday">
  </div>
  <div>
    <span>Κωδικός πρόσβασης</span>
    <input type="password" name="idie" id="id6mo1h">
  </div>
  <div>
    <button name="idlq" id="idk5" type="submit">Υποβολή</button>
  </div>
</form>

</fieldset></body></html>
