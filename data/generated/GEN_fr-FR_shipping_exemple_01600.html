<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>exemple.com</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idxmhyn">Nom complet</label>
    <input type="text" name="yourName" id="idxmhyn" placeholder="Jean Dupont" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="idpr4u">Adresse</label>
    <input type="text" name="addressLine1" id="idpr4u" placeholder="1 rue de la République" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="id9rd4">Numéro d&#x27;appartement (si applicable)</label>
    <input type="text" name="apartment" id="id9rd4" placeholder="A101" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="idjqr">Ville</label>
    <input type="text" name="city" id="idjqr" placeholder="Paris" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idj25j">Code postal</label>
    <input type="text" name="postcode" id="idj25j" placeholder="75001" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idni">Pays</label>
    <select name="country" id="idni" data-moz-autofill-type="country-name">
  <option value=""></option>
  <option>France</option>
  <option>Allemagne</option>
  <option>Espagne</option>
  <option>Italie</option>
  <option>Belgique</option>
  <option>Suisse</option>
</select>
  </div>
</form>

</fieldset></body></html>
