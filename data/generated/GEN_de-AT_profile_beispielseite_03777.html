<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>beispielseite.at</h3>
<p><i>Synthetic sample (LLM-augmented).</i></p>

<form method="post">
  <div>
    <label for="idplm">E-Mail-Adresse</label>
    <input type="email" name="emailAddress" id="idplm" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="idcy9">Bundesland</label>
    <select name="state" id="idcy9" data-moz-autofill-type="address-level1">
  <option value=""></option>
  <option>Wien</option>
  <option>Niederösterreich</option>
  <option>Oberösterreich</option>
  <option>Steiermark</option>
  <option>Tirol</option>
  <option>Salzburg</option>
  <option>Kärnten</option>
  <option>Burgenland</option>
  <option>Vorarlberg</option>
</select>
  </div>
  <div>
    <label for="idei">Vorname</label>
    <input type="text" name="fname" id="idei" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id4c8k7">Nachname</label>
    <input type="text" name="last_name" id="id4c8k7" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="ideubga">Unternehmen</label>
    <input type="text" name="company" id="ideubga" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="idtv">Straße und Hausnummer</label>
    <input type="text" name="street1" id="idtv" placeholder="z.B. Mustergasse 123" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="idg3kfq">Zusätzliche Adresse</label>
    <input type="text" name="address2" id="idg3kfq" placeholder="z.B. Top 12" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="idfmls">Weitere Adresse</label>
    <input type="text" name="address32" id="idfmls" data-moz-autofill-type="address-line3">
  </div>
  <div>
    <label for="idy8vc">Postleitzahl</label>
    <input type="number" name="postalCode" id="idy8vc" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="idod38">Stadt</label>
    <input type="text" name="city6" id="idod38" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="idyb">Telefonnummer</label>
    <input type="tel" name="mobile" id="idyb" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="idcxgb3">Land</label>
    <select name="country_id1" id="idcxgb3" data-moz-autofill-type="country">
  <option value=""></option>
  <option>Österreich</option>
  <option>Deutschland</option>
  <option>Schweiz</option>
  <option>Liechtenstein</option>
</select>
  </div>
  <div>
    <label for="idv0l">*</label>
    <input type="email" name="emailAddress4" id="idv0l" data-moz-autofill-type="email">
  </div>
</form>

</fieldset></body></html>
