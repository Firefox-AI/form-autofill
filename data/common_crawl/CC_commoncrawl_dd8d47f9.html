<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<label for="fl-comment">Reacties</label><textarea class="form-control" cols="60" id="fl-comment" name="comment" rows="8"></textarea><br/><label for="fl-author">Naam (vereist)</label> <input aria-required="true" class="form-control" data-moz-autofill-type="given-name" id="fl-author" name="author" type="text" value=""/><br/> <label for="fl-email">E-mailadres (zal niet zichtbaar zijn) (vereist)</label> <input aria-required="true" class="form-control" data-moz-autofill-type="email" id="fl-email" name="email" type="text" value=""/><br/> <label for="fl-url">Website</label> <input class="form-control" id="fl-url" name="url" type="text" value=""/><br/> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Mijn naam, e-mail en site bewaren in deze browser voor de volgende keer wanneer ik een reactie plaats.</label></p> <p class="form-submit"><input class="btn btn-primary" id="fl-comment-form-submit" name="submit" type="submit" value="Reactie plaatsen"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="787"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
