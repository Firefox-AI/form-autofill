<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="alert alert-danger" role="alert" v-if="error_register">{{error_message}} </div> <div class="form-group"> <label class="prelabel" for="re-username">Your name</label> <input class="form-control" data-moz-autofill-type="name" id="re-username" placeholder="Name" required="" type="text" v-model="name"/> </div> <div class="form-group"> <label class="prelabel" for="re-email">Email address</label> <input class="form-control" data-moz-autofill-type="email" id="re-email" placeholder="name@email.com" required="" type="email" v-model="email"/> </div> <div class="form-group"> <label class="prelabel" for="re-password">Password</label> <input class="form-control" id="re-password" placeholder="Password" required="" type="password" v-model="password"/> </div> <div class="form-group"> <label class="prelabel" for="re-confirmpassword">Confirm Password</label> <input autocomplete="off" class="form-control" id="re-confirmpassword" placeholder="Confirm Password" required="" type="password" v-model="confirm_password"/> </div> <div class="form-group login-btn mt-4"> <button class="btn btn-primary btn-block">Register</button> <div class="loading-relative" id="register-loading" style="display: none;"> <div class="loading"> <div class="span1"></div> <div class="span2"></div> <div class="span3"></div> </div> </div> </div>
</form>

</fieldset></body></html>
