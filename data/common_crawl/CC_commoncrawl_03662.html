<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="w101-inquiry-form-item col-1-2"> <label class="w101-inquiry-label">nome : </label> <input class="w101-inquiry-input" data-moz-autofill-type="given-name" name="name" placeholder="Qual o seu nome?" type="text"/> <span class="w101-inquiry-tips">This field is required</span> </div> <div class="w101-inquiry-form-item col-1-2"> <label class="w101-inquiry-label">telefone : </label> <input class="w101-inquiry-input" data-moz-autofill-type="tel" name="phone" placeholder="Melhor número de contato:" type="text"/> <span class="w101-inquiry-tips">This field is required</span> </div> <div class="w101-inquiry-form-item col-1-2"> <label class="w101-inquiry-label"><em>*</em>o email : </label> <input class="w101-inquiry-input" data-moz-autofill-type="email" name="email" placeholder="Seu melhor email de contato:" type="text"/> <span class="w101-inquiry-tips">Required and valid email address</span> </div> <div class="w101-inquiry-form-item col-1-2"> <label class="w101-inquiry-label">companhia : </label> <input class="w101-inquiry-input" data-moz-autofill-type="organization" name="company" placeholder="O nome da sua empresa:" type="text"/> <span class="w101-inquiry-tips">This field is required</span> </div> <div class="w101-inquiry-form-item"> <label class="w101-inquiry-label"><em>*</em>mensagem : </label> <textarea class="w101-inquiry-textarea" name="message" placeholder="Sobre o que você deseja saber?" rows="5"></textarea> <span class="w101-inquiry-tips">This field is required</span> </div> <div class="w101-inquiry-form-item"> <button class="w101-inquiry-button" type="submit"> <span>submeter</span> </button> <label class="w101-inquiry-checkbox"> <input checked="" type="checkbox"/> <span> <a href="/privacypolicy"> Política de Privacidade </a> </span> </label> </div>
</form>
