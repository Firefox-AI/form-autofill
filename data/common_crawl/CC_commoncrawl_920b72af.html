<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<dl class="zend_form"> <dt id="userscore-label"><label class="required" for="userscore">Your rating:</label></dt> <dd id="userscore-element"> <select id="userscore" name="userscore" onfocus="checkHelpScore();"> <option selected="selected" value="0">please choose...</option> <option value="1">1 - very trustworthy</option> <option value="2">2</option> <option value="3">3</option> <option value="4">4</option> <option value="5">5 - unknown</option> <option value="6">6</option> <option value="7">7</option> <option value="8">8</option> <option value="9">9 - untrustworthy</option> </select></dd> <dt id="callerradio-label"><label class="required">Caller name / company:</label></dt> <dd id="callerradio-element"> <label><input class="form-check-input" id="callerradio-0" name="callerradio" onchange="checkCustomCallerName();" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Caller name / company:" type="radio" value="0"/>QDOBA Mexican Eats</label><br/><label><input class="form-check-input" id="callerradio-2" name="callerradio" onchange="checkCustomCallerName();" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Caller name / company:" type="radio" value="2"/>unknown</label><br/><label><input class="form-check-input" id="callerradio-3" name="callerradio" onchange="checkCustomCallerName();" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Caller name / company:" type="radio" value="3"/>enter caller name</label></dd> <dt id="caller-label"><label class="required" for="caller">Caller name / company:</label></dt> <dd id="caller-element"> <input class="form-control" data-moz-autofill-type="name" id="caller" name="caller" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Caller name / company" type="text" value=""/></dd> <dt id="complain_type_id-label"><label class="optional" for="complain_type_id">Type of call / reason for calling:</label></dt> <dd id="complain_type_id-element"> <select class="form-select" id="complain_type_id" name="complain_type_id" onfocus='checkHelpCaller();loadReCaptcha("createRating");'> <option value="1">Unknown</option> <option value="2">Trustworthy number</option> <option value="3">Sweepstakes, lottery</option> <option value="4">Debt collection company</option> <option value="5">Aggressive advertising</option> <option value="6">Survey</option> <option value="7">Harassment calls</option> <option value="8">Cost trap</option> <option value="9">Telemarketer</option> <option value="10">Ping Call</option> <option value="11">SMS spam</option> </select></dd> <dt id="user-label"><label class="optional" for="user">Your name / pseudonym:</label></dt> <dd id="user-element"> <input class="form-control" data-moz-autofill-type="name" id="user" name="user" onfocus='checkHelpName();loadReCaptcha("createRating");' placeholder="Your name / pseudonym:" type="text" value=""/></dd> <dt id="comment-label"><label class="optional" for="comment">Comment:</label></dt> <dd id="comment-element"> <textarea class="form-control" cols="38" id="comment" name="comment" onfocus='checkHelpComment();loadReCaptcha("createRating");' placeholder="Call and caller details - e.g. When, why, etc." rows="7"></textarea></dd> <dt id="email-label"><label class="optional" for="email">Email:</label></dt> <dd id="email-element"> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" onfocus='loadReCaptcha("createRating");' placeholder="Email:" type="text" value=""/></dd> <dt id="frequency-label"><label class="optional" for="frequency">Frequency:</label></dt> <dd id="frequency-element"> <select class="form-select" id="frequency" name="frequency"> <option selected="selected" value="0">On every new comment</option> <option value="86400">Once a day</option> <option value="604800">Once a week</option> </select></dd> <dt id="notify-label"><label class="optional" for="notify">Notifications:</label></dt> <dd id="notify-element"> <input name="notify" type="hidden" value="0"/><input class="form-check-input" id="notify" name="notify" onclick="toggleNotifyElements(this);" type="checkbox" value="1"/> <p class="description">I'd like to be notified about updates on this number.</p></dd> <dt id="captcha-label"><label class="required" for="captcha">Please solve Captcha:</label></dt> <dd id="captcha-element"> <div class="g-recaptcha" data-sitekey="6LeLLyYTAAAAAN_VSdz6K_lQTI9YfXlZXnaNs4A0" data-theme="light" data-type="image"></div></dd> <dt id="submit-label"> </dt><dd id="submit-element"> <input class="btn btn-success btn-maxwidth" id="submit" name="submit" onclick="if (typeof submitted == 'undefined') {document.body.classList.add(&quot;loading&quot;); return submitted = true;} else return !submitted;" type="submit" value="Submit rating"/></dd></dl>
</form>

</fieldset></body></html>
