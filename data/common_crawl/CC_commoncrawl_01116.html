<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="create_customer"/><input name="utf8" type="hidden" value="✓"/><div class="frm-Form_Field"> <input autocomplete="given-name" class="frm-Form_Input" data-moz-autofill-type="given-name" id="RegisterForm-FirstName" name="customer[first_name]" placeholder="First name*" required="" type="text"/> <label class="frm-Form_Label" for="RegisterForm-FirstName">First name*</label> </div> <div class="frm-Form_Field"> <input autocomplete="family-name" class="frm-Form_Input" data-moz-autofill-type="family-name" id="RegisterForm-LastName" name="customer[last_name]" placeholder="Last name*" required="" type="text"/> <label class="frm-Form_Label" for="RegisterForm-LastName">Last name*</label> </div> <div class="frm-Form_Field"> <input autocapitalize="off" autocomplete="email" class="frm-Form_Input" data-moz-autofill-type="email" id="RegisterForm-email" name="customer[email]" placeholder="Email address*" required="" spellcheck="false" type="email"/> <label class="frm-Form_Label" for="RegisterForm-email">Email address*</label> </div> <div class="frm-Form_Field"> <input class="frm-Form_Input" id="RegisterForm-password" name="customer[password]" placeholder="Password*" required="" spellcheck="false" type="password"/> <label class="frm-Form_Label" for="RegisterForm-password">Password*</label> </div> <div class="frm-Form_Field frm-Form_Field-checkbox"> <input class="frm-Form_Checkbox" id="RegisterForm-Marketing" name="customer[accepts_marketing]" type="checkbox" value="true"/> <label class="frm-Form_Label" for="RegisterForm-Marketing"> Click here to sign up to our newsletters and receive the latest offers and deals. By signing up you agree to our <a href="/pages/terms-conditions">Terms &amp; Conditions</a>. You can unsubscribe anytime you wish. </label> </div><div class="frm-Form_Buttons"> <button class="frm-Form_Button btn-Button btn-Button-primary" type="submit"> Sign up <span class="btn-Button_Icon"> </span> </button> </div>
</form>

</fieldset></body></html>
