<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>snosites.com</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="sno-donate-input-wrap sd-fullwidth"> <label>Full Name (as appears on credit card)</label> <input data-moz-autofill-type="name" id="sno-donate-name" name="name" placeholder="Jane Doe" type="text"/> </div> <div class="sno-donate-input-wrap sd-fullwidth sno-donate-email"> <label>Email</label> <input data-moz-autofill-type="email" data-remember="efc1ab3c4b172b7c9e1bf19cb2fc607c" id="sno-donate-email" name="email" placeholder="jane.doe@domain.com" type="text"/> </div> <div class="clear"></div> <div class="sno-donate-anonymous-wrap"> <label> <input id="sno-donate-anonymous" name="sno-donate-anonymous" type="checkbox"/><span>I would like to remain anonymous. (Name will only be used to verify billing.)</span> </label> </div> <div class="sno-donate-input-wrap sd-amounts"> <select id="donation-amount" multiple="" name="donation_amount"> <option value="10">$10</option> <option value="15">$15</option> <option value="25">$25</option> <option value="50">$50</option> <option value="-1">Other</option> </select> </div> <div class="sno-donate-input-wrap sd-halfwidth sno-donate-custom-amount"> <label>Custom Donation Amount</label> <input id="custom-donation-amount" name="custom-donation-amount" type="text"/><br/> </div> <div class="clear"></div> <div class="sd-cc-row"> <label>Card Details</label> <div id="sno-donate-card"></div> </div> <div class="sd-terms-row"> <input id="sno-donate-agree" name="sno-donate-agree" type="checkbox"/> <label for="sno-donate-agree"> I agree to the <a href="https://snosites.com/donation-terms-of-service/" target="_blank">terms of service</a>.</label> </div> <div class="error"><div class="message"></div></div> <div class="clear"></div> <div class="sno-donate-button-wrap"> <button class="btn btn-success" id="sno-donate-form-submit" type="button">Submit Donation</button> </div>
</form>

</fieldset></body></html>
