<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="comments_field comments_author"><label class="required" for="author">Name</label><span class="sc_form_field_wrap"><input aria-required="true" data-moz-autofill-type="name" id="author" name="author" placeholder="Your Name *" type="text" value=""/></span></div><div class="comments_field comments_email"><label class="required" for="email">E-mail</label><span class="sc_form_field_wrap"><input aria-required="true" data-moz-autofill-type="email" id="email" name="email" placeholder="Your E-mail *" type="text" value=""/></span></div><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Meinen Namen, meine E-Mail-Adresse und meine Website in diesem Browser für die nächste Kommentierung speichern.</label></p> <div class="comments_field comments_comment"><label class="required" for="comment">Comment</label><span class="sc_form_field_wrap"><textarea aria-required="true" id="comment" name="comment" placeholder="Your comment *"></textarea></span></div><p class="wpgdprc-checkbox comment-form-wpgdprc"> <input id="wpgdprc" name="wpgdprc" type="checkbox" value="1"/> <label for="wpgdprc"> Mit der Nutzung dieses Formulars erklärst du dich mit der Speicherung und Verarbeitung deiner Daten durch diese Website einverstanden. <abbr class="wpgdprc-required" title="You need to accept this checkbox">*</abbr> </label> </p> <p class="form-submit"><input class="submit" id="send_comment" name="submit" type="submit" value="Leave a comment"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="3401"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
