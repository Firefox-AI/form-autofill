<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="response-email-address" type="hidden" value="support@theplanttrainer.com"/> <input name="response-email-content" type="hidden" value="{user-name} with email {user-email} wrote the following message: {user-message}"/> <input name="response-email-sender-address" type="hidden" value="admin@totalwebpartners.com"/> <div class="data-type-1"> <div class="input-container name"> <label>Your Name</label> <input data-moz-autofill-type="name" name="user-name" placeholder="Your Name" type="text"/> </div> <div class="input-container email"> <label>Your Email</label> <input data-moz-autofill-type="email" name="user-email" placeholder="Your Email" type="text"/> </div> <div class="input-container subject"> <label>Subject of message</label> <input name="user-subject" placeholder="Subject of message" type="text"/> </div> </div> <div class="data-type-2"> <div class="input-container message"> <label>Your message…</label> <textarea name="user-message" placeholder="Your message..." type="text"></textarea> </div> <div class="input-container sf-button"> <button class="item-detail-submit-form" type="submit">Send message</button> <i class="fa fa-sync fa-spin" style="display: none;"></i> </div> </div> <div class="data-messages"> <div class="msg msg-success" style="display: none;"> <p>Thank you for your message!</p> </div> <div class="msg msg-error-user" style="display: none;"> <p>Input fields contain invalid values, check the form again, please.</p> </div> <div class="msg msg-error-server" style="display: none;"> <p>Server encountered an error. If problem persists, contact website administrator, please.</p> </div> </div>
</form>

</fieldset></body></html>
