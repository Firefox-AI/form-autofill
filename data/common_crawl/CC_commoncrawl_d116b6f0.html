<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input id="payment_method" name="payment_method" type="hidden" value="paypal"/> <input id="payment_send" name="payment_send" type="hidden" value="1"/> <input id="instant_purchase" name="instant_purchase" type="hidden" value="1"/> <input id="member_id" name="member_id" type="hidden" value=""/> <input id="order_total" name="order_total" type="hidden" value="99"/> <input id="delivery_val" name="delivery_val" type="hidden" value="0.00"/> <input id="threshold" name="threshold" type="hidden" value="0"/> <div class="row form-group"> <div class="col"> <input class="form-control" data-moz-autofill-type="given-name" id="deposit_first_name" name="billing_address_firstname" placeholder="First name" type="text"/> </div> <div class="col"> <input class="form-control" data-moz-autofill-type="family-name" id="deposit_last_name" name="billing_address_lastname" placeholder="Last name" type="text"/> </div> </div> <div class="form-group has-feedback"> <input class="form-control" data-moz-autofill-type="email" id="deposit_email" name="email_address" placeholder="Enter email" required="" type="text"/> <span class="glyphicon glyphicon-remove form-control-feedback"></span> <span class="help-block hidden"><p>The Email field is required.</p></span> </div> <div class="form-group"> <input class="form-control" id="deposit_telephone" name="telephone" placeholder="Telephone" required="" type="text" value=""/> <span class="help-block hidden"><p>The Email field is required.</p></span> </div> <div class="form-group"> <input class="form-control" id="deposit_colour" name="extra[colour]" placeholder="Colour Preference" type="text" value=""/> </div> <div class="form-group"> <textarea class="form-control" id="deposit_notes" name="extra[notes]" placeholder="Notes" rows="3"></textarea> </div>
</form>

</fieldset></body></html>
