<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="enquiry_for" type="hidden" value="Enquiry For Contact Us"/> <input name="page_url" type="hidden" value="https://www.transformersinmumbai.com/muscat/"/> <div class="row"> <div class="col-lg-6 col-md-6 col-12"> <input name="name" placeholder="Your Name" required="" type="text"/> </div> <div class="col-lg-6 col-md-6 col-12"> <input data-moz-autofill-type="email" name="email" placeholder="E-mail" required="" type="email"/> </div> <div class="col-lg-6 col-md-6 col-12"> <input data-moz-autofill-type="tel" maxlength="15" minlength="10" name="mobile" onkeypress="return event.charCode &gt;= 48 &amp;&amp; event.charCode &lt;= 57 || event.charCode == 43 || event.charCode == 45 || event.charCode == 0" placeholder="Phone Number" required="" type="text"/> </div> <div class="col-lg-6 col-md-6 col-12"> <input data-moz-autofill-type="street-address" name="address" placeholder="Address" type="text"/> </div> <div class="col-lg-12"> <textarea cols="30" id="message" name="message" placeholder="Write Message" rows="10"></textarea> </div> <div class="col-lg-6 col-md-6 col-12"> <button class="main-btn" type="submit">Submit</button> </div> </div>
</form>

</fieldset></body></html>
