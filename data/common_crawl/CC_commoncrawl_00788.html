<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<textarea aria-required="true" cols="45" id="comment" name="comment" placeholder="Write your comment here..." rows="8"></textarea><div class="three_columns clearfix"><div class="column1"><div class="column_inner"><input data-moz-autofill-type="name" id="author" name="author" placeholder="Your full name" type="text" value=""/></div></div> <div class="column2"><div class="column_inner"><input data-moz-autofill-type="email" id="email" name="email" placeholder="E-mail address" type="text" value=""/></div></div> <div class="column3"><div class="column_inner"><input id="url" name="url" placeholder="Website" type="text" value=""/></div></div></div> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/><label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p> <p class="form-submit"><input class="submit" id="submit_comment" name="submit" type="submit" value="Submit"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="2216"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
