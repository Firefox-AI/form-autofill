<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="control-group"> <div class="form-group floating-label-form-group controls mb-0 pb-2"> <label>Name</label> <input class="form-control" data-moz-autofill-type="name" data-validation-required-message="Please enter your name." id="name" name="name" placeholder="Name" required="required" type="text"/> <p class="help-block text-danger"></p> </div> </div> <div class="control-group"> <div class="form-group floating-label-form-group controls mb-0 pb-2"> <label>Email Address</label> <input class="form-control" data-moz-autofill-type="email" data-validation-required-message="Please enter your email address." id="email" name="email" placeholder="Email Address" required="required" type="email"/> <p class="help-block text-danger"></p> </div> </div> <div class="control-group"> <div class="form-group floating-label-form-group controls mb-0 pb-2"> <label>Phone Number</label> <input class="form-control" data-moz-autofill-type="tel" data-validation-required-message="Please enter your phone number." id="phone" name="phone" placeholder="Phone Number" required="required" type="tel"/> <p class="help-block text-danger"></p> </div> </div> <div class="control-group"> <div class="form-group floating-label-form-group controls mb-0 pb-2"> <label>Message</label> <textarea class="form-control" data-validation-required-message="Please enter a message." id="message" name="message" placeholder="Message" required="required" rows="5"></textarea> <p class="help-block text-danger"></p> </div> </div> <br/> <div id="success"></div> <div class="form-group"><button class="btn btn-primary btn-xl" id="sendMessageButton" type="submit">Send</button></div>
</form>

</fieldset></body></html>
