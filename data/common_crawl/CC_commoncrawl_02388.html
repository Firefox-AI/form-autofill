<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Required fields are marked <span class="required">*</span></span></p><p class="comment-form-comment"><textarea aria-required="true" class="u-full-width" cols="45" id="comment" name="comment" placeholder="Message" rows="8"></textarea></p><div class="form-fields row"><span class="comment-form-author col-md-4"><input data-moz-autofill-type="given-name" id="author" name="author" placeholder="Name" size="30" type="text" value=""/></span><span class="comment-form-email col-md-4"><input data-moz-autofill-type="email" id="email" name="email" placeholder="Email Address" size="30" type="text" value=""/></span><span class="comment-form-url col-md-4"><input id="url" name="url" placeholder="Your website" size="30" type="text" value=""/></span></div><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/><label for="wp-comment-cookies-consent">I agree that spam comments wont´t be published</label></p><p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Post a Reply"/><input id="comment_post_ID" name="comment_post_ID" type="hidden"/></p>
</form>

</fieldset></body></html>
