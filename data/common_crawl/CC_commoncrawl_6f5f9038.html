<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<dl class="zend_form"> <dt id="userscore-label"><label class="required" for="userscore">Tu evaluación:</label></dt> <dd id="userscore-element"> <select id="userscore" name="userscore" onfocus="checkHelpScore();"> <option selected="selected" value="0">seleccionar...</option> <option value="1">1 - muy fiable</option> <option value="2">2</option> <option value="3">3</option> <option value="4">4</option> <option value="5">5 - neutral</option> <option value="6">6</option> <option value="7">7</option> <option value="8">8</option> <option value="9">9 - peligroso</option> </select></dd> <dt id="callerradio-label"><label class="required">Nombre del llamador / empresa:</label></dt> <dd id="callerradio-element"> <label><input class="form-check-input" id="callerradio-2" name="callerradio" onchange="checkCustomCallerName();" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Nombre del llamador / empresa:" type="radio" value="2"/>desconocido</label><br/><label><input class="form-check-input" id="callerradio-3" name="callerradio" onchange="checkCustomCallerName();" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Nombre del llamador / empresa:" type="radio" value="3"/>Ingresa el nombre de quién llama</label></dd> <dt id="caller-label"><label class="required" for="caller">Nombre del llamador / empresa:</label></dt> <dd id="caller-element"> <input class="form-control" id="caller" name="caller" onfocus='checkHelpCompany();loadReCaptcha("createRating");' placeholder="Nombre del llamador / empresa" type="text" value=""/></dd> <dt id="complain_type_id-label"><label class="optional" for="complain_type_id">Tipo de llamada / motivo:</label></dt> <dd id="complain_type_id-element"> <select class="form-select" id="complain_type_id" name="complain_type_id" onfocus='checkHelpCaller();loadReCaptcha("createRating");'> <option value="1">Desconocido</option> <option value="2">Número fiable</option> <option value="3">Concurso</option> <option value="4">Empresa de cobranza</option> <option value="5">Publicidad agresiva</option> <option value="6">Sondeo de opinión</option> <option value="7">Acoso telefónico</option> <option value="8">Estafa</option> <option value="9">Línea de televentas</option> <option value="10">Llamada de ping</option> <option value="11">SMS spam</option> </select></dd> <dt id="user-label"><label class="optional" for="user">Tu nombre / seudónimo:</label></dt> <dd id="user-element"> <input class="form-control" data-moz-autofill-type="nickname" id="user" name="user" onfocus='checkHelpName();loadReCaptcha("createRating");' placeholder="Tu nombre / seudónimo:" type="text" value=""/></dd> <dt id="comment-label"><label class="optional" for="comment">Comentario:</label></dt> <dd id="comment-element"> <textarea class="form-control" cols="38" id="comment" name="comment" onfocus='checkHelpComment();loadReCaptcha("createRating");' placeholder="Detalles de llamadas y llamantes, p. Cuándo, por qué, etc." rows="7"></textarea></dd> <dt id="email-label"><label class="optional" for="email">Correo electrónico:</label></dt> <dd id="email-element"> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" onfocus='loadReCaptcha("createRating");' placeholder="Correo electrónico:" type="text" value=""/></dd> <dt id="frequency-label"><label class="optional" for="frequency">Frecuencia de actualización:</label></dt> <dd id="frequency-element"> <select class="form-select" id="frequency" name="frequency"> <option selected="selected" value="0">Con cada nuevo comentario</option> <option value="86400">Una vez al día</option> <option value="604800">Una vez a la semana</option> </select></dd> <dt id="notify-label"><label class="optional" for="notify">Notificar:</label></dt> <dd id="notify-element"> <input name="notify" type="hidden" value="0"/><input class="form-check-input" id="notify" name="notify" onclick="toggleNotifyElements(this);" type="checkbox" value="1"/> <p class="description">Quiero recibir más información acerca de éste número.</p></dd> <dt id="captcha-label"><label class="required" for="captcha">Please solve Captcha:</label></dt> <dd id="captcha-element"> <div class="g-recaptcha" data-sitekey="6LeLLyYTAAAAAN_VSdz6K_lQTI9YfXlZXnaNs4A0" data-theme="light" data-type="image"></div></dd> <dt id="submit-label"> </dt><dd id="submit-element"> <input class="btn btn-success btn-maxwidth" id="submit" name="submit" onclick="if (typeof submitted == 'undefined') {document.body.classList.add(&quot;loading&quot;); return submitted = true;} else return !submitted;" type="submit" value="Evaluar número"/></dd></dl>
</form>

</fieldset></body></html>
