<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="create_customer"/><input name="utf8" type="hidden" value="✓"/> <div> <label class="label-required" for="PopupCustomerEmail">FIRST NAME</label> <input data-moz-autofill-type="given-name" id="PopupFirstName" name="customer[first_name]" placeholder="Please enter your first name" required="required" type="text"/> </div> <div> <label class="label-required" for="PopupCustomerEmail">LAST NAME</label> <input data-moz-autofill-type="family-name" id="PopupLastName" name="customer[last_name]" placeholder="Please enter your last name" required="required" type="text"/> </div> <div> <label class="label-required" for="PopupCustomerEmail">{PHONE NUMBER}</label> <input data-moz-autofill-type="tel" id="PopupPhoneNumber" name="customer[phone_number]" placeholder="Please enter your phone numer" required="required" type="text"/> </div> <div> <label class="label-required" for="PopupCustomerEmail">EMAIL</label> <input autocapitalize="off" autocomplete="off" class="" data-moz-autofill-type="email" id="PopupEmail" name="customer[email]" placeholder="Please enter your email address" required="required" spellcheck="false" type="email" value=""/> </div> <div> <label class="label-required" for="PopupCustomerPassword">PASSWORD</label> <input autocomplete="on" class="" id="PopupCreatePassword" name="customer[password]" placeholder="••••••" required="required" type="password"/> </div> <input class="popup-account__btn-signup btn btn--full mb-20" type="submit" value="Sign up now!"/> <div class="mb-15"> <span class="popup-account__return-to-store btn-link" data-js-popup-close="">RETURN TO STORE</span> </div>
</form>

</fieldset></body></html>
