<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="contact_form"/> <div class="form-group"> <label for="name">Full Name:</label> <input data-moz-autofill-type="name" id="name" name="name" pattern="[a-zA-Z\s]+" required="" title="Please enter a valid name." type="text"/> <small class="error-message" style="display: none;">Please enter a valid name.</small> </div> <div class="form-group"> <label for="phone">Phone Number:</label> <input data-moz-autofill-type="tel" id="phone" name="phone" pattern="^[+\d\-\(\)\s]*$" title="Please enter a valid phone number." type="tel"/> <small class="error-message" style="display: none;">Please enter a phone number.</small> </div> <div class="form-group"> <label for="email">Email Address:</label> <input data-moz-autofill-type="email" id="email" name="email" required="" type="email"/> <small class="error-message" style="display: none;">Please enter a valid email address.</small> </div> <div class="form-group"> <label for="message">Immigration Question:</label> <textarea id="message" maxlength="1000" minlength="10" name="message" required="" title="Please enter a message between 10 and 1000 characters."></textarea> <small class="error-message" style="display: none;">Please enter a message between 10 and 1000 characters without any links.</small> </div> <button class="btn-submit" type="submit">Submit</button>
</form>

</fieldset></body></html>
