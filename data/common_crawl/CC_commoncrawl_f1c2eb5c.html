<form>
<fieldset> <legend>Datos Personales</legend> <table border="0" cellpadding="2"> <tr> <td> <label class="obligatorio" for="nombreUsuarioNuevo">Nombre*:</label> </td> <td> <input data-moz-autofill-type="given-name" id="nombreUsuarioNuevo" maxlength="90" name="nombre" size="30" type="text" value=""/> </td> <td> </td> <td> </td> </tr> <tr> <td> <label class="obligatorio" for="apellidosUsuarioNuevo">Apellidos*:</label> </td> <td> <input data-moz-autofill-type="family-name" id="apellidosUsuarioNuevo" maxlength="90" name="apellidos" size="30" type="text" value=""/> </td> <td> </td> <td> </td> </tr> <tr> <td> <label for="nifUsuarioNuevo">NIF del usuario:</label> </td> <td> <input data-moz-autofill-type="id-number" id="nifUsuarioNuevo" maxlength="9" name="nif" size="30" type="text" value=""/> </td> <td> </td> <td> </td> </tr> <tr> <td> <label for="telefonoUsuarioNuevo">Teléfono:</label> </td> <td> <input data-moz-autofill-type="tel" id="telefonoUsuarioNuevo" maxlength="9" name="telefono" size="30" type="text" value=""/> </td> <td> <label for="faxUsuarioNuevo">Fax:</label> </td> <td> <input id="faxUsuarioNuevo" maxlength="9" name="fax" type="text" value=""/> </td> </tr> <tr> <td> <label class="obligatorio" for="correoUsuarioNuevo">Correo electrónico*:</label> </td> <td colspan="3"> <input data-moz-autofill-type="email" id="correoUsuarioNuevo" maxlength="50" name="email" size="30" type="text" value=""/> </td> </tr> <tr> <td> <label for="direccionUsuarioNuevo">Dirección:</label> </td> <td colspan="3"> <input data-moz-autofill-type="street-address" id="direccionUsuarioNuevo" maxlength="90" name="direccion" size="30" type="text" value=""/> </td> </tr> <tr> <td> <label for="localidadUsuarioNuevo">Localidad:</label> </td> <td> <input data-moz-autofill-type="address-level2" id="localidadUsuarioNuevo" maxlength="90" name="municipio" size="30" type="text" value=""/> </td> <td> <label for="provinciaUsuarioNuevo">Provincia:</label> </td> <td> <select data-moz-autofill-type="address-leve lue="52">MELILLA</option></select> </td> </tr> <tr> <td> <label for="codigoPostalUsuarioNuevo">Código postal:</label> </td> <td> <input data-moz-autofill-type="postal-code" id="codigoPostalUsuarioNuevo" maxlength="5" name="codpostal" size="30" type="text" value=""/> </td> <td> </td> <td> </td> </tr> </table> </fieldset> <fieldset> <legend>Datos de empresa</legend> <table border="0" cellpadding="2"> <tr> <td> <label class="obligatorio" for="razonUsuarioNuevo">Razon Social*:</label> </td> <td> <input data-moz-autofill-type="organization" id="razonUsuarioNuevo" maxlength="55" name="razonsocial" size="30" type="text" value=""/> </td> </tr> <tr> <td> <label for="relacionUsuarioNuevo">Relación con la empresa:</label> </td> <td> <input id="relacionUsuarioNuevo" maxlength="180" name="relempresa" size="30" type="text" value=""/> </td> </tr> </table> </fieldset> <fieldset> <legend>Datos de registro</legend> <table border="0" cellpadding="2"> <tr> <td> <label class="obligatorio" for="nombreusuarioUsuarioNuevo">Usuario*:</label> </td> <td> <input id="nombreusuarioUsuarioNuevo" maxlength="35" name="usuario" size="20" type="text" value=""/> [Debe de tener al menos 6 caracteres] </td> </tr> <tr> <td> <label class="obligatorio" for="contrasenaUsuarioNuevo">Contraseña*:</label> </td> <td> <input id="contrasenaUsuarioNuevo" maxlength="15" name="password" size="20" type="password" value=""/> [Debe de tener al menos 6 caracteres] </td> </tr> <tr> <td> <label class="obligatorio" for="contrasena2UsuarioNuevo">Confirmar Contraseña*:</label> </td> <td> <input id="contrasena2UsuarioNuevo" maxlength="15" name="passwordConfirmada" size="20" type="password" value=""/> </td> </tr> <tr> <td> <label class="obligatorio" for="ordenregistroUsuarioNuevo">Número de orden*:</label> </td> <td> <input id="ordenregistroUsuarioNuevo" maxlength="11" name="numOrden" size="20" type="text" value=""/> </td> </tr> <tr> <td> <label class="obligatorio" for="codigoregistroUsuarioNuevo">Dígito Control (DC)*:</label>
