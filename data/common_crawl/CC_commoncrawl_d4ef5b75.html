<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<dl> <dt>会社名<span>Company Name</span></dt> <dd><input id="company" name="会社名" type="text" value=""/></dd> <dt>名前<span>Your Name</span></dt> <dd class="required"><input id="name_1" name="名前" type="text" value=""/> <input id="name_2" name="name_2" type="text" value=""/></dd> <dt>ふりがな<span>Name Reading</span></dt> <dd class="required"><input id="read_1" name="ふりがな" type="text" value=""/> <input id="read_2" name="read_2" type="text" value=""/></dd> <dt>メールアドレス<span>Mail Address</span></dt> <dd class="required"><input data-moz-autofill-type="email" id="mail_address" name="メールアドレス" type="email" value=""/></dd> <dt>電話番号<span>Phone Number</span></dt> <dd><input data-moz-autofill-type="tel" id="phone" name="電話番号" type="tel" value=""/></dd> <dt>お問い合わせの内容<span>Mail Contents</span></dt> <dd class="required"><textarea cols="40" id="mail_contents" name="お問い合わせ内容" rows="5"></textarea></dd> </dl> <div id="Btn_box"><input id="check" name="個人情報同意" type="checkbox"/><label for="check"><a href="/privacy/" target="_blank">利用規約</a>に同意します</label></div> <p><input id="submit" type="submit" value="送信"/></p>
</form>

</fieldset></body></html>
