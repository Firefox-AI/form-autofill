<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="modal-header"> <button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">×</span></button> <h4 class="modal-title" id="myModalLabel">Email this article to a friend</h4> </div> <div class="modal-body"> <p>Please enter your friends/colleagues name &amp; email address below. (Company name is optional)</p> <p> </p> <div class="ErrorMessage"></div> <p> </p> <div class="form-group"> <label class="col-sm-4 control-label" for="FirstName">First name<b>*</b></label> <div class="col-sm-8"><input class="form-control" data-moz-autofill-type="given-name" id="FirstName" name="FirstName" size="20" tabindex="1" type="text" value=""/></div> </div> <div class="form-group"> <label class="col-sm-4 control-label" for="LastName">Last name<b>*</b></label> <div class="col-sm-8"><input class="form-control" data-moz-autofill-type="family-name" id="LastName" name="LastName" size="20" tabindex="2" type="text" value=""/></div> </div> <div class="form-group"> <label class="col-sm-4 control-label" for="Email">Email address<b>*</b></label> <div class="col-sm-8"><input class="form-control" data-moz-autofill-type="email" id="Email" name="Email" size="20" tabindex="3" type="text" value=""/></div> </div> <div class="form-group"> <label class="col-sm-4 control-label" for="Company">Company</label> <div class="col-sm-8"><input class="form-control" data-moz-autofill-type="organization" id="Company" name="Company" size="20" tabindex="4" type="text" value=""/></div> </div> <div class="clear"></div> <div class="row"> <div class="col-sm-10 col-sm-offset-2"><small><b>*</b> required</small></div> </div> <div class="clear"></div> </div> <div class="modal-footer"> <button class="btn btn-primary" type="submit">Send</button> </div>
</form>

</fieldset></body></html>
