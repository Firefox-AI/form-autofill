<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<label for="ask_name" id="ask_name-lbl">Il tuo nome</label> <input class="inputbox required" data-moz-autofill-type="given-name" id="ask_name" name="ask_name" type="text" value=""/> <label for="ask_email" id="ask_email-lbl">La tua email</label> <input class="inputbox required validate-email" data-moz-autofill-type="email" id="ask_email" name="ask_email" type="text" value=""/> <label for="ask_message" id="ask_message-lbl">Messaggio</label> <textarea class="inputbox required" cols="55" id="ask_message" name="ask_message" rows="5"></textarea> <label for="ask_mailcopia" id="ask_mailcopia-lbl">Invia una copia al mio indirizzo :</label> <select class="inputbox required" id="ask_mailcopia" name="ask_mailcopia"> <option value="no">No</option> <option value="si">Si</option> </select> <br/> <div style="clear:both"></div> <button class="button validate" id="submit_b" type="submit">Invia</button> <input id="ask_status" name="ask_status" type="hidden" value="0"/> <input id="item_id" name="item_id" type="hidden" value="2460"/> <input id="cid" name="cid" type="hidden" value="70"/> <input name="option" type="hidden" value="com_djclassifieds"/> <input name="view" type="hidden" value="item"/> <input name="task" type="hidden" value="ask"/> <div style="clear:both"></div>
</form>

</fieldset></body></html>
