<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="fields"> <div class="label"> Hallo! Mijn naam is </div> <input class="input" data-moz-autofill-type="given-name" name="name" placeholder="&lt;naam&gt;" type="text"/> <div class="label"> en ik wil graag in contact komen voor: </div> <select class="input"> <option>Maak een keuze</option> <option>Een spraakmakende campagne die mijn business laat groeien</option> <option>Een merkactivatie waarmee ik de aandacht ga verdienen</option> <option>Een gezellig kopje koffie</option> </select> <div class="label"> Je kunt mij bereiken via </div> <input class="input" data-moz-autofill-type="email" name="email" placeholder="&lt;e-mailadres&gt;" type="email"/> </div> <input class="submit" onclick="return form_submit();" type="submit" value="Verzend"/>
</form>

</fieldset></body></html>
