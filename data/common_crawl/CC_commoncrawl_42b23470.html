<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="orgid" type="hidden" value=""/> <div class="form-group"> <label class="required" for="fname">Voornaam</label> <input aria-invalid="true" autocomplete="given-name" class="form-control user-error" data-moz-autofill-type="given-name" id="fname" name="fname" required="" type="text"/> </div> <div class="form-group"> <label class="required" for="lname">Achternaam</label> <input autocomplete="family-name" class="form-control" data-moz-autofill-type="family-name" id="lname" name="lname" required="" type="text"/> </div> <div class="form-group"> <label class="required" for="email">E‑mail</label> <input aria-invalid="true" autocomplete="email" class="form-control user-error" data-moz-autofill-type="email" id="email" name="email" required="" type="email"/> </div> <div class="form-group row mt2"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required" for="age" style="margin-top: 0.4em;">Leeftijd</label> <div class="col-sm-9 col-md-8 col-lg-9"> <input class="form-control" id="age" max="140" min="18" name="age" required="" type="number"/> </div> </div> <div class="form-group row"> <label class="col-12 col-sm-3 control-label required" style="margin-top: 0.4em;">Geslacht</label> <div class="col-sm-9"> <div class="row"> <div class="col-6 gender-half-left"> <label class="gender-checkbox"> <input name="gender" required="" type="radio" value="male"/> Man </label> </div> <div class="col-6 gender-half-right"> <label class="gender-checkbox"> <input name="gender" required="" type="radio" value="female"/> Vrouw </label> </div> </div> </div> </div> <div class="form-group row" style="position: relative;"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required" for="country" style="margin-top: 0.4em;">Land</label> <div class="col-sm-9 col-md-8 col-lg-9"> <select class="form-control" data-moz-autofill-type="country" id="country" name="country" required=""> </select> <input class="other-input form-control" data-placement="bottom" id="country_other_input" name="country-other-input" placeholder="Anders (specificeer)" title="Dit veld moet ingevuld worden" type="text"/> <input id="countryname" name="countryname" type="hidden" value="United States"/> </div> </div> <div class="form-group row mt2"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required" for="zipcode">Postcode</label> <div class="col-sm-9 col-md-8 col-lg-9 zipcode-input"> <input autocomplete="postal-code" class="form-control" data-moz-autofill-type="postal-code" id="zipcode" name="zipcode" required="" type="text"/> </div> </div> <div class="form-group row mt2"> <label class="col-sm-3 col-md-4 col-lg-3 control-label" for="phone"> Telefoon <div class="oca-form--phone-hint" data-placement="top" data-toggle="tooltip" title="Geef je telefoonnummer als je liever wilt dat er telefonisch contact met je wordt opgenomen.">?</div> </label> <div class="col-sm-9 col-md-8 col-lg-9 phone-input"> <input autocomplete="phone" class="form-control" data-moz-autofill-type="tel" id="phone" name="phone" type="text"/> </div> </div> <div class="error_message_holder"></div> <div class="hidden-xs"> <button class="btn btn-lg btn-primary btn-oca-submit btn-squiggly" type="submit"> BEGIN JE TEST </button> </div>
</form>

</fieldset></body></html>
