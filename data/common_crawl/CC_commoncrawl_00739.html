<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<h3>Create Account</h3> <hr/> <div class="row"> <div class="col-sm-8"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="given-name" id="first_name" name="first_name" placeholder="First Name" tabindex="1" type="text"/> </div> </div> <div class="col-sm-8"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="family-name" id="last_name" name="last_name" placeholder="Last Name" tabindex="2" type="text"/> </div> </div> </div> <div class="form-group"> <input class="form-control" data-moz-autofill-type="nickname" id="display_name" name="display_name" placeholder="Display Name" tabindex="3" type="text"/> </div> <div class="form-group"> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" placeholder="Email Address" tabindex="4" type="email"/> </div> <div class="row"> <div class="col-sm-8"> <div class="form-group"> <input class="form-control" id="password" name="password" placeholder="Password" tabindex="5" type="password"/> </div> </div> <div class="col-sm-8"> <div class="form-group"> <input class="form-control" id="password_confirmation" name="password_confirmation" placeholder="Confirm Password" tabindex="6" type="password"/> </div> </div> </div> <hr/> <div class="row"> <div class="col-sm-16"> <input class="btn btn-danger btn-block btn-lg" tabindex="7" type="submit" value="Register"/> </div> </div>
</form>

</fieldset></body></html>
