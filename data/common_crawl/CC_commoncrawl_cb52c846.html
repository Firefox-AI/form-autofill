<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="enquiry_for" type="hidden" value="Enquiry For Contact Us"/> <input name="page_url" type="hidden" value="https://www.herballivermedicine.com/dindigul/index.html"/> <div class="row"> <div class="form-group col-lg-3"> <label for="exampleInputEmail1">Name</label> <input class="form-control" data-moz-autofill-type="name" name="name" placeholder="Name" required="" type="text"/> </div> <div class="form-group col-lg-3"> <label for="exampleInputPassword1">Email</label> <input class="form-control" data-moz-autofill-type="email" name="email" placeholder="Email" required="" type="email"/> </div> <div class="form-group col-lg-3"> <label for="exampleInputPassword1">Phone</label> <input class="form-control" data-moz-autofill-type="tel" name="mobile" onkeypress="return event.charCode &gt;= 48 &amp;&amp; event.charCode &lt;= 57 || event.charCode == 43 || event.charCode == 45 || event.charCode == 0" placeholder="Phone" required="" type="text"/> </div> <div class="form-group col-lg-3"> <label for="exampleInputPassword1">Address</label> <input class="form-control" data-moz-autofill-type="street-address" name="address" placeholder="Address" type="text"/> </div> <div class="form-group col-lg-3"> <label for="exampleInputPassword1">Message</label> <i class="fas fa-comment-dots"></i> <textarea class="form-control" name="message" placeholder="Message Here" rows="3"></textarea> </div> <div class="form-group col-lg-3"> <button class="btn btn-default" name="submit" type="submit" value="submit">Send </button> </div> </div>
</form>

</fieldset></body></html>
