<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div data-locale-reversible="data-locale-reversible"> <div class="row"> <div class="field marginTop10"> <input autocomplete="off" class="input empty" data-moz-autofill-type="street-address" data-tid="form.address_placeholder" id="address" placeholder="185 Berry St" required="" type="text"/> <label data-tid="form.address_label" for="address">Address</label> <div class="baseline"></div> </div> </div> <div class="row" data-locale-reversible="data-locale-reversible"> <div class="field half-width"> <input autocomplete="off" class="input empty" data-moz-autofill-type="address-level2" data-tid="form.city_placeholder" id="city" placeholder="San Francisco" required="" type="text"/> <label data-tid="form.city_label" for="city">City</label> <div class="baseline"></div> </div> <div class="field quarter-width"> <input autocomplete="off" class="input empty" data-moz-autofill-type="country" data-tid="form.country_placeholder" id="country" placeholder="USA" required="" type="text"/> <label data-tid="form.country_label" for="country">Country</label> <div class="baseline"></div> </div> <div class="field quarter-width"> <input autocomplete="off" class="input empty" data-moz-autofill-type="postal-code" data-tid="form.postal_code_placeholder" id="zip" placeholder="94107" required="" type="text"/> <label data-tid="form.postal_code_label" for="zip">ZIP</label> <div class="baseline"></div> </div> </div> </div> <div class="row"> <div class="field"> <div class="input empty" id="card-number"></div> <label data-tid="form.card_number_label" for="card-number">Card number</label> <div class="baseline"></div> </div> </div> <div class="row"> <div class="field half-width"> <div class="input empty" id="card-expiry"></div> <label data-tid="form.card_expiry_label" for="card-expiry">Expiration</label> <div class="baseline"></div> </div> <div class="field half-width"> <div class="input empty" id="card-cvc"></div> <label data-tid="form.card_cvc_label" for="card-cvc">CVC</label> <div class="baseline"></div> </div> </div> <button class="button-primary" data-tid="form.pay_button" type="submit">Pay <span id="stripePrice"></span></button> <div class="error text-center" role="alert"> <span class="message"></span> </div>
</form>

</fieldset></body></html>
