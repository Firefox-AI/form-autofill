<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div> <div class="content-wrapper wrapper"> <label class="required" for="contact-content"><span class="required" title="To pole jest wymagane">*</span> Message</label> <textarea cols="40" id="contact-content" name="content" rows="2"></textarea></div> <div class="eaddress-wrapper wrapper"> <label class="required" for="e-address"><span class="required" title="To pole jest wymagane">*</span> e-mail</label> <input data-moz-autofill-type="email" id="e-address" name="eaddress" title="Podaj e-mail, żebyśmy mogli odpowiedzieć" type="text" value=""/></div> <div class="tel-wrapper wrapper"> <label class="required" for="tel"><span class="required" title="To pole jest wymagane">*</span> Phone number</label> <input data-moz-autofill-type="tel" id="tel" name="tel" title="Ułatwi nam kontakt" type="text" value=""/></div> <div class="plz-wrapper wrapper"> <label class="required" for="plz"><span class="required" title="To pole jest wymagane">*</span> Postal code</label> <input data-moz-autofill-type="postal-code" id="plz" name="plz" title="Kod pocztowy pomoże w wycenie dostawy" type="text" value=""/></div> <div class="contactsubmit-wrapper wrapper"> <input class="btn-default btn-danger" id="contact-submit" name="contactsubmit" style="width: 50%" type="submit" value="Send message"/></div></div>
</form>

</fieldset></body></html>
