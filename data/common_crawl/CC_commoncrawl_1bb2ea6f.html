<div class="form-inner"> <div class="content"><div class="lp-form-header lp-centered"> <h2>Request an Appointment</h2> <p>Please use the Additional Comments box for any further details or questions.</p> </div></div> <fieldset class="sb-fieldset sb-fieldset-0"> <p class="sb-formfield sb-formfield-0 sb-formfield--location form-required"><label for="scheduler_form_location">Location</label> <select id="scheduler_form_location" name="location" placeholder="Choose a location"> <option value="311 Steven B Tanger Blvd, Commerce GA 30529">311 Steven B Tanger Blvd, Commerce GA 30529</option> <option value="552 S. Enota Dr NE, Gainesville GA 30501">552 S. Enota Dr NE, Gainesville GA 30501</option> <option value="283 Big A Rd, Toccoa GA 30577">283 Big A Rd, Toccoa GA 30577</option> </select></p> <p class="sb-formfield sb-formfield-1 sb-formfield--first-name form-required"><label for="scheduler_form_first-name">First Name</label> <input data-moz-autofill-type="given-name" id="scheduler_form_first-name" maxlength="255" name="first-name" placeholder="First Name" type="text"/></p> <p class="sb-formfield sb-formfield-2 sb-formfield--last-name form-required"><label for="scheduler_form_last-name">Last Name</label> <input data-moz-autofill-type="family-name" id="scheduler_form_last-name" maxlength="255" name="last-name" placeholder="Last Name" type="text"/></p> <p class="sb-formfield sb-formfield-3 sb-formfield--phone form-required"><label for="scheduler_form_phone">Phone Number</label> <input data-moz-autofill-type="tel" id="scheduler_form_phone" name="phone" placeholder="Phone Number" type="text"/></p> <p class="sb-formfield sb-formfield-4 sb-formfield--email form-required"><label for="scheduler_form_email">Email</label> <input data-moz-autofill-type="email" id="scheduler_form_email" name="email" placeholder="Email" type="email"/></p> <p class="sb-formfield sb-formfield-5 sb-formfield--zippostal-code form-required"><label for="scheduler_form_zippostal-code">Zip/Postal Code</label> <input data-moz-autofill-type="postal-code" id="scheduler_form_zippostal-code" name="zippostal-code" placeholder="Zip/Postal Code" type="text"/></p> </fieldset> <fieldset class="sb-fieldset sb-fieldset-1 sb-fieldset--first-appointment"><legend>First Appointment Choice</legend> <p class="sb-formfield sb-formfield-6 sb-formfield--select-a-date-1"><label for="scheduler_form_select-a-date-1">Select a Date 1</label> <input id="scheduler_form_select-a-date-1" min="2024-11-02" name="select-a-date-1" placeholder="Select a date" type="date" value="2024-11-02"/></p> <p class="sb-formfield sb-formfield-7 sb-formfield--select-a-time-1"><label for="scheduler_form_select-a-time-1">Select a Time 1</label> <select id="scheduler_form_select-a-time-1" name="select-a-time-1"> <option selected="selected" value="">Select a time</option> <option value="Morning">Morning</option> <option value="Afternoon">Afternoon</option> </select></p> </fieldset> <fieldset class="sb-fieldset sb-fieldset-2 sb-fieldset--second-appointment"><legend>Second Appointment Choice</legend> <p class="sb-formfield sb-formfield-8 sb-formfield--select-a-date-2"><label for="scheduler_form_select-a-date-2">Select a Date 2</label> <input id="scheduler_form_select-a-date-2" min="2024-11-02" name="select-a-date-2" placeholder="Select a date" type="date" value="2024-11-02"/></p> <p class="sb-formfield sb-formfield-9 sb-formfield--select-a-time-2"><label for="scheduler_form_select-a-time-2">Select a Time 2</label> <select id="scheduler_form_select-a-time-2" name="select-a-time-2"> <option selected="selected" value="">Select a time</option> <option value="Morning">Morning</option> <option value="Afternoon">Afternoon</option> </select></p> </fieldset> <fieldset class="sb-fieldset sb-fieldset-3 sb-fieldset--additional-comments"><legend>Additional Comments</legend> <p class="sb-formfield sb-formfield-10 sb-formfield--message form-required"><label for="scheduler_form_message">Additional Comments</label> <textarea cols="40" id="scheduler_form_message" name="message" placeholder="Please let us know which services you are inquiring about." rows="4"> </textarea><input id="id_form_id" name="form_id" type="hidden" value="83208"/><input id="id_site_id" name="site_id" type="hidden" value="1954221"/><input id="id_previous_form_id" name="previous_form_id" type="hidden"/></p> </fieldset> <p class="submit"> <input class="button" type="submit" value="Submit"/> </p> </div>
