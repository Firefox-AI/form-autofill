<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Tu dirección de correo electrónico no será publicada.</span> <span class="required-field-message">Los campos obligatorios están marcados con <span class="required">*</span></span></p><p class="comment-form-comment comment-form-float-label"><textarea aria-required="true" cols="45" id="comment" maxlength="65525" name="comment" placeholder="Deja un comentario..." required="required" rows="8"></textarea><label class="float-label" for="comment">Comentario <span class="required">*</span></label></p><div class="comment-input-wrap has-url-field"><p class="comment-form-author"><input aria-label="Nombre" data-moz-autofill-type="given-name" id="author" maxlength="245" name="author" placeholder="Juan Nadie" size="30" type="text" value=""/><label class="float-label" for="author">Nombre</label></p> <p class="comment-form-email"><input aria-describedby="email-notes" aria-label="Correo electrónico" data-moz-autofill-type="email" id="email" maxlength="100" name="email" placeholder="juan@ejemplo.com" size="30" type="email" value=""/><label class="float-label" for="email">Correo electrónico</label></p> <p class="comment-form-url"><input aria-label="Web" id="url" maxlength="200" name="url" placeholder="https://www.ejemplo.com" size="30" type="url" value=""/><label class="float-label" for="url">Web</label></p></div> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Guarda mi nombre, correo electrónico y web en este navegador para la próxima vez que comente.</label></p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Publicar el comentario"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="1570"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
