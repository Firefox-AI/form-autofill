<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-group"> <label class="form-label" for="fname">Name <span class="text-error">*</span></label> <input autofocus="" class="form-input" id="fname" maxlength="50" name="fname" pattern=".*\S+.*" placeholder="Name" required="" type="text" value=""/> </div> <div class="form-group"> <label class="form-label" for="email1">Email <span class="text-error">*</span></label> <input class="form-input" data-moz-autofill-type="email" id="email1" name="email" placeholder="Email" required="" type="email" value=""/> </div> <div id="normalLogin"> <div class="form-group" style="margin-bottom: 0;"> <label class="form-label" for="password1">Create Password <span class="text-error">*</span></label> </div> <div class="form-group"> <div class="input-group"> <input class="form-input" id="password1" name="password" placeholder="Create Password" required="" type="password" value=""/> <button class="btn input-group-btn showPasswordBtn" title="Show" type="button">Show</button> </div> <p class="form-input-hint" style="display: none;"> Must contain atleast 1 uppercase, 1 lowercase and 1 numeric characters. Minimum 8 characters. </p> </div> </div> <div class="form-group age"> <label class="form-label" for="age1"></label> <input autocomplete="off" class="form-input" id="age1" name="age" placeholder="" tabindex="-1" type="text"/> </div> <input class="form-input" id="loginType" name="type" type="hidden"/> <input class="form-input" id="phoneVerified" name="phoneVerified" type="hidden"/> <input class="form-input" id="emailVerified" name="emailVerified" type="hidden"/> <input class="form-input" id="ipInfo" name="ipInfo" type="hidden"/> <input class="form-input" id="signupParams" name="signupParams" type="hidden"/> <div class="form-group"> <label class="form-label" for="phone">Mobile <span class="text-error">*</span></label> <input class="form-input" data-moz-autofill-type="tel-local" id="phone" name="phone" placeholder="Mobile" required="" type="number" value=""/> </div> <div class="form-group"> <label class="form-label" for="csex">Sex </label> <select class="form-select" data-moz-autofill-type="sex" data-value="" id="csex" name="csex"> <option value="">Choose</option> <option value="Male">Male</option> <option value="Female">Female</option> <option value="Transgender">Transgender</option> </select> </div> <div class="form-group"> <label class="form-label" for="cage">Age <span class="text-error">*</span></label> <input class="form-input" id="cage" name="cage" placeholder="Age" required="" type="number" value=""/> </div> <div class="form-group"> <label class="form-label" for="cpincode">Pin Code /Zip code <span class="text-error">*</span></label> <input class="form-input" data-moz-autofill-type="postal-code" id="cpincode" name="cpincode" pattern=".*\S+.*" placeholder="Pin Code /Zip code" required="" type="text" value=""/> </div> <div class="form-group"> <label class="form-label" for="ccountrycode">Country Code <span class="text-error">*</span></label> <input class="form-input" id="ccountrycode" name="ccountrycode" placeholder="Country Code" required="" type="number" value=""/> </div> <br/> <div class="form-group text-left"> <label class="form-checkbox"> <input name="agreeTC" required="" type="checkbox"/> <i class="form-icon"></i> By signing up, I agree to the<a href="/termsofuse" target="_blank"> Terms of Use </a> and <a href="/privacypolicy" target="_blank"> Privacy Policy</a>. </label> </div> <div class="clearfix pt-2" id="normalLoginBtn"> <button class="btn btn-primary float-right btn-lg" id="newSignupBtn" title="Create New Account" type="submit">Create New Account</button> <button class="btn btn-lg" id="alreadyUserBtn" title="Log Into Existing Account?" type="button">Log Into Existing Account?</button> </div> <div class="text-center" id="socialLogin" style="display:none"> <button class="btn btn-primary btn-lg" id="newSignupBtn" title="Get started" type="submit">Get started</button> </div>
</form>

</fieldset></body></html>
