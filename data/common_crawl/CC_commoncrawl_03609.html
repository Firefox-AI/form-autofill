<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Your email address will not be published.</span> <span class="required-field-message">Required fields are marked <span class="required">*</span></span></p><div class="comment-form-rating"><label for="rating">Your rating of this product</label><select aria-required="true" id="rating" name="rating" required=""> <option value="">Rate…</option> <option value="5">Perfect</option> <option value="4">Good</option> <option value="3">Average</option> <option value="2">Not that bad</option> <option value="1">Very poor</option> </select></div><p class="comment-form-comment"><textarea aria-required="true" cols="45" id="comment" name="comment" placeholder="Write your review here..." required="" rows="8"></textarea></p><p class="comment-form-author"><input aria-required="true" data-moz-autofill-type="name" id="author" name="author" placeholder="Your Name" required="" size="30" type="text" value=""/></p> <p class="comment-form-email"><input aria-required="true" data-moz-autofill-type="email" id="email" name="email" placeholder="Your Email" required="" size="30" type="email" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Submit Review"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="7895"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
