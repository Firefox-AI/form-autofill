<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="destinationCountryCodeA3" type="hidden" value="{{destinationCountryCodeA3}}"/> <input name="didType" type="hidden" value="{{didType}}"/> <input name="address_id" type="hidden" value="{{id}}"/> {{^noNamed}} <div> <div class="form-group"> <label for="companyName">{:company}</label> <input class="form-control" data-moz-autofill-type="organization" id="companyName" name="companyName" placeholder="{:company}" type="text" value="{{company}}"/> </div> </div> {{/noNamed}} <div class="form-row-flex" id="emergency_adress_only"> <div class="form-group-flex"> <label>{:existing_address}</label> <rg-select data-height="100" data-placeholder="- - -" id="list_address_by_team" search=""></rg-select> </div> </div> <div class="form-row-flex"> <div class="form-group-flex"> <label for="buildingNumber">{:address}</label> <input class="form-control" data-coltadr="premisesNo" id="buildingNumber" name="buildingNumber" placeholder="{:address_streetnumber}" type="text" value="{{streetnumber}}"/> </div> <div class="form-group-flex extra-field hidden" id="streetType-group"> <rg-select data-coltadr="streetType" data-placeholder="- - -" id="streetType" search=""></rg-select> </div> <div class="form-group-flex extra-field hidden" id="streetTypeInput-group"> <label>{:streettype}</label> <input class="form-control" data-coltadr="streetType" id="streetTypeInput" name="streetTypeInput" placeholder="{:streettype}" type="text" value="{{streettype}}"/> </div> <div class="form-group-flex"> <input class="form-control" data-coltadr="streetName" id="streetName" name="streetName" placeholder="{:address_streetname}" type="text" value="{{streetname}}"/> </div> </div> <div class="form-group"> <input class="form-control" data-optional="1" id="complementAddress" name="complementAddress" placeholder="{:additional_address}" type="text" value="{{complementaddress}}"/> </div> <div class="form-row-flex"> <div class="form-group-flex"> <label for="city">{:city}</label> <input class="form-control" data-coltadr="city" data-moz-autofill-type="address-level2" id="city" name="city" placeholder="{:city}" type="text" value="{{city}}"/> </div> <div class="form-group-flex"> <input class="form-control" data-coltadr="postalCode" id="zipCode" name="zipCode" placeholder="{:zipcode}" type="text" value="{{zip}}"/> </div> </div> <div class="form-row-flex"> <div class="form-group-flex disabled" id="country_address_box"> <label>{:country}</label> <rg-select data-height="100" data-placeholder="- - -" id="address_country_code" search=""></rg-select> </div> <div class="form-group-flex extra-field hidden" id="province-group"> <rg-select data-coltadr="province" data-height="100" data-placeholder="- - -" id="province" search=""></rg-select> </div> </div> <div class="form-row-flex"> <div class="form-group-flex extra-field hidden" id="vatNumber-group"> <label>{:billing}</label> <input class="form-control" data-optional="{{#isOptionalVat}}1{{/isOptionalVat}}" id="vatNumber" name="vatNumber" placeholder="{:vatnumber}" type="text" value="{{vatnumber}}"/> </div> <div class="form-group-flex extra-field hidden" id="nifNumber-group"> <input class="form-control" id="nifNumber" name="nifNumber" placeholder="{:nifnumber}" type="text" value="{{nifnumber}}"/> </div> </div> <div id="error_address"> </div> <div id="submit_address"> <div class="loading-button hidden"> </div> <input class="btn green --full" id="{{id_submit_address}}" type="button" value="{:number_validate}"/> </div>
</form>

</fieldset></body></html>
