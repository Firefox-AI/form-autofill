<div class="row py15 display-flex"> <div class="col-md-6 hidden-sm hidden-xs px40"> <h4 class="text-orange m0 mb5 company_register_welcome_text">Willkommen in unserem Unternehmensbereich!</h4> <p class="m0 company_register_welcome_text">Melden Sie sich jetzt an und profitieren Sie von exklusiven Funktionen. Gerne beraten wir Sie auch persönlich: <a class="light_blue_text_link display-inline-block" href="tel:+49 89 215 286 821">+49 89 215 286 821</a></p> <img class="img-responsive position-absolute" src="/img/register-sofa.png" style="bottom: 15px; left: 15px; max-width: calc(100% + 10px);"/> </div> <div class="col-md-6 col-sm-12 col-xs-12"> <div class="form-group"> <label for="cu_company_name">Firmenname *</label> <input class="form-control wgg_input" data-moz-autofill-type="organization" id="cu_company_name" maxlength="100" name="company_name" placeholder="Firmenname" tabindex="1" type="text" value=""/> <div class="failed_validation_message" id="cu_company_name_failed"></div> </div> <div class="form-group dropdown"> <label for="cu_gender-dropdown-menu">Anrede *</label> <select class="selectpicker" data-moz-autofill-type="honorific-prefix" data-style="form-control wgg_select" data-width="100%" id="cu_user_title" name="title" tabindex="2" title="Anrede"> <option value="2">Frau</option> <option value="1">Herr</option> <option value="3">keine Angabe</option> </select> <div class="failed_validation_message" id="cu_user_title_failed"></div> </div> <div class="row"> <div class="col-md-6"> <div class="form-group"> <label for="cu_first_name">Vorname *</label> <input class="form-control wgg_input" data-moz-autofill-type="given-name" id="cu_first_name" maxlength="50" name="first_name" placeholder="Vorname" tabindex="3" type="text" value=""/> <div class="failed_validation_message" id="cu_first_name_failed"></div> </div> </div> <div class="col-md-6"> <div class="form-group"> <label for="cu_last_name">Nachname *</label> <input class="form-control wgg_input" data-moz-autofill-type="family-name" id="cu_last_name" maxlength="50" name="last_name" placeholder="Nachname" tabindex="4" type="text" value=""/> <div class="failed_validation_message" id="cu_last_name_failed"></div> </div> </div> </div> <div class="form-group"> <label for="cu_email">E-Mail-Adresse *</label> <input class="form-control wgg_input" data-moz-autofill-type="email" id="cu_email" maxlength="191" name="email" oninput="invalidEmailCheck(this, 'Bitte füllen Sie dieses Feld aus.', 'Bitte geben Sie eine gültige E-Mail-Adresse ein.')" oninvalid="invalidEmailCheck(this, 'Bitte füllen Sie dieses Feld aus.', 'Bitte geben Sie eine gültige E-Mail-Adresse ein.')" placeholder="E-Mail-Adresse" required="" tabindex="5" title="Bitte füllen Sie dieses Feld aus." type="email" value=""/> <div class="password_missing failed_validation_message" id="cu_email_failed"></div> </div> <div class="form-group"> <label for="cu_password">Passwort (8 - 64 Zeichen) *</label> <div class="wgg_input_icon_group"> <input autocapitalize="off" class="form-control wgg_input password password_paste password_live_check" data-title="" data-toggle="tooltip" id="cu_password" maxlength="64" name="password" oninput="passwordMaxCharactersLiveCheck(this)" placeholder="Passwort" tabindex="6" type="password" value=""/> <span class="mdi mdi-eye mdi-18px cursor-pointer wgg_input_icon" id="show_pass_cu_button" onclick="showPassword('cu_password', 'show_pass_cu_button'); showPassword('cu_password_2')" title=""></span> </div> <div class="failed_validation_message" id="cu_password_failed"></div> </div> <div class="form-group"> <label for="cu_password_2">Passwort wiederholen *</label> <input autocapitalize="off" class="form-control wgg_input" id="cu_password_2" maxlength="64" name="password_2" placeholder="Passwort" tabindex="7" type="password" value=""/> <div class="failed_validation_message" id="cu_password_2_failed"></div> </div> <div id="cu_register-form-pwd-container"> <div class="cu_reg-form-pwstrength-viewport-progress"></div>
