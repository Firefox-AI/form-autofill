<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="create_customer"/><input name="utf8" type="hidden" value="✓"/><p class="shopify-FormRow shopify-FormRow--wide form-row form-row-wide"> <label for="FirstNamereg">First Name</label> <input autofocus="" data-moz-autofill-type="given-name" id="FirstNamereg" name="customer[first_name]" type="text"/> </p> <p class="shopify-FormRow shopify-FormRow--wide form-row form-row-wide"> <label for="LastNamereg">Last Name</label> <input data-moz-autofill-type="family-name" id="LastNamereg" name="customer[last_name]" type="text"/> </p> <p class="shopify-FormRow shopify-FormRow--wide form-row form-row-wide"> <label for="reg_emailreg">Email address <span class="required">*</span></label> <input class="shopify-Input shopify-Input--text input-text" data-moz-autofill-type="email" id="reg_emailreg" name="customer[email]" type="email"/> </p> <p class="shopify-FormRow shopify-FormRow--wide form-row form-row-wide"> <label for="reg_passwordreg">Password <span class="required">*</span></label> <input class="shopify-Input shopify-Input--text input-text" id="reg_passwordreg" name="customer[password]" required="required" type="password"/> <div aria-live="polite" class="shopify-password-strength"></div> </p> <p class="shopify-FormRow form-row"> <input class="shopify-Button button" name="register" type="submit" value="Register"/> </p>
</form>

</fieldset></body></html>
