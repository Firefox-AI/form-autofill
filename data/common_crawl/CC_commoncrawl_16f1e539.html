<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>

ND">North Dakota</option><option value="OH">Ohio</option><option value="OK">Oklahoma</option><option value="OR">Oregon</option><option value="PA">Pennsylvania</option><option value="RI">Rhode Island</option><option value="SC">South Carolina</option><option value="SD">South Dakota</option><option value="TN">Tennessee</option><option value="TX">Texas</option><option value="UT">Utah</option><option value="VT">Vermont</option><option value="VA">Virginia</option><option value="WA">Washington</option><option value="WV">West Virginia</option><option value="WI">Wisconsin</option><option value="WY">Wyoming</option></select></div><button class="flex items-center justify-center bg-purple text-white hover:bg-purple-light h-10 text-lg font-bold rounded-r-sm w-[154px] hover:bg-purple-dark lg:w-full" type="submit"><span class="flex items-center justify-center w-6 h-6 rounded-full mr-2"></span> SEARCH</button>
</form>

</fieldset></body></html>
