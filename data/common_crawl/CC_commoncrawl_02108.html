<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input aria-required="true" class="review--field" name="sVoteName" placeholder="Dein Name*" required="required" type="text" value=""/> <input aria-required="true" class="review--field" data-moz-autofill-type="email" name="sVoteMail" placeholder="Deine E-Mail-Adresse*" required="required" type="email" value=""/> <input aria-required="true" class="review--field" data-moz-autofill-type="other" id="sVoteSummary" name="sVoteSummary" placeholder="Zusammenfassung*" required="required" type="text" value=""/> <div class="field--select review--field select-field"> <select name="sVoteStars"> <option value="10">10 sehr gut</option> <option value="9">9</option> <option value="8">8</option> <option value="7">7</option> <option value="6">6</option> <option value="5">5</option> <option value="4">4</option> <option value="3">3</option> <option value="2">2</option> <option value="1">1 sehr schlecht</option> </select> </div> <textarea class="review--field" cols="3" name="sVoteComment" placeholder="Deine Meinung" rows="2"></textarea> <div class="review--captcha"> <div class="captcha--placeholder" data-src="/widgets/Captcha/refreshCaptcha"></div> <strong class="captcha--notice">Bitte gebe die Zahlenfolge in das nachfolgende Textfeld ein.</strong> <div class="captcha--code"> <input aria-required="true" class="review--field" name="sCaptcha" required="required" type="text"/> </div> </div> <p class="review--notice"> Die mit einem * markierten Felder sind Pflichtfelder. </p> <div class="review--actions"> <button class="btn is--primary" name="Submit" type="submit"> Speichern </button> </div>
</form>

</fieldset></body></html>
