<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset class="fieldset create info"><input name="success_url" type="hidden" value=""/><input name="error_url" type="hidden" value=""/> <div class="row customer-name-fields"> <div class="field field-name-firstname required col-lg-6 col-md-6 col-sm-6 col-xs-12"><div class="control"><input class="input-text required-entry" data-moz-autofill-type="given-name" data-validate="{required:true}" id="firstname" name="firstname" placeholder="Nome" title="Nome" type="text" value=""/></div></div> <div class="field field-name-lastname required col-lg-6 col-md-6 col-sm-6 col-xs-12"><div class="control"><input class="input-text required-entry" data-moz-autofill-type="family-name" data-validate="{required:true}" id="lastname" name="lastname" placeholder="Cognome" title="Cognome" type="text" value=""/></div></div> </div> <div class="field required"><label class="label" for="email_address"><span>Email</span></label> <div class="control"><input class="input-text" data-moz-autofill-type="email" data-validate="{required:true, 'validate-email':true}" id="bss_email_address" name="email" title="Email" type="email" value=""/></div></div> <div class="field choice newsletter"><input class="checkbox" id="is_subscribed" name="is_subscribed" title="Iscriviti alla Newsletter" type="checkbox" value="1"/><label class="label" for="is_subscribed"><span>Iscriviti alla Newsletter</span></label></div> <div class="field date field-dob"><label class="label" for="dob"><span>Data di nascita</span></label> <div class="control customer-dob"><input class="" data-moz-autofill-type="bday" data-validate='{"validate-date":{"dateFormat":"dd\/MM\/y"},"validate-dob":{"dateFormat":"dd\/MM\/y"}}' id="dob" name="dob" type="text" value=""/> </div></div> </fieldset> <fieldset class="fieldset create account" data-hasrequired="* Campi obbligatori"><div class="field password required"><label class="label" for="password"><span>Password</span></label> <div class="control"><input autocomplete="off" class="input-text" data-validate="{required:true, 'validate-password':true}" id="password" name="password" title="Password" type="password"/></div></div><div class="field confirmation required"><label class="label" for="password-confirmation"><span>Conferma password</span></label> <div class="control"><input autocomplete="off" class="input-text" data-validate="{required:true, equalTo:'#password'}" id="password-confirmation" name="password_confirmation" title="Conferma password" type="password"/></div></div> <div class="recaptcha field required" style="overflow:hidden;position:relative;margin-bottom:10px;"><div id="tab-create-recaptcha"></div><input class="bss-recaptcha" data-validate="{required:true, 'required-entry':true}" id="create-recaptcha" name="create-recaptcha" readonly="" style="visibility:hidden; position:absolute; left:-1000000px" type="text" value=""/></div></fieldset><div class="actions-toolbar"><div class="primary"><button class="action create primary" id="bt-social-create" title="Crea un Account" type="button"><span>Crea un Account</span></button></div></div>
</form>

</fieldset></body></html>
