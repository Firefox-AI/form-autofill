<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="row"> <div class="columns medium-12"> <h3 class="title hide-for-small-only">Contact</h3> <h3 class="title show-for-small-only">Contact</h3> </div> <div class="columns medium-6 hide-for-small-only" data-required-for="medium up"> <label>First Name * <input data-moz-autofill-type="given-name" maxlength="100" name="person.firstName" required="" type="text"/> </label> </div> <div class="columns medium-6 hide-for-small-only" data-required-for="medium up"> <label>Last Name * <input data-moz-autofill-type="family-name" maxlength="100" name="person.lastName" required="" type="text"/> </label> </div> <div class="columns medium-6 hide-for-small-only"> <label>Company <input data-moz-autofill-type="organization" maxlength="255" name="person.company" type="text"/> </label> </div> <div class="columns medium-6 hide-for-small-only" data-required-for="medium up"> <label>Phone Number * <input class="phoneMask" data-moz-autofill-type="tel" maxlength="45" name="person.phoneNumber" required="" type="text"/> </label> </div> <div class="columns medium-12"> <label>Email * <input data-moz-autofill-type="email" maxlength="100" name="person.emailAddress" required="" type="text"/> </label> </div> <div class="columns medium-12 hide-for-small-only"> <label>Address <input data-moz-autofill-type="street-address" maxlength="225" name="address.street" type="text"/> </label> </div> <div class="columns medium-5 hide-for-small-only"> <label>City <input data-moz-autofill-type="address-level2" maxlength="100" name="address.city" type="text"/> </label> </div> <div class="columns medium-4 hide-for-small-only"> <div> <label>State </label> <input data-moz-autofill-type="address-level1" maxlength="100" name="address.state" type="text"/> </div> </div> <div class="columns medium-3 hide-for-small-only" data-required-for="medium up"> <label> Zip Code * <input data-moz-autofill-type="postal-code" maxlength="45" name="address.zipCode" required="" type="text"/> </label> </div> <div class="columns medium-12"> <label>Comments</label> <textarea cols="5" data-cy="message" name="message"></textarea> </div> <div class="columns medium-12 hidden"> <label for="doYouLikeForklifts"> <input autocomplete="off" id="doYouLikeForklifts" name="doYouLikeForklifts" placeholder="Do you like forklifts?" tabindex="-1" type="text" value=""/> </label> </div> <div class="columns medium-12"> <input data-cy="recaptcha-token" name="token" type="hidden"/> <div class="form-message alert-box callout info" data-closable="" style="display: none;"> <p class="form-success callout-closable-message" style="display: none;">Thank you for your request. We'll be in touch shortly.</p> <p class="form-required callout-closable-message" style="display: none;">Please fill out all required fields (*).</p> <p class="form-alert callout-closable-message" style="display: none;">An error occurred during form submission. Please try again. If the issue persists please contact us at (406) 541-8903.</p> <a class="close-button" data-close="" href="#">×</a> </div> <button class="button" data-cy="submit">Submit</button> </div> </div>
</form>
