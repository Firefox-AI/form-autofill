<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="contact"/> <input name="utf8" type="hidden" value="✓"/> <div class="#grid @type:span" style="--gap: 1rem;"> <div style="--span: 12; --span-mobile: 12;"> <div class="#form-field"> <input autocomplete="name" class="#form-field-input" id="ContactForm-product" name="contact[Product]" placeholder="Product to match (must include SKU/product number)" required="" type="text" value="Performance Tools PTW38937 Ratchet Screwdriver / PTW38937"/></div> </div> <div style="--span: 12; --span-mobile: 12;"> <div class="#form-field"> <input autocomplete="name" class="#form-field-input" id="ContactForm-Quantity-to-order" name="contact[Quantity to order]" placeholder="Quantity to order" required="" type="text" value=""/></div> </div> <div style="--span: 12; --span-mobile: 12;"> <div class="#form-field"> <input autocomplete="name" class="#form-field-input" id="ContactForm-link" name="contact[Product link]" placeholder="Link to Product Page on Competitor's website (http://)" required="" type="text" value=""/></div> </div> <div style="--span: 12; --span-mobile: 12;"> <div class="#form-field"> <input autocomplete="name" class="#form-field-input" data-moz-autofill-type="name" id="ContactForm-name" name="contact[Name]" placeholder="Your Name" required="" type="text" value=""/></div> </div> <div style="--span: 12; --span-mobile: 12;"> <div class="#form-field"><input aria-required="true" autocapitalize="off" autocomplete="email" class="#form-field-input" data-moz-autofill-type="email" id="ContactForm-email" name="contact[email]" placeholder="Your Email" required="" spellcheck="false" type="email" value=""/></div> </div> <div style="--span: 12;"> <div class="#form-field"><input autocomplete="tel" class="#form-field-input" data-moz-autofill-type="postal-code" id="ContactForm-phone" name="contact[Postal Code]" placeholder="Your Postal Code" required="" type="text" value=""/></div> </div> <strong style="--span: 12;">Please ensure that the total final price is in CAD and includes shipping and taxes.</strong> <div style="--span: 12;"> <button class="#button @display-style:gradient @size:h4 @block @shadow" style="" type="submit">Submit</button> </div> </div>
</form>

</fieldset></body></html>
