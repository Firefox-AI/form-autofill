<form>
<div class="modal-header"> <h5 class="modal-title">Delivery Quote</h5> <button aria-label="Close" class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button> </div> <div class="modal-body" style="text-align: left;"> <input name="__RequestVerificationToken" type="hidden" value="lC1vz1h0j-rOPAsEMR7D4z4MdOZokHe-YInFE_5auckyv4MG-lBXFXvD9D4b4ogYepu6fnF9fHkoqccybjNgLkBR3Os1"/> <input id="hdnDealerId" name="hdnDealerId" type="hidden" value="1026"/> <input id="hdnProductId" name="hdnProductId" type="hidden" value="464533"/> <p>Please complete the form below to request a delivery quote from the Seller. Please provide full address and type of property.</p> <input autocomplete="off" id="sd0-sh" name="sd0-sh" type="hidden" value="JqFpQPZ3aUFxIRZzgEagZ99/g6Fm02lOnOpbinj82ZDwX7Jg14UdDgUAZKIHMLQ8jHI6N0qAF0yS3CS0uK5bsUdfSv68pnKZFaiq9XFpHh6RCJUjnLjQ90g5kpkiq1zi"/> <div class="row mb-2"> <div class="col"> <label class="form-label text-light-brown required" for="email-sd2-sh" id="sd2-sh">Email address</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="email" id="email-sd2-sh" name="email-sd2-sh" placeholder="Enter email" type="text"/> </div> </div> <div class="row mb-2"> <div class="col"> <label class="form-label text-light-brown" for="requirements-sd10-sh">Shipping Requirements</label> <div class="dropdown-list"> <select class="form-select form-control--grey" id="requirements-sd10-sh" name="requirements-sd10-sh"> <option>UK &amp; Europe</option> <option>International</option> </select> </div> </div> </div> <div class="row mb-2"> <div class="col"> <label class="form-label text-light-brown required" for="phone-sd1-sh" id="sd1-sh">Phone number</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="tel" id="phone-sd1-sh" name="phone-sd1-sh" placeholder="Enter phone number" type="text"/> </div> </div> <div class="row mb-2"> <div class="col"> <label class="form-label text-light-brown" for="full-name-sd3-sh" id="sd3-sh">Name (full name)</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="name" id="full-name-sd3-sh" name="full-name-sd3-sh" placeholder="Enter name" type="text"/> </div> </div> <div class="row mb-2"> <div class="col"> <label class="form-label text-light-brown required" for="age-sd4-sh" id="sd4-sh">Age</label> <textarea autocomplete="off" class="form-control form-control--grey" id="age-sd4-sh" name="age-sd4-sh" placeholder="Enter age...."></textarea> <input autocomplete="off" id="fax-sd11-sh" name="fax-sd11-sh" placeholder="Enter fax number" type="hidden"/> </div> </div> <div class="row mb-2 sdh1"> <div class="col"> <label for="address-house-street-sd5-sh" id="sd5-sh">House number and street</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="street-address" id="address-house-street-sd5-sh" name="address-house-street-sd5-sh" placeholder="Enter your house number and street" type="text"/> </div> </div> <div class="row mb-2 sdh3" style="display:none;"> <div class="col"> <label class="form-label text-light-brown" for="county-region-state-sd7-sh" id="sd7-sh">County/Region/State</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="address-level1" id="county-region-state-sd7-sh" name="county-region-state-sd7-sh" placeholder="Enter county/state" type="text"/> </div> </div> <div class="row mb-2 sdh4"> <div class="col"> <label class="form-label text-light-brown" for="postcode-zip-sd8-sh" id="sd8-sh">Postcode/ZIP</label> <input autocomplete="off" class="form-control form-control--grey" data-moz-autofill-type="postal-code" id="postcode-zip-sd8-sh" name="postcode-zip-sd8-sh" placeholder="Enter postcode/ZIP" type="text"/> </div> </div> <div class="row mt-2"> <div class="col"> <input autocomplete="off" class="form-check-input form-control--grey" id="confirmation-sd12-sh" name="confirmation-sd12-sh" type="check
