<html><head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset class="fieldset create info"> <input name="success_url" type="hidden" value=""/> <input name="error_url" type="hidden" value=""/> <div class="field field-name-firstname required"> <label class="label" for="firstname"><span>Voornaam</span></label> <div class="control"> <input class="input-text required-entry" data-moz-autofill-type="given-name" data-validate="{required:true}" id="firstname" name="firstname" title="Voornaam" type="text" value=""/> </div> </div> <div class="field field-name-lastname required"> <label class="label" for="lastname"><span>Achternaam</span></label> <div class="control"> <input class="input-text required-entry" data-moz-autofill-type="family-name" data-validate="{required:true}" id="lastname" name="lastname" title="Achternaam" type="text" value=""/> </div> </div> <div class="field required"> <label class="label" for="email_address"><span>Email</span></label> <div class="control"> <input class="input-text" data-moz-autofill-type="email" data-validate="{required:true, 'validate-email':true}" id="email_address_create" name="email" title="Email" type="email" value=""/> </div> </div> <div class="field choice newsletter"> <input class="checkbox" id="is_subscribed" name="is_subscribed" title=" Schrijf u in op onze NIEUWSBRIEF" type="checkbox" value="1"/> <label class="label" for="is_subscribed"><span> Schrijf u in op onze NIEUWSBRIEF</span></label> </div> <div class="field date field-dob"> <label class="label" for="dob"><span>Geboortedatum</span></label> <div class="control customer-dob"> <input class="" d\="" data-moz-autofill-type="bday" data-validate="{" id="mp_sociallogin_dob" name="mp_sociallogin_dob" type="text" validate-date":{"dateformat":"m\="" value="" y"}}"=""/> </div> </div> <div class="field test taxvat"> <label class="label" for="taxvat"><span>BTW nummer</span></label> <div class="control"> <input class="taxvat-input input-text" id="taxvat" name="taxvat" title="BTW nummer" type="text" value=""/> <button class="vat-validate-btn btn-primary" id="validate-button" style="background: #1979c3 none repeat scroll 0 0;" type="button"> <span class="bold"> Bevestig BTW</span> </button> </div> </div> </fieldset> <fieldset class="fieldset create account" data-hasrequired=" * Verplichte velden"> <div class="field password required"> <label class="label" for="password"><span>Wachtwoord</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, 'validate-password':true}" id="password-social" name="password" title="Wachtwoord" type="password"/> </div> </div> <div class="field confirmation required"> <label class="label" for="password-confirmation"><span>Herhaal uw wachtwoord</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, equalTo:'#password-social'}" id="password-confirmation-social" name="password_confirmation" title="Herhaal uw wachtwoord" type="password"/> </div> </div> </fieldset> <div class="actions-toolbar"> <div class="primary"> <button class="action create primary" id="button-create-social" title=" Maak een account" type="button"> <span> Maak een account</span></button> <div class="secondary"> <a class="action back" href="#"><span> Terug</span></a> </div> </div> </div>
</form>

</fieldset></body></html>
