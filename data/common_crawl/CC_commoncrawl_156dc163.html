<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="note-before"><p>Seu endereço de email não será publicado.</p> </div><p class="comment-wrap"><textarea aria-required="true" class="comment" cols="45" id="comment" name="comment" placeholder="Seu comentário" rows="10"></textarea></p><p class="author-wrap"><input aria-required="true" class="author" data-moz-autofill-type="given-name" id="author" name="author" placeholder="Seu nome *" size="45" type="text" value=""/></p> <p class="email-wrap"><input aria-required="true" class="email" data-moz-autofill-type="email" id="email" name="email" placeholder="Seu email *" size="45" type="text" value=""/></p> <p class="url-wrap"><input class="url" id="url" name="url" placeholder="Seu site" size="45" type="text" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/><label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p> <p class="form-submit"><input class="comment-submit" id="comment-submit" name="submit" type="submit" value="Postar Comentário"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="12264"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
