<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input class="ref" id="ref" name="ref" type="hidden" value=""/><div class="form-group"><input class="form-control" id="name" name="name" placeholder="Full name *" type="text" value=""/></div><div class="form-group"><input class="form-control" data-moz-autofill-type="email" id="email" name="email" placeholder="Email Address *" type="text" value=""/></div><div class="row"><div class="form-group col-xs-6"><input class="form-control" data-moz-autofill-type="tel" id="telephone" name="telephone" placeholder="Telephone *" type="text" value=""/></div><div class="form-group col-xs-6"><input class="form-control" data-moz-autofill-type="postal-code" id="postcode" name="postcode" placeholder="Postcode *" type="text" value=""/></div></div><div class="form-group"><textarea class="form-control" id="message" name="message" placeholder="Message *" type="text"></textarea></div><input class="submit" type="submit" value="Send message"/><div class="errors"></div>
</form>

</fieldset></body></html>
