<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="fieldset"><input name="success_url" type="hidden" value=""/><input name="error_url" type="hidden" value=""/><input id="createmobile" name="mobilenumber" type="hidden"/><input id="otp" name="otp" type="hidden"/><div class="messages"></div><div class="content fieldset"><div class="reg-form"><div class="registration-otp-generate"><div class="firstname reginput odd field"><div class="input-box input-field"><input class="input-text required-entry input-line letters-only" data-moz-autofill-type="given-name" id="firstname" name="firstname" placeholder="First Name*" title="First Name" type="text"/></div></div><div class="lastname reginput even field"><div class="input-box input-field"><input class="input-text required-entry input-line letters-only" data-moz-autofill-type="family-name" id="lastname" name="lastname" placeholder="Last Name*" title="Last Name" type="text"/></div></div><div class="email reginput odd fields"><div class="input-box"><input class="input-text input-line" data-moz-autofill-type="email" data-validate="{required:true, 'validate-email':true}" id="mobile-reg-email" name="email" placeholder="Email Address*" title="Email Address" type="text"/></div></div><div class="password reginput odd field"><div class="input-box input-field"><input class="input-text input-line" data-password-min-character-sets="3" data-password-min-length="8" data-validate="{required:true, 'validate-customer-password':true}" id="mobile-reg-password" name="password" placeholder="Password*" title="Password" type="password"/></div></div><div class="confirmpassword reginput even field"><div class="input-box input-field"><input aria-describedby="password-confirmation-error" aria-invalid="true" aria-required="true" autocomplete="off" class="input-text input-line" data-validate="{required:true, equalTo:'#mobile-reg-password'}" id="confirmpassword" name="password_confirmation" placeholder="Confirm Password*" title="Password" type="password"/></div></div><div class="clear"></div><div class="register"> Do You Have an Account? <a class="createlinking" href="javascript:void(0)" id="customer-popup-sign-in">Login</a></div><div class="clear"></div><div class="actions-toolbar"><button class="action submit primary reg-btn" title="Create an Account" type="submit"><span><span class="btn-title" style="font-size: 15px;"> Create an Account</span></span></button></div></div></div></div></div>
</form>

</fieldset></body></html>
