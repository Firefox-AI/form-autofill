<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Deine E-Mail-Adresse wird nicht veröffentlicht.</span> <span class="required-field-message">Erforderliche Felder sind mit <span class="required">*</span> markiert</span></p><p class="comment-form-comment"><label for="comment">Kommentar <span class="required">*</span></label><textarea cols="45" id="comment" maxlength="65525" name="comment" required="required" rows="8"></textarea></p><div class="ast-comment-formwrap ast-row"><p class="comment-form-author ast-grid-common-col ast-width-lg-33 ast-width-md-4 ast-float"><label class="screen-reader-text" for="author">Name*</label><input aria-required="true" autocomplete="name" data-moz-autofill-type="name" id="author" name="author" placeholder="Name*" size="30" type="text" value=""/></p><p class="comment-form-email ast-grid-common-col ast-width-lg-33 ast-width-md-4 ast-float"><label class="screen-reader-text" for="email">E-Mail-Adresse*</label><input aria-required="true" autocomplete="email" data-moz-autofill-type="email" id="email" name="email" placeholder="E-Mail-Adresse*" size="30" type="text" value=""/></p><p class="comment-form-url ast-grid-common-col ast-width-lg-33 ast-width-md-4 ast-float"><label for="url"><label class="screen-reader-text" for="url">Website</label><input autocomplete="url" id="url" name="url" placeholder="Website" size="30" type="text" value=""/></label></p></div><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Meinen Namen, meine E-Mail-Adresse und meine Website in diesem Browser für die nächste Kommentierung speichern.</label></p><p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Kommentar abschicken"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="190"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/></p>
</form>

</fieldset></body></html>
