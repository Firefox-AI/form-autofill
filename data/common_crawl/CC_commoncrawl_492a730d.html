<fieldset>

<form>
<div class="bp-form-section form-group" id="contact-form-group"> <p class="bp-form-label contact-info-label">Contact Information</p> <div class="row bp-form-row email-row"> <div class="bp-email col-md-12"> <input class="bp-input form-control" data-moz-autofill-type="email" data-validators="required,email" id="email" name="email" placeholder="Correo electrónico"/> <div class="error-output"></div> </div> </div> <div class="row bp-form-row myHaas-pw-row hidden"> <div class="bp-email col-md-12"> <input class="bp-input form-control" id="myHaas-signin-pw" name="password" placeholder="Contraseña" type="password"/> <div class="error-output"></div> </div> </div> <div class="row bp-form-row name-row"> <div class="bp-fname col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="given-name" data-validators="required" id="first_name" name="first_name" placeholder="Nombre" type="text"/> <div class="error-output"></div> </div> <div class="bp-lname col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="family-name" data-validators="required" id="last_name" name="last_name" placeholder="Apellidos" type="text"/> <div class="error-output"></div> </div> </div> </div> <div class="bp-form-section form-group" id="address-form-group"> <div class="row bp-form-row"> <div class="bp-company col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="organization" data-validators="required" id="company" name="company" placeholder="Nombre de la empresa" type="text"/> <div class="error-output"></div> </div> <div class="bp-phone col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="tel" data-validators="required" id="phone" name="phone" placeholder="Teléfono" type="text"/> <div class="error-output"></div> </div> </div> <div class="hidden address-fields"> <div class="row bp-form-row"> <div class="bp-street col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="address-line1" data-validators="required" id="street" name="street" placeholder="Company Address" type="text"/> <div class="error-output"></div> </div><div class="bp-street col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="apartment" id="address2" name="address2" placeholder="Bldg, Suite, Apt. Number" type="text"/> <div class="error-output"></div></div> </div> <div class="row bp-form-row"> <div class="bp-city col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="address-level2" data-validators="required" id="City" name="city" placeholder="Población" type="text"/> <div class="error-output"></div> </div> <div class="bp-zip col-md-6"> <input class="bp-input form-control" data-moz-autofill-type="postal-code" data-validators="required" id="PostCode" name="post_code" placeholder="Postal" type="text"/> <div class="error-output"></div> </div> </div> <div class="row bp-form-row"> <div class="bp-country col-md-6"> <select class="bp-input form-control" data-moz-autofill-type="country" data-validators="required" id="Country" name="country"> <option disabled="" selected="" value="">País</option> <option value="US">United States</option> <option value="AE">United Arab Emirates</option> <option value="AI">Anguilla</option> <option value="AL">Albania</option> <option value="AR">Argentina</option> <option value="AT">Austria</option> <option value="AU">Australia</option> <option value="BA">Bosnia-Herz.</option> <option value="BD">Bangladesh</option> <option value="BE">Belgium</option> <option value="BG">Bulgaria</option> <option value="BH">Bahrain</option> <option value="BO">Bolivia</option> <option value="BR">Brazil</option> <option value="CA">Canada</option> <option value="CH">Switzerland</option> <option value="CL">Chile</option> <option value="CN">China</option> <option value="CO">Colombia</option> <option value="CR">Costa Rica</option> <option value="CY">Cyprus</option> <option value="CZ">Czech Republic</option> <option value="DE">Germany</option> <option value="DK">Denmark</option> <option value="DO">Dominican Republic</option> <option value="DZ">Algeria</option> <option value="EC">Ecuador</option> <option value="EE">Estonia</option> <option value="EG">Egypt</option> <option value="ES">Spain</option> <option value="FI">Finland</option> <option value="FR">France</option> <option value="GB">United Kingdom</option> <option value="GR">Greece</option> <option value="GT">Guatemala</option> <option value="GU">Guam</option> <option value="HK">Hong Kong</option> <option value="HN">Honduras</option> <option value="HR">Croatia</option> <option value="HU">Hungary</option> <option value="ID">Indonesia</option> <option value="IE">Ireland</option> <option value="IL">Israel</option> <option value="IN">India</option> <option value="IO">British Indian Ocean Territory</option> <option value="IS">Iceland</option> <option value="IT">Italy</option> <option value="JP">Japan</option> <option value="KE">Kenya</option> <option value="KR">South Korea</option> <option value="KW">Kuwait</option> <option value="KZ">Kazakhstan</option> <option value="LI">Liechtenstein</option> <option value="LK">Sri Lanka</option> <option value="LS">Lesotho</option> <option value="LT">Lithuania</option> <option value="LU">Luxembourg</option> <option value="LV">Latvia</option> <option value="MA">Morocco</option> <option value="MD">Moldova</option> <option value="ME">Montenegro</option> <option value="MK">Macedonia</option> <option value="MM">Burma</option> <option value="MP">Northern Mariana Islands</option> <option value="MT">Malta</option> <option value="MU">Mauritius</option> <option value="MX">Mexico</option> <option value="MY">Malaysia</option> <option value="NL">Netherlands</option> <option value="NO">Norway</option> <option value="NZ">New Zealand</option> <option value="OM">Oman</option> <option value="PE">Peru</option> <option value="PH">Philippines</option> <option value="PL">Poland</option> <option value="PR">Puerto Rico</option> <option value="PT">Portugal</option> <option value="PY">Paraguay</option> <option value="QA">Qatar</option> <option value="RO">Romania</option> <option value="RS">Serbia</option> <option value="SA">Saudi Arabia</option> <option value="SE">Sweden</option> <option value="SG">Singapore</option> <option value="SI">Slovenia</option> <option value="SK">Slovakia</option> <option value="SV">El Salvador</option> <option value="TH">Thailand</option> <option value="TN">Tunisia</option> <option value="TR">Turkey</option> <option value="TT">Trinidad and Tobago</option> <option value="TW">Taiwan</option> <option value="UA">Ukraine</option> <option value="UY">Uruguay</option> <option value="UZ">Uzbekistan</option> <option value="VE">Venezuela</option> <option value="VI">United States Virgin Islands</option> <option value="VN">Vietnam</option> <option value="ZA">South Africa</option> <option value="ZM">Zambia</option> <option value="ZW">Zimbabwe</option> </select> <div class="error-output"></div> </div> <div class="bp-state col-md-6"> <select class="bp-input form-control" data-moz-autofill-type="address-level1" data-validators="" id="Region" name="region"> <option disabled="" selected="" value="">Seleccionar región</option> </select> <div class="error-output"></div> </div> </div> <div class="row bp-form-row hidden"> <div class="bp-additionalComments col-md-12"> <input class="bp-input form-control" id="additionalComments" maxlength="128" name="additionalComments" placeholder="Additional Comments" size="60" type="text"/> </div> </div> </div> <div class="row bp-form-row"> <div class="bp-street col-md-12"> <input class="bp-input form-control" data-validators="required" id="autocomplete" maxlength="128" placeholder="Introduzca su dirección" size="60" type="text"/> <div class="error-output"></div> </div> </div> <div class="row bp-form-row"> <div class="bp-street col-md-12"> <a class="text-red custom-address" href="#">+ Añadir dirección</a> </div> </div> <div class="bp-form-section form-group myHaas-form-section"> <p class="bp-form-label">¡Introduzca una button> <button class="btn btn-primary btn-submit btn-continue active btn-submit-register hidden" style="text-transform: uppercase;"> Submit &amp; Create Account </button> <button class="btn btn-primary btn-revise-options btn-continue btn-reverse" type="button">VOLVER A OPCIONES</button> </div> </div> </div>
