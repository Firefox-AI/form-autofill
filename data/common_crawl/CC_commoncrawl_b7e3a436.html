<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="hp-form__header"><p class="hp-form__description">Please enter your username or email address, you will receive a link to create a new password via email.</p><div class="hp-form__messages" data-component="messages"></div></div><div class="hp-form__fields"><div class="hp-form__field hp-form__field--text"><label class="hp-field__label hp-form__label"><span>Username or Email</span></label><input autocomplete="username" class="hp-field hp-field--text" data-moz-autofill-type="email" maxlength="254" name="username_or_email" required="required" type="text" value=""/></div></div><div class="hp-form__footer"><button class="hp-form__button button-primary alt button hp-field hp-field--submit" type="submit"><span>Send Email</span></button></div>
</form>

</fieldset></body></html>
