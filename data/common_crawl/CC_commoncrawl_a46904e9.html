<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="event-ticket-form"> <div> <span class="form-close"><i class="fa fa-close"></i></span> <div class="causes-form-wrap view-single active view-initial" data-group="payment-info" data-name="ticket-chose"> <div class="dynamic-data" data-target="group" data-template=' &lt;table&gt; &lt;tr&gt; &lt;th&gt;Events&lt;/th&gt; &lt;td data-title="Events"&gt;{{_event_name_}}&lt;/td&gt; &lt;/tr&gt; &lt;tr&gt; &lt;th&gt;Events Times&lt;/th&gt; &lt;td data-title="Events Times"&gt;&lt;p&gt;Started: {{_start_time_}}&lt;/p&gt;&lt;p&gt; Ending: {{_end_time_}}&lt;/p&gt;&lt;/td&gt; &lt;/tr&gt; &lt;/table&gt; '> </div> <table> <tr class="dynamic-data" data-insert-mode="after" data-target="items" data-template=' &lt;tr&gt; &lt;th&gt;{{_name_}}&lt;/th&gt; &lt;td data-title="{{_name_}}"&gt; &lt;div&gt; &lt;div class="view-single active view-initial" data-name="ticket-short-{{_id_}}" data-group="ticket-info-{{_id_}}"&gt;{{_description_}} &lt;span class="math-group math-result" data-math="m-s-{{_id_}}" &gt;0&lt;/span&gt;/{{_available_}} &lt;div class="view-trigger btn" data-show="ticket-full-{{_id_}}"&gt;+&lt;/div&gt; &lt;/div&gt; &lt;div class="view-single" data-name="ticket-full-{{_id_}}" data-group="ticket-info-{{_id_}}"&gt; &lt;div class="view-trigger btn" data-show="ticket-short-{{_id_}}"&gt;-&lt;/div&gt; &lt;table&gt; &lt;tr&gt; &lt;th&gt;Descriptions:&lt;/th&gt; &lt;td data-title="Descriptions:"&gt;{{_description_}}&lt;/td&gt; &lt;/tr&gt; &lt;tr&gt; &lt;th&gt;Price:&lt;/th&gt; &lt;td data-title="Price:"&gt;{{_price_view_}}&lt;/td&gt; &lt;/tr&gt; &lt;tr&gt; &lt;th&gt;Booked:&lt;/th&gt; &lt;td data-title="Booked:"&gt;{{_sold_}}/{{_max_stock_}}&lt;/td&gt; &lt;/tr&gt; &lt;tr&gt; &lt;th&gt;Stock Available:&lt;/th&gt; &lt;td data-title="Stock Available:"&gt;{{_available_}}&lt;/td&gt; &lt;/tr&gt; &lt;tr&gt; &lt;th&gt;Book allow until:&lt;/th&gt; &lt;td data-title="Book allow until:"&gt;{{_end_time_}}&lt;/td&gt; &lt;/tr&gt; &lt;/table&gt; &lt;/div&gt; &lt;/div&gt; &lt;/td&gt; &lt;td&gt; &lt;input type="hidden" class="math-group math-element" data-name="m-{{_id_}}" value="{{_price_}}"&gt; &lt;input type="hidden" class="math-group math-element" data-name="m-max-{{_id_}}" value="{{_available_}}"&gt; &lt;div class="btn btn-submit math-group math-force-value math-dependency" data-match="m-s-{{_id_}}{&lt;}m-max-{{_id_}}" data-target="m-s-{{_id_}}" data-value="sum:{m-s-{{_id_}},1}"&gt;Add &lt;/div&gt; &lt;/td&gt; &lt;/tr&gt; '> <th>Tickets</th> <th>Information</th> <th></th> </tr> </table> <div class="clear-both"></div> <table class="math-group math-dependency" data-match="total-product{&gt;}0"> <tr class="dynamic-data" data-insert-mode="after" data-target="items" data-template=' &lt;tr class="math-group math-dependency" data-match="m-s-{{_id_}}{&gt;}0"&gt; &lt;td data-title="Items"&gt;{{_name_}}&lt;/td&gt; &lt;td data-title="Spaces"&gt;&lt;input type="number" name="quantity-of-{{_id_}}" class="math-group math-element" min="0" max="{{_available_}}" data-name="m-s-{{_id_}}" value="0"&gt;&lt;/td&gt; &lt;td data-title="Price per space"&gt;{{_price_view_}}&lt;/td&gt; &lt;td data-title="Amount"&gt;&lt;span class="math-group math-result" data-math="mul:{m-{{_id_}},m-s-{{_id_}}}" data-value-wrap="{{_price_mask_}}"&gt;&lt;/span&gt;&lt;/td&gt; &lt;td&gt; &lt;div class="math-group math-force-value remove-ticket-item" data-target="m-s-{{_id_}}" data-value="0"&gt;X&lt;/div&gt; &lt;/td&gt; &lt;/tr&gt; '> <th>Items</th> <th>Spaces</th> <th>Price per space</th> <th>Amount</th> <th></th> </tr> <tr> <th></th> <th></th> <th>Total:</th> <th><span class="math-group math-result dynamic-attr" data-math="total-amount" data-options='{"data-value-wrap":{"elements":"items","segment":"{{_price_mask_}}"}}'></span> </th> <th></th> </tr> </table> <input class="math-group math-result math-element dynamic-attr" data-math="0" data-name="total-amount" data-options='{"data-math":{"elements":"items","segment":"mul:{m-{{_id_}},m-s-{{_id_}}}","join":",","wrap":"sum:{{-value-}}"}}' type="hidden"/> <input class="math-group math-result math-element dynamic-attr" data-math="0" data-name="total-product" data-options='{"data-math":{"elements":"items","segment":"m-s-{{_id_}}","join":",","wrap":"sum:{{-value-}}"}}' type="hidden"/> <div class="text-center"> <div class="view-trigger btn btn-primary math-group math-dependency" data-hide-mode="none" data-match="total-product{&gt;}0" data-mode="fade" data-show="checkout" data-show-mode="fade"> Checkout </div> </div> </div> <div class="causes-form-wrap view-single" data-group="payment-info" data-name="checkout"> <div> <label>Total Amount</label> <span class="math-group math-result dynamic-attr" data-math="total-amount" data-options='{"data-value-wrap":{"elements":"items","segment":"{{_price_mask_}}"}}'></span> </div> <div class="form-group"> <label>Name *</label> <input data-moz-autofill-type="given-name" name="name" required="required" type="text" value=""/> </div> <div class="form-group"> <label>Email *</label> <input data-moz-autofill-type="email" name="email" required="required" type="email" value=""/> </div> <div class="form-group"> <label>Phone *</label> <input data-moz-autofill-type="tel" name="phone" required="required" type="text"/> </div> <div class="form-group"> <label>Messages to Admin</label> <textarea name="messages" rows="3"></textarea> </div> <div class="form-group"> <label>Payment type</label> <select class="view-input-state" name="payment_type"> <option value="paypal">Paypal</option> <option value="stripe">Stripe</option> <option selected="selected" value="custom">Custom</option> </select> </div> <div class="view-single" data-group="payment-type-section" data-name="paypal"> <div>When Payment via Paypal we need redirect to Paypal checkout page to complete payment</div> </div> <div class="view-single active" data-group="payment-type-section" data-name="custom"> <div><label>Please contact to admin to complete payment</label></div> </div> <div class="view-single" data-group="payment-type-section" data-name="stripe"> <div class="form-group"> <input autocomplete="off" class="form-control" name="card_number" pattern="[0-9]{16}" placeholder="Card number" title="Invalid Card Number" type="text"/> </div> <div class="row"> <div class="form-group col-12 col-lg-6"> <select name="card_exp_month"> <option value="1">1</option> <option value="2">2</option> <option value="3">3</option> <option value="4">4</option> <option value="5">5</option> <option value="6">6</option> <option value="7">7</option> <option value="8">8</option> <option value="9">9</option> <option value="10">10</option> <option value="11">11</option> <option value="12">12</option> </select> </div> <div class="form-group col-12 col-lg-6"> <select name="card_exp_year"> <option value="2024">2024</option> <option value="2025">2025</option> <option value="2026">2026</option> <option value="2027">2027</option> <option value="2028">2028</option> <option value="2029">2029</option> <option value="2030">2030</option> <option value="2031">2031</option> <option value="2032">2032</option> <option value="2033">2033</option> <option value="2034">2034</option> <option value="2035">2035</option> <option value="2036">2036</option> <option value="2037">2037</option> <option value="2038">2038</option> <option value="2039">2039</option> <option value="2040">2040</option> <option value="2041">2041</option> <option value="2042">2042</option> <option value="2043">2043</option> <option value="2044">2044</option> </select> </div> </div> <div class="form-group"> <input autocomplete="off" class="form-control" name="card_cvc" pattern="[0-9]{3,4}" placeholder="CVV" type="text"/> </div> </div> <div class="action-row text-center"> <div class="view-trigger btn btn-primary" data-hide-mode="none" data-show="ticket-chose" data-show-mode="fade">Back </div> <button class="btn btn-submit" type="submit">Process</button> </div> </div> </div> </div>
</form>

</fieldset></body></html>
