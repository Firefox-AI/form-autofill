<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<dl> <dt>カタログ希望</dt> <dd> <ul> <li><label><input class="ctg" name="ctg" type="radio" value="カタログを希望する"/><span></span>カタログを希望する</label></li> <li><label><input class="ctg" name="ctg" type="radio" value="カタログを希望しない"/><span></span>カタログを希望しない</label></li> </ul> </dd> <dt class="mb20">資料請求ご希望物件</dt> <dd class="required mt10"> <select id="area" name="area"> <option value="">選択してください</option> <optgroup label="大阪エリア"> <option value="敷島ステラ 交野・私部西">敷島ステラ 交野・私部西</option> <option value="敷島ステラ 交野・私部西">敷島ステラ 交野・私部西</option> <option value="敷島ステラ 寝屋川・黒原城内町">敷島ステラ 寝屋川・黒原城内町</option> <option value="敷島ステラ 枚方・出口5丁目">敷島ステラ 枚方・出口5丁目</option> <option value="敷島ステラ 枚方・香里ケ丘Ⅱ">敷島ステラ 枚方・香里ケ丘Ⅱ</option> <option value="敷島ステラ守口・西郷通">敷島ステラ守口・西郷通</option> <optgroup label="京都エリア"> <option value="レント京都精華大前">レント京都精華大前</option> <option value="北区大宮・西野山プライムコート">北区大宮・西野山プライムコート</option> <option value="敷島ステラ 山科・音羽">敷島ステラ 山科・音羽</option> <option value="敷島ステラ 山科・音羽">敷島ステラ 山科・音羽</option> <option value="敷島ステラ伏見区羽束師Ⅱ">敷島ステラ伏見区羽束師Ⅱ</option> <option value="敷島ステラ伏見区羽束師Ⅱ">敷島ステラ伏見区羽束師Ⅱ</option> <option value="敷島ステラ岩倉花園町">敷島ステラ岩倉花園町</option> <option value="敷島ステラ岩倉花園町">敷島ステラ岩倉花園町</option> <optgroup label="滋賀エリア"> <option value="ガーデンテラス石山寺">ガーデンテラス石山寺</option> <option value="大津市青山1丁目(土地)">大津市青山1丁目(土地)</option> <option value="守山・下之郷プラチナ―ジュ">守山・下之郷プラチナ―ジュ</option> <option value="敷島ステラ 大津・南志賀Ⅵ">敷島ステラ 大津・南志賀Ⅵ</option> <option value="敷島ステラ 守山・二町町">敷島ステラ 守山・二町町</option> <option value="敷島ステラ 湖南・石部中央">敷島ステラ 湖南・石部中央</option> <option value="敷島ステラ 草津・川原町">敷島ステラ 草津・川原町</option> </optgroup></optgroup></optgroup></select> </dd> <dt>お名前</dt> <dd class="required"><input id="name_1" name="name_1" placeholder="敷島" type="text" value=""/> <input id="name_2" name="name_2" placeholder="太郎" type="text" value=""/> <span class="block">※全角</span></dd> <dt>郵便番号</dt> <dd><input class="number" id="postal" name="postal" onkeyup="AjaxZip3.zip2addr(this,'','address_1','address_1');" placeholder="5700027" type="text" value=""/> <span class="block">※半角数字で入力ください。<br/>※住所が自動入力されます。</span></dd> <dt>ご住所</dt> <dd><input data-moz-autofill-type="address-line1" id="address_1" name="address_1" placeholder="大阪府守口市桜町" type="text" value=""/><input data-moz-autofill-type="address-line2" id="address_2" name="address_2" placeholder="番地・丁目・建物名" type="text" value=""/> <span class="block">※建物名・部屋番号までご記入ください。</span></dd> <dt>電話番号</dt> <dd class="required"><input class="number" id="phone" name="phone" placeholder="0120394408" type="tel" value=""/> <span class="block">※半角数字で入力ください。</span></dd> <dt>メールアドレス</dt> <dd class="required"><input id="mail_address" name="mail_address" placeholder="info@shikishima-j.co.jp" type="email" value=""/> <span class="block">※半角英数字</span></dd> <dt>お問合せ内容</dt> <dd><textarea id="inquiry" name="inquiry" placeholder="お問い合わせの内容をご入力ください"></textarea> <span class="block">※お問合せの内容をご入力ください。</span></dd> <dt>個人情報の保護について</dt> <dd class="required"> <ul> <li><label><input class="kind" name="kind[]" type="checkbox" value="同意する"/><span></span>同意する</label></li> </ul> <p class="block">※当フォームのご利用にあたっては、「個人情報保護方針」にご同意いただく必要があります。ご同意いただける場合は、上記の「同意する」にチェックをつけたうえでご利用ください。</p> </dd> </dl> <p id="form_submit"><input id="form_submit_button" type="button" value="確 認"/></p>
</form>
