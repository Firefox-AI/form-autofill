<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="modal-header"> <h5 class="modal-title" id="exampleModalCenterTitle">Publica tu perfil gratis</h5> <button aria-label="Close" class="close" data-dismiss="modal" type="button"> <span aria-hidden="true"><i class="fa fa-times-circle"></i></span> </button> </div> <div class="modal-body"> <div class="row"> <div class="col-md-6"> <div class="form-group"> <label>Tu nombre (o nombre del centro)</label> <input class="form-control" data-moz-autofill-type="given-name" name="name" placeholder="" required="" type="text"/> </div> </div> <div class="col-md-6"> <div class="form-group"> <label>Email de contacto</label> <input class="form-control" data-moz-autofill-type="email" name="email" placeholder="" required="" type="email"/> </div> </div> </div> <div class="row"> <div class="col-md-6"> <div class="form-group"> <label>Teléfono de contacto</label> <input class="form-control" data-moz-autofill-type="tel" name="phone" placeholder="" required="" type="text"/> </div> </div> <div class="col-md-6"> <div class="form-group"> <label>Dirección</label> <input class="form-control" data-moz-autofill-type="street-address" name="address" placeholder="" required="" type="text"/> </div> </div> </div> <div class="row"> <div class="col-md-6"> <div class="form-group"> <label>Ciudad</label> <input class="form-control" data-moz-autofill-type="address-level2" name="city" placeholder="" required="" type="text"/> </div> </div> <div class="col-md-6"> <div class="form-group"> <label>Código Postal</label> <input class="form-control" data-moz-autofill-type="postal-code" name="pc" placeholder="" required="" type="text"/> </div> </div> </div> <div class="form-result"></div> </div> <div class="modal-footer"> <button class="btn btn-custom-1 btn-submit" type="submit"><i class="fa fa-check-circle"></i> Darse de alta</button> </div>
</form>

</fieldset></body></html>
