<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="comments-form-field"><textarea class="normal" id="comment" name="comment" placeholder="Write a comment.." required="true"></textarea></div><div class="comments-form-field half"><input class="fullwidth" data-moz-autofill-type="nickname" name="author" placeholder="Display Name" required="true" type="text" value=""/></div><div class="comments-form-field half fix"><input class="fullwidth" data-moz-autofill-type="email" name="email" placeholder="Email Address" required="true" type="text" value=""/></div><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p><p class="form-submit"><input class="field-btn-submit" id="submit" name="submit" type="submit" value="Post comment"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="608"/><input id="comment_parent" name="comment_parent" type="hidden" value="0"/></p>
</form>

</fieldset></body></html>
