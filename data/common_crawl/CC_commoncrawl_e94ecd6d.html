<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="row"> <div class="col-md-12 mb-3"> <label class="text-white form-label-outside" for="nome">Nome e cognome</label> <input class="form-input w-100" data-moz-autofill-type="name" id="nome" minlength="2" name="form_nome|required|_" required="" size="70" type="text"/> </div> <div class="col-md-6 mb-3"> <label class="text-white form-label-outside" for="email">Email</label> <input class="form-input w-100" data-moz-autofill-type="email" data-parsley-type="email" id="email" minlength="8" name="form_email|required|email" required="" size="70" type="email"/> </div> <div class="col-md-6 mb-3"> <label class="text-white form-label-outside" for="email">Telefono <small>(Facoltativo)</small></label> <input class="form-control" data-moz-autofill-type="tel" data-parsley-type="digits" id="cellulare" minlength="8" name="form_cellulare" size="70" type="text"/> </div> <div class="col-md-6 mb-3"> <label class="text-white form-label-outside" for="nome">Azienda</label> <input class="form-input w-100" data-moz-autofill-type="organization" id="azienda" minlength="2" name="form_azienda|required|_" required="" size="70" type="text"/> </div> <div class="col-md-6 mb-3"> <label class="text-white form-label-outside" for="nome">Provincia di residenza</label> <input class="form-input w-100" id="provincia" minlength="2" name="form_provincia|required|_" required="" size="70" type="text"/> </div> <div class="col-md-12 mb-3"> <label class="text-white form-label-outside" for="messaggio">Messaggio</label> <textarea class="form-input w-100" cols="68" id="messaggio" minlength="5" name="form_messaggio" required="" rows="5"></textarea> </div> <div class="col-lg-12 text-start"> <div class="d-flex align-items-center"> <input data-parsley-check="[1, 1]" id="privacy" name="form_privacy|required|boolean" required="" type="checkbox" value="true"/> <label class="ms-2 mb-0" for="privacy"><a class="gdpr-max-trigger text-white" href="javascript:void(0);" rel="nofollow">Concedo il consenso al trattamento dei dati</a></label> </div> <input id="subscribe_contact" name="subscribe_contact" type="hidden" value="1"/> <div class="d-flex align-items-center mt-3"> <input id="allow_publicity" name="allow_publicity" type="checkbox" value="1"/> <label class="mb-0 ms-2 text-white" for="allow_publicity">Iscriviti alla newsletter <small>(Facoltativo)</small></label> </div> </div> <div class="col-lg-12 text-center text-md-left"> <input name="mail_subject" type="hidden" value="Richiesta informazioni per Serbatoi senza staffe Serie SNA"/> <input name="lang" type="hidden" value="it"/> <input name="redirect" type="hidden" value="1"/> <input name="redirect_url" type="hidden" value="feedback"/> <input id="referer" name="referer" type="hidden" value="https://www.stima.it/it/distribuzione-aria--pistole-e-accessori/serie-sna/serbatoi-senza-staffe-serie-sna"/> <button class="tp-btn mt-50" id="send_generic_form1" type="button">Invia richiesta</button> </div> </div>
</form>
