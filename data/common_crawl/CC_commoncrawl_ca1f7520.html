<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input id="custentity_shipping_state" name="custentity_shipping_state" type="hidden"/> <div class="form-row form-row--half leadpages-form hideAddress" id="leadpages-fieldset"> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_firstname">First Name <small>Required</small></label> <input class="form-input" data-moz-autofill-type="given-name" id="form_firstname" name="firstname" placeholder="First Name" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_lastname">Last Name <small>Required</small></label> <input class="form-input" data-moz-autofill-type="family-name" id="form_lastname" name="lastname" placeholder="Last Name" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_email-address">Email <small>Required</small></label> <input class="form-input" data-moz-autofill-type="email" id="form_email-address" name="email" placeholder="Email" type="email"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_phone">Phone</label> <input class="form-input" data-moz-autofill-type="tel" id="form_phone" name="phone" placeholder="Phone Number" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_companyname">Company</label> <input class="form-input" data-moz-autofill-type="organization" id="form_companyname" name="companyname" placeholder="Company" type="text"/> </div> <div class="form-field form-field--input form-field--inputText searchAddress"> <label class="guide-label" for="form_autoCompleteField"><span> Search for your address</span> <small>Enter address manually</small></label> <input class="form-input" id="form_autoCompleteField" name="autoCompleteField" placeholder="Enter your address" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_address1">Address Line 1 <small>Required</small></label> <input class="form-input" data-moz-autofill-type="address-line1" id="form_address1" name="address1" placeholder="Address line 1" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_address2">Address Line 2</label> <input class="form-input" data-moz-autofill-type="address-line2" id="form_address2" name="address2" placeholder="Address line 2" type="text"/> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_city">City <small>Required</small></label> <input class="form-input" data-moz-autofill-type="address-level2" id="form_city" name="city" placeholder="City" type="text"/> </div> <div class="form-field form-field--select"> <label class="form-label sr-only" for="form_state">State <small>Required</small></label><select class="form-select" data-moz-autofill-type="address-level1" id="form_state" name="state"> </select> </div> <div class="form-field form-field--input form-field--inputText"> <label class="form-label sr-only" for="form_zipcode">Zip/Postal Code <small>Required</small></label> <input class="form-input" data-moz-autofill-type="postal-code" id="form_zipcode" name="zipcode" placeholder="Zip/Postal Code" type="text"/> </div> <div class="form-field form-field--select"> <label class="form-label sr-only" for="form_country">Country <small>Required</small></label><select class="form-select" data-moz-autofill-type="country" id="form_country" name="country"> </select> </div> <div class="form-field form-field--input form-field--inputText is-hidden"> <label class="form-label sr-only" for="form_comments">Comments <small>Required</small></label> <input class="form-input" id="form_comments" name="comments" type="text"/> </div> <div class="form-actions mt-3"> <button class="button button--primary after-caret-right chevron smaller d-flex align-items-center mx-auto fs-4" id="form_submitBtn" name="submitBtn" type="submit">Send me info</button> </div> <div class="respect disclaimer w-100"> <p class="mb-0 mt-3 text-center"><em>We respect your information and do not share your details with outside parties in any way.</em></p> </div> </div>
</form>

</fieldset></body></html>
