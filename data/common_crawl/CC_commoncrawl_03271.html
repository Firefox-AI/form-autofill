<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="wrap-input100 validate-input" data-validate="Name is required"> <input class="input100" data-moz-autofill-type="name" id="enqcustname" name="name" placeholder="Full Name" type="text"/> <span class="focus-input100-1"></span> <span class="focus-input100-2"></span> </div> <div class="wrap-input100 validate-input" data-validate="Valid email is required: ex@abc.xyz"> <input class="input100" data-moz-autofill-type="email" id="enqemail" name="email" placeholder="Email" type="email"/> <span class="focus-input100-1"></span> <span class="focus-input100-2"></span> </div> <div class="wrap-input100 validate-input" data-validate="Valid phone is required: (xxx) xxx-xxxx"> <input class="input100" data-moz-autofill-type="tel" id="enqphonenumber" name="phonenumber" placeholder="Phone Number" type="text"/> <span class="focus-input100-1"></span> <span class="focus-input100-2"></span> </div> <div class="wrap-input100 validate-input" data-validate="Valid zip is required: 11111"> <input class="input100" data-moz-autofill-type="postal-code" id="enqzipcode" name="zipcode" placeholder="Zip Code" type="text"/> <span class="focus-input100-1"></span> <span class="focus-input100-2"></span> </div> <div class="wrap-input100 validate-input" data-validate="Message is required"> <textarea class="input100" id="enqmessage" name="message" placeholder="Additional Message"></textarea> <span class="focus-input100-1"></span> <span class="focus-input100-2"></span> </div> <input id="enqmachine" type="hidden" val=""/> <input id="enqauthoremail" type="hidden" val=""/> <input id="enqauthorid" type="hidden" val=""/> <input id="enqmachineid" type="hidden" val=""/> <input id="enqmanufacture" type="hidden" val=""/> <input id="enqmodel" type="hidden" val=""/> <div class="enq-success-msg"></div> <div class="container-contact100-form-btn"> <button class="contact100-form-btn"> Send </button> </div>
</form>

</fieldset></body></html>
