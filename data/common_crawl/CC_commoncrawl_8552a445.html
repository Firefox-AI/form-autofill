</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="customer"/><input name="utf8" type="hidden" value="✓"/> <input name="contact[tags]" type="hidden" value="prospect,newsletter"/> <input data-moz-autofill-type="given-name" name="contact[first_name]" placeholder="First " type="text"/> <input data-moz-autofill-type="family-name" name="contact[last_name]" placeholder="Last" type="text"/> <input class="contact_email" data-moz-autofill-type="email" name="contact[email]" pattern="[^ @]*@[^ @]*" placeholder="Enter your email address..." required="" type="email"/> <input class="action_button sign_up" style="padding-bottom:6px;" type="submit" value="Sign Up"/>
</form>

</fieldset></body></html>
