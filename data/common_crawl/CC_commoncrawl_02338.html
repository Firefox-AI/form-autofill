<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p id="homepopupenquirysuccessmsg"></p> <div class="overlaysan"></div> <input name="enquiry_for" type="hidden" value="Enquiry For Contact Us"/> <input name="page_url" type="hidden" value="#"/> <div class="row"> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="name" id="nameBottom" name="name" placeholder="Name*" required="" tabindex="1" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="email" id="emailBottom" name="email" placeholder="Email ID*" required="" tabindex="2" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="tel" id="mobileBottom" maxlength="15" minlength="10" name="mobile" onkeypress="return event.charCode &gt;= 48 &amp;&amp; event.charCode &lt;= 57 || event.charCode == 43 || event.charCode == 45 || event.charCode == 0" placeholder="Phone Number*" required="" tabindex="3" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control locationBottom" data-moz-autofill-type="address-line1" name="address" placeholder="Address" tabindex="4" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <textarea class="form-control" id="messageBottom" name="message" placeholder="Message" tabindex="5"></textarea> </div> </div> <div class="col-lg-12"> <button class="modal_btn" data-submit="...Sending" name="submit" tabindex="7" type="submit" value="Submit">Submit Now</button> </div> </div>
</form>

</fieldset></body></html>
