<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p id="innersuccessmsg"></p> <div class="overlaysan"></div> <input name="enquiry_for" type="hidden" value="Enquiry For Contact Us"/> <input name="page_url" type="hidden" value="https://www.pelletmachinemanufacturers.com/assam/pellet-grinder-machine.html"/> <div class="row"> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="given-name" name="name" placeholder="Name" required="" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="email" name="email" placeholder="Enter Email Id" required="" type="email"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="tel" maxlength="15" minlength="10" name="mobile" onkeypress="return event.charCode &gt;= 48 &amp;&amp; event.charCode &lt;= 57 || event.charCode == 43 || event.charCode == 45 || event.charCode == 0" placeholder="Enter Mobile" required="" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <input class="form-control" data-moz-autofill-type="street-address" name="address" placeholder="Address" type="text"/> </div> </div> <div class="col-lg-12"> <div class="form-group"> <textarea class="form-control" name="message" placeholder="Message" rows="4"></textarea> </div> </div> <div class="col-lg-12"> <div class="form-group"> <button class="btn btn-primary" type="submit">Submit</button> </div> </div> </div>
</form>
