<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="fieldgroup"><label>Send To:</label> <input class="field field-roundedcorners" data-moz-autofill-type="email" data-val="true" data-val-email="Invalid Email Address" data-val-required="The email address is required" id="ToEmail" name="ToEmail" type="text"/></div><div class="fieldgroup"><label>Your E-Mail:</label> <input class="field field-roundedcorners" data-moz-autofill-type="email" data-val="true" data-val-email="Invalid Email Address" data-val-required="The email address is required" id="FromEmail" name="FromEmail" type="text"/></div><div class="fieldgroup"><label>Your Name:</label> <input class="field field-roundedcorners" data-moz-autofill-type="given-name" id="Name" name="Name" type="text"/></div><div class="fieldgroup hp"><label>Your Last Name:</label> <input class="field field-roundedcorners" data-moz-autofill-type="family-name" id="LastName" name="LastName" type="text"/></div><input data-val="true" data-val-number="The field ContentID must be a number." data-val-required="The ContentID field is required." id="ContentID" name="ContentID" type="hidden" value="191250"/><div class="ac-confirm-buttons"><div class="buttons-wrapper"><button class="rounded-button rounded-button-info ac-confirm-btn-ok ladda-button" data-style="zoom-out" data-submit="true" type="submit">Send Email</button> <a class="rounded-button rounded-button-info ac-confirm-btn-cancel" id="ACShareModalBtnCancel">Cancel</a></div></div>
</form>

</fieldset></body></html>
