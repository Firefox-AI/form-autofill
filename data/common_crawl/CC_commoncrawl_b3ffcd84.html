<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="flex-btw-start name-box"> <div class="form-group"> <label class="form-label">姓：（例）桃<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="given-name" datatype="*" name="first_name" nullmsg="氏名をご入力ください" type="text" value=""/> </div> <div class="form-group"> <label class="form-label">名：（例）太郎<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="family-name" datatype="*" name="last_name" nullmsg="氏名をご入力ください" type="text" value=""/> </div> </div> <p class="red name-msg"><span style="color:#E02020;font-size:13px">**お受取人様のお名前を2文字以上で、2文字が同じにならないようにご入力ください。</span></p> <div class="flex-btw-start name-box"> <div class="form-group"> <label class="form-label">郵便番号<span class="red">*</span>（例）000</label> <input class="form-control" data-moz-autofill-type="postal-code" datatype="n3-3" errormsg="郵便番号が間違ってる" id="first-zip" name="first_zip" nullmsg="郵便番号をご入力ください" oninput="if(value.length&gt;3) value=value.slice(0,3)" pattern="[0-9]*" type="number" value=""/> </div> <div class="form-line">-</div> <div class="form-group"> <label class="form-label"><span class="red">*</span>（例）0000</label> <input class="form-control" data-moz-autofill-type="postal-code" datatype="n4-4" errormsg="郵便番号が間違ってる" id="last-zip" name="last_zip" nullmsg="郵便番号をご入力ください" oninput="if(value.length&gt;4) value=value.slice(0,4)" pattern="[0-9]*" type="number" value=""/> </div> <input class="field-input" datatype="*" errormsg="郵便番号が間違ってる" id="zipCode" name="zip_code" nullmsg="郵便番号をご入力ください" type="hidden" value=""/> </div> <div class="flex-btw-start name-box"> <div class="form-group form-state-label form-state"> <label class="form-label">都道府県<span class="red">*</span></label> <select class="form-control state-input" data-moz-autofill-type="address-level1" datatype="*" name="state" nullmsg="都道府県を選んでください"> </select> </div> <div class="form-line">-</div> <div class="form-group"> <label class="form-label top0">市区町村（例）世田谷区<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="address-level2" datatype="*" name="city" nullmsg="市区町村をご入力ください" type="text" value=""/> <select class="form-control city-input" data-moz-autofill-type="address-level2" name="city1" nullmsg="市区町村をご入力ください"> </select> </div> </div> <div class="remoteAreaTips red"></div> <div class="form-group"> <label class="form-label">番地·号·建物名·部屋番号：(例)玉川1-11-1-201号室<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="street-address" datatype="*" name="address" nullmsg="お届け先住所が正しくありません" type="text" value=""/> </div> <div class="red address-msg clearfix"><span style="color:#E02020;font-size:13px">**配送先のご住所（部屋番号 ）を正しく入力してください。</span></div> <div class="form-group"> <label class="form-label">携帯番号：（例）08011112222<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="tel" datatype="phone" errormsg="携帯番号が正しくありません" name="phone" nullmsg="携帯番号をご入力ください" type="number" value=""/> </div> <div class="form-group"> <label class="form-label">E-mail：（例）example@gmail.com<span class="red">*</span></label> <input class="form-control" data-moz-autofill-type="email" datatype="e" errormsg="メールアドレスが正しくありません" id="emailoff" name="email" nullmsg="メールアドレスをご入力ください" type="text" value=""/> </div> <div class="marketing-SMS"> <input checked="" id="is-marketing-SMS" name="marketing-SMS" type="checkbox"/> <label for="is-marketing-SMS">販売店からのキャンペーン情報を受け入れる(定期購読する)か否か</label> </div> <div class="form-group"> <label class="form-label">メッセージ:</label> <textarea class="form-control" name="notes"></textarea> </div>
</form>

</fieldset></body></html>
