<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="row-fluid"> <dl class="span12 nomargin"> <dt class="label">Name:</dt> <dd class="input koval_field"><input class="koval_required" data-moz-autofill-type="name" name="name" required="" size="34" title="Your name is required." type="text" value=""/></dd> <dt class="label">Email:</dt> <dd class="input koval_field"><input class="koval_email koval_required" data-moz-autofill-type="email" name="email" required="" size="34" title="A valid email is required." type="text" value=""/></dd> <div class="span6 halfFormField"> <dt class="label">Phone:</dt> <dd class="input koval_field"><input class="koval_phone koval_required" data-moz-autofill-type="tel" name="telephone" required="" size="34" title="A valid phone number is required." type="text"/></dd> </div> <div class="span6 halfFormField"> <dt class="label">Post Code:</dt> <dd class="input koval_field"><input class="koval_postcode koval_required" data-moz-autofill-type="postal-code" name="postcode" required="" size="34" title="A post code is required." type="text"/></dd> </div> <dt>How do you prefer to be contacted</dt> <div class="span6 halfFormField"> <dd class="input koval_field"> <label style="display:inline-flex"> <input name="contactPref" type="radio" value="Email"/> Email </label> </dd> </div> <div class="span6 halfFormField"> <dd class="input koval_field"> <label style="display:inline-flex"> <input name="contactPref" type="radio" value="Telephone"/> Telephone </label> </dd> </div> </dl> <dl class="span12 nomargin"> <dt>Your message:</dt> <dd> <textarea class="koval_required" cols="50" name="comment" required="" rows="10" title="A message is required"></textarea> </dd> <dd> <input class="btn" type="submit" value="Send message"/></dd> </dl> <input name="emailtype" type="hidden" value="1"/> <input id="formStockCode" name="stockcode" type="hidden" value=""/> </div>
</form>

</fieldset></body></html>
