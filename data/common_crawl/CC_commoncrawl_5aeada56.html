tRepeat" data-valmsg-replace="true"></span> </div> </div> <div class="form-row"> <div class="col-12 mb-4"> <label> Das Passwort muss 8 Zeichen, mindestens einen Klein- und einen Großbuchstaben und ein Symbol (#?!@$%^&amp;*-) enthalten. </label> </div> </div> <input name="AlternativeDatenschutz" type="hidden" value="true"/> <div class="form-group"> <div class="form-check"> <input class="form-check-input" data-val="true" data-val-range="Bitte bestätigen Sie die AGB." data-val-range-max="True" data-val-range-min="True" data-val-required='Das Feld "ConfirmedAgb" ist erforderlich.' id="ConfirmedAgb" name="ConfirmedAgb" type="checkbox" value="true"/><input name="ConfirmedAgb" type="hidden" value="false"/> <label class="form-check-label" for="ConfirmedAgb"> Hiermit akzeptiere ich die <a href="/agb">AGB</a>. Sie haben ein vierzehntägiges Widerrufsrecht. <a href="/agb">Hier</a> finden Sie die Einzelheiten zu Ihrem Widerrufsrecht. </label> </div> <span class="field-validation-valid" data-valmsg-for="ConfirmedAgb" data-valmsg-replace="true"></span> </div> <div class="form-group"> <div class="form-check"> <input class="form-check-input" data-val="true" data-val-range="Bitte bestätigen Sie die Datenschutzbestimmungen." data-val-range-max="True" data-val-range-min="True" data-val-required='Das Feld "Datenschutz" ist erforderlich.' id="Datenschutz" name="Datenschutz" type="checkbox" value="true"/><input name="Datenschutz" type="hidden" value="false"/> <label class="form-check-label" for="Datenschutz"> Ich nehme die <a href="/datenschutz">Datenschutzbestimmungen</a> zur Kenntnis. </label> </div> <span class="field-validation-valid" data-valmsg-for="Datenschutz" data-valmsg-replace="true"></span> </div> <div class="row"> <div class="col-12 col-md-6"> Captcha <div class="captchaContainer"><img border="0" src="/content/Authorization/GetCaptcha"/></div> <a class="newCaptcha" href="#">Captcha neu laden</a> <br/> <input data-val="true" data-val-required="Captcha ungültig" id="Captcha" na
