<fieldset>
<h3>gassmann-cars.de</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="i_fahrzeugnummer" type="hidden" value="9556"/> <input name="i_fzgid" type="hidden" value="1243"/> <input name="i_art" type="hidden" value="verkauf"/> <input id="i_standorturl" name="i_standorturl" type="hidden" value=""/> <input autocomplete="off" class="ts-hide" id="verifyEmail" name="verifyEmail" type="text" value=""/> <br/> <div class="row"> <div class="large-6 medium-12 columns large-push-6"> <div class="row column"> <label><strong>Ihr Name</strong></label> </div> <div class="row column"> <input data-moz-autofill-type="given-name" data-validation-engine="validate[custom[onlyLetterSpecial]]" id="i_name" name="i_name" placeholder="Max Mustermann" type="text"/> </div> <div class="row column"> <label><strong>Ihre Telefonnummer</strong></label> </div> <div class="row column"> <input data-moz-autofill-type="tel" data-validation-engine="validate[groupRequired[tel_email],custom[phone]]" id="i_telefon" name="i_telefon" placeholder="+49 (0) 1234-5678910" type="tel"/> </div> <div class="row column"> <label><strong>Ihre E-Mail-Adresse</strong></label> </div> <div class="row column"> <input data-moz-autofill-type="email" data-validation-engine="validate[groupRequired[tel_email],custom[email]]" id="i_email" name="i_email" placeholder="max.mustermann@beispiel.de" type="email"/> </div> </div> <div class="large-6 medium-12 columns large-pull-6"> <div class="row"> <div class="column"> <label><strong>Ihre Nachricht</strong></label> <textarea class="text_area" data-validation-engine="validate[custom[TEXT]]" id="i_text" name="i_Wuensche_Fragen"> Sehr geehrte Damen und Herren, ich interessiere mich für Ihr Angebot. Bitte kontaktieren Sie mich. Mit freundlichen Grüßen</textarea> </div> </div> </div> </div> <div class="row"> <div class="large-6 medium-12 columns"> <div class="row small-up-1"> </div> <br/> </div> <div class="large-6 medium-12 columns"> <div class="row"> <div class="small-12 columns"> <p><input class="datenschutz_checkbox" data-validation-engine="validate[required]" id="i_datenschutz" name="i_datenschutz" type="checkbox" value="1"/> <label class="datenschutz_label" for="i_datenschutz"> Ich habe die <a class="dse_link" href="https://www.gassmann-cars.de/datenschutz" target="_blank" title="Datenschutzerklärung">Datenschutzerklärung</a> zur Kenntnis genommen. Ich stimme zu, dass meine Angaben und Daten zur Beantwortung meiner Anfrage elektronisch erhoben und gespeichert werden. <br/><br/>Hinweis: Sie können Ihre Einwilligung jederzeit per E-Mail an info@gassmann-cars.de widerrufen. </label> </p> </div> </div> <div class="row"> <div class="small-12 columns"> </div> </div> </div> </div> <div class="row fahrzeug_anfragen"> <div class="medium-offset-6 medium-6 small-12 column"> <input class="large button expanded anfrage_senden" name="anfrage_senden" type="submit" value="Anfrage senden"/> </div> </div>
</form>

</fieldset></body></html>
