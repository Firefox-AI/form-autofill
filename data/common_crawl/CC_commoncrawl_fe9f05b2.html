<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset class="fieldset create info"> <input name="success_url" type="hidden" value=""/> <input name="error_url" type="hidden" value=""/> <div> <div class="form-group col-md-6"> <label for="firstname"> <span>First Name</span><span class="compulsary">*</span> </label> <input class="form-control input-text required-entry" data-moz-autofill-type="given-name" data-validate="{required:true}" id="firstname" name="firstname" title="First Name" type="text" value=""/> </div> <div class="form-group col-md-6"> <label for="lastname"> <span>Last Name</span><span class="compulsary">*</span> </label> <input class="form-control input-text required-entry" data-moz-autofill-type="family-name" data-validate="{required:true}" id="lastname" name="lastname" title="Last Name" type="text" value=""/> </div> </div> <div class="field required"> <label class="label" for="email_address"><span>Email</span></label> <div class="control"> <input class="input-text" data-moz-autofill-type="email" data-validate="{required:true, 'validate-email':true}" id="email_address" name="email" title="Email" type="email" value=""/> </div> </div> <div class="field choice newsletter"> <input class="checkbox" id="is_subscribed" name="is_subscribed" title="Sign Up for Newsletter" type="checkbox" value="1"/> <label class="label" for="is_subscribed"><span>Sign Up for Newsletter</span></label> </div> <div class="field date field-dob"> <label for="dob"><span>Date of Birth</span></label> <div class="control customer-dob"> <input autocomplete="dob" class="" data-moz-autofill-type="bday" data-validate="{'validate-date-au': true}" id="dob" name="dob" readonly="readonly" type="text" value=""/> </div> </div> <div class="field gender"> <label for="gender"><span>Gender</span></label> <select autocomplete="gender" class="form-control" data-moz-autofill-type="sex" id="gender" name="gender" title="Gender"> <option value="1">Male</option> <option value="2">Female</option> <option value="3">Not Specified</option> </select> </div> </fieldset> <fieldset class="fieldset create account" data-hasrequired="* Required Fields"> <div class="field password required"> <label class="label" for="password"><span>Password</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, 'validate-password':true}" id="password-social" name="password" title="Password" type="password"/> </div> </div> <div class="field confirmation required"> <label class="label" for="password-confirmation"><span>Confirm Password</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, equalTo:'#password-social'}" id="password-confirmation-social" name="password_confirmation" title="Confirm Password" type="password"/> </div> </div> </fieldset> <div class="actions-toolbar"> <div class="primary"> <button class="action create primary" title="Create an Account" type="button"><span>Create an Account</span></button> </div> <div class="secondary"> <a class="action back" href="#"><span>Back</span></a> </div> </div>
</form>

</fieldset></body></html>
