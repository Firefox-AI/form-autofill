<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div style="display:none;"><input name="_method" type="hidden" value="POST"/></div> <div class="header_inputone"> <input class="" id="ListingKeyword" label="" name="data[Listing][keyword]" placeholder="Type your keyword" size="20" type="text"/> </div> <div class="header_inputtwo"> <input class="" id="ListingCategory" label="" name="data[Listing][category]" placeholder="Categories" size="20" type="text"/> </div> <div class="header_inputthree"> <input class="" data-moz-autofill-type="address-level2" id="autocomplete3" label="" name="data[Listing][location]" placeholder="Enter city or state" size="20" type="text"/> </div> <input id="ListingSearchId" name="data[Listing][search_id]" type="hidden"/> <div class="header_inputfour"> <input type="submit" value="Search"/> </div> <div style="display: none"> <table id="address"> <tr> <td class="label">Street address</td> <td class="slimField"><input id="street_number" name="data[Listing][street_number]" type="text"/></td> <td class="wideField" colspan="2"><input id="route" name="data[Request][route]" type="text"/></td> </tr> <tr> <td class="label">City</td> <td class="wideField" colspan="3"><input data-moz-autofill-type="address-level2" id="locality" name="data[Listing][locality]" type="text"/></td> </tr> <tr> <td class="label">State</td> <td class="slimField"><input data-moz-autofill-type="address-level1" id="administrative_area_level_1" name="data[Listing][administrative_area_level_1]" type="text"/></td> <td class="label">Zip code</td> <td class="wideField"><input data-moz-autofill-type="postal-code" id="postal_code" name="data[Listing][postal_code]" type="text"/></td> </tr> <tr> <td class="label">Country</td> <td class="wideField" colspan="3"><input data-moz-autofill-type="country" id="country" name="data[Listing][country]" type="text"/></td> </tr> </table> </div>
</form>

</fieldset></body></html>
