<fieldset>
<h3>jewelxy.com</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input id="id" name="id" type="hidden" value=""/> <div class="row" data-ng-show="IsVisible_befor" style=""> <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12"> <div class="form-group" data-placement="top" data-toggle="tooltip" data-tooltip="Please enter name" id="div_name" title=""> <div class="input-group"> <span class="input-group-addon"> <img alt="fm_nm" class="jb_res_mobi_frm_img" src="https://www.jewelxy.com/b2b/assets/images/icons/form/fm_nm.svg" width="25"/> </span> <input class="form-control jb_res_mobi_form_control text-capitalize" data-moz-autofill-type="given-name" id="name" name="name" onkeyup="BSP.only('alpha','name')" placeholder="Name" type="text" value=""/> </div> <span class="help-block pull-right" id="msg_name"></span> </div> </div> <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12"> <div class="form-group" data-placement="top" data-toggle="tooltip" data-tooltip="Please enter surname" id="div_surname" title=""> <div class="input-group"> <span class="input-group-addon"> <img alt="frm_srnm" class="jb_res_mobi_frm_img" src="https://www.jewelxy.com/b2b/assets/images/icons/form/frm_srnm.svg" width="30"/> </span> <input class="form-control jb_res_mobi_form_control text-capitalize" data-moz-autofill-type="family-name" id="surname" name="surname" onkeyup="BSP.only('alpha','surname')" placeholder="Surname" type="text" value=""/> </div> <span class="help-block pull-right" id="msg_surname"></span> </div> </div> </div> <div class="row" data-ng-show="IsVisible_befor" style=""> <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12"> <div class="row"> <div class="col-lg-3 col-md-3 col-sm-4 col-xs-4 res-no-padding-right"> <div class="form-group"> <input class="form-control jb_res_mobi_form_control" data-element="mobile_country_code_contact_us" data-ng-mobile-country-code="" id="mobile_country_code_contact_us" name="mobile_country_code" readonly="" type="text"/> </div> </div> <div class="col-lg-9 col-md-9 col-sm-8 col-xs-8" id="mobile_number_div"> <div class="form-group" id="div_mobile_contact_us"> <div class="input-group" data-tooltip="Please enter mobile number"> <span class="input-group-addon" id="mobile_loader"> <img alt="frm_mbl" class="jb_res_mobi_frm_img" src="https://cdn1.jewelxy.com/live/img/web_images/icons/form/frm_mbl.svg" width="30"/> <img alt="Jewelxy - Timeless Jewelry Marketplace" height="20" src="https://www.jewelxy.com/b2b/assets/image/loaders/loader.gif" style="display: none;" width="20"/> </span> <input class="form-control jb_res_mobi_form_control" data-moz-autofill-type="tel-local" id="mobile_contact_us" maxlength="12" name="mobile" onkeyup="BSP.only('digit','mobile_contact_us')" placeholder="Mobile" style="text-overflow:ellipsis;" type="text"/> </div> <span class="help-block pull-right" id="msg_mobile_contact_us"></span> </div> </div> </div> </div> <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12"> <div class="form-group" data-placement="top" data-toggle="tooltip" data-tooltip="Please enter email address" id="div_email_contact_us" title=""> <div class="input-group"> <span class="input-group-addon" id="email_loader"> <img alt="frm_eml" class="jb_res_mobi_frm_img" src="https://cdn1.jewelxy.com/live/img/web_images/icons/form/frm_eml.svg" width="32"/> <img alt="Jewelxy - Timeless Jewelry Marketplace" height="20" src="https://www.jewelxy.com/b2b/assets/image/loaders/loader.gif" style="display: none;" width="20"/> </span> <input class="form-control jb_res_mobi_form_control" data-moz-autofill-type="email" id="email_contact_us" name="email" placeholder="Email" type="text" value=""/> </div> <span class="help-block pull-right" id="msg_email_contact_us"></span> </div> </div> </div> <div class="row"> <div class="col-xs-12"> <div class="form-group" data-placement="top" data-toggle="tooltip" data-tooltip="Please enter subject" id="div_subject" title=""> <div class="input-group"> <span class="input-group-addon"> <img alt="frm_sbjt" class="jb_res_mobi_frm_img" src="https://www.jewelxy.com/b2b/assets/images/icons/form/frm_sbjt.svg" width="32"/> </span> <input class="form-control jb_res_mobi_form_control" id="subject" name="subject" placeholder="Subject" type="text" value=""/> </div> <span class="help-block pull-right" id="msg_subject"></span> </div> </div> <div class="col-xs-12" id="div_message"> <div class="form-group" data-placement="top" data-toggle="tooltip" data-tooltip="Please enter message" id="div_middle_name" title=""> <div class="input-group" data-original-title="Please enter message" data-placement="top" data-toggle="tooltip" title=""> <span class="input-group-addon jb_txt_ara_adn"> <img alt="frm_msg" class="jb_res_mobi_frm_img" src="https://www.jewelxy.com/b2b/assets/images/icons/form/frm_msg.svg" width="35"/> </span> <textarea class="form-control jb_txt_ara" id="message" name="message" placeholder="Message" rows="5"></textarea> </div> <span class="help-block pull-right" id="msg_message"></span> </div> </div> </div>
</form>
