<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="comment-textarea"><label class="screen-reader-text" for="comment">Comentário</label><textarea class="textarea-comment" cols="39" id="comment" name="comment" placeholder="Seu comentário aqui..." rows="4" tabindex="0"></textarea></div><div class="comment-form-author"><label class="screen-reader-text" for="author">Digite seu nome ou nome de usuário para comentar</label><input aria-required="true" class="input-name" data-moz-autofill-type="loginname" id="author" name="author" placeholder="Nome (obrigatório)" size="22" tabindex="0" type="text" value=""/></div> <div class="comment-form-email"><label class="screen-reader-text" for="email">Digite seu endereço de e-mail para comentar</label><input aria-required="true" class="input-email" data-moz-autofill-type="email" id="email" name="email" placeholder="E-mail (obrigatório)" size="22" tabindex="0" type="text" value=""/></div> <div class="comment-form-url"><label class="screen-reader-text" for="url">Digite o URL do seu site (opcional)</label><input class="input-website" id="url" name="url" placeholder="Site" size="22" tabindex="0" type="text" value=""/></div> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Salvar meus dados neste navegador para a próxima vez que eu comentar.</label></p> <p class="form-submit"><input class="submit" id="comment-submit" name="submit" type="submit" value="Publicar comentário"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="38747"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
