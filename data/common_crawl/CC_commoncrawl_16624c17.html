<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-group"> <div class="form-label"> <div class="req-label"><span>必須</span></div> <label class="control-label" for="name">氏名</label> </div> <div class="input-area"> <input class="form-control" data-moz-autofill-type="name" id="name" name="co_name" placeholder="氏名を入力" required="" type="text"/> <div class="e-message e-name" style="display: none">必須です</div> </div> </div> <div class="form-group"> <div class="form-label"> <div class="req-label"><span>必須</span></div> <label class="control-label" for="tel">ご連絡先</label> </div> <div class="input-area"> <small class="label">お電話番号</small> <input class="form-control" id="tel" name="co_tel" placeholder="例：0761231234" required="" type="tel"/> <small class="label">または、メールアドレス</small> <input class="form-control" id="email" name="co_mail" placeholder="メールアドレスを入力" type="email"/> <div class="e-message e-tel-email" style="display: none">TELかメールのいずれか必須です</div> </div> </div> <div class="form-group"> <div class="form-label"> <div class="req-label"><span>必須</span></div> <label class="control-label" for="tel">ご住所</label> </div> <div class="input-area pref"> <input checked="" class="form-control" id="pref_0" name="co_pref" type="radio" value="富山県（呉西）"/><label class="control-label" for="pref_0">富山県（呉西）</label> <input class="form-control" id="pref_1" name="co_pref" type="radio" value="富山県（呉東）"/><label class="control-label" for="pref_1">富山県（呉東）</label> <input class="form-control" id="pref_2" name="co_pref" type="radio" value="石川県"/><label class="control-label" for="pref_2">石川県</label> <input class="form-control" id="pref_3" name="co_pref" type="radio" value="福井県"/><label class="control-label" for="pref_3">福井県</label> <div class="e-message e-pref" style="display: none">必須項目です。</div> </div> </div> <div class="form-group"> <div class="form-label"> <div class="req-label"></div> <label class="control-label" for="email">受講者様の<br class="hidden-xs"/>生年月日</label> </div> <div class="input-area"> <input class="form-control form-inline" data-moz-autofill-type="bday-year" id="co_birth_year" min="1900" name="co_birth_year" placeholder="2000" style="width: 6em;" type="number" value=""/> 年 <input class="form-control form-inline" data-moz-autofill-type="bday-month" id="co_birth_month" max="12" min="1" name="co_birth_month" placeholder="1" style="width: 4em;" type="number" value=""/> 月 <input class="form-control form-inline" data-moz-autofill-type="bday-day" id="co_birth_day" max="31" min="1" name="co_birth_day" placeholder="1" style="width: 4em;" type="number" value=""/> 日 </div> </div> <div class="form-group"> <div class="form-label"> <div class="req-label"><span>必須</span></div> <label class="control-label" for="content">ご用件内容</label> </div> <div class="input-area"> <textarea class="form-control" id="content" name="co_content" placeholder="自由入力（講座お申込みなど開催の前日または当日のお問合せは、各実施会場まで直接お電話にてお願いいたします。）"></textarea> <div class="e-message e-content" style="display: none">必須です</div> </div> </div> <div class="btn-area"> <button class="submit-btn" id="submit" type="button">送 信</button> </div>
</form>

</fieldset></body></html>
