<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset class="row"> <legend class="visually-hidden">Cerca</legend> <div class="col-12 col-sm-6 mb-3"> <label class="form-label" for="keyword">Su quale argomento stai cercando informazioni?</label> <input class="form-control eusoda-autocomplete" data-autocomplete-minlen="2" data-autocomplete-type="kw" id="keyword" name="keyword" placeholder="Inserisci un argomento" type="text" value="Assistenza durante la libertà condizionata"/> </div> <div class="col-12 col-sm-6 mb-3"> <label class="form-label" for="pattern">Cerchi un'istituzione precisa?</label> <input class="form-control" id="pattern" name="pattern" placeholder="Inserisci il nome di una istituzione" type="text" value=""/> </div> </fieldset> <fieldset class="row collapse eusoda-search-advanced"> <legend class="visually-hidden">Ricerca avanzata</legend> <div class="col-12 col-sm-6 mb-3 WEBui_showOnJs"> <label class="form-label" for="regid">Informazioni rilevanti per la regione</label> <select class="form-select input-sm selectDropDown" data-autocomplete-type="region" id="regid" name="regid"> <option value="9">?</option> </select> </div> <div class="col-12 col-sm-6 mb-3"> <label class="form-label" for="offerLang">Hai bisogno di una consulenza in lingua straniera?</label> <input class="form-control input-sm eusoda-autocomplete" data-autocomplete-minlen="0" data-autocomplete-type="lang" id="offerLang" name="offerLang" placeholder="Inserisci una lingua" type="text" value=""/> </div> <div class="col-12 col-sm-2 mb-3"><label class="form-label" for="postalcode">Codice di avviamento postale</label><input class="form-control input-sm eusoda-autocomplete" data-autocomplete-minlen="2" data-autocomplete-type="postalcode" data-moz-autofill-type="postal-code" id="postalcode" name="postalcode" placeholder="Codice di avviamento postale" type="number" value=""/></div> <div class="col-12 col-sm-4 mb-3"><label class="form-label" for="city">Luogo</label><input class="form-control input-sm eusoda-autocomplete" data-autocomplete-minlen="2" data-autocomplete-type="city" data-moz-autofill-type="address-level2" id="city" name="city" placeholder="Luogo" type="text" value=""/></div> <div class="col-12 col-sm-6 mb-3"> <label class="form-label" for="address">Indirizzo</label><input class="form-control input-sm eusoda-autocomplete" data-autocomplete-minlen="2" data-autocomplete-type="street" data-moz-autofill-type="address-line1" id="address" name="address" placeholder="Indirizzo" type="text" value=""/> </div> </fieldset> <div class="col-12 text-right mb-3"> <button class="btn btn-primary me-2" type="submit">Effettuare la ricerca</button><button class="btn btn-secondary show-advanced-search ms-3" data-web-command="show-advanced-search" type="button">Mostra la ricerca avanzata</button> </div>
</form>

</fieldset></body></html>
