<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="field"> <input class="input-field" name="firstName" placeholder="名字*" required="" type="text"/> <div class="error-message"></div> </div> <div class="field"> <input class="input-field" data-moz-autofill-type="family-name" name="lastName" placeholder="姓氏" type="text"/> <div class="error-message"></div> </div> <div class="field full-width"> <input autocomplete="off" class="input-field" id="ship-address" name="address1" placeholder="輸入地址*" required="" type="text"/> <div class="error-message"></div> </div> <div class="field"> <input autocomplete="off" class="input-field" data-moz-autofill-type="address-line2" id="address2" name="address2" placeholder="地址2" type="text"/> <div class="error-message"></div> </div> <div class="field"> <select autocomplete="country" class="select-field" data-moz-autofill-type="country" id="country" name="country" type="select"> <option data-provinces='[["Hong Kong Island","香港島"],["Kowloon","九龍"],["New Territories","新界"]]' value="Hong Kong">香港特別行政區</option> </select> <div class="error-message"></div> </div> <div class="field province-field"> <select class="select-field" id="province" name="province" placeholder="省份" required="" type="select"> </select> <div class="error-message"></div> </div> <div class="field"> <input class="input-field" id="postCode" name="zip" placeholder="郵政編碼*" required="" type="number"/> <div class="error-message"></div> </div> <div class="field"> <input class="input-field country-code" disabled="" type="text" value="+852"/> <input class="input-field mobile-number js_format-phone-number js_format-phone-number-on-type" id="js_save-address-phone" name="phone" placeholder="手機號碼*" required="" type="text"/> <div class="error-message"></div> <span class="small_txt" style="font-size: 14px;"> </span> </div> <div class="field email-filed"> </div>
</form>

</fieldset></body></html>
