<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset class="fieldset create info"> <input name="success_url" type="hidden" value=""/> <input name="error_url" type="hidden" value=""/> <div class="field field-name-firstname"> <label class="label" for="firstname"> <span>First Name</span> </label> <div class="control"> <input class="input-text required-entry" data-moz-autofill-type="given-name" data-validate="{required:true}" id="firstname" name="firstname" title="First Name" type="text" value=""/> </div> </div> <div class="field field-name-lastname"> <label class="label" for="lastname"> <span>Last Name</span> </label> <div class="control"> <input class="input-text required-entry" data-moz-autofill-type="family-name" data-validate="{required:true}" id="lastname" name="lastname" title="Last Name" type="text" value=""/> </div> </div> <div class="field required"> <label class="label" for="email_address"><span>Email</span></label> <div class="control"> <input class="input-text" data-moz-autofill-type="email" data-validate="{required:true, 'validate-email':true}" id="email_address_create" name="email" title="Email" type="email" value=""/> </div> </div> <div class="field date field-dob"> <label class="label" for="dob"><span>Date of Birth</span></label> <div class="control customer-dob"> <input class="" data-moz-autofill-type="bday" id="mp_sociallogin_dob" name="dob" type="text" value=""/> </div> </div> </fieldset> <fieldset class="fieldset create account" data-hasrequired="* Required Fields"> <div class="field password required"> <label class="label" for="password"><span>Password</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, 'validate-password':true}" id="password-social" name="password" title="Password" type="password"/> </div> </div> <div class="field confirmation required"> <label class="label" for="password-confirmation"><span>Confirm Password</span></label> <div class="control"> <input autocomplete="off" class="input-text" data-validate="{required:true, equalTo:'#password-social'}" id="password-confirmation-social" name="password_confirmation" title="Confirm Password" type="password"/> </div> </div> </fieldset> <div class="actions-toolbar"> <div class="primary"> <button class="action create primary" id="button-create-social" title="Create an Account" type="button"> <span>Create an Account</span></button> <div class="secondary"> <a class="action back" href="#"><span>Back</span></a> </div> </div> </div>
</form>

</fieldset></body></html>
