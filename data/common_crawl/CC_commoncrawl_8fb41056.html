<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="col-xs-12 text-required">Velden met een * zijn verplicht om in te vullen.</p> <div class="form-group"> <label class="col-sm-12 control-label" for="AskAQuestionName">Naam *</label> <div class="col-sm-12"> <input class="form-control" data-moz-autofill-type="given-name" id="AskAQuestionName" name="ask-a-question[name]" placeholder="Jouw naam" type="text"/> </div> <div class="clearfix"></div> </div> <div class="form-group"> <label class="col-sm-12 control-label" for="AskAQuestionSubject">Onderwerp*</label> <div class="col-sm-12"> <input class="form-control" data-moz-autofill-type="other" id="AskAQuestionSubject" name="ask-a-question[subject]" placeholder="Onderwerp" type="text" value="Ik heb een vraag over foto papier - transfer decal"/> </div> <div class="clearfix"></div> </div> <div class="form-group"> <label class="col-sm-12 control-label" for="AskAQuestionEmail">E-mail adres*</label> <div class="col-sm-12"> <input class="form-control" data-moz-autofill-type="email" id="AskAQuestionEmail" name="ask-a-question[email]" placeholder="E-mail adres" type="text"/> </div> <div class="clearfix"></div> </div> <div class="form-group"> <label class="col-sm-12 control-label" for="AskAQuestionMessage">Vraag*</label> <div class="col-sm-12"> <textarea class="form-control" cols="25" id="AskAQuestionMessage" name="ask-a-question[question]" rows="7"></textarea> </div> <div class="clearfix"></div> </div> <input class="form-control" id="Email-Contact" name="Email-Contact" type="text" value=""/>
</form>

</fieldset></body></html>
