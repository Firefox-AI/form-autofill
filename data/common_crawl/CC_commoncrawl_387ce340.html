<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-contents"> <fieldset class="colorbox-form make-offer-form"><legend class="heading"> Make an Offer <a rel="colorbox-close"> <i class="fa fa-times close"></i> </a> </legend> <br/> <div class="h4">{product} ({type})</div> <p>Want to make us an offer on the {product}? Fill out this offer form and we'll get back with you as soon as possible.</p> <div class="form-horizontal"> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="FirstName" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="FirstName-makeoffer">Name <em>*</em></label> <div class="col-sm-10"><input class="form-control" data-val="true" data-val-regex="First and Last Name are required." data-val-regex-pattern="^.+ .+$" data-val-required="Name is required." id="FirstName-makeoffer" name="FirstName" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Email" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Email-makeoffer">Email <em>*</em></label> <div class="col-sm-10"><input class="form-control" data-moz-autofill-type="email" data-val="true" data-val-regex="Please enter a valid email address." data-val-regex-pattern="^\S+@\S+\.\S+$" data-val-required="Email is required." id="Email-makeoffer" name="Email" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Phone" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Phone-makeoffer">Phone <em>*</em></label> <div class="col-sm-6"><input class="form-control" data-moz-autofill-type="tel" data-val="true" data-val-regex="Please enter a valid phone number" data-val-regex-pattern="^(1\s?)?(\(\d{3}\)|\d{3}-?)?\s?\d{3}-?\d{4}$" data-val-required="Phone is required." id="Phone-makeoffer" name="Phone" type="text"/></div> <div class="col-sm-4"><label class="sr-only" for="PhoneType-makeoffer">Phone Type</label><select class="form-control" id="PhoneType-makeoffer" name="PhoneType"> <option value="Cell">Cell</option> <option value="Home">Home</option> <option value="Work">Work</option> </select></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Zip" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Zip-makeoffer">Zip/Postal <em>*</em></label> <div class="col-sm-10"><input class="form-control" data-moz-autofill-type="postal-code" data-val="true" data-val-regex="Please enter a valid zip code." data-val-regex-pattern="^(\d{5}(-\d{4})?)|([A-Za-z]\d[A-Za-z]\s?\d[A-Za-z]\d)$" data-val-required="Zip/Postal is required." id="Zip-makeoffer" name="Zip" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Offer" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Offer-makeoffer">Offer <em>*</em><span class="pull-right">$</span></label> <div class="col-sm-10"><input class="form-control" data-val="true" data-val-required="Offer is required." id="Offer-makeoffer" name="Offer" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><label for="Comments-makeoffer">Comments</label> <textarea class="form-control" id="Comments-makeoffer" name="Comments" rows="3"></textarea></div> </div> <div class="form-group"> <div class="col-sm-12"> <div class="checkbox"><label for="EmailOptIn-makeoffer"> <input checked="checked" id="EmailOptIn-makeoffer" name="EmailOptIn" type="checkbox"/> It's ok to contact me about future discounts and events. </label> <span class="help-block">(Easily unsubscribe at any time.)</span></div> </div> </div> <div class="pull-right"><small>* Required Field</small></div> <div class="form-group"> <div class="col-sm-12"><label class="sr-only" for="SubmitButton-makeoffer">Submit</label><input class="btn btn-primary" id="SubmitButton-makeoffer" name="SubmitButton" type="submit" value="Send"/></div> </div> </div> </fieldset> <p><input name="UnitId" type="hidden" value="0"/> <input name="FormType" type="hidden" value="Make Offer"/> <input name="AjaxTarget" type="hidden" value="/Forms/Ajax"/> <input id="RedirectUrl" name="RedirectUrl" type="hidden" value="/"/> <input name="JournalTemplate" type="hidden" value="interactrv/handlebar_templates/journal_offer.hbs"/> <input id="AccountEmailTemplate" name="AccountEmailTemplate" type="hidden" value="interactrv/handlebar_templates/lead_offer.hbs"/> <input id="CustomerEmailTemplate" name="CustomerEmailTemplate" type="hidden" value="interactrv/handlebar_templates/make_offer.hbs"/> <input id="RegularPriceLabel" name="RegularPriceLabel" type="hidden" value=""/><input id="ConfirmationId" name="ConfirmationId" type="hidden" value=""/></p> </div> <input name="__RequestVerificationToken" type="hidden" value="CfDJ8Mg3XaYAmgxNvn8WEUmRKT9V3o_-YTWg6CQAkGur2sg7IO8vTvbutQ5GlpXfoJqlPe0Uq__G4Oj0U2q65YhHhOn8RBJeaf0xhhrvjoBnEdutYCJUXa6nOVEQsi5m8Npk39e3Ct4UTekimxJmgfSEfU4"/>
</form>
