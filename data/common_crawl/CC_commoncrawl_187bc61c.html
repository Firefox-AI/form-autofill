<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="email-wrap elem-wrap"> <input aria-label="Enter your email address to subscribe" class="required email" data-moz-autofill-type="email" name="EMAIL" onblur="if (this.value == '')this.value = this.defaultValue;" onfocus="if (this.value == this.defaultValue)this.value = '';" placeholder="Your Email" type="email"/> <button aria-label="Submit email address" class="button" name="subscribe" type="submit" value=""> Go </button> </div> <span class="email-err err-msg req" style="display:none;">Email is required</span> <span class="email-err err-msg not-valid" style="display:none;">Email is not valid</span> <div class="success res-msg" style="display:none;">Thanks for your subscription.</div> <div class="failed res-msg" style="display:none;">Failed to subscribe, please contact admin.</div>
</form>

</fieldset></body></html>
