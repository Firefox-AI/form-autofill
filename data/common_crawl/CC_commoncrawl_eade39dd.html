<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="fields"> <input name="variant" type="hidden" value="139113"/> <input name="type" type="hidden" value="2"/> <div class="form-row" id="inputName"> <label class="title" for="name_input_overlay">Name <span class="required">*</span></label> <input data-moz-autofill-type="given-name" id="name_input_overlay" name="name" required="" type="text"/> <div class="validationError">Please enter your name</div> </div> <div class="form-row" id="inputEmail"> <label class="title" for="email_input_overlay">Email <span class="required">*</span></label> <input data-moz-autofill-type="email" id="email_input_overlay" name="email" required="" type="email"/> <div class="validationError">Please enter your email</div> </div> <div class="form-row" id="inputPhone"> <label class="title" for="phone_input_overlay">Phone <span class="required">*</span></label> <input data-moz-autofill-type="tel" id="phone_input_overlay" maxlength="14" name="phone" required="" type="tel"/> <div class="validationError">Please enter your phone</div> </div> <div class="form-row" id="inputZip"> <label class="title" for="zip_input_overlay"> Zip Code <span class="required">*</span> </label> <input data-moz-autofill-type="postal-code" id="zip_input_overlay" name="zip" required="" type="text"/> <div class="validationError">Please enter your Zip Code</div> </div> <div class="form-row" id="inputComment"> <label class="title" for="comments_input_overlay">Comments <span class="required">*</span></label> <textarea id="comments_input_overlay" name="comments" required=""></textarea> <div class="validationError">Please enter your comments</div> </div> </div> <div class="g-recaptcha" id="product-overlay-form"></div> <button class="contact-button" form="contactFormOverlay" type="button">Send Email</button> <small class="required"> * required</small>
</form>

</fieldset></body></html>
