<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="input-wrap"> <label>Email address for newsletters</label> <input data-moz-autofill-type="email" id="article-modal-contact-email" name="email" placeholder="you@youremail.com" type="email"/> </div> <div class="half-wrap"> <div class="input-wrap half-w"> <label>First Name</label> <input data-moz-autofill-type="given-name" id="article-modal-contact-first-name" name="first_name" placeholder="Sue" type="text"/> </div> <div class="input-wrap half-w"> <label>Last Name</label> <input data-moz-autofill-type="family-name" id="article-modal-contact-last-name" name="last_name" placeholder="Smith" type="text"/> </div> </div> <div class="input-wrap"> <label>Set your password</label> <input id="article-modal-password" name="password" placeholder="password" type="password"/> </div> <div class="input-wrap"> <label>Company</label> <input data-moz-autofill-type="organization" id="article-modal-company" name="company" type="text"/> </div> <div class="input-wrap"> <label>Title</label> <select data-moz-autofill-type="other" id="article-modal-profession-id" name="profession_id"> </select> </div> <button id="finish-checkout" type="submit"><span>Welcome to Select</span></button>
</form>
