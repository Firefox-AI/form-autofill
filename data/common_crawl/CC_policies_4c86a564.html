<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>policies.google.com</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-item" id="contact-form-item-id_name"> <div class="field"> <label for="id_name">Name</label> <input data-moz-autofill-type="name" id="id_name" maxlength="255" name="name" type="text"/> </div> </div> <div class="form-item" id="contact-form-item-id_email_address"> <div class="field"> <label for="id_email_address">Email address</label> <input data-moz-autofill-type="email" id="id_email_address" maxlength="255" name="email_address" type="text"/> </div> </div> <div class="form-item" id="contact-form-item-id_contact_number"> <div class="field"> <label for="id_contact_number">Contact number</label> <input data-moz-autofill-type="tel" id="id_contact_number" maxlength="255" name="contact_number" type="text"/> </div> </div> <div class="form-item" id="contact-form-item-id_number_of_people"> <div class="field"> <label for="id_number_of_people">Number of people</label> <input id="id_number_of_people" maxlength="255" name="number_of_people" type="text"/> </div> </div> <div class="form-item" id="contact-form-item-id_marketing_channel"> <div class="field"> <label for="id_marketing_channel">How did you hear about us?</label> <input id="id_marketing_channel" maxlength="255" name="marketing_channel" type="text"/> </div> </div> <div class="form-item" id="contact-form-item-id_message"> <div class="field"> <label for="id_message">Message or special request</label> <textarea cols="40" id="id_message" name="message" rows="10"></textarea> </div> </div> <div class="form-item" id="contact-form-item-id_since"> <div class="field"> <label for="id_since"></label> <input class="hidden" id="id_since" name="since" type="text" value="2024-11-02 04:11:13"/> </div> </div> <div class="form-item" id="contact-form-item-id_comment"> <div class="field"> <label for="id_comment"></label> <textarea class="hidden" cols="40" id="id_comment" name="comment" rows="10"></textarea> </div> </div> <div class="form-item" id="contact-form-item-id_recaptcha_token"> <div class="field"> <label for="id_recaptcha_token"></label> <textarea class="hidden" cols="40" id="id_recaptcha_token" name="recaptcha_token" rows="10"></textarea> </div> </div> <input id="id_dial_code" name="dial_code" type="hidden"/> <div class="form-item"> <p class="recaptcha-privacy-statement">This site is protected by reCAPTCHA and the Google <a href="https://policies.google.com/privacy" rel="noopener noreferrer" target="_blank">Privacy Policy</a> and <a href="https://policies.google.com/terms" rel="noopener noreferrer" target="_blank">Terms of Service</a> apply.</p> <input class="res-button color-30 color-3-background color-4-background-hover" id="id_form_submit" name="form_submit" type="submit" value="Send"/> </div>
</form>

</fieldset></body></html>
