<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="modal-dialog modal-dialog-centered"> <div class="modal-content"> <div class="modal-header"> <h3>Product Enquiry Form <small>Complete this form to email us your enquiry.</small></h3> </div> <div class="modal-body" id="productquestion"> <input name="inp-submit" type="hidden" value="y"/> <input name="inp-sku" required="" size="40" type="hidden" value="IDEO-COND01-E"/> <div class="form-group"><label for="inp-first_name">First Name </label> <p class="small text-danger"><label for="inp-first_name">Required</label></p> <input class="form-control" data-moz-autofill-type="given-name" id="inp-first_name" name="inp-first_name" required="" size="40" type="text" value=""/> <input class="hidden" name="inp-title" type="text" value=""/></div> <div class="form-group"><label>Surname</label> <input class="form-control" data-moz-autofill-type="family-name" name="inp-last_name" size="40" type="text" value=""/></div> <div class="form-group"><label>Contact Phone Number</label> <input class="form-control" data-moz-autofill-type="tel" name="inp-phone" size="40" type="text" value=""/></div> <div class="form-group"><label>Email Address </label> <p class="small text-danger"><label>Required</label></p> <input class="form-control" name="inp-email" required="" size="40" type="email" value=""/></div> <div class="form-group"><label>Preferred Method of Contact</label> <select class="form-control" name="inp-contact_method"><option data="" end="" value="Email">Email</option><option data="" end="" value="Phone">Phone</option> </select></div> <div class="form-group"><label>Message</label><textarea class="form-control col-xs-12 col-md-6" name="inp-msg" rows="5"></textarea></div> <div class="form-group"> <div class="clear"> </div> <p><input name="state" type="hidden" value="email_sent"/></p> </div> </div> <div class="modal-footer"> <button class="btn btn-warning btn-lg" data-dismiss="modal" style="width: 49%" type="button">Close</button> <input class="btn btn-lg btn-success" style="width: 49%" type="submit" value="Send Email"/> </div> </div> </div>
</form>

</fieldset></body></html>
