<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes cols-n12">Your email address will not be published.</p><div class="frmspr cols-n4"><label class="icofrm fa-user"><input data-moz-autofill-type="given-name" id="author" name="author" placeholder="Name" size="30" type="text" value=""/></label></div><div class="frmspr cols-n4"><label class="icofrm fa-envelope"><input data-moz-autofill-type="email" id="email" name="email" placeholder="Email" size="30" type="text" value=""/></label></div><div class="frmspr cols-n4"><label class="icofrm fa-link"><input id="url" name="url" placeholder="Website" size="30" type="text" value=""/></label></div><div style="clear:both"></div><div class="cols-n12"><label class="icofrm fa-comment" for="comment"><textarea aria-required="true" cols="66" id="comment" name="comment" placeholder="Your comment here..." rows="6"></textarea></label></div><div style="clear:both"></div><p class="form-submit cols-n12"><input class="submit" id="submit" name="submit" type="submit" value="Post Comment"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="10807"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
