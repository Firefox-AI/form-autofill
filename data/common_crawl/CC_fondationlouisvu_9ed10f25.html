ype="given-name" id="last_name" placeholder="First name" required="" type="text"/> </div> </div> </div> <div class="sidebar__payment-form-row" data-cart-step-payment-row=""> <div class="form__element form__element--input"> <label class="form__label" data-adyen-formlabel='{"default":"Email","free":null}' for="email">Email*</label> <div class="form__input-container" data-behavior="custom-focus"> <input class="form__input" data-custom-focus-target="" data-moz-autofill-type="email" id="email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" placeholder="Email address" required="" type="email"/> </div> </div> </div> <div class="sidebar__payment-form-row" data-cart-step-payment-row=""> <div class="form__element form__element--checkbox"> <div class="form__checkbox" data-behavior="custom-focus"> <input class="form__checkbox-input sr-only" data-custom-focus-target="" id="ioptin" name="optin" type="checkbox" value="1"/> <label class="form__checkbox-label" for="ioptin"> I would like to receive news and information on upcoming events organized by the Fondation Louis Vuitton </label> </div> </div> </div> </div> <div class="sidebar__step-footer"> <button class="button" data-adyen-submit='{"default":"Validate and pay","free":"Set"}' disabled="" type="submit"> <span class="button__label"> Validate and pay </span> </button> </div>
