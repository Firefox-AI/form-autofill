<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="formid" type="hidden" value="wlrForm"/> <input name="hash" type="hidden" value=""/> <fieldset class="field-text newsletter-name" id="fieldset-wlrForm-firstname"> <input class="required" data-moz-autofill-type="given-name" id="firstname" name="firstname" placeholder="First name" type="text"/> </fieldset> <fieldset class="field-text newsletter-surname" id="fieldset-wlrForm-surname"> <input autocomplete="off" class="required" data-moz-autofill-type="family-name" id="surname" name="surname" placeholder="Surname" type="text"/> </fieldset> <fieldset class="field-text newsletter-email" id="fieldset-wlrForm-email"> <input class="validate-email required" data-moz-autofill-type="email" id="email" name="email" placeholder="Email address (eg.yourname@email.com)" type="text"/> </fieldset> <fieldset class="form-buttons newsletter-submit"> <input class="newsletter-submit-button" id="submit" name="submit" style="-webkit-appearance: none;" type="submit" value="Get Newsletter"/> </fieldset>
</form>

</fieldset></body></html>
