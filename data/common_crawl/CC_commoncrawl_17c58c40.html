<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="orgid" type="hidden" value=""/> <div class="form-group"> <label class="required" for="fname">First Name:</label> <input class="form-control" data-moz-autofill-type="given-name" id="fname" name="fname" required="" type="text"/> </div> <div class="form-group"> <label class="required" for="lname">Last Name:</label> <input class="form-control" data-moz-autofill-type="family-name" id="lname" name="lname" required="" type="text"/> </div> <div class="form-group"> <label class="required" for="email">E-mail:</label> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" required="" type="email"/> </div> <div class="form-group row mt2"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required" for="age" style="margin-top: 0.4em;">Age</label> <div class="col-sm-9 col-md-8 col-lg-9"> <input class="form-control" id="age" max="140" min="18" name="age" oninvalid="setCustomValidity('gcui_oca:age-limit')" onkeyup="try{setCustomValidity('')}catch(e){}" required="" type="number"/> </div> </div> <div class="form-group row"> <label class="col-sm-3 control-label required pr0" style="margin-top: 0.4em;">Gender</label> <div class="col-sm-9"> <div class="row"> <div class="col-xs-6 gender-half-left"> <label class="gender-checkbox"> <input name="gender" required="" type="radio" value="male"/> Male </label> </div> <div class="col-xs-6 gender-half-right"> <label class="gender-checkbox"> <input name="gender" required="" type="radio" value="female"/> Female </label> </div> </div> </div> </div> <div class="form-group row"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required pr0" for="country" style="margin-top: 0.4em;">Country</label> <div class="col-sm-9 col-md-8 col-lg-9"> <select class="form-control" data-moz-autofill-type="country" id="country" name="country" required=""> <option></option> </select> <input id="countryname" name="countryname" type="hidden"/> </div> </div> <div class="form-group row mt2"> <label class="col-sm-3 col-md-4 col-lg-3 control-label required" for="zipcode">Postal code</label> <div class="col-sm-9 col-md-8 col-lg-9 zipcode-input"> <input class="form-control" data-moz-autofill-type="postal-code" id="zipcode" name="zipcode" type="text"/> </div> </div> <div class="form-group row"> <label class="col-sm-3 col-md-4 col-lg-3 control-label pr0" for="phone">Phone number</label> <div class="col-sm-9 col-md-8 col-lg-9"> <input class="form-control" data-moz-autofill-type="tel" id="phone" name="phone" type="tel"/> </div> </div> <div class="hidden-xs"> <button class="btn btn-lg btn-primary btn-oca-submit btn-squiggly" type="submit"> START YOUR TEST </button> </div>
</form>

</fieldset></body></html>
