el=" Year of your birth" aria-required="true" autocomplete="bday-year" class="date" id="signup_dateofbirth_year" maxlength="4" name="demo_9" required="" type="text"/> </span> </div> <div class="field_holder field_required"> <label for="signup_zipcode">ZIP CODE <span class="field_info field_invalid">5 DIGITS REQUIRED </span></label> <span class="input_holder input_text"> <input aria-required="true" autocomplete="postal-code" class="text" data-moz-autofill-type="postal-code" id="signup_zipcode" maxlength="5" name="demo_2" required="" type="text" value=""/> </span> </div> <input class="submit" type="submit" value="Submit"/> </fieldset> </div> <input name="mtaction" type="hidden" value="subscribe"/> <input name="mtsite" type="hidden" value="136"/>
