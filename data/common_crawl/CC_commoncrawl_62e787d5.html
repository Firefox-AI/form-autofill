<p class="comment-notes"><span id="email-notes">Het e-mailadres wordt niet gepubliceerd.</span> <span class="required-field-message">Vereiste velden zijn gemarkeerd met <span class="required">*</span></span></p><div class="row"> <div class="col-md-4"> <div class="form-group label-floating is-empty"> <label class="control-label">Naam</label><input class="form-control" data-moz-autofill-type="given-name" id="author" name="author" type="text"/> <span class="hestia-input"></span> </div> </div> <div class="col-md-4"> <div class="form-group label-floating is-empty"> <label class="control-label">E-mail</label><input class="form-control" data-moz-autofill-type="email" id="email" name="email" type="email"/> <span class="hestia-input"></span> </div> </div> <div class="col-md-4"> <div class="form-group label-floating is-empty"> <label class="control-label">Site</label><input class="form-control" id="url" name="url" type="url"/> <span class="hestia-input"></span> </div> </div> </div> <div class="form-group label-floating is-empty"> <label class="control-label">Waar denk je aan?</label><textarea aria-required="true" class="form-control" id="comment" name="comment" rows="6"></textarea><span class="hestia-input"></span> </div><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Mijn naam, e-mail en site bewaren in deze browser voor de volgende keer wanneer ik een reactie plaats.</label></p> <p class="form-submit"><input class="btn btn-primary pull-right" id="submit" name="submit" type="submit" value="Reactie plaatsen"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="2531"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
