<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="alert alert-danger d-none" id="fmm-sow-error"></div><div class="form-group col-md-6"> <label for="first_name"><b>Nombre</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" id="first_name" name="first_name" type="text" value=""/></div><div class="form-group col-md-6"> <label for="last_name"><b>Apellido</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" id="last_name" name="last_name" type="text" value=""/></div><div class="form-group col-md-6"> <label for="phone"><b>Celular</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" id="phone" name="phone" type="text" value=""/></div><div class="form-group col-md-6"> <label for="phone"><b>Email</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" type="text" value=""/></div><div class="clearfix visible-md visible-lg"></div><div class="form-group col-md-6"> <label for="id_country"><b>Pais</b><sup class="required" style="color:red;">*</sup></label> <select class="form-control" id="id_country" name="id_country"><option value="144">Mexico</option> </select></div><div class="form-group col-md-6"> <label for="id_sow_state"><strong>Estado</strong><sub> (opcional)</sub></label> <select class="noUniform form-control form-control-select" data-moz-autofill-type="address-level1" id="id_sow_state" name="id_sow_state"><option value="353"> Aguascalientes</option><option value="354"> Baja California</option><option value="355"> Baja California Sur</option><option value="356"> Campeche</option><option value="357"> Chiapas</option><option value="358"> Chihuahua</option><option value="359"> Coahuila</option><option value="360"> Colima</option><option value="361"> Ciudad de Mexico</option><option value="362"> Durango</option><option value="363"> Guanajuato</option><option value="364"> Guerrero</option><option value="365"> Hidalgo</option><option value="366"> Jalisco</option><option value="367"> Estado de Mexico</option><option value="368"> Michoacan</option><option value="369"> Morelos</option><option value="370"> Nayarit</option><option value="371"> Nuevo Leon</option><option value="372"> Oaxaca</option><option value="373"> Puebla</option><option value="374"> Queretaro</option><option value="375"> Quintana Roo</option><option value="376"> San Luis Potosi</option><option value="377"> Sinaloa</option><option value="378"> Sonora</option><option value="379"> Tabasco</option><option value="380"> Tamaulipas</option><option value="381"> Tlaxcala</option><option value="382"> Veracruz</option><option value="383"> Yucatan</option><option value="384"> Zacatecas</option> </select></div><div class="form-group col-md-6"> <label for="city"><b>Codigo Postal y Ciudad</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" id="city" name="city" type="text" value=""/></div><div class="form-group col-md-6"> <label for="address"><b>Direccion</b><sup class="required" style="color:red;">*</sup></label> <input class="form-control" data-moz-autofill-type="street-address" id="address" name="address" type="text" value=""/></div>
</form>
