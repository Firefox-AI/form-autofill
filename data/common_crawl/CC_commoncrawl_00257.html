<form>
<h5> Personal Details</h5><hr/><div class="row"><div class="col-6"><p class="form-row form-row-first"> <label for="reg_billing_first_name">First name<span class="required">*</span></label> <input class="input-text width100" data-moz-autofill-type="given-name" id="reg_billing_first_name" name="billing_first_name" type="text" value=""/></p></div><div class="col-6"><p class="form-row form-row-last"> <label for="reg_billing_last_name">Last name<span class="required">*</span></label> <input class="input-text width100" data-moz-autofill-type="family-name" id="reg_billing_last_name" name="billing_last_name" type="text" value=""/></p></div></div><div class="row"><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_email">Email address <span class="required">*</span></label> <input autocomplete="email" class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="email" id="reg_email" name="email" type="email" value=""/></p></div><div class="col-sm-6"><p class="form-row form-row-wide"> <label for="reg_billing_phone">Phone<span class="required">*</span></label> <input class="input-text width100" data-moz-autofill-type="tel" id="reg_billing_phone" name="billing_phone" type="text" value=""/></p></div><div class="col-sm-6"><p class="form-row form-row-wide"> <label for="birthday_field">Date of Birth<span class="required">*</span></label> <input class="input-text width100" name="birthday_field" type="date" value=""/></p></div><div class="col-sm-6"><p class="form-row form-row-first"> <label for="reg_billing_gender">Gender</label> <select class="input-text" data-moz-autofill-type="sex" id="reg_billing_gender" name="billing_gender"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option> </select></p></div></div><h5> Contact Details</h5><hr/><div class="row"><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_billing_country">Country / Region <span class="required">*</span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="country" id="reg_billing_country" name="billing_country" type="text" value=""/></p></div><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_billing_state">State <span class="required">*</span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="address-level1" id="reg_billing_state" name="billing_state" type="text" value=""/></p></div><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_billing_address_1">Street address <span class="required">*</span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="address-line1" id="reg_billing_address_1" name="billing_address_1" type="text" value=""/></p></div><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_billing_city">Town / City <span class="required">*</span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="address-level2" id="reg_billing_city" name="billing_city" type="text" value=""/></p></div><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_billing_postcode">Postcode <span class="required">*</span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="postal-code" id="reg_billing_postcode" name="billing_postcode" type="text" value=""/></p></div><div class="col-sm-6"><p class="woocommerce-form-row woocommerce-form-row--wide form-row form-row-wide"> <label for="reg_tele">Contact Number <span class="required"></span></label> <input class="woocommerce-Input woocommerce-Input--text input-text width100" data-moz-autofill-type="tel" id="reg_tele" name="reg_tele" placeholder="STD Code + Telephone No" type="text"/></p></div></div><div class="terms_checkbox mt-1 mb-3"> <input class="input-text" id="reg_billing_check_box" name="billink_checkbox" type="checkbox" value=""/> <label for="reg_billing_check_box">Agree to Terms &amp; Condition<span class="required">*</span></label></div><p class="mb-2">A password will be sent to your email address.</p><div class="g-recaptcha" data-sitekey="6LcgtgInAAAAACTrpidGsQm1Jd55EGJqy-IWwPGh"></div> <br/> <wc-order-attribution-inputs></wc-order-attribution-inputs><div class="woocommerce-privacy-policy-text"></div><p class="woocommerce-FormRow form-row"> <input id="woocommerce-register-nonce" name="woocommerce-register-nonce" type="hidden" value="6c1c2abd5f"/><input name="_wp_http_referer" type="hidden" value="/register/"/> <button class="woocommerce-Button woocommerce-button button woocommerce-form-register__submit mb-4" name="register" type="submit" value="Register">Register Now</button></p>
