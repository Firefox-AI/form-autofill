ngth="250" name="custom_field_street" type="text" value=""/></li><li class="wppb-form-field wppb-input" id="wppb-form-element-25"> <label for="custom_field_zip">PLZ<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input class="extra_field_input" data-moz-autofill-type="postal-code" id="custom_field_zip" maxlength="250" name="custom_field_zip" type="text" value=""/></li><li class="wppb-form-field wppb-input" id="wppb-form-element-26"> <label for="custom_field_city">Ort<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input class="extra_field_input" data-moz-autofill-type="address-level2" id="custom_field_city" maxlength="250" name="custom_field_city" type="text" value=""/></li><li class="wppb-form-field wppb-default-e-mail" id="wppb-form-element-8"> <label for="email">E-Mail<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input class="text-input default_field_email" data-moz-autofill-type="email" id="email" maxlength="70" name="email" type="email" value=""/></li><li class="wppb-form-field wppb-input" id="wppb-form-element-27"> <label for="custom_field_phone">Telefon</label> <input class="extra_field_input" data-moz-autofill-type="tel" id="custom_field_phone" maxlength="250" name="custom_field_phone" type="text" value=""/></li><li class="wppb-form-field wppb-default-username" id="wppb-form-element-2"> <label for="username">Benutzername<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input class="text-input default_field_username" data-moz-autofill-type="loginname" id="username" maxlength="70" name="username" type="text" value=""/><span class="wppb-description-delimiter">Benutzernamen können nicht geändert werden.</span></li><li class="wppb-form-field wppb-default-password" id="wppb-form-element-15"> <label for="passw1">Passwort<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input autocomplete="off" class="text-input" id="passw1" maxlength="70" name="passw1" type="password" value=""/><span class="wppb-description-delimiter">Mindestlänge von 8 Zeichen. </span></li><li class="wppb-form-field wppb-default-repeat-password" id="wppb-form-element-16"> <label for="passw2">Passwort wiederholen<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label> <input autocomplete="off" class="text-input" id="passw2" maxlength="70" name="passw2" type="password" value=""/><span class="wppb-description-delimiter">Bitte gib dein Passwort erneut ein.</span></li><li class="wppb-form-field wppb-recaptcha" id="wppb-form-element-21"><label for="recaptcha_response_field">Captcha<span class="wppb-required" title="Dieses Feld ist erforderlich">*</span></label><div class="wppb-recaptcha-element" id="wppb-recaptcha-element-pb_register1"></div></li></ul><ul><li class="wppb-form-field wppb-send-credentials-checkbox"><label for="send_credentials_via_email"><input id="send_credentials_via_email" name="send_credentials_via_email" type="checkbox" value="sending"/>Ich möchte die hier eingegebenen Daten per E-Mail erhalten.</label></li></ul> <p class="form-submit"> <input class="submit button" id="register" name="register" type="submit" value="Registrieren"/> <input name="redirect_to" type="hidden" value=""/> <input id="action" name="action" type="hidden" value="register"/> <input id="form_name" name="form_name" type="hidden" value="unspecified"/> <input id="form_id" name="form_id" type="hidden" value=""/> <input name="wppb_referer_url" type="hidden" value=""/> </p> <input id="register_unspecified_nonce_field" name="register_unspecified_nonce_field" type="hidden" value="94640ce1d9"/><input name="_wp_http_referer" type="hidden" value="/vereinsintranet-login/?wppb_referer_url=https%3A%2F%2Fwww.karl-may-spiele-bischofswerda.de%2Fpersonalaenderung%2F"/>
