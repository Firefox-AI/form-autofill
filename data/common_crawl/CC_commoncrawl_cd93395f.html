<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="product_id" type="hidden" value="20862"/> <div class="fieldset"> <h2 class="legend">Kontaktinformationen</h2> <ul class="form-list"> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="company_name">Firma</label> <input class="input-text" data-moz-autofill-type="organization" id="company_name" name="company_name" title="Firma" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="personal_name">Name<em>*</em></label> <input class="input-text required-entry" id="personal_name" name="personal_name" title="Name" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="address">Adresse<em>*</em></label> <input class="input-text required-entry" data-moz-autofill-type="street-address" id="address" name="address" title="Adresse" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="zipcode">PLZ<em>*</em></label> <input class="input-text" data-moz-autofill-type="postal-code" id="zipcode" name="zipcode" title="PLZ" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="city">Ort<em>*</em></label> <input class="input-text required-entry" data-moz-autofill-type="address-level2" id="city" name="city" title="Ort" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="country_id">Land<em>*</em></label> <select class="validate-select" data-moz-autofill-type="country" id="country" name="country_id" title="Land"><option value=""> </option><option value="BE">Belgien</option><option value="DK">Dänemark</option><option selected="selected" value="DE">Deutschland</option><option value="FR">Frankreich</option><option value="IT">Italien</option><option value="LU">Luxemburg</option><option value="NL">Niederlande</option><option value="NO">Norwegen</option><option value="AT">Österreich</option></select> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="phone">Telefon<em>*</em></label> <input class="input-text required-entry" data-moz-autofill-type="tel" id="phone" name="phone" title="Telefon" type="text" value=""/> </div> </div> </li> <li class="fields"> <div class="field"> <div class="input-box"> <label class="required" for="customer_email">eMail<em>*</em></label> <input class="input-text required-entry validate-email" data-moz-autofill-type="email" id="customer_email" name="customer_email" title="eMail" type="text" value=""/> </div> </div> </li> <li class="fields"> </li> <li class="fields"> </li> <li class="wide"> <div class="input-box"> <label class="required">2 + 3 = ?<em>*</em></label> <input class="required-entry input-text captcha-input" id="captcha_text" name="captcha_text" placeholder="Ihre Antwort" type="text" value=""/><br/> <p class="text-danger"></p> </div> </li> <li class="wide"> <div class="input-box"> <label class="required" for="detail">Anfrage<em>*</em></label> <textarea class="required-entry input-text" cols="5" id="detail" name="detail" placeholder="Bitte teilen Sie uns Material, Format und Menge bzw. die gewünschten Artikeloptionen mit." rows="3" title="Anfrage"></textarea> </div> </li> </ul> </div> <div class="buttons-set"> <p class="required">* Pflichtfelder</p> <input id="hideit" name="hideit" style="display:none !important;" type="text" value=""/> <button class="button btn-round-enquiry-send" title="Absenden" type="submit"><span><span>Absenden</span></span></button> </div>
</form>
