<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="typez" type="hidden" value="mobileregister"/> <div class="modal-body"> <div class="form-group"> <label>Full Name</label> <input class="form-control" data-moz-autofill-type="name" name="your_name" placeholder="Full Name" required="required" type="text"/> </div> <div class="form-group"> <label>Email</label> <input class="form-control" data-moz-autofill-type="email" name="your_email" placeholder="Email Address" type="text"/> </div> <div class="form-group"> <label>Mobile Number</label> <input class="form-control" data-moz-autofill-type="tel" id="otpmobile" maxlength="10" name="otpmobile" placeholder="Enter your mobile number" type="text"/> </div> <div class="form-group"> <label>Password</label> <input class="form-control" name="your_password" placeholder="Password" type="password"/> </div> <div class="row"> <div class="col-xs-12 col-sm-6 col-md-6"> <div class="form-group"> <label for="security_text">Captcha</label> <input class="form-control entryBox form-input" id="security_text" name="security_text" placeholder="Verify Security Text" type="text"/> </div> </div> <div class="col-xs-12 col-sm-6 col-md-6"> <div class="form-group"> <label for="captcha8"><a href="javascript:displayManager.captCha('captcha8');" style="font-weight:bold;">Refresh</a></label> <div id="captcha8">Loading captcha...</div> </div> </div> </div> <div class="form-group mobileREGTP hide"> <label>Enter OTP</label> <input class="form-control" id="regtpnumber" name="regtpnumber" placeholder="Enter OTP here" type="text"/> <div class="help-block" style="font-size:13px;color:#6a6a6a;">Enter OTP here sent at your mobile number</div> </div> <div id="result-register"></div> </div> <div class="modal-footer"> <div class="pull-left"></div> <button class="btn btn-primary pull-right submitRegister" type="button">Register <i aria-hidden="true" class="fa fa-lock"></i></button> </div>
</form>

</fieldset></body></html>
