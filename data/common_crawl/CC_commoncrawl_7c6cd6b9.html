<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="create_customer"/><input name="utf8" type="hidden" value="✓"/> <input name="return_to" type="hidden" value="/account"/> <input data-customer-type="tags" name="customer[tags]" type="hidden" value="professional"/> <div> <label class="label" data-item="accent-text" for="first_name"> First Name </label> <input class="text" data-moz-autofill-type="given-name" id="first_name" name="customer[first_name]" required="" size="30" type="text" value=""/> </div> <div> <label class="label" data-item="accent-text" for="last_name"> Last Name </label> <input class="text" data-moz-autofill-type="family-name" id="last_name" name="customer[last_name]" required="" size="30" type="text" value=""/> </div> <div> <label class="label" data-item="accent-text" for="delivery_address"> Delivery address </label> <input class="text" data-moz-autofill-type="street-address" id="delivery_address" name="customer[note][Delivery address]" required="" size="30" type="text" value=""/> </div> <div> <label class="label" data-item="accent-text" for="company_name"> Company name </label> <input class="text" data-moz-autofill-type="organization" id="company_name" name="customer[note][Company name]" required="" size="30" type="text" value=""/> </div> <div> <label class="label" data-item="accent-text" for="invoicing_address"> Invoicing address </label> <input class="text" data-moz-autofill-type="street-address" id="invoicing_address" name="customer[note][Invoicing address]" required="" size="30" type="text" value=""/> </div> <vat-input> <label class="label" data-item="accent-text" for="vat"> Vat registration number </label> <input class="text" data-moz-autofill-type="vat-number" id="vat" name="customer[note][VAT Registration Number]" size="30" type="text"/> </vat-input> <div> <label class="" data-item="accent-text" for="not_vat"> <input id="not_vat" name="customer[note][Not liable to VAT]" type="checkbox" value="yes"/> <span>Not liable to VAT</span> </label> </div> <div> <label class="label" data-item="accent-text" for="email"> Email </label> <input class="text" data-moz-autofill-type="email" id="email" name="customer[email]" required="" size="30" type="email"/> </div> <div> <label class="label" data-item="accent-text" for="password"> Password </label> <input class="password text" id="password" name="customer[password]" required="" size="30" type="password"/> </div> <div class="account--button-container"> <div class="account--create" data-item="button"> <button type="submit" value="Sign up"> Sign up </button> </div> </div>
</form>

</fieldset></body></html>
