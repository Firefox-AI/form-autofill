<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-row"><div class="col-12 col-lg-6"><div class="mb-3"><label for="first_name"><span class="notranslate">First Name</span><span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="given-name" id="first_name" name="first_name" required=""/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="last_name"><span class="notranslate">Last Name</span><span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="family-name" id="last_name" name="last_name" required=""/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="Address">Address <span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="address-line1" data-required="true" id="Address" name="Address"/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="City">City <span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="address-level2" data-required="true" id="City" name="City"/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="Zip_Code">Zip Code <span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="postal-code" data-required="true" id="Zip_Code" name="Zip Code"/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="email"><span class="notranslate">Email</span><span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" required=""/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="State">State <span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="address-level1" data-required="true" id="State" name="State"/></div></div><div class="col-12 col-lg-6"><div class="mb-3"><label for="phone"><span class="notranslate">Phone</span><span class="notranslate text-danger">*</span></label> <input class="form-control" data-moz-autofill-type="tel" id="phone" name="phone" required=""/></div></div><div class="col-12"><div class="mb-3"><label for="How_do_you_want_to_receive_your_copy_">How do you want to receive your copy? <span class="notranslate text-danger">*</span></label><div class="radio-wrapper"><div class="custom-control custom-radio"><input checked="" class="custom-control-input" id="How_do_you_want_to_receive_your_copy__Email" name="How do you want to receive your copy?" onchange="removeClassAndUnchecked()" required="" type="radio" value="Email"/> <label class="custom-control-label" for="How_do_you_want_to_receive_your_copy__Email">Email</label></div><div class="custom-control custom-radio"><input class="custom-control-input" id="How_do_you_want_to_receive_your_copy__Mail" name="How do you want to receive your copy?" onchange="addClass()" required="" type="radio" value="Mail"/> <label class="custom-control-label" for="How_do_you_want_to_receive_your_copy__Mail">Mail</label></div><div class="custom-control custom-radio"><input class="custom-control-input" id="How_do_you_want_to_receive_your_copy__Both" name="How do you want to receive your copy?" onchange="addClass()" required="" type="radio" value="Both"/> <label class="custom-control-label" for="How_do_you_want_to_receive_your_copy__Both">Both</label></div></div></div></div><div class="col-12 d-none" id="targetElement"><div class="mb-4"><label for="How_do_you_want_to_receive_your_copy_">Receive mailed copy monthly or quarterly? <span class="notranslate text-danger">*</span></label><div class="radio-wrapper"><div class="custom-control custom-radio"><input class="custom-control-input" id="receive_mailed_monthly" name="Receive mailed copy monthly or quarterly?" required="" type="radio" value="Monthly"/> <label class="custom-control-label" for="receive_mailed_monthly">Monthly</label></div><div class="custom-control custom-radio"><input class="custom-control-input" id="receive_mailed_quarterly" name="Receive mailed copy monthly or quarterly?" required="" type="radio" value="Quarterly"/> <label class="custom-control-label" for="receive_mailed_quarterly">Quarterly</label></div></div></div></div><div class="col-12"><button class="btn btn-block btn-primary" role="button" type="submit">Submit</button></div></div>
</form>

</fieldset></body></html>
