<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Your email address will not be published.</span> <span class="required-field-message">Required fields are marked <span class="required">*</span></span></p><p class="comment-form-author"><label for="author">Name <span class="required">*</span></label> <input autocomplete="name" data-moz-autofill-type="name" id="author" maxlength="245" name="author" required="" size="30" type="text" value=""/></p> <p class="comment-form-email"><label for="email">Email <span class="required">*</span></label> <input aria-describedby="email-notes" autocomplete="email" data-moz-autofill-type="email" id="email" maxlength="100" name="email" required="" size="30" type="email" value=""/></p> <p class="comment-form-url"><label for="url">Website</label> <input autocomplete="url" id="url" maxlength="200" name="url" size="30" type="url" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p> <p class="comment-form-comment"><label for="comment">Comment</label><textarea cols="45" id="comment" maxlength="65525" name="comment" required="required" rows="8" spellcheck="false"></textarea></p><p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Post Comment"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="917"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
