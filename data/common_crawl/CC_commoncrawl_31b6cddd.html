<p><i>Common Crawl form, LLM-labeled.</i></p>

<input name="action" type="hidden" value="insertSave"/> <input name="module" type="hidden" value="user"/> <label for="username-input"><i class="far fa-user"></i> Choose Your J2Ski <b>Username</b></label> <input data-moz-autofill-type="loginname" id="username-input" maxlength="35" name="username" required="" title="Privacy Tip :- Don't use your real name or email as a Username" type="text" value=""/> <label for="email-input"><i class="far fa-envelope"></i> Enter Your <b>Email Address</b></label> <input data-moz-autofill-type="email" id="email-input" maxlength="255" name="email" required="" size="22" title="A Confirmation Email will be sent to this address, for you to activate your account" type="email" value=""/> <label for="password-input"><i class="far fa-key"></i> Enter Your <b>Password</b></label> <input class="post" id="password-input" maxlength="100" name="password" required="" size="22" type="password"/> <label for="password_confirm-input"><i class="far fa-key"></i> Confirm (repeat) Your <b>Password</b></label> <input id="password_confirm-input" maxlength="100" name="password_confirm" required="" size="22" type="password"/> <input id="skiAreaName-select" name="skiAreaName" type="hidden" value=""/> <table> <tr><td></td><td class="subtext"><i>Get our Weekly Report, and add...</i></td></tr> <tr><td class="td20"><input aria-label="Monday Snow Summary" checked="" name="mondaySummary" required="" type="checkbox"/></td><td>A Snow Summary every Monday <i class="far fa-envelope"></i></td></tr> <tr><td class="td20"><input aria-label="Powder Alerts" checked="" name="powderAlert" required="" type="checkbox"/></td><td>Powder Alerts for Big Snowfalls <i class="far fa-envelope"></i></td></tr> </table> <div id="captcha"></div> <input class="ctabut warm" name="submit" type="submit" value="Create My Snow Mail Account"/> <p class="subtext"><i>By signing up, you agree to <a href="/forum_terms_of_use.html" target="_blank">Our Rules</a>.</i></p>
</form>
