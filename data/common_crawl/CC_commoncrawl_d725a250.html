<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Tu dirección de correo electrónico no será publicada.</span> <span class="required-field-message">Los campos obligatorios están marcados con <span class="required">*</span></span></p><p class="comment-form-comment"><label for="comment">Comentario <span class="required">*</span></label> <textarea cols="45" id="comment" maxlength="65525" name="comment" required="required" rows="8"></textarea></p><p class="comment-form-author"><label for="author">Name *</label> <input data-moz-autofill-type="name" id="author" name="author" required="" size="30" type="text" value=""/></p> <p class="comment-form-email"><label for="email">E-mail *</label> <input data-moz-autofill-type="email" id="email" name="email" required="" size="30" type="email" value=""/></p> <p class="comment-form-url"><label for="url">Website</label> <input id="url" name="url" size="30" type="text" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Guarda mi nombre, correo electrónico y web en este navegador para la próxima vez que comente.</label></p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Publicar el comentario"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="36668"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
