<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="CellWrapper" style="padding: 10px;"> <div class="CellWrapper"> <div class="CellContent"> <div class="CellRow"> <label class="CellLabel" for="tbPrRequestCompany">Bedrijfsnaam:</label> <input class="required" data-moz-autofill-type="organization" id="tbPrRequestCompany" maxlength="255" name="PrRequestCompany" size="50" type="text" value=""/> </div> <div class="CellRow"> <label class="CellLabel" for="tbPrRequestContact">Contact:</label> <input class="required" id="tbPrRequestContact" maxlength="255" name="PrRequestContact" size="50" type="text" value=""/> </div> <div class="CellRow"> <label class="CellLabel" for="tbPrRequestPhone">Telefoon:</label> <input class="required" data-moz-autofill-type="tel" id="tbPrRequestPhone" maxlength="50" name="PrRequestPhone" size="50" type="text" value=""/> </div> <div class="CellRow"> <label class="CellLabel" for="tbPrRequestEmail">E-mail Adres:</label> <input class="required email" data-moz-autofill-type="email" id="tbPrRequestEmail" maxlength="50" name="PrRequestEmail" size="50" type="text" value=""/> </div> </div> </div> <div style="padding: 10px 0px; text-align:center;"> <img alt="captcha" id="imgCaptcha" src="/captcha/getimage/?w=200&amp;h=50"/> <br/> <br/> <span>Vul bovenstaande code hieronder in:</span> <br/> <input class="required" maxlength="6" name="captcha" style="width: 60px;" type="text"/> <br/> <a href="javascript:;" id="lnkCaptchaRefresh" style="font-size: smaller;">Klik hier om een nieuwe code te genereren.</a> <br/> <span id="errCaptcha" style="display: none; color: Red; font-weight: bold;"> Ingevoerde code is niet correct, gelieve opnieuw te proberen </span> </div> <div style="text-align: center;"> <input id="hdnPrRequestID" name="PrRequestID" type="hidden" value="0"/> <input id="hdnPrRequestQty" name="PrRequestQty" type="hidden" value="1"/> <input class="Btn1" id="btnPrRequestOk" style="margin: 2px auto;" type="submit" value="Opslaan"/> <input class="Btn2" id="btnPrRequestCancel" style="margin: 2px auto;" type="button" value="Annuleren"/> </div> </div>
</form>

</fieldset></body></html>
