<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-fields"><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Name"> <input class="material-input" data-moz-autofill-type="given-name" data-val="true" data-val-required="Enter Name" id="QuickQuote_Name" name="QuickQuote_Name" type="text"/> <span class="label-placeholder">Name <span class="required">*</span></span> </label> <span class="field-validation-valid" data-valmsg-for="QuickQuote_Name" data-valmsg-replace="true"></span></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Email"> <input class="material-input" data-moz-autofill-type="email" data-val="true" data-val-required="Enter Email" id="QuickQuote_Email" name="QuickQuote_Email" type="email"/> <span class="label-placeholder">Email Address <span class="required">*</span></span> </label> <span class="field-validation-valid" data-valmsg-for="QuickQuote_Email" data-valmsg-replace="true"></span></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_PhoneNumber"> <input class="material-input" data-moz-autofill-type="tel" data-val="true" data-val-required="Enter Phone Number" id="QuickQuote_PhoneNumber" name="QuickQuote_PhoneNumber" type="text"/> <span class="label-placeholder">Phone Number <span class="required">*</span></span> </label> <span class="field-validation-valid" data-valmsg-for="QuickQuote_PhoneNumber" data-valmsg-replace="true"></span></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Quantity1"> <input class="material-input" data-val="true" data-val-required="Enter Quantity" id="QuickQuote_Quantity1" name="QuickQuote_Quantity1" type="number"/> <span class="label-placeholder">Quantity 1 <span class="required">*</span></span> </label> <span class="field-validation-valid" data-valmsg-for="QuickQuote_Quantity1" data-valmsg-replace="true"></span></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Quantity1"> <input class="material-input" id="QuickQuote_Quantity2" name="QuickQuote_Quantity2" type="number"/> <span class="label-placeholder">Quantity 2</span> </label></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Quantity3"> <input class="material-input" id="QuickQuote_Quantity3" name="QuickQuote_Quantity3" type="number"/> <span class="label-placeholder">Quantity 3</span> </label></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_BrandingDetails"> <textarea class="material-input" id="QuickQuote_BrandingDetails" name="QuickQuote_BrandingDetails" rows="3" type="text" value=""></textarea> <span class="label-placeholder">Branding Details</span> </label></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_ProductColour"> <textarea class="material-input" id="QuickQuote_ProductColour" name="QuickQuote_ProductColour" rows="3" type="text" value=""></textarea> <span class="label-placeholder">Product Colour</span> </label></div></div><div class="inputs"><div class="input-feild"><label class="material-label" for="QuickQuote_Notes"> <textarea class="material-input" id="QuickQuote_Notes" name="QuickQuote_Notes" rows="3" type="text" value=""></textarea> <span class="label-placeholder">Additional notes</span> </label></div></div></div><div class="please-wait-small" id="updateTargetId-please-wait" style="display:none">Please wait</div><div class="buttons"><input class="btn large bgGreen with-icon" id="send-quick-quote-form" name="send-email" type="button" value="Send Request"/></div>
</form>

</fieldset></body></html>
