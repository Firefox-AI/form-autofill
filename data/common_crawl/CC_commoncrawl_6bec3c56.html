<form>
<input name="form_type" type="hidden" value="customer"/><input name="utf8" type="hidden" value="✓"/><input name="contact[tags]" type="hidden" value="newsletter"/><input aria-label="Voornaam" autocapitalize="words" class="input--small" data-moz-autofill-type="given-name" name="contact[first_name]" placeholder="Voornaam" type="text" value=""/><input aria-label="Je e-mailadres" aria-required="true" autocapitalize="off" autocorrect="off" class="input--small newsletter__input" data-moz-autofill-type="email" name="contact[email]" pattern="^[a-zA-Z0-9.!#$%&amp;'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$" placeholder="Je e-mailadres" required="required" type="email" value=""/> <input name="customer[accepts_marketing]" type="hidden" value=""/> <div class="checkbox"> <input checked="checked" id="newsletterOptin-footer" name="customer[accepts_marketing]" type="checkbox"/> <label class="text-small" for="newsletterOptin-footer">Stuur mij een e-mail met nieuws en aanbiedingen</label> </div><button class="btn btn--primary full" name="commit" type="submit"> <span class="btn__text"> <span aria-hidden="true" class="material-icons-outlined">email</span> <span class="submit_btn_text">Abonneren</span> </span> </button>
</form>
