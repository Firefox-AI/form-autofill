<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="event-ticket-form"> <div> <span class="form-close"><i class="fa fa-close"></i></span> <div class="causes-form-wrap view-single active view-initial" data-group="payment-info" data-name="donor-info"> <div class="dynamic-data" data-target="items" data-template='&lt;table&gt; &lt;tr&gt; &lt;th&gt;Donate to&lt;/th&gt; &lt;td data-title="Donate to"&gt;{{_title_}}&lt;/td&gt; &lt;/tr&gt; &lt;/table&gt; '></div> <div class="clear-both"></div> <div class="row-amount"> <p>How much would you like to donate?</p> <div class="row"> <div class="col-12 col-lg-6"> <div class="dynamic-data" data-target="special:sample_amount" data-template='&lt;label class="button radio-group" data-group="amount" data-connect="amount" data-value="{{_key_}}"&gt;{{_value_}}&lt;/label&gt; '> </div> </div> <div class="col-12 col-lg-6"> <div class="dynamic-data" data-target="group" data-template='&lt;div class="form-group"&gt; &lt;input type="text" class="connect-group group-amount" name="amount" value="200"&gt;{{_currency_}} &lt;/div&gt; '></div> </div> </div> </div> <div class="form-group"> <label>Name *</label> <input data-moz-autofill-type="name" name="name" required="required" type="text" value=""/> </div> <div class="form-group"> <label>Email *</label> <input data-moz-autofill-type="email" name="email" required="required" type="email" value=""/> </div> <div class="form-group"> <label>Phone *</label> <input data-moz-autofill-type="tel" name="phone" required="required" type="text"/> </div> <div class="form-group"> <label>Messages to Admin</label> <textarea name="messages" rows="3"></textarea> </div> <div class="form-group"> <label>Payment type</label> <select class="view-input-state" name="payment_type"> <option value="paypal">Paypal</option> <option value="stripe">Stripe</option> <option selected="selected" value="custom">Custom</option> </select> </div> <div class="view-single" data-group="payment-type-section" data-name="paypal"> <div>When Payment via Paypal we need redirect to Paypal checkout page to complete payment</div> </div> <div class="view-single active" data-group="payment-type-section" data-name="custom"> <div><label>Please contact to admin to complete payment</label></div> </div> <div class="view-single" data-group="payment-type-section" data-name="stripe"> <div class="form-group"> <input autocomplete="off" class="form-control" name="card_number" pattern="[0-9]{16}" placeholder="Card number" title="Invalid Card Number" type="text"/> </div> <div class="row"> <div class="form-group col-12 col-lg-6"> <select name="card_exp_month"> <option value="1">1</option> <option value="2">2</option> <option value="3">3</option> <option value="4">4</option> <option value="5">5</option> <option value="6">6</option> <option value="7">7</option> <option value="8">8</option> <option value="9">9</option> <option value="10">10</option> <option value="11">11</option> <option value="12">12</option> </select> </div> <div class="form-group col-12 col-lg-6"> <select name="card_exp_year"> <option value="2024">2024</option> <option value="2025">2025</option> <option value="2026">2026</option> <option value="2027">2027</option> <option value="2028">2028</option> <option value="2029">2029</option> <option value="2030">2030</option> <option value="2031">2031</option> <option value="2032">2032</option> <option value="2033">2033</option> <option value="2034">2034</option> <option value="2035">2035</option> <option value="2036">2036</option> <option value="2037">2037</option> <option value="2038">2038</option> <option value="2039">2039</option> <option value="2040">2040</option> <option value="2041">2041</option> <option value="2042">2042</option> <option value="2043">2043</option> <option value="2044">2044</option> </select> </div> </div> <div class="form-group"> <input autocomplete="off" class="form-control" name="card_cvc" pattern="[0-9]{3,4}" placeholder="CVV" type="text"/> </div> </div> <div class="action-row text-center"> <button class="btn btn-submit" type="submit">Process</button> </div> </div> </div> </div>
</form>

</fieldset></body></html>
