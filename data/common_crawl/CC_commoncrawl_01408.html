<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="comment-form-comment mdc-text-field mdc-text-field--textarea"><textarea class="mdc-text-field__input" cols="40" id="comment" name="comment" required="" rows="8"></textarea><label class="mdc-floating-label" for="comment">Kommentar</label></div><div class="comment-form-author mdc-text-field half right-margin"><input class="mdc-text-field__input" data-moz-autofill-type="name" id="author" maxlength="245" name="author" required="" size="30" type="text"/><label class="mdc-floating-label" for="author">Dein Name</label><div class="mdc-line-ripple"></div></div> <div class="comment-form-email mdc-text-field half left-margin"><input class="mdc-text-field__input" data-moz-autofill-type="email" id="email" maxlength="100" name="email" required="" size="30" type="email"/><label class="mdc-floating-label" for="email">Deine E-Mail-Adresse</label><div class="mdc-line-ripple"></div></div> <div class="comment-form-url mdc-text-field"><input class="mdc-text-field__input" id="url" maxlength="200" name="url" size="30" type="text"/><label class="mdc-floating-label" for="url">Deine Website</label><div class="mdc-line-ripple"></div></div> <p class="form-submit"><input class="submit button color2 mdc-elevation--z7" id="submit" name="submit" type="submit" value="Senden"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="123"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
