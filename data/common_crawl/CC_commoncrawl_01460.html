<div class="form-contents"> <fieldset class="colorbox-form unit-contact-form"><legend class="heading"> Request Info <a rel="colorbox-close"> <i class="fa fa-times close"></i> </a> </legend> <br/> <div class="form-horizontal"> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="FirstName" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="FirstName">Name</label> <div class="col-sm-10"><input class="form-control" data-moz-autofill-type="name" data-val="true" data-val-regex="First and Last Name are required." data-val-regex-pattern="^.+ .+$" data-val-required="Name is required." id="FirstName" name="FirstName" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Email" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Email">Email</label> <div class="col-sm-10"><input class="form-control" data-moz-autofill-type="email" data-val="true" data-val-regex="Please enter a valid email address." data-val-regex-pattern="^\S+@\S+\.\S+$" data-val-required="Email is required." id="Email" name="Email" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Phone" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Phone">Phone</label> <div class="col-sm-6"><input class="form-control" data-moz-autofill-type="tel" data-val="true" data-val-regex="Please enter a valid phone number" data-val-regex-pattern="^(1\s?)?(\(\d{3}\)|\d{3}-?)?\s?\d{3}-?\d{4}$" data-val-required="Phone is required." id="Phone" name="Phone" type="text"/></div> <div class="col-sm-4"><select class="form-control" name="PhoneType"> <option value="Cell">Cell</option> <option value="Home">Home</option> <option value="Work">Work</option> </select></div> </div> <div class="form-group"> <div class="col-sm-12"><span class="field-validation-valid" data-valmsg-for="Zip" data-valmsg-replace="true"> </span> <i class="fa fa-exclamation-triangle"></i></div> <div class="clearfix"></div> <label class="col-sm-2 control-label text-left" for="Zip">Zip/Postal</label> <div class="col-sm-10"><input class="form-control" data-moz-autofill-type="postal-code" data-val="true" data-val-regex="Please enter a valid zip code." data-val-regex-pattern="^(\d{5}(-\d{4})?)|([A-Za-z]\d[A-Za-z]\s?\d[A-Za-z]\d)$" data-val-required="Zip/Postal is required." id="Zip" name="Zip" type="text"/></div> </div> <div class="form-group"> <div class="col-sm-12"><label for="Comments">How Can We Help?</label> <textarea class="form-control" id="Comments" name="Comments" rows="3"></textarea></div> </div> <div class="form-group"> <div class="col-sm-12"> <div class="checkbox"><label for="EmailOptIn"> <input checked="checked" id="EmailOptIn" name="EmailOptIn" type="checkbox"/> It's ok to contact me about future discounts and events. </label> <span class="help-block">(Easily unsubscribe at any time.)</span></div> </div> </div> <div class="form-group"> <div class="col-sm-12"><input class="btn btn-primary" id="SubmitButton" name="SubmitButton" type="submit" value="Send"/></div> </div> </div> </fieldset> <p><input name="FormType" type="hidden" value="Library Request"/> <input name="AjaxTarget" type="hidden" value="/Forms/Ajax"/> <input id="AccountEmailTemplate" name="AccountEmailTemplate" type="hidden" value="interactrv/handlebar_templates/lead_generic.hbs"/> <input id="CustomerEmailTemplate" name="CustomerEmailTemplate" type="hidden" value="interactrv/handlebar_templates/contact_confirmation.hbs"/> <input name="JournalTemplate" type="hidden" value="interactrv/handlebar_templates/journal_library_request.hbs"/> <input name="jem_Brand" type="hidden" value="Tracker Boats Targa Deep V Hull"/></p> </div> <input name="__RequestVerificationToken" type="hidden" value="CfDJ8Mg3XaYAmgxNvn8WEUmRKT9I5dATjIDW_Xn1qmSW5tb_ka8qHf1maA1aCl9u_lYTcklouCZ0h-Qgc3eWIMB_WM_O2zn9lF8vtCGdVjhVvqS3yNnVyKGwv_ZTBtiAjsPwr-mxWVOyuJCtkPN6gyhcjbA"/>
