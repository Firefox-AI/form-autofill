<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input aria-label="Search" autocomplete="off" class="form-control rounded" id="zGeocomplete" placeholder="Type address or place.." spellcheck="false" type="search"/><div style="display: none"><input data-moz-autofill-type="country" name="country" type="text"/><input data-moz-autofill-type="address-level1" name="administrative_area_level_1" type="text"/><input data-moz-autofill-type="address-level2" name="administrative_area_level_2" type="text"/><input data-moz-autofill-type="address-level2" name="locality" type="text"/><input data-moz-autofill-type="address-extra" name="neighborhood" type="text"/><input data-moz-autofill-type="postal-code" name="postal_code" type="text"/><input data-moz-autofill-type="address-housenumber" name="street_number" type="text"/><input data-moz-autofill-type="street-address" name="formatted_address" type="text"/><input name="lat" type="text"/><input name="lng" type="text"/></div>
</form>

</fieldset></body></html>
