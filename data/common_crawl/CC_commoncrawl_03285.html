<form>

p"><button class="btn form-input form-button mw-100" id="nextBtnFirst" name="submitBtn" type="submit">Register&gt;&gt;</button></div><div class="form-button-wrap form-bottom"><label for="checkboxAgree"><input id="checkboxAgree" name="agree" required="" type="checkbox"/><div class="w-100"><div class="d-md-none"></div><div class="d-none d-md-block d-lg-none"></div><div class="d-none d-lg-block d-xl-none"></div><div class="d-none d-xl-block"></div></div></label></div>
