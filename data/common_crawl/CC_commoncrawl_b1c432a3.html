ion> <option type="text" value="Recycling and Other">Recycling and Other</option> <option type="text" value="Snow Removal">Snow Removal</option> <option type="text" value="Earth Moving and Landscaping">Earth Moving and Landscaping</option> <option type="text" value="Earth Moving and Landscaping">Earth Moving and Landscaping</option> <option type="text" value="Attachments">Attachments</option> </select> </label> </div> <div class="columns medium-6"> <label>Specific Model <input name="specificModel" type="text" value="JCB Ribbed Bucket"/> </label> </div> <div class="columns medium-12"> <label>Comments <textarea cols="5" data-cy="message" name="message"></textarea> </label> </div> <div class="columns medium-12 hidden"> <label for="doYouLikeForklifts"> <input autocomplete="off" id="doYouLikeForklifts" name="doYouLikeForklifts" placeholder="Do you like forklifts?" tabindex="-1" type="text" value=""/> </label> </div> <div class="columns medium-12"> <input data-cy="recaptcha-token" name="token" type="hidden"/> <div class="form-message alert-box callout info" data-closable="" style="display: none;"> <p class="form-success callout-closable-message" style="display: none;">Thank you for your request. We'll be in touch shortly.</p> <p class="form-required callout-closable-message" style="display: none;">Please fill out all required fields (*).</p> <p class="form-alert callout-closable-message" style="display: none;">An error occurred during form submission. Please try again. If the issue persists please contact us at (406) 541-8903.</p> <a class="close-button" data-close="" href="#">×</a> </div> <button class="button" data-cy="submit">Submit</button> </div> </div>
