<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">Tu dirección de correo electrónico no será publicada.</span> <span class="required-field-message">Los campos obligatorios están marcados con <span class="required">*</span></span></p><p class="comment-form-comment"><textarea aria-required="true" cols="45" id="comment" name="comment" rows="8"></textarea></p><p class="comment-form-author"><label for="author" style="display:none">Tu Nombre<span class="required"></span></label><input data-moz-autofill-type="given-name" id="author" name="author" placeholder="Tu nombre" size="30" type="text" value=""/></p> <p class="comment-form-email"><label for="email" style="display:none">Email<span class="required"></span></label><input data-moz-autofill-type="email" id="email" name="email" placeholder="Email" size="30" type="text" value=""/></p> <p class="comment-form-url"><label for="url" style="display:none">Website</label><input id="url" name="url" placeholder="Website" size="30" type="text" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Guarda mi nombre, correo electrónico y web en este navegador para la próxima vez que comente.</label></p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Enviar opinion"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="8316"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
