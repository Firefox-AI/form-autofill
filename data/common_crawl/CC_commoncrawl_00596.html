<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="note-before"><p>Su dirección de correo electrónico no será publicada.</p></div><p class="comment-wrap"><textarea aria-required="true" class="comment" cols="45" id="comment" name="comment" placeholder="Tu comentario" rows="10"></textarea></p><p class="author-wrap"><input aria-required="true" class="author" data-moz-autofill-type="given-name" id="author" name="author" placeholder="Tu nombre *" size="45" type="text" value=""/></p><p class="email-wrap"><input aria-required="true" class="email" data-moz-autofill-type="email" id="email" name="email" placeholder="Tu correo electrónico *" size="45" type="text" value=""/></p><p class="url-wrap"><input class="url" id="url" name="url" placeholder="Su página web" size="45" type="text" value=""/></p><p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/><label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label></p><p class="form-submit"><input class="comment-submit" id="comment-submit" name="submit" type="submit" value="publicar comentario"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="1947"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/></p>
</form>

</fieldset></body></html>
