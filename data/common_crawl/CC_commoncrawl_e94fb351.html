<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p><label for="so-country">Country:</label><select data-moz-autofill-type="country" id="so-country" name="country"><option disabled="" selected="" style="display:none" value=""> -- select an option -- </option><option value="ca">Canada</option><option value="us">United States</option><option value="other">Other</option></select></p> <p class="so-field"><label for="so-name">Full name:</label><input data-moz-autofill-type="name" id="so-name" name="name" size="30" type="text" value=""/></p> <p class="so-field"><label for="so-email">Email:</label><input data-moz-autofill-type="email" id="so-email" name="email" size="30" type="email" value=""/></p> <p class="so-field"><label for="so-phone">Phone:</label><input data-moz-autofill-type="tel" id="so-phone" name="phone" size="30" type="text" value=""/></p> <p class="so-field"><label for="so-postal">Postal code:</label><input data-moz-autofill-type="postal-code" id="so-postal" name="postal" size="30" type="text" value=""/></p>
</form>

</fieldset></body></html>
