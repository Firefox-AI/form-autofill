<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="task" type="hidden" value="register"/> <div class="form-row"> <div class="form-group col-12"> <label for="email">Email</label> <input class="form-control" data-moz-autofill-type="email" id="email" name="email" placeholder="Email address" required="" type="email"/> </div> </div> <div class="form-row"> <div class="form-group col-12"> <label for="firstname">Firstname</label> <input class="form-control" id="firstname" name="firstname" placeholder="Firstname" required="" type="text"/> </div> </div> <div class="form-row"> <div class="form-group col-12"> <label for="lastname">Lastname</label> <input class="form-control" data-moz-autofill-type="family-name" id="lastname" name="lastname" placeholder="Lastname" required="" type="text"/> </div> </div> <div class="form-row"> <div class="form-group col-12"> <label for="password">Password</label> <input class="form-control" id="password" name="password" placeholder="Password" required="" type="password"/> </div> </div> <div class="form-row"> <div class="form-group col-12"> <label for="repassword">Confirm Password</label> <input class="form-control" id="repassword" name="repassword" placeholder="Confirm Password" required="" type="password"/> </div> </div> <div class="form-row"> <div class="form-group col-12"> <button class="btn btn-primary" id="theme_register_btn" type="submit">CREATE AN ACCOUNT</button> </div> </div> <div class="form-row" id="theme_register_msg"></div>
</form>

</fieldset></body></html>
