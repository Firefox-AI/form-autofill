<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<p class="comment-notes"><span id="email-notes">O seu endereço de e-mail não será publicado.</span> <span class="required-field-message">Campos obrigatórios são marcados com <span class="required">*</span></span></p><div class="comment-form-rating"><label for="rating">Sua avaliação</label><select id="rating" name="rating" required=""> <option value="">Avaliar…</option> <option value="5">Perfeito</option> <option value="4">Bom</option> <option value="3">Média</option> <option value="2">Não tão ruim</option> <option value="1">Muito pobre</option> </select></div><p class="comment-form-comment"><textarea cols="45" id="comment" name="comment" placeholder="Sua revisão *" required="" rows="8"></textarea></p><p class="comment-form-author"><input data-moz-autofill-type="name" id="author" name="author" placeholder="Nome *" required="" size="30" type="text" value=""/></p> <p class="comment-form-email"><input data-moz-autofill-type="email" id="email" name="email" placeholder="E-mail *" required="" size="30" type="email" value=""/></p> <p class="comment-form-cookies-consent"><input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Salvar meus dados neste navegador para a próxima vez que eu comentar.</label></p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Enviar"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="18311"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>

</fieldset></body></html>
