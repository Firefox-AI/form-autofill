lue="山梨県">山梨県</option> <option value="長野県">長野県</option> <option value="岐阜県">岐阜県</option> <option value="静岡県">静岡県</option> <option value="愛知県">愛知県</option> <option value="三重県">三重県</option> <option value="滋賀県">滋賀県</option> <option value="京都府">京都府</option> <option value="大阪府">大阪府</option> <option value="兵庫県">兵庫県</option> <option value="奈良県">奈良県</option> <option value="和歌山県">和歌山県</option> <option value="鳥取県">鳥取県</option> <option value="島根県">島根県</option> <option value="岡山県">岡山県</option> <option value="広島県">広島県</option> <option value="山口県">山口県</option> <option value="徳島県">徳島県</option> <option value="香川県">香川県</option> <option value="愛媛県">愛媛県</option> <option value="高知県">高知県</option> <option value="福岡県">福岡県</option> <option value="佐賀県">佐賀県</option> <option value="長崎県">長崎県</option> <option value="熊本県">熊本県</option> <option value="大分県">大分県</option> <option value="宮崎県">宮崎県</option> <option value="鹿児島県">鹿児島県</option> <option value="沖縄県">沖縄県</option> </select> <div style="padding:4px 0 0;">市区町村番地<input class="text" data-moz-autofill-type="address-level2" maxlength="100" name="市区町村番地" style="width:260px; margin-left:10px;" type="text"/></div></td> </tr> <tr> <th>ご来店日</th> <td><input class="text" maxlength="8" name="ご来店日" style="width:75px; margin:0 14px 0 0px;" type="text"/>年 <input class="text" maxlength="8" name="ご来店日" style="width:55px; margin:0 14px 0 10px;" type="text"/>月 <input class="text" maxlength="8" name="ご来店日" style="width:55px; margin:0 14px 0 10px;" type="text"/>日</td> </tr> <tr> <th><b>※</b>お問い合せ内容<br/> ご意見・<br/> お叱りなど</th> <td><textarea name="お問い合せ内容"></textarea></td> </tr> <tfoot> <tr> <td colspan="2"><input alt="入力内容の確認画面へ" class="image" src="../common/img/mail/submitBtn.gif" type="image"/></td> </tr> </tfoot> </table>
