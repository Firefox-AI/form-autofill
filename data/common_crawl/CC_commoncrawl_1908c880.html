<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="step" id="form_step_1"> <h3>{:company_details}</h3> <div class="form-row"> <div class="form-group"> <rg-tooltip data-text="legal_organization_type_msg"><label>{:legal_organization_type}</label> </rg-tooltip> <rg-select id="tcr_brand_entities" search=""> </rg-select> </div> <div class="form-group"> <rg-tooltip data-text="country_registration_tooltip"><label>{:country_registration}</label> </rg-tooltip> <rg-select id="tcr_brand_registration_country" search=""> </rg-select> </div> <div class="form-group"> <rg-tooltip data-text="tax_id_tooltip"><label>{:tax_id}</label></rg-tooltip> <input class="form-control" name="tcr_brand_ein" placeholder="Type here" type="text" value=""/> </div> <div class="form-group"> <rg-tooltip data-text="Legal_company_name_tooltip"><label>{:Legal_company_name}</label></rg-tooltip> <input class="form-control" name="tcr_brand_company_name" onkeyup="fill_brand_name()" placeholder="Type here" type="text" value=""/> </div> <div class="form-group"> <rg-tooltip data-text="dba_tooltip"><label>{:dba}</label></rg-tooltip> <input class="form-control" name="tcr_brand_dba" placeholder="Type here" type="text" value=""/> </div> <div class="form-group hidden"> <rg-tooltip data-text="stock_symbol_tooltip"><label>Stock symbol</label></rg-tooltip> <input class="form-control" data-optional="1" name="tcr_brand_stock_symbol" placeholder="Type here" type="text" value=""/> </div> <div class="form-group hidden"> <rg-tooltip data-text="stock_exchange_tooltip"><label>Stock exchange</label></rg-tooltip> <rg-select data-optional="1" id="tcr_brand_stock_exchange" search=""> </rg-select> </div> </div> <h3>{:additional_details}</h3> <div class="form-row"> <div class="form-group"> <rg-tooltip data-text="vertical_type_tooltip"><label>Vertical Type</label></rg-tooltip> <rg-select id="tcr_brand_vertical" search=""> </rg-select> </div> <div class="form-group"> <label>Website</label> <input class="form-control" data-message="The website format is not correct" data-regex="^(?:http(s)?:\/\/)?[\w.-]+(?:\.[\w\.-]+)+[\w\-\._~:\/?#[\]@!\$&amp;'\(\)\*\+,;=.]+$" name="tcr_brand_website" placeholder="Type here" type="text" value=""/> </div> </div> <div class="form-footer"> <button class="ro-btn" data-ro-variant="outline" id="tcr_cancel_brand" type="button">{:cancel}</button> <button class="ro-btn tcr_brand_next" data-ro="" data-step="1" data-target="2" type="button">{:next}</button> </div> </div> <div class="step hidden" id="form_step_2"> <div class="tcr_blue_box" id="tcr_address_box"> <p class="checkbox_warper select_checkbox" id="tcr_brand_fill_address"> {:pre_fill_address} </p> <div class="hidden"> </div> </div> <h3>{:company_address}</h3> <div class="form-row"> <div class="form-group"> <label>Street address</label> <input class="form-control" data-message="" data-moz-autofill-type="street-address" data-regex="" id="tcr_brand_streetname" name="tcr_brand_street_address" placeholder="e.g. 25 Courtland St SE" type="text" value=""/> </div> <div class="form-group"> <label>{:city}</label> <input class="form-control" data-message="" data-moz-autofill-type="address-level2" data-regex="" id="tcr_brand_city" name="tcr_brand_city" placeholder="e.g. Atlanta" type="text" value=""/> </div> <div class="form-group state_content"> <label>State/Province</label> <rg-select data-message="" data-regex="" id="tcr_brand_state" search=""></rg-select> </div> <div class="form-group"> <label>{:zipcode}</label> <input class="form-control" data-message="" data-moz-autofill-type="postal-code" data-regex="" name="tcr_brand_zip" placeholder="e.g. 30303" type="text" value=""/> </div> <div class="form-group"> <label>{:country}</label> <rg-select id="tcr_brand_country" search=""></rg-select> </div> </div> <h3> {:contact_details}<span>{:contacted_tcr}</span> </h3> <div class="form-row"> <div class="form-group"> <rg-tooltip data-text="support_email_address_tooltip">{:support_email_address}</rg-tooltip> <input class="form-control" data-message="Your mail is not correct " data-regex="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,4})+$" name="tcr_brand_mail" placeholder="Type here" type="text" value=""/> </div> <div class="form-group"> <rg-tooltip data-text="support_phone_number_tooltip">{:support_phone_number}</rg-tooltip> <input class="form-control" data-message="" data-regex="[0-9]+" name="tcr_brand_phone" placeholder="Type here" type="text" value=""/> </div> </div> <div class="form-footer"> <button class="ro-btn tcr_previous" data-ro-color-scheme="product" data-ro-variant="outline" data-step="2" data-target="1" type="button">{:previous}</button> <button class="ro-btn tcr_brand_next" data-ro-color-scheme="product" data-step="2" data-target="3" type="button">{:next}</button> </div> </div> <div class="step hidden" id="form_step_3"> <span class="tcr_warning">{:Review_tcr_information}</span> <div id="resume_brand"> </div> <div class="form-footer"> <button class="ro-btn tcr_previous" data-ro-color-scheme="primary" data-ro-variant="outline" data-step="3" data-target="2" type="button">{:previous}</button> <button class="ro-btn tcr_brand_next" data-ro-color-scheme="primary" data-target="4" type="button">{:submit}</button> </div> </div>
</form>

</fieldset></body></html>
