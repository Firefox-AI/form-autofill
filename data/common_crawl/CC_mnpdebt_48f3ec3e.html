<body>

<fieldset>
<h3>mnpdebt.ca</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<fieldset> <input id="refProv1" name="refProv" type="hidden" value=""/> <input id="refCity1" name="refCity" type="hidden" value=""/> <input name="layer_level" type="hidden" value="https://bankruptcy.mnpdebt.ca/debt-relief/on/ancaster"/> <input id="device_type2" name="device_type" type="hidden" value="desktop"/> <input name="lang_Site" type="hidden" value="en"/> <input name="bestcontact" type="hidden" value=""/> <input name="bestcontactprefer1" type="hidden" value=""/> <input name="token" type="hidden" value=""/> <div class="step1"> <div class="greenText bold font16">Step 1 of 2</div> <div class="first-name"> <label class="semibold font16" for="first_name">First Name:</label> <input aria-label="first name" class="checkValid2" data-err="*Enter valid First Name." data-moz-autofill-type="given-name" data-reg="^[a-zA-Z_\.\W\-\s_\.\-]{2,50}$" name="first_name" placeholder="Fill in your first name*" type="text"/> </div> <div class="last-name"> <label class="semibold font16" for="last_name">Last Name:</label> <input aria-label="last name" class="checkValid2" data-err="*Enter valid Last Name." data-moz-autofill-type="family-name" data-reg="^[a-zA-Z_\.\W\-\s_\.\-]{2,50}$" name="last_name" placeholder="Fill in your last name*" type="text"/> </div> <div class="preferred-method"> <label aria-label="Preferred method of contact" class="semibold font14" for="bestcontactprefer">Preferred method of contact</label> <div class="radiobtn font14 semibold preferred-contact"> <input aria-label="radio phone" name="bestcontactprefer" type="radio" value="Phone"/> Phone <input aria-label="radio email" name="bestcontactprefer" type="radio" value="Email"/> Email </div> <div class="formPhone" style="display:none;"> <div> <input aria-label="Phone Number" data-err="*Enter valid Phone Number. i.e. xxx-xxx-xxxx" data-reg="((^[\d]{3})|(^\({1}[\d]{3}\)))([?\s]{0,1}|[?\-]{0,1})[\d]{3}([?\s]{0,1}|[?\-]{0,1})[\d]{4}$" id="telnumber1" name="phone" placeholder="Phone Number*" type="tel"/> </div> <div class="contact-time"> <label aria-label="Best Time to Call" class="semibold font14" for="best-time-call">Best Time to Call</label> <div class="content radiobtn"> <div><input aria-label="radio Morning" checked="checked" name="best-time-call" type="radio" value="Morning"/> Morning</div> <div><input aria-label="radio Afternoon" name="best-time-call" type="radio" value="Afternoon"/> Afternoon</div> <div><input aria-label="radio Evening" name="best-time-call" type="radio" value="Evening"/> Evening </div> <div style="clear:both;float:none;"></div> </div> </div> </div> <div class="formEmail" style="display:none;"> <div> <input aria-label="Email Address" data-err="*Enter valid Email Address. i.e. email@email.com" data-reg="^([A-Za-z0-9_\-\.])+\@([A-Za-z0-9_\-\.])+\.([A-Za-z]{2,4})$" name="email" placeholder="Email Address*" type="email"/> </div> </div> </div> <span class="disclaimer font10 required-phone">*Required Fields</span> <div class="disclaimer font10 required-phone formdesc"> By completing this form, you understand and agree to the collection, use and disclosure of personal information in accordance with MNP Ltd.’s <a href="https://mnpdebt.ca/en/resources/legal/privacy-policy" target="_blank"> Privacy Policy </a> </div> <div aria-label="next step" class="next-button greenBtn semibold font14 uppercase" tabindex="0">Next<i aria-hidden="true" class="fa fa-chevron-right"></i></div> </div> <div class="step2" style="display:none;"> <div class="greenText bold font14">Step 2 of 2</div> <div> <label class="font16 semibold" for="province">Select your province:</label> <select class="checkValid" data-moz-autofill-type="address-level1" data-prov="ontario" id="sel-province2" name="province"> <option value="">Province/Territory</option> <option id="AB" name="AB" value="alberta">Alberta</option> <option id="BC" name="BC" value="british-columbia">British Columbia</option> <option id="MB" name="MB" value="manitoba">Manitoba</option> <option id="NB" name="NB" value="new-brunswick">New Brunswick</option> <option id="NL" name="NL" value="newfoundland-and-labrador">Newfoundland and Labrador</option> <option id="NT" name="NT" value="northwest-territories">Northwest Territories</option> <option id="NS" name="NS" value="nova-scotia">Nova Scotia</option> <option id="ON" name="ON" selected="" value="ontario">Ontario</option> <option id="PEI" name="PEI" value="prince-edward-island">Prince Edward Island</option> <option id="QC" name="QC" value="quebec">Québec</option> <option id="SK" name="SK" value="saskatchewan">Saskatchewan</option> <option id="YT" name="YT" value="yukon">Yukon</option> </select> </div> <div class="input-container"> <label class="font16 semibold" for="city">Select your nearest MNP office:</label> <select class="checkValid" data-curcity="ancaster" id="sel-city2" name="city"> <option value="">City</option> </select> </div> <div class="container"> <label class="semibold font14" for="comment">How can we help?</label> <textarea aria-label="comments" id="comment-area" name="comment" placeholder="Type in your question..." rows="6"></textarea> </div> <input alt="Submit the form" class="submit greenBtn semibold font14 g-recaptcha" data-action="submit" data-callback="onFormSubmit" data-sitekey="6LeLgB4iAAAAACOLpuJT4KooV0Q-IkhWkrv5BgrL" id="formBtn2" type="button" value="SUBMIT"/> </div> </fieldset>
</form>

</fieldset></body></html>
