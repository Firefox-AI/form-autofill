<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="form-group pad-top-lg"> <label>Your Email (Optional)</label> <div class="pull-right pointer pad-top-sm italic font-12 orange" data-html="true" data-original-title="Should you qualify for the dealership's referral bonus, we'll share your email with them so that they can get in touch with you." data-toggle="tooltip">Why do we need this?</div> <input class="pad-sm width-100" data-moz-autofill-type="email" id="referrer" name="referrer" type="email"/> <span class="field-validation-valid" data-valmsg-for="referrer" data-valmsg-replace="true" id="referrer-error"></span> </div> <div class="col-xs-12 pad-none margin-center margin-top-lg" id="referralMethods"> <div class="table width-100"> <div class="td width-50 text-center border-all-teal pad-bottom-sm teal pad-top-sm referral-method font-16" id="facebook_method"> Post on Facebook </div> <div class="td width-50 text-center border-all-teal pad-bottom-sm teal pad-top-sm referral-method font-16" id="email_method"> By Email </div> </div> </div> <div class="margin-top-lg col-xs-12 pad-none margin-center display-none" id="emailForm"> <input id="sender" type="hidden" value=""/> <div class="form-group"> <label>Email of Recipient</label> <input class="pad-sm width-100" data-moz-autofill-type="email" data-val="true" data-val-required="Email address is required" id="recipient" name="recipient" type="email"/> <span class="field-validation-valid" data-valmsg-for="recipient" data-valmsg-replace="true" id="recipient-error"></span> </div> <div class="form-group"> <label>Message <span class="light">(Optional)</span></label> <textarea class="pad-sm width-100" id="opmessage" name="message"></textarea> </div> <input class="col-xs-12 primary-button orange warLink" type="submit" value="Send Referral Email"/> </div>
</form>
