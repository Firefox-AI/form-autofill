<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="Publisher_Id" type="hidden" value="123123"/> <input name="Form_Cd" type="hidden" value="5hJNK1"/> <input name="charcode" type="hidden" value="auto"/> <div class="form-group"> <label>メールアドレス <span class="essential">*</span></label> <input name="Mail" required="" type="email"/> </div> <div class="form-group"> <label>名前（姓・名） <span class="essential">*</span></label> <div class="half-input-container"> <input class="half" name="NameSei" placeholder="姓" required="" type="text"/> <input class="half" name="NameMei" placeholder="名" required="" type="text"/> </div> </div> <div class="form-group"> <label>郵便番号 <span class="optional">(任意)</span></label> <input data-moz-autofill-type="postal-code" name="Zip_No" placeholder="半角数字" type="text"/> </div> <div class="form-group"> <label>市区町村・番地 <span class="essential">*</span></label> <input name="Address_1" placeholder="市区町村" required="" type="text"/> <input name="Address_2" placeholder="番地等" type="text"/> </div> <div class="form-group"> <label>建物名・部屋番号</label> <input data-moz-autofill-type="apartment" name="Address_3" placeholder="例）ABCマンション101" type="text"/> </div> <div class="form-group"> <label>電話番号 <span class="essential">*</span></label> <div class="half-input-container"> <input class="half" name="Tel0" placeholder="例）03" required="" type="tel"/> <input class="half" name="Tel1" placeholder="1234" required="" type="tel"/> <input class="half" name="Tel2" placeholder="5678" required="" type="tel"/> </div> </div> <div class="form-group"> <input type="submit" value="フォームを送信する"/> </div>
</form>
