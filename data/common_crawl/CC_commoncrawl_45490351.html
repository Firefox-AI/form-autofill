<div class="clearfix"></div> <div class="comment-form-input-wrap td-form-comment"> <textarea aria-required="true" cols="45" id="comment" name="comment" placeholder="Comment:" rows="8"></textarea> <label class="is-visually-hidden" for="comment">Comment:</label> <div class="td-warning-comment">Please enter your comment!</div> </div><div class="comment-form-input-wrap td-form-author"> <input aria-required="true" class="" data-moz-autofill-type="name" id="author" name="author" placeholder="Name:*" size="30" type="text" value=""/> <label class="is-visually-hidden" for="author">Name:*</label> <div class="td-warning-author">Please enter your name here</div> </div> <div class="comment-form-input-wrap td-form-email"> <input aria-required="true" class="" data-moz-autofill-type="email" id="email" name="email" placeholder="Email:*" size="30" type="text" value=""/> <label class="is-visually-hidden" for="email">Email:*</label> <div class="td-warning-email-error">You have entered an incorrect email address!</div> <div class="td-warning-email">Please enter your email address here</div> </div> <p class="comment-form-cookies-consent"> <input id="wp-comment-cookies-consent" name="wp-comment-cookies-consent" type="checkbox" value="yes"/> <label for="wp-comment-cookies-consent">Save my name, email, and website in this browser for the next time I comment.</label> </p> <p class="form-submit"><input class="submit" id="submit" name="submit" type="submit" value="Post Comment"/> <input id="comment_post_ID" name="comment_post_ID" type="hidden" value="361443"/> <input id="comment_parent" name="comment_parent" type="hidden" value="0"/> </p>
</form>
