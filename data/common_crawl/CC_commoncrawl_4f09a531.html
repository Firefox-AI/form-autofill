<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<input name="form_type" type="hidden" value="contact"/><input name="utf8" type="hidden" value="✓"/><div class="contact__fields"> <div class="field"> <input autocomplete="name" class="field__input" id="ContactForm-name" name="contact[Name]" placeholder="Name" type="text" value=""/> <label class="field__label" for="ContactForm-name">Name</label> </div> <div class="field field--with-error"> <input aria-required="true" autocapitalize="off" autocomplete="email" class="field__input" data-moz-autofill-type="email" id="ContactForm-email" name="contact[email]" placeholder="E-mail Address" spellcheck="false" type="email" value=""/> <label class="field__label" for="ContactForm-email">E-mail Address <span aria-hidden="true">*</span></label></div> </div> <div class="contact__fields"> <div class="field"> <input autocomplete="tel" class="field__input" data-moz-autofill-type="tel" id="ContactForm-phone" name="contact[Phone]" pattern="[0-9\-]*" placeholder="Phone" type="tel" value=""/> <label class="field__label" for="ContactForm-phone">Phone</label> </div> <div class="field"> <input class="field__input" id="ContactForm-product-url" name="contact[Product URL]" placeholder="Product URL" type="text" value="https://restaurantessentials.com.au/products/vogue-epp-insulated-food-carrier-box-1-1-gn-200mm-46ltr"/> <label class="field__label" for="ContactForm-product-url">Product URL</label> </div> </div> <div class="field"> <input class="field__input" id="ContactForm-comment" name="contact[Message]" placeholder="Message" type="text"/> <label class="field__label" for="ContactForm-comment">Message</label> </div> <div class="contact__button"> <button class="button" type="submit">Add a Quote </button> </div>
</form>

</fieldset></body></html>
