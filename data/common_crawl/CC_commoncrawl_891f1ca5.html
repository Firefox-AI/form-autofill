<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
</head>

<body>

<fieldset>
<h3>common-crawl</h3>
<p><i>Common Crawl form, LLM-labeled.</i></p>

<form>
<div class="rover-container-fluid"><div class="rover-form-row reg_intro_first" style="display:none;"><div class="rover-form-row"><h4 class="reg-intro">Create your <span class="text-primary">free</span> account</h4></div></div><div class="rover-form-row reg_intro_second" style="display:none;"><div class="rover-form-row"><h5 class="reg-intro">Registration only takes 10 seconds</h5></div></div><div class="rover-form-row reg_email step-1" style="display:none;"><div class="rover-form-row step-1" style="display:none;"><label>Email Address: <span class="lighter">(must be valid)</span><input autocomplete="email" class="form-control rover-email-validate required" data-moz-autofill-type="email" name="email" placeholder="Your Email Address" type="text"/></label></div></div><div class="rover-form-row reg_progressive step-1" style="display:none;"></div><div class="rover-form-row reg_full_name step-2" style="display:none;"><div class="rover-form-row step-2" style="display:none;"><label>Full Name: <span class="lighter">(First &amp; Last)</span><input class="form-control" data-moz-autofill-type="name" name="full_name" placeholder="Full name" type="text"/></label></div></div><div class="rover-form-row reg_phone_as_password step-2" style="display:none;"><div class="rover-form-row step-2" style="display:none;"><label>Phone: <span class="lighter">(Used as password)</span><input autocomplete="phone" class="form-control phone-as-password required" name="password" placeholder="Phone" type="text"/></label></div></div><div class="rover-form-row compliance_msg step-2" style="display:none;"></div><div class="rover-form-row recaptcha step-2" style="display:none;"> </div><div class="rover-form-row reg_msg step-2" style="display:none;"><span class="rover-msg-icon"></span><span class="rover-msg-text"></span></div><div class="rover-form-row already_registered step-1" style="display:none;"><a class="rover-slide-to-login" href="#">Already registered?</a></div><div class="rover-form-row go_back_step_1 step-2" style="display:none;"><a class="rover-back-to-step1" href="#">Change my email</a></div></div>
</form>

</fieldset></body></html>
