<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
fieldset {
  margin-top: 30px;
}

form {
  margin-right: 200px;
}

input {
  margin: 2px;
}

</style>
</head>

<body>

<fieldset>
<h3>shop.vogue.mx</h3>
<p><i>State not filled in. The state abbreviations do not match those in the list.</i></p>

<form>
  <div>
    <label id="email-label" for="email">
      <span>
        <span>Email o número de teléfono móvil</span>
      </span>
    </label>
  </div>
  <div>
    <input id="email" name="email" placeholder="Email o número de teléfono móvil" required="" type="text" inputmode="text" aria-required="true" aria-labelledby="email-label" autocomplete="shipping email" autocapitalize="none" aria-describedby="error-for-email" aria-invalid="true" style="" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="Select0">
      <span>
        <span>País / Región</span>
      </span>
    </label>
    <select name="countryCode" id="Select0" required="" autocomplete="shipping country" style="" data-moz-autofill-type="country">
      <option value="MX">México</option>
    </select>
  </div>
  <div>
    <label id="TextField0-label" for="TextField0">
      <span>
        <span>Nombre (opcional)</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField0" name="firstName" placeholder="Nombre (opcional)" type="text" aria-required="false" aria-labelledby="TextField0-label" autocomplete="shipping given-name" style="" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label id="TextField1-label" for="TextField1">
      <span>
        <span>Apellidos</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField1" name="lastName" placeholder="Apellidos" required="" type="text" aria-required="true" aria-labelledby="TextField1-label" autocomplete="shipping family-name" aria-describedby="error-for-TextField1" aria-invalid="true" style="" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label id="TextField2-label" for="TextField2">
      <span>
        <span>Dirección</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField2" name="address1" placeholder="Dirección" required="" type="text" aria-required="true" aria-labelledby="TextField2-label" autocomplete="shipping address-line1" aria-describedby="error-for-TextField2" aria-invalid="true" style="" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label id="TextField3-label" for="TextField3">
      <span>
        <span>Delegación o Colonia, apartamento, local, etc. (Importante poner la colonia o municipio)</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField3" name="address2" placeholder="Delegación o Colonia, apartamento, local, etc. (Importante poner la colonia o municipio)" type="text" aria-required="false" aria-labelledby="TextField3-label" autocomplete="shipping address-line2" style="" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label id="TextField4-label" for="TextField4">
      <span>
        <span>Código postal</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField4" name="postalCode" placeholder="Código postal" required="" type="text" inputmode="numeric" aria-required="true" aria-labelledby="TextField4-label" autocomplete="shipping postal-code" autocapitalize="characters" aria-describedby="error-for-TextField4" aria-invalid="true" style="" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label id="TextField5-label" for="TextField5">
      <span>
        <span>Ciudad</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField5" name="city" placeholder="Ciudad" required="" type="text" aria-required="true" aria-labelledby="TextField5-label" autocomplete="shipping address-level2" aria-describedby="error-for-TextField5" aria-invalid="true" style="" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="Select1">
      <span>
        <span>Estado</span>
      </span>
    </label>
    <select name="zone" id="Select1" required="" autocomplete="shipping address-level1" style="" data-moz-autofill-type="address-level1">
      <option hidden="" disabled="" value="">&nbsp;</option>
      <option value="AGS">Aguascalientes</option>
      <option value="BC">Baja California</option>
      <option value="BCS">Baja California Sur</option>
      <option value="CAMP">Campeche</option>
      <option value="CHIS">Chiapas</option>
      <option value="CHIH">Chihuahua</option>
      <option value="DF">Ciudad de Mexico</option>
      <option value="COAH">Coahuila de Zaragoza</option>
      <option value="COL">Colima</option>
      <option value="DGO">Durango</option>
      <option value="GTO">Guanajuato</option>
      <option value="GRO">Estado de Guerrero</option>
      <option value="HGO">Estado de Hidalgo</option>
      <option value="JAL">Jalisco</option>
      <option value="MEX">Estado de México</option>
      <option value="MICH">Michoacán</option>
      <option value="MOR">Morelos</option>
      <option value="NAY">Nayarit</option>
      <option value="NL">Nuevo León</option>
      <option value="OAX">Oaxaca</option>
      <option value="PUE">Puebla</option>
      <option value="QRO">Querétaro</option>
      <option value="Q ROO">Quintana Roo</option>
      <option value="SLP">San Luis Potosí</option>
      <option value="SIN">Sinaloa</option>
      <option value="SON">Sonora</option>
      <option value="TAB">Tabasco</option>
      <option value="TAMPS">Tamaulipas</option>
      <option value="TLAX">Tlaxcala</option>
      <option value="VER">Veracruz</option>
      <option value="YUC">Yucatán</option>
      <option value="ZAC">Zacatecas</option>
    </select>
  </div>
  <div>
    <label id="TextField6-label" for="TextField6">
      <span>
        <span>Teléfono</span>
      </span>
    </label>
  </div>
  <div>
    <input id="TextField6" name="phone" placeholder="Teléfono" required="" type="tel" aria-required="true" aria-labelledby="TextField6-label" autocomplete="shipping tel" aria-describedby="error-for-TextField6" aria-invalid="true" style="" data-moz-autofill-type="tel">
  </div>
  <!--div>
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_firstName" name="firstName" autocomplete="shipping given-name">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_lastName" name="lastName" autocomplete="shipping family-name">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_address1" name="address1" autocomplete="shipping address-line1">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_address2" name="address2" autocomplete="shipping address-line2">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_city" name="city" autocomplete="shipping address-level2">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_country" name="country" autocomplete="shipping country">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_zone" name="zone" autocomplete="shipping address-level1">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_address_level1" name="address-level1" autocomplete="shipping address-level1">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_province" name="province" autocomplete="shipping address-level1">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_postalCode" name="postalCode" autocomplete="shipping postal-code">
    <input tabindex="-1" label="" aria-hidden="true" aria-label="no-label" type="text" id="autofill_phone" name="phone" autocomplete="shipping tel">
  </div-->
</form>

</fieldset>

<fieldset>
<h3>officedepot.com.mx</h3>
<p><i>Various fields not recognized. Some fields put into a separate section.</i></p>

<form>
  <div>
    <label for="firstName">
      <span>
        <span>*</span>Nombre&nbsp;(s)
      </span>
    </label>
    <input id="firstName" name="firstName" type="text" autocomplete="--" style="" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="middleName">
      <span>
        <span>*</span>Apellido Paterno
      </span>
    </label>
    <input id="middleName" name="middleName" type="text" autocomplete="--" style="" data-moz-autofill-type="additional-name">
  </div>
  <div>
    <label for="lastName">
      <span>
        <span>*</span>Apellido Materno
      </span>
    </label>
    <input id="lastName" name="lastName" type="text" autocomplete="--" style="" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="phoneNumber">
      <span>
        <span>*</span>Celular
      </span>
    </label>
    <input id="phoneNumber" name="phoneNumber" type="tel" maxlength="10" autocomplete="--" style="" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="streetName">
      <span>
        <span>*</span>Calle
      </span>
    </label>
    <input id="streetName" name="streetName" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="streetNumber">
      <span>
        <span>*</span>Número exterior
      </span>
    </label>
    <input id="streetNumber" name="streetNumber" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="address.interiorNo">
      <span>Número interno</span>
    </label>
    <input id="address.interiorNo" name="interiorNo" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="postalcode">
      <span>
        <span>*</span>Código Postal
      </span>
    </label>
    <input id="postalcode" name="postcode" type="tel" value="" maxlength="5" autocomplete="--" style="" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address.district">
      <span>
        <span>*</span>Colonia
      </span>
    </label>
    <select id="address.district" name="district" style="" data-moz-autofill-type="address-level3"></select>
  </div>
  <div>
    <label for="address.addedDistrict">
      <span>
        <span>*</span>Otra Colonia
      </span>
    </label>
    <input id="address.addedDistrict" name="addedDistrict" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="address-level3">
  </div>
  <div>
    <label for="betweenStreet2">
      <span>
        <span>*</span>Entre que calles se encuentra tu domicilio
      </span>
    </label>
    <input id="betweenStreet2" name="betweenStreet2" type="text" value="" autocomplete="--" style="">
  </div>
  <div>
    <label for="town">
      <span>Demarcación (antes Delegación) / Municipio</span>
      <span>*</span>
    </label>
    <input id="town" name="town" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="townCity">
      <span>Ciudad</span>
    </label>
    <input id="townCity" name="townCity" type="text" value="" autocomplete="--" style="" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="region">
      <span>
        <span>*</span>Estado
      </span>
    </label>
    <select id="region" name="regionIso" style="" data-moz-autofill-type="address-level1">
      <option value="" selected="selected"></option>
      <option value="MX-AGS">Aguascalientes</option>
      <option value="MX-BCN">Baja California</option>
      <option value="MX-BCS">Baja California Sur</option>
      <option value="MX-CAM">Campeche</option>
      <option value="MX-CHP">Chiapas</option>
      <option value="MX-CHI">Chihuahua</option>
      <option value="MX-CMX">Ciudad de México</option>
      <option value="MX-COA">Coahuila</option>
      <option value="MX-COL">Colima</option>
      <option value="MX-DGO">Durango</option>
      <option value="MX-EM">Estado de México</option>
      <option value="MX-GTO">Guanajuato</option>
      <option value="MX-GRO">Guerrero</option>
      <option value="MX-HGO">Hidalgo</option>
      <option value="MX-JA">Jalisco</option>
      <option value="MX-MIC">Michoacán</option>
      <option value="MX-MOR">Morelos</option>
      <option value="MX-NAY">Nayarit</option>
      <option value="MX-NL">Nuevo León</option>
      <option value="MX-OAX">Oaxaca</option>
      <option value="MX-PUE">Puebla</option>
      <option value="MX-QRO">Querétaro</option>
      <option value="MX-QR">Quintana Roo</option>
      <option value="MX-SLP">San Luis Potosí</option>
      <option value="MX-SIN">Sinaloa</option>
      <option value="MX-SON">Sonora</option>
      <option value="MX-TAB">Tabasco</option>
      <option value="MX-TAM">Tamaulipas</option>
      <option value="MX-TLX">Tlaxcala</option>
      <option value="MX-VER">Veracruz</option>
      <option value="MX-YUC">Yucatán</option>
      <option value="MX-ZAC">Zacatecas</option>
    </select>
  </div>
  <div>
    <label for="betweenStreet1">
      <span>Entre calle</span>
    </label>
    <input id="betweenStreet1" name="betweenStreet1" type="text" value="Entre calle" autocomplete="--" style="">
  </div>
  <div>
    <label>
      <span>Verifica tu ubicación</span>
    </label>
    <label for="reference">
      <span>
        <span>*</span>Referencia
        <span>(ej. departamento 3 edificio A)</span>
      </span>
    </label>
  </div>
  <div>
    <input id="reference" name="reference" type="text" value="" autocomplete="--" style="">
  </div>
</form>

</fieldset>




</body></html>
