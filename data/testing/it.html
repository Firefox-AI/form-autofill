<fieldset>
<h3>www.euronics.it</h3>
<p><i>Every field has autocomplete="new-password" assigned.</i></p>

<form autocomplete="on" action="/on/demandware.store/Sites-euronics-Site/it_IT/CheckoutShippingServices-SubmitShipping" name="dwfrm_shipping" id="dwfrm_shipping">
    <div>
      <label for="shippingFirstNamedefault">
          Nome
      </label>
      <input type="text" id="shippingFirstNamedefault" aria-describedby="defaultFirstName" value="" name="dwfrm_shipping_shippingAddress_addressFields_firstName" required="" aria-required="true" maxlength="50" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ\-\s\'\’]*" autocomplete="new-password" style="" data-moz-autofill-type="given-name">
    </div>
    <div>
      <label for="shippingLastNamedefault">
          Cognome
      </label>
      <input type="text" id="shippingLastNamedefault" aria-describedby="defaultLastName" value="" name="dwfrm_shipping_shippingAddress_addressFields_lastName" required="" aria-required="true" maxlength="50" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ\-\s\'\’]*" autocomplete="new-password" style="" data-moz-autofill-type="family-name">
    </div>
    <div>
      <label for="shippingEmaildefault">
          Email
      </label>
      <input type="email" id="shippingEmaildefault" aria-describedby="defaultEmail" value="" name="dwfrm_shipping_shippingAddress_addressFields_email" required="" aria-required="true" maxlength="50" pattern="^[\w.%+_-]+@[\w_-]+\.[\w]{2,6}$" autocomplete="new-password" style="" data-moz-autofill-type="email">
    </div>
</form>
</fieldset>

<fieldset>
