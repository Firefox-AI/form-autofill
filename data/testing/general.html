<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
fieldset {
  margin-top: 30px;
}

form {
  margin-right: 200px;
}

input {
  margin: 2px;
}

.invisible {
  display: none;
}
</style>
</head>

<body>

<fieldset>

<h3>www.mouser.co.id</h3>
<p><i></i></p>

<form>
  <div>
    <label for="ddlBillingAddressCountry">Country</label> *
    <select autocomplete="country" id="ddlBillingAddressCountry" name="BillingAddress.CountryCode" required="required" style="" data-moz-autofill-type="country">
      <option value="">Choose Country</option>
      <option value="US">United States</option>
      <option value="AR">Argentina</option>
      <option value="AU">Australia</option>
      <option value="BR">Brazil</option>
      <option value="CA">Canada</option>
      <option selected="selected" value="ID">Indonesia</option>
      <option value="PL">Poland</option>
      <option value="PT">Portugal</option>
      <option value="GB">United Kingdom</option>
      <option value="US">United States</option>
    </select>
  </div>
  <div>
    <label for="BillingAddress_FirstName">First Name</label>
    <input autocomplete="given-name" id="BillingAddress_FirstName" maxlength="22" name="BillingAddress.FirstName" required="required" type="text" value="" style="" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="BillingAddress_LastName">Last Name</label>
    <input autocomplete="family-name" id="BillingAddress_LastName" maxlength="23" name="BillingAddress.LastName" required="required" type="text" value="" style="" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="BillingAddress_EmailAddress">Email Address</label>
    <input autocomplete="email" id="BillingAddress_EmailAddress" maxlength="50" name="BillingAddress.EmailAddress" required="required" type="email" value="" style="" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="BillingAddress_ConfirmEmailAddress">Confirm Email Address</label>
    <input autocomplete="email" id="BillingAddress_ConfirmEmailAddress" maxlength="50" name="BillingAddress.ConfirmEmailAddress" required="required" type="email" value="" style="" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="BillingAddress_PhoneNumber">Phone</label>
    <input autocomplete="tel" id="BillingAddress_PhoneNumber" maxlength="15" name="BillingAddress.PhoneNumber" required="required" type="tel" value="" style="" data-moz-autofill-type="tel">
  </div>
  <div>
    <label for="BillingAddress_PhoneExtension">Ext.</label>
    <input autocomplete="tel-extension" id="BillingAddress_PhoneExtension" maxlength="5" name="BillingAddress.PhoneExtension" type="text" value="" style="" data-moz-autofill-type="tel-extension">
  </div>
  <div>
    <label for="BillingAddress_Company">Company Name</label>
    <input autocomplete="organization" id="BillingAddress_Company" maxlength="100" name="BillingAddress.Company" type="text" value="" style="" data-moz-autofill-type="organization">
  </div>
  <div>
    <label for="BillingAddress_AttentionLine">Attention</label>
    <input autocomplete="given-name" id="BillingAddress_AttentionLine" maxlength="20" name="BillingAddress.AttentionLine" type="text" value="" style="" data-moz-autofill-type="name">
  </div>
  <div>
    <label for="BillingAddress_AddressOne">Address Line 1</label>
    <input autocomplete="address-line1" id="BillingAddress_AddressOne" maxlength="35" name="BillingAddress.AddressOne" required="required" type="text" value="" style="" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="BillingAddress_AddressTwo">Address Line 2</label>
    <input autocomplete="address-line2" id="BillingAddress_AddressTwo" maxlength="35" name="BillingAddress.AddressTwo" type="text" value="" style="" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="BillingAddress_City">City</label>
    <input autocomplete="address-level2" id="BillingAddress_City" maxlength="30" name="BillingAddress.City" required="required" type="text" value="" style="" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="BillingAddress_PostalCode">Postal Code</label>
    <input autocomplete="postal-code" id="BillingAddress_PostalCode" maxlength="10" name="BillingAddress.PostalCode" required="required" type="text" value="" style="" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset>


</body></html>
