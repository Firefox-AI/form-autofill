<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
fieldset {
  margin-top: 30px;
}

form {
  margin-right: 200px;
}

input {
  margin: 2px;
}

.invisible {
  display: none;
}
</style>
</head>

<body>

<fieldset>

<h3>www.garbarino.com</h3>
<p><i></i></p>

<form>
  <div> Crear nueva dirección</div>
  <div>
    <label for="input-3935">País</label>
    <input id="input-3935" type="text" autocomplete="off" style="" data-moz-autofill-type="country-name">
  </div>
  <div>
    <label for="input-3909">Código Postal</label>
    <input id="input-3909" type="text" style="" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="input-3910">Provincia / Estado</label>
    <input id="input-3910" type="text" readonly="readonly" style="" data-moz-autofill-type="address-level1">
  </div>
  <div>
    <label for="input-3913">Ciudad / Localidad</label>
    <input id="input-3913" type="text" style="" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="input-3914">Calle</label>
    <input id="input-3914" type="text" style="" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="input-3931">Altura</label>
    <input id="input-3931" type="tel" style="" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="input-3915">Piso</label>
    <input id="input-3915" type="text" style="" data-moz-autofill-type="floor">
  </div>
  <div> Opcional</div>
  <div>
    <label for="input-3918">Departamento</label>
    <input id="input-3918" type="text" style="" data-moz-autofill-type="apartment">
  </div>
  <div> Opcional</div>
  <div>
    <label for="input-3921">Entrecalle 1</label>
    <input id="input-3921" type="text" style="">
  </div>
  <div> Opcional</div>
  <div>
    <label for="input-3924">Entrecalle 2</label>
    <input id="input-3924" type="text" style="">
  </div>
  <div> Opcional</div>
  <div>
    <label for="input-3927">Comentarios / Instrucciones</label>
    <input id="input-3927" type="text" style="">
  </div>
</form>

</fieldset>

<fieldset>

<h3>www.gadnic.com.ar (checkout.bidcom.com.ar)</h3>
<p><i></i></p>

<form>
  <div>
    <input hidden="" type="text" name="fecha_entrega" id="fecha_entrega" required="required" value="Llega mañana" style="" data-moz-autofill-type="cc-exp-month">
  </div>
  <div>
    <input type="text" name="id_direccion" hidden="" style="" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="numero">Código postal 
      <span>*</span>
    </label>
    <input name="numero" inputmode="number" type="text" value="1069" required="" style="" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="localidad">Localidad 
      <span>*</span>
    </label>
    <select name="nombre_ciudad" required="required" aria-hidden="true" style="" data-moz-autofill-type="address-level2">
                                        
      <option value="" selected="" disabled=""></option>
                                                                                    
      <option value="Ciudad Autonoma de Buenos Aires" selected="selected">Ciudad Autonoma de Buenos A...</option>
                                                                                        
      <option value="Montserrat">Montserrat</option>
                                                                                        
      <option value="San Telmo">San Telmo</option>
                                                                                        
      <option value="Villa Crespo">Villa Crespo</option>
    </select>
  </div>
  <div>
    <label for="calle">Calle 
      <span>*</span>
    </label>
    <input id="calle" inputmode="text" type="text" name="calle" required="required" autocomplete="off" maxlength="50" placeholder="Ej. Avenida San Martín" value="" style="" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="numero">Altura 
      <span>*</span>
    </label>
    <input id="numero" inputmode="number" type="text" name="numero" required="required" autocomplete="off" maxlength="10" placeholder="Ej. 1288" value="" style="" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="piso">Piso / Departamento</label>
    <input id="piso" inputmode="number" type="text" name="piso" autocomplete="off" maxlength="10" placeholder="Ej. 2 A" value="" style="" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="telephone">Calle 1
      <span>*</span>
    </label>
    <input id="entrecalle1" inputmode="text" type="text" name="entre_calle1" autocomplete="off" maxlength="30" value="" required="required" style="" data-moz-autofill-type="address-line1">
  </div>
  <div>
    <label for="telephone">Calle 2</label>
    <input id="entrecalle2" inputmode="text" type="text" name="entre_calle2" autocomplete="off" maxlength="30" value="" style="" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="telephone">Celular 
      <span>*</span>
    </label>
    <input required="" id="input-tel" type="text" inputmode="tel" autocomplete="off" maxlength="10" name="telefono" style="" data-moz-autofill-type="tel">
  </div>
</form>

</fieldset>

</body></html>
