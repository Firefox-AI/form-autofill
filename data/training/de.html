<h3>www.kauf-unique.de</h3>
<p><i></i></p>

<form>
  <div>
    <label for="address_gender">
        Anrede
        </label>
    <select id="address_gender" name="address[gender]" required="required" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="honorific-prefix">
      <option value="" selected="selected"></option>
      <option value="1">Herr</option>
      <option value="2">Frau</option>
      <option value="5">Doktor</option>
    </select>
  </div>
  <div>
    <label for="address_firstname">
        Vorname
        </label>
    <input type="text" id="address_firstname" name="address[firstname]" required="required" maxlength="32" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="address_lastname">
        Nachname
        </label>
    <input type="text" id="address_lastname" name="address[lastname]" required="required" maxlength="32" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="address_autocompleteAddress">
         Bitte geben Sie Ihre Adresse ein
        </label>
    <input type="text" id="address_autocompleteAddress" name="address[autocompleteAddress]" placeholder="z.B. Hauptstraße 18, 80125 München" autocomplete="off" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-lookup">
  </div>
  <div>
    <label for="address_street1_street">
        Straße
        </label>
    <input type="text" id="address_street1_street" name="address[street1][street]" required="required" maxlength="64" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-streetname">
  </div>
  <div>
    <label for="address_street1_number">
        Nr.
        </label>
    <input type="text" id="address_street1_number" name="address[street1][number]" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-housenumber">
  </div>
  <div>
    <label for="address_street2">
        Adresszusatz
        </label>
    <input type="text" id="address_street2" name="address[street2]" maxlength="64" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-line2">
  </div>
  <div>
    <label for="address_country">
        Land
        </label>
    <select id="address_country" name="address[country]" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="country">
      <option value="DE" selected="selected">Deutschland</option>
      <option value="AT">Österreich</option>
      <option value="CH">Schweiz</option>
    </select>
  </div>
  <div>
    <label for="address_zipcode">
        Postleitzahl
        </label>
    <input type="text" id="address_zipcode" name="address[zipcode]" required="required" autocomplete="off" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="postal-code">
  </div>
  <div>
    <label for="address_city">
        Ort
        </label>
    <input type="text" id="address_city" name="address[city]" required="required" maxlength="32" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-level2">

<fieldset>

<h3>www.otto.de</h3>
<p><i>German phone number not handled</i></p>

<form>
  <div>
    <input id="firstName" type="text" placeholder="Vorname" autocomplete="given-name" maxlength="30" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="given-name">
    <label for="firstName">Vorname</label>
  </div>
  <div>
    <input id="lastName" type="text" placeholder="Nachname" autocomplete="family-name" maxlength="50" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="family-name">
    <label for="lastName">Nachname</label>
  </div>
  <div>
    <input id="street" type="text" placeholder="Straße" autocomplete="address-line1" maxlength="40" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-streetname">
    <label for="street">Straße</label>
  </div>
  <div>
    <input id="houseNumber" type="text" placeholder="Hausnummer" maxlength="5" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-housenumber">
    <label for="houseNumber">Nr.</label>
  </div>
  <div>
    <input id="addOn" type="text" placeholder="Textfeld" autocomplete="address-line2" maxlength="16" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-line2">
    <label for="addOn">Adresszusatz, z.B. Stockwerk (optional)</label>
  </div>
  <div>
    <input id="postalCode" type="tel" placeholder="PLZ" autocomplete="postal-code" maxlength="5" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="postal-code">
    <label for="postalCode">PLZ</label>
  </div>
  <div>
    <input id="city" type="text" placeholder="Ort" autocomplete="address-level2" maxlength="40" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="address-level2">
    <label for="city">Ort</label>
  </div>
  <div>
    <input id="areaCode" type="tel" placeholder="Vorwahl" autocomplete="tel-area-code" maxlength="5" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="tel-area-code">
    <label for="areaCode">Vorwahl</label>
  </div>
  <div>
    <input id="phoneNumber" type="tel" placeholder="Telefonnummer" autocomplete="tel-local" maxlength="9" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="tel-local">
    <label for="phoneNumber">Telefonnummer</label>
  </div>
</form>

</fieldset>

<h3>www.bijou-brigitte.com</h3>
<p><i></i></p>

<form>
  <div>
    <label for="personalFirstName">
                        Vorname
                    </label>
    <input type="text" autocomplete="section-personal given-name" id="personalFirstName" placeholder="Vorname" name="firstName" value="" pattern="[\p{L}\- ]+" required="required" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="personalLastName">
                        Nachname
                    </label>
    <input type="text" autocomplete="section-personal family-name" id="personalLastName" placeholder="Nachname" name="lastName" value="" pattern="[\p{L}\- ]+" required="required" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="personalMail">
                                        E-Mail-Adresse
                                    </label>
    <input type="email" autocomplete="section-personal email" id="personalMail" pattern="[\p{L}\d][\p{L}\d\.\-\+_]{0,}[\p{L}\d\-_]@[\p{L}\d\.\-]+" placeholder="E-Mail Adresse" name="email" value="" required="required" maxlength="100" style="background-color: rgb(255, 252, 200);" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="personalBirthday">
                Geburtstag
            </label>
