<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<style>
fieldset {
  margin-top: 30px;
}

form {
  margin-right: 200px;
}

input {
  margin: 2px;
}

</style>
</head>

<body>

<fieldset>
<h3>www.philips.it</h3>
<p><i>Doesn't handle address-line2</i></p>

<form>
  <section>
    <input id="email" type="text" autocomplete="email" inputmode="email" maxlength="40" placeholder=" " autocorrect="on" spellcheck="false" name="email" style="" data-moz-autofill-type="email">
    <label for="email">E-mail*</label>
  </section>
  <section>
  <div id="delivery-address-form">
      <input id="delivery-firstName" type="text" autocomplete="given-name" maxlength="14" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-firstName" style="" data-moz-autofill-type="given-name">
      <label for="delivery-firstName">Nome*</label>
    <section name="delivery-lastName">
      <input id="delivery-lastName" type="text" autocomplete="family-name" maxlength="20" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-lastName" style="" data-moz-autofill-type="family-name">
      <label for="delivery-lastName">Cognome*</label>
    </section>
    <section name="delivery-line1">
        <input id="delivery-line1" type="text" autocomplete="address-line1" maxlength="29" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-line1" style="" data-moz-autofill-type="address-streetname">
        <label for="delivery-line1">Indirizzo*</label>
    </section>
    <section name="delivery-houseNumber">
        <input id="delivery-houseNumber" type="text" maxlength="5" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-houseNumber" style="" data-moz-autofill-type="address-housenumber">
        <label for="delivery-houseNumber">Numero civico*</label>
    </section>
    <section>
      <input id="delivery-line2" type="text" maxlength="35" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-line2" style="" data-moz-autofill-type="address-line2">
      <label for="delivery-line2">Indirizzo aggiuntivo</label>
    </section>
    <section name="delivery-postalCode">
      <section>
        <input id="delivery-postalCode" type="text" autocomplete="postal-code" maxlength="5" placeholder=" " autocapitalize="characters" autocorrect="on" spellcheck="false" name="delivery-postalCode" style="" data-moz-autofill-type="postal-code">
        <label for="delivery-postalCode">Codice postale*</label>
      </section>
      <p>Prego inserire un codice di avviamento postale corretto con 5 cifre senza spazi.</p>
    </section>
    <section name="delivery-town">
        <input id="delivery-town" type="text" autocomplete="address-level2" maxlength="35" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-town" style="" data-moz-autofill-type="address-level2">
        <label for="delivery-town">Città*</label>
    </section>
    <div>
        <input id="delivery-country" type="text" autocomplete="country" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-country" style="" data-moz-autofill-type="country-name">
        <label for="delivery-country">Paese*</label>
    </div>
    <div>
        <input id="delivery-phone" type="text" maxlength="20" placeholder=" " autocorrect="on" spellcheck="false" name="delivery-phone" style="" data-moz-autofill-type="tel">
        <label for="delivery-phone">Numero di telefono</label>
    </div>
  </div>

</section></form></fieldset>

</body></html>
