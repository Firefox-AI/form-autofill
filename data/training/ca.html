<fieldset>
<h3>gapizza.com</h3>

<form>
  <div>
    <span>Contact</span>
    <div>
      <div>
        <label for="customer-first-name">First Name</label>
        <input required="" autocomplete="cc-given-name" id="customer-first-name" name="firstName" placeholder="Enter your first name..." type="text" data-moz-autofill-type="given-name">
      </div>
      <div>
        <label for="customer-last-name">Last Name</label>
        <input required="" autocomplete="cc-family-name" id="customer-last-name" name="lastName" placeholder="Enter your last name..." type="text" data-moz-autofill-type="family-name">
      </div>
    </div>
    <div>
      <div>
        <label for="customer-email">Email</label>
        <input required="" autocomplete="email" id="customer-email" name="email" placeholder="Enter your email..." type="email" data-moz-autofill-type="email">
      </div>
      <div>
        <label for="customer-phone">Phone</label>
        <div>
          <select name="phoneCountry" aria-label="Phone number country" data-moz-autofill-type="tel-country-code">
            <option value="CA">Canada</option>
            <option value="AF">Afghanistan</option>
          </select>
          <input type="tel" autocomplete="tel" required="" id="customer-phone" name="phone" value="" data-moz-autofill-type="tel">
        </div>
      </div>
    </div>
  </div>
</form>

</fieldset>

<fieldset>

<h3>www.homedepot.ca</h3>
<p><i></i></p>

<form>
  <div>
    <label for="id9143"> First Name
      <span aria-hidden="true"> *</span>
    </label>
    <input formcontrolname="firstName" aclinput="" type="text" id="id9143" data-moz-autofill-type="given-name">
  </div>
  <div>
    <label for="id4159"> Last Name 
      <span aria-hidden="true"> *</span>
    </label>
    <input formcontrolname="lastName" aclinput="" type="text" id="id4159" data-moz-autofill-type="family-name">
  </div>
  <div>
    <label for="id2243"> Email Address 
      <span aria-hidden="true"> *</span>
    </label>
    <input formcontrolname="email" aclinput="" type="text" maxlength="150" id="id2243" data-moz-autofill-type="email">
  </div>
  <div>
    <label for="id1814"> Phone Number 
      <span aria-hidden="true"> *</span>
    </label>
  </div>
  <div>
    <input formcontrolname="phone" aclinput="" type="text" id="id1814" data-moz-autofill-type="tel">
  </div>
</form>

<form>
  <form>
    <div>
      <label> Address
        <span aria-hidden="true"> *</span>
      </label>
      <label> Note:  We cannot deliver to P.O. boxes. </label>
    </div>
    <div>
      <label hidelabel="true" for="id1566"></label>
      <input aclinput="" autocomplete="'false'" type="text" id="id1566" placeholder="Start typing your address..." data-moz-autofill-type="address-lookup">
    </div>
  </form>
  <form>
  <div>
    <label for="id8848"> Add Unit, Apartment or Suite </label>
    <input formcontrolname="line2" aclinput="" type="text" id="id8848" data-moz-autofill-type="apartment">
  </div>
  <div>
    <label for="id625"> City
      <span aria-hidden="true"> *</span>
    </label>
    <input formcontrolname="city" aclinput="" type="text" id="id625" data-moz-autofill-type="address-level2">
  </div>
  <div>
    <label for="id6780">Province
      <span aria-hidden="true"> *</span>
    </label>
    <select aclselect="" formcontrolname="provinceIsoCode" id="id6780" data-moz-autofill-type="address-level1">

      <option value="CA-BC"> British Columbia </option>
      <option value="CA-MB"> Manitoba </option>

      <option value="CA-QC"> Quebec </option>
      <option value="CA-SK"> Saskatchewan </option>
      <option value="CA-YT"> Yukon Territory </option>
    </select>
  </div>
  <div>

    </label>
    <input formcontrolname="postalCode" maxlength="7" aclinput="" type="text" id="id326" data-moz-autofill-type="postal-code">
  </div>
</form>

</fieldset>
